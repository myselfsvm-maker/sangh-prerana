ूम हुआ, अतएव इसके लिए स्वयंसेवक एक दूसरे का पूर्ण परिचय प्राप्त करें, वे एक दूसरे के जीवन से समरस हों तथा हम सब एक विशाल-कुटुम्ब के ही घटक हैं ऐसी उन्हें आंतरिक अनुभूति हो, इसके लिए सब स्वयंसेवक संघस्थान पर कार्यक्रम समाप्त होते ही एकदम घर न जाकर कुछ देर विनोद में मग्न हों तथा यह सब स्वाभाविक ही हो जाए ऐसी उनकी हार्दिक इच्छा रहती थी।।"}, {"person": "", "title": "प्रसंग 1", "text": "एक दिन स्वयं डाक्टरजी शाखा शुरू होने के पहले मिलने आए हुए दो स्वयंसेवकों को साथ लेकर संघ का दैनिक कार्यक्रम शुरू होने से पूर्व ही संघस्थान जा पहुँचे । उन्होंने झाडू उठा कर संघस्थान साफ करना आरंभ कर दिया। उसके बाद पास के घर से बाल्टियाँ ले समीप के कुएँ से पानी लाकर संघस्थान को सींचा। इस कारण संघस्थान विशेष आकर्षक बना। स्वयंसेवकों को उस दिन कार्यक्रम करते हुए विशेष उत्साह का अनुभव हुआ। कार्यक्रम समाप्त होने पर कुछ स्वयंसेवक घर चले गए पर अधिक लोग डाक़्टर जी के इर्द-गिर्द जमा हो गए। खड़े-खड़े कहाँ तक गप्पें मारी जा सकती थीं ? पर वहाँ से हिलने की भी तो किसी की इच्छा नहीं हो रही थी। फिर क्या था ? डाक्टरजी के इर्द-गिर्द मंडल बनाकर सब लोग बैठ गए। डाक्टरजी के पास बातों की कमी न होने के कारण बैठक में विषयों की कमी नहीं पड़ी।\n   इसके बाद डाक्टरजी ने नियमित रूप से यह कार्यक्रम निश्चि त कर डाला। अब कार्यक्रम समाप्त होने के बाद घर जानेवालों की संख्या कम होने लगी। संघस्थान पर ही डाक्टरजी के साथ स्वयंसेवक अपना समय बिताने लगे। डाक्टरजी ने इन बैठकों में भिन्न-भिन्न बातों पर प्रकाश डाल, संघकार्य का बोध करा, स्वयंसेवकों में प्रखर ध्येयनिष्ठा तथा संघकार्य के बारे में तड़प उत्पन्न कर दी।\n   इन बैठकों में प्रतिदिन कार्य के सम्बन्ध में बातचीत होने लगी। भावी कार्यक्रमों की रूपरेखा निश्चिेत होने लगी। इन बैठकों का प्रत्यक्ष परिणाम तो यह दिखाई दिया कि स्वयंसेवकों का घनिष्ठ परिचय होने लगा। इसी तरह परस्पर प्रेम और स्नेह भी बढ़ने लगा। एक दूसरे के सुख-दुःख में समरस होने की प्रवृत्ति बढ़ गई। एक दूसरे के यहाँ आना-जाना हो जाने से हम एक ही कुटुम्ब के घटक हैं यह भी अनुभव होने लगा। जिस संघस्थान पर हम खेलते हैं, एकत्रित होते हैं, वह स्वच्छ व आकर्षक रहे, वहाँ का वातावरण विशुद्ध रहे तथा इस प्रकार के वातावरण का प्रभाव अपने समान दूसरों पर भी पड़े इस प्रकार की प्रबल इच्छा स्वयंसेवकों के मन में अंकुरित हो गई। ।"}, {"person": "", "title": "प्रसंग 2", "text": "‘मोहिते का बाड़ा’ जहाँ पर संघकार्य शुरू हुआ वह स्थान डाक्टरजी ने स्वयं परिश्रम कर रमणीय बना दिया। इस प्रकार एक घण्टे से भी अधिक समय देने की भावना स्वयंसेवकों के मन में स्वाभाविक ही बढ़ गई। पर अभी सप्ताह में एक दिन यदि संघ को छुट्टी रहे तो बुरा नहीं ऐसी इच्छा कइयों के मन में रहती थी। स्वयंसेवक रविवार के अवकाश का उपयोग सिनेमा देखने में करते थे। तरुणों को सिनेमा देखने की कितनी लत रहती है यह कहने की आवश्यकता नहीं। इसी तरह एक दिन रविवार को सारे कार्यकर्ता डाक्टरजी को न बतलाते हुए चुपचाप सिनेमा देखने चले गए। राष्ट्रकार्य में सिनेमा देखने को कोई स्थान नहीं यह सोचकर इस प्रकार सिनेमा देखने जाना डाक्टरजी पसन्द नहीं करेंगे अतएव उन्हें पता न लगने पाए ऐसा प्रयत्न सभी ने किया। डाक्टरजी जब पूछे तो ठीक बात न बताकर अन्य ही बहाना करेंगे ऐसा उन्होंने आपस में निश्चिंत कर लिया। दूसरे दिन सदा के समान संघस्थान का कार्य आरम्भ हुआ। कार्यकर्ता कार्यक्रम लेने में विशेष उत्साह दिखला रहे थे। कल सारे दिन कार्यकर्ताओं से भेंट न होने के कारण डाक्टरजी का मन विषण्ण था। मोहिते संघस्थान की दीवार पर बैठे ‘डाक्टरजी ने एक-एक कार्यकर्ता को अपने समीप बुलाकर उसे आप कल सायंकाल कहाँ गए हुए थे ?’ ऐसा पूछा। ‘संयोगवश प्रत्येक ने मावशीकडे गेलो होतो (मौसी के यहाँ गया था।)’ ऐसा उत्तर दिया। \n   कार्यक्रम समाप्त होने पर प्रमुख स्वयंसेवक व शिक्षकों की बैठक शुरू हुई। ‘‘प्रतिदिन की तरह इधर-उधर की गप्पें मारते-मारते जब खूब रफ जम गया तो डाक्टरजी कहने लगे - ‘भाई कल क्या मौसी दिवस था’?’’ एक ही बहाना बतलाने से यह सब गड़बड़ हो गई है यह ध्यान में आते ही सभी एक दूसरे की ओर देखने लगे। हमारी पोल खुल गई यह जानकर सभी का दिल बैठने लगा। डाक्टरजी झट कहने लगे, मैं भी सिनेमा जा सकता हूँ।’ उन्हें तो स्वयंसेवकों के साथ समरस होने का कार्य करना था। उनसे भिन्नता दिखाना अभीष्ट नहीं था। यह सोचकर उन्होंने अपने सहकारियों के साथ सिनेमा देखना निश्चि्त कर लिया। इस कारण सभी को बड़ी प्रसन्नता हुई। रविवार का दिन आया। सायंकाल हुई। सब भोजन करके डाक्टरजी के घर पर जमा होने लगे। \n   डाक्टरजी ने भोजन करते-करते देर लगा दी। सिनेमा घर पहुँचने पर देर हो चुकी थी। खेल शुरू हो गया था, टिकट बन्द हो चुकी थी। यह सलाह हुई की चलो बरडी (नगर के एक भाग का नाम) चलें। सब चल पड़े। वहाँ भी देर हो गई थी। डाक्टरजी के सिवाय सभी निराश थे। सब ने वहीं से अपने-अपने घर जाने का विचार किया, पर डाक्टरजी ने तो कुछ और ही मन में सोच रखा था। ‘वे कहने लगे-और कुछ नहीं तो हम कम से कम तीन घण्टे तो रह सकते हैं। चलो, कहीं बाहर रमणीय स्थान पर चलें, चाँदनी रात भी है’। सब को यह सलाह जँच गई। सभी तैयार हो गए। चलते समय डाक्टरजी कहने लगे कि हमारे पास पैसे भी हैं । सिनेमा के लिए खर्चने ही थे। कुछ खाने के लिए मिष्टान्न साथ लेते चलें । वही मिलकर खाने में आनन्द रहेगा।’ फिर क्या था, नया कार्यक्रम नए उत्साह से शुरू हो गया। सभी इण्डियन जिमखाने के सामनेवाले सुन्दर मैदान में पहुँचे। वहाँ खाने में तथा हँसी-विनोद में संपूर्ण समय व्यतीत हुआ। सबको अनुभव होने लगा कि यह रविवार व्यर्थ नहीं गया। सिनेमा से भी अधिक आनन्द से समय गुजरा है। अब मनोरंजन का रुख बदल गया। सिनेमा न होकर रविवार को ट्रिप आदि के कार्यक्रम चलने लगे। कार्यकर्ता सिनेमा की अपेक्षा ऐसे ही सांघिक कार्यक्रमों की योजना करने लगे। डाक्टर साहब ने उपदेश नहीं दिया। नवीन 2 कार्यक्रमों को वे स्वयंसेवकों पर लादते नहीं थे बल्कि स्वयंसेवक ही स्वयंस्फूर्ति से नए-नए कार्यक्रम बनाने में समर्थ होने लगे। सभी कार्यक्रम जबरदस्ती से लादे हुए न होकर स्वेच्छा से और प्रसन्नता से हो रहे थे। ।"}, {"person": "", "title": "प्रसंग 3", "text": "एक बार डाक्टरजी ने एक अधिकारी को एक काम करने के लिए कहा। उसने वह किसी दूसरे को कह दिया। उसने फिर और तीसरे को, इस प्रकार वह बात आठवें सज्जन तक पहुँच गई। और अन्त में वह काम हुआ ही नहीं। डाक्टरजी ने इस त्रुटि को दूर करने के लिए किसी को उपदेश नहीं दिया, अपतु उस दोष को दूर करने के लिए अपने ढ़ंग से यत्न किया। एक दिन सारे स्वयंसेवक बैठे हुए थे कि उपरोक्त बात की चर्चा चल पड़ी। अपने ऊपर की जिम्मेवारी दूसरे पर डालने से उस काम की क्या हालत होती है यह समझाने के लिए उन्होंने यह बात कही। डाक्टर साहब जो भी बात या उदाहरण सुनाया करते थे वे कपोल-कल्पित न होकर व्यवहार में आ चुक थे। इसीलिए उनका स्वयंसेवकों के मन पर अच्छा परिणाम हुआ करता था।\n   नागपुर में एक जन्मजात धनी तथा इतिहासप्रसिद्ध घराना है। उस श्रीमान् के घर कहीं कोई एकाध धार्मिक कार्यक्रम हुआ कि फिर घर के ठाट देखनेही लायक होते हैं, यह कहने की आवश्यकता नहीं। इनके घर लड़के का मुण्डन-संस्कार था। बड़े-बड़े प्रतिष्ठित व्यक्ति आशीर्वाद देने के लिए एकत्रित हुए थे। वे स्वयं ही आनेवालों का हँसमुखसे स्वागत कर रहे थे। ‘‘उन्होंने सबके सन्मुख चांदी का पान-दान रखा और कहा कि लीजिए, ‘पान, लीजिए’ पर किसी ने पान नहीं लिया। क्योंकि चूनेवाला स्थान खाली पड़ा था। बीच में से एक ने कह ही दिया कि चूना मँगवा लें। झट श्रीमान् ने चूना लाने के लिए सामने खड़े अपने मैनेजर से कहा-उस मैनेजर ने एक अपने नीचे के नौकर को, उस नौकर ने भी एक और को, इस तरह ‘चूना-चूना’ की आवाज सब ओर गूँज गई। डाक्टरजी भी वहाँ उपस्थित थे। उनका उस श्रीमान् के साथ घनिष्ठ परिचय था। उन्होंने एक परिचित व्यक्ति को भेजकर चूना मँगा लिया और पानदान में रख दिया। कार्य करने से सम्पन्न होता है, आज्ञा चलाने से नहीं। आज ‘स्वराज्य-स्वराज्य’ चिल्लानेवाले तो बहुत हैं, पर उसके लिए प्रयत्नशील कितने हैं ? स्वयंसेवक वैसे नहीं होने चाहिए। वे स्वयं प्रयत्न करनेवाले हों।’’ यह ज्ञान स्वयंसेवकों को उन्होंने दिया।।"}, {"person": "", "title": "प्रसंग 4", "text": "कई स्वयंसेवक शाखा में नहीं जाते थे। डाक्टरजी के कारण पूछने पर वे मिथ्या बहाना बतलाते थे। डाक्टरजी ऐसे थोथे बहाने उचित नहीं समझते थे। इस विषय में स्वयंसेवकों को उन्होंने अपना एक अनुभव सुनाया जो बड़ा शिक्षाप्रद है। \n   डाक्टरजी ने ‘स्वातंत्र्य’ नाम का एक साप्ताहिक नागपुर में चलाया था। उस पत्र में वे सरकार पर बड़ी टीका-टिप्पणी करते थे। उस पत्र के सम्पादक और उप-सम्पादक नित्यप्रति कार्यालय में जाकर काम किया करते थे। एक बार उप-सम्पादक को उन के घर आए हुए मेहमान के मित्र के घर भोजन के लिए जाना था। पर उस ने यह बात प्रकट न करते हुए ‘मेरा पेट जोर से दर्द कर रहा है इसलिए मैं काम पर नहीं आ सकता’ ऐसा प्रार्थना-पत्र लिखकर डाक्टरजी के पास भेज दिया। डाक्टरजी ने जब ‘मेज पर पड़ी हुई अर्जी’ पढ़ी तो अपने सहकारी मित्र की तबीयत ठीक नहीं है यह जानकर उन्हें कैसे चैन पड़ सकता था ? किसी भी परिचित व्यक्ति का स्वास्थ्य खराब हुआ कि उसका ध्यान रखना तथा उसको औषधि पहुँचाना यह डाक्टरजी का स्वभाव था। इसीलिए डाक्टरजी झट अपने सहकारी का हालचाल जानने के लिए उसके घर चल पड़े। \n   वहाँ पहुँचने पर उनकी पत्नी ने कहा कि वे मित्र के यहाँ भोजन करने गए हैं।  (बेचारे वह उप-सम्पादक अपनी पत्नी को बतलाना भूल गए थे।)\n   वे जिस मित्र के यहाँ गए थे वह डाक्टरजी का अच्छा परिचित था इसलिए डाक्टरजी उन के घर पहुँचे। वे कहने लगे ‘डाक्टर साहब चाय पी कर ही जाइए।’ अन्दर पहुँचने पर भोजन के लिए आई उस मंडली में उप-सम्पादक जी भी गप्पें मार रहे थे। डाक्टरजी ने अर्जी के विषय में कुछ जिक्र नहीं किया। उप-सम्पादक जी से कुछ न कहते हुए भी उनका कार्य सम्पन्न हो गया। अपनी बुरी हरकत दूसरे के ध्यान में आ गई यह ध्यान में आते ही मनुष्य फिर कभी वैसा नहीं करता। सहस्र-ग्रंथों के पढ़ने से भी जो बात ध्यान में नहीं आ सकती वह बात डाक्टरजी ने स्वयंसेवकों के मन में उपर्युक्त उदाहरण से जमा दी। स्वयंसेवकों के अन्तःकरण से कपट का भाव दूर हो गया। एक दूसरे के लिए हृदयद्वार खुल गए।।"}, {"person": "", "title": "प्रसंग 5", "text": "किसी ने विश्वाासपूर्वक काम कहा तो वह करना ही चाहिए, चाहे उसके लिए कुछ कष्ट ही क्यों न उठाया पड़े; यह डाक्टरजी का स्वयंसेवकों को कहना रहता था। एक बार ऐसा हुआ कि वर्धा का एक स्वयंसेवक वहाँ के एक बड़े अधिकारी का समाचार लेकर सायंकाल को डाक्टर साहब के पास आया। समाचार के अनुसार दूसरे दिन 6 बजे सुबह दिनभर के लिए एक टैक्सी वर्धा भेजनी थी। उस समय डाक्टरजी सख्त बीमार थे, इधर-उधर घूम नहीं सकते थे। पास ही कुछ कार्यकर्ता बैठे थे। उन्हें डाक्टरजी ने वह पत्र दिखाया और खुद को ले जाने के लिए ताँगा लाने को कहा। एक कार्यकर्ता कहने लगे कि ‘काम सरल है आप चिंता न करें, मैं स्वयं कर आता हूँ।’ वे आश्वाजसन देकर टैक्सी ढूँढ़ने के लिए निकले। स्टैंड पर गए। कोई टैक्सी वाला सुबह 6 बजे जाने को तैयार न हुआ। रात के नौ बज गए। वे डाक्टर साहब के पास आए। सब हाल कह सुनाया। डाक्टरजी ने फिर प्रयत्न करने को कहा और कुछ परिचित लोगों के नाम भी बताए। जिन में से एक बड़ी मुश्किल से सुबह साढ़े आठ बजे चलने को तैयार हुआ। परन्तु पहुँचना तो सुबह 6 बजे था। ‘अतएव यह व्यवस्था न हो सकेगी ऐसा सोचकर वह शर्म से तथा कार्य की असफलता से विषण्ण होकर स्वयं डाक्टर साहब के पास न जा सका तथा उसने वर्धा से आए हुए स्वयंसेवक के हाथ डाक्टरजी को समाचार भिजवा दिया कि-काम नहीं हुआ।’  स्वयं 12.30 बजे थक कर निराश हो कार्यालय में जाकर सो गया।\n   रात के तीन बजे होंगें। नीचे से किसी ने कार्यालय का दरवाजा खटखटाया, तब इस कार्यकर्ता की नींद खुली। देखा कि जो डाक्टर साहब बीमार थे, घूम नहीं सकते थे वे ही ओवरकोट पहने शाल ओढ़े सम्मुख खड़े हैं। देखकर वह क्या बोल सकता था ? पर किसी प्रकार वह कहने लगा, डाक्टर साहब, अस्वस्थ होते हुए आप इस समय यहाँ क्यों ‘आए ?’ \n   डाक्टरजी बिना क्रोधित हुए साधारण रीति से बोले- तुम्हारा समाचार मिल गया था। मैं स्वयं टैक्सीवाले को मिल आया हूँ। टैक्सी 8 की बजाए 6 बजे ही जाएगी। मैं यही कहने आया हूँ कि वर्धा से आए स्वयंसेवक को सुबह ही उसके पास भेज देना। बस, यही कहने आया था। ‘अब आप आराम से सोएँ ।’  यह बात सुनकर उस कार्यकर्ता को कैसा लगा होगा? अपनी अस्वस्थता का विचार न करते हुए अपने ऊपर विश्वाास से सौंपे हुए कार्य को करना ही चाहिए इसके लिए डाक्टरजी को कितनी चिंता हो रही थी? कार्यकर्ता को अपनी त्रुटि ध्यान में आ गई। थोड़ा सा और प्रयत्न किया होता तो यह काम हो सकता था, ऐसा उसे मालूम होने लगा।\n   डाक्टरजी की इस प्रकार की अनेक बातें विस्तार से कही जा सकती हैं। आज राष्ट्रीय स्वयंसेवक संघ का संगठन इतना प्रभावी होने का कारण डाक्टरजी का प्रत्यक्ष आचरण ही है। मातृ-भूमि की एकनिष्ठ सेवा करनेवालों के लिए ये पुण्य-स्मृतियाँ स्ङ्गूर्तिदायक हों यही इच्छा हृदय में रखते हुए यह लेख समाप्त करता हूँ।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 1", "text": "प्रतीत होता है कि विरोधाभास यह विधाता का एक प्रिय खेल हे। अन्यथा कीचड़ में कमल, काले बादलों में सौदामिनी का विलास, अथवा हाय-हाय करानेवाली भीषण गर्मी में सर्वत्र जल ही जल करनेवाली मूसलाधार वर्षा आदि आश्चमर्य से भरे दृश्य संसार में दिखाई ही नहीं दे सकते थे। युगप्रवर्तकों के सम्बन्ध में भी विधाता इसी प्रकार आश्च र्य से परिपूर्ण खेल खेलता हुआ दिखाई देता है। परिस्थिति जितनी ही अधिक प्रतिकूल, निराशा की भीषणता जितनी अधिक डरावनी और संकटों की तीव्रता जितनी अधिक भयानक उतना ही अधिक उज्ज्वल होता है उस परिस्थिति को बदलनेवाले युगप्रवर्तक का विभूतिमत्व। दुष्टों की राक्षसी लीलाओं का नर्तन जितना अधिक , उतनी ही अधिक बलवती होती है परमेश्व्र की अवतार धारण करने के लिए होनेवाली पुकार।\n   इसीलिए युगप्रवर्तकों के सम्बन्ध में विधाता ने यह नियम ही बना लिया है कि उनका जन्म ‘अहम्’ की घोषणा करनेवाले बड़े-बड़े साहसियों को भी हताश करनेवाली परिस्थिति में ही हो। भगवान् श्रीकृष्ण का जन्म कृष्णपक्ष की अष्टमी के अंधकार में कारागृह में ही हुआ था। फिर हमारे डा. हेडगेवार इस नियम का अपवाद कैसे हो सकते थे ?\n   डाक्टरजी के जन्म के समय विजितों के सिर पर अनिवार्य रूप से आनेवाली समस्त दारुण दुःखद यातनाएँ भारत को भोगनी पड़ रही थीं, पर उसका बुरा-भला न मान कर गंदगी में महल खड़े कर उसमें खुशी से रहनेवाले कीड़ों की तरह महान् और श्रेष्ठ कहलाए जानेवाले लोगों को भी पारतंत्र्य के उस नर्ककुण्ड में अपना वैयक्तिक जीवन सुखी बनाने में व्यस्त देखकर विचारशीलों का अंतःकरण विदीर्ण हो रहा था। भावी सन्तानों के सम्बन्ध में भी उनकी आकांक्षाएँ निःसत्त्व थीं। ‘बेटा पढ़ लिखकर किसी गौरांग-प्रभु की कृपासे ही चालीस-पचास रुपए मासिक की नौकरी कर के, उस प्रभु के सामने जी हाँ’ जी ‘हाँ’ कर काम करता रहे और वृद्धावस्था में पेन्शन खाता हुआ इस संसार से बिदाई ले ले, यही थी उस समय की पीढ़ी की सबसे बड़ी आकांक्षा। जनता के सामने देशसेवा की बड़ी-बड़ी गप्पें हाँक कर देश के लिए अपना सर्वस्व बलि चढ़ाने का उपदेश करनेवाले नेता के घर जाकर यदि किसीने पूछा नेताजी, मैं आपकी आज्ञा के अनुसार सब कुछ करने के लिए तैयार हूँ। अवसर पड़ने पर मैं अपने सर्वस्व का भी बलिदान करने में पीछे नहीं हटूँगा। कहिए, मैं अब आगे क्या करूँ ? तो वह महान नेता स्पष्ट कह देता था, भैया देश-सेवा की बातें सभा के लिए ही होती हैं। सभा के समाप्त होते ही उन्हें भूल जाना चाहिए। तूने क्या वह सब सच समझ लिया ? पागल कहीं का। जाओ। नौकरी करके पैसा कमाओ। ‘माँ-बाप को सुखी बनाओे। सुख से गृहस्थी करते हुए हमारे समान ही बीच-बीच में देशसेवा करते रहो।’\n   उच्च आकांक्षाओं के पौधों को जला देनेवाले ऐसे उद्विग्नतापूर्ण वातावरण में डाक्टर हेडगेवार जी का बचपन बीता। वैयक्तिक जीवन में ‘जी हाँ’ ‘जी हाँ’ और सामाजिक जीवन में स्वाँग इन्हीं दो का साम्राज्य सर्वत्र छाया हुआ था। पर परिस्थितियों की बन्दर-घुड़की से ड़रने के लिए, डाक्टरजी हृदय के कच्चे थोड़े ही थे ? इसके विपरीत, परिस्थितियों की प्रतिकूलता के साथ ही साथ बढ़ती रहनेवाली दुर्दम्य इच्छाशक्ति, यही तो है उनके जैसे युगप्रवर्तक का प्रथम गुण। इसी की नींवपर उनके भावी कर्तृत्व का महल खड़ा होता है। और इच्छाशक्ति के बल पर ही राष्ट्र की जनता के अन्तःकरण में भविष्य के सम्बन्ध में आशा के पौधे लगा कर उन्हें विकसित करना होता है। आज की स्थिति कितनी ही निराशाजनक क्यों न हो, वह चिरकाल नहीं रहेगी, परिस्थितियों के चक्रव्यूह का भेदन हम अपने प्रयत्नों से निश्चिित कर सकते हैं, अपने देश बांधवों को इस आत्मविश्वा्स का सन्देश सुनाना यही तो है युग-प्रवर्तक के यशोमंदिर की पहली सीढ़ी। अतः स्वजनों के दोषों की अनावश्यक चर्चा न कर उनकी सुप्त वीरवृत्ति को फूँक-फूँक कर निराशा की राख में से चैतन्य की अग्नि प्रज्ज्वलित करने का महान् कार्य उसे प्रथम करना पड़ता है।\n   कार्य की सफलता के लिए दुर्दम्य इच्छाशक्ति को निर्भ्रान्त दूरदृष्टि की सहायता आवश्यक होती है। आगामी शताब्दियों तक अमर प्रमाणित होनेवाले विचारों और अवश्यंभावी घटनाओं की निश्चिरत कल्पना आज ही कर उसके लिए आवश्यक उपायों का निर्धारण इसी क्षण करने की क्षमता रखना युगप्रवर्तक के लिए अनिवार्य होता है। इसी के साथ उसे अतीत का वास्तविक ज्ञान रखकर सहस्रों वर्षों के संस्कारों पर ध्यान देना पड़ता है। उसे अपनी आँखों के सामने क्षणक्षण में और कणकण में बदलता हुआ राष्ट्र का इतिहास समस्त रूप में स्पष्ट रखना पड़ता है। ऐसा होने पर ही राष्ट्र की दीर्घ तपस्या सफल होकर राष्ट्र वैभव-शिखर पर चढ़ पाता है। ।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 2", "text": "दो एक प्रभावी घोषणाओं की सहायता से इन सारी ही बातों को डाक्टर हेडगेवार जी ने किस प्रकार सफल बनाया यह देखते ही मन आश्चरर्यचकित हो जाता है। अपनी राष्ट्रीयता को ही भूलने के कारण हम बन्धनों में जकड़े गए। अतः यदि राष्ट्र का पुनरुत्थान करना हो तो उसका एकमात्र मार्ग यही है कि प्रवाह-पतित काष्ठ की तरह किसी अनिश्चिनत दिशा में न बहते हुए हिन्दू-समाज को उसके गतवैभव की याद दिला कर उसे वैभवशाली राष्ट्रीयत्व का उपासक बनाना होगा। इस वास्तविकता को डाक्टरजी ने अपनी मूलग्राही बुद्धि से तत्काल पहचाना और 1925 में उन्होंने हुँकार कर घोषणा की कि हिमालय से कन्याकुमारी और कराची से कलकत्ता तक इस विस्तृत परिसीमा से वेष्टित हिंदुस्थान सारे संसार के लिए समान रूप से खुली रहनेवाली धर्मशाला न होकर केवल हिंदुओं की राष्ट्र-भूमि है।\n   पर निर्बुद्ध बने हुए हिन्दू-समाज के लिए इस दो-टूक स्पष्ट घोषणा का बोझ सँभालना बहुत ही कठिन था। हम में से ही कुछ लोगों को उसमें अराष्ट्रीयता का आभास होने लगा, तो कुछ दूसरे लोगों को दूसरे अन्य समाजों के प्रति द्वेष की भावना परिलक्षित होने लगी। हिन्दुस्थान में जितने लोग रहते हैं वे सभी राष्ट्रीय हैं, हिन्दुस्थान पर उन सबका समान अधिकार है, इस प्रकार की भ्रान्त कल्पना की शिक्षा पाए हुए लोगों को ‘हिन्दुस्थान हिन्दू-राष्ट्र है’ इस घोषणा में तथाकथित विशाल ‘राष्ट्रीयत्व’ का अभाव प्रतीत होने के कारण वे बेचैन हो उठे। इसी प्रकार हिन्दुस्थान ‘हिन्दू-राष्ट्र है’ कहने से हम लोग अन्य समाजों को यहाँ से निकाल बाहर करेंगे ऐसा समझनेवाले लोगों को भय की आशंका ने आ घेरा, कि कहीं इस कारण उन समाजों की क्रोधाग्नि में वे आहुति न बन जाएँ। कुछ लोगों को इस घोषणा में ‘छोटे मुँह बड़ी बातें’ का पागलपन दिखाई देने लगा। अर्थात् उस समय बहुत से लोगों ने उस घोषणा को किसी ‘गैरजिम्मेवार कंगाल की अर्थहीन बकवास’ से अधिक महत्त्व नहीं दिया था।\n   पर हिन्दुस्थान  ‘हिन्दू-राष्ट्र है’ यह कहने में अन्य समाजों का नागरिकत्व अस्वीकार करने अथवा उन्हें हिन्दुस्थान से निकाल बाहर करने का उद्देश्य न होकर इस देश के भविष्य के भले-बुरे का दायित्व मुख्यतः हिन्दुओं पर है और उसके लिए हिन्दुओं को आन्तरिक पीड़ा होनी चाहिए इतना ही हिंदू समाज को समझा देने का उद्देश्य इस घोषणा में है, यह बात डाक्टरजी तथा उनके सहकारियों ने अपनी ईर्ष्या-हीन वृत्ति और सहिष्णुतापूर्ण व्यवहार से सब समाज के गले में उतार दी, तब धीरे-धीरे समाज की धारणा बदलने लगी। डाक्टर जी के मित्र-मण्डल में हिन्दू, मुसलमान, पारसी, ईसाई आदि सभी जाति के लोग थे और संकट के समय सभी को सहायता देने में डाक्टरजी तथा अन्य संघी किस प्रकार प्रस्तुत रहते हैं, यह जब लोगों ने स्वयं देखा तब अनेकों की भ्रान्त धारणाएँ निर्मूल हो गईं। गंगा का जल सदैव पवित्रतम ही रहता है। कोई आलसी कितना भी क्यों न कहे और न चाहे तो भी उसका प्रभाव उस पर हुए बिना रह ही नहीं सकता। जाने अनजाने में इस गंगाजल का स्पर्श हिन्दू-समाज को जैसे-जैसे होने लगा वैसे-वैसे हिन्दू-समाज की काया बदलने लगी। यह देखने के बाद तो जनता को इस गंगाजल की पवित्रता के सम्बन्ध में विश्वास और आदर द्विगुणित होने लगा। धीरे-धीरे वह समय आया जब सबको विश्वादस हो गया कि हिन्दू-समाज के उद्धार के लिए इस त्रैलोक्य-चिंतामणि की मात्रा के सिवा दूसरा उपाय नहीं है। फिर क्या पूछना था ! जनता में संघ-प्रेम तीव्र गति से बढ़ने लगा। उपेक्षा, उपहास, तटस्थता और विरोध सभी दैवी प्रेम में परिवर्तित हो गए और जनता की आँखों के सामने प्रभावी हिन्दूराष्ट्र का मंगलमय चित्र दिखाई देने लगा। ‘15 वर्ष पागल’ कहकर जिसका उपहास किया गया था वह कंगाल, भविष्यवक्ता देवदूत प्रमाणित हुआ (A mad cap turned to be a prophet)। डाक्टरजी युगप्रवर्तक कहलाने लगे।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 3", "text": "डाक्टरजी की दूसरी एक ऐसी ही प्रभावी घोषणा  थी - ‘संघ नया कुछ नहीं करता है।’ हिंदुस्थान ‘हिन्दूराष्ट्र है’ इस घोषणा में पहले-पहले कुछ लोगों को मद और ईर्ष्या चाहे प्रतीत हुई हो पर उसमें की आत्मविश्वांस की अनुभूति सभी को हो रही थी। पर ‘संघ को नया कुछ नहीं करना है’ इस घोषणा का रहस्य बहुत दिनों तक लोगों की समझ में नहीं आया। कुछ लोग कहने लगे - संघ को नया कुछ नहीं करना है - तो संघ की स्थापना ही किसलिए की? प्रतीत होता है कि संघ प्राचीन समय के जंग लगे शस्त्रास्त्र और ‘पुराने पड़े सिद्धांतों का ही ढ़ोल पीटता रहेगा। संघ से किस कर्तृत्व की अपेक्षा की जाए?’\n   कुछ दूसरे लोग इस प्रकार मजाक उड़ाने लगे-- ‘ठीक ही है। संघ नया कुछ क्यों करना चाहेगा ? पूर्वजों के पुण्य-प्रताप को बेचकर खानेवाले ये आलसी, ये नया क्या कर सकते हैं ?’\n   इसी प्रकार अन्य लोग भी कुछ टीका-टिप्पणी कर रहे थे। पर डाक्टरजी ने उधर ध्यान ही नहीं दिया। क्यों कि उन्होंने जो घोषणा की थी वह किसी क्षणिक उत्साह में अथवा मन की तरफ में नहीं की थी। पूर्ण विचार और मनुष्य-स्वभाव का गंभीर अध्ययन करने के बाद ही उन्होंने वह घोषणा की थी। सच्चा युगप्रवर्तक नया राष्ट्र निर्माण करने की बात कभी नहीं कहता। वह भूलकर भी यह नहीं कह सकता कि वह सर्वथा नवीन इतिहास का पृष्ठ लिखनेवाला है। वह यह भली प्रकार जानता है कि भूत, वर्तमान और भविष्य इन तीनों कालों में पूर्णतः व्याप्त विराट् राष्ट्र-पुरुष के दर्शन से ही जनता के मन में आत्मविश्वाैस की भावना दृढ़ हो सकती है। \n   राष्ट्रीय स्वयंसेवक संघ को नया कुछ नहीं करना है इस छोटी सी घोषणा से डाक्टरजी ने कई बातें हल कर लीं। हमें उन्नति के जिस शिखर पर पहुँचना है वह किसी कवि की कल्पना से प्रसूत स्वप्न न होकर किसी समय अपने पूर्वजों ने उसका प्रत्यक्ष अनुभव किया होने के कारण हमारी शक्ति की सीमा के बाहर नहीं, यदि हम प्रयत्न करेंगे तो हम भी उसे प्राप्त कर सकते हैं, इस प्रकार की आशावादी मनोवृत्ति लोगों में सहज ही निर्माण हो गई। इसी प्रकार प्राचीन ऋषिमुनियों की प्रखर तपस्या; व्यास, शंकराचार्य आदि के चिरंतन सिद्धांत; श्रीराम, चन्द्रगुप्त, शिवराज आदि की विजिगीषु वृत्ति; चाणक्य, विद्यारण्य, रामदास आदि का व्यावहारिक वेदान्त; सीता-सावित्री-लक्ष्मी आदि सतियों का तेजस्वी चारित्र्य; संभाजी, बन्दा बैरागी, गुरु गोविन्दसिंह आदि का स्फूर्तिदायक बलिदान, इन अभिमान करने लायक बातों की सुदृढ़ नींव पर हम अपना राष्ट्रभवन बनानेवाले हैं, यह बात बिना कुछ और कहे ही लोगों की समझ में आने लगी। एक छोटा सा वाक्य- ‘हमें नया कुछ नहीं करना है’ इसी वाक्य में ध्येय साध्य होने की संभाव्यता और मार्गों का परम्परा से परिचित होना कितने सुन्दर ढ़ंग से प्रकट किया गया है!"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 4", "text": "‘हिन्दुस्थान हिन्दूराष्ट्र है’ और ‘हमें नया कुछ नहीं करना है’ केवल इन दो घोषणाओं से हिन्दू समाज की उतरी हुई रेलगाड़ी फिर पटरी पर आ गई। हम सब राम-कृष्ण की सन्तान हैं, इस अनुभूति से हिन्दुओं की आन्तरिक एकता का दर्शन सब को स्पष्ट रूप से होने लगा। आगामी मार्ग स्पष्ट दिखाई देने लगा और वैभवशाली पूर्वजों की परंपरा हमें ही आगे चलानी है यह स्फूर्तिदायक विचार देश के नवयुवकों के अंतःकरण में प्रज्ज्वलित हो उठा। विजित राष्ट्र के मृतप्राय अंतःकरण में महत्त्वाकांक्षा की चैतन्यपूर्ण ज्योति प्रज्ज्वलित करना साधारण काम नहीं। ध्येयमंत्र की संजीवनी से केवल इतना ही काम करनेवाले लोगों को ‘द्रष्टा’ कहकर सम्मानित किया जाता है। डाक्टर हेडगेवार जी ने हिन्दू-समाज को उत्कर्षाभिमुख बनाने का यह एक ही काम यदि किया होता तो उनका नाम अजर-अमर हो जाता। पर डाक्टरजी उतना ही करके चुप नहीं बैठ गए। उत्कर्ष की ओर ले जानेवाला तत्त्वज्ञान तभी सफल होता है जब समाज उसका आचरण करता है। समाज के द्वारा उसका आचरण करा लेनेवाले कुशल नेतृत्व के अभाव में विभिन्न अमूल्य तत्त्वज्ञान मिट्टी में मिल जाने के इतिहास में कम उदाहरण नहीं हैं। इस बात को ध्यान में रखकर प्रदीर्घ चिन्तन से स्फूरित तत्त्वज्ञान को हिन्दू-समाज की नसनस में भरने के महान् कार्य का बोझ अपने सिरपर लेने के लिए भी डाक्टरजी उतनी ही तत्परता से तैयार हो गए। \n   बस उसी क्षण-से हिन्दुओं की सामाजिक दुर्बलता के मूल कारण खोज निकालने का निश्च य डाक्टरजी ने कर लिया।  उसी एक विचार की धुन में डाक्टरजी दिन-रात लगे रहते थे। वे खाना-पीना भूल गए, नींद स्वयं होकर दूर भाग गई ! दिन-रात केवल एक ही बात का विचार। करोड़ों की जनसंख्यावाले इस विशालकाय हिन्दू समाज की आज अवनति क्यों है ? हिन्दुओं में बुद्धि की कमी नहीं, यदि संपत्ति का अभाव समझा जाए तो आज हिन्दुस्थान के करोडपतयों में हिन्दुओं की ही संख्या अधिक है, यदि वीरता की कमी समझें तो इस समाज की नारियों का भी अनुपम पराक्रम देखकर शत्रु को दाँतों तले उँगली दबानी पड़ी। ऐसे हिन्दू-समाज को शौर्यहीन कौन कह सकता है ? यह सब कुछ होने पर भी आज का हिन्दू दीन-हीन क्यों है ? - भावनाओं की तीव्रता बढ़ती गई, विचारों की एकाग्रता पराकोटि को पहुँची और तन्द्रा के उस अत्युत्कट क्षण में डाक्टरजी को उस मूल कारण का साक्षात्कार हुआ। हिन्दुओं में बुद्धि है, शूरता है, संपत्ति है, सब कुछ है। पर उनमें एक ही मूलभूत बात का अभाव है और वह है संगठित जीवन का अभाव। संगठित जीवन के अभाव से ही हिंदुओं को आज उन के अपने ही देश में इस प्रकार अपमानित जीवन बिताना पड़ रहा है। डाक्टरजी ने जब यह देखा कि संकुचित स्वार्थ नसनस में भरा होने के कारण पड़ी हुई व्यष्टि-जीवन की बुरी आदत जबतक नहीं छूटती तबतक हिन्दू-समाज का भविष्य उज्ज्वल नहीं हो सकता, तब उन्होंने समष्टि-जीवन का मंत्र हिन्दू-समाज को पढ़ाया और 1925 की विजयाजशमी के शुभ मुहूर्त पर नागपुर में राष्ट्रीय स्वयंसेवक संघ स्थापित कर संघटित जीवन का प्रत्यक्ष उदाहरण ही हिन्दू-समाज के सामने खड़ा कर दिया।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 5", "text": "विजेताओं की दृष्टि से ठीक यही बात नहीं होनी चाहिए। गुलामी में सड़ते हुए समाज को उसकी अपनी शक्ति की अनुभूति कभी न हो सके इसके निमित्त वे निरंतर प्रयत्न करते रहते हैं। वे यह भली प्रकार से जानते हैं कि एक बार विजितों को उनकी अपनी शक्ति की अनुभूति हुई कि बस ! विजेताओं के दिन पूरे हो गए। इसीलिए विजितों को उनकी अपनी शक्ति की अनुभूति ही न हो सके इस बात का प्रयत्न विजेता प्रारंभ से ही करते रहते हैं। अत्यन्त शक्तिपूर्ण और उपद्रवहीन कार्य के निमित्त भी क्यों न हो, विजित समाज के लोक एकत्र न आ सकें, इसी दृष्टिकोण से वे शासनसूत्र का संचालन करते हैं। समाज को संगठित देखते ही उनकी छाती में धक-धक होने लगता है। संदेह का भूत उनके सिरपर नाचने लगता है। उस समय हिन्दू समाज के अन्दर ‘विभीषणों’ की भी वृद्धि हो चुकी थी। ऐसी भीषण परिस्थिति में तलवार की धारपर निरन्तर चलने की तरह एक-एक कदम सावधानी से रखकर अन्य किसी भी दल तथा संस्थासे किसी भी प्रकार का संघर्ष न होने देकर डाक्टरजी ने संघ को आज की उत्कर्षपूर्ण अवस्था में किस प्रकार पहुँचाया होगा यह विचार मनमें आते ही उनके कुशल नेतृत्व का साक्षात्कार होकर हृदय उनके प्रति आदर से भर जाता है।  \n   डाक्टरजी के कुशल नेतृत्व की एक महत्त्वपूर्ण कहानी मुझे उनके ही मुख से एक बाद अचानक सुनने को मिली। डाक्टरजी के साथ हम कुछ निकटवर्ती लोग बैठे हुए गप्पें मार रहे थे। जब संघ के पिछले जीवन के सम्बन्ध में चर्चा शुरू हुई तब अतीत की अनेक घटनाओं का चित्रपट ही मानो उनकी आँखों के सामने से होकर जा रहा है इस प्रकार डाक्टरजी ने कहा संघ पर आज तक कई आपत्तियाँ आईं और हर बार उन आपत्तियों का प्रमुख अंश मुझे अपने ही ऊपर खींच लेना पड़ा। पर परमात्मा की कृपा से अवसर के अनुसार ही दृष्टिकोण रखने की सावधानी मैं बरत सका और इसीलिए संघ सभी आपत्तियों से सकुशल बाहर निकल सका ! सदा कड़ाई से काम नहीं चलता। जब कोई तूफानी लहर आती हो उस समय बुद्धिमान् को झुक ही जाना चाहिए। ‘साथ ही कार्यकर्ता यह न भूलें कि कुछ अवसर जी जान से संघर्ष करने के भी होते हैं।’ इतना कहकर डाक्टरजी ने विस्तार से बताया कि संघ का दृष्टिकोण दूसरे किन्हीं आंदोलनों में भाग न लेने का होने पर भी उन्होंने 1930 के सत्याग्रह में क्यों भाग लिया ? संघ को बचाने के लिए ही डाक्टरजी ने उसमें व्यक्तिगत रूप से भाग लिया था। विवेचन को सुनकर हमें विश्वाआस हो गया कि प्रतिकूल घटनाओं से अनुकूल परिणाम निकालने की कुशलता पूरी तरह डाक्टरजी में है। \n   लोगों का ऐसा ख्याल था कि डाक्टरजी पुराने मध्यप्रांत के रहनेवाले हैं अतः वे मध्यप्रांत में ही सत्याग्रह करेंगे। पर डाक्टरजी ने सत्याग्रह विदर्भ में किया। क्योंकि उस समय विदर्भ में संघ के सम्बन्ध में किसी को जरा भी जानकारी नहीं थी। अतः इस सत्याग्रह को साधन बनाकर वे संघकार्य को विदर्भ में ले जाना चाहते थे। और हुआ भी वही। अकोला जेल में आए हुए उस समय के सभी कांग्रेस कार्यकर्ता कारावास की अवधि के बाद डाक्टरजी के कट्टर सहकारी बनकर ही बाहर निकले। \tतूफानी लहर के सामने झुककर कार्य आगे बढ़ाने का यह उदाहरण है।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 6", "text": "जी जान से झगड़ कर संकट पर विजय प्राप्त करने का एक दूसरा उदाहरण भी इस प्रकार का है। ‘पत्रक-प्रकरण’ के नाम से वह लोगों को सदा के लिए ध्यान में रह गया। डाक्टरजी के जीवन में संघ पर जो अनेक संकट आए, उनमें इस ‘पत्रक-प्रकरण’ को सबसे ऊँचा स्थान देने में जरा भी अतिशयोक्ति नहीं होगी। संघ विरोधी कतिपय गुटों के प्रचार में आकर सन् 1933 में पुराने मध्यप्रांतीय सरकार ने वास्तविक स्थिति को समझने का प्रयत्न किए बिना जल्दबाजी कर एक शरारत भरा पत्रक प्रकाशित किया जिसमें कहा गया कि सांप्रदायिक (Communal) होने के कारण सरकार से सहायता पानेवाले (Government Aided) स्कूल और संस्थाओं में संघ-स्वयंसेवकों को नौकरी न दी जाए। शासन से सम्बन्ध होने के कारण डाक्टरजी ने भी अपनी सारी तपस्या का बल लगा देने का निश्चि्त किया। \n   सरकारी पत्रक में संघ सांम्प्रदायिक है इसी एक बात पर अधिक जोर दिया गया था। साथ ही पत्र का संकेत इस ओर था कि सांप्रदायिक संस्थाएँ सांप्रदायिक वैमनस्य का कारण बनती हैं । डाक्टरजी ने सरकार के साम्प्रदायिक शब्द पर ही आपत्ति की। उन्होंने यह कहते हुए सरकार की कड़ी आलोचना प्रारंभ की कि कोई संस्था किसी विशिष्ट जाति के हित के निमित्त कार्य करती है, केवल इसलिए यह समझना कि वह अन्य जातियों का विरोध करती है, निरा पागलपन है। सभाएँ, पत्रक, भेंट आदि के द्वारा डाक्टरजी ने ऐसा प्रभावी जनमत तैयार किया कि सरकार पर चारों ओर से बौछार होने लगी और सरकार को लगा कि वह पत्रक निकालने की बुद्धि उसे कहाँ से हुई ? इस समय के डाक्टरजी के भाषण बहुत ही तेजस्वी और आत्मविश्वाीस से भरे हुए होते थे। दरिद्री किन्तु जाज्वल्य-निष्ठा से भरा, निःस्पृह जनसेवक राज्यशासन को भी किस प्रकार हिला देता है इसका प्रत्यक्ष उदाहरण डाक्टरजी के रूप में उस समय जनता ने देखा। वह पत्रक निकालने के लिए सभी पक्षों और दलों ने सरकार की निंदा की। लोकसभा में भी इस पर जवाब पूछा गया और सरकार के पास कोई भी प्रमाण अथवा वस्तुस्थिति की मामूली जानकारी भी नहीं है,  यह स्पष्ट होने के कारण जिस  शरीफ चौबल मन्त्रिमण्डल ने वह पत्रक निकाला था, वही टूट गया। संघ के निमित्त जिन्होंने गढ्ढ खोदा था, वे स्वयं उसी में गाड़े गए। संघ के पिछले दस वर्ष के जीवन  में उसे जो  प्रसिद्धि प्राप्त नहीं हुई थी, वह सरकार की कृपा से (?) उसे केवल दो महीने में मिली और जनता के अन्तःकरण में संघ का स्थान अटल बन गया। \n   इस ‘पत्रक प्रकरण’ के द्वारा एक बात जनता के सामने और आ गई कि संघ की ओर से सरकार से लड़नेवालों में केवल हिंदुओं के ही पक्ष और दल शामिल नहीं थे तो मुसलमान, ईसाई, पारसी आदि अन्य धर्मावलम्बी तथा कांग्रेस, मजदूर आदि पक्ष के लोग भी स्वयंस्फूर्ति से आगे बढ़े थे। जिस अभागे देश में पाँच लोग भी एक जगह आना कठिन रहता है और यदि कभी वे एक जगह आ ही गए, तो एक ही सप्ताह में उनमें प्रामाणिक (?) मतभेद होकर शेष जीवन में उन्हें एक दूसरे की दुश्मनी करने  के सिवा कुछ कार्य ही बाकी नहीं बचता, उसी हिंदुस्थान में एक साधारण से दिखाई देनेवाले मनुष्य द्वारा चलाए हुए संगठन के लिए सभी धर्म के लोग ब्रिटिश सरकार के समान सर्वशक्तिमान राज्यशासन के साथ लड़ने  को तैयार हों यह क्या इस संसार का आठवाँ आश्च र्य नहीं है ? डाक्टरजी द्वारा किए इस अद्वितीय लोकसंग्रह के  सम्बन्ध में एक प्रमुख नेता ने महान् आश्च र्य व्यक्त किया था। उन्होंने कहा  था ‘‘हम  आजीवन काम कर रहे हैं-पर जिसपर पूर्ण विश्वाेस कर सकें - जिसे हम अपना कह सकें - ऐसा एक भी  मनुष्य,  हमारे पास नहीं दिखाई देता। किन्तु डाक्टरजी का सब कुछ अपूर्व ही है। सच्चे दिल  के और पूर्णतः डाक्टरजी के ही बने सहकारी उन्हें सदैव ही घेरे रहते हैं।’’ \n   यह जादू डाक्टरजी ने कहाँ  सीखा ? भौतिक साधनों की अनुकूलता मानी जाए तो वह अपने अभाव से ही चमक रही थी। न अधिकार और न प्रगाढ़ विद्वत्ता। न नाते रिश्तेदारों की पूर्ण सहायता और न वक्तृत्व का आकर्षक वरदान। घर मानो दारिद्य्र का ही मूर्तिमान् अवतार था। इस प्रकार पूर्णतः प्रतिकूल परिस्थिति में बड़े विश्व वंद्य नेताओं को भी आश्च र्यचकित करनेवाला लाखों लोगों का यह अभेद्य संगठन डाक्टरजी ने कैसे किया होगा?"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 7", "text": "विचार करने पर डाक्टरजी के गुण आँखों के सामने नाचने लगते हैं। किसी एक गुण पर आँख स्थिर होते ही दूसरा गुण मानो ईर्ष्या से ही आगे बढ़ आता है। और तबतक तीसरा गुण जोर से कूदकर आ जाता है और आँख को अपनी ओर खींच लेता है। इस प्रकार आँखें कहीं भी न ठहर सकने के कारण मन बावला-सा बन जाता है। सुदृढ़ ध्येयनिष्ठा, अनुपम धैर्य, स्फटिक के समान शुद्ध चारित्र्य, दुर्दम्य आत्मविश्वा स, अखंड जागरूकता, परमकोटि की सहिष्णुता, किस-किस गुण का वर्णन करूँ ?\n   इसमें संदेह नहीं कि डाक्टरजी की सफलता में उल्लिखित गुणों ने पूरा-पूरा हाथ बँटाया है। पर गुणों की इस माला में मेरूमणि की तरह शोभित होने वाला यदि कोई गुण होगा तो वह है स्वीकृत कार्य के साथ पूर्ण तन्मयता। हिन्दू समाज के उद्धार के लिए संगठन के सिवा दूसरा चारा नहीं है इस बात पर विश्वाोस होते ही उन्होंने शब्दशः संगठनकार्य के लिए अपने को लगा दिया। खाते-पीते, सोते और जागते उन्हें संघ के सिवा कुछ दिखाई ही नहीं देता था। हर बात की ओर देखने की उनकी दृष्टि ही संघमय बन गई थी। संघ के लिए अनुकूल हर बात किसी भी मूल्य पर स्वीकार थी और संघ के लिए प्रतिकूल होनेवाली हर बात वे कठोर संयम के द्वारा त्याग देते  थे। यह वृत्ति उनके जीवन का स्थायी भाव ही बन गई थी। उन्होंने खाना-पीना छोड़ दिया-नींद छोड़ दी - मानापमान छोड़ दिया-इतना ही नहीं,  ‘दुरतिक्रम’ समझा जानेवाला स्वभाव भी छोड़ दिया। कहा जाता है कि डाक्टर अपने पूर्व जीवन में प्रसिद्ध ‘क्रोधी’ थे। किन्तु जब उन्हें मालूम हुआ कि उनका क्रोधी स्वभाव संघकार्य के लिए बाधक है तो डाक्टरजी ने क्रोध को जो एक बार पाताल में पहुँचाया तो वह सदा के लिए ही। दृढ़ प्रयत्न से उन्होंने अपने स्वभाव को इतना शान्त और सहिष्णु बनाया कि देखनेवाले को लगता था कि इस व्यक्ति को क्रोध क्या वस्तु है इसका पता भी है या नहीं। स्वीकृत कार्य के साथ तादात्म्य-ध्येयदेव के चरणों पर पूर्णतः आत्म-समर्पण यही ‘सिद्धि’ डाक्टरजी को प्राप्त हुई थी और एक साधारण मनुष्य को अलौकिक संगठनकर्ता में परिवर्तित करनेवाला पारस पत्थर भी यही था। \n   कार्य के साथ एकरूपता के पारस पत्थर का स्पर्श होते ही डाक्टरजी की काया में ही नहीं, मन में भी परिवर्तन हो गया। कार्यभार के पहाड़ उठाने के लिए आवश्यक हजारों हाथियों का बल तो उन में आ ही गया, पर अपने सहवास में आनेवाले प्रत्येक व्यक्ति को ‘आत्मीय’ बना लेने के लिए आवश्यक ‘परगुण-परमाणुं पर्वतीकृत्य नित्यम्’ की हृदय की विशालता भी जोरों से बढ़ने लगी थी। इसका अर्थ यह नहीं है कि डाक्टरजी के पास आनेवाले सभी लोग सर्वगुणसंपन्न थे। कोई भी व्यक्ति पूर्णतः निर्दोष होना संभव ही नहीं है। अर्थात् डाक्टरजी के अनुयायियों में दोष रहते थे और डाक्टरजी की तीक्ष्ण दृष्टि से वे बच भी नहीं पाते थे। किन्तु प्रत्येक गुणदोष पूर्णतः जानकर भी ‘गुह्यं च गूहति गुणान् प्रकटी करोति’ इस सन्मित्रों के  लक्षण के अनुसार उनका विशेष ध्यान इस बात पर रहता था कि दोषों को अपने प्रेम से ढ़ँकना और किसी के सम्बन्ध में मुँह से तिरस्कार प्रदर्शित करनेवाला शब्द भी न निकलने देना। अपने अनुयायियों के सम्बन्ध में तो दूर रहा प्रत्यक्ष अपने विरोधियों के सम्बन्ध में भी उनके मुँह से कभी कोई अनुचित बात नहीं निकलती थी। उनका यह दृढ़ विश्वा्स रहता था की उनका आज विरोध करनेवाला कल उनका अभिन्न मित्र बनेगा ही। बहस में उनका और उनके प्रतिपक्षी का दृष्टिकोण बिल्कुल विरोधी होता था। फिर भी डाक्टरजी कहते थे- ‘यद्यपि आज हममें बाह्यतः मतभेद दिखाई देता हो तो भी हम सब अन्तर में एक ही हैं और मुझे विश्वाोस है कि थोड़े ही दिनों में आप भी हमारे ही मार्ग पर आ जाएँगे।’ इस प्रकार बहस की समाप्ति कर विरोधी को प्रेम के साथ बिदा कर, उसके अपने सम्बन्ध को बिगड़ने या टूटने न देते हुए, अपने ‘मधुर’ व्यवहार से उसे धीर-धीरे ‘अपना’ बनाने की उनकी पद्धति थी। और आश्च र्य की बात तो यह थी कि चार छः महीने में ही देखते-देखते वह प्रतिपक्षी संघमय बना हुआ दिखाई देता था। \n   डाक्टरजी ने इस कला पर पूर्ण अधिकार कर लिया था कि किसी के दोषों की चर्चा नहीं करना, पर उसके गुणों की बार-बार प्रशंसा करना और एक शब्द के द्वारा मनुष्य का हृदय जीतना। नागपुर म्युनिसिपैलिटी के चुनाव का अवसर था। डाक्टरजी के एक अभिन्न मित्र के भाई श्री ढवले तथा उन के पर्वूजीवन के अभिन्न मित्र श्री बालवीर हरकरे कांग्रेस की ओर से चुनाव में खड़े थे। चुनाव के पूर्व हुई एक सभा में डाक्टरजी तथा श्री ढवले जी की कुछ खटपट हो चुकी थी। एक वक्ता ने श्री ढवले जी को मुकदमों के ‘दलाल’ कहा था। तब ‘श्री ढवले जी और सभा के अन्य लोगों ने शब्द वापस’ लेने की हठ पकडने पर डाक्टरजी ने साफ-साफ कहा था ‘शब्द वापस लेने की आवश्यकता नहीं, वे पूर्णतः सच हैं।’\n   चुनाव में कांग्रेस दल की जोरदार विजय हुई और श्री.ढवले तथा श्री. हरकरे क्रमशः अध्यक्ष और उपाध्यक्ष चुने गए। इससे बहुत से हिंदुत्वनिष्ठों को दुःख हुआ पर डाक्टरजी को जरा भी दुःख नहीं हुआ। उन्होंने उन दोनों को ही अपने घर भोजन के लिए बुलाया। भोजन के समय एक तीसरे व्यक्ति से उन दोनों का परिचय कराते समय डाक्टरजी ने कहा - ये दोनों नागपुर म्युनिसिपैलिटी के अध्यक्ष और उपाध्यक्ष हैं। ‘अब मुझे ऐसा लगता है कि नागपुर म्युनिसिपैलिटी मेरा घर ही है।’ बस इस छोटे से वाक्य से पहले की घटना पर परदा पड़ गया और दो मनुष्य हमेशा के लिए उन्हें मिल गए।"}, {"person": "", "title": "युग-प्रवर्तक डा. हेडगेवार 8", "text": "जीवन के अन्तिम चार-पाँच वर्षों में जनमन-वशीकरण का डाक्टरजी का यह गुण शिखर पर पहुँच चुका था। किसी व्यक्ति से उनका परिचय हुआ कि उन्होंने उसे आत्मसात् कर ही लिया। उनके शब्द सीधे जाकर अन्तःकरण को ही छूते थे। चतुर गोताखोर हीरा और मोती निकालने के लिए समुद्र की तह में ही पहुँचता है। क्षण में डाक्टरजी सामने बैठे हुए मनुष्य के भावों को पहचान लेते थे। और उसे अच्छा लग सके ऐसा व्यवहार करते थे। उनके साहचर्य में आए हुए प्रत्येक व्यक्ति को लगता था कि डाक्टरजी ने उसका अन्तःकरण बिलकुल ठीक-ठीक पहचाना। इससे दोनों में किसी प्रकार का दुराव न रहकर दोनों के अन्तकरण बिलकुल एकरूप हो जाते थे। वो भी इतने अधिक कि जीवन की कैसी भी भली-बुरी घटना अथवा संसार की कोई भी शक्ति उन्हें अलग नहीं कर सकती थी। संगठन क्या इससे कुछ और होता है ? पवित्र अन्तःकरणों का अभेद्य मिलन होते ही वहाँ संगठन प्रकट होना ही चाहिए। \n   इस प्रकार एक-एक अन्तःकरण पर अधिकार जमा कर और उसे अपने साथ लेकर डाक्टरजी किसी विजिगीषु वीर के समान हिन्दू-संगठन के क्षेत्र पर आक्रमण करते हुए आगे बढ़े। अनेकों के मन को राजी किए बिना कार्यपूर्ति का सौभाग्य प्राप्त नहीं हो सकता यह ठीक प्रकार से मालूम होने के कारण डाक्टरजी ने समस्त लोगों को ‘राजी’ रखने के लिए ‘तिलतिल’ कर जलने का असिधारा-व्रत आजन्म चलाया। उस व्रत के पूर्ण पालन में उन्हें किस-किस प्रकार के कष्ट सहन करने पड़े होंगे इसकी पूरी-पूरी कल्पना हम नहीं कर सकते। मनुष्य स्वभावतः ही स्वार्थी होता है। अतः डाक्टरजी की परहित-तत्परता से कितने ही लोगों ने अनुचित लाभ उठाया होगा। पर यह बात जान कर भी डाक्टरजी ने इस सम्बन्ध में कभी बुरा नहीं माना। वे कहते थे- ‘यदि मेरे द्वारा उस बेचारे का लाभ हो तो मुझे थोड़ा सा कष्ट सहने में क्या हर्ज है ?’ इतना ही नहीं तो किसी गरीब विद्यार्थी की भोजन की व्यवस्था कराने के लिए वे सात-सात, आठ-आठ घर घूमते थे। उन्हें देख कर हमारी आँखों में आँसू आ जाते थे। कार्य के हेतु वैयक्तिक सुखदुःख का कितना बड़ा यह यज्ञ था !\n   प्राचीन वैभव की प्राप्ति का ध्येय स्वयं ही बहुत आकर्षक है। साथ ही साथ डाक्टरजी के ऋषितुल्य त्यागमय जीवन और लोकसंग्रह की लगन को देखते-देखते हिन्दु-समाज के अंतःकरण पर प्रभाव पड़ा तो क्या आश्चकर्य ? युवकों के तो वे हृदय-सम्राट् ही बन गए। डाक्टरजी के मुँह से शब्द निकलते ही युवावस्था में भी जिन्होंने अभी प्रवेश नहीं किया हो ऐसे बीस-बीस साल के बच्चे मातृभूमि के उद्धार की प्रतिज्ञा कर भूख-प्यास भूल कर, पारिवारिक माया के बंधनों को तोड़कर कार्य के लिए बाहर निकलते थे और  बिलकुल अपरिचित प्रांत में केवल एक धोती पहनकर जाने को तैयार हो जाते थे। धन्य हैं डाक्टरजी, जिन्होंने छोटे-छोटे युवकों में से ऐसे अनेक ‘संयमी कृतिवीर’ उत्पन्न किए जो अपने प्रभावी व्यक्तित्व तथा अनुशासित त्यागमय जीवन के बलपर योगियों को भी लज्जित कर दें। इतना ही नहीं, डाक्टरजी ने उन्हें देश के विभिन्न भागों में कार्य-मग्न भी कर दिया। एक बार योगियों का व्रत टूट जाएगा, पर हिन्दुत्व के ये रामदूत अपने कर्तव्य से न हटेंगे। व्यक्तिगत अहंकार अथवा दंभ का लेश भी उनमें नहीं दिखाई देगा। इसलिए थोड़े ही दिनों में अपरिचित प्रांतों में भी इन अननुभवी युवकों को वहाँ के नवयुवक घेरे हुए दिखाई देते हैं। धीरे-धीरे उनकी चारित्र्यपूर्ण कार्यनिष्ठा का प्रभाव प्रौढ़ों पर भी होता है और देखते ही देखते वे प्रांत के सूत्रचालक बन जाते हैं। \n   इस प्रकार अपने ही अखाड़े में तैयार हुए असंख्य निष्ठावान सहकारियों की सहायता से डाक्टरजी ने 9-10 वर्ष की थोड़ी अवधि में राष्ट्रीय स्वयंसेवक संघ के संगठन का जाल सारे देश में फैला दिया और आवश्यकता पड़ने पर यमराज से भी लड़ने में समर्थ, ऐसा लाखों लोगों का सुदृढ़ संगठन निर्माण किया। यदि इसी प्रकार कुछ वर्ष और बिताते तो डाक्टरजी अपनी ही आँखों से भारत के भाग्य को भी पूर्णतः उज्ज्वल देख लेते पर ......!  पर अलग ही खेल खेलने की इच्छा रखनेवाला विधाता उन्हें 1940 जून की 21 तारीख को हमारे बीच से खींच कर ले गया। \n  ‘किसी लेखक ने कहा है महत्कार्य के मंत्र को पहचानना, प्रभावी नेतृत्व तथा अचूक संगठन-चातुर्य ये तीन गुण कदाचित् ही एकत्र दिखाई देते हैं और जहाँ ये तीनों एकत्र दिखाई देंगे, वहीं अलौकिकता का उज्ज्वल विलास निश्चअय ही होगा।’\n   हमारे डाक्टरजी में ये तीनों ही गुण पराकोटि में पहुँचे हुए थे। साथ ही अनेक गुणों का भी वे भांडार थे। इसीलिए मैं कहता हूँ ......\n\tयुग-प्रवर्तक का पूर्णावतार ....... अर्थात् डाक्टर हेडगेवार !!! ।"}, {"person": "", "title": "प्रथम  परिचय", "text": "परम पूजनीय डाक्टरजी से मेरा प्रथम परिचय कब, कहाँ और कैसे हुआ, आज यह मेरे लिए निश्च.यपूर्वक कहना कठिन है। वास्तव में इतने बड़े महापुरुष से जिस क्षण प्रथम सम्बन्ध आया, वह क्षण सम्पूर्ण जीवन में अविस्मरणीय रहना चाहिए था, किन्तु डाक्टरजी का जीवन इतना सादा था कि उनके संपर्क में आनेवाला व्यक्ति उनके बड़प्पन को अनुभव नहीं कर सकता था। इसीलिए जिस दिन मेरा डाक्टरजी से प्रथम सम्बन्ध आया वह कोई महत्त्व की घटना है, ऐसा मुझे भी न लगा। अतः दुःख से कहना पड़ता है कि दुर्दैव से वह प्रथम परिचय का दिन मेरी विस्मृतियों में समाविष्ट हो गया है। \n   बचपन से ही अपने साथियों के साथ शाखा में जानेवाला एक बाल-स्वयंसेवक मैं भी था। हो सकता है पहला परिचय अपने गुट के स्वयंसेवकों के साथ डाक्टरजी के घर जाने पर हुआ हो। 1928 में वामन हेडगेवार (डाक्टरजी के चचेरे भाई) के यज्ञोपवीत समारोह के समय डाक्टरजी के घर जाने का तो पक्का स्मरण है। उस समय मेरी आयु बहुत छोटी थी किन्तु मेरे नाम आदि की मामूली जानकारी भी उन्हें थी। डाक्टरजी हम बच्चों का स्वयं परिचय करें और हमें स्मरण रखें ऐसा हम लोगों के पास क्या था ? फिर भी बालकों के सम्बन्ध में अन्य प्रौढ़ लोगों के समान वे कभी उदासीन नहीं रहते थे। इसीलिए हमें भी उनके प्रति विशेष आकर्षण बना रहता था। \n       कुश पथक\n   कुछ समय पश्चा त् ‘कुश पथक’ में मुझे सम्मिलित किया गया। इस पथक के स्वयंसेवकों से डाक्टरजी को विशेष आत्मीयता थी। ‘कुश पथक’ का प्रत्येक स्वयंसेवक बार-बार अपने घर आए, खुले दिल से बातचीत करे और संघ-सम्बन्धी शंकाओं को भली प्रकार निवारण करते हुए संघ को भली-भाँति समझे, ऐसी उनकी इच्छा रहती थी। इस कारण डाक्टरजी के घर मेरा आना-जाना बढ़ता गया और खुली बातचीत होने के कारण उत्तरोत्तर उनसे घनिष्ठ सम्बन्ध होता गया।"}, {"person": "", "title": "सेवा ही सहज स्वभाव", "text": "परिचय के सम्बन्ध में डाक्टरजी की विशेषता थी कि वे सदा स्वयं प्रयत्न किया करते थे कि हर एक व्यक्ति का उनसे घनिष्ठ सम्बन्ध आए। उनसे परिचित कोई व्यक्ति अस्वस्थ या किसी संकट में पड़ा हो तो उसे आत्मीय समझ कर उसकी सेवा करना, यह उनका सहज स्वभाव था। अर्थात् इतनी आत्मीयता रखनेवाले के सम्बन्ध में नवपरिचित के अंतःकरण में भी उनके लिए प्रेम उत्पन्न हो जाता था और वह डाक्टरजी का घनिष्ठ मित्र हो जाता था। मेरे बारे में भी यही हुआ, ऐसा कह सकते हैं। परन्तु मेरे घर आने का उन्हें कभी कारण न पड़ा। संघकार्य के निमित्त डाक्टरजी पुराने मध्यप्रांत बरार में बार-बार भ्रमण करते थे। यवतमाल, अकोला आदि स्थानों पर उनके साथ जाने का सौभाग्य मुझे भी कभी-कभी प्राप्त हुआ। डाक्टरजी से बातचीत करते समय विरोधी भूमिका से ही मैं संघविषयक चर्चा किया करता था। किन्तु विरोधक की भावना के मूल को समझकर मन का संशय दूर करने की उनकी कुशलता सचमुच ही अपूर्व हुआ करती थी। इस संशय-निवृत्ति के लिए वे पर्याप्त समय देने को तैयार रहते थे। क्योंकि वे कार्य-प्रवण जिज्ञासु मनोवृत्ति को हमेशा पसन्द करते थे। ऐसे ही कार्यशील जिज्ञासु तरुणों का संगठन वे करना चाहते थे।"}, {"person": "", "title": "क्रान्ति-पथ से परावृत्ति", "text": "कालेज में पढ़ते समय हम तरुणों को प्रायः भगतसिंह जैसे देशभक्तों का आदर्श ही आकर्षित किया करता था। भगतसिंह के समान हमें भी कुछ न कुछ बहादुरी करनी चाहिए, ऐसा बहुत बार मन में आया। प्रचलित राजनीति, क्रांति आदि की युवक-हृदय को आकर्षित करनेवाली चर्चा संघ में प्रायः कम ही होती थी। इसलिए हम युवकों को संघ के प्रति आकर्षण कम रहता था। भगतसिंह और उसके साथियों को जब फाँसी हुई, उस समय तो हमारे हृदयों में ऐसी उत्तेजना हुई कि प्रत्यक्ष कुछ न कुछ करने की भयंकर योजना बना कर उसे सफल बनाने के लिए घर से भाग जाने का हम कुछ मित्रों ने निश्चदय भी कर लिया। किन्तु अपने डाक्टरजी को बताए बगैर भाग जाना अच्छा नहीं होगा, यह सोच कर अपना निश्च य डाक्टरजी को बताने का हमने विचार किया। यह बात डाक्टरजी को सूचित करने का काम मित्र-मण्डली ने मुझपर ही सौंपा था। \nहम सब मिलकर डाक्टरजी के पास गए और बड़ी हिम्मत करके मैंने अपना मन्तव्य डाक्टरजी के सम्मुख प्रकट किया। हमारी योजना सुन कर डाक्टरजी ने हमें इस मूर्खतापूर्ण योजना से परावृत्त करने और संघ के कार्य की श्रेष्ठता समझाने के लिए हमारी बैठक ली। यह बैठक लगातार सात दिन, रात्रि के दस बजे से तीन बजे तक चलती रही। डाक्टरजी के तेजस्वी विचार और अमूल्य मार्गदर्शन से हमारे विचारों में और जीवन के आदर्श के सम्बन्ध में आमूलाग्र परिवर्तन हुआ। उस दिन से अविवेकपूर्ण बनाई योजनाएँ छोड़कर हमारे जीवनों को नई दिशा प्राप्त हुई और बुद्धि संघकार्य में स्थिर हुई।"}, {"person": "", "title": "संघ सरिता का उद्गम", "text": "डाक्टरजी को राष्ट्रीय स्वयंसेवक संघ की कल्पना कैसे सूझी, ऐसा प्रश्न  कई लोग मुझसे पूछते हैं। यह प्रश्नं मैंने स्वयं कभी भी उनसे नहीं पूछा, किन्तु अनेक लोगों से जो वार्तालाप हुआ करता था, उनमें अनेक संस्थाओं के अनुभव वे बताया करते थे। उससे संघ-निर्मिति की कल्पना उनके मन में कैसे दृढ़ हुई, इसका पता लगता है। डाक्टरजी के सम्पर्क में आनेवाले अनेक कार्यकर्ता और स्नेही प्रायः क्रान्तिकारी विचारों के समझे जाते थे, किन्तु उनकी वह वृत्ति विश्वा।मित्र की तपस्या के समान होती थी। मोह का प्रसंग आते ही उनके क्रांतिकारी विचारों की ज्योति बुझ जाती थी। इस तरह विचारों में और बोलने में क्रांतिकारी, किन्तु प्रत्यक्ष काम करने का समय आने पर पीछे हटनेवाले, गौ से भी सीधे लोग उन्हें अपने जीवन में मिले। विचार एवं आचार की एकरूपता की अपेक्षा करनेवाले डाक्टरजी ऐसे लोगों के जीवन की विसंगति और विरोध स्पष्ट करते हुए जब अपने स्वतन्त्र और मौलिक विचार व्यक्त करते थे तो उसी से संघ की कल्पना प्रकट होती थी। उनकी नैष्ठिक वृत्ति का दूसरों की निष्ठाहीन वृत्ति से संघर्ष हुआ, तो संघ की कल्पना होना उसका स्वाभाविक निष्कर्ष ही था। अनेक वृत्तपत्र, शिक्षणसंस्थाएँ, व्यायामशालाए एवं अन्य अनेक संस्थाएँ कैसे और क्यों असफल रहीं इसकी मार्मिक मीमांसा डाक्टरजी के मुख से सुनने को मिलती थी। समाज में ऐसे लोगों का उन्हें पूर्ण अभाव दिखाई देता थाजो अपना जीवनसर्वस्व लगाकर किसी भी कार्य को करते हों। समाज-जीवन की इस अत्यंत शोचनीय अवस्था को बदलने के लिए निष्ठावान् कार्यकर्ता निर्माण करनेवाली संस्था की नींव उन्होंने डाली। अव्यवस्थित हिन्दू-समाज को सुसंगठित अंग्रेजी राज्य की बेड़ियों को तोड़कर स्वतंन्त्र होने और उस स्वतन्त्रता की रक्षा के लिए सर्वप्रथम राष्ट्रीय गुणयुक्त संघटित जीवन-शिक्षा देनेवाला कार्य होना चाहिए यह उनकी पक्की धारणा थी। बम और पिस्तौल की राजनीति से इस विशाल किन्तु असंगठित राष्ट्र का उद्धार हो सकेगा, ऐसी झूठी आशा कभी भी उनके मन में नहीं रही। क्रांतिकारी आंदोलनों के अनुभवों से उनका गुप्त कार्रवाइयों पर से विश्वाास पूर्ण नष्ट हो चुका था। \n   क्रांतिकारियों के बारे में वे कहा करते थे कि दो-चार जोशीले नौजवान देश-प्रेम से प्रेरित होकर इकठ्ठे होते हैं और अंग्रेजों का नाश करने के लिए कुछ शस्त्रास्त्र-संग्रह की योजना करते हैं। किन्तु एकाध बम या पिस्तौल हाथ लगा नहीं कि उनका धैर्य नष्ट हो जाता है। जल्दी से कुछ कर ड़ालने का जोश आ जाता है और उससे संयम टूट जाता है। एक बार संयम टूटा तो सब मामला बिगड़कर योजना असफल हो जाती है। कोई उठता है तो डाका डालने चला जाता है और दूसरा, जोश में आकर किसी पर बम फेंकता है और पुलिस के जाल में फँस जाता है। इस तरह स्वतंत्रता की सभी की सभी योजनाएँ प्रकट हो जाती हैं। क्रांतिकारियों की इस नीति से डाक्टरजी हमेशा असहमत रहते थे।"}, {"person": "", "title": "संघ की प्राण-प्रतिष्ठा", "text": "अपना समाज आचार-विचार में परायों का पूर्णतः दास बना हुआ देखकर स्वाभिमान, स्वधर्माभिमान, स्वदेशाभिमान, अनुशासन, चारित्र्य, निर्भयता आदि राष्ट्रीय सद्गुण किस प्रकार से सम्पूर्ण समाज में उत्पन्न किए जा सकें और प्रचलित सत्तालोलुप राजनीति के झगड़ों से अलिप्त रहकर उच्च सांस्कृतिक भूमिका से समाज के लुप्त सद्गुणों को जागृत करने का कार्य अविरत चलता रहे, ऐसा संगठन निर्माण हो, यही उनकी एकमेव इच्छा थी। देश में प्रचलित संस्थाओं के कार्य और कार्यपद्धति से वे बहुत निराश थे। केवल सुधार के ‘आंदोलन’ से सच्चे अर्थ में देशोद्धार नहीं हो सकता था, इसलिए देश की तरुण पीढ़ी पर राष्ट्रीय चारित्र्य के सतत संस्कार करते हुए देश में विधायक प्रवृत्ति के असंख्य कार्यकर्ता निर्माण करने हेतु एक नई संस्था बनाने का निश्चढ़य करके डाक्टरजी ने राष्ट्रीय स्वयंसेवक संघ की प्राण-प्रतिष्ठा की।"}, {"person": "", "title": "सही राष्ट्रीय आन्दोलन", "text": "सांस्कृतिक आधार पर ही राष्ट्रोन्नति हो सकती है, यह उनका मत था किन्तु पराई सत्ता उखाड़ फेंकने के सम्बन्ध में वे उदासीन नहीं थे। वैधानिक ढ़ंगों से या क्रांतिकारी आंदोलनों से परकीय सत्ता को नष्ट करने के विचार रखनेवालों से डाक्टरजी के स्वतन्त्रता पाने  के विषय में विचार कहीं अधिक तेजस्वी थे। पराधीनता के जहरीले वायुमण्डल में राष्ट्रीय संस्कृति की रक्षा या संवर्धन असम्भव ही रहता है, क्योंकि पराभूत समाज, विजेताओं के आदर्शों को ही श्रेष्ठ मानने लगता है और उसका अनुकरण भी करने लगता है। इसलिए सांस्कृतिक कार्य के लिए स्वातन्त्र्य सर्वप्रथम आवश्यक है, यह वे हमेशा प्रतिपादन करते थे। हमारे दुर्बल और विघटित समाज को दैवयोग से स्वतंत्रता मिल भी गई तो उसकी वैसी ही हालत होगी जैसी किसी  भिखारी की, दान में हाथी मिलने पर। न हम उस स्वराज्य की व्यवस्था ही कर सकेंगे, और न रक्षा।  प्रथम स्वातन्त्र्य-प्राप्ति के लिए और पश्चा,त् प्राप्त स्वातन्त्र्य की रक्षा के लिए राष्ट्रीय चारित्र्य का होना अनिवार्य रहता है। उसको निर्माण करनेवाला कार्य ही वास्तव में ‘राष्ट्रीय आन्दोलन’ है, यह सोचकर सब प्रकार से नियन्त्रणहीन हिन्दु समाज को दृढ़, संयमशील और प्रभावी संगठन में बांधने के लिए अपने जीवन का प्रत्येक क्षण और अपनी शक्ति का प्रत्येक कण अर्पण करने का महान् निश्च य डाक्टरजी ने किया। महापुरुष अपने निश्च य को पूर्ण करके ही रहते हैं और स्वर्गीय डाक्टरजी ने संघ-कार्य के लिए जीवन-सर्वस्व अर्पित करके यही किया।"}, {"person": "", "title": "स्वानुभवों का ग्रन्थ", "text": "संघ स्थापना के पश्चा्त् लोगों की संघ-विषयक शंकाओं का समाधान करके संघ-कार्य की आवश्यकता उन्हें भली प्रकार समझाने का कार्य डाक्टरजी को अव्याहत करना पड़ता था। कुछ तो संघ को समझने की सच्ची लगन से प्रश्ना पूछते और कुछ केवल वाद-विवाद करने के हेतु से। डाक्टरजी सभी से शांतिपूर्वक बातचीत करते और संघ की भूमिका निवेदन करते थे। इन नानाविध शंकाकुशंकाओं का उत्तर देते समय वे बड़े-बड़े विद्वानों के ग्रंथों का हवाला कभी नहीं देते थे। उनके पास अपने अनुभवों का ग्रंथ इतना बड़ा था कि शंकाओं का समाधान तर्क से करने के बजाय वे अपने अनुभव की अनेक घटनाएँ सुना कर ही करते थे। घटना सुनाने का ढ़ंग भी अनोखा रहता था। व्यक्तियों और स्थानों के नाम, समय आदि छोटी-छोटी बातों का वर्णन करके उस प्रसंग का मानो प्रत्यक्ष चित्र खड़ा कर देते जिससे सुननेवालों के लिए वह सारी चर्चा बड़ी आकर्षक बन जाती थी। स्वानुभवों का इतना विशाल ज्ञान-भण्डार और किसी के पास मैंने नहीं देखा। \n   सांस्कृतिक कार्यों में से शैक्षणिक कार्य अथवा पीड़ितों की सेवा तथा औषधि आदि की सहायता में उन्हें विशेष रुचि थी। किन्तु ऐसे पवित्र कार्य समाज में लोग ‘फैशन’ के तौर पर या अपना नाम करने की भावना से करते हुए देख कर उन्हें बहुत दुःख होता था। नाम की अभिलाषा को छोड़कर निस्स्वार्थ भाव से कार्य करनेवाला कोई व्यक्ति मिल जाए तो डाक्टरजी उसका बहुत आदर करते थे। दुर्दैव से ऐसे कार्यकर्ता और संस्थाएँ अपने समाज में बहुत कम हैं यह देखकर उन्हें कष्ट होता था। पवित्र उद्देश्य से शुरू किए हुए कार्य आगे चल कर स्वार्थी लोगों के हाथों में जाकर कैसे नष्ट हो जाते हैं, इसके अनेक उदाहरण बार-बार हमें बताकर अपने कार्य को ऐसी बुराइयों से बचाने के लिए वे सदा सावधान करते थे। \n   संघ-स्थापना के पूर्व नागपुर में ऐसा कोई भी कार्य नहीं होता था, जिसमें डाक्टरजी का हाथ न हो। काँग्रेस, हिन्दूसभा, शुद्धि-संगठन तथा धार्मिक राजनैतिक और साहित्यिक परिषदों के अधिवेशन, अनाथ-विद्यार्थी गृह, गोरक्षण आदि सब प्रकार के कार्यों में और कार्यक्रमों में उन्होंने अग्रेसर होकर काम किया था। किन्तु चारों ओर स्वार्थ की दलदल देख कर उनका सात्विक मन इन सब कार्यों से उकता गया। संघ-स्थापना के पश्चारत् योगी जिस प्रकार इन्द्रियों को वश में करके सारे विषय-भोगों से निवृत्त होता है, उसी प्रकार उन्होंने अन्य सब कार्यों से निवृत्त होकर अपनी सब शक्तियाँ संघ-कार्य में केन्द्रित कीं।"}, {"person": "", "title": "लोकसंग्रही मनोवृत्ति", "text": "संघकार्य के द्वारा उत्पन्न होनेवाले जिन अनेक गुणों की सराहना संघ के विरोधक भी मुक्त कंठ से किया करते हैं, उन सब गुणों का विकास उन्होंने अपने अन्दर प्रयत्नपूर्वक करके स्वयंसेवकों के लिए आदर्श उपस्थित किया। केवल योगायोग से या अकस्मात् कार्यकर्ताओं में गुण विकसित नहीं हुए। राष्ट्रोन्नति के लिए आवश्यक गुणों को डाक्टरजी ने अपने जीवन में समाविष्ट कर फिर दूसरों के जीवनों को बदला। संघस्थान साफ करना, पानी का छिड़काव करना, बीमार स्वयंसेवकों की सेवा करना और घर के पचासों काम छोड़ कर समयपर नियमपूर्वक शाखा में उपस्थित रहना आदि कामों को भी वे अत्यंत दक्षतापूर्वक करते थे।\n\t\tयदि ह्यहं न वर्त्तेयम् .......   \n\t\tउत्सीदेयुरिमे लोकाः .......\n\t\tसक्ताः कर्मण्यविद्वांसो ..... \n\t\tकुर्याद् विद्वांस्तथाऽसक्तश्चि.कीर्षुर्लोकसंग्रहम्।\n    गीता के इन श्लोंकों में लोकसंग्रह करनेवाले भगवान् श्रीकृष्ण ने अपनी जिस वृत्ति का वर्णन किया है वही लोकसंग्रही वृत्ति डाक्टरजी में भी थी।"}, {"person": "", "title": "संन्यास क्यों नहीं", "text": "उनकी संन्यस्त-वृत्ति देखकर एक बार मैंने ड़रते-ड़रते कहा-डाक्टर जी! आपका जीवन तो पूरा संन्यासी सा है। फिर आप संन्यास लेकर भगवे वस्त्र क्यों नहीं धारण कर लेते?’\n     दूरदर्शी डाक्टरजी बोले\n  ‘संन्यासी वेश धारण किए हुए व्यक्ति के सम्बन्ध में आज समाज में कुछ विचित्र धारणा होती है। लोग उसे सर्वसाधारण से श्रेष्ठ मानते हैं। मेरी ओर भी लोग उस दृष्टि से देखने लगेंगे और मैं जो कार्य करता हूँ वह सामान्य जनों के लिए करना असम्भव है, ऐसी उनकी गलत धारणा बन जाएगी। आज भी अविवाहित रहकर मैं जितना कार्य कर रहा हूँ, उतना गृहस्थाश्रम स्वीकार करके कर सकता तो बहुत अच्छा होता। जन-साधारण की दृष्टि से उसका परिणाम अधिक अच्छा होता। समाज-कार्य करनेवाला अपने जैसा सामान्य व्यक्ति है, यह धारणा समाज की रहनी चाहिए।  मैं संन्यासी बना तो हो सकता है लोग मुझे श्रेष्ठ साधु समझ कर मेरे चरण छुएँगे, किन्तु मुझे जो कार्य प्रिय है वह नहीं करेंगे। उससे मेरा महत्त्व तो बढ़ जाएगा, पर देश का क्या लाभ होगा?’\n   संघ का प्रचारक उच्च शिक्षा प्राप्त हो किन्तु सर्वसाधारण युवकों जैसा जीवन व्यतीत करनेवाला रहे। वह आम लोगों से भिन्न दिखाई दे, यह कल्पना डाक्टरजी को पसन्द नहीं थी। अविवाहित रहकर प्रचार-कार्य में जितनी शक्ति वह लगा सकता है उतनी विवाह करते हुए भी लगा सकता हो तो विवाहित जीवन व्यतीत करके संघ-कार्य करना वे अधिक अच्छा समझते थे, किन्तु समाज का पतन इतना अधिक हुआ देखकर वे इसको असम्भव अनुभव करते थे।"}, {"person": "", "title": "महापुरुष का जीवन", "text": "आज उस बात को लगभग 16 वर्ष हुए हैं जब मैंने प.पू. डाक्टरजी के प्रथम दर्शन किए थे। जून 1933 की 9 या 10 तारीख थी। उस दिन शाम को नागपुर के श्रीयुत राजा लक्ष्मणराव भोंसले के हाथीखाने में संघ के ग्रीष्म वर्ग का समारोप था। मेरे  आज के श्रद्धेय मित्र (किन्तु उस समय केवल परिचित) मा. बालासाहब देवरस से मैंने प्रार्थना की थी कि मुझे संघ का स्वयंसेवक बना लिया जाए। और मुझे उत्सव में संघ-कार्य और संघ-उद्देश्य का संकलित पता लग जाए ऐसी उनकी भी इच्छा थी। इसलिए  उन्होंने मुझे वह उत्सव देखने बुलाया था।\n   शारीरिक कार्यक्रमों का प्रदर्शन हो रहा था। प.पू. डाक्टरजी जहाँ बैठे थे उस ओर संकेत करके मैंने पास के दर्शक से पूछा कि ‘ये कौन सज्जन  हैं ?’\n   ‘तुम किस गाँव से आए हो ?’ उसने पूछा। ‘भाई, मैं तो यहीं नागपुर में-इतवारी में रहता हूँ ।’ और ‘डा. हेडगेवार को नहीं जानते?’ उसने कुछ मुस्कुराते हुए कहा। इस व्यंग्य ने  मुझ पर क्या परिणाम किया होगा सो आप लोग समझ सकते हैं। मैंने इसके पहले प.पू. डाक्टरजी का नाम एक दो बार अवश्य सुना था। मा. बालासाहब से बातचीत के प्रसंग में भी यह नाम 2-4 बार आया था। किन्तु अपने दुर्भाग्य के कारण अब तक मैंने प.पू.डाक्टरजी के दर्शन कभी भी नहीं किए थे। अस्तु । \n   मुझे डाक्टरजी के प्रति प्रथम दर्शनसे ही एक विचित्र श्रद्धा उत्पन्न हो गई थी। किन्तु श्रद्धा का कारण भव्य शरीरयष्टि नहीं था। उनका चेहरा खूब भरा हुआ, मूँछें प्रभावशाली और नजर पैनी थी, किन्तु जिस बात का मुझपर प्रभाव  सबसे अधिक हुआ वह थी  उनकी पैनी आँखों में स्पष्ट  झलकनेवाली आत्मीयता। उनकी आँखें दर्शकों और स्वयंसेवकों के बीच  भ्रमण कर रही थीं। जो कोई उन्हें अपनी ओर सहृदयता से एक क्षण के लिए निहारते पाता वह मानो मुग्ध हो जाता। हर एक को यही अनुभव होता कि उपस्थित लोगों में इन्होंने मेरी ओर जिस आत्मीयता से देखा है वह कुछ विशेष है। \n   और मैं तो प.पू. डाक्टर साहब की इस विशेषता का सदा स्मरण किया करता हूँ। चाहे 2-4 लोगों में बैठे हों, चाहे हजारों के समुदाय में हों; किन्तु उनकी यह विशेषता सदा एक विशेष संस्कार उत्पन्न करती थी।\n   कुछ समय के बाद डाक्टरजी बोलने को खड़े हुए। प्रारम्भ में उनकी भाषण-शैली का मुझपर कोई प्रभाव न हुआ। वे संघ का परिचय दे रहे थे। हिन्दू-समाज की वर्तमान अवस्था और पूर्व गौरव की तुलना कर रहे थे। धीरे-धीरे श्रोताओं की आँखों में अपनी आँखों को गड़ाते हुए वे हिन्दू-समाज की वर्तमान दुरवस्था का चित्रण करने लगे। मुझे लगा इनका कहना सच है। भाषा में आडम्बर नहीं था किन्तु भाव सजीव थे। व्याख्यान का ढ़ग नाटकीय नहीं था। न उसमें किसी के प्रति कटुता प्रकट होती थी न कहीं आत्मस्तुति की झलक। घरेलू बातचीत के ढ़ग से उन्होंने हर बात समझाई। उन्होंने सबसे संघ को अपना समझने की प्रार्थना की और मुझे तो यह लगा कि अब से संघ-कार्य जीवन के एक स्वाभाविक कर्तव्य के समान करना आवश्यक है।\n   मैं अपने भावों में डूबा सा था, इतने में व्याख्यान समाप्त हुआ। मैंने अपनी पुरानी आदत के अनुसार वक्ता के अभिवादन के लिए ताली पीटना चाहा। किन्तु पड़ोस में  बैठे हुए साथी  ने रोक दिया और कहा कि  संघ में तालियाँ नहीं बजाई जातीं। यह बात भी मुझपर कुछ विशेष परिणाम कर गई। हृदय आदर से उस महापुरुष के चरणों पर चढ़ने के लिए लालायित हो उठा।"}, {"person": "", "title": "डाक्टरजी की  बैठक", "text": "दूसरी बार मैंने डाक्टरजी को कब और कहाँ देखा सो मुझे याद नहीं है। मैं उपरोक्त उत्सव के  बाद ही संघ की इतवारी शाखा में जाने लगा था।\tसंभवतः मै उनके घर कालेज खुलने के पहले भी गया हूँगा। जहाँ तक मुझे स्मरण है, उस समय परममित्र भाऊराव देवरस उन के साथ थे। जब मैं उनके कमरे की सीढ़ियों पर चढ़ रहा था तब हृदय में  एक विशेष स्पंदन सा हो रहा था। जिस महापुरुष के अतिमानवीय उत्साह और लगन के कारण संघ की स्थापना और वृद्धि हुई उसके  समक्ष मैं क्या कहूँगा? वे क्या पूछेंगे ? अथवा कदाचित् अपने अनेक बड़े-बड़े  कार्यकर्ताओं से घिरे रहने के कारण उनको मुझसे बात करने का समय भी न मिले।\n   जीना चढ़कर मैं एक साधारण से कमरे में पहुँचा, जहाँ वे अपने साथियों के साथ बैठे थे। उनके सामने एक पीतल की डिब्बी खुली पड़ी थी जिसमें सुपारी और लौंग दिखाई पड़ती थी। सरौता उनके हाथ में था। इधर-उधर की गप्पें चल रही थीं। मेरे बैठते-बैठते किसीने अपना अधूरा वाक्य पूरा किया और हँसी के एक ठहाके से बैठक गूँज उठी। उस ध्वनि में डाक्टरजी  का स्वर सर्वोपरि था। इस मुक्त वातावरण को देखकर मेरी झिझक काफी कम हो गई। \n   उस अवसर पर मैं लगभग डेढ़ घण्टे तक वहाँ बैठा था। उसी समय मैंने संघ की प्रथा के अनुसार अपना परिचय प.पू. डाक्टरजी को दिया था।\n   डाक्टरजी की  बैठक गंगा-प्रवाह के समान चल रही थी।  2-4 लोग आते, 2-4 जाते अथवा डाक्टरजी द्वारा भेज दिए जाते। किन्तु बैठक का उल्लास पूर्ववत् जारी रहता। जो नए लोग बैठक में आए उन्हें डाक्टरजी ने मेरा परिचय स्वयं करा दिया और उनसे भी मुझे अपना-अपना परिचय देने को कहा। मुझसे उन्होंने पूछा कि तुम्हें मराठी आती है अथवा नहीं ? उस समय तक मेरा मराठी  का ज्ञान नहीं के  बराबर था किन्तु मैंने झेंपते  हुए कह दिया कि  कुछ-कुछ समझ लेता हूँ।  इसके बाद  मैंने देखा कि वे बीच-बीच में हिन्दी में बात करते थे और एक बार यह भी उन्होंने कहा कि हिन्दी में चाहे जितनी गल्तियाँ करें, यह उनका अधिकार है। क्योंकि हिन्दी उन्हें तभी आएगी। एक और बात मेरे ध्यान में आई। डाक्टरजी बैठक में स्वयं कम बोलते थे। उन्हें मानो दूसरों की बातें सुनने में ही आनन्द आता था। इधर उनकी अंतदृष्टि नवागत व्यक्ति को भली भाँति भांप लेती थी।\n   जीवन के साधारण व्यवहारों से बड़े-बड़े तत्त्वों का उद्धाटन करना तो उन्हें स्वभाव-सिद्ध था। उनका विनोद भी उद्बोधक होता था। उसमें व्यंग्य होता था किन्तु अपनी स्तुति या दूसरे की अवहेलना वे वाणी तो क्या मन में  भी न आने देते थे। इसीलिए उनकी हर एक बात का अर्थ भी सारे स्वयंसेवक, मित्र और अन्य लोग सहृदयता से ही लिया करते थे।"}, {"person": "", "title": "नागपुर महाविद्यालय", "text": "नागपुर का ‘नागपुर महाविद्यालय’ प.पू. डाक्टरजी के जमाने में ‘मॉरिस कालेज’ कहलाता था। वहाँ सहशिक्षण की प्रथा बहुत पहले से थी। वहाँ के विद्यार्थी फैशन में अगुआ थे। पढ़ाई भी अच्छी होती थी और खेलों में भी  उस समय उस कालेज की ख्याति थी। हर विद्यार्थी अपने को मॉरिशियन कहते हुए गर्व का अनुभव करता था। कभी-कभी यह गर्व घमण्ड का रूप धारण कर लेता था। संघ के अच्छे-अच्छे कार्यकर्ता इस कालेज में पढ़े हैं। \n   एक बार प.पू. डाक्टरजी कार्यवशात् दिन में धन्तोली गए। उन्होंने मॉरिस कालेज के  क्रीडांगण पर खूब भीड़ देखी। वैसे वहाँ क्रिकेट या अन्य खेलों की प्रतिस्पर्धाएँ सदा होती रहती थीं। किन्तु उस दिन कृषि-विभाग की ओर से खेलों का आयोजन था। अतः वहाँ  पशुओं की दौड़ें हो रही थी। जब परम पूज्य डाक्टरजी मैदान के  पास से निकले तब योगायोग से गधों की दौड़ चल रही थीं। बस डाक्टरजी को बढ़िया विनोद का मसाला मिल गया। साथियों से कहा, ‘देखो यह मॉरिशियन्स का नया अवतार कैसा मनोहर है।’\n   जब डाक्टर लौटकर घर आए और स्वयंसेवक मिलने-जुलने आने लगे तब जो भी मॉरिस कॉलेज का विद्यार्थी आता उससे डाक्टरजी पूछते, कहो तुम सच्चे मॉरिशियन हो या नहीं। यदि वह ‘हाँ’ कहता तो बैठक के सभी ठहाके के साथ हँस पड़ते। बाद में उसे बताया जाता कि मॉरिशियनों के एक नये गुण का पता लगा है। इस तरह जो भी विद्यार्थी मॉरिस कालेज का आता उसे हँसी की वह नमकीन बौछार सहनी पड़ती। कई महीनों तक मॉरिशियन  पर यह मधुर व्यंग कसा जाता रहा और तब से कम से कम संघ के क्षेत्र में मॉरिस कालेज का वृथा अभिमान हम लोगों के दिल से हट गया। आज भी जब पुराने साथियों का जमघट होता है और संयोग से इस शब्द का प्रयोग हो जाता है तो डाक्टरजी के ‘हितं मनोहारि च’ वचनों की याद जाग उठती है। अब वे वचन इस जीवन में ‘दुर्लभ’ नहीं ‘अलभ्य’ हो गए हैं।"}, {"person": "", "title": "पानी तेरा रंग कैसा,", "text": "प.पू. डाक्टरजी का स्मरण होते ही हिन्दी की एक कहावत याद आती है। ‘पानी तेरा रंग कैसा, जिसमें मिलाया वैसा।’ वे बड़े-बूढ़ों में गंभीर हो सकते थे और बच्चों के साथ  खेल सकते थे, उनमें बच्चों की पवित्रता थी, युवकों का उदण्ड(असीम) उत्साह था और वयोवृद्धों की सी धीरता और स्वभाव की गहराई थी। उन्होंने सभी को सँभाला।  साथियों की गल्तियाँ  अपनी तपस्या से सुधारीं। विरोधियों को अपने धैर्य और सहनशीलता के बल से परास्त किया।  उनका प्रवेश राजाओं के महलों में भी था और गरीबों की झोपड़ियों में भी। 1938 या  1939 की बात है। पूना के ग्रीष्म वर्ग में डाक्टरजी से मिलने के लिए औंध के पंत  प्रतिनिधि  पधारे। उस साल नागपुर में पू.डाक्टरजी के मकान का एक हिस्सा गिर पड़ा था और वे बहुत तंगी में थे। किंतु लट्ठे (मांजर-पाट) का कमीज पहने हुए वे अत्यन्त  स्वाभाविक मनःस्थिति से श्रीमंत पंत प्रतिनिधि से मिले।\n   मेरे जीवन में डाक्टरजीने जो परिवर्तन किया वह मैं कभी  नहीं भूल सकता। मुझे  मराठी बोलना न आता था। संघ में उस समय के प्रायः सभी साथियों की बोली मराठी थी। डाक्टरजी जब किसी बाहर के कार्यकर्ता से मेरा परिचय कराते तो मुस्कुराते हुए कहते थे कि ‘बच्छराज बहुभाषी  है। इसे हिन्दी, अंग्रेजी, गुजराती और मराठी का पूर्ण ज्ञान है। संस्कृत भी अच्छी तरह समझता है’ आदि। मैं अपना मराठी का अज्ञान जानता था। इसलिए मुझे प्रयत्न पूर्वक  मराठी समझने और बोलने का अभ्यास करना प़ड़ा और धीरे-धीरे काम चलाऊ मराठी का व्यवहार करने ही लग गया। उपरोक्त पूना के ग्रीष्म वर्ग में उन्हीं की प्रेरणा से मैंने मराठी में भाषण दिया और तब से मेरी झिझक मिट गई।"}, {"person": "", "title": "व्यावहारिक ज्ञान", "text": "पू. डाक्टरजी के जीवन की यही विशेषता थी। उनका व्यावहारिक ज्ञान पराकोटि  का था और वे जीवन की छोटी-छोटी बातों पर भी बारीक ध्यान रखते थे कि जिससे बड़ी बातों के बारे में तो स्वाभाविकतया सावधानी से कार्य कर सकें। वे जब माननीय कृष्णराव वैद्य के धरमपेठ (नागपुर) के बंगले में थे तब मैंने देखा कि  दवा पीने के बाद दवा कि शीशी  भी एक विशेष निश्चिरत स्थान पर रखी जाने का उनका आग्रह था। पसीने  के कारण जब उन्हें बनियान और कमीज बारबार बदलनी पड़ती थी, तब भी उनकी बनियानें यदि ठीक ढ़ंग से सुखाने को न फैलाई जातीं तो वे स्वयं उठकर भूल सुधारते  थे। मैंने सुना है कि जिस समय वे नासिक में बीमार थे  उस समय एक बार उन्होंने देखा कि उनके तौलिए का एक दाग धोनेवाले ने साफ नहीं किया। जब उन्होंने इस विषय में पूछा तब उत्तर मिला कि वह दाग साबुन से निकल नहीं सकता। डाक्टरजी कुछ न बोले।\n   जब अन्य सभी साथी भोजन करने  लगे तब डाक्टरजी चुपचाप अपने पलंग से उठे।  उन्होंने स्नानगृह में  जाकर उसी तौलिये को साबुन से भली-भाँति  धोया। दाग बिलकुल  छुडा दिया और तौलिये को पुरानी जगह पर सूखने  डाल दिया। भोजन से लौटने के पश्चाबत् सब साथियों की नजर तौलिये पर पड़ी तब उनके मनों में कितनी ग्लानि हुई होगी! विशेष कर उन्हें बुखार में इतनी मेहनत हुई, यह देखकर जिनके द्वारा धोते समय तौलिये  का दाग रह  गया था उनकी आँखों में तो आँसू आ गए। डाक्टरजी ने बाद में उक्त घटना का उल्लेख करते हुए शिक्षा दी थी कि हम कई बार अपने प्रयत्नों की कमी की ओर विचार न करते हुए  परिस्थिति पर दोष लगाकर समाधान मान बैठते  हैं। किन्तु यदि हम सम्यक् प्रयत्न करें तो तौलिये के दाग के समान परिस्थिति की कठिनाइयों पर अवश्य  विजय  प्राप्त कर सकते हैं।"}, {"person": "", "title": "स्फूर्तिदायी जीवन", "text": "मैंने ऊपर यह कहा है कि डाक्टरजी का जीवन पानी के रंग के समान था। किन्तु यह बात ऊपरी तौर से देखनेवाले को ही दिखाई पड़ती थी। अधिक सम्पर्क आने से प्रतीत  होता था कि उनका स्वयं का एक विशेष जीवन प्रवाह था और उस प्रवाह की गति एक विशिष्ट  ध्येय-सागर की ओर केन्द्रित थी। वे इस प्रवाह को एकाकी नहीं रखना चाहते थे। अपितु ‘आपुल्या सारिखे करिती तात्काळ’ इस वचन के अनुसार वे अपने साथियों को अपनी बराबरीका ही नहीं अपने से भी बढ़कर बनाने का प्रयत्न करते थे। वे स्वयं को साधक समझते थे और सिद्ध गुरु तो थे ही। इसीलिए उन्होंने चतुर कारीगर के समान कार्यकर्ताओं की एक ऐसी तेजस्वी पीढ़ी का निर्माण किया जो उनके संदेश को भारत भर पहुँचा सकी और उनके जीवन की शैली को राष्ट्र में चिर-स्थायी कर के इस राष्ट्र को अपनी विशेषताओं के साथ अमर करने के लिए प्रयत्नशील रही।\n   पू. डाक्टरजी के सम्पर्क में मेरी आयु के सात वर्ष बीते। उनकी बैठकों में मैंने गंगा-स्नान का पुण्य पाया है। उनके साथ घूमने का जब-जब प्रसंग आया तब-तब  व्यवहार के अनेक  अनुभव आए हैं। जीवन के अनन्त कष्टों को उन्होंने जिस धैर्य और शांति से सहा, उनकी याद कर आज भी मन रो उठता है। उनका जीवन दीपक था और उनके अतिमानवीय त्याग और तपस्या से भरे प्रयत्न उस जीवन के तेल और बाती थे। या यों कहें कि राष्ट्र की मरणासन्न अखण्ड-ज्योति को उन्होंने अपना जीवन-घृत देकर जीवित रखा और ऐसी परम्परा निर्माण कर दी कि यह ज्योति कभी मंद न हो, न बुझने पाए। अनन्त काल तक डाक्टरजी  का तिल-तिल जीवन-दान हमें स्फूर्ति देता रहेगा। उनके जीवन-दान का क्षण-क्षण हमें अपने जीवन को बेदाग बनाने के लिए उत्स्फुर्त करेगा। हमें भी चाहिए कि उनकी देह और उन्हीं की आँखें  बनकर हम उनकी स्वर्गीय आत्मा को उनके चिरअभिलाषित ध्येय-देव का दर्शन करा दें।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 1", "text": "सन् 1926 की बात है। मैं उस समय 12 या 13 वर्ष का बालक था। विद्यालय उन दिनों बन्द था। मैं अपने बहनोई  श्री. अण्णा सोहनी के यहाँ नागपुर में छुट्टियाँ बिताने गया था। एक दिन की बात मुझे याद है। अचानक किसी ने दौड़ते हुए आकर कहा-‘डाक्टरजी आ रहे हैं।’ यह शब्द सुनते ही सारे घर में उत्साह की एक लहर सी दौड़ गई। छोटे-बड़े सभी डाक्टरजी की अभ्यर्थना के लिए आकुल हो उठे। घर के लोगों के उत्साह ने मुझे भी उत्साहित कर दिया किन्तु उत्साह का कारण न समझने से मैं कुछ आश्चकर्यचकित सा हो रहा था। मेरा चंचल बाल-हृदय व्यग्रता से  बार-बार द्वार की ओर जा रहा था। डाक्टरजी कौन हैं, कैसे हैं,यह जानने के लिए मन में कौतूहल था।  एक दो क्षण के बाद ही सीढ़ियों  पर पैरों की ध्वनि तथा आनन्द-कोलाहल सुनाई दिया। हास की धवल किरणें छिटकाते हुए डाक्टरजी आकर उपस्थित हो गए। उनके साथ 12-13 तरुण और थे। उनके घर में प्रवेश करते ही मानो उत्साह, आनन्द तथा कर्मण्यता का पारावार उमड़ पड़ा। मेरे बहनोई डाक्टरजी के घनिष्ठ मित्र थे। उन्हीं  के कमरे  में लोग चाय-पान करते हुए  बातचीत  कर रहे थे। मुझे कमरे के अन्दर  प्रवेश करने में लज्जा मालूम हो रही थी। मैं केवल दरवाजे से बार-बार झाँक रहा था और डाक्टरजी के साथियों को देख-देख कर सोच रहा था कि  ‘काश ! यदि मैं भी  इनमें से एक होता !’\n   यह सब बहुत दिन पहले की बात है ! किन्तु आज भी वह मर्मस्पर्शी वार्तालाप, वह उन्मुक्त उच्च हास्य मेरे हृदय को झंकृत कर रहा है। आज जब मैं अतीत की ओर देखता हूँ, उन छोटी-मोटी सब घटनाओं का स्मरण करता हूँ जो कि डाक्टरजी के जीवन में प्रतिफलित विराट आदर्श के  एक अनुगामी  के रूप में मेरे साथ घटित हुई हैं, तो मैं वर्तमान युग के श्रेष्ठ हिन्दू के संपर्क के लाभ के लिए अपने भाग्य को धन्यवाद देता हूँ।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 2", "text": "हैदराबाद राज्य के कन्दकूर्ती ग्राम में एक तेलगू ब्राह्मण परिवार था जो बाद में पुराने मध्यप्रदेश के नागपुर नगर में आकर रहने लगा । इस परिवार में ही डाक्टर केशवराव हेडगेवार का जन्म हुआ था। डाक्टरजी का पारिवारिक पेशा पौरोहित्य का था। निष्ठा और वैदिक पांडित्य के कारण यह परिवार नागपुर में प्रख्यात था।\n   डाक्टरजी की जीवनी के  सम्बन्ध में कुछ लिखना अनेक कारणों से असुविधाजनक है। फिर भी उनके प्रारम्भिक जीवन के सम्बन्ध में जो कुछ विवरण प्राप्त हुआ है उसमें यह बात स्पष्ट है कि उनकी प्रकृति वैधानिक राजनीति के अनुकूल नहीं थी। वे थे एक जन्मजात विप्लवी ! राष्ट्रीय स्वयंसेवक संघ की स्थापना के बहुत पूर्व ही नागपुर तथा कलकत्ता में उन्होंने जिस संगठन प्रतिभा का परिचय दिया उससे अन्यान्य वैधानिक संस्थाओं से उनकी पृथकता बहुत ही स्पष्ट थी। कागज, कलम, विषय सूचि, प्रस्ताव, तालिका आदि के प्रति उन्हें तनिक भी आकर्षण न था। कागज के बिना जब कार्य करना बिल्कुल ही असंभव हो जाता था तभी वे उसका उपयोग करते थे। बाह्यावडम्बर को वे इतना कम महत्त्व देते थे कि राष्ट्रीय स्वयंसेवक संघ की स्थापना के 6 मास के बाद उन्होंने इसका यह नामकरण किया था। वे स्वयंसेवकों की नामावलि रखना भी अनावश्यक समझते थे। उन्होंने जिस संगठन-भवन की रचना की उसकी मूल नींव थी  स्वयंसेवकों का मिलना-जुलना। और इसीलिए नामावलि, रजिस्टर, फाइलें  आदि न रखकर भी  वे कार्य चलाने में  सफल हुए।  बाद में  जब संगठन की सीमा  इतनी बढ़ी कि मनुष्य  के लिए इतनी सब बातें, सारे कार्यक्रम आदि स्मरण रखना संभव न रह गया तब उन्होंने कुछ परिमाण में कागज, कलम की सहायता ली।  सुतरां जो महान् कार्य उन्होंने किया है उसके एकमात्र निदर्शक तथा प्रमाण हैं वे सब मनुष्य जो उन्होंने अपने आदर्श से उत्पन्न किए और वे सब कार्यकर्ता जो उनके द्वारा गढ़े गए।  ।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 3", "text": "संघ की स्थापना के पूर्वकाल  का डाक्टरजी के  कार्य-कलाप का विवरण कोई भी बाहरी व्यक्ति नहीं जानता और उनके जीवन के इस अंग पर प्रकाश डालना अभी कुछ काल तक सम्भव हो सकेगा या नहीं यह कौन कह सकता है ? पराधीनता के काल का सरकारी गुप्तचर विभाग भी इस सम्बन्ध में  कुछ विशेष तथ्य एकत्रित करने में सफल नहीं हो सका है। डाक्टरजी ने इस सम्बन्ध  की एक घटना स्वयं सुनाई थी।  उस समय वे कलकत्ता के नेशनल मेडिकल स्कूल के छात्र थे। उनको किसी षड़यन्त्र में फँसा देने के  लिए एक महाराष्ट्रीय ब्राह्मण गुप्तचर को उस छात्रावास में, जिसमें डाक्टरजी रहते थे और जिसको संचालन भी उन्हीं के हाथ में था, रखा गया। डाक्टरजी प्रारंभ से ही इस व्यक्ति का मतलब समझ गए। उन्होंने निस्संकोच होकर उस भद्र व्यक्ति को छात्रावास में ही रख लिया। अन्य छात्र गुप्तचर को अपने बीच में स्थान देने के कारण डाक्टरजी से संतुष्ट नहीं थे। जब उन्होंने अपनी कल्पना सबको बताई तो वे प्रसन्न हो उठे। जो व्यक्ति गुप्त संवाद लेने आया था, उसे न बताते हुए, डाक्टरजी उस पर निगाह रखते थे। उसका जादू आखिर उसी के सिर पर चढ़ गया। अन्त  में उस व्यक्ति को व्यर्थ-मनोरथ होकर छात्रावास से भी  चले जाना पड़ा। इस असफलता के कारण वह गुप्तचर विभाग से भी निकाल दिया गया। ।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 4", "text": "संघ की स्थापना के पूर्ववर्ती काल के उनके जीवन के एक-एक दिन का वृत्तांत देना सम्भव नहीं है, किन्तु छोटी-मोटी एक-आध घटना का उल्लेख किया जा सकता है; जिससे तरुण अवस्था में उनके विचारों का कुछ पता लग सकता है। जिस आयु में अन्यान्य बालक खेलने-कूदने में मस्त रहते हैं, उसी आयु में यह बालक अंग्रेजों के हाथ से नागपुर के सीताबर्डी दुर्ग का उद्धार करने के लिए अपने घर से सुरंग खोदने में लगा था। वह कार्य पूर्ण होने के पूर्व ही यह सेनापति, अपने छोटे से गुरिल्ला दल के साथ, घरवालों द्वारा बन्दी बना लिया गया और उसे कमरे  को खोद डालने के कारण डाँट खानी पड़ी। इस घटना को बचपन की  घटना कहकर उड़ा देना ठीक नहीं। इसके पूर्व ही उन्होंने शिवाजी को अपना आदर्श मान रखा था। इसी बात से इस शिशु-सुलभ कार्य का वास्तविक अर्थ हृदयंगम कर लेना सम्भव होगा। अत्यंत स्वाभाविक रीति से उन्होंने अंग्रेजी-आदेश से परिचालित स्कूल के संचालकों की आज्ञा को अमान्य कर ‘वन्दे मातरम्’ आन्दोलन का नेतृत्व ग्रहण किया। परिणाम यह हुआ कि उन्हें स्कूल छोड़ना पड़ा। इस दण्ड के कारण जिस महत् कार्य के लिए भगवान् ने उन्हें प्रेरित किया था, उसका पथ और भी प्रशस्त हो गया। वे पूना में  आकर पढ़ने लगे। पूना उस समय समस्त राजनैतिक उत्तेजना का केन्द्र था। वहाँ उनका भारत की समस्त राजनैतिक उत्तेजना के केन्द्र लोकमान्य तिलकजी से सम्पर्क आया। \n   पूना में राष्ट्रीय विद्यालय से मैट्रिक पास करने के एक मास पश्चाात् डाक्टरजी ने कलकत्ता को अपना कार्यक्षेत्र चुना। इस घटना की महत्ता भी ध्यान देने योग्य है। यदि हम देश की तत्कालीन राजनैतिक परिस्थिति का मनन करें तो डाक्टरजी द्वारा कलकत्ता को अपना कार्यक्षेत्र चुनने का अर्थ हम भलीभाँति समझ सकते हैं। चिकित्सा-विद्या का तीव्र आकर्षण अथवा विद्यार्जन की लालसा ही उनको कलकत्ता में ले आई थी, ऐसी बात नहीं है। उनकी स्वयं की बातों से ही यह ज्ञात हुआ है कि वे बंगाल के विभिन्न राजनैतिक दलों, यहाँ तक कि क्रांतिकारी नेताओं के केवल सम्पर्क में ही नहीं आए थे, अपितु उनके कार्यक्रमों में भी सम्मिलित हुए थे। ।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 5", "text": "1916 में यथाविधि डाक्टरी पास करने के बाद वे नागपुर में आए। किन्तु डाक्टरी उन्होंने कभी की  नहीं। बाद की उनकी गतिविधि का निरीक्षण करने पर ज्ञात होगा कि  देश-सेवा के दृढ़व्रती एक दल का संगठन करने के लिए उन्होंने देश के विशिष्ट व्यक्तियों के  साथ एवं उत्साही तथा उद्यमशील युवकों के साथ सम्पर्क करना प्रारम्भ किया। इस समय राजनैतिक क्षेत्र का सम्पूर्ण ज्ञान प्राप्त करने का जितना सुयोग उन्होंने पाया उस सबको व्यवहार में परिणत करने की उन्होंने चेष्टा की। किस प्रकार से देश को स्वाधीन किया जाए, किस मार्ग से विदेशी शासन का अन्त हो-यह  विचार उनकी एक मात्र चिन्ता का विषय बन गया। इसी उद्देश्य को लेकर वे एक स्थान से दूसरे स्थान और एक व्यक्ति से दूसरे व्यक्ति तक दौड़ते फिरे। किन्तु कहीं भी वे अपने प्रश्न। का ठीक उत्तर न पा सके। उन्हें  कहीं भी शांति न मिली। एक स्थान अवश्य था जहाँ उन्हें उत्साह मिलता था, किन्तु वे लोकमान्य तिलक भी सन् 1920 में दिवंगत हो गए। लोकमान्य की मृत्यु से डाक्टरजी को जो आघात हुआ उससे वे अंतिम क्षण तक सम्हल न सके। बाद में जब कभी उनके सम्मुख कोई असुविधा या संदेह उत्पन्न होता था तो वे लोकमान्य का स्मरण करने लगते थे। यहाँ तक कि मृत्यु के एक सप्ताह पूर्व जब उनकी स्वयं की अवस्था अत्यंत चिन्ताजनक थी, उन्होंने लोकमान्य की अकाल मृत्यु पर शोक प्रकट किया था। तिलक महाराज के साथ डाक्टरजी की क्या बात हुई अथवा तिलकजी डाक्टरजी के अनुयायियों से क्या आशा करते थे यह तो कहना कठिन है, किन्तु बाद के जीवन में हमने डाक्टरजी को बहुत बार यह कहते सुना है कि आज यदि तिलकजी जीवित रहकर अपने कार्य की शक्ति-वृद्धि को देखते, यदि वे आज हमारा नेतृत्व करते, तो यह कितने सौभाग्य की बात होती।"}, {"person": "", "title": "नवभारत के मंत्रद्रष्टा 6", "text": "सन् 1921 में गांधीजी देश के राजनैतिक नेतृत्व पर आसीन हुए और उनकी नूतन पद्धति के अनुसार कार्य चला। डाक्टरजी असहयोग आन्दोलन में भाग लेकर एक वर्ष के कारावास के दण्ड के भागी हुए। असहयोग आन्दोलन, खिलाफत आन्दोलन, मोपलाओं की नृशंसता एवं उसके परिणाम-स्वरूप समस्त देश में दंगों की सृष्टि, राजनैतिक विभ्रांति, नैराश्य एवं देश के राजनैतिक क्षेत्र में गांधीवाद का द्रुत प्रसार ही था उस युग का वैशिष्ट्य !\n   इसी समय डाक्टरजी कुछ निष्कर्षों पर पहुँचे थे, इसमें संदेह नहीं। वे क्रांतिकारियों तथा कांग्रेसियों के साथ कंधे से कंधे मिलाकर कार्य कर चुके थे। देश के नेता तथा देश की चिन्तना करनेवालों के साथ उन्होंने विचार-विनिमय किया था। केवल इतना ही नहीं, स्वयं दरिद्र-सन्तान होने के कारण सर्वसाधारण व्यक्तियों से मिलने-जुलने का सुयोग भी उन्हें प्रचुर मिला था। अपने समाज में कितनी महान् शक्ति सुप्त है और विदेशी शासन के फलस्वरूप उसका कितना अधःपतन हुआ है यह उन्होंने प्रत्यक्ष संपर्क द्वारा भलीभाँति समझा था। अंग्रेजी शक्ति का मूल केन्द्र कहाँ है और उसकी शासन-व्यवस्था में कहाँ दुर्बलता रह गई है, इसका उन्होंने गम्भीरता से मनन किया था। शंकाओं का समाधान करने के लिए वे प्रायः समस्त क्षेत्रों में कार्य कर चुके थे। अन्त में इस दीर्घ अनुसंधान का फल दृष्टि-गोचर हुआ। संशय दूर हुआ और समाधान कार्य में प्रकट हुआ। उन्होंने अनुसंधान छोड़ दिया। उन्हें आलोक के दर्शन हुए। स्वाधीनता के लिए कितना मूल्य देना पड़ेगा इसका हिसाब लगा कर उन्होंने कुछ तय किया। सन् 1925 की विजयादशमी का पवित्र दिन चुनकर उन्होंने राष्ट्रीय स्वयंसेवक संघ की स्थापना की।"}, {"person": "", "title": "श्रद्धांजलि 1", "text": "‘संगठन में शक्ति है।’ इस प्रकार तोते जैसी ‘राम राम’ तो सभी रटते थे, किन्तु संगठन की मूलभूत कल्पना तक कोई भी नहीं पहुँचता था; इसीलिए संगठन का प्रत्यक्ष स्वरूप भी किसी को स्पष्ट न होता था। संगठन की उस मूलभूत कल्पना एवं प्रत्यक्ष स्वरूप का आविष्कार करने के लिए आपने आजीवन तपस्या की तथा संगठनरूपी गंगा इस भारतवर्ष में अवतरित की। \n   सिद्धांत तथा कृति का योग्य समन्वय ही आपके जीवन का सार था। अतएव ‘समाज के लिए त्याग करना व्यक्ति का कर्तव्य है’ इस भ्रामक घोषणा का परित्याग कर, व्यक्ति तथा समाज का परस्परावलंबी सम्बन्ध है’ इस हृदयस्पर्शी घोषणा की पुकार करते ही लाखों लोग आपके पास एकत्रित हो गए। \n   अंतःकरण में ज्वलंत देश-भक्ति रखते हुए भी लोकसंग्रह के सिद्धांत को कृति में परिणत करने हेतु बड़ों के साथ बड़ों का-सा तथा छोटों के साथ छोटों का-सा व्यवहार करनेवाले आप गीता में प्रतिपादित अनासक्त कर्मयोग का अखण्ड आचरण करनेवाले कर्मयोगियों के अग्रणी थे। \n   युग-युग में उदित होनेवाले महापुरुषों में से आप भी एक थे। आपके रूप में अनन्त पूर्वजों का पुण्य-फल ही प्रकट हुआ था। हिन्दू-समाज की आत्मा उपयुक्त आश्रय की खोज में अनेकों वर्ष अनन्त आकाश में चक्कर लगाती रही। आपके ही रूप में उसे योग्य आश्रय प्राप्त हुआ। जिस प्रकार वन में मृगराज सिंह निर्भयतापूर्वक संचार करते हुए ‘स्वयमेव मृगेन्द्रता’ को प्राप्त करता है, उसी प्रकार आप भी खुद को समाज से प्राप्त उपेक्षा, ईर्ष्या व विरोध तथा परकीयों द्वारा प्रवर्तित भीषण षड्यंत्रों की कुछ भी चिन्ता न करते हुए स्वतः के पुरुषार्थ की सहायता से हिन्दू-राष्ट्र के भाग्य-विधाता बन गए।"}, {"person": "", "title": "श्रद्धांजलि 2", "text": "हिन्दू-समाज को स्वावलम्बन का पाठ आपने ही पढ़ाया। स्वाभिमान का परिणाम स्वावलम्बन ही होता है इस बात को दिग्दर्शित कर आपने हिन्दू-संगठन के आन्दोलन का विश्व रूप दर्शन कराया, इसीलिए यह संगठन मोहरूपी गर्त  को सकुशल पार कर अब इतिहाससिद्ध  सनातन मार्ग पर आगे बढ़ रहा है।\n   आपने युवक-हृदय की असीम शक्ति का सही अनुमान किया। आपने संस्कारों के महत्त्व को भी पहचाना  तथा समाचारपत्रों के थोथे अपप्रचारों की ओर कुछ भी ध्यान न देकर अपने ज्वलंत अन्तःकरण के सहवास से संस्कारक्षम अन्तःकरणों को योग्य दिशा में प्रेरित किया। आसपास बिखरे हुए पाषाणखण्डों से देवमूर्ति का निर्माण करनेवाले आप नवयुग के विश्व्कर्मा सिद्ध हुए। \n   राष्ट्र-हितार्थ क्षण मात्र प्रज्ज्वलित होने की अपेक्षा सतत कार्यरत होकर क्षण-क्षण और कण-कण जलते हुए ध्येय की ओर अग्रसर होना ही अधिक उचित है, यह उच्चतम आदर्श आपने राष्ट्र को सिखाया। आपका एक-एक श्वासस राष्ट्र-कार्य के लिए व्यतीत हुआ। जीवन-पुष्प की एक-एक पँखुड़ी स्वतः अपने हाथों से ही तोड़कर राष्ट्रदेवता के चरणों पर अर्पण करनेवाले आप आधुनिक युग के दधीचि ही सिद्ध हुए। \n   आपकी उत्कट ध्येय-निष्ठा इस राष्ट्र के लिए चिरस्फूर्ति का निधान है। साध्य और साधन का विवेक सिखानेवाला आपका जीवन अथाह जलराशि में दीपगृह के समान इस राष्ट्र को अनन्त समय तक मार्गदर्शन करने में समर्थ होगा।"}, {"person": "", "title": "श्री केशवाष्टकम्", "text": "हिन्दुर्विशालगुणसिन्धुरपीह लोके\n  बिन्दूयते विघटितो न करोति किंचित् ।\n  सत्संहतिं घटयितुं जननं यदीयं\n  तं केशवं मुहुरहं मनसा स्मरामि ॥\n\t\t\n  भव्यं वपुः स्मितमुदारमुदग्रमोजः\n  सस्नेहगद्गदवचो मधुरं हितं च।\n  वात्सल्यपूर्णममलं हृदयं यदीयं\n  तं केशवं मुहुरहं मनसा स्मरामि ॥\n\n  संघे कलौ भवति शक्तिरिति प्रसिद्धं\n  जानाति हिन्दुजनता न तु तत्कथंचित्।\n  सम्यग्विनेतुमिह तद्धतवान् वपुर्यः\n  तं केशवं मुहुरहं मनसा स्मरामि ॥\n\t\n  क्षुद्रं न किंचिदिह नानुपयोगि किंचित्\n  सर्वं हि संघटितमत्र भवेत्ङ्गलाय।\n  इत्थं जनं विनयति स्म निरन्तरं यः\n  तं केशवं मुहुरहं मनसा स्मरामि ॥\n\n  आर्यक्षितेरिह समुद्धरणाय दास्यात्\n  दास्यामि देहमिह संघटनां विधातुम्।\n  निश्चिमत्य भीष्ममचरत्  सततं व्रतं यः\n  तं केशवं मुहुरहं मनसा स्मरामि ॥\n\t\n  यो डाक्टरेति’ भिषजां पदमादधानो\n विज्ञातवान् भरतभूमिरुजां निदानम् ।\n संघौषधं समुदपादि नवं च येन\n तं केशवं मुहुरहं मनसा स्मरामि ॥\n\n एको बहुः किल भवेयमितीश्वमरेच्छा\n सैवाभवत् सततमेव परा यदन्तः।\n एकश्चव यो विहितवानिह संघसर्गं\n तं केशवं मुहुरहं मनसा स्मरामि॥\n\n ऐशं हि कार्यमिदमित्यवगत्य सम्यक्\n संघक्रतौ घृतमिवार्पयदायुराज्यम् ।\n यो जीर्णदेहमजहान्नवतां समेतुं\n तं केशवं मुहुरहं मनसा स्मरामि॥\n\t\t\n अष्टकं केशवस्येदं\n प्रातर्नित्यं पठन्ति ये।\n संघकार्ये न काठिन्यं\n तेषां भवति कर्हिचित् ॥  \n॥ इति ॐ॥"}, {"person": "", "title": "ध्येय मन्दिर की दिशा में", "text": "ध्येय मन्दिर की दिशा में \n पग सदा बढ़ते रहें।\n ह्नदय में तव स्मृति लता \n नित पल्लवित होती रहें।\n कृपा से हमको मिले \n गति मति सहित द्युति आपकी\n कष्ट में सुख में सदा \n आ बसी हो छवि आपकी।\n ध्येय निष्ठा ह्नदय उर में \n पथिक बस चलता रहे ॥१॥\n देखकर चहुँ ओर दुःख \n दारिद्रय भीषण आपदा।\n द्रवित होकर आपने फिर \n त्याग दी सब सम्पदा।\n दंभ मोह हताश होकर \n आपको लखते रहे ॥२॥\n शत युगों में आप जैसा \n अवतरित व्यक्तित्व पाया\n आपके स्मृति कवच ने \n नित्य ही हमको बढ़ाया।\n दृष्टि निश्चय भाव से धृव \n ध्येय पर केन्द्रिय रहे ॥३॥\n धूल के प्रत्येक कण से \n घोष उठता है महा।\n आपका पद-स्पर्श पाया \n देह धन्य हुई महा।\n चरण की गति हो अखण्डित \n और बढ़ती रहे ॥४॥"}, {"person": "", "title": "लो श्रद्घांजलि राष्ट्र-पुरुष", "text": "लो श्रद्घांजलि राष्ट्र-पुरुष \n शतकोटी ह्र्दय के कंज खिले है।\n आज तुम्हारी पूजा करने \n सेतु हिमाचल संग मिले है ॥\n माँ के पद-पद्मो में तुमने \n जो अमूल्य उपहार रखा है\n सत्य चिरन्तन अक्षय है \n हिन्दू की अमिट रुपरेखा है\n पावन संस्कारों ने निर्मित \n तन-मन ये अनभेद्य किले है॥\n आज तुम्हारी पूजा ॥१॥\n तुमने किया व्यतीत कठिनतम \n लोक-प्रसिद्घ-पराङ् गमुख जीवन\n भीष्म समान रहे तुम अविचल \n हिन्दु राष्ट्र के हित आजीवन\n देव तुम्हारी घोर तपस्या \n के ही तो ये सुफल मिले हैं॥\n आज तुम्हारी पूजा ॥२॥\n तुम अजात-अरि लोक-संग्रही \n संघ शक्ति के वलयकोण थे\n देव बता दो प्रतिपक्षी भी \n क्यों इतने संतुष्ट मौन थे\n सुनकर पावन चरित तुम्हारा \n कोटि ह्नदय प्रस्तर पिघले है॥\n आज तुम्हारी पूजा ॥३॥\n आज तुम्हारी पार्थिव प्रतिमा \n चक्षुओं से अदृश्य है\n किन्तु कोटि उर निलयों में तब \n दिव्य मूर्ति प्रस्थित अखण्ड है\n तेजोमय प्रतिबिम्ब तुम्हारे \n स्वय सिद्घ अगणित निकले है॥\nआज तुम्हारी पूजा ॥४॥"}, {"person": "", "title": "हिन्दु राष्ट्र संघटकं", "text": "हिन्दु राष्ट्र संघटकं सुजन वन्दनीयम्\nकेशवम् स्मरामि सदा परम पूजनीयम्\nराष्ट्रमिदम् हिन्दूनाम् खलु सनातनम्\nविघटनया जातम् चिर दास्य भाजनम्\nदु:ख दैन्य पिडीतमिति पिडीत हृदयम् ।। केशवम्\nभगवध्वज एव राष्ट्र गुरुरयम् महान्\nदेशोऽयं खलु देवो जगति महीयान्\nबोधयन्तमिति तत्त्वम् सतत स्मरणियम् ।। केशवम्\nवीर व्रतमेव परम् धर्म निदानम्\nसुशीलमेव लोके ‘स्मिन् परम निधानम्\nउपदिशन्तमिति सारम् दृढमाचरणियम् ।।केशवम्\nनेतुम् निज राष्ट्रमिदम् परम वैभवम्\nनयत विलयमन्तर्गत सकल भेद भावम्\nसंघ मन्त्रमिति जपन्तमेकमेशनीयम् ।।।केशवम्"}]}]}};

let currentApp = null;
let currentSection = 0;
let currentStoryIndex = 0;
let fontSize = 16;
let searchTimeout = null;
let view = 'home'; // home | sections | detail | search
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

// ── NAVIGATION ──
function openApp(appKey) {
  currentApp = appKey;
  currentSection = 0;
  hideSplash();
  showApp();
  showSections();
}

function hideSplash() {
  document.getElementById('splash').classList.add('hidden');
}

function showApp() {
  document.getElementById('app').classList.add('visible');
  updateTheme();
}

function updateTheme() {
  const theme = currentApp + '-theme';
  document.getElementById('topbar').className = 'topbar ' + theme;
  document.getElementById('sectionHero').className = 'section-hero ' + theme;
  document.getElementById('detailHeader').className = 'detail-header ' + theme;
  document.getElementById('searchBar').className = 'search-bar ' + theme;
  updateBnb();
}

function updateBnb() {
  const bnbs = document.querySelectorAll('.bottom-nav-btn');
  bnbs.forEach(b => {
    b.classList.remove('active','guruji-active','doctorji-active');
  });
}

function setActiveView(v) {
  view = v;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('section-view').classList.remove('visible');
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('search-view').classList.remove('visible');
  document.getElementById('searchBar').classList.remove('visible');
  document.getElementById('searchInput').value = '';

  if (v === 'home') {
    document.getElementById('home-view').style.display = 'flex';
    updateTopbar('संघ प्रेरणा', 'दो महापुरुष · 550 संस्मरण', '');
  } else if (v === 'sections') {
    document.getElementById('section-view').classList.add('visible');
  } else if (v === 'detail') {
    document.getElementById('detail-view').classList.add('visible');
  } else if (v === 'search') {
    document.getElementById('search-view').classList.add('visible');
    document.getElementById('searchBar').classList.add('visible');
