    document.getElementById('searchInput').focus();
    updateTopbar('खोज', '', '');
  }
}

function goBack() {
  if (view === 'detail') showSections();
  else if (view === 'sections') goHome();
  else if (view === 'search') showSections();
  else goHome();
}

function goHome() {
  currentApp = null;
  setActiveView('home');
}

function showSections() {
  setActiveView('sections');
  renderSectionTabs();
  renderStoryList();
  const app = DATA[currentApp];
  const totalStories = app.sections.reduce((a, s) => a + s.stories.length, 0);
  updateTopbar(app.name, app.subtitle, totalStories + ' संस्मरण');
  updateTheme();
}

function updateTopbar(title, subtitle, count) {
  document.getElementById('topbarTitle').textContent = title;
  document.getElementById('topbarSubtitle').textContent = subtitle;
  document.getElementById('topbarCount').textContent = count;
  document.getElementById('backBtn').style.display = view === 'home' ? 'none' : '';
}

function renderSectionTabs() {
  const app = DATA[currentApp];
  const tabs = document.getElementById('sectionTabs');
  tabs.innerHTML = '';
  app.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'section-tab ' + (currentApp + '-theme') + (i === currentSection ? ' active' : '');
    btn.textContent = sec.icon + ' ' + sec.label;
    btn.onclick = () => { currentSection = i; renderSectionTabs(); renderStoryList(); };
    tabs.appendChild(btn);
  });
}

function renderStoryList() {
  const sec = DATA[currentApp].sections[currentSection];
  const list = document.getElementById('storyList');
  list.innerHTML = '';
  sec.stories.forEach((story, i) => {
    const item = document.createElement('div');
    item.className = 'story-item';
    const preview = story.text.slice(0, 80).trim();
    item.innerHTML = `
      <div class="story-num">${i + 1}</div>
      <div class="story-item-content">
        <div class="story-item-title">${story.title || '—'}</div>
        ${story.person ? `<div class="story-item-person">— ${story.person}</div>` : ''}
        <div class="story-item-preview">${preview}…</div>
      </div>
      <div class="story-chevron">›</div>`;
    item.onclick = () => openStory(i);
    list.appendChild(item);
  });
}

function openStory(index) {
  currentStoryIndex = index;
  setActiveView('detail');
  renderDetail();
  updateTopbar(DATA[currentApp].name, DATA[currentApp].sections[currentSection].label, '');
  updateTheme();
}

function renderDetail() {
  const sec = DATA[currentApp].sections[currentSection];
  const story = sec.stories[currentStoryIndex];
  document.getElementById('detailSectionLabel').textContent = sec.icon + ' ' + sec.label;
  document.getElementById('detailTitle').textContent = story.title || '—';
  document.getElementById('detailPerson').textContent = story.person ? '— ' + story.person : '';
  document.getElementById('storyText').textContent = story.text;
  document.getElementById('storyText').style.fontSize = fontSize + 'px';
  document.getElementById('navCounter').textContent = (currentStoryIndex + 1) + ' / ' + sec.stories.length;
  document.getElementById('prevBtn').disabled = currentStoryIndex === 0;
  document.getElementById('nextBtn').disabled = currentStoryIndex === sec.stories.length - 1;
  document.querySelector('.detail-body').scrollTop = 0;
}

function navigate(dir) {
  const sec = DATA[currentApp].sections[currentSection];
  const newIdx = currentStoryIndex + dir;
  if (newIdx >= 0 && newIdx < sec.stories.length) {
    currentStoryIndex = newIdx;
    renderDetail();
  }
}

function changeFontSize(d) {
  fontSize = Math.max(12, Math.min(24, fontSize + d));
  document.getElementById('storyText').style.fontSize = fontSize + 'px';
}

// ── SEARCH ──
function toggleSearch() {
  if (view === 'search') { if (currentApp) showSections(); else goHome(); }
  else navSearch();
}

function navSearch() {
  setActiveView('search');
  document.getElementById('searchResults').innerHTML = '<div class="no-results">खोजने के लिए टाइप करें…</div>';
  updateTopbar('खोज', currentApp ? DATA[currentApp].name : 'सभी', '');
  updateTheme();
}

function doSearch(q) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const results = document.getElementById('searchResults');
    if (!q.trim()) { results.innerHTML = '<div class="no-results">खोजने के लिए टाइप करें…</div>'; return; }
    const matches = [];
    const apps = currentApp ? [currentApp] : ['guruji','doctorji'];
    apps.forEach(appKey => {
      DATA[appKey].sections.forEach((sec, si) => {
        sec.stories.forEach((story, idx) => {
          if ((story.title && story.title.includes(q)) || story.text.includes(q) || (story.person && story.person.includes(q))) {
            matches.push({ appKey, si, idx, story, sec });
          }
        });
      });
    });
    if (!matches.length) { results.innerHTML = '<div class="no-results">कोई परिणाम नहीं मिला।</div>'; return; }
    results.innerHTML = `<div class="search-result-header">${matches.length} परिणाम मिले "${q}" के लिए</div>`;
    matches.slice(0, 60).forEach(m => {
      const item = document.createElement('div');
      item.className = 'story-item';
      const preview = m.story.text.slice(0, 100);
      item.innerHTML = `
        <div class="story-num" style="background:${m.appKey==='guruji'?'#FEF3D8':'#E0EFF8'};color:${m.appKey==='guruji'?'#7B3F00':'#1A3A5C'}">${m.idx+1}</div>
        <div class="story-item-content">
          <div class="story-item-title">${highlight(m.story.title||'—',q)}</div>
          <div class="story-item-person">${DATA[m.appKey].name} · ${m.sec.label}</div>
          <div class="story-item-preview">${highlight(preview,q)}…</div>
        </div><div class="story-chevron">›</div>`;
      item.onclick = () => {
        currentApp = m.appKey; currentSection = m.si; currentStoryIndex = m.idx;
        updateTheme(); openStory(m.idx);
      };
      results.appendChild(item);
    });
  }, 200);
}

function highlight(text, q) {
  if (!text) return '';
  return text.replace(new RegExp(q, 'g'), '<mark class="search-highlight">$&</mark>');
}

// ── BOTTOM NAV ──
function navHome() { goHome(); }
function navSections() { if (currentApp) showSections(); else goHome(); }
function navFav() { /* favorites feature placeholder */ }

// ── INIT ──
document.getElementById('home-view').style.display = 'flex';
document.getElementById('backBtn').style.display = 'none';
document.getElementById('app').classList.add('visible');

// Auto-hide splash after timeout
setTimeout(() => {
  if (!document.getElementById('splash').classList.contains('hidden')) {
    document.getElementById('splash').classList.add('hidden');
  }
}, 8000);
</script>
