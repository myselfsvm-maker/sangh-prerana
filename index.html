 परमेश्वरर का ही रूप माना। पंच-परमेश्वपर की कहावत इसका प्रमाण है। यह हमारी राज्य रचना का अधिष्ठान है, जो नीचे से विकसित होता हुआ ऊपर तक चलना चाहिए। इस प्रकार के प्रतिनिधि समाज की प्रकृति व्यक्त करते हैं और जब वे एकत्र आते हैं तो राष्ट्र की प्रकृति का समष्टि रूप खड़ा हो जाता है। इस प्रकार के समूहों के, जिन्हें वर्ग, गिल्ड, सिंडिकेट या टे्रड-यूनियन चाहे जो नाम दें, प्रतिनिधियों द्वारा बना हुआ केंद्रीय शासन ही वास्तव में सब के हितों की रक्षा और उनके वैशिष्ट्य के विकास में सहायक हो सकता है।"}, {"person": "", "title": "अमृत वचन", "text": "एक दूसरे से भिन्न होते हुए भी व्यक्ति में समानता भी रहती है। हमें इन दोनों गुणों का इस प्रकार सामंजस्य करना होगा कि उसके व्यक्तित्व का विकास तो हो, किन्तु वह विकास उसके सामूहिक जीवन का हितविरोधी न बने। वैसे ही समानताजन्य एकीकरण, व्यक्ति की विशेषताओं के विकास का मार्ग प्रशस्त करे, उसके विनाश का कारण न बने। अत: समान गुणधर्मवाले व्यक्तियों के समूह बनाकर समूह के रूप में उन्हें स्वतंत्रता दी जाए, जिससे वे समाज की भलाई के लिये प्रयत्नशील हों। किन्तु प्रत्येक व्यक्ति के लिये यह भी आवश्यक हो कि वह समूह के नाते ही खड़ा हो। यह व्यवस्था चाहे मानव की अंतिम अवस्था हो या सीढ़ी, किन्तु यही यथार्थ है। अखिल मानव को इस पद्धति का पालन करना होगा। दुनिया के लोगों ने जो प्रयोग किये हैं, वे भी धीरे-धीरे व्यक्तिस्वातंत्र्य और सामूहीकरण के सामंजस्य की आवयश्कता का अनुभव करने लगे हैं। वैज्ञानिक आधार पर इससे उत्कृष्ट सामंजस्य की व्यवस्था और कोई नहीं हो सकती।"}, {"person": "", "title": "अमृत वचन", "text": "जो तत्त्व व्यवहार में नहीं आता उसे तत्त्व ही नहीं मान सकते। क्योंकि जो व्यवहार में नहीं है, उस तत्त्व की पतंग उड़ाने से क्या लाभ, तत्त्व व्यवहार में आना ही चाहिये। अपने पूर्वजों का इस पर बड़ा आग्रह था। उन्होंने कहा कि ‘ब्रह्म सत्यम् जगन्मिथ्या’ इस तत्त्व का यदि मरने के बाद ही अनुभव होता है तो उसका अनुभव हम नहीं करेंगे। इस जीवन में जीते-जागते नित्य-प्रति के व्यवहार में यदि उसकी अनुभूति आती है तब तो वह सत्य, अन्यथा ग्रहण करने के योग्य \nनहीं। इसलिये उन्होंने कहा कि मरने के बाद मिलने वाले स्वर्ग पर अपना विश्वा स नहीं। वह है या नहीं, कौन जाने? जिस बैंक का नाम सुना नहीं उसकी हुंडी नहीं चाहिये। हमें तो स्वर्ग का भी इसी जीवन में अनुभव चाहिए। उसके अनुसार व्यवहार परिवर्तित होना चाहिए।  इसी दृष्टि से विचार कर हम कहते हैं कि यदि तत्त्व ठीक है तो उसके अनुसार व्यवहार करो। व्यवहार के लिये तत्त्व को मरोड़ना नहीं। तत्त्व के साथ व्यवहार का तद्रूप होना आवश्यक है। इसी बात को लेकर तत्त्व को व्यवहार में लाकर हम इतना सुधार कर पाए हैं, इतना अच्छा वायुमंडल, जिसकी एक झलक हमें इसी शिविर में दिखाई देती है, उत्पन्न कर पाए हैं। आज देश में सर्वत्र एक भाषा-भाषी दूसरे भाषा-भाषी से बात करते समय सौहार्द की दृष्टि से नहीं देखता। परंतु अपने यहाँ भिन्न भाषा-भाषी स्वयंसेवक एकत्र होने के बाद भी एक-दूसरे के बारे में हीन विचार नहीं रखते। हमने अपने तत्त्व में कहा कि यह हिंदूसमाज हमारा है, एक है और उसी तत्त्व के अनुसार हमने अपने व्यवहार को मरोड़कर कैसा भव्य स्वरूप प्राप्त किया है। उस स्वरूप में दिखाई देता है कि किसी भी भाषा-भाषी की हम अवहेलना नहीं करते।"}, {"person": "", "title": "अमृत वचन", "text": "यदि हमारे मन में विकार नहीं है, हमारी श्रध्दा का केन्द्र नहीं हिला है, तो हमारे मन में झंझावातों में उड़ने की प्रवृत्ति पैदा नहीं हो सकती। राष्ट्र का चैतन्य किसी न किसी रूप में प्रकट होगा ही। बीज बो दिया है, वट वृक्ष अवश्य ही खड़ा होगा। सम्पूर्ण भारत इसके नीचे आएगा। स्थान-स्थान पर नई जड़ जमेगी। इस निश्च य पर अडिग होकर चलेंगे तो संकट नहीं आ सकता। संकट तो अधूरी शक्ति पर आता है, पूर्ण पर नहीं। एकात्मता के आधार पर पूर्ण नीतिमत्ता से उसको प्रबल एकसूत्र में संगठित किया तो उस पर कोई संकट नहीं आएगा, बल्कि सम्पूर्ण राष्ट्र-जीवन उसकी प्रेरणा से चलेगा।"}, {"person": "", "title": "अमृत वचन", "text": "स्वराज्य मिला है, अप्राप्य प्राप्त हुआ है परंतु प्राप्त का रक्षण करना कठिन काम है। इसके लिये विच्छिन्नता नष्ट कर स्वाभाविक राष्ट्रीयता के साक्षात्कार से सामर्थ्य का आविष्कार करना आवश्यक है। सही राष्ट्र-भावना जागृत नहीं की, वह भावना अस्पष्ट या विकृत रही तो राष्ट्र हमेशा के लिये बंधन में जकड़े जाने का भय सदा बना रहेगा। जिस दुर्बलता के कारण मूलत: हम अपनी स्वतंत्रता से वंचित हुए उसे दूर करना चाहिये, विच्छिन्नता समाप्त करनी चाहिये, सम्यक् राष्ट्र-दृष्टि का अभाव है तो उसे निर्माण करना चाहिए। संकुचित स्वार्थ का प्राबल्य समाप्त करना चाहिए।"}, {"person": "", "title": "अमृत वचन", "text": "स्वराज्य-प्राप्ति एक घटना है, क्रिया है। स्वतंत्र समाज-जीवन सुरक्षित और संपन्न रखना चिरंतन महत्त्व का प्रश्न् है। उसके लिये राष्ट्र सदैव सिद्ध रहना चाहिए। वह सिद्धता रहने के लिये राष्ट्र-जीवन में से हानिकारक अवगुण मिटाकर सुसूत्र, सामर्थ्यशाली समाज-जीवन निर्माण करने की दृष्टि से अपना कार्य खड़ा किया गया है। हिंदू-राष्ट्र-जीवन की कल्पना निर्भयपूर्वक सामने रखकर उसकी गौरववृद्धि के लिये सारा समाज एकसूत्र में संगठित करने का कार्य अपने सामने है। इसलिये संघ के नाम सहित प्रत्येक बात का सूक्ष्मता से विचार कर कार्य की रचना की गई। सुस्पष्ट राष्ट्र-कल्पना सामने रखकर, स्वार्थमूलक भावना को तिलांजलि देकर, भेद मिटाकर, एक प्रभावशाली समाज-जीवन निर्माण करने की चेष्टा चालू हुई।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे देश ने लोकतान्त्रिक प्रणाली को अपनाया है; परन्तु इस व्यवस्था की सफलता के लिये आवश्यक है कि जनसामान्य को पर्याप्त प्रशिक्षित एवं प्रबुद्ध बनाया जाए। केवल अक्षरज्ञान देने से उद्देश्य प्राप्ति नहीं होगी। हमारे राष्ट्रजीवन के राजनैतिक, आर्थिक आदि विविध पक्षों के विषय में दायित्व एवं भूमिका के प्रति लोगों को जागरूक बनाना होगा।"}, {"person": "", "title": "अमृत वचन", "text": "बुद्धिमान् और परिपक्व व्यक्ति केवल मात्र परिस्थितियों से प्राप्त प्रतिक्रिया से प्रभावित होकर कार्य नहीं करते, वे परिस्थितियों को अपना दास बनाने की दृढ़-शक्ति लेकर साहसपूर्वक कार्य करते हैं। मनुष्य बोल कर अपनी स्वयं की इच्छा व्यक्त करता है, जब कि एक निष्प्राण पहाड़ी से केवल प्रतिध्वनि निकलती है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारी संस्कृति के प्राचीन एवं जीवनदायी लक्षणों को पुन: तारुण्य प्रदान करने के कार्य की अविलंब आवश्यकता और सर्वोपरि महत्ता हमारे राष्ट्र के वर्तमान सन्दर्भ में ही नहीं है, वरन् अन्तर्राष्ट्रीय सन्दर्भ में भी है। हमारी सांस्कृतिक दृष्टि को ही, जो मनुष्य के बीच प्रेम एवं सामन्जस्य के लिये सच्चा आधार प्रदान करती है और जीवन के सम्पूर्ण दर्शन को मूर्त करती है, आज के इस युद्ध से ध्वस्त हुए विश्वव के सामने प्रभावी ढंग से रखने की आवश्यकता है।"}, {"person": "", "title": "अमृत वचन", "text": "हम अधिक से अधिक भौतिक संपत्ति का अर्जन करें, जिससे कि समाज के रूप में जो ईश्वधर है, उसकी सेवा यथासंभव श्रेष्ठ रीति से कर सकें और उस सम्पूर्ण सम्पत्ति में से हमें केवल उतना ही अपने लिये उपभोग में लाना चाहिये जितने के बिना हमारी सेवा की क्षमता में रुकावट आती हो। इससे अधिक पर अधिकार जताना या अपने उपयोग में लाना निश्चैय ही समाज की चोरी का कार्य है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारी संस्कृति में केवल ऐसे ही व्यक्तियों की पूजा की गई है, जिन्होंने अपनी असामान्य योग्यता और साहस के द्वारा गरजते हुए समुद्री तूफान और बवण्डरों की छाती पर चढ़कर विजय प्राप्त की और अन्त में परिस्थितियों के प्रतिकूल प्रवाह को अपने पक्ष में करने में समर्थ हो गये। वे अपने समय के निर्माता थे, उसकी निर्मिति मात्र नहीं। यह उन सभी महापुरुषों के विषय में है, जिन्हें हमारी राष्ट्रीय परम्परा में अवतार समझा गया है।"}, {"person": "", "title": "अमृत वचन", "text": "संसार दुर्बल के तत्वज्ञान को चाहे वह कितना ही उदात्त क्यों न हो सुनने को तैयार नहीं है। संसार तो केवल शक्तिशालियों की पूजा करता है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारी सभी भाषाएँ चाहे वह तमिल हो या बंगला, मराठी हो या पंजाबी हमारी राष्ट्र-भाषाएँ हैं। वे सभी भाषाएँ और उपभाषाएँ अनेकों खिले हुए पुष्पों के समान हैं, जिससे हमारी राष्ट्रीय संस्कृति की वही सुरभि प्रसारित होती है। इन सभी के लिए प्रेरणा की स्रोत, भाषाओं की रानी देववाणी संस्कृत रही है। अपने वैभव एवं पावन साहचर्य के कारण वही हमारे राष्ट्रीय पारस्परिक व्यवहार के लिए एक महान संयोजक सूत्र है। किंतु दुर्भाग्य से आज उसका व्यवहार सामान्यरूप से नहीं होता। संपूर्ण देश की एक भाषा की समस्या के निराकरण के लिए जब तक संस्कृत स्थान नहीं ले लेती, सुविधा हेतु हमें हिंदी को प्रधानता देनी पड़ेगी।"}, {"person": "", "title": "अमृत वचन", "text": "यह भारतीय राष्ट्रजीवन अर्थात् हिंदूराष्ट्र है। अपने समाज में नानाविध भेद, संप्रदाय, गुणावगुण रहने के उपरांत भी वह प्राचीन एकसूत्र राष्ट्रजीवन है। उसमें संस्कृति का समान सूत्र है। स्रदय के सूक्ष्म संस्कारों का समीकरण, राष्ट्रीय जीवन को प्रेरणा देनेवाली जीवनशक्ति संस्कृति है। इस देश में अनादि काल से जो समाजजीवन रहा, उनमें अनेक महान् व्यक्तियों के विचार, गुण, तत्त्व, समाजरचना के सिद्धांत तथा जीवन के छोटे-छोटे सामान्य अनुभवों से जो जीवनविषयक एक स्वयंस्फूर्त स्वाभाविक दृष्टिकोण निर्माण होता है, वह सर्वसाधारण दृष्टिकोण, संस्कृति है। यह संस्कृति अपने राष्ट्र की जीवनधारणा है, विश्वन की ओर देखने की पात्रता देनेवाली प्रेरणा-शक्ति है, एक सूत्र में गूँथनेवाला सूत्र है।"}]}]}, "doctorji": {"name": "हमारे डॉक्टरजी", "subtitle": "जीवन और विचार", "sections": [{"key": "jivan", "label": "जीवन दर्शन", "icon": "🌱", "stories": [{"person": "", "title": "प्रास्ताविक", "text": "राष्ट्रीय स्वयंसेवक संघ का कार्य आज देशभर में फैला हुआ है। गांव-गांव में और नगर-नगर में उसकी शाखाएं लगती हैं। संघ का कार्य नदी के प्रवाह जैसा अखंड चल रहा है, बढ रहा है, और विभिन्न क्षेत्रों को नवजीवन दे रहा है।\n   जब हम किसी नदी को देखते हैं, तो उसका उगमस्थान देखने की बलवती इच्छा मन में जागती ही है। अपने यहां उसका बहुत अधिक महत्व माना गया है। इसलिए लोग गंगोत्री, जमनोत्री, अमरकंटक, त्र्यंबकेश्व र आदि स्थानोंपर भक्तिभाव से जाते हैं। यह मनुष्य स्वभाव है।\n   विशेषतः बालकों में इस बात की उत्सुकता अधिक मात्रा में रहती है। उसे पूर्ण करने के हेतु से ही यह पुस्तक लिखी गयी है। अतः बहुत सुबोध और रोचक ढंग से डा. हेडगेवारजी के जीवन के महत्वपूर्ण प्रसंग यहां चित्रित किये गये हैं। यह जितनी मनारंजक है, उतनी ही उद्बोधक भी।\n   हमें आशा है बालपाठक इसे पसंद करेंगे।"}, {"person": "", "title": "मंगल दिवस  1", "text": "वह दिन था एक अप्रैल 1889। उस दिन चैत्र शुद्ध प्रतिपदा थी। सर्वत्र उत्साह से नववर्ष का स्वागत हो रहा था।\n   प्रभात की वेला थी। हर घर के आंगन झाड बुहारकर तथा जलसंमार्जन कर केवल स्वच्छ ही नहीं किये गये थे, उन पर महाराष्ट्र की पद्धति के अनुसार सुन्दर रंगावलियां रेखित कर, वे सुशोभित भी किये गये थे। कई लोग दरवाजों पर आम के पत्तों का तोरण बांध रहे थे। बच्चे उनकी सहायता कर रहे थे। कोई नीम की टहनियां ला रहा था। कोई तोरण और बंदनवार बना रहे थे। कोई फूल ला रहे थे और कोई उनके हार बना रहे थे।\n   महाराष्ट्र में वर्षप्रतिपदा को “गुढीपाडवा’’ कहते हैं। गुढी का अर्थ है ध्वज। उस दिन घर आंगन में ध्वज फहराया जाता है और उसका पूजन किया जाता है।\n   अतः बालक वह सब सामग्री जुटा रहे थे। उनमें कुछ स्पर्धा का भाव भी था। “मेरे घर की गुढी सबसे सुन्दर और ऊंची रहनी चाहिये।’’ जब गुढ़ी की प्रस्थापना होती तो बालक तालियां पीटते और आनंद से नाचते। जबसब लोग नये कपडे पहनेगे। हर घर में मीठे पकवान बनेंगे। सब ओर आनंद और उत्साह उमड रहा था।"}, {"person": "", "title": "मंगल दिवस  2", "text": "नागपुर में पंडित बळिरामपंत हेडगेवार के घर में यह आनंद और अधिक मात्रा में प्रकट हो रहा था। वह पौराणिक तथा ऐतिहासिक दृष्टि से बडा ही यशदायी दिवस था। वह मंगल पर्व था। महत्त्वपूर्ण त्यौहार था। उसी दिन उनके घर में एक बालक का जन्म हुआ था। इस शुभ संयोग की सब लोग सराहना कर रहे थे।\n   किसीने कहा - “कितने अच्छे मुहूर्त पर इस बालक का जन्म हुआ है। यह आगे चलकर अवश्य ही कोई बडा पराक्रम करेगा।’’\n   दूसरे ने कहा - “वर्ष प्रतिपदा तो विजय-दिवस है। शतकों पूर्व, इसी दिन सम्राट शालिवाहन ने, आक्रमणकारी शकों को मार भगाया था। उसी की स्मृति में हम यह ध्वजोत्तोलन करते हैं। कहा जाता है कि उसके पास न खजाना था न सेना थी, और न कोई अधिकार था। परंतु वह अपने देश की दुर्दशा से व्यथित था, और ईश्व री शक्ति से प्रेरित था। उसने मिट्टी के घुडसवार और सैनिक बनाए। फिर उसमें प्राण फूंके ओर उनके भरोसे परचक्र का निवारण किया। मुझे लगता है, यह बालक भी वैसा ही कुछ न कुछ असाधारण करतब कर दिखायेगा।’’\n   किसी ने कहा, “यह हेडगेवार वंश की कीर्तिध्वजा ऊंची फहराएगा। देशभर में अपने घराने का नाम चलाएगा।’’\n   इस प्रकार, अनेक शुभकामनाओं के साथ, उस बालक का सबने बहुत प्रेम से स्वागत किया। बारहवें दिन नामकरणविधि संपन्न हुआ। बालक का नाम केशव रखा गया।"}, {"person": "", "title": "वंश-परिचय 1", "text": "आंध्रप्रदेश के निजामाबाद जिले की बोधन तहसील में कंदकुर्ती नाम का एक ग्राम है। गोदावरी, हरिद्रा और वनजरा इन तीन नदियों के संगमपर वह बसा हुआ है। यहीं पर हेडगेवार परिवार प्राचीनकाल से रहता था। यह परिवार विद्याध्ययन तथा पाण्डित्य के लिए विशेष प्रसिद्ध था। सन् 1800 ईसवी के बाद इस कुल की एक शाखा नागपुर में आयी। इसी शाखा में केशव का जन्म हुआ।\n   केशव के पिता का नाम बळिराम और माता का नाम रेवती। केशव के दो भाई थे और तीन बहनें थीं। बडे भाई का नाम महादेव था। मंझले का सीताराम था और केशव सबसे छोटा था।\n   पंडित बळिरामजी बहुत विद्वान थे। उन्होंने अग्निहोत्र का व्रत लिया हुआ था। वे वेदों का पठन-पाठन करते थे और पौरोहित्य कर परिवार की उपजीविका चलाते थे।"}, {"person": "", "title": "वंश-परिचय  2", "text": "पंडित बळिरामजी के बडे पुत्र महादेव शास्त्री विद्वत्ता के साथ साथ अपने शारीरिक बल के लिए भी प्रसिद्ध थे। वे प्रतिदिन व्यायामशाला में जाता थे और हजार-हजार डंड बैठकें लगाते थे। वे कुश्ती में पारंगत थे और मलखंब से उन्हें विशेष प्रेम था। वे अपने साथ मुहल्ले के बच्चों को व्यायामशाला में आग्रहपूर्वक ले जाते थे और उन्हें बडी लगन से कुश्ती, मलखंब इत्यादि सिखाते थे।\n   उनका स्वभाव तेज था। कहते हैं कि एकबार वे अपने मकान की दूसरी मंजिल पर गैलरी में खडे थे। नीचे सडक पर कुछ गुंडे थे। उनमें से किसी ने सडक से जा रही स्त्रियों को छेडने का प्रयत्न किया। यह देखते ही महादेव शास्त्री आगबबूला हो गये। उन्होने उन गुंडों को वहीं से ललकारा और वे धडाम से नीचे कूद पड़े वे उनसे अकेले लडते रहे और एक-एक को पकडकर पीटते रहे। जब मुखिया की हड्डी नरम हुई, तो बाकी सब नौ-दो-ग्यारह हो गये। फिर उस मोहल्ले में कभी किसीने ऐसा अभद्र व्यवहार नहीं किया। नगर के उस भाव में महादेव शास्त्री का बडा नाम था, और रौब था।"}, {"person": "", "title": "वंश-परिचय  3", "text": "महादेव शास्त्री को केशव से विशेष प्यार था। वे अपने साथ प्रतिदिन केशव को व्यायामशाला में ले जाते थे और उसे डंड, बैठक, कुश्ती, मलखंब, लाठी, बनेठी इत्यादि सिखाते थे।\n   माता-पिता का छाया-छत्र केशव के भाग्य में नहीं था। सन् 1902 ईसवी में नागपुर में सर्वत्र प्लेग का प्रकोप हुआ। आपने स्वभाव के अनुसार पंडित बळिरामजी हर किसी के घर जाते थे और लोगों की सहायता करते थे। अंत में हुआ यह कि वे स्वयं भी बीमार हुए और उनकी पत्नी रेवती भी बीमार हुई। दोनों प्लेग के शिकार हुए और एक ही दिन परलोक सिधारे। उस समय केशव की आयु केवल बारह वर्ष की थी।"}, {"person": "", "title": "बुद्धिमान बालक 1", "text": "केशव एक बुद्धिमान बालक था। उसकी स्मरणशक्ति असाधारण थी। रामरक्षा स्तोत्र और समर्थ रामदास स्वामी विरचित मनोबोध के श्लोबक उसने अल्पसमय में कण्ठस्थ कर लिए। जब वह गीता के अध्याय और अनेक संस्कृत स्तोत्र अपने सुस्पष्ट वाणी से सुनाता था, तब बडे लोग भी चकित हो जाते थे। अपने बडे भाइयों के साथ वह नित्यप्रति महाभारत, रामायण इत्यादि सुनने के लिए जाता था और ध्यानपूर्वक सुनता था। हर कथा का मर्म वह तत्काल ग्रहण करता था। छत्रपति शिवाजी महाराज की कथाएं सुनने में तथा पढने में उसे विशेष रुचि थी। उन्हें सुनते-सुनते तथा पढते-पढते वह लवलीन हो जाता था।।"}, {"person": "", "title": "बुद्धिमान बालक 2", "text": "एक बार केशव के यहां एक रिश्तेदार बाहर गांव से आये। वे कथा सुनाने की कला में प्रवीण थे। उन्होने शिवाजी के बाल्यजीवन की एक कथा सुनाई। केशव उनका कथाकथन तन्मय होकर सुन रहा था। कथा जब समाप्त हुई तब अन्य बालक उठकर इधर-उधर चले गये। परन्तु केशव वहीं पर बैठा रहा। मन ही मन वह शिवाजी के काल में पहुंच गया था। कथा के सब प्रसंग उसकी आंखों के सामने घटित हो रहे थे। शिवाजी के सामंत पिता शहाजी, बाल शिवाजी को लेकर बीजापुर के आदिलशाह के दरबार में पहुंचे। शहाजीने कहा - “मेरे प्रिय कुमार, प्रणाम करो, शहंशाह को प्रणाम करो।’’ तब बाल शिवाजी ने तनकर कहा - “नहीं, कभी नहीं। न ये हमारे समाज के हैं, न देश के, न धर्म के। इन्हें मैं कभी प्रणाम नहीं कर सकता।’’\n   इसी समय किसीने केशव को पुकारा परंतु वह उत्तर न दे सका। जब पास आकर, कन्धा पकडकर, केशव को हिलाया गया, तब कहीं वह इतिहासकाल से वर्तमानकाल में आ गया। इस छोटी आयु में ही केशव के मन में अपने देश के संबंध में विचार उठने लगे थे।"}, {"person": "", "title": "वह मिठाई खाना पाप है", "text": "उस समय भारतवर्ष पर अंग्रेजों का राज था। उनकी रानी राज कर रही थी। उसका नाम था विक्टोरिया। जब उसके राजकाल के साठ वर्ष पूर्ण हुए, तब अंग्रेजों ने साम्राज्य भर में बडा समारोह सम्पन्न किया। विशाल सभाएं हुईं। उसमें लंबे-चौडे भाषण देकर रानी को हर प्रकार से सराहा गया। सडकों पर कमानें बंधवाईं। ध्वजा-पताका तोरण आदि बांधकर सडकें सजायी गयीं। और रानी के चित्र के जुलूस निकाले गये। इस समारोह के उपलक्ष्य में शालाओं में बच्चों को मिठाइयां बांटी गयीं। केशव की पाठशाला में भी बच्चों को मिठाई दी गयी। वह नन्हें केशव को भी प्राप्त हुई। पर उस मिठाई को छूते ही केशव ने ऐसी वेदना हुई जैसे उसे बिच्छू ने डंक मारा हो। उसके छोटे से मस्तिष्क में इस प्रकार विचारचक्र चलने लगा।\n   “अंग्रेज लोग न हमारे देश के हैं, न हमारे धर्म के। न मालूम कितनी दूर से वे यहां आये हैं और हम पर राज करते हैं। उन्होंने हमें गुलाम बनाया है। वे हमारे शत्रु हैं। उनकी रानी को राज्य करते हुए साठ साल बीते, इसलिए हम खुशी क्यों मनाएं? हम मिठाइयां क्यों खायें? छिः छि! इस मिठाई को खाने का अर्थ है- अंग्रेजों के राज्य को मान्यता देना। उनकी गुलामी में आनंद मानना। इस मिठाई को खाना पाप है। इस मिठाई को खाना अपने देश के प्रति द्रोह करना है। नहीं, नहीं मैं यह मिठाई कभी नहीं खाऊंगा।’’\n   जब विचारों में तीव्रता आ गयी तब केशव ने झट से हाथ उठाया और मिठाई नाली में फेंक दी। उसके सहपाठी उसकी इस कृति को देखते ही रह गये। केशव ने उन्हें अपनी बुद्धिनुसार बहुतेरा समझाया। पर केशव की बातें उनकी समझ में नहीं आयीं।\n   केशव जब घर आया तब उसकी मुखचर्या  कुछ उग्र सी थी। उसे देख बडे भैया ने पूछा, “क्या बात है?  कुछ नाराज से दिखते हो। सुनते है आज पाठशाला में मिठाई बंटी। क्या तुम्हें नहीं मिली?’’ \n   केशव ने कहा- “मिली क्यों नहीं? पर मैने वह नाली में फेंक दी।’’\n   तब पास में खडे एक रिश्तेदार ने कहा- “वाह भाई वाह, यह भी कोई बात है?  मिठाई कहीं भला नाली में फेंकी जाती है?’’\n   केशव ने तपाक से उत्तर दिया, “अजी, वह मिठाई की नहीं, विष की पुडिया थी। जिन्होने हमें गुलाम बनाया है, उनकी रानी के समारोह में हम क्यों कर सहभागी होंगे?  ऐसी ही मिठाई दे-देकर अंग्रेज हमें सदा के लिए गुलाम बनाये रखना चाहते हैं।’’\n   केशव का वह आवशे देखकर सुननेवाले सब चकित हो गये। एक ने कहा ही दिया - “भाई, यह मामूली लडका नहीं है। इसका पानी कुछ अलग ही है।’’"}, {"person": "", "title": "दुर्ग जीतने की इच्छा", "text": "छत्रपति शिवाजी महाराज की कथा सुनते समय बालक केशव कई बार मन ही मन उसकी सेना का एक सैनिक बन जाता था। कभी वह घुडसवार होकर सरपट घोडा दौडाता, तो कभी किसी दुर्गपर आक्रमण करता। कभी गुप्तमार्ग से अकस्मात किले में पहुंचता,और किला जीत लेता। प्रत्यक्ष जीवन में भी इसी प्रकार का प्रयत्न करना चाहिए, ऐसा उसे लगता था।\n   नागपुर नगर के मध्य में एक छोटासा दुर्ग है। उसे “सीताबर्डी’’ का किला कहते हैं। उन दिनों में उस किले पर अंग्रेजों का ध्वज फहरता रहता था। उसे देखकर केशव को बडी पीडा होती थी। वह अपने मित्रों से कहता था, “यह अंग्रेजों का झंडा हमें वहां से उखाड फैंकना चाहिए। किसी प्रकार यह सीताबर्डी किला हमें जीतना चाहिए और वहां पर भगवा ध्वज लहराना चाहिए।’’\n   एक मित्र ने कहा - “किसी प्रकार यदि हम भीतर पहुंच जायं तो वहां के अंग्रेज सैनिक को मारकर या भगाकर, हम किला जीत सकते हैं।’’\n   “परन्तु हम वहां पहुंच कैसे पायेंगे?’’ दूसरे ने शंका उपस्थित की।\n   तीसरे ने उपाय बताया, “क्यों न हम सुरंग खोदें? जमीन के भीतर ही भीतर से मिले में पहुंचने का मार्ग तैयार किया जाय।’’\n   “चलो, हम अभी प्रारंभ करें। अच्छें काम में सुस्ती नहीं होनी चाहिये।’’\n   जहां ये बालक खेला करते थे उसके पास में ही वझे गुरुजी का मकान था। उसका बहुत बडा आंगन था। चारों और परकोटा खींचा हुआ था। वझे गुरुजी के घर के लोग बाहरगांव गये हुए थे। जब वझे गुरुजी पाठशाला जाते थे, तब बाडे में सब सुनसान रहता था।\n   वही स्थान योग्य माना गया। सबने अपने-अपने घर से खुदाई करने का सामान लाया। कोई कुदाली ले आया तो कोई फावडा। कोई सब्बल तो कोई टोकनियां उठा लाया।\n   बाल देशभक्तों को यह कार्य चुपचाप चलने लगा। वझे गुरुजी के घर के आंगन में एब बडा भारी गढ्ढा निर्माण हो गया। शाम को वझे गुरुजी घर आये, तब बालकों का यह उद्योग देखकर चकित रह गये। उन्होंने एक-दो को एक ओर बुलाकर पूछा कि ये सब क्या हो रहा है? किसलिए हो रहा है? तब उन बालकों ने अत्यंत सरलता से अपनी सब योजना बतायी। उन छोटे-छोटे बालकों को भोली कल्पनाएं सुनकर वझे गुरुजी को हंसी आयी। परंतु बालकों की तेजोमय आकांक्षाएं देखकर आनंद भी हुआ। उन्होंने सब बालकों को एकत्रित कर पास में बिठाया और ठीक ढंग से समझाया। केशव उन सब बालकों का अग्रणी था। उन्होंने केशव की विशेरू रूप से सराहना की और उसे आशीर्वाद दिया- “तुम आगे चलकर देश की उत्तम सेवा करोगे।’’"}, {"person": "", "title": "अंग्रेजी राज का नमूना", "text": "भेद उत्पन्न करने की अंग्रेजों की नीति थी। लोगों में आपसी झगडे लगा देना और खुद उसका लाभ उठाना, ऐसी उनकी रीति थी। इसी दुष्ट हेतु को मन में रखकर अंग्रेजों ने सन् 1905 में बंगाल प्रान्त के दो भाग करने का निश्च य किया। बंगाल प्रान्त के नेताओं ने इसके विरूद्ध आम जनता को जागृत किया। सब लोग क्रुद्ध हो गये। सभाएं होने लगीं। जुलूस निकलने लगे। घोषणाएं होने लगीं, “नहीं, हम बंगाल के टुकडे नहीं होने देगे। यह केवल बंगाल का प्रश्नज नहीं हैं, सम्पूर्ण देश का प्रश्नन है। वंदेमातरम्। भारत माता की जय।’’\n   इस प्रकार के विचार सुनकर और घोषणाएं सुनकर, अंग्रेज अधिकारी चिढने लगे। वे जुल्म ढाने लगे। जबरदस्ती करने लगे। अन्यायपूर्ण आदेश देने लगे। उन्होंने कहा कि, “जो भी भारत माता की जय कहेगा, उसे कडी सजा दी जायेगी।’’\n   परन्तु देशभक्ति की लहर अंग्रेजों को रोके रुकी नहीं। वह सुदूर ग्रामों एवं नगरों में पहुंची। भावनाशील केशव उससे बहुत प्रभावित हुआ।"}, {"person": "", "title": "सीमोल्लंघन  1", "text": "सन् 1907 ईसवी के अक्तूबर मास की घटना है। सर्वत्र लोकमान्य तिलक के भाषण गूंज रहे थे। स्वदेशभक्ति की हवा देश भर में बह रही थी। ऐसे वातावरण में विजयादशमी को अर्थात् दशहरे के त्यौहार पर, केशव अपने चाचा श्री आबाजी हेडगेवार के पास रामपायली में पहुंचा।\n   केशव की विशेषता यह थी कि वह जहां भी जाता था, अपने समवयस्कों को बहुत प्रभावित करता था। वे सब अल्पकाल में ही उसके मित्र ही नहीं, अनुयायी बन जाते थे। रामपायली में भी यही हुआ। बहुत बडी संख्या में उसने वहां मित्र जुटा लिये। सबसे विचार-विनिमय करने के बाद, उसने दशहरा मनाने के संबंध में एक विशेष योजना बनायी।\n   महाराष्ट्र में दशहरे का त्यौहार विशेष ढंग से और बडे उत्साह से मनाया जाता है। उस दिन नये कपडे पहनकर सब लोग गांव की सीमा के बाहर जाकर “सीमोल्लंघन’’ करते हैं। वहां पर शमीपूजन होता है। रावण का पुतला जलाया जाता है। शमी और आपटा वृक्ष के पत्तों को उस दिन सोना कहते हैं। जैसे सचमुच रावण को मारकर लंका से सोना लूटकर लाया हो, इस ढंग से, सब लोग घर-घर जाते हैं, बडों के पैर छूते हैं, उन्हें “सोना’ देते हैं और मिठाईयां खाते हैं।"}, {"person": "", "title": "सीमोल्लंघन  2", "text": "रामपायली में दशहरे के दिन शाम को, जब लोक सीमोल्लंघन के लिए जाने लगे तब उनके साथ केशव भी था और उसके मित्र भी थे। नित्य की प्रथा के अनुसार जब शमीपूजन हुआ और लोग रावण के पुतले की ओर बढने लगे तब केशव जोर से गरज उठा, “वंदेमातरम्!’’ एकाएक वहां का वायुमंडल मानों बदल गया। सब लोग अपने अंतःकरण में नवचेतना का अनुभव करने लगे। सामने एक छोटासा टीला था। केशव उसपर जाकर खडा हुआ और सबाके संबोधित कर उसने कहा -\n   “आज हमें अनेक प्रकार की सीमाओंने कसकर बांध रखा है। उन्हें पार करना हमारा कर्तव्य है। हमे आज पारतंत्र्य, कायरता, अज्ञान और निपट स्वार्थ ने घेर रखा है। इस घेरे को हमें तोडना होगा। रावण प्रतिनिधित्व करता है अन्याय का, जुल्म-जबरदस्ती का, क्रूर साम्राज्यवाद का, और कुटिल राज्यकर्ताओं का। उसे हमें जलाना होगा। यह पवित्र देशकार्य है, देवकार्य है। बोलिये “वंदेमातरम्! भारतमाता की जय!’’\n   सब लोगों में आवेश आ गया। बालक और किशोर तेजी से आगे बढे। “रावण’’ को तोडा, फोडा तथा जलाया गया। प्रभु रामचंद्र और भारत माता की जय-जयकार करते हुए सब लोग अपने-अपने घर लौटे।\n   इस प्रकार उस वर्ष रामपायली की जनता को केवल पेड के पत्तों का नहीं, नव-विचारों का “सुवर्ण’’ प्राप्त हुआ। उस वर्ष रामपायली की जनताने पुरानी सीमाएं लांघकर वास्तव में सीमोल्लंघन किया।"}, {"person": "", "title": "वंदेमारतम्  1", "text": "अंग्रेजों ने देशभर में तरह-तरह के अन्यायपूर्ण कानून लागू किये थे। यहां तक कि शालाओं में पढनेवाले कोमल विद्यार्थियों को भी उन्होंने बंधनों में जकडने से छोडा नहीं था। लोकमान्य तिलक जैसे महापुरुषों के व्याख्यान सुननेपर विद्यार्थियों को मनाही थी। देशभक्ति के विचारों का प्रचार करनेवाला समाचारपत्र पढना उनके लिए मना था। पूरा राष्ट्रगीत गाना तो दूर की बात, विद्यार्थी केवल “वन्देमातरम्’’ भर कह दें तो वह भी भारी अपराध माना जाता था। इन पाबन्दियों को तोडने पर विद्यार्थियों को बेतों से मार पडती थी तथा उन्हें अन्य सजाएं भी दी जाती थीं।"}, {"person": "", "title": "वंदेमारतम्  2", "text": "उस समय केशव की आयु केवल चौदह वर्षों की थी। वह नागपुर के नील सिटी हायस्कूल का विद्यार्थी था। अंग्रेज अधिकारियों की अन्यायपूर्ण करतूतें वह आये दिन सुनता था और उसके हृदय में तूफान उठता था। फलस्वरूप उसने अपने मित्रों को जुटाकर एक योजना बनायी। हो-हल्ला मचाये बिना, हर कक्षा के प्रमुखों तक बात पहुंची, और उन्होंने अपने साथियों को बतायी। सबने दृढता के साथ निश्चयय किया- “हां, ऐसा ही होगा।’’\n   शाला-निरीक्षक अधिकारी निरीक्षण कार्य के लिए विद्यालय में आनेवाले थे। सर्वप्रथम वे केशव की कक्षा में आये। उन्होने दरवाजे में पैर रखा ही था कि सब विद्यार्थी उठ खडे हुए और उन्होंने एक स्वर में कहा- “वंदेमातरम्।’’ तब दूसरी कक्षा भी ललकार उठी- “वंदेमातरम्।’’ फिर हर कक्षा से “वंदेमातरम्’’ की गर्जना होने लगी। संपूर्ण पाठशाला में यही ध्वनि गूंजने लगी, “वंदेमातरम्’’\n   शाला-निरीक्षक का कार्य वहीं रुक गया। अधिकारी क्रोध के मारे आग-बबूला हो गये। वे झल्लाये- “इस बेवकूफी की जड में कौन है? पता लगाओ। सबको कडी सजा दो। यह सब बर्दाश्त नहीं किया जा सकता।’’ शालासंचालक घबरा गए त-त-प-प करने लगे। जी हुजूर, जी हुजूर करने लगे। उन्होने मुख्याध्यापक से कहा- “कौन है इसकी जड में पता लगाओ। यह सब बर्दाश्त नहीं किया जा सकता। अपराधी को कडी सजा दी जावेगी।’’ आंखों से अंगारे बरसाते हुए निरीक्षक महोदय चले गये।"}, {"person": "", "title": "वंदेमारतम्  3", "text": "मुख्याध्यापक ने शिक्षकों से कहा “कौन है इसकी जड में पता लगाओ। यह सब बर्दाश्त नहीं किया जा सकता। अपराधी को कडी सजा दी जावेगी।’’ मुख्याध्यापक महोदय हाथ में बेंत लेकर सबदूर घूमने लगे। हर कक्षा से शिक्षक हर विद्यार्थी से पूछने लगे। “सच बताओं, किसने कहा सब बवंडर खडा किया, इसके मूल में कौन है?’’\n   शिक्षकों ने हर प्रकार से प्रयत्न किये। डराया, धमकाया, ललचाया, पुचकारा, थप्पडें मारीं, बेंत मारे, परन्तु किसी ने भी भेद नहीं खोला। किसी ने भी अपने नेता का नाम नहीं बताया। अन्त में शिक्षक हताश हो गये। मुख्याध्यापक कहने लगे, सबको स्कूल से निकाल दिया जावेगा। तब “वंदेमातरम्’’ की घोषणाएं देते हुए विद्यार्थी शाला छोडकर चले गये। मुख्याध्यापक महोदय कठोर भाषा बोलने लगे तब विद्यार्थियोंने विद्यालय में जाना बंद कर दिया।\n   उस समय देश की परिस्थिति ऐसी थी कि यह विद्यार्थियों का निश्चकय अधिक काल टिक न सकता था। पालकों पर और पिताओं पर दबाव आने लगा। अधिकारियों ने हर प्रकार की चालबाजी का अवलंब करते हुए, पालकों को अपने पाल्यों को क्षमा मांगकर विद्यालय में भेजने के लिए बाध्य किया। एक-डेढ मास के बाद प्रायः सब विद्यार्थी फिर से विद्यालय में जाने लगे। अर्थात् केशव का अपवाद था। केशव उस शाला में नहीं गया। केशव ने कहा, “मैने कोई अपराध नहीं किया है। मैं क्षमा नहीं मांगूगा। मौखिक माफी भी नहीं मांगूंगा।’’"}, {"person": "", "title": "ऐसे शासन को उखाड फैंको 1", "text": "इस घटना के बाद कुछ दिन तक केशव नागपुर में ही रहा। अडोसी-पडोसी और नाते-रिश्ते के लोग उसे शाला में जाने का उपदेश देने लगे। एक ने कहा- “उसमें कौनसी बडी बात है? बस! माफी मांग लो, और शाला में जाने लगो।’’\n   केशव ने कहा- “क्यों? मैं माफी क्यों मांगे? मैने कौनसा अपराध किया है?’’ वे महोदय बोले, - “क्यों? तुमने वंदेमातरम् नहीं कहा? औरों को कहने के लिए नहीं सिखाया? यह अपराध ही तो है।’’ केशवने कहा- क्या, अपनी मां को प्रणाम करना भी कभी अपराध हो सकता है माना है? ’’,  उक्त महोदय ने कहा - “जी हां, जब शासन ने उसे अपराध मन है, तब वह अपराध ही है।’’ तब केशव ने दृढता के साथ खनकती हुई वाणी में कहा- “मैं ऐसे शासन को नहीं मानता। ऐसा अन्यायी शासन हमें उखाड फेंकना होगा।’’\n   केशव के वे तेजस्वी शब्द सुनकर वे महोदय देखते ही रह गये। वहां पर जो भी लोग खडे थे, सब मन ही मन घबरा गये।"}, {"person": "", "title": "ऐसे शासन को उखाड फैंको  2", "text": "केशव को कुछ दिनों के लिए उसके काका के पास रामपायली भेज दिया गया। वहां पर एक दिन एक सज्जन उसे कहने लगे- “बेटा, तुम तो अभी बहुत छोटे हो। इस उम्र में तुम्हें पढाई में ही ध्यान जुटाना चाहिए। इस कच्ची आयु में यह देशभक्ति का उद्योग तुमने क्यों अपनाया हैं?’’\n   केशव ने उन्हें तपाक से जबाब दिया, “आपने इस उद्योग को अपनाया नहीं है, इसलिए यह मुझे करना पड रहा है। शिक्षा प्राप्त कर लेने के बाद, कितने लोग देशहित का ध्यान रखते हैं? आपकी शिक्षा तो पूरी हो गयी है?  आपकी उम्र भी पकी है। फिर आप क्यों नहीं देशसेवा का व्रत लेते? यदि आप इस कार्य को करने का बीडा उठाते हैं तो मैं भी विद्यालय की शिक्षा पूरी करने का वादा करता हूं।’’\n   उक्त सज्जन निरुत्तर हो गये। उन्होंने जाना कि यह किशोर असामान्य है। उसे हम कितना भी समझायें वह अपनी जिद नहीं छोड सकता।"}, {"person": "", "title": "धमाका", "text": "एक दिन छोटे से रामपायली में बहुत बडी धूम मची। रात्रि का समय था। नौ बज रहे होंगे। पुलिस थाने में सिपाही लोग कुछ सुस्ताये, कुछ मस्ताये, इधर-उधर की गप्पें हांक रहे थे। तब एकाएक धमाका हुआ। धडाड-धम् की आवाज से सब लोग चौंक उठे।\n   सिपाही घबराये कि क्या हुआ, और कहां हुआ? आसपास के घरों में रहनेवाले भयचकित नेत्रों से झांकने लगे कि क्या हुआ? कहां हुआ? पुलिस के अधिकारी आ पहुंचे। दौडधूप शुरू हो गयी। निरीक्षण-परीक्षण आदि का दौर चलने लगा। पुलिस थाने की बाहरवाली दीवार में एक छेद हो गया था। पास में ही नारियल की खपच्चियां पडी थीं। वहां पर बारुद की गंध फैल रही थी। कुछ छोटी कीलें और कांचे के टुकडे बिखरे पडे थे।\n   कानाफूसी होने लगे। दबी आवाज में लोग बोलने लगे। उस छोटे से गांव में वही एक आमचर्चा का विषय हो गया।\n   “क्यों भाई, कल रात एकाएक धमाका कैसे हुआ? आसपास के जंगलों में कोई शिकारी आये थे क्या’’\n   “अजी, जानते नहीं हो? इतना गजब हुआ और आपको पता तक नहीं?  कल रात्रि किसी ने पुलिस थाने की दीवार पर ही बम फेंका। पुलिस अधिकारियों ने बहुत खोजबीन की, पर पता नहीं लगा।’’\n   “मतलब यह कि हमारी रामपायली में भी क्रांतिकारियों का कार्य चल रहा है।’’ “अजी, धीरे से बोलिये। कोई सुन लेगा तो हम पर भी व्यर्थ में संकट आ सकता है।’’\n   चारों ओर भय छा गया। लोगों ने एक-दूसरे से मिलना-जुलना, बोलना बंद कर दिया। पुलिस के अधिकारियों ने कुछ पकड-धकड की। कुछ लोगों को मारा-पीटा भी। परंतु वे कोई भी सुराग नहीं पा सके।\n   परंतु बिना किसी के कहे, केशव के चाचाने, अर्थात् आबाजी हेडगेवार ने यह समझ लिया कि यह कार्य अपने भतीजे का ही है। पुलिस के अधिकारियों के मन में शंका उत्पन्न होने के पूर्व ही आबाजी ने केशव को चुपके से नागपुर भेज दिया। थोडे ही दिनों में केशव ने नागपुर भी छोडा। डाक्टर बालकृष्ण शिवराम मुंजे से परिचयपत्र लेकर वह यवतमाल पहुंचा।"}, {"person": "", "title": "यवतमाल के विद्यागृह में   1", "text": "विदर्भ प्रान्त का यवतमाल नगर उन दिनों देशभक्तों का एक महत्वपूर्ण केन्द्र था। लोकनायक बापूजी अणे यवतमाल में ही रहते थे। डा. मुंजे का पत्र लेकर केशव, बापूजी आणे के पास पहुंचा और उन्हीं के घर रहने लगा। उन्हीं की सूचना के अनुसार वह वहां की राष्ट्रीय पाठशाला में जाने लगा।\n   यवतमाल में बाबासाहब परांजपे राष्ट्रीय पाठशाला के संचालक थे। उनके त्यागमय तथा सेवामय जीवन के कारण जनता ने उन्हें तपस्वी की उपाधि दी थी। इस पाठशाला के लिए परांजपेजी ने गांव-गांव तथा घर-घर घूमकर चंदा इकट्ठा किया था। अनेक छोटे-बडे किसान, फसल आने पर, अनाज के बोरे उनकी पाठशाला के लिए भेजते थे। राष्ट्रसेवा का ध्येय हृदय में रखनेवाले कुछ विद्याविभूषित युवक भी वहां जुट गये। वे बिना कुछ वेतन पढाते थे। उस पाठशाला में विद्यार्थियों को मानवता का पाठ मिलते थे। वहां सच्चा धर्म सिखाया जाता था। जिससे मनुष्य सुशील बने और उसका जीवन सार्थ हो जाय ऐसी शिक्षा वहां दी जाती थी। उसका नाम था “विद्यागृह’’। केशव ने उस पाठशाला में प्रवेश पाया।"}, {"person": "", "title": "यवतमाल के विद्यागृह में   2", "text": "पाठशाला का समय ग्यारह से पांच का था। परंतु बापूजी आणे के घर दोपहर का भोजन जरा देर से बनता था। अतः कई बार केशव को बिना भोजन किये ही पाठशाला में जाना पडता था। परंतु केशव सदा हंसमुख रहता था और हर कार्य उत्साह से करता था। पिछले दो वर्षों में उसका अध्ययन खण्डित हुआ था, उसकी पूर्ति के लिए उसे अधिक पढाई करना आवश्यक था। अतः वह रात्रि में बहुत देर तक पढाई करता रहता था। तथापि हर प्रभात और शाम को वह नियमित रूप से व्यायामशाला में जाता था। राष्ट्रीय विचारों की प्रेरणा देनेवाले समाचारपत्र वह नित्य पढता था।"}, {"person": "", "title": "यवतमाल के विद्यागृह में   3", "text": "बाबासाहब परांजपे जैसे श्रेष्ठ पुरुष के सहवास के फलस्वरूप केशव की हृदयवाटिका में सद्गुणों के सुगंधी फूल खिलने लगे। उस पाठशाला के सब शिक्षक मनोयाग से पढाते थे। परिणाम यही होता था कि विद्यार्थी भी दिल लगाकर पढते थे। अतः उस पाठशाला की कीर्ति सर्वत्र फैलने लगी। गांव-गांव से लोग उसे सहायता देने लगे। जो धन नहीं दे सकते थे, वे धान्य देते थे। विद्यार्थियों की संख्या हर दिन बढने लगी। वह पाठशाला राष्ट्रीय जागरण का केन्द्र बन गयी। अनेक पालकों ने अपने पाल्यों को शासकीय पाठशाला से निकालकर इस पाठशाला में भरती किया।\n   अंग्रेज अधिकारियेां की आंखों में पाठशाला की यह प्रगति बहुत खटकने लगी। अंग्रेजों का दमनचक्र इस पाठशाला के विरुद्ध चलने लगा। जिनके बच्चे उस पाठशाला में जाते थे, उन्हें सताया जाने लगा। तपस्वी बाबासाहब परांजपे पर हरतरह के बंधन लादे गये। उनका भाषण देना अपराध हो गया। अन्य शिक्षकों को भी डराना-धमकाना शुरु हुआ। तपस्वी बाबासाहब परांजपे तथा उनके सहकारी कार्यकर्तागण बहुत दिनों तक इन सब संकटों से दृढता के साथ लडते रहे। अन्त में सन् 1909 की अप्रैल में वह पाठशाला बंद हो गयी। तब केशव को यवतमाल छोडना पडा। परन्तु उसने धीरज नहीं छोडा। पुणे जाकर अपनी शिक्षा पूर्ण करने का उसने निश्चगय किया। वह पुणे पहुंचा और दो मास तक जगद्गुरु श्रीशंकराचार्य के मठ में रहा। वहां पर उसने रात-दिन-पढाई की। परीक्षा के लिए वह अमरावती गया। उसने भलीभांति शालान्त परीक्षा उत्तीर्ण की।"}, {"person": "", "title": "डाक्टर बनने का निश्चय  1", "text": "शालान्त परीक्षा अच्छी प्रकार से उत्तीर्ण कर केशव जब नागपुर आया, तब सब लोग उसके हृष्टपुष्ट शरीर से, तेजस्वी मुद्रा से तथा देशभक्तिपूर्ण विचारों से, प्रभावित होने लगे। वह जहां भी जाता, उससे बडी आयु के लोग भी उसका आदर करते थे। अतः सब लोग उसे केशवराव कहने लगे।\n   केशवराव के घर बहुत ही गरीबी थी। उनके मन में आगे पढने की बहुत इच्छा भी थी, परंतु धन के अभाव में वह सब असंभवसा लग रहा था। जहां प्रतिदिन के भोजन के भी लाले पड रहे थे, वहां पढाई के लिए भला कहां से पैसे प्राप्त हो सकते थे?\n   परंतु जहां इच्छा तीव्र होती है, वहां आपही आप रास्ता निकल आता हैं। महापुरुष अपनी देह से नहीं अपने मन से जीते हैं। जिसने सामने कुछ ध्येय रहता है और जिसके पास मन की दृढता रहती है, वह पेट के लिए रुखी-सूखी भी मिल जाय, तो आनंद से अपने मार्ग पर बढता चला जाता हैं। मुठ्ठीभर चना और लोटा भर पानी मिलजाय तो उसके लिए वह पर्याप्त रहता है। उन दिनों में केशवराव की स्थिति ऐसी ही थी।\n   नागपुर की एक पाठशाला में वे अध्यापन का कार्य करने लगे। पाठशाला के अतिरिक्त भी वे बच्चों को पढाते थे और कुछ अधिक धन प्राप्त कर लेते थे। इस ढंग से वे कुछ प्रमाण से अपने परिवार की आर्थिक सहायता कर रहे थे और कुछ प्रमाण में अपनी आगे की पढाई के लिए पैसा जुटा रहे थे।"}, {"person": "", "title": "डाक्टर बनने का निश्चेय  2", "text": "स्वयं का पेट के लिए वे अवश्य कमाई कर रहे थे, पर पेट पालना ही उनका ध्येय नहीं था। धीरे-धीरे उनके मन में उनका जीवनध्येय आकार ले रहा था। वे अपने देश की परिस्थिति के संबंध में सोचने लगे थे।\n   यद्यपि वे छोटे से घर में रहते थे, और पुराने नागपुर की संकरी गलियों में घूमते थे, फिर भी उनका मन ऊंची उडानें भर रहा था। वे व्यथित अवश्य थे, परन्तु अपने परिवार की निर्धनता की अपेक्षा देश की निर्धनता का उन्हें अधिक दुःख था। नवयुवक केशवराव स्वतंत्र भारत के स्वप्न देख रहे थें अपना देश स्वतंत्र करने के लिए कौन से प्रयत्न किये जांय, इसका वे चिंतन कर रहे थे। उन्हें चार दीवारों के भीतर पढाना नहीं था। सम्पूर्ण देश को पढाना था।\n   इन दिनों लोकमान्य तिलक के अनुयायी डाक्टर बालकृष्ण शिवराम मुंजे ने उन्हें अनेक प्रकार से सहायता प्रदान की तथा उन्हें उत्तम मार्गदर्शन किया। उनसे विचार-परामर्श करने के उपरान्त केशवराव ने आंग्लवैद्यक की शिक्षा प्राप्त करने का, तथा डाक्टर बनने का निश्च्य किया। मुंजे महोदय से परिचय-पत्र लेकर वे उस हेतु शीघ्र ही कलकत्ता पहुंचे।"}, {"person": "", "title": "वंग भूमि  1", "text": "बंगाल की भूमि बहुत पवित्र है। वह चैतन्य महाप्रभु की भूमि है। उसी भूमि का कण-कण गंगाजल से धुला हुआ है। उस भूमि के कण-कण से “हरि बोल’’ की प्रतिध्वनि गूंजती रहती है। उस भूमि के हर बालक को महिषासुरमर्दिनी, काली माता के आीशष प्राप्त हैं। वर्तमान काल में श्रीरामकृष्ण परमहंस ने उसी प्रदेश में ईश्व्रभक्ति की नींव खडी की। स्वामी विवेकानंद ने उसी पर विश्वरविजयी हिन्दू धर्म का प्रासाद खडा किया। अद्भूत मंत्रशक्ति से युक्त वंदेमातरम् गीत लिखने वाले बंकिमचंद्र चट्टोपाध्याय इसी भूमि में पैदा हुए। द्विजेन्द्रलाल राय जैसे नाटककार भी बंगाल में ही निर्माण हुए। ईश्व्रचंद्र विद्यासागर, राजा राममोहन राय, विपिनचंद्र पाल, सुरेन्द्रनाथ बॅनर्जी, केशवचंद्र सेन, अरविन्द घोष, रवीन्द्रनाथ ठाकुर जैसे अनेक विद्वानों की और सेवाव्रती महापुरुषों को प्रेरणा देनेवाली यह भूमि है।"}, {"person": "", "title": "वंग भूमि  2", "text": "जब केशवराव बंगाल में गये, तब उनके मन में बंगाल के विषय में महान आदर की भावनाएं विद्यमान थीं। वे केवल आंग्लवैद्यक पढने के लिए कलकत्ता नहीं पहुंचे। उन्हें केवल मानवदेह के रोग दूर नहीं करने थे। इस हिन्दुस्थान देश के प्राचीन स्वामी क्यों अपना प्रभुत्व खो बैठे हैं? क्येां वे दुर्बल हो गये हैं? क्यों उन्होंने दुनिया भर के दुर्गुण बटोर लिये हें? इन दुर्गुणों को निकालकर उनके स्थान पर सद्गुण प्रस्थापित करने का क्या उपाय हो सकता है? इन सब प्रश्नोंउ का उत्तर मुझे बंगाल के वातावरण में प्राप्त होगा, ऐसा उन्हें लगता था। उस सुजलाम्, सुफलाम्, वंगभूमि की ओर, निसर्गरमणीय वंगभूमि की ओर, केशवराव इसी दृष्टि से देखते थे।\n   केशवराव ने शीघ्र ही कलकत्ता नगर का कोना-कोना छान डाला। वे बंगाल के सब तीर्थक्षेत्रों में हो आये। वहां के अनेक महापुरुषों से उन्होंने बडी नम्रता से भेंट की। बम बनानेवाले क्रान्तिकारियों के पास भी वे पहुंचे और आत्मशक्ति के पाठ पढानेवाले महात्माओं के चरणों में भी वे लीन हुए। अनेक समाचारपत्रों के संपादकों के साथ उनकी घनिष्ठता थी। वहां के प्रमुख समाजधुरीणों के साथ उनकी नित्य चर्चा होती थी। विभिन्न सभाओं के भाषण वे ध्यान से सुनते थे। छोटे-बडे जुलूसों में वे उत्साह के साथ भाग लेते थे। बहुत ही शीघ्र वे वंगभूमि के वातावरण में घुलमिल गये। वे बंगाल की भावना से समरस हो गये। बंगाल की हर बात पर वे प्रेम करने लगे। अल्पकाल में ही बंगाल भाषा उन्होंने सीखी और बडी सहजता से बंगला बोलने, लिखने लगे।"}, {"person": "", "title": "भोजन की व्यवस्था", "text": "केशवराव ने कलकत्ता के नेशनल मेडिकल कॉलेज में प्रवेश प्राप्त किया। विदर्भ प्रान्त के रहनेवाले अनेक तरुण वहां पढते थे। उनकी सांपत्तिक स्थिति अच्छी थी। कुछ विद्यार्थियों ने मिलकर एक पूरा मकान किराये पर ले रखा था। केशवराव के मधुर स्वभाव के कारण उन सब से उनकी गहरी मित्रता हो गयी। उन्होंने केशवराव की व्यवस्था अपने निवास में बिनामूल्य कर दी।\n   भोजन के लिए वे एक भोजनालय में जाते थे। यह चिंता उन्हें कुरेद रही थी। कि दो-एक मास तो मैं भोजन शुल्क दे पाऊंगा उसके आगे क्या होगा? तब उन्हें एक तरकीब सूझी। वे अपने नित्य आहार से दुगुना-तिगुना खाने लगे। भोजनालय का स्वामी उत्तरप्रदेश का रहनेवाला था। केशवराव का हट्टा-कट्टा बदन तथा उनकी शालीनता देखकर वह बहुत प्रभावित हुआ था। वह केशवराव को आग्रहपूर्वक प्रेम से परोसता था। कुछ दिनों के बाद केशवराव ने उससे पूछा, “यहां आने-जाने में बहुत समय जाता है, मेरी पढाई में बाधा पहुंचती है। क्या, आप मेरा भोजन घर पर भेज सकेंगें?’’ भोजनालय के स्वामी ने कहा -“क्यों नहीं? अवश्य भेजूंगा। मैं स्वयम् तुम्हें यह सुझाव देने वाला था। जब तुम भोजन करते हो, आसपास के लोग तुम्हारी ओर देखते रहते हैं। मुझे डर लगता है कि तुम्हें किसी की नजर न लग जाय। नित्य के ही शुल्क में मैं तुम्हारे लिए तिगुना अन्न भेजूंगा। तुम अपना डंड-बैठक आदि व्यायाम करते रहो। मुझे तुम जैसे बलोपासक युवक बहुत प्रिय हैं। अपनी युवावस्था में मैं बहुत व्यायाम करता था।’’\n   केशवराव के निवासस्थान पर भोजन का डिब्बा आने लगा। केशवराव और उनके मित्र निवासस्थान पर ही भोजन करने लगे। मित्र-महोदय भोजन के पैसे देते थे। जब तक केशवराव कलकत्तामें थे, यह व्यवस्था निरन्तर चलती रही।"}, {"person": "", "title": "निर्भयता", "text": "एक बार, गरमी की छुट्टियों में केशवराव नागपुर आये, और वहां से यवतमाल पहुंचे। उन दिनों में यवतमाल में अंग्रेज कलेक्टर अर्थात् जिलाध्यक्ष को एक सनक थी। उसकी अपेक्षा रहती थी, कि जो भी उसके सामने से गुजरे, उसे अवश्यक समाल करें, अभिवादन करे ओर हाथ जोडकर खडा रहे।\n   शाम का समय था। केशवराव अपने मित्रों के साथ घूमने निकले। संयोगवश कलेक्टर महोदय सामने से आ रहे थे।\n   जब वे निकट आये तब डाक्टरजी के यवतमाल निवासी मित्र ने कहा, “भाई, इन्हें प्रणाम करो। यहां की ऐसी ही प्रथा है।’’\n   डाक्टरजी ने मित्र से महा, “यह कैसी प्रथा है?  नमस्कार की जबरदस्ती कैसे हो सकती है?’’\n   केशवराव बिना प्रणाम किये जब आगे बढे तब कलेक्टर महोदय के आसपास विचरनेवाले शासकीय कर्मचारियोंने उन्हें बुलाया और समझाया। “प्रणाम करो, बडे आदमी को तो प्रणाम करना ही चाहिए। उसमें तुम्हारा नुकसान क्या है?’’\n   तब केशवराव ने कडे स्वर में अंग्रेजी में कहा, “देखिए, प्रणाम जानपहचानवालों को किया जाता है। इनका मेरा परिचय तक नहीं है और न ये हमारे देश के हैं, न धर्म के। इनका लौकिक भी कुछ खास ठीक नहीं है। फिर एक बात आप लोग ध्यान में रखें। प्रणाम आदर से किया जाता है और आदर की भीख नहीं मांगी जाती। आदर जुल्म-जबरदस्ती से नहीं उत्पन्न किया जा सकता। वह तो अपने कर्तृत्व से अपनेआप प्राप्त होता है। झूठा आदर दिखाना भी पाप है।’’\n   वे सब चाटुकार सकपका गये। कलेक्टर साहब ने कहा “इस युवक की बात में कुछ सार आवश्य है। यह बाहर का दिखाई देता है। उसे जाने दो।’’"}, {"person": "", "title": "शत्रुओं को मित्र बनाने की कला 1", "text": "उस समय बंगाल में सर्वत्र क्रांतिकारियेां की गुप्त संस्थाएं चल रही थीं। तेजस्वी नवयुवक एकत्रित आते थे और जगन्माता भगवानी के सम्मुख प्रतिज्ञाबद्ध होते थे। “मैं प्राणों की बाजी लगाकर मेरा देश स्वतंत्र करूंगा। गुप्त योजनाएं बनाकर हम लोग अंग्रेज अधिकारियों का समाप्त करेंगे। हम अपनी संस्था की गुप्त बातें किसी को बतायेंगे नहीं। जो भी हमारी संस्था के साथ विश्वारसघात करेगा, वह प्राणदंड को प्राप्त होगा। मैं कभी भी व्यक्तिगत सुखों की कामना नहीं करुंगा। मैने अपना सर्वस्व भारतमाता की चरणों में समर्पित कर दिया है।’’\n   इस प्रतिज्ञा की परिपूर्ति के लिए वे बम बनाने की शिक्षा ग्रहण करते थे। कभी वे गिरी-गुफाओं में याह गहन अरण्यों में जाते थे, और वहां पर वे बंदूक तथा पिस्तौल चलाने का अभ्यास करते थे।"}, {"person": "", "title": "शत्रुओं को मित्र बनाने की कला 2", "text": "केशवराव भी एक गुप्त संस्था के सदस्य थे। एक बार उस संस्था के तीन-चार नवयुवक एक रसायनशास्त्र के प्राध्यापक के यहां गये थे। मध्यरात्रि के बाद भी उनका अभ्यास चलता रहा। उनके प्रयोग चलते रहे। जब वे लैटने लगे तब उन्होंने सीढीपर एक आदमी को सोया हुआ पाया। इनकी आहट लगते ही वह हडबडा कर उठा और भागने लगा।\n   केशवराव के मित्र उसके पीछे दौडे। थोडी ही दूरी पर उन्होने उसे पकडा और धर दबोचा। वह आदमी गिडगिडाने लगा, “भाईसाहब मैं तो नौकर हूं। पेट के लिए मुझे यह करना पडता है।’’\n   तब केशवराव ने अपने मित्रों से कहा, “छोड दो उसे। उसे मत मारो, यह समझो कि हम लोगों की चिंता करनेवाला वह एक हमारा मित्र है। उसके वहां रहने के कारण हमारी पूरी खबरें अधिकारियों के पास नहीं पहुंचेंगी। इस माध्यम को अपने वश में कर लेना ही हमें लाभदायक होगा।’’\n   उस गुप्तचर को वे मिठाई की दूकान पर ले गये। उसके पैसे से सब लोगों ने मिठाई खायी। हास्य-विनोद करते हुए सब लोग अपने घर लौटे। इस गुप्तचर ने केशवराव के पैर पकडे और कहा, “आज आपने मुझे मरने से बचाया। मुझे सदा के लिए आप अपना दास समझिए।’’\n   उन दिनों में अंग्रेज अधिकारियों ने केशवराव के लिए अनेक गुप्तचरों की नियुक्ति की थी। पता नहीं कैसे, पर केशवराव उन सबको पहिचान जाते थे। केशवराव ने भी उनका तिरस्कार नहीं किया। अपने व्यवहारचातुर्य से वे उन्हें वश में कर लेते थे। मनुष्य की परीक्षा करने में वे प्रवीण थे।"}, {"person": "", "title": "सेवा कार्य 1", "text": "हमारे देश की सबसे बडी नदियां बंगाल प्रेदश से बहती हैं। गंगा तथा ब्रह्मपुत्र कासंगम बंगाल में ही है। फिर इन दो नदियों को मिलनेवाली अनेक छोटी बडी नदियां वहां हैं। दामोदर नदी भी है। वर्षाकाल में जब इन सब नदियों में बाढ आ जाती है, तब बंगाल का जन-जीवन संकटमय हो जाता है।\n   सन् 1913 में वहां बाढ का भयानक प्रकोप रहा। सब दूर पानी ही पानी हो गया। गांव बह गये, खेत बह गये। जानवर बह गये। हजारों आदमियों की मृत्यु हुई, लाखों के घर उजड गये। राज्यकर्ता अंग्रेज थे। उन्हें यहां के लोगों के सुखदुख की विशेष चिन्ता नहीं थीं।\n   प्रांतभर में बाढ ने तहलका मचा रखा था। कलकत्ते की सडकों पर अन्नहीन, वस्त्रहीन, आश्रयहीन लोग हजारों की संख्या में घूमने लगे। घर-घर जाकर आपबीती सुनाने लगे। उनकी बातें सुनकर सैंकडों नवयुवक उन बंधुओं की सेवा करने के लिए उद्यत हुए। केशवराव उनमें अग्रसर थे। अभ्यास करना और स्वयं को पुस्तकों में बंद करना, उनके लिए असंभव हो गया। उन्हें भोजन करना कठिन हो गया। बाढग्रस्त लोगों की दुर्दशा ने उनकी नींद नष्ट कर दी। वे श्रीरामकृष्ण आश्रम में पहुंचे और उन्होंने अपने को सेवा-कार्य के लिए प्रस्तुत किया।"}, {"person": "", "title": "सेवा कार्य 2", "text": "सहायता-कार्य के लिए केशवराव सैंकडों गांवों में गये। नाव से, पैदल उन्होंने दूर-दूर की यात्रांऐ कीं। तैरकर नदियां पार करते रहे। रात-दिन कीचड में चलते रहे। गांव-गांव जाकर उन्होंने भूखों को अन्न दिया। चने, लाही, मुडी, भुजे पहुंचाए। बालकों को और वृद्धों को आधार देकर डूबने से बचाया। जो नदियों से घिरे गये थे उनके लिए छोटी-बडी नावों का प्रबंध कर उन्हें बाहर निकाला। न उन्हें स्वयं के कपडों की चिंता थी,  भोजन की, न नींद की। उन दिनों में उनके कपडे अधिकतर गीले और कीचड से सने रहते थे। बैठकर पूरा भोजन तो उन दिनों में उन्होंने कभी किया ही नहीं। चौबीस घन्टों में दो-ढाई घंटे यदि नींद के लिए मिल जाते, तो उन्हें पर्याप्त होते थे।\n   वे बडे अच्छे तैराक थे और उनके पास असामान्य शारीरिक बल था। न वे कभी थकते थे, और न हतोत्साह होते थे। वे बंगला भाषा उत्तम रीति से बोलते थे। ग्रामीणजनों की सेवा करते समय उन्होंने कभी अपने पास अहंकार को फटकने नहीं दिया। न कभी उन्होंने परोपकार की भावना से कार्य किया। वे कहते थे- “ये परकीय कहां हैं?  ये तो हमारे भाई है;  हमारे सगे हैं।’’\n   उनके साथ काम करना, एक आनंदमय अनुभव था। उनकी लगन और कार्यतत्परता देखकर उनके सब सहकारी उनके सम्मुख नतमस्तक होते थे। उन्हें वे अपना नेता मानते थे। जो भी वे कहें, सब मानते थे।"}, {"person": "", "title": "आदमी हो या हैवान?", "text": "एक दिन की बात है। मेडिकल कॉलेज के एक प्राध्यापक अनुपस्थित थे, अतः अपनी कक्षा में बैठे विद्यार्थीगण अलग-अलगगुट बनाकर अपनी रुचि के अनुसार गप्पे लडा रहे थे। कुछ विद्यार्थी प्रचलित राजनीति पर बोल रहे थे। कुछ विद्यार्थी लिख-पढ रहे थे। कुछ चुपचाप बैठे थे। उस कक्षा के एक विद्यार्थी का नाम था सुरेन्द्र घोष। वह लम्बा-चौडा, तगडा जवान था। वह एकाएक केशवराव के सम्मुख आ खडा हुआ और कहने लगा- “क्यों हेडगेवार! तुम्हारी ताकत के संबंध में लोग बहुत कुछ कहते हैं। जरा में देखू, वह कितनी है। मेरी भुजा पर जरा मुक्के तो मारो।’’\n   केशवराव ने उसे कहा- “पहले आप ही मेरी भुजा पर मुक्के मारिए, फिर मेरी बारी होगी।’’\n   घोष राजी हो गये। केशवराव ने अपनी सुगठित भुजा ऊपर उठायी और घोषबाबू के सामने की। घोषबाबू मुक्के मारने लगे। कक्षा के सब विद्यार्थी उनके आसपास जुट गये। घोषबाबू दनादन मुक्के मार रहे थे। कुशवराव को निश्च।ल देखकर पूरी ताकत लगाकर वे मुक्के मारने लगे। दस, बीस, तीस, पचास, सौ मुक्के मारे गये परंतु केशवराव ने उफ् तक नहीं किया।\n   आसपास के सब लोग चकित हो गये। वे केशवराव की भूरि-भूरि प्रशंसा करने लगे। घोषबाबू मारते-मारते थक गये परंतु केशवराव हटे नहीं।\n   अन्त में घोषबाबू ने हाथ जोडकर कहा, “अरे तुम कौन हो?  आदमी या हैवान?  तुम्हारी देह चमडे की बनी है या लोहे की?’’ सब लोग खिलखिलाकर हंस पडे। घोषबाबू ने केशवराव से हाथ मिलाये, उन्हें प्रेम से आलिंगन में कस लिया और कहा, “मान गये भाई, हम मान गये। शिवाजी के प्रदेश से जो आये हो।’’"}, {"person": "", "title": "गुंडे डरने लगे", "text": "दूसरे प्रेदशों से पढने के लिए आये हुए मेडिकल कॉलेज के विद्यार्थियों ने एक बडा मकान किराये पर लिया था। उसमें वे सब रहते थे। मुहल्ले के कुछ लोगों को, उन विद्यार्थियों का वहां रहना नापसंद था। उन्होंने कुछ गुंडों को उकसाकर उपद्रव मचाना प्रारंभ किया। रात्रि में उस घर पर पत्थर आने लगे। विद्यार्थियों में जो बडे थे, वे दूसरे ही दिन अडोस-पडोस में रहनेवाले लोगों को उनके घर जाकर मिल आये। उन्होंने उन्हें बताया, “हम आपके सहारे यहां रहते हैं, हम किसी को कोई तकलीफ नहीं देते,’’ इत्यादि। उन लोगों ने कहा- “आपसे हमें कोई तकलीफ नहीं है; पता नहीं, यह उत्पात कौन मचा रहा है और क्यों?’’ फिर दूसरे दिन भी पत्थर आये, तीसरे दिन भी आये। तब कुछ विद्यार्थी बहुत घबरा गये। एक ने कहा - “कितने बडे पत्थर हैं! किसी के सिर पर पडे तो मौत भी हो सकती है।’’ दूसरे ने कहा, - “हम लोग दूर-दूर से यहां परदेश में आये हैं, यहां किसी से झगडा मोल लेना ठीक नहीं है। पानी में रहकर मगरमच्छ से वैर नहीं किया जाता।’’\n   तीसरे ने कहा- “कहीं यह जादू का या जारण-मारण का प्रयोग न हो!  बंगाली विद्या प्रसिद्ध ही है।’’\n   चौथे ने कहा- “यदि मुहल्ले के लोग नहीं चाहते हों तो हमारे लिए यह घर छोडकर दूसरे घर में जाना ही उचित होगा।’’ इस प्रकार इस विषय को लेकर तरह-तरह की चर्चाएं होने लगीं। तब केशवराव ने कहा, “डरिए नहीं, ये काम आप लोग मुझ पर छोडिए;  मैं भी जरा देखूं, पत्थर क्यों नहीं बन्द होते?’’\n   उस रात्रि  जैसा ही पहला पत्थर आया, केशवराव दौडते हुए बहार सडक पर आये। जो भी आदमी सामने दिखाई दिया उसे उन्होने पकडा और उसकी पिटाई प्रारंभ की। वह आदमी जोर से चिल्लाया, “बाप रे!  मर गया!  बचाओ।’’ वह सुनकर मुहल्ले के बहुत सारे लोग वहां इकट्ठा हो गये। केशवराव का उग्ररूप देखकर सब ठिठके से रह गये। फिर उनमें से एक दो आदमी निकट आकर कहने लगे, “भाई साहब, यहे तो भले आदमी है, उन्हें क्यों पीटते हो? इन्होने आपका क्या बिगाडा है?’’\n   केशवराव ने मारना बंद किया। वे सभी के मध्य में आकर खडे हो गये और गरजकर बोले, “हम तुम्हारे मुहल्ले में रहते है। हमारे घर पर पत्थर आते हैं और तुम लोग कान में अंगुलियां डालें सोये रहते हो? हम क्या जानें, कहकर किनारा काटते हो?  यह सब में नही चलने दूंगा। हमारे मकानपर पत्थर आते हैं तो मुहल्ले भर भर के लोग उसके लिए जिम्मेदार हैं। तुम सब लोग जिम्मेदार हो। यदि पत्थर आते रहे तो मैं प्रतिदिन इसी प्रकार जो मिले, उसकी खूप पिटाई करूंगा।’’\n  लोग अपने-अपने घर गये। केशवराव के बल की और हिम्मत की मुहल्ले में चर्चा होने लगी। उसके बाद उस घर पर पत्थर आना बंद हो गया।"}, {"person": "", "title": "मौलाना लियाकत हुसैन", "text": "उस समय कलकत्ता में मौलवी लियाकत हुसेन नाम के एक नेता थे। उनकी आयु 60 वर्ष की थी। परन्तु उत्साह और उद्यमशीलता में वे युवकों पर भी मात करते थे। वे लोकमान्य तिलक के परम भक्त थे। केशवराव का धैर्य और उनकी तेजस्विता देखकर मौलवी लियाकत हुसेन केशवराव पर विशेष प्रसन्न हुए। एक घटना के फलस्वरूप उनमें परस्पर भाई जैसी आत्मीयता उत्पन्न हुई।\n   एक बार एक जनसभा में केशवराव उपस्थित थें। एक घमंडी वक्ता अंटसंट भाषण दे रहा था। यहां तक कि लोकमान्य तिलक के नाम के साथ उसने एक भद्द विशेषण जोड दिया। सबको वह बहुत बुरा लगा, किसी ने धीरे से कहा- “ऐसा नहीं कहना चाहिए।’’ किसी ने गर्दन हिलायी और किसी ने सिर नीचा कर लिया। परन्तु केशवराव उठे, मंच पर दौडे, और उन्होंने वक्ता के मुखपर दो तमाचे जड दिये। सब दूर हा-हा मच गयी। वक्ता के कुछ साथियों ने केशवराव को मारने के लिए हाथ उठाये पर केशवराव ने जब एक का हाथ पकडकर झटका देकर धकेला, तब वह तीन कुलांचे खाकर नीचे गिरा। उन्होने दूसरे का हाथ पकडकर ऐसा मरोडा कि वह चीं कहकर नीचे बैठ गया। तीसरे के कंधे पर जब केशवराव का एक ही मुक्का पडा तब वह दुम दबाकर भाग गया। फिर किसी की आगे आने की हिम्मत नहीं हुई और वह सभा वहीं समाप्त हो गयी।\n   मौलवी लियाकत हुसैन वहां उपस्थित थे। वे उठे, केशवराव के पास आये और उन्हें बडे प्रेम से मिले। केशवराव की पीठ थपथपाकर उन्होंने कहा, - “इसे कहते हैं - नवयुवक!  वहा भाई वहा! तुमने आज कमाल कर दिया। मैं भी तिलक महाराज का अनन्य भक्त हूं। अब इसके आगे हम एक साथ काम करेंगे।’’"}, {"person": "", "title": "अलौकिक बुद्धिमता", "text": "जब तक केशवराव कलकत्ते में थे, दोनों का सदैव साथ रहा। मौलाना लियाकत हुसैन की आयोजित सभाओं में केशवराव का भाषण अवश्य रखा जाता था। मौलाना साहब जब जुलूस निकालते थे, तब केशवराव अपने सब मित्रोंसहित उसमें सोत्साह भाग लेते थे। उस जुलूस में ऊंचे दंड पर लगा हुआ गेरुवा ध्वज हाथ में लिये, केशवराव सबके आगे चलते थे।\n   केशवराव ऐसा सब कामों में तो अग्रणी थे ही, पढाई में भी अग्रणी थें। उन्हें कभी साठ-पैसठ प्रतिशत से कम गुण नहीं मिलते थें दिनभर वे विविध उद्यगों में मग्न रहा करते थे, पर रात्रि के एकान्त में जब वे पढते तब एकाग्र होकर पढते थे। अतः सब बातों का उन्हें बहुत जल्द आकलन हो जाता था। न उनकी पढने की कोई स्वतंत्र व्यवस्था थी, न सब पुस्तकें जुटा पाये थे। परंतु पढाई में वे कभी कमजोर नहीं रहे। उनकी अलौकिक बुद्धिमता को देखकर तथा उनकी विशाल कार्यक्षमता का अनुभव कर, उनके सहपाठी चकित होते थे। यथाकाल केशवराव डाक्टरी की परीक्षा उत्तम रीति से उत्तीर्ण हुए।"}, {"person": "", "title": "राष्ट्र सर्वतोपरी 1", "text": "मेडिकल कालेज के प्राचार्य के पास ब्रह्मदेश के एक अस्पताल के संचालक की चिठ्ठी आयी थी। उन्हें एक अच्छे डाक्टर की आवश्यकता थी। चिठ्ठी पढते-पढते प्राचार्य महोदय के मन में सर्वप्रथम केशवराव का ही नाम आया। उन्होंने तुरन्त केशवराव को बुलवाया। उनके आते ही चपरासीने दरवाजे का परदा उठाया। केशवराव ने नम्रता से पूछा, “महोदय, क्या मैं आ सकता हूं?’’\n   प्राचार्य ने सानंद कहा, “आइये, आइये हेडगेवारीजी, बैठिये। अनेक उद्योग करते हुए भी मैं आपका हार्दिक अभिनंदन करता हूं और भविष्य के लिए शुभाशीर्वाद देता हूं।’’\n   केशवराव ने कहा- “महोदय, आप सब लोगों की शिक्षा-दीक्षा के कारण ही मुझ जैसा सामान्य व्यक्ति यह प्राप्त कर सका। मैं आपका बहुत कृतज्ञ हूं।’’\n   प्राचार्य ने कहा, “देखो हेडगेवार, तुम्हारे लिए एक सुवर्ण अवसर प्राप्त हुआ है। तुम बडे भाग्यशाली हो। ब्रह्मदेश के एक रुग्णालय में उत्साही कार्यकुशल डाक्टर की आवश्यकता है। वहां के संचालकों ने मुझसे पूछा है। मैं उन्हें तुम्हारा नाम सुझाता हूं।’’\n   केशवराव ने कहा, “महोदय, आप मुझे क्षमा करें, मैं वहां नहीं जा पाऊंगा।’’\n   प्राचार्य कुछ चकित हुए और कुछ नाराज भी- “यह क्या कह रहे हो? जल्दबाजी में निर्णय मत लो। सोच-समझकर उत्तर दो। ऐसा अच्छा अवसर हाथ से मत जाने दो। मुझे विश्वा स है कि तुम निर्भय युवक हो, किसी भी प्रान्त और देश में तुम जा सकते हो। मैं यह भी जानता हूं कि निजी दवाखाना चलाने के लिए आवश्यक द्रव्य तुम्हारे पास नहीं हैं। मैं जानता हूं कि इतनी अच्छी नौकरी तुम्हें अपने देश में कहीं नहीं मिल सकती।’’\n   केशवराव ने कहा- “महोदय, आप मेरे लिए वंदनीय हैं और आपके शब्द मैं शिरोधार्य मानता हूं। परन्तु मैं प्रतिज्ञाबद्ध हूं। मुझे परदेश जाने का भय नहीं है। पैसे कम मिलेगे या ज्यादा यह प्रश्नद भी मुझे सताता नहीं है। मैंने अपने आपको पहले से ही स्वदेश की सेवा में समर्पित कर दिया है। मेरी देह का कण-कण और जीवन का क्षण-क्षण उसी के कार्य के लिए खर्च होगा। मैं नौकरी कभी नहीं करूंगा। कदाचित निजी दवाखाना खोलूंगा। परंतु उसकी भी संभावना कम ही है। चारों ओर इतने काम पडे हें कि मुझे स्वयं का उद्योग करने के लिए समय ही नहीं मिलेगा।’’"}, {"person": "", "title": "राष्ट्र सर्वतोपरी 2", "text": "प्राचार्य महोदय देखते ही रह गये। वे सोचने लगे, कि यह लडका कैसी विचित्र बात करता है? पैसा कमाने के लिए समय नहीं मिलेगा?\n   उन्होने पूछा - “फिर पेट कैसा भरोगे?  औरत-बच्चों का क्या होगा?’’ केशवराव ने कहा, “ना मैने विवाह किया है, और न करने का विचार है। स्वयं के पेट के लिए मेरे ईश्वटर पर पूरा भरोसा है।’’\n   प्राचार्य ने कहा, “बेटा, अभी तुम युवक हो, तुमने दुनिया देखी नहीं है। इस आयु में हर कोई भावनाशील बनता है और आकाश में उडता है। जब कठिनाइयों से घिर जाओगे तब कोई भी साथ नहीं देगा। तब पश्चा त्ताप करोगे कि मैने घर क्यों नहीं बसाया, पारिवारिक जीवन क्यों नहीं अपनाया। उस अवस्था में कई लोग बुरी तरह से फिसलते हैं और पापों के गढे में जा गिरते हैं। मेरी ऐसी हार्दिक इच्छा है कि तुम्हारे जीवन की ऐसी दुर्दशा न हो।’’\n   “तुम्हारे हृदय में जो देशप्रेम विद्यमान है, उसे देखकर मुझे बहुत आनंद हुआ। परन्तु क्या घर गृहस्थी संभालते हुए हम अपने देश की भक्ति नहीं कर सकते?  और अपना फिर वह व्यवसाय तो जनसेवा का व्यवसाय हैं, इसके लिए घर द्वार छोडने की क्या आवश्यकता है?’’\n   केशवराव ने कहा- “महोदय, अपने देश की परिस्थिति इतनी अधिक बिगडी हुई है कि उसे सुधारने के लिए मेरे जैसे हजारों तरूण यदि अपना सर्वस्व न्यौछावर करेंगे तब ही कुछ काम बन पावेगा। उच्च विद्याविभूषित लोगों को इसमें अग्रसर होना चाहिए। नगरों में, गांवों में और वन्य प्रदेशों में नानाविध कार्य आज कार्यकर्ताओं की बाट जोह रहे हैं। भारत मां की पुकार है, त्यागी, सेवाव्रती, बंधुभावना से युक्त दृढप्रतिज्ञ कार्यकर्तागण चाहिए। माता की उस पुकार को सुनकर ही मैंने अपना जीवनपथ निर्धारित किया है।’’ इन शब्दों को सुनते हुए प्राचार्य महोदय तन्मय हो गये। उन्होंने भावगद्गद होकर कहा, “डाक्टर हेडगेवार, तुम्हारे विचार उत्तम हैं। तुम्हारे पास असामान्य गुण हैं। उनका उपयोग देश को होता रहे और तुम्हारि उन्नति होती रहे, तुम्हारे सब स्वप्न पूरे हो जायं, यही मेरी शुभकामना है।’’\n   केशवराव ने कहा, “धन्यवाद, आपके आशीर्वाद से मुझे नित्य बल मिलता रहेगा और मैं ध्येयमार्ग पर आगे बढता रहूंगा।’’\n   केशवराव ने काह, “धन्यवाद, आपके आशीर्वाद से मुझे नित्य बल मिलता रहेगा और मैं ध्येयमार्ग पर आगे बढता रहूंगा।’’\n   प्राचार्य ने कहा, “मैं तुम्हें आशीर्वाद देता हूं।’’\n   प्राचार्य महोदय को प्रणाम कर डाक्टरजी बाहर चले आये।\n   इस प्रसंग के कुछ दिनों बाद डाक्टर केशवराव हेडगेवार ने कलकत्ता छोडा और वे नागपुर आ गये।"}, {"person": "", "title": "मैं व्रतधारी हूं  1", "text": "डाक्टर हेडगेवार नागपुर में आ गये, परन्तु वे अपने घर नहीं पहुंचे। इसका प्रमुख कारण यह था कि डाक्टरजी के विविध कार्यों को उनके बडे भाई महादेव शास्त्री पूर्णतः अयोग्य एवम् अकरणीय मानते थे। वे डाक्टर साहब के मित्रों से कहते थे, “अरे, उसे कुछ कहो- समझाओ। उसे कहीं नौकरी करनी चाहिए। विवाह करना चाहिए। घर संभालना चाहिए और सख से रहना चाहिए। नौकरी नहीं करनी हो, तो कहीं छोटासा दवाखाना खोल दिया जाय। वह केवल हां कह दे, तो हम दवाखाना खोलने के लिए पर्याप्त धन कहीं से जुटा लेंगे। उसे कहो कि ये दुनिया भर के अनावश्यक काम करना छोड दे। कहीं किसी आपदा में फंस जायेगा तब उसे छठी का दूध याद आएगा। तब वे मित्र और सहकारी भाग जायेगे। देश के और समाज के काम बउे लोगों के लिए हैं। हम छोटे लोगों को इस झंझट में नहीं पडना चाहिए।’’\n   महादेव शास्त्री के विचार इस प्रकार के थे। उन्हें लगता था कि हर आदमी को सर्वप्रथम अपने परिवार की चिन्ता करनी चाहिये। उनका स्वभाव तेज था। परन्तु वे जानते थे कि केशव मेरा ही भाई है अतः उसका भी स्वभाव तेज और निश्चनयी हैं। अतः वे स्वयं डाक्टरजी से कभी कुछ नहीं कहते थे। परन्तु रिश्तेदारों से और मित्रों से नित्य कहते थे, “अरे, उस सिरफिरे को कुछ समझाओं तो सही...।’’ डाक्टरजी अपने इन बडे भाई के साथ सदा नम्रता का व्यवहार करते और न अपना कार्य छोडते थे। झगडा टालने के हेतु वे घर पर बहुत कम रहते थे।"}, {"person": "", "title": "मैं व्रतधारी हूं  1", "text": "उसी समय एकाएक नागपुर शहर में प्लेग की बीमारी फैल गयी। शहर की बस्ती छोडकर हजारों लोग खुली हवा में रहने के लिए गये। परन्तु महादेव शास्त्री ने अपना घर नहीं छोडा। लोगों ने उन्हें बहुतेरे समझाया। पर वे कहते थे, “अजी हटो, प्लेग भी कहीं हमें तकलीफ देने की हिम्मत कर सकता है?’’ डाक्टरजी ने भी उन्हें नगर छोडकर बाहर चले जाने के लिए कहा, परन्तु वे नहीं माने। अन्त में वही हुआ जो होना था। उनकी जांघों में गांठें आ गयीं। उन्हें तेज बुखार चढा। डाक्टरजी ने बहुत दौडधूप की, बहुत इलाज करवाये। परन्तु कुछ भी लाभ नहीं हुआ। महादेव शास्त्री परलोक सिधारे।\n   प्लेग समाप्त हुआ। सब लोग फिर से बस्ती में लौटे। सीतारामपन्त और केशवराव भी अपने घर आ गये। घर की अनेक चीजें चोरी हो गयी थीं। महादेव शास्त्री की अनुपस्थिति में सब उदास-सा लगता था। सीतारामपन्त पण्डिताई करने लगे। उनका विवाह हो गया। फिर नाते रिश्ते के लोग और दूर पास के वधुपिता केशवराव के बारे में सीतारामपन्त से पूछने लगे। सीतारामपन्त केशवराव से पूछने लगे। प्रारंभ में तो कशेवराव उन्हें कहते थे, “अभी विचार नहीं है। कुछ आजीविका का निश्चिटत हो जाय तो फिर देखेंगे।’’ परन्तु धीरे-धीरे पूछनेवालों की संख्या बढने लगी। कुछ लोग रामपायली पहुंचकर चाचाजी से भी मिले। हम इतना दहेज देंगें, उतना देंगें, ऐसी बाते होने लगीं। तब केशवरावने अपने बन्धु को बताया और चाचाजी को भी लिख भेजा, “मैने आजन्म देश-सेवा का व्रत लिया है। मेरे समर्पित जीवन में न निजी सुख को स्थान है और न निजी परिवार को। राष्ट्रकार्य करते समय कभी कारावास भोगना पडेगा तो कभी प्राण भी गंवाने होंगे। अन्य भी नाना प्रकार के संकट आ सकते हैं। ऐसी अवस्था में जानबूझकर किसी स्त्री का जीवन दुःखमय बनाना सर्वथा अनुचित है, ऐसा मैं समझता हूं।’’\n   इसके बाद विवाह का विषय बंद हो गया। सीतारामपन्त सौम्य स्वभाव के थे। वे डाक्टरजी पर विशेष प्रेम करते थे। वे उनपर विश्वा स रखते थे। जो भी रूखी सूखी वे जुटाते थे, उसे खाकर दोनों भाई प्रेम से रहते थे। परन्तु धीरे-धीरे डाक्टरजी के उद्योग इतने बढ गये, कि वे घर पर बहुत कम रहने लगे।"}, {"person": "", "title": "गुप्त योजना", "text": "यूरोप में महायुद्ध का जोर था। वहा स्थान-स्थान पर अंग्रेजों की पराजय हो रही थी। भारत में अंग्रेजों की सेनाएं थोडी ही थीं। अनेक क्रांतिकारी देशभक्तों ने सोचा कि यही सुनहरा अवसर है। अंग्रेजों की संकटापन्न अवस्था का हमें लाभ उठाना चाहिए। भारत की स्वतंत्रता के लिए एक साथ देशभर में प्रयत्न होने चाहिए। बंगाल में योजनाएं बनीं। विभिन्न प्रांतों के लिए कार्यकर्ता नियुक्त हुए। मध्यप्रदेश तथा विदर्भ में क्रांतिकार्य चलाने का उत्तरदायित्व डा. केशवराव हेडगेवार को सौपा गया।\nनागपुर में भाऊजी कावरे नाम के वैद्य डाक्टरजी के परम मित्र थे। दोनों एक विचार से कार्य करते थे। अपने क्षेत्र में वे सतत घूमते रहते और कार्यकर्ताओं को गुप्त रीति से जुटाते थे। विवाह प्रसंग हो, उपनयन समारोह हो, या छोटे-बडे धार्मिक उत्सव हो, वे अवश्य उनमें सहभागी होते थे। संयोजकों को हर प्रकार की सहायता देते और उस बहाने नये-नये युवकों के साथ मित्रता जोडते थे। वे उन्हें देशभक्ति की प्रेरणा देते, उनमें अंग्रेजों के विरुद्ध प्रक्षोप जगाते थे। इन प्रयासों के फलस्वरूप मध्यप्रदेश तथा विदर्भ में तेजस्वी नवयुवकों का एक अच्छा खासा गुप्तसंगठन तैयार हो गया। पर्याप्त धन भी एकत्रित हुआ। बन्दूक, पिस्तौल बनाने का छोटासा कारखाना भी चलने लगा। बस्ती से दूर घने अरण्य में जाकर बन्दूक और पिस्तौल चलाने के अभ्यास-केन्द्र भी चलने लगे।"}, {"person": "", "title": "गुप्त योजना", "text": "नागपुर से निकट कामठी नाम का स्थान है। वहां अंग्रेजों की एक महत्वपूर्ण सैनिक छावनी थी। वहां के कुछ अधिकारियों से क्रांतिकारी कार्यकर्ताओं ने बहुत से शस्त्र प्राप्त किये थे। वहां के कुछ कर्मचारियों से इन्हें अनेक महत्त्वपूर्ण वार्ताएं भी प्राप्त होती थीं। एक बार ऐसा पता चला कि किसी गाडी में बहुतसा गोला-बारूद भेजा जा रहा है। झट से क्रांतिकारियों ने योजना बनायी। वह गाडी नागपुर स्टेशन पर रोकी गयी। सेनाधिकारी गाडी पर पहुंचे। रक्षक सैनिकोंने उन्हें सलाम किया और उनका स्वागत किया। अधिकारी महोदय ने आदेश दिया। तदनुसार गोला-बारूद के कुछ बक्से नीचे उतारे गये। उन्हें मोटर में रखा गया। मोटर चली गयी। तब रेल अधिकारियेां के मन में शंका उपजी। उन्होंने पूछताछ की, ये सेनाधिकारी कौन थे? उन्होंने कुछ ही बक्से क्यों उतारे? वे बक्से कहां गये? पुलिस अधिकारियों ने बहुत खोजबीन की पर कुछ भी पता नहीं चला। लगता भी कैसे? डाक्टरजी की योजना में कभी त्रुटि नहीं रहती थी। छोटी-बडी सब बातों का वे पहले से ही पूर्ण विचार करते थे और हर परिस्थति में पर्यायी योजना तैयार रखते थे।\n   इसी समय की बात है कि कुछ लोगों को गोवा भेजा गया था। वहां पर यूरोप से एक जहाज आनेवाला था। उसमें क्रांतिकारियों के लिए भेजे गये शस्त्रशास्त्र थे।"}, {"person": "", "title": "गुप्त योजना", "text": "उस काल में हर छोटे-बडे कार्य में केशवराव, डाक्टर मुंजे से हर विषय पर चर्चा करते थे। कुछ महत्वपूर्ण प्रश्नों  पर जब उनमें मतभेद हुए, तब मुंजेजी ने उन्हें एक पत्र देकर लोकमान्य तिलक के पास पुणे भेजा। वे लोकमान्य तिलक से मिले और उनसे विविध सामाजिक एवम् राजनैतिक विषयों पर चार्चा की। तिलकजी, केशवराव के सोच-विचार के ढंग से बहुत प्रभावित हुए। उन्होंने केशवराव को तीन दिन तक अपने घर आग्रहपूर्वक रख लिया और उन्हें आशीर्वाद दिये।\n   पुणे के निकट के ऐतिहासिक महत्व के स्थान देखने के बार केशवराव शिवनेरी दुर्ग पर पहुंचे। यह छत्रपति शिवाजी महाराज का जन्मस्थान है। परन्तु वह स्थान उपेक्षित था, दुर्लक्षित था। दीवारें गिर गयी थीं। कवेल खण्डहर विद्यमान थे। उसे देखकर डाक्टरजी को बहुत दुख हुआ। उनके मन में विचार आया, “हर, हर! उस महापुरुष के जन्मस्थान की यह दुर्दशा? परन्तु इसमें आश्चोर्य की कौन बात है?  जैसी स्थिति समाज की वैसी ही उनके पूज्य स्थानों की।’’"}, {"person": "", "title": "विष भी जिसने पया लिया 1", "text": "सन् 1918 में विश्व/युद्ध समाप्त हुआ। जर्मनी की पराजय हुई। अंग्रेजों को विजय प्राप्त हुई। अब तो उनका गर्व और अधिक बढ गया। युद्ध पर गयी सारी सेनाएं भारत लौट आयीं। अंग्रेज अधिकारी भारतीय जनता के साथ उद्दण्डता का व्यवहार करने लगे। उन्होंने अन्यायापूर्ण कानून बनाये। भारत की स्वतंत्रता के लिए जो भी थोडी बहुत हलचल करता उसे अंग्रेज अधिकारी पकडते और बंदीगृह में ठूंस देते थे। अनेक पत्रकार पकडे गये। उनके समाचारपत्र बन्द हो गये। क्रांतिकारियों के नेतागण पकडे नये, गुप्त संस्थाएं लुप्त हो गयीं। बम तैयार करना तो दूर की बात, अंग्रेजों के विरोध में बोलना तब बंद हो गया। सब दूर निराशा छा गयी। समाज में लाचारी आ गयी। सब लोग बहुत डरने, घबराने लगे। पढे-लिखे लोग भी कहने लगे, “अंग्रेजों का राज हमारे लिए वरदान है। अंग्रेजों पर ईश्व र की कृपा है। उनके विरुद्ध कार्य करना व्यर्थ है।’’\n   डाक्टरजी के एक सहकारी ने उनसे कहा, “डाक्टर, यह क्या बात है कि आप जरा भी हताश नहीं दिखायी पडते। बडे-बडे बुद्धिमान भी आज रोती सूरत बनाकर हाथ पर हाथ धरे बैठे हैं। उन्होंने देशकार्य से मुंह मोड लिया है। केवल आप ही हो कि जिन पर वही धुन सवार है। आप अभी वहीं स्वराज्य का सुनहरा स्वप्न देख रहे हैं, यह कैसे?’’"}, {"person": "", "title": "विष भी जिसने पया लिया 2", "text": "डाक्टरजी ने उसे कहा, “हम लोग हमेशा कहते आये हैं कि अपयश तो यशमंदिर की नींव है। क्या यह केवल भाषण अथवा दीवार की शोभा बढानेवाला वाक्य है? क्या यह निरर्थक वाक्य है?  साध्य की अपेक्षा जो साधनोंपर अधिक प्रेम करते हैं, वे लोग अपयश पाते ही निराश हो जाते हैं। जिनकी अपने साध्य पर अडिग निष्ठा रहती है, वे कभी निराश नहीं होते। वे नये-नये मार्ग खोज निकालते हैं। नदी का प्रवाह जब चलता है तब कभी वहा पहाड फोडकर आगे बढता है, कभी पहाड को चक्कर देकर जाता है, और कभी कुछ समय के लिए उसे वलुका में गुप्त भी होना पडता है। हम लोग तो भगवान शिव के उपासक हैं। उन्होंने इतना बडा हलाहल विष पचा लिया, तो क्या हम छोटासा अपयश भी नहीं पचा पायें?’’\n   “हमें वह हजम करना होगा। हमें अपयशों के कारणों की खोज करनी होगी। नये प्रयत्नों में पुरानी त्रुटियां न रहें, इसकी चिंता हमें करनी होगी। यदि हम इय प्रकार विचारमंथन करते रहेगे, और नये-नये उद्योग करते रहेंगे, तो उन्हीं में से कोई उत्म मार्ग निकल आवेगा।’’"}, {"person": "", "title": "भविष्य की चिन्ता  1", "text": "1 अगस्त 1920 को लोकमान्य तिलक कि मृत्यु हुई। उस वर्ष इन्डियन नेशनल कांग्रेस अर्थात् भारतीय राष्ट्रीय सभा का वार्षिक अधिवेशन नागपुर में तिलक जी की अध्यक्षता में होनेवाला था। परन्तु तिलक जी नहीं रहे। अब क्या करें? एक मात्र बुद्धिमान अनुभवी तथा प्रभावी नेता चला गया। अब क्या होगा? सब लोग निराश हो गये, परन्तु डाक्टर हेडगेवार दुगुने उत्साह से अधिवेशन के कार्य में भिड गये।\nअधिवेशन के हेतु वे अनेक गांवों में पहुंचे। क्रांतिकारी आन्दोलन के समय वे इसी प्रकार प्रान्तभर में घूमे थे। उस समय सैकडों युवकों से उन्होंने जानपहचान कर ली थी। अब उनसे घनिष्ठता हो गयी। उस समय गुप्तता रखनी पडती थी। अब वे खुले आम घूम फिर रहे थे। युवकों से मिलने का तथा उनके अन्तकःकरण में देशभक्ति की ज्योति प्रज्वलित करने का कार्य डाक्टरजी को बहुत प्रिय था।"}, {"person": "", "title": "भविष्य की चिन्ता  2", "text": "डाक्टरजी की प्रेरणा से ही नागपुर के उत्साही युवकों ने एक प्रस्ताव पारित किया। तदनुसार कांग्रेस अधिवेशन के साथ ही महाविद्यालय के विद्यार्थियों का सम्मेलन निश्चिउत हुआ। गोखले उपनाम के एक उत्साही युवक ने उस कार्य का उत्तरदायित्व स्वीकार किया।\n   गोखलेजी ने अपना कार्य प्रारंभ कर दिया, परन्तु सहकार्य के अभाव में वे कुछ निराश हो गये। वे मन में बडी आशाएं लेकर नेताओं के पास पहुंचे परन्तु उन्होंने गोखलेजी को परिचयपत्र तक नहीं दिये।\n   युवक सम्मेलन को वे सब लोग नगण्य मानते थे। बडे-बडे विषय, उन पर लम्बे-चौडे प्रस्ताव, और उन पद प्रदीर्घ भाषण इन्हीं बातों की ओर सबका ध्यान था। नवी पीढी के सम्बन्ध में वे लोग उदासीन थे। भविष्य का विचार करने की किसी को फुरसत नहीं थी। अतः गोखले कुछ दुखी हुए।\n   अंत में वे डाक्टर हेडगेवार के पास पहुंचे। डाक्टरजी ने उन्हें कलकत्ता से बंबई तक और लाहोर से मद्रास तक के बडे-बडे शहरों में रहनेवाले कार्यकर्ताओं के नाम बतायें, उनके पते दिये और उनमें से अनेक को व्यक्तिगत पत्र भी डाक्टरजी ने लिखे। विविध प्रान्तों के विविध लोगों से डाक्टरजी का इतना निकट का सम्बन्ध देखकर गोखलेजी चकित हो गये। उन्होंने आखिर पूछ ही लिया, “डाक्टरजी, आपने तो यह कमाल कर दिखाया। इतना सब आपके ध्यान में कैसे रह पाता है?’’\n   डाक्टरजी ने विनोद के रूप में कहा- “क्योंकि इस कार्य हेतु मैने अपने मस्तिष्क में एक कार्यालय खोल रखा है।’’\n   गोखलेजी ने कहा- “डाक्टरजी, में आज तक बडे-बडे नेताओं से मिला, परन्तु न किसी ने ऐसी तत्परता दिखायी और न ही किसी ने मेरा मार्गदर्शन किया इतना आत्मीयता और लगन, मुझे अन्यत्र कहीं नहीं दिखायी दी।’’\n  डाक्टर साहब हंस भर दिये।"}, {"person": "", "title": "न्यायालय में", "text": "सन् 1921 में अपने देश में असहकार आन्दोलन चला। उस कार्य के लिये डाक्टर हेडगेवार विदर्भ प्रान्त के अनेक नगरों में और कस्बों में गये। भण्डरा, खापा, केलवद, तलेगांव, देवली, वर्धा आदि स्थानों पर उनके ओजस्वी भाषण हुए। अपने भाषणों में बहुत उग्र शब्दों में वे अंग्रेजी राज की आलोचना करते थे। अंग्रेज अधिकारियों ने उन पर तरह-तरह के बन्धन लगाये। परन्तु डाक्टरजी ने उन्हें माना नहीं। उनका तूफानी दौरा चलता रहा। वे छोटे-बडे गांवों में जाकर अपने देश के प्रति अपने कर्तव्य को लोगों को समझाते रहे।\n   अन्त में अधिकारियों ने उन्हें पकडा और उनपर मुकदमा दायर किया। असहकार आन्दोलन की ऐसी पद्धत थी कि अपराध को स्वीकार कर लेना। न वकील लगाना, न पैरवी करना। परन्तु डाक्टरजी ने अपनी तरफ से वकील की नियुक्ति कर पैरवी करना ही उचित समझा।\n   नागपुर के अनेक वकीलों से डाक्टरजी के घनिष्ठ सम्बन्ध थे। वे सब उनके लिए काम करने लगे। परन्तु उन दिनों न्यायालय में स्मेली नाम का न्यायाधीश था। वह उद्दण्ड स्वभाव का था। वह वकीलों का बहुत अपमान करता था। उसका निषेध करने के लिए वकीलों ने उसके न्यायालय में काम करना बन्द कर दिया था।\n   तब डाक्टरजी ने स्वयं अपने मुकदमें का काम चलाया। डाक्टरजी के भाषणों के आधार पर अंग्रेज अधिकारियों ने उन पर राजद्रोह का आरोप लगाया था। सरकारी समाचारदाता को तथा गवाहों को पैने प्रश्नर पूछ-पूछ कर डाक्टरजी ने उन्हें अविश्वदसनीय सिद्ध किया। अन्त में न्यायालय के सामने उन्होंने कहा, - “मेरे जिन भाषणों का वृत्त न्यायालय के सामने पेश किया गया है, वह पूर्णतः गलत और विकृत है। मैने अपने विभिन्न भाषणों में जो भी विचार जनता के सम्मुख रखे हैं, वे बिलकुल सीधे-सीधे और सरल हैं। हमारा देश परतंत्र है। उसे स्वतंत्र करना हमारा ध्येय है। भारत के हर नागरिक का यह कर्तव्य है। उस हेतु उसे अवश्य प्रयत्नशील रहना चाहिए। आज के हमारे शासक दुष्टबुद्धि के हैं तथा बहुत ढोंगी हैं। मेरे विचारों को न वे समझ सकेंगे और न समझने की इच्छा रखेंगे। अंग्रेजों के कायम किये हुए न्यायालय में क्या न्याय देंगे?  वे तो न्याय-पद्धति का उपहास मात्र है। भारत में अंग्रेजों का यह राज्य न्याय पर आधारित नहीं है, पाश्वी  बल के आधारित है। देश के नागरिकों द्वारा स्वयं चलाया गया शासन ही वास्तव में शासन कहलाता है। दूसरों का शासन चोरी है, लुटेरापन हे, धोखाधडी है। मैं अपने भाषणों के द्वारा मेरे बंधुओं के मन में स्वदेश के प्रति प्रेम जगाता रहा हूं। आत्माभिमान जगाता रहा हूं। यदि आज के राज्यकर्ता इसका विरोध करते हैं, तो उन्हें समझना चाहिए कि उनके दिन अब लद गये हैं और उन्हें शीघ्र ही यहां से अपना डेरा-डंडा समेट कर जाना होगा। मैने भाषणों द्वारा मेरे देशबान्धवों को उनके अधिकारों के प्रति सजग किया है। ऐसा करना मैं अपना कर्तव्य समझता हूं।’’\n   इस आशय का डाक्टरजी का वह भाषण सुनकर न्यायाधीश स्मेली महोदय ने कहा- “आजतक के भाषणों के प्राप्त वृत्तों से भी बढकर यह तुम्हारा आज का भाषण उग्र है। तुम्हारे उग्र विचारों का अन्यत्र प्रमाण देखने की कोई आवश्यकता नहीं है।’’\n   स्मेली महोदय ने डाक्टरजी को एक वर्ष की सश्रम कारावास की सजा दी।"}, {"person": "", "title": "बिदाई", "text": "डाक्टरजी के अनेक मित्र न्यायालय के बाहर खडे थे। जैसे ही डाक्टरजी को बाहर लाया गया, वे सब पास आ गये। उन्होने डाक्टरजी को मालाएं पहनायीं तथा उनकी जयजयकार की। आसपास के सैंकडें लोग वहां जुट गये। डाक्टरजी ने उनके सम्मुख एक छोटासा भाषण दिया। उन्होंने कहा -\n   “प्रिय बन्धुओं! हम सबने देशसेवा का व्रत लिया है। यह व्रत कठिन है। बहुत बडे शत्रु से हमें सामना करना है। अतः हमें सब संकटों को हंसते हुए झेलना होगा। जब उखली में दिया सर, तो मूसलों से कैसा डर?  कारावास की क्या बात है?  समय पडनेपर हमें फांसी पर भी चढना होगा। परन्तु हम ध्यान में रखें कि ये सब हमारे साधन हैं। इन साधनों का उपयोग कर हमें स्वराज्य की प्राप्ति करनी है। कई बार मनुष्य साधनों पर ही प्रेम करते रहना है, और साध्य को भूल जाता है। हम ऐसी गलती न करें। चाहे हम कारागार में हों चाहे बाहर, हमें अपना कार्य अविरत करते रहना चाहिए।’’\n   “हम यदि दृढता के साथ अपना काम करते रहेंगे, तो निश्चि्त समझिए कि परदेशी राज्यकर्ताओं को अपना देश छोडकर जाना ही होगा। आप सब लोगों ने यहां आकर मेरे विषय में जो आत्मीयता प्रकट की है,। उसके लिए मैं बहुत कृतज्ञ हूं। अब हम लोग एक वर्ष के बाद मिलेंगे।’’\n   सब लोगों ने जोर से तालियां बजायीं, “भारतमाता की जय’’ और “डाक्टर हेडगेवार की जय’’ के नारों से आकाश गूंज उठा। डाक्टरजीने हाथ जोडकर सब को प्रणाम किया और वे सिपाहियों के साथ चले गये।"}, {"person": "", "title": "कारागार में  1", "text": "कारागार में जाने के बाद बडे-बडे नेता भी घबरा जाते हैं। जब वे बाहर रहते हैं तब तो वे सहनशीलता की और दृढ़ता की बडी-बडी गप्पें हांकते हैं, परन्तु भीतर जाने के बाद उनकी हालत बहुत नाजुक हो जाती है। कुछ लोग अधिक भावनाप्रधान बनते हैं। कुछ लोग छोटे-छोटे कारणों से चिढते हैं और नाराज होते हैं। कुछ लोगों के घर का स्मरण नित्य सताता रहता है। बाहर परोपकार और त्याग की रट लगानेवाले कई लोग भीतर जाते ही पूरे स्वार्थी और लालची बन जाते हैं।\n   डाक्टरजी इससे पूर्व कारागार में नहीं गये थे। परंतु उन्होंने कारागारों के संबंध में बहुत कुछ सुना था और पढा भी था। कारागार का कठिन जीवन जीने के लिए उनके मन की पूरी सिद्धता थी। वैसे भी उनकी वृत्ति धैर्यशाली, शान्त और विचारी थी। अतः वे अपने कारागार-जीवन में न कभी घबराये और न कभी गडबडाये। उन्होंने अपने मन का सन्तुलन कभी नहीं खोया। वे नित्य प्रसन्न रहते थे।"}, {"person": "", "title": "कारागार में 2", "text": "उनके साथ जो अन्य कार्यकर्ता थे उन्हें डाक्टरजी हर प्रकार का सहाय्य देते थे। एक सज्जन क्रोधी स्वभाव के थे। दूसरे एक सज्जन बारबार निराश हो जाते थे। डाक्टरजी उन्हें हमेशा धीरज भरी बातें कहते थे। और उनका मन अच्छी बातों में लगाते थे। वहां पर एक मुसलमान कार्यकर्ता थे। उन्होंने हिन्दुओं की गोपूजा के संबंध में आलोचना कर कुछ अपशब्द कहे। तब एक गरम खून का हिन्दू तरुण उनपर झपट पड़ा और उन्हें पीटने लगा। डाक्टरजी झट से दोनों के बीच में जाकर खडे हो गये। दोनों को उन्होंने पकडा, शांत किया और समझाया।\n   इस प्रकार की छोटी-बडी उलझनें वहां पर नित्य होती थीं। डाक्टरजी उन्हें सुलझाते थे। हर श्रेणी के, हर स्वभाव के, हर आयु के लोग वहां थे। डाक्टर साहब सब को सम्हालते थे। वे किसी की पीठ थपथपाते, तो किसी से चर्चा करते थे। किसी को भोजन कराते, तो किसी के पैर दबाते थे। डाक्टरजी की धाक कुछ ऐसी जमी थी कि दूसरों से अकडकर चलनेवाले भी उाक्टरजी के सामने नम्रता रखते थे। जेल के अधिकारी भी डाक्टरजी का बहुत मान रखते थे। डाक्टरजी की आंखों में तेज, वाणी में प्रेम और बाहुओं में बल था। इन्ही कारणों से सब उन्हें वश हो जाते थे।"}, {"person": "", "title": "कारागार में  3", "text": "फिर वे सदा प्रसन्नमुख रहते थे। उनके पास कथाएं, कहानियां, कविताएं, चुटकुले आदि का भंडार भरपूर था। उनके बोलने का ढंग आकर्षक था। अतः जहां भी वे जाते या बैठते, वहां पर प्रसन्नता बनी रहती थी।\n   कारागार से छूटते समय कुछ लोग दुबले हो गये थे। कुछ बीमार हो गये थे। दिनांक 12 जुलाई 1922 की सुबह जब डाक्टरजी की कारागृह से मुक्ति हुईं, तब उनके पुराने कपडे उन्हें बहुत तंग होने लगे।\n   किसी ने कहा, “डाक्टरजी, लगता है आप कुछ मोटे हो गये हो। देखें तो आपका वजन कितना है?’’\n   डाक्टरजी जब वजन-कांटे पर चढे तब उनका वजन पूर्व की अपेक्षा पच्चीस पौंड बढा पाया गया।\n   दूसरे एक सज्जन ने काह, “आश्च र्य की बात है! यह कैसे हुआ?’’\n   डाक्टरजी ने उत्तर दिया, “हिन्दु धर्म के अनुसार ही मेरे पेट में सब कुछ हजम करने की क्षमता है। जिनकी पचनशक्ति क्षीण थी, वे दुबले हो गये। इसके विपरीत मेरा वजन बढ गया।’’\n   इस कारावास के अनेक अनुभव डाक्टरजी अपने मित्रों को बहुत रोचक ढंग से सुनाया करते थे।"}, {"person": "", "title": "विचार-मंथन  1", "text": "कारागार के काल में डाक्टरजी ने अपने देश की विविध समस्याओं पर गहराई से विचार किया। छोटे-बडे सब कार्यकर्ताओं के साथ वे नित्य विचार-विनिमय करते रहते थे। रात्रि को कमरे बन्द होते थे। सब लोग थके-मंदे अथवा दुख में चूर होने के कारण सो जाते थे परंतु बिस्तर पर लेटते ही डाक्टरजी के सामने भारतवर्ष का समग्र इतिहास साकार हो उठता था। वे नींद नहीं ले पाते थे। दिनभर किसने क्या कहा? किसका क्या मत है? किसने कथन में कितना सत्यांश हैं, देश के उद्धार के लिए कौनसा मार्ग अपनाना चाहिए? कौनसा त्यागना चाहिए? आदि प्रश्नों  को वे अपने ही मन से परामर्श लेते रहते थे। कभी कभी तो देश-चिंतन में पूरी रात बीत जाती, परन्तु उन्हें झपकी तर नहीं लगती थी। उनके मन में विचारों का तूफान खडा होता था।\n  “....हमारे देश की परिस्थिति कितनी दयनीय है! सर्वत्र दुख और क्रन्दन। हमारी स्थिति ऐसी क्यों हुई? हमारा देश बहत बडा है। हमारे देश की जनता बुद्धिमान और शूरवीर है। हमारा धर्म श्रेष्ठ है। हमारा इतिहास प्राचीन और गौरवशाली है। फिर भी हम गुलाम क्यों हो गये? हमारा देश सैकडों बरसों से पराधीन क्यों? खैबर और बोलन के दर्रो से अफगान, पठान और मुगलों की छोटी-छोटी सेनाओं ने हमारे देश पर आक्रमण किया। अंग्रेज तो केवल व्यापार के लिए इस देश में आये थे।’’"}, {"person": "", "title": "विचार-मंथन  2", "text": "“हमारे देश की जनसंख्या बहुत बडी थी। हमारे देश में नरेश थे, उनके सेनापति थे, उनकी विशाल सेनाएं थीं। सैनिक वीर बहादूर थे। उनके पास तरह तरह के शस्त्रास्त्र थे। सैनिक वीर बहादूर थे। फिर हमारी पराजय क्यों हुई? हम परतंत्र क्यों बने?  क्या उत्तर से आनेवाले आक्रमकों ने हमें ऐसा बनाया?  क्या अंग्रेजों के कारण हम अपना सर्वस्व खो बैठे नहीं, हर्जिज नहीं;  हमारी दुर्गति के लिए हम ही उत्तरदायी हैं। हमारे भीतर के आलस्य ने हमें परवश बनाया। हमारे आपसी झगडों ने हमें परवश बनाया। हमने अपने आपको छोटे-छोटे दायरों में बांट लिया हमने अपने देश के छोटे-छोटे टुकडे कर डाले। हमने सम्पूर्ण देश का व्यापक विचार किया नही। हमारे मन छोटे हो गये। पडौसी का मकान जल रहा है तो जलता रहे, मुझे क्या लेना देना?  निकट का गांव डाकुओं द्वारा लूटा जाये; मेरा घर, मेरा पैसा, मेरी खेती-बाडी, मेरा परिवार, मेरा राज्य, बस इसी प्रकार सब लोग सीमित विचार करने लगे। मेरा देश, मेरा धर्म, हमारी प्राचीन संस्कृति, मेरा सम्पूर्ण समाज- इस ढंग से व्यापक विचार करना बन्द हो गया। परिणाम यह हुआ कि हम लोग परतंत्र बने गये। मेरा और मेरे देश का कुछ निकट संबंध है और वह मेरे प्रतिदिन के हर कार्य में प्रकट होना चाहिए। मेरा खाना-पीना, उठना-बैठना, बोलना काम-काज सब कुछ समाज की कृपा से हो रहा है। मुझे कृतज्ञ रहना चाहिए। योग्य बदला चुकाना चाहिए। इस तथ्य को हम लोग भूल गये। इसीलिए हम परतंत्र हो गये। अपने इस देश में अनेक प्रान्त हैं, अनेक भाषाएं, हैं, अनेक उपासनापंथ हें, अनेक जाति-उपजातियां हैं, अनेक प्रकार की वेशभूषा है, अनेक प्रकार का खान-पान है, फिर भी सबका हृदय एक है, सबकी नसों में एक खून बह रहा है, यह हम भूल गये हैं। इसलिए हम विदेशियों के दास बने हैं।’’"}, {"person": "", "title": "विचार-मंथन  3", "text": "“हमारा यह एक समाजपुरुष है। उसके करोडों हाथ हैं। करोडों पैर हैं। करोडों मस्तक हैं। हमारा यह देश परमेश्व र का ही प्रतिरूप है, इस तथ्य को हम भूल गये इसलिए हम दूसरों के अंकित हो गये। हमारे व्यवहार में से नुसान, रीति, नीति, पद्धति, व्यवस्था, आदर विश्वागस, स्नेह ये बातें नष्ट हो गयीं, इसीलिए हमें दूसरों के चरण पूजने पडे। हम भूल गये कि हम सब भारतमाता के पुत्र हैं और आपस में भाई-भाई हैं। गरीब हो या अमीर, किसान हो या मजदूर, शहरी हो या ग्रामीण, सुशिक्षित हो या अशिक्षित, चमार, लुहार, सुनार, ब्राह्मण, क्षत्रीय कोई किसी जाति-पांति का या उद्योग-व्यवसाय का क्यों न हो हम सब भाई हैं। इस तथ्य को हम भूल गये, इसलिए हमारी यह दुर्दशा हुई है।’’"}, {"person": "", "title": "विचार-मंथन  4", "text": "“इस दुर्दशा को दूर करने के लिए हमें सर्वप्रथम हमारी भीतर घुसे दुर्गुणों को दूर करना होगा।.... यह कार्य भाषणों से, लेखों से या आन्दोलनों से नहीं होगा। केवल अंग्रेज को या मुसलमानों को कोसते रहने से अथवा बुरा-भला कहने से नहीं होगा। इसके लिए फिर से व्यापक सामाजिक भाव जगाना होगा, अनुशासन निर्माण करना होगा। बन्धुत्व की भावना प्रस्थापित करनी होगी। इस कार्य के लिए नवयुवकों को जुटाना होगा। उन्हें इस बात का महत्व समझाना होगा। नियमों का पालन करनेवाला, छोटे-बडे सब काम दक्षता से करनेवाले सहकारी, त्यागी और सेवाव्रती, संगी, साथी जुटाने होंगे। देश धर्म के लिए अपना घरबार छोडकर, निजी सुखों पर तिलांजलि देकर देशहित को सबसे महत्व पूर्ण माननेवाले कार्यकर्ता तैयार करने होंगे। यह सब काम कौन करेगा?  मैं करूंगा। मैं स्वयं अपने से प्रारंभ करूंगा। मातृभूमि का स्वयंसेवक मैं बनूंगा। एक दीपक से दूसरा दीपक जलाया जाता है। उस प्रकार एक के अनेक होंगे। गांव-गांव में नगर-नगर में, प्रान्त-प्रान्त में, देशभर में सर्वत्र स्वदेशहित की रात-दिन चिन्ता करनेवाले सेवक यदि उत्पन्न होंगे, तो हमारे देश की सब समस्याएं हल होंगी। तब हमारा सम्पूर्ण देश नयी आभा से जगमगा उठेगा। तब हमारा देश सुखी होगा, समृद्ध होगा, वैभवशाली होगा.... यह उसी समय हो पायेगा जब सर्वत्र दृढप्रतिज्ञ देशसेवक निर्माण होंगे.... यह कैसे  होगा?  इसी दिशा में मुझे प्रयत्न करने होंगे।....’’\nकारागार में जब डाक्टरजी अकेले रहते थे तब वे इसी प्रकार के चितन में डूब जाते थे उनके अंतःकण में इन्ही विचारों का मंथन चलता रहता था। दही मथने के बाद उसमें से मक्खन निकलता है। उसी प्रकार डाक्टरजी के इस विचारमंथन से जो फल निकला उसी का नाम है, राष्ट्रीय स्वयंसेवक संघ।"}, {"person": "", "title": "संघ की स्थापना 1", "text": "कारगार से छूटने के बाद डाक्टरजी ने अपने सब काम पूर्ववत् प्रारंभ किये। परन्तु उन्हें करते समय वे सूक्ष्म दृष्टि से सच्चरित्र नवयुवकों को खोजने लगे। उनसे संपर्क बढाने लगे। किसी न किसी बहाने से उन्हें एक स्थान पर जुटाने लगे। उनसे संपर्क बढाने लगे। किसी न किसी बहाने से उन्हें एक स्थान पर जुटाने लगे। सन् 1925 की, विजयादशमी के दिन, उन्होंने “राष्ट्रीय स्वयंसेवक संघ’’ की स्थापना की। नागपुर के महाल विभाग में सरदार मोहिते का एक मकान था। किसी समय वह वैभवपूर्ण प्रासाद था पर अब खंडहर हो गया था। वहां कोई रहता नहीं था। वहां पर ये सब लोग जुटने लगे।\n   प्रारंभ में सप्ताह में एक दिन आते थे, फिर रोज एकत्रित आने का नियम हुआ। चर्चाएं चलती थीं। वादविवाद होते थे। प्रश्नो त्तर होते थे। डाक्टरजी नये-नये विषय छेडते और सबके मत आजमाते थे। वे स्वयम् कम बोलते थे। परंतु जो कुछ भी बोलते थे, उसका सबके मन पर गहरा असर होता था। डाक्टरजी की बात सबको मान्य होती थी।"}, {"person": "", "title": "संघ की स्थापना 2", "text": "एक दिन एक युवक ने कहा, “हम प्रतिदिन जुटते हैं और बातें करते हैं। हमें यहां पर कुछ कार्यक्रम करने चाहिए।’’\n   फिर क्या कार्यक्रम हों? कैसे हों? आदि विषयों पर सब अपने अपने मत बताने लगे। डाक्टरजी ने धीरे से इस विचार को योग्य दिशा दिखायी। खेल, व्यायाम, लाठी, तलवार चलाना आदि वीरवृत्ति उत्पन्न करनेवाले कार्यक्रम निश्चि त हुए। \n   दूसरे दिन शाम को निर्धारित समय पर जब वे नवयुवक उस स्थान पर पहुंचे तो उन्होंने देखा कि क्रीडांगण उनके स्वगात के लिए सिद्ध है। सब दूर झाडू लगायी गयी है। कहीं गंदगी नहीं है। कंकड-पत्थर बाहर फेंके गये हैं। पानी छिडका हुआ है। कबड्डी आदि खेल के लिए लकीरें खींची हुई हैं।\n   सब एक दूसरे से पूछने लगे, “क्यों, यहां पहले कौन आया था?  यह सब सिद्धता किसने की?’’  हर कोई कह रहा था, “ना भाई, मुझे नहीं मालूम;  मैं तो अभी आ रहा हूं।’’ डाक्टरजी मौन थे। पता चला कि वे ही सबसे पूर्व वहां आये थे, और उन्होंने ही यह सब किया है। डाक्टरजी की पाठ पढाने की यही पद्धति थी। स्वयम् काम करो। कथनी से करनी भली।\n   न कहा गया, न बताया गया, परन्तु दूसरे दिन, कई युवक समय से पहले संघ-स्थान पर उपस्थित हुए। किसी ने झाडू लगायी, कोई पानी ले आया, किसी ने पानी छिडका। निर्धारित समय पर सीटी बजी। कार्यक्रम प्रारंभ हुआ।\n   वहां के खेलों में इतना आनंद आता था कि युवक सुधबुध खो देते थे। पहले दिन आठ-दस थे, वे बीस हो गये, फिर पचास हो गये। बढते-बढते सौ युवक नियम से जुटने लगे। न कोई देर से आता, न कोई अनुपस्थित रहता। सब कार्यक्रमों में ये सौ के सौ लोग भाग लेते थे।\n   फिर वहां पर प्राथमिक समता की शिक्षा भी प्रारंभ हो गयी। सबने अपना-अपना गणवेश स्वयम् के खर्चे से तैयार किया।"}, {"person": "", "title": "नियम-पालन का आदर्श", "text": "एकबार डाक्टरजी अपने चार स्वयंसेवक मित्रों के साथ अडेगाव गये थे। वहां पर उनके एक मित्र रहते थे। उनके यहां उनके पुत्र का व्रतबंध था। वह समारोह शनिवार के दिन था। भोजनादि करने कराने में देर हो गयी। नागपुर जाने के लिए जो मोटर थी, वह भी निकल गयी।\n   हर इतवार को नागपुर में संघ के सब स्वयंसेवक के एकत्रीकरण का तथा समता का कार्यक्रम होता था। उसमें हर किसी को नियमित रूप से उपस्थित रहना अनिवार्य था। यहां तो डाक्टरजी को अडेगांव में शाम हो गयी। नागपुर पहुंचने के लिए अन्य कोई साधन उपलब्ध नहीं था। डाक्टरजी वहां से पैदल चल पडे। उनके साथ चार स्वयंसेवक भी थे।\n   किसी ने कहा, - “यहां से नागपुर का अंतर कम नहीं है। पूरा बत्तीस मील।’’\n   डाक्टर हेडगेवार ने कहा- “हम लोग रात भर चलते रहेंगे;  पर प्रभात में निर्धारित समय पर संघस्थान पर अवश्य उपस्थित रहेंगे।’’\n   मित्रों ने और उनके रिश्तेदारों ने बहुत मना किया। परंतु डाक्टरजीने किसी की नहीं सुनी। वे वहां से पैदल चल दिये। जो निश्चेत के साथ प्रयत्न करता है, उसे परमेश्वकर अवश्य सहाय्य करता है। जब वे आठ-दस मील चले तब एक नागपुर जानेवाली मोटर उनके पास आकर रुक गयी। ड्राइव्हर ने डाक्टर साहब को पहिचान लिया था, इसीलिए उसने मोटर रोकी और कहां, - “डाक्टर साहब, इतनी रात में, पैदल कैसे?’’\n   डाक्टरजी ने हंसकर कहा, “भाई नागपुर जाना आवश्यक है। दूसरा कोई साधन नहीं था, फिर क्या करता?’’\n  “तब आईये बैठिये’’, ड्रायव्हर ने उन्हें अपने पास बिठा लिया। अन्य स्वयंसेवक पीछे बैठ गये। रात्रि में एक-डेढ बजे के लगभग वे सब नागपुर पहुंच गये सुबह ठीक समय पर वे संघस्थान पर उपस्थित हुए।"}, {"person": "", "title": "मैं अकेला !", "text": "डाक्टरजी अब चौबीसों घण्टे संघकार्य में ही मग्न रहते थे। परंतु उनके चारों ओर चलनेवाली छोटी-बडी बातों को वे ध्यान से देखते थे और उनका सही अर्थ लगाते थे। विभिन्न सामाजिक तथा राजनैतिक कार्यों में वे मार्गदर्शन करते थे और कभी प्रत्यक्ष तो कभी अप्रत्यक्ष सहाय्य भी करते थे।\n   एक बार डाक्टरजी संघ के काम के लिए बाहरगांव गये थे। उनकी अनुपस्थिति में नागपुर में एक जनसभा हु
