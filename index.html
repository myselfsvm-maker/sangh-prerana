गया और कहा - गुरुजी आधी रात हो गयी है और आप अभी तक सोये नहीं? श्री गुरुजी ने कहा - आज नागालैंड का जो समाचार आया है उसने बड़ी बेचैनी उत्पन्न कर दी है। यह तो भारत के प्रधानमंत्री का नहीं, अपितु सारे राष्ट्र का अपमान है। कितनी अभद्र बात है कि लोग उन्हें अकेले छोड़कर, उनका बहिष्कार करके सभा से चले जायें? कोर्इ इसे कैसे सहन कर सकता है।\nउस समय मैं इसका महत्त्व नहीं समझ सका। किन्तु आज जब मैं पीछे मुड़कर देखता हूँ तो अनुभव करता हूँ कि श्री गुरुजी का व्यक्तित्व राष्ट्र के साथ कितना एकाकार हो गया था। श्री गुरुजी क्षुद्र स्वार्थभाव से तथा व्यक्तिगत रुचि-अरुचि से सर्वथा परे थे। राष्ट्रीय प्रश्नोंु पर पं. नेहरुजी के विचारों से वे अनेकों बार असहमत थे। परन्तु मतभेद के बावजूद भी नेहरुजी के बहिष्कार की घटना से श्री गुरुजी बेहद बेचैन थे। ऐसे ही बेचैन श्री गुरुजी अन्य प्रसंग पर हुये थे जब लंदन में भारतवासियों ने नेहरुजी को काले झंडे दिखाकर विरोध किया था। श्री गुरुजी ने कहा - ‘‘परस्पर मतभेद हो सकता है पर विदेशों में अपने ही प्रधानमंत्री के सामने इस प्रकार के प्रदर्शन करना क्या उचित है? इस प्रकार का अपमान समूचे भारत राष्ट्र का अपमान है। पं. नेहरु वहाँ काँग्रेस के प्रमुख के नाते नहीं गये थे। भारत के प्रधानमंत्री के नाते गये थे। मैं तो किसी राजनैतिक दल का सदस्य नहीं हूँ और भविष्य में बनूँगा भी नहीं, राजनीति मेरी प्रकृति नहीं है। फिर भी वह समाचार पढ़कर मुझे अत्यन्त क्षोभ हुआ क्योंकि वह राष्ट्र का अपमान है। एक बार इंग्लैंड के भूतपूर्व प्रधानमंत्री चर्चिल अमेरिका गये थे। वह अपने सरकार की कड़ी आलोचना करेंगे यह सोचकर पत्रकारों ने उनसे पूछा, आपकी सरकार का शासन कैसे चल रहा है? चर्चिल ने उत्तर दिया - मैं तुम्हारे प्रश्नक का हेतु समझता हूँ। परन्तु यह मत भूलिये कि इंग्लैंड में मैं विरोधी दल का नेता हूँ परन्तु विदेश में मैं अपने सरकार का समर्थक हूँ। A In England I am the Leader of the Opposition, but abroad I am supportor of his majesty's Government, इस प्रकार की दृष्टि ही राष्ट्रीय दृष्टि है।’’- लिंगय्या चौधरी"}, {"person": "", "title": "", "text": "24 नवम्बर 1963 को श्री गुरुजी का कार्यक्रम बेलगाँव में था। वहाँ उनसे मिलने के लिये त्रिनिदाद से एक संसद सदस्य श्री शम्भुनाथ कपिलदेव आये थे। त्रिनिदाद में हिंदु संस्कारों की कोर्इ व्यवस्था नहीं थी। नामकरण, विवाह आदि सभी संस्कार र्इसार्इयों की पद्धति से गिरिजाघरों में होते थे। हिन्दू संस्कारों के लिये भारत से पण्डित-पुरोहित की व्यवस्था हो, इस विषय में भारत सरकार के अधिकारियों से बातचीत करने वे दिल्ली आये थे, किन्तु उन्हें उत्तर मिला - यह कैसे संभव है? भारत सरकार की नीति तो सेक्युलर है।\nकपिलदेव निराश हो गये थे। परन्तु दिल्ली में किसी महानुभाव ने उन्हें श्री गुरुजी से मिलने की सलाह दी। कपिलदेव बेलगाँव आये। वे जो छोटा-सा काम लेकर आये थे वह तो पूरा हो ही गया, इतना ही नहीं तो दुनियाभर में बसे हुए हिन्दुओं को प्रेरणा देने, मार्गदर्शन करने और सहायता देने के लिये हिन्दुओं की विश्व व्यापी संस्था (विश्वेहिन्दू परिषद) स्थापित करने का निर्णय भी इसी वार्तालाप की उपलब्धि है। सायंकाल श्री गुरुजी का सार्वजनिक कार्यक्रम था। कपिलदेव जी इस कार्यक्रम के लिये संघस्थान पर पहुँचे। वहाँ व्यासपीठ के आसपास की व्यवस्था देखकर श्री गुरुजी की सुरक्षा व्यवस्था के विषय में उनका मन आशंकित हो उठा। व्यासपीठ के निकट ही एक कार्यकर्ता से उन्होंने पूछा - श्री गुरुजी की सुरक्षा के लिये समुचित व्यवस्था की गर्इ है न?\nव्यासपीठ के आसपास खड़े दण्डधारी स्वयंसेवकों की ओर इशारा करते हुए कार्यकर्ता ने कहा - हाँ, अच्छी व्यवस्था है। इस उत्तर से कपिलदेवजी का समाधान नहीं हुआ। बेचैनी पूर्वक उन्होंने पुन: पूछा - तुम्हारे ये दण्ड बन्दूकों की गोलियाँ रोक सकेंगे क्या? कल ही जो दुर्घटना हुर्इ है, वह क्या तुम्हें पता नहीं है? दो दिनों पूर्व ही अमेरिका के लोकप्रिय राष्ट्रपति श्री केनेडी की जो हत्या की गयी थी, उसकी ओर कपिलदेवजी संकेत कर रहे थे। कार्यक्रम समाप्त होने के बाद श्री कपिलदेवजी पुन: श्री गुरुजी से मिलने उनके निवासस्थान पर पहुँचे।\nउन्होंने श्री गुरुजी से पूछा - आपने अपनी सुरक्षा की क्या व्यवस्था की है? दुनिया में हत्यारों की संख्या लगातार बढ़ रही है। इन सबसे आपके बचाव की कुछ न कुछ व्यवस्था रहे। सदा की तरह मुक्त हास्य बिखेरते हुए श्री गुरुजी ने कहा - मैं कोर्इ बहुत बड़ा आदमी नहीं हूँ। कपिलदेवजी ने कहा - प्रश्नर यह नहीं हैं कि आप अपनी दृष्टि में छोटे हैं या बड़े। हत्यारों की दृष्टि में आपका महान होना पर्याप्त है। श्री गुरुजी ने कहा - परन्तु इस जगत् में सब कुछ भगवान् की इच्छा के अनुसार होता है। उसकी इच्छा न हो तो कोर्इ किसी को मार नहीं सकता। इसके विपरीत, यदि भगवान् को लगता है कि बस, पर्याप्त हो गया इसका जीवन, तो फिर ऐसे व्यक्ति को कोर्इ नहीं बचा सकता ।........... बीच में ही कपिलेदवजी बोले - कल ही कनेडी ........ श्री गुरुजी ने उसी साँस में उत्तर दिया - मुझे भी तो वही कहना है। कैनेडी की सुरक्षा व्यवस्था क्या कम  थी? गोली विरोधक कार में प्रवास, अगलबगल में और चारों ओर सुरक्षा सैनिक, गुप्तचर, गव्हर्नर्स, पास में पत्नी। इतना सब होकर उन्हें कोर्इ बचा नहीं सका। इसका अर्थ यही है कि कैनेडी का जीवनकार्य पूर्ण हो चुका था। र्इश्वकर को ऐसा प्रतीत हुआ कि अब और समय तक भूतल पर रहना कैनेडी के लिये हितकारक नहीं है। इसीलिये उनका जीवन समाप्त हो गया।\nश्री कपिलदेवजी ने कहा - परन्तु श्री गुरुजी। यह कैसे माना जाय कि कैनेडी की हत्या से कैनेडी का ही लाभ हुआ? श्री गुरुजी ने उन्हें समझाने का प्रयास किया - ऐसी बात नहीं है। कैनेडी के जीवन की ओर देखें। उन पर र्इश्वहर का बहुत अधिक प्रेम था। र्इश्वीर ने उन पर दो कार्य सौंपे थे। एक तो संसार में शक्ति संतुलन बनाये रखने के लिये अर्थात् रूस की आक्रामक प्रवृत्ति को नियंत्रित करने के लिये और दूसरा अमेरिका के श्वे्त-अश्वे्त नागरिकों में समरसता और सामंजस्य निर्माण करने के लिये। कैनेडी का यही जीवनकार्य था। क्यूबा के मामले में धैर्य के साथ उन्होंने रूस का सामर्थ्य समाप्त कर दिया। यही उनके जीवन कार्य की अत्युत्तम सिद्धि थी। अमेरिका में श्वेसत-अश्वेततों में समरसता लाने के लिये दृढ़ता से कार्य किया। इसके बाद वे अधिक दिन जीवित रहते तो अमेरिका में राजनैतिक संघर्ष होता उसमें संभवत: कैनेडी की बदनामी भी होती। भगवान की यह इच्छा नहीं थी कि संसार में एक उत्तम राष्ट्रपति के रूप में कीर्ति प्राप्त कैनेडी की बदनामी हो। इसीलिये भगवान ने उन्हें हुतात्मा की मृत्यु देकर उनकी कीर्ति की रक्षा की। अगले दो तीन राष्ट्रपति के कारण अमेरिका की बहुत बदनामी होने की सम्भावना है। दुनिया में अमेरिका का प्रभाव भी कम होने वाला है।\nश्री कपिलदेवजी शान्त चित्त से सब कुछ सुन रहे थे। श्री गुरुजी के अकाट्य तर्को ने उनके मन को जीत लिया, फिर भी बुद्धि भरोसा नहीं कर पा रही थी। इस तरह विश्वाेस अविश्वातस का अन्तर्द्वन्द्व मन में लिये हुए कपिलदेवजी बैठक के बाहर आये। बाहर आकर उन्होंने कहा - आश्च्र्य है। इस तरह का अद्वितीय प्रतिपादन मैंने इसके पूर्व कभी नहीं सुना था। दूसरे दिन कपिलदेवजी बेलगाँव से रवाना होने के पूर्व श्री गुरुजी से मिले। उन्होंने गुरुजी को साष्टांग प्राणिपात किया तथा उनके दो छायाचित्रों पर अंग्रेजी में उनके हस्ताक्षर लिये।- एन्. कृष्णप्पा"}, {"person": "", "title": "राष्ट्र के साथ एकाकार", "text": "राष्ट्रीय स्वयंसेवक संघ पर से प्रतिबंध हटने के बाद श्री गुरुजी काशी आये थे। काशी के नगरपालिका ने उनका अभिनंदन करने का निश्चीय किया। नगराध्यक्ष एक मुस्लिम सज्जन थे। नगरपालिका में मुस्लिम प्रतिनिधि भी चुनकर आये थे। नगराध्यक्ष ने अपने स्वागत भाषण में कहा - हम पूज्य श्री गुरुजी का सम्मान कर रहे हैं, लेकिन हमारे मन में राष्ट्रीय स्वयंसेवक संघ के सम्बन्ध में अनेक संदेह हैं। कुछ भय भी है। वैसे भय उन्हें देखते ही खत्म हो गया। हम समझते थे कि भयंकर विकराल रूप वाला कोर्इ व्यक्ति आयेगा। मगर वे तो हँसते -मुस्कराते हुए आये। हम यह पूछना चाहते हैं कि श्री गुरुजी के भारत में मुसलमानों का क्या स्थान होगा? श्री गुरुजी ने कहा - मुसलमानों का स्थान क्या होगा, यह तय करनेवाला मैं कौन हूँ? मुसलमान ही तय करें कि वे क्या स्थान चाहते हैं। किसी की उपासना पद्धति से हमारा कोर्इ मतभेद नहीं। कोर्इ अगर ऐसा समझता है कि भगवान् को अल्लाह के नाम से पुकारकर वह परम तत्त्व की प्राप्ति कर सकता है तो वह अल्लाह कहे। लेकिन उपासना पद्धति को छोड़कर बाकी सारी बातों के लिये उनको राष्ट्र के साथ अपने को एकाकार करना चाहिये।\nश्री गुरुजी ने फिर एक बात और कही। उन्होंने कहा - आपको शायद मेरी बात पसन्द नहीं आयेगी। यहाँ अंगरेज राज करते थे। हमने उनको उखाड़कर फेंक दिया। भारत में इस्लाम भी आया। कुछ प्रचार के मार्ग से आया, कुछ तलवार के जोर पर आया। कुछ लोगों ने इस्लाम स्वीकार किया कि उन्हें उपासना पद्धति पसन्द थी, मगर कुछ लोगों ने स्वीकार किया इसलिए कि स्वीकार करने के अलावा और कोर्इ रास्ता नहीं था। हमने राजनैतिक गुलामी उखाड़कर फेंक दी है, अब कोर्इ अगर धार्मिक गुलामी भी छोड़ना चाहता हे तो हम उसका स्वागत करेंगे। और बाद में नगराध्यक्ष ने जब धन्यवाद दिया तो कहा - श्री गुरुजी ने जो विचार व्यक्त किये, उससे हमारा कोर्इ मतभेद नहीं है। फिर भी न जाने क्यों श्री गुरुजी को लोग मुस्लिम विरोधी कहते हैं। हम जानते हैं कि उनके मन में किसी वर्ग के प्रति विद्वेष नहीं है।- अटलबिहारी वाजपेयी"}, {"person": "", "title": "संस्कृति के साकार रूप", "text": "मैं एक निष्ठावान गांधीवादी हूँ। सर्वोदय एवं इसी प्रकार के आंदोलनों से मैं आज भी सम्बद्ध हूँ। मुझे गांधीजी के बहुत निकट रहने का अवसर मिला है, और उनके व्यक्तित्व का मुझपर बहुत प्रभाव पड़ा है। इस पृष्ठ भूमि में यह स्वाभाविक है कि राष्ट्रीय स्वयंसेवक संघ के अनुशासन, चारित्र्य और सादगी का तो मैं प्रशंसक था किन्तु यह मानकर चल रहा था कि संघ के विचार कट्टर हिन्दुवादी हैं। यही कारण था कि मैं संघ के कट्टर हिन्दुवादी विचारों का विरोध करता था।\nजब गांधीजी की हत्या हुर्इ तब मैं कोट्टयम में था। तत्काल दिल्ली जाने की मेरी इच्छा हुर्इ, अत: मुझे अपना पद छोड़ना पड़ा। (वे केरल के ख्यातनाम दैनिक समाचार पत्र ‘मलयालम् मनोरमा’ के सम्पाद्क थे) 30 जनवरी को हत्या हुर्इ थी और मैं 19 फरवरी को दिल्ली पहुँचा। वहाँ मै पत्रकार और गांधीभक्त के रूप में विभिन्न कार्यक्रमों में भाग लेने लगा। उस समय सम्पूर्ण वातावरण संघ विरोधी भावनाओं से व्याप्त होने के कारण बड़ा तनावपूर्ण बना हुआ था। ऐसा होकर भी मेरे हृदय में किसी कोने में यह भावना घर किये हुए थी कि इस घृणित कृत्य में राष्ट्रीय स्वयंसेवक संघ का हाथ नहीं है। अत: मैंने निश्चतय किया कि सिवनी या बैतूल कारागार में जहाँ कहीं भी श्री गुरुजी को रखा हो वहाँ जाकर श्री गुरुजी से मुझे प्रत्यक्ष मिलना चाहिये। हत्याकाण्ड के मामले को लेकर संघ के विषय में अथवा श्री गुरुजी के सम्बन्धों के विषय में श्री गुरुजी से सीधी बात करने का मेरा निश्चरय था। मैं सिवनी गया किन्तु वहाँ के कारागार के अधिकारियों ने मुझे श्री गुरुजी से मिलने की अनुमति नहीं दी। उन अधिकारियों ने यह वचन अवश्य दिया कि मेरे आने की सूचना श्री गुरुजी तक अवश्य पहुँचा दी जायेगी। इसके बाद मैं केरल लौट आया। पुन: ‘मलयालम् मनोरमा’ के सम्पादन के कार्य में संलग्न हो गया। समय के व्यतीत होने के साथ साथ वे सब बातें भी विस्मृति में विलीन हो गयीं।\nसन 1965 की बात है। श्री गुरुजी पालघाट में अपनी आयुर्वेदिक चिकित्सा करा रहे थे। जो चिकित्सक श्री गुरुजी की चिकित्सा कर रहे थे वे मेरे निकटवर्ती रिश्तेदार थे। उन्हीं से मुझे ज्ञात हुआ कि श्री गुरुजी पालघाट में हैं। स्वाभाविक ही मैं उनसे मिलने गया। ज्योंही श्री गुरुजी से मेरा परिचय कराया गया, त्यों ही उन्होंने मुझसे पूछा - क्या आप वही पिशाद्रि हैं, जो मुझसे मिलने के लिये सिवनी कारागार आये थे, किन्तु मिलने की आज्ञा प्राप्त न हो सकने के कारण निराश होकर लौटना पड़ा था? मैंने बतलाया कि मैं वही हूँ। पर श्री गुरुजी की इस चमत्कारिणी प्रखर स्मरणशक्ति को देखकर मैं दंग रह गया। मैं तो यही समझता हूँ कि यह श्री गुरुजी की महानता का परिचायक है। इस भेंट में राष्ट्रीय महत्त्व के अनेक विषयों पर बातचीत हुर्इ। मेरी धारणा यह थी कि संघ की विचारधारा में मुस्लिम विरोधी दृष्टिकोण सन्निहित है। मैंने अपनी संघ विषयक धारणाएँ तथा अनेक शंकाएँ उनके सामने रखीं।\nश्री गुरुजी ने मुझसे प्रश्नश किया - आपको ऐसा किसने बतलाया? यह सब झूठ है। वास्तविक राष्ट्रीय स्वयंसेवक संघ की हिन्दू संगठन परक विचारधारा भावात्मक है। संघ मुस्लिमों का अथवा अन्य किसी का विरोधी कदापि नहीं है। जब वे मुसलमानों से सम्बन्धित अपने दृष्टिकोण को समझाने लगे तो मैंने ऐसा अनुभव किया कि वे मुसलमानों को केवल राष्ट्रीय जीवनप्रवाह में लाना चाहते हैं और इस राष्ट्रीय जीवनप्रवाह को वे हिन्दू जीवनप्रवाह कहना श्रेयस्कर मानते हैं । इस बातचीत में मैंने अपने आपको उनसे पूर्णत: सहमत पाया। इसके बाद श्री गुरुजी ने संघविचार से सम्बन्धित बिपुल साहित्य मेरे पास भिजवाने की व्यवस्था की। इस सामग्री में श्री गुरुजी के प्रकाशित भाषण, प्रश्नोेत्तर आदि थे। इस साहित्य को पढ़कर मेरे सभी सन्देह दूर हो गये।\nइसके बाद श्री गुरुजी जब कभी कोट्टयम आते तो प्रांत संघचालक श्री ए.गोविन्द मेनन अथवा जिला संघचालक श्री नारायण भट्ट के यहाँ मेरी उनसे भेंट होती और लम्बे समय तक विभिन्न विषयों पर चर्चा होती। क्रमश: हम दोनों के बीच घन्ष्ठि मैत्री सम्बन्ध स्थापित हो गया। मैं ऐसा अनुभव करने लगा कि मैं एक ऐसे महान व्यक्ति के सम्पर्क में आया हूँ जो अनेक वर्षों तक मेरे मित्र रह चुके हैं। मेरी यह मान्यता है कि श्री गुरुजी महान हैं और उनका जीवन ध्येय यथार्थ में भारत का पुनरुज्जीवन है। गांधीजी उनसे कुछ भिन्न थे क्योकि उनका मार्ग भिन्न था। किन्तु राष्ट्र के पुनर्निर्माण के सम्बन्ध में दोनों के मूलभूत सिद्धान्त तत्त्वत: समान थे। दोनों में अद्भुत समानता थी। दोनों ही कुशल संगठनकर्ता थे। और अपने अनुयायियों तथा सहयोगी कार्यकर्ताओं की चिन्ता किया करते थे। यह कहना नितांत सत्य है कि राष्ट्रीय स्वयंसेवक संघ के प्रत्येक कार्यकर्ता के पारिवारिक समस्याओं की सूक्ष्मातिसूक्ष्म जानकारी श्री गुरुजी रखा करते थे। उनका तत्त्वज्ञान संकुचित अथवा साम्प्रदायिक कदापि नहीं था। वे चाहते थे कि प्रत्येक भारतीय, चाहे वह किसी जाति अथवा पंथ अथवा प्रान्त का हो, बिना सौदेबाजी किये स्वयं को राष्ट्रीय जीवन प्रवाह का एक अंग समझे। वे एक महान ॠषि थे। वे धर्मान्ध नहीं थे, अपितु भारतीय संस्कृति के साकार स्वरूप थे।- के.पी.के. पिशाद्रि - संपादक, ‘मलयालम् मनोरमा’"}, {"person": "", "title": "दो स्मरण", "text": "1) एकबार मैं वृन्दावन में था तभी रा.स्व.संघ के उत्तर प्रदेश के उत्तरी जिलों के स्वयंसेवकों का शिविर वृन्दावन में लगा था। मैं भी शिविर में गया। (गुरुजी से) मैंने कहा - कल प्रसाद पाने आश्रम में आइयेगा। मेरे यहाँ प्रसाद पाने में उन्हें बड़ी प्रसन्नता होती, मैं देखता था। मेरे यहाँ जितने उल्लास से पेट भरके वे प्रसाद पाते थे, इतना प्रसाद वे कहीं भी नहीं पाते थे। बोले - कै आदमी आवें?’ मैंने कहा - जितने चाहें साथ ले आवें। वे बोले - ‘हम तो चार पाँच सौ हैं’  मैंने कहा - ‘तो सभी आइये।’ दूसरे दिन बड़े ठाठ के साथ गाजे-बाजे के साथ, बाजे बजाते हुए गणवेश के साथ पाँच सौ स्वयंसेवकों के साथ समुपस्थित हुए। और बड़े प्रेम से प्रसाद पाया। उस दिन हँसते ही रहे। बड़ा प्रभावशाली व्याख्यान दिया।\n2) उनमें मिथ्याभिमान का लेश मात्र भी नहीं था। हमारे ही यहाँ के साधक विद्यार्थी जब साधु संन्यासी का वेश बना लेते हैं या किसी महन्त अथवा जगदगुरु के पद पर प्रतिष्ठित हो जाते हैं, तो एकान्त में तो साष्टांग प्रणाम करते हैं। किन्तु जब अपने शिष्य भक्तों मे मिलते हैं, तो उन्हें प्रणाम करने में लज्जा का अनुभव होता है। ऐसा बर्ताव करते हैं, मानो हम उनसे परिचित ही नहीं। उनका इसमें कोर्इ दोष नहीं। यह जैव धर्म है। मनुष्य में अपने अनुयायियों के सम्मुख अपने को सर्वश्रेष्ठ सिद्ध करने की स्वाभाविक प्रवृत्ति होती है। किन्तु उनमें यह बात नहीं थी। उस दिन मालवीयजी के निधन पर संघ की ओर से काशी टाउन हाल में शोकसभा थी। यहीं प्रयाग से हमें और उन्हें जाना था। मुझे उन्होंने उसका अध्यक्ष बनाया था। मुझसे यह कह गये कि मैं चलता हूँ प्रबंध करूँगा, आप आइयेगा।\nबड़ी भारी सभा थी। पचासों सहस्त्र नरनारी एकत्र थे। सभा खचाखच भरी थी। मैं गया, उठकर मुझे माला पहनार्इ, सबके सम्मुख साष्टांग प्रणाम किया। उन्हें तनिक भी संकोच नहीं होता था। जब भी मिलते सबसे प्रथम दौड़कर पैरों में सिर टिका देते। ऐसे विनयशील निरभिमान जिनके सम्मुख हम कुछ भी नहीं थे, उनका भी इतना आदर करनेवाले व्यक्ति अब कहाँ मिलेंगे?- प्रभुदत्त ब्रह्मचारी महाराज"}, {"person": "", "title": "आप धन्य हैं", "text": "सम्भवत: 1953-54 की बात होगी। श्री गुरुजी के पूज्य माता-पिता श्री श्रृंगेरी क्षेत्र की यात्रा पर आये थे। वहाँ श्रृंगेरीपीठाधिपति शंकराचार्य स्वामीजी महाराज के दर्शन करने की उनके मन में बड़ी इच्छा थी। किन्तु एक बहुत बड़ी बाधा उपस्थित हो गयी। पूज्य श्री स्वामीजी महाराज भगवच्चिन्तन तथा ध्यान- धारणा के लिये अन्तर्मुख रहते हुए अत्यधिक एकान्तिक जीवन तीनचार मास से व्यतीत कर रहे थे। इस प्रकार की जानकारी मिलने के बाद यह निश्चिवत हो गया कि उनके दर्शन नहीं मिल पायेंगे। फिर यह तय किया गया कि उनके दर्शन का सौभाग्य नहीं मिल सका तो कम से कम उनके निवास स्थान का दर्शन करके उसे प्रणाम कर लिया जाये। इसके लिये वे लोग ‘नरसिंहवन’ की ओर गये।\nउनके साथ एक कार्यकर्ता भी था। उसने उस स्थान का दर्शन कराया। स्थान सम्बन्धी कर्इ बातें बतलायीं तथा कहा - पिछले चार मास से स्वामीजी के निवास का द्वार नहीं खुला है। सौ. तार्इजी और आदरणीय भाऊजी (श्री गुरुजी के माता-पिता) बन्द द्वार को ही प्रणिपात करके लौटने के लिये मन-ही-मन विचार कर ही रहे थे कि इसी बीच अचानक द्वार खुल गया और दोनों के सौभाग्य से स्वत: स्वामी श्री शंकराचार्य जी महाराज द्वार पर खड़े दिखलायी दिये।\nस्वामी जी ने कहा - आप गोळवलकरजी के माता-पिता हैं न? आइये, अन्दर आइये। अचानक द्वार खुल जाने पर सबके आश्चार्य की सीमा नहीं रही। सब लोगों ने भक्तिभाव से साष्टांग प्रणिपात किया और भीतर गये। स्वामीजी महाराज ने तार्इजी और भाऊजी से कहा - आपने देश को एक महापुरुष प्रदान किया है। आप धन्य हैं। इस भाँति श्री चन्द्रमौलीश्वआरजी का प्रसाद अकस्मात् प्राप्त हो जाने से सभी लोग प्रसन्न होकर वहाँ से लौटे।- एन. कृष्णप्पा"}, {"person": "", "title": "निर्मल चेतना के धनी", "text": "एक बार नागपुर गया तो हेडगेवार भवन पहुँच गया। भवन देखकर और श्री गुरुजी का स्थान देखकर बहुत अच्छा मालूम हुआ कि कोर्इ भी अतिरिक्त वस्तुएँ वहाँ नहीं थी। सब आवश्यक। आडम्बर का कहीं भी अस्तित्व नहीं। श्री गुरुजी स्वयं नितान्त सरल और सहज। मुझे पाकर जैसे मेरे सम्मान में ही सर्वथा व्यस्त हो गये। वह स्नेहभाव मुझे सुखद और आश्च र्यकारी प्रतीत हुआ। गुरुता जैसी चीज भी प्रकट होती तो मैं उसे अन्यथा नहीं समझता। लेकिन उसकी कहीं सम्भावना नहीं थी। उद्यमी और तत्पर कार्यकर्ता की भाँति स्वयं सब कार्य में कार्यरत।\nभवन में मैंने देखा कि वे हार्दिक आदर श्रद्धा की प्रेरणा हैं। इसी भावना से उनके साथी-सहयोगी काम करते हैं। उनमें पद की कृत्रिमता का मिश्रण नहीं है। काम पड़ता होगा, लेकिन किसी कृत्रिम व्यवधान को डालकर व्यवहार को बनावटी बनाने की वृत्ति उनमें नहीं देखी। ऐसा सुनता हूँ कि आजकल प्रशासकों को उसी प्रकार का प्रशिक्षण दिया जाता है। इधर भाषा के शिष्टाचार पर तो बल है, लेकिन अंदर से जनता से दूरी रखी जाती है। मैं चलने लगा तो श्री गुरुजी स्वयं बाहर तक आये और बोले -यह गाड़ी किसकी है? तत्काल खोज हुर्इ मालिक महाशय की। वे आये तो उनसे श्री गुरुजी ने कहा - देखिये ये श्री जैनेन्द्रजी हैं। अमुक स्थान पर पहुँचा आर्इये।\nमुझे अपने लिये किसी प्रकार के संभ्रम का भ्रम नहीं हो सकता था। मैं ठहरा श्री पूनमचन्द्रजी राँका के यहाँ, जो उस समय शायद स्थानीय काँग्रेस के अध्यक्ष थे। पर उस सबसे श्री गुरुजी के व्यवहार में कुछ भी अंतर नहीं आया। विस्मय मुझे तब हुआ, जब स्वयं श्री गुरुजी राँकाजी के घर पर उपस्थित हुए। निर्मलचित्तता के कारण ही ऐसा हो सकता था। -जैनेन्द्रजी (गांधीवादी हिंदी साहित्यकार)"}, {"person": "", "title": "सहजरोगी", "text": "सन 1970 की एक वर्षा-आँधी वाली रात को मेरे एक सहयोगी ने मुझे फोन किया और पूछा-क्या गुरुजी श्री गोळवलकरजी की डाक्टरी परीक्षा के लिये मैं समय दे सकता हूँ? मैंने स्वीकृति प्रदान कर दी। अगले प्रात: मैं उन्हें देखने चला गया। मैंने गोळवलकरजी के बारे में बहुत पढ़ा सुना था। मुझे मालूम था कि उन्हें अपनी मान्यताओं के प्रति अटूट आस्था है। हिंदूराष्ट्र एवं हिन्दुत्व पर उनकी मान्यता दृढ़ और अचल है। और वे इस सम्बन्ध में बहुत ही कट्टरपंथी एवं संकुचित हैं। मैं इस अन्तिम विषय में कितना गलत था यह बाद में पता चला।\nउनका निर्बल और कृश शरीर, उनके विषय में मेरी पूर्व जानकारी, पूर्व कल्पना तथा धारणा के बिल्कुल विपरीत था। पहले ही भेंट में मुझे पता चला कि मैं एक गम्भीर दृष्टिवाले, ज्ञानेच्छुक व्यक्ति के सामने हूँ। वह व्यक्ति तर्कशील है, विनम्र है, प्रबुद्ध है, दूसरे पक्ष के दृष्टिकोण को सुन सकता है और उन्हें समझ सकता है। प्रारम्भिक बातचीत में ही मैंने उनके व्यक्तित्व के विषय में बहुत कुछ जान लिया।\nश्री गुरुजी ने प्रश्नन किया - तो डाक्टर मेरे रोग के बारे में आपका क्या विचार है? मैंने कहा - आपकी दशा से कैंसर की सम्भावना का संदेह हो रहा है। इसका ठीक पता लगाने और चिकित्सा हेतु शल्यक्रिया आवश्यक है। मेरे इस निदान से वे जरा भी नहीं घबराये, जैसा कि आम तौर पर साधारण आदमियों के साथ होता है। कुछ पल सोचकर बोले - यदि कैंसर ही हो तो मेरी राय में उसे यों ही रहने दो। ... क्या आपको आशा है कि आप उसे ठीक कर लोगे? उन्हें इस रोग का और मानव शरीर पर उसके कुप्रभावों का पूरा ज्ञान था। उनका अगला प्रश्नर था- क्या यह अन्यत्र भी पहुँच गया है? मैंने उनको सारी स्थिति समझायी। उन्होंने वह समझ ली और वे चुप हो गये। लम्बी चुप्पी के बाद वे बोले - अब तो मुझे ऑपरेशन कराना ही होगा। यह उन्होंने बड़ी धीरता से कहा था। श्री गुरुजी 30 जून, 1970 को अस्पताल में भर्ती हो गये और 1 जुलार्इ, 1970 को उनका कैंसर का ऑपरेशन कर दिया गया। ऑपरेशन के अगले दिन वे उठ बैठे थे। चलने-फिरने भी लगे। अस्पताल में उनके तीन सप्ताह के निवास ने उनके मन और व्यक्तित्व का अध्ययन करने के लिये मुझे काफी लम्बा अवसर मिला। उनसे हुर्इ अनेक भेंट और वार्ता मेरे जैसे आदमी के लिये ज्ञानवर्धन का माध्यम सिद्ध हुर्इ थी। उनके अन्तश्च रित्र को स्पष्ट करने वाली कुछ घटनाएँ ऐसी हैं। ... अपने रोग की गम्भीरता एवं व्यापकता के विषय में पूर्ण जानकारी और जीवन की सम्भावना के बारे में सम्यक् जानकारी वे चाहते थे। मैंने सत्य को उनसे छिपाया नहीं था। सभी बातें साफ साफ बता दी थीं। मेरी बात सुनकर उन्होंने कहा था- ओह! तब तो ठीक है। इतने दिन बहुत हैं और मेरे पास इतने दिनों के लिये काफी काम है।\nऑपरेशन के सात दिन बाद श्री गुरुजी बम्बर्इ शहर के एक उपनगर की सभा में गये थे। उन्होंने वहाँ जाने की आज्ञा डॉक्टरों से ले ली थी। मैंने उनसे कहा था- मैं आपको जाने दूँगा, बशर्ते आप भाग न जायें। अपने विनोदप्रियता का परिचय देते हुए बोले - क्या मैं आपको चोर उचक्का लगता हूँ? जितने दिन वे अस्पताल में रहे, वहाँ विनोद और खुशी का वातावरण था। उनके व्यक्तित्व की पूर्ण मीमांसा करने के लिये कोर्इ भी विशेषण उचित और उपयुक्त नहीं लगता। वे एक राजनीतिक दार्शनिक और गहन अध्यनकर्ता थे। मानव तथा पदार्थ घटनाक्रम का असीम ज्ञान उन्हें था। उनकी विचारधारा में विज्ञान, धर्म और संस्कृति का समान समावेश था। उन्होंने एक दिन कहा था- मानव के प्रत्येक विकास के लिये विज्ञान परमावश्यक है। यह सुनकर मुझे बड़ा आश्चरर्य हुआ था। आश्चयर्य इसलिये कि यह वाक्य एक अगाध धार्मिक आस्थावाले व्यक्ति ने कहा था। वे उन लोगों में से नहीं थे जो अपना दर्शन और अपनी आस्था दूसरों पर थोपते हैं, किन्तु वे अपनी मान्यताओं और कथनी के प्रति पूर्ण निष्ठावान थे। एक बार उन्होंने यह भी कहा था - जो मेरी दृष्टि में सत्य और न्यायपूर्ण है मैं उसके लिये हमेशा प्रत्यनशील रहा हूँ और रहूँगा। ... यही एक वाक्य उनकी आन्तरिक भावना और अप्रतिहत साहस का संक्षिप्त परिचय देता है और यही वाक्य इस प्रश्नत का भी उत्तर था कि उनके इतने अधिक अनुयायी क्यों हैं? अस्पताल से जाने के पूर्व उन्होंने कहा था - मनुष्य को मृत्यु की चिन्ता नहीं करनी चाहिये। सभी को एक न एक दिन मरना ही होगा। जीवन की अवधि का नहीं, उसकी उपयोगिता का महत्त्व होता है। मेरे सामने लक्ष्य है और मैं चाहता हूँ कि अन्तिम श्वाँ स तक मैं उसके लिये प्रयत्नशील रह सकूँ।\nआपरेशन के बाद दो वर्ष वे बहुत ही स्वस्थ और कर्मण्य रहे। मेरे अंदाज के विपरीत उनका जीवन बहुत आगे तक चलता रहा। वे एक उल्लेखनीय और बहुत ही सहज रोगी थे। .. यद्यपि वे कार्यशील थे, परन्तु मृत्यु की छाया उनके निकट आती जा रही थी। अप्रैल 1972 में लिये गये एक्स-रे से पता चला की रोग अत्यन्त गम्भीर हो गया है। उसके बाद के घटनाक्रम को लिखने के लिये अब शेष क्या बचा है? इस आलेख का यह उद्देश्य नहीं है कि श्री गुरुजी को मृत्युपरान्त उस रूप में दर्शाया जाये,  जो वे जीवन में नहीं थे। .... वह व्यक्ति जिसने एक भयंकर रोग का शारीरिक और मानसिक आघात् का धीरज और साहस के साथ सामना किया, वह व्यक्ति जिसकी अपने देश सम्बन्धी मान्यताएँ और आस्थाएँ निष्ठापूर्ण थीं, वह व्यक्ति जो कभी अपनी आस्थाओं से डिगा नहीं, वह व्यक्ति जो शरीर से दुर्बल और कृश होकर भी अखंड-अथाह क्रियाशीलता से समन्वित था, वह व्यक्ति जिसमें आगे बढ़ने की आतुरता थी और वह व्यक्ति जिसने गलत को सही करने का अथक प्रयास किया, वे थे श्री गुरुजी गोळवलकर। - डा. प्रफुल्ल देसाई"}]}, {"key": "adhyatmik", "label": "अध्यात्मिक", "icon": "🕉️", "stories": [{"person": "", "title": "पुष्पमाला", "text": "सन् 1943 में दीवाली के दिन पूज्य श्री गुरुजी हैदराबाद (सिंध) के एक कार्यक्रम में उपस्थित थे। वहाँ के कार्यकर्ताओं ने उन्हें पुष्पमाला पहनाना चाहा जिसपर श्री गुरुजी ने कहा, “यह पुष्प माला किसलिए? इसकी आज हमें आवश्यकता नहीं। हम तो भारत माता की पूजा करने चले हैं। माता को हमारा समर्पण चाहिए। उसके लिए हम तैयार हों।’’"}, {"person": "", "title": "अपना मन ठीक रखें", "text": "अनेक लोग सोचते हैं कि उन्होंने बहुत कुछ पढ़ और सीख लिया, बहुत अनुभव प्राप्त कर लिये। अब उन्हें और कुछ सीखने की आवश्यकता नहीं है। पर ऐसा व्यक्ति कब स्खलित हो जाएगा, कहा नहीं जा सकता। इसलिए अपने मन को सदा ठीक बनाये रखने के लिए प्रतिदिन प्रयास और अभ्यास करते रहना चाहिए।\nइस संबंध में श्री गुरुजी रामकृष्ण परमहंस के गुरु श्रद्धेय तोतापुरी जी महाराज का एक संस्मरण सुनाते थे। एक बार परमहंस जी ने उनसे पूछा, “गुरुजी, आपने तो इतनी साधना और आराधना की है। आपको ब्रह्म की प्राप्ति भी हो गयी है। फिर अब आप प्रतिदिन आसन लगाकर क्यों बैठते हैं ? अब आपको पूजा-पाठ या अध्ययन की क्या आवश्यकता है ?’’\nतोतापुरी जी ने उत्तर दिया, “अपने मन में कभी भी यह अभिमान नहीं आना चाहिए कि मैंने सब कुछ पा लिया। अपनी साधना प्रतिदिन नियमित रूप से चलती रहनी चाहिए।’’\nउन्होंने अपने लोटे को दिखाते हुए कहा, “रामकृष्ण ! यह लोटा इतना साफ है कि तुम इसमें अपना मुँह देख सकते हो। मैं इसे प्रतिदिन रेत से रगड़कर माँजता हूँ। यदि ऐसा न करूँ, तो इस पर दाग पड़ जायेंगे और इसका पानी भी पीने योग्य नहीं रहेगा। इसी प्रकार अपने मन को भी साधना और आराधना से प्रतिदिन साफ करना चाहिए। मुझे अब कुछ करने की आवश्यकता नहीं, यह अभिमान व्यर्थ है।’’"}, {"person": "", "title": "कमजोर के सब दुश्मन", "text": "किसी भी व्यक्ति और समाज को शक्तिशाली क्यों होना चाहिए, इस संबंध में श्री गुरुजी ब्रह्मा और मेमने वाली कथा सुनाते थे।\nएक बार एक मेमना ब्रह्मा जी के पास गया और रो-रोकर अपनी व्यथा बताने लगा। वह बोला, “महाराज, आप इस सृष्टि के निर्माता हैं। आपने सब जीवों को बनाते समय प्रत्येक को सुरक्षा के लिए कुछ साधन दिये हैं। किसी को नाखून दिये हैं, तो किसी को सींग या दाँत। साँप के पास जहर है, इसलिए लोग उससे भी डरते हैं। पर हमें आपने ऐसी कोई चीज नहीं दी। इस कारण जो चाहे हमें मारकर खा जाता है।’’\nब्रह्मा जी आँख बंदकर उसकी बात सुनते रहे। उन्हें मौन देखकर मेमने ने फिर कहा, “कृपया बतायें कि आपने हमें इतना कमजोर क्यों बनाया ? यह हमारे साथ बहुत बड़ा अन्याय है। महाराज, कृपाकर इससे बचने का कोई मार्ग बतायें।’’ इतना कह कर मेमना फिर रोने लगा।\nब्रह्मा जी ने कहा, “पुत्र, तुम्हारा कहना ठीक ही है। यह मेरी भूल ही है कि तुम्हें इतना निर्बल और नि:शस्त्र बनाया। पर अब तुम शीघ्र ही यहाँ से चले जाओ। क्योंकि तुम्हें देखकर मेरा मन भी मचलने लगा है। ऐसा न हो कि मैं ही तुम्हें खा जाऊँ।’’\nयह कथा सुनाकर श्री गुरुजी बताते थे कि जिसके पास अपनी ताकत नहीं है, वह सदा प्रताड़ित ही किया जाता है।"}, {"person": "", "title": "मित्रता की कसौटी", "text": "आजकल हर देश दूसरे शक्तिशाली देशों को अपना मित्र बनाना चाहता है। उस देश को लगता है कि शक्तिशाली मित्रदेश के बल पर वह शत्रुओं से अपनी रक्षा कर पायेगा। पर कोई भी देश नि:स्वार्थ भाव से दूसरे की सहायता नहीं करता। वह अपनी सहायता की पूरी कीमत वसूल करता है। इसलिए दूसरे देशों से संबंध बनाते समय अपनी शक्ति का आकलन अवश्य करना चाहिए। इस बारे में श्री गुरुजी घोड़े और आदमी की कथा सुनाते थे।\nकहते हैं कि घोड़ा पहले पालतू जानवर नहीं था। वह जंगलों में मुक्त अवस्था में घूमा करता था। एक बार किसी बात पर शेर से उसका झगड़ा हो गया। घोड़ा शेर की अपेक्षा कम बलवान था। वह डरकर भागा। शेर उसका पीछा करने लगा। भागते-भागते घोड़े को एक आदमी दिखायी दिया।\nघोड़े ने बड़े कातर भाव से आदमी से प्रार्थना की कि वह उसे शेर के आतंक से मुक्ति दिलाये। आदमी ने कहा, “मैं तुम्हारी रक्षा करने के लिए शेर से लड़ तो सकता हूँ; पर मेरी गति शेर से कम है, इसलिए मुकाबला कठिन है।’’\nघोड़े ने कहा कि यदि वह उसकी पीठ पर सवार हो जाये, तो उसकी गति बढ़ जायेगी। आदमी ने घोड़े की पीठ पर सवार होकर शेर को पराजित कर दिया। घोड़े की रक्षा हो गयी। घोड़े ने आदमी को धन्यवाद देते हुए बड़े कृतज्ञ भाव से कहा, “आपने मुझ पर और मेरी भावी पीढ़ियों पर बड़ा उपकार किया है। हम इसे कभी भूल नहीं सकते। अब कृपया मेरी पीठ से उतरने का कष्ट करें, जिससे मैं स्वतन्त्र रूप से जंगल में घूम सकूँ।’’\nइस पर आदमी ने कहा, “भाई घोड़े जी, तुम्हारी बात तो ठीक है; पर तुम्हारी पीठ पर बैठने में मुझे इतना आनंद आया है कि अब उतरने की इच्छा नहीं होती।’’ कहते हैं कि तब से आज तक आदमी घोड़े की पीठ से उतरा नहीं है।\nयह कथा सुनाकर श्री गुरुजी बताते थे कि हम चाहे अमरीका से मित्रता करें या रूस से; पर वे अपनी शर्तें हम पर जरूर थोपेंगे। काम निकल जाने के बाद केवल प्रेमवश वे हमारी पीठ से नहीं उतरेंगे। इसलिए दूसरों की मित्रता पर निर्भर रहने की अपेक्षा अपनी शक्ति ही बढ़ानी चाहिए।"}, {"person": "", "title": "यह कैसी एकात्मता", "text": "प्राय: लोग समता और समानता, एकता और एकात्मता, प्रेम और विश्व.बंधुत्व की बड़ी-बड़ी बातें करते हैं; पर उनके मन में यह भाव नहीं होता। इसे स्पष्ट करने के लिए श्री गुरुजी अपने एक विद्वान मित्र की कथा सुनाते थे।\nउन विद्वान सज्जन ने सोचा कि यह संघ कार्य के लिए पूरे देश में घूमता है, यदि इसके मन में समाज के हर वर्ग के प्रति प्रेम न हो, तो यह सफल नहीं हो पाएगा। इसलिए उन्होंने मुझसे पूछा, “तुम कुछ अद्वैत सिद्धान्त के बारे में जानते हो ?’’\n“यह क्या होता है ?’’ मैंने कहा।\n“शंकराचार्य जी ने इसे प्रतिपादित किया था।’’\n“कौन शंकराचार्य जी ?’’ मैंने अज्ञानता प्रकट की।\nवे समझ गये कि मैं इस मामले में काफी पीछे हूँ। इसलिए उन्होंने मुझ पर दया दिखाते हुए कहा, “आदिगुरु शंकराचार्य और उनके अद्वैत सिद्धान्त को समझे बिना तुम संघ का काम नहीं कर पाओगे।’’\n“तो क्या किया जाये ?’’ मैंने पूछा।\n“इसे पढ़ो।’’\n“पर मेरे पास तो समय नहीं है। मैं तो संघ-कार्य के विस्तार के लिए देश भर में घूमता रहता हूँ। नागपुर भी थोड़े दिन ही रहता हूँ।’’\n“कोई बात नहीं, उन्हीं दिनों में मैं तुम्हें पढ़ा दिया करूँगा।’’ उनके यह कहने पर मैंने स्वीकार कर लिया।\nउन्होंने मुझे बताया कि सारी सृष्टि ब्रह्म द्वारा ही निर्मित है। इसमें पशु-पक्षी, कीट-पतंगे, पेड़-पौधे, जड़-चेतन सब ब्रह्म ही है। मानव चाहे किसी भी जाति, प्रांत या रंग का हो, ब्रह्म का ही रूप है। अत: हमें किसी से भेदभाव नहीं करना चाहिए।\nकुछ दिन बाद हम दोनों को एक कार्यक्रम में भाग लेने का अवसर मिला। आयोजकों ने हमें तीन सीट वाले एक अच्छे सोफे पर बैठाया। एक ओर मैं बैठा, तो दूसरी ओर मेरे वे विद्वान मित्र। कार्यक्रम चल रहा था कि वे मेरी ओर खिसकने लगे। मैंने उनसे कारण पूछा, तो उन्होंने हाथ से अपनी बगल में इशारा किया।\nमैंने देखा कि हमारे सोफे पर जो जगह खाली थी, वहाँ उनकी बगल में एक तगड़े सज्जन आकर बैठ गये। वे किसी और देश के निवासी थे और उनका रंग काफी काला था। काले रंग और तगड़े शरीर के कारण वे कुछ भयानक से दिख रहे थे। उन्हीं को देखकर वे मेरी ओर खिसक रहे थे।\nमैंने कहा, “खिसक क्यों रहे हैं, क्या आप इन्हें पहचानते नहीं हैं ?’’\n“नहीं; पर क्या आप पहचानते हैं ?’’ उन्होंने पूछा।\n“हाँ, अच्छी तरह।’’ मैंने कहा।\n“कौन हैं ये ?’’ उन्होंने आश्चंर्य से मेरी ओर देखकर पूछा।\n“ये वही ब्रह्म हैं, जिनके बारे में आपने कई दिन तक मुझे समझाया है।’’ उनका चेहरा अब देखने लायक हो गया था।\nयह कथा सुनाकर श्री गुरुजी बताते थे कि अपने समाज के प्रति हमारे मन में सच्चा प्रेम होना आवश्यक है। थोथा ज्ञान न भी हो तो चलेगा; पर प्रेम के बिना एकता और एकात्मता होना असंभव है।"}, {"person": "", "title": "अहिंसा की व्याख्या", "text": "कई बार लोग अहिंसा की व्याख्या अपने-अपने मतलब के अनुसार करते हैं। पर अहिंसा का अर्थ कायर की तरह चुप बैठना नहीं है।\nएक राज्य पर किसी दूर देश के विधर्मी शासक ने एक बार आक्रमण कर दिया। राजा ने अपने सेनापति को आदेश दिया कि सेना लेकर सीमा पर जाये और आक्रमणकारी का मुँहतोड़ उत्तर दे।\nसेनापति अहिंसावादी था। वह लड़ना नहीं चाहता था। पर राजा का आदेश लड़ने का था। अत: वह अपनी समस्या लेकर परामर्श करने के लिए भगवान बुद्ध के पास गया।\nसेनापति ने कहा, “युद्ध होने पर शत्रु सेना के सैकड़ों सैनिक मारे जायेंगे, क्या यह हिंसा नहीं है ?’’\n“हाँ, हिंसा तो है।’’ भगवान बोले। पर यह बताओ, यदि हमारी सेना ने उनका मुकाबला न किया, तो क्या वे वापस अपने देश चले जायेंगे ?’’\n“नहीं, वापस तो नहीं जायेंगे।’’ सेनापति ने कहा।\n“अर्थात वे हमारे देश में निरपराध नागरिकों की हत्या करेंगे। फसल और सम्पत्ति को नष्ट करेंगे ?’’\n“हाँ, यह तो होगा ही।’’ सेनानायक बोला।\n“तो क्या यह हिंसा नहीं होगी ? यदि तुम हिंसा के भय से चुप बैठे रहे, तब हमारे देश के नागरिक मारे जायेंगे। और इस हिंसा का पाप तुम्हारे सिर आयेगा।’’ सेनापति ने सिर झुका लिया।\n“क्या हमारी सेना आक्रमणकारियों को रोकने में सक्षम है ?’’ भगवान ने आगे पूछा।\n“जी हाँ। यदि उसे आदेश दिया जाये, तो वह हमलावरों को बुरी तरह मार भगायेगी।’’ सेनापति का उत्तर था।\n“तब अपनी सेना को तुरंत आदेश दो कि वह इन विदेशियों का हर प्रकार से मुकाबला करे और पराजित कर देश से निकाल दे।’’\nस्पष्ट है कि अंहिसा का अर्थ कायरता नहीं है। अहिंसा का अर्थ है किसी दूसरे पर अत्याचार न करना। लेकिन यदि कोई हम पर आक्रमण और अत्याचार करे, तो उसका मुँहतोड़ उत्तर देना।"}, {"person": "", "title": "मानसिक स्थिरता", "text": "लोकमान्य तिलक की भगवद्गीता के प्रति बहुत श्रद्धा थी। जब वे मांडले जेल में रहे, तब उन्होंने ‘गीता रहस्य’ नामक पुस्तक भी लिखी थी; पर यह उससे पहले की घटना है।\nवे अपने अन्य कार्य करते हुए केसरी’ नामक समाचार पत्र का सम्पादन भी करते थे। एक बार उनका पुत्र बहुत बीमार था, उसकी देखभाल करते हुए भी वे अखबार का काम करते रहे। एक दिन जब वे कार्यालय में बैठे काम कर रहे थे, तो घर से सूचना आयी कि बेटे की तबियत बहुत खराब हो गयी है, जल्दी आइये।\nउन्होंने उत्तर भिजवाया कि मैं काम पूरा करके आता हूँ। तब तक चिकित्सक को बुलवा लें, क्योंकि दवा तो वह ही देगा। इसके बाद वे सम्पादकीय लिखने लगे और उसे पूरा करके ही घर गये। घर जाकर पता लगा कि बेटे ने प्राण छोड़ दिये हैं। उन्होंने इसे ईश्व र की इच्छा मानकर शान्त मन से उसका अंतिम संस्कार कर दिया।\nयह थी ध्येय के प्रति उनकी दृढ़ता और मानसिक स्थिरता। गीता में ऐसे व्यक्ति को ही भगवान कृष्ण ने ‘स्थितप्रज्ञ’ कहा है।"}, {"person": "", "title": "छोटी सी भूल", "text": "अनेक बार हम कुछ घटनाओं को छोटी से भूल कहकर छोड़ देते हैं; पर आगे चलकर उसका दुष्परिणाम बहुत भयानक होता है। इसे समझाने के लिए श्री गुरुजी यह बहुचर्चित कथा सुनाते थे।\nएक विधवा स्त्री और उसका इकलौता पुत्र गाँव में रहते थे। वह महिला बहुत कठिनाई से मेहनत-मजदूरी कर अपना और अपने पुत्र का पालन कर रही थी। माँ की इच्छा थी कि उसका बेटा पढ़-लिखकर बड़ा आदमी बने। इसलिए उसने उसे गाँव के ही एक विद्यालय में भर्ती भी करा दिया।\nएक बार वह बालक अपने साथी की पेंसिल चुरा लाया। घर आकर उसने वह माँ को दे दी। माँ ने चुपचाप उसे रख लिया। धीरे-धीरे वह और भी सामान लाने लगा। माँ ने सोचा कि यह छोटा है, डाँटने से नाराज न हो जाये, इसलिए वह चुप ही रहती। अब वह इधर-उधर से पैसे भी लाने लगा। इसी प्रकार होते-होते वह एक बड़ा अपराधी बन गया। एक बार डकैती और हत्या के अभियोग में वह पकड़ा गया और उसे फाँसी की सजा घोषित हो गयी।\nफाँसी से पूर्व जब उसकी अंतिम इच्छा पूछी गयी, तो उसने अपनी माँ से मिलना चाहा। जब माँ सामने आयी, तो उसने कान में कुछ बात कहने के बहाने माँ का कान काट लिया। माँ दर्द से चीख पड़ी। वहाँ खड़े लोग उसकी आलोचना करने लगे।\nकारण पूछने पर उसने कहा कि मेरी इस दुर्दशा की दोषी मेरी माँ ही है। जिस दिन मैंने पहली बार चोरी की थी, यदि उसी दिन माँ ने कान खींचकर मुझे रोक दिया होता, तो मैं आज यहाँ नहीं होता। इसीलिए मैंने माँ का कान काटा है।\nस्पष्ट है कि भूल चाहे छोटी ही हो; पर तुरंत टोक देने से वह बड़ी होने से बच जाती है।"}, {"person": "", "title": "यह कैसा धर्म?", "text": "महाभारत के युद्ध में जब अर्जुन और कर्ण का युद्ध हो रहा था, तो एक समय ऐसा आया जब कर्ण के रथ का पहिया कीचड़ में धँस गया। वह शस्त्र रथ में ही रखकर नीचे उतरा और उसे निकालने लगा। यह देखकर भगवान कृष्ण ने अर्जुन को संकेत किया और उसने कर्ण पर बाणों की बौछार कर दी। इससे कर्ण बौखला गया। वह अर्जुन की निन्दा करने लगा - इस समय मैं नि:शस्त्र हूँ। ऐसे में मेरे ऊपर बाण चलाना अधर्म है।\nपर श्रीकृष्ण ने उसे मुँहतोड़ उत्तर देते हुए कहा - महाबली कर्ण, आज तुम्हें धर्म याद आ रहा है; पर उस दिन तुम्हारा धर्म कहाँ गया था, जब द्रौपदी की साड़ी को भरी सभा में खींचा जा रहा था। जब अनेक महारथियों ने निहत्थे अभिमन्यु को घेरकर मारा था, तब तुम्हें धर्म की याद क्यों नहीं आयी ?\nश्रीकृष्ण ने अर्जुन को अपनी बाणवर्षा और तेज करने को कहा। परिणाम यह हुआ कि कर्ण ने थोड़ी देर में ही प्राण छोड़ दिये। यह इतिहास कथा यह बताती है कि धर्म का व्यवहार केवल धर्म पर चलने वालों के लिए ही होना चाहिए। दुष्टों को उन जैसी दुष्टता से दंड देना बिल्कुल गलत नहीं है।"}, {"person": "", "title": "सबसे बड़ा मानव-धर्म", "text": "जब तक हमारे मन में मानवमात्र के लिए प्रेम नहीं होगा, तब तक सामाजिक कार्य संभव नहीं है। यह समझाने के लिए श्री गुरुजी एक बहुप्रचलित कथा सुनाते थे।\nएक नदी में एक साधु बाबा नहा रहे थे। अचानक उन्होंने देखा कि एक बिच्छू नदी के तेज बहाव के साथ बह रहा है। साधु ने सोचा कि यदि इसे बाहर न निकाला गया, तो यह नदी में डूबकर मर जाएगा। अत: उन्होंने अपना हाथ पानी में डालकर बिच्छू को उठा लिया।\nपर बिच्छू जैसे ही पानी से निकला, उसने साधु के हाथ पर डंक मार दिया। डंक लगते ही बाबा का हाथ काँपा और बिच्छू फिर नदी में जा गिरा। यह देखकर बाबा ने उसे फिर उठाया; पर बिच्छू ने फिर डंक मार दिया।\nजब यह क्रिया तीन-चार बार हो गयी, तो निकट ही स्नान कर रहा एक अन्य व्यक्ति बोला - बाबा जी, आप देखने में तो बहुत ज्ञानी लगते हैं; पर यह नहीं जानते कि बिच्छू का स्वभाव ही डंक मारना है। फिर भी आप उसे बार-बार पानी से बाहर निकाल रहे हैं।\nसाधु बाबा ने कहा - मैं बिच्छू का स्वभाव अच्छी तरह जानता हूँ। वह पानी में डूब रहा है, फिर भी अपना स्वभाव नहीं छोड़ रहा। इसी तरह डूबते को बचाना मेरा स्वभाव है। यदि वह बिच्छू होकर अपना स्वभाव नहीं छोड़ रहा, तो मैं साधु होकर अपना स्वभाव क्यों छोड़ूँ ?\nयह कथा सुनाकर श्री गुरुजी बताते थे कि समाज का कार्य करते समय लोग अपने स्वभाव के अनुसार तरह-तरह की बातें कहेंगे। कई लोग प्रताड़ित भी करेंगे। पर हमें अपना सेवा का स्वभाव एवं प्रेमभाव नहीं छोड़ना है। तभी हमें सफलता मिलेगी।"}, {"person": "", "title": "शस्त्र बड़ा या हिम्मत?", "text": "प्राय: लोग गुरुजी से कहते थे कि आप शाखा में जो लाठी सिखाते हैं, उससे क्या होगा ? आज तो बंदूक-पिस्तौल का युग है। ऐसे लोगों को श्री गुरुजी एक सत्य घटना सुनाते थे।\nदेश विभाजन के समय की बात है। पंजाब का जो भाग पाकिस्तान को मिल गया था, वहाँ से हिन्दू अपनी जान-माल बचाकर बड़ी कठिनाई से भारत की ओर आ रहे थे। अनेक हिन्दू परिवारों के पास शस्त्र भी थे। ऐसे ही एक परिवार की यह घटना है।\nमुस्लिम गुंडों ने जब गाँव को घेर लिया, तो उस परिवार के लोग अपने घर की छत पर चढ़ गये। घर के मुखिया के पास दोनाली बंदूक थी। वह उसे लेकर बैठ गया। नीचे गुंडे दरवाजा तोड़ने की तैयारी कर रहे थे; पर उसकी बंदूक से वे डरे भी हुए थे।\nअचानक एक गुंडे ने बड़ा छुरा निकाला और उसे लहराते हुए बोला, “सेठ, या तो अपनी बंदूक नीचे फेंक दे, वरना अभी यह छुरा फेंककर तेरा काम तमाम करता हूँ।’’ सेठ यह सुनते ही भयभीत हो गया और उसने बंदूक नीचे फेंक दी। तब तक मुस्लिम गुंडों ने दरवाजा तोड़ दिया। वे सब ऊपर चढ़ गये और उसी बंदूक से सेठ के पूरे परिवार को मार डाला।\nश्री गुरुजी यह कथा सुनाकर बताते थे कि शस्त्र से अधिक महत्त्व शस्त्र चलाने वाले हाथ और दिल की हिम्मत का है। शाखा में दंड के अभ्यास से इन दोनों को ही मजबूत करने का प्रयास होता है।"}, {"person": "", "title": "स्वयं से प्रारम्भ करें", "text": "अपने क्षेत्र में संघ या कोई सामाजिक कार्य प्रारम्भ करने के लिए प्राय: हम दूसरों का मुँह ताकते रहते हैं। पर जब तक हम स्वयं संकल्प लेकर कार्य प्रारम्भ नहीं करते, तब तक सफलता संभव नहीं है। इसे समझाने के लिए श्री गुरुजी एक कथा सुनाते थे।\nएक किसान के खेत में एक चिड़िया ने अपना घोंसला बनाकर उसमें अंडे दिये। कुछ समय बाद उनमें से बच्चे निकल आये। एक दिन जब चिड़िया दाना-पानी लेकर वापस आयी, तो बच्चे बहुत डरे हुए थे। माँ को देखकर वे बोले - माँ, अब हमें शीघ्र ही यहाँ से चल देना चाहिए। आज इस खेत का मालिक किसान आया था। वह कह रहा था कि मेरी फसल पक गयी है। कल मैं गाँव वालों को लाकर फसल कटवाना प्रारम्भ करूँगा।\nमाँ ने बच्चों को सांत्वना देते हुए कहा - घबराओ नहीं, अभी फसल नहीं कटेगी। दो दिन बाद शाम को बच्चे फिर सहमे हुए थे। माँ के आते ही बोले - आज तो वह किसान बहुत नाराज हो रहा था। कह रहा था कि गाँव वाले मेरी बात नहीं मानते। कल मैं अपने पड़ोसियों को लाकर फसल कटवाऊँगा।\nचिड़िया ने फिर बच्चों को कहा - धैर्य रखो, अभी फसल नहीं कटेगी।\nतीन-चार दिन बाद फिर चिड़िया जब बच्चों के लिए दाना लेकर लौटी, तो बच्चे डर के मारे काँप रहे थे। आते ही बोले - माँ, अब तो हमें चल ही देना चाहिए। आज तो वह किसान पड़ोसियों को भी गाली दे रहा था। कह रहा था कि मेरे पड़ोसी बहुत खराब हैं। समय पर काम नहीं आते। ऐसे तो मेरी फसल बर्बाद हो जाएगी। कल मैं अपने भाइयों से फसल कटवाने को कहूँगा।\nचिड़िया ने थोड़ी चिन्ता तो दिखायी; पर कहा - शांत रहो, अभी फसल नहीं कटेगी।\nऐसे ही दो दिन और बीत गये। एक शाम बच्चों ने फिर माँ को बताया - आज तो किसान की आँखें गुस्से में लाल हो रही थीं। वह अपने भाइयों को भी भली-बुरी सुना रहा था। वह कह रहा था कि कल चाहे कोई आये या नहीं; पर मैं स्वयं आकर फसल काटूँगा।\nयह सुनकर चिड़िया गंभीर हो गयी। उसने बच्चों से कहा - चलो अब यहाँ से चलने की तैयारी करो। चूँकि अब किसान ने स्वयं फसल काटने का निश्चहय कर लिया है। इसलिए कल फसल निश्चि।त ही कट जाएगी।\nस्पष्ट है कि जब तक हम किसी काम को स्वयं हाथ नहीं लगाएंगे, तब तक अन्य कोई भी सहयोग करने नहीं आयेगा।"}, {"person": "", "title": "आत्मविश्वास आवश्यक", "text": "किसी भी कार्य को करते समय यदि मन में प्रबल इच्छाशक्ति और आत्मविश्वा.स हुआ, तो कठिन से कठिन कार्य भी सरल हो जाता है। जीवन में सदा काम आने वाले इस सूत्र को समझाने के लिए श्री गुरुजी जैन साहित्य में उल्लिखित एक कथा सुनाते थे।\nएक बार श्रीकृष्ण, बलराम और सात्यकि जंगल में घूमते-घूमते भटक गये। रात हो गयी; पर घर वापस जाने का रास्ता नहीं मिला। हारकर उन्होंने वन में ही एक बड़े पेड़ के नीचे रात बिताने का निर्णय किया। जंगल काफी भयावह था, अत: यह भी निर्णय हुआ कि तीनों में प्रत्येक क्रमश: दो घंटे जागकर पहरा देगा।\nसबसे पहले सात्यकि की बारी थी। वह जागकर पहरा देने लगा, जबकि श्रीकृष्ण और बलराम सो गये। कुछ समय बीतने पर पेड़ से एक ब्रह्मराक्षस कूद कर सामने आ गया। उसने सात्यकि को डराकर कहा कि वह कई दिन से भूखा है। आज सौभाग्य से तुम तीन हट्टे-कट्टे लोग यहाँ आ गये हो, अब वह तीनों को खायेगा।\nसात्यकि को क्रोध आ गया। उसने कहा कि हमें खाने से पहले तुम्हें मुझसे युद्ध करना होगा। राक्षस तैयार हो गया। दोनों में युद्ध होने लगा। सात्यकि ने देखा कि जैसे-जैसे समय बीत रहा है, उसकी शक्ति कम हो रही है। दूसरी ओर वह राक्षस शक्ति और आकार में बड़ा होता जा रहा है।\nलड़ते-लड़ते दो घंटे बीत गये। अब जागने की बारी बलराम की थी। सात्यकि ने बलराम को जगाया और स्वयं सो गया। थोड़ी देर ही बीती थी कि वह राक्षस बलराम के सामने भी आ गया और फिर तीनों को खाने की बात कहने लगा। बलराम भला कहाँ कमजोर पड़ने वाले थे, उन्होंने भी राक्षस से युद्ध प्रारम्भ कर दिया।\nबलराम को लड़ते-लड़ते दो घंटे बीतने लगे। वे थक गये; पर राक्षस की शक्ति कम होने के स्थान पर बढ़ती ही जा रही थी। हारकर उन्होंने श्रीकृष्ण को जगाया और स्वयं सो गये। अब राक्षस श्रीकृष्ण के सामने आकर भूख मिटाने की बात करने लगा। परिणामस्वरूप श्रीकृष्ण से उसकी कुश्ती चालू हो गयी।\nपर श्रीकृष्ण ने लड़ने की एक नयी विधि निकाली। उन्होंने इस युद्ध को एक खेल बना लिया। वे लड़ते जाते, राक्षस को मारते जाते और स्वयं हँसते भी जाते। राक्षस इस हँसी से परेशान हो गया। वह श्रीकृष्ण पर आघात करता; पर वे वार बचाकर जोर से हँस पड़ते। मौका देखकर श्रीकृष्ण उसे घूँसा मारते और फिर हँसते।\nराक्षस इस प्रकार के युद्ध का अभ्यस्त नहीं था। अब वह थकने लगा। इतना ही नहीं, तो उसका आकार भी कम होने लगा। एक समय तो वह मच्छर जितना छोटा हो गया। यह देखकर श्रीकृष्ण ने उसे अपने अँगोछे में बाँध लिया।\nतब तक सुबह हो गयी। सात्यकि और बलराम उठ गये। दोनों ने रात में राक्षस से जो मार खायी थी, उसके कारण वे दर्द से कराह रहे थे। श्रीकृष्ण को हँसते देख उन्होंने राक्षस की चर्चा की। श्रीकृष्ण ने अपने अँगोछे में बँधे राक्षस को सामने कर दिया।\nयह कथा सुनाकर श्री गुरुजी कहते थे कि किसी भी काम को करते समय संकट तो आते ही हैं। यदि बलराम और सात्यकि की तरह आत्मविश्वामस न रहे, तो वे संकट हम पर हावी हो जाते हैं। लेकिन यदि श्रीकृष्ण की तरह हम हँसते हुए उनका सामना करें, तो संकट मच्छर की तरह छोटे होकर हमारे काबू में हो जाते हैं।"}, {"person": "", "title": "चरित्र का महत्त्व", "text": "किसी भी व्यक्ति में शरीर का बल तो आवश्यक है; पर उससे भी अधिक महत्त्वपूर्ण उसमें चरित्रबल अर्थात शील है। यदि यह न हो, तो अन्य सभी शक्तियाँ भी बेकार हो जाती हैं। प्राचीन भारतीय साहित्य में प्रह्लाद की कथा आती है, जो इसका महत्त्व बताती है।\nराक्षसराज प्रह्लाद ने अपनी तपस्या एवं अच्छे कार्यों के बल पर देवताओं के राजा इन्द्र को गद्दी से हटा दिया और स्वयं राजा बन गया। इन्द्र परेशान होकर देवताओं के गुरु आचार्य वृहस्पति के पास गये और उन्हें अपनी समस्या बतायी।\nवृहस्पति ने कहा कि प्रह्लाद को ताकत के बल पर तो हराया नहीं जा सकता। इसके लिए कोई और उपाय करना पड़ेगा। वह यह है कि प्रह्लाद प्रतिदिन प्रात:काल दान देते हैं। उस समय वह किसी याचक को खाली हाथ नहीं लौटाते। उनके इस गुण का उपयोग कर ही उन्हें पराजित किया जा सकता है।\nइन्द्र द्वारा जिज्ञासा करने पर आचार्य वृहस्पति ने आगे बताया कि प्रात:काल दान-पुण्य के इस समय में तुम एक भिक्षुक का रूप लेकर जाओ। जब तुम्हारा माँगने का क्रम आये, तो तुम उनसे उनका चरित्र माँग लेना। बस तुम्हारा काम हो जाएगा।\nइन्द्र ने ऐसा ही किया। जब उन्होंने प्रह्लाद से उनका शील माँगा, तो प्रह्लाद चौंक गये। उन्होंने पूछा - क्या मेरे शील से तुम्हारा काम बन जाएगा ? इन्द्र ने हाँ में सिर हिला दिया। प्रह्लाद ने अपने शील अर्थात् चरित्र को अपने शरीर से जाने को कह दिया।\nऐसा कहते ही एक तेजस्वी आकृति प्रह्लाद के शरीर से निकली और भिक्षुक के शरीर में समा गयी। पूछने पर उसने कहा - मैं आपका चरित्र हूँ। आपके कहने पर ही आपको छोड़कर जा रहा हूँ।\nकुछ समय बाद प्रह्लाद के शरीर से पहले से भी अधिक तेजस्वी एक आकृति और निकली। प्रह्लाद के पूछने पर उसने बताया कि मैं आपका शौर्य हूँ। मैं सदा से शील वाले व्यक्ति के साथ ही रहता हूँ, चूँकि आपने शील को छोड़ दिया है, इसलिए अब मेरा भी यहाँ रहना संभव नहीं है।\nप्रह्लाद कुछ सोच ही रहे थे कि इतने में एक आकृति और उनके शरीर को छोड़कर जाने लगी। पूछने पर उसने स्वयं को वैभव बताया और कहा कि शील के बिना मेरा रहना संभव नहीं है। इसलिए मैं भी जा रहा हूँ।\nइसी प्रकार एक-एक कर प्रह्लाद के शरीर से अनेक ज्योतिपुंज निकलकर भिक्षुक के शरीर में समा गये। प्रह्लाद निढाल होकर धरती पर गिर गये। सबसे अंत में एक बहुत ही प्रकाशमान पुंज निकला। प्रह्लाद ने चौंककर उसकी ओर देखा, तो वह बोला - मैं आपकी राज्यश्री हूँ। चूँकि अब आपके पास न शील है न शौर्य; न वैभव है न तप; न प्रतिष्ठा है न सम्पदा। इसलिए अब मेरे यहां रहने का भी कोई लाभ नहीं है। अत: मैं भी आपको छोड़ रही हूँ।\nइस प्रकार इन्द्र ने केवल शील लेकर ही प्रह्लाद का सब कुछ ले लिया। नि:संदेह चरित्रबल मनुष्य की सबसे बड़ी पूँजी है। चरित्र हो तो हम सब प्राप्त कर सकते हैं, जबकि चरित्र न होने पर हम प्राप्त वस्तुओं से भी हाथ धो बैठते हैं।"}, {"person": "", "title": "शक्ति का रहस्य", "text": "सीधे-सादे लोगों की अज्ञानता का लाभ उठाकर कुछ धूर्त लोग प्राय: अपना उल्लू सीधा कर लेते हैं।\nएक मौलवी साहब किसी मजार पर बैठते थे। उन्होंने लोगों से पैसे ऐंठने का एक तरीका खोज निकाला था। मजार के सामने एक बड़ा पत्थर पड़ा था। भारी होने के कारण लोग उसे हिला नहीं पाते थे। जब आठ-दस लोग एकत्र हो जाते, तो मौलवी साहब उन्हें कहते कि वे मिलकर उस पत्थर को हिलाएँ। लोग प्रयास करते; पर वह पत्थर हिलता ही नहीं था।\nइस पर वह मौलवी सबसे कहता कि अब वे सब मजार की ओर मुँह करके पत्थर को हिलाने का प्रयास करें। मौलवी साहब जोर से पीर साहब की ‘फतह’ का नारा लगाकर सबको इशारा करते। अब सबके जोर लगाने पर वह पत्थर हिल जाता। सब लोग समझते कि यह पीर साहब का ही चमत्कार है।\nएक बार कुछ स्वयंसेवक उस स्थान से आये थे, उन्होंने श्री गुरुजी को उस पत्थर और पीर के चमत्कार के बारे में बताया। गुरुजी उन सबको लेकर बाहर आये। वहाँ मजार के सामने वाले पत्थर से भी बड़ा एक पत्थर रखा था। गुरुजी ने सबको एक दिशा में खड़ा किया। फिर सबने उच्च स्वर में ‘बजरंग बली की जय’ का नारा लगाकर जोर लगाया, तो वह पत्थर भी हिल गया।\nअब श्री गुरुजी ने सबको समझाया कि पत्थर हिलने से पीर साहब का कोई संबंध नहीं है। जब सब मिलकर एक दिशा में ताकत लगाते हैं, तो पत्थर हिलेगा ही। अर्थात शक्ति पीर साहब में नहीं सामूहिक प्रयास में है। इसी प्रकार हम किसी कठिन कार्य को मिलकर करें, तो वह भी सरल हो जायेगा।"}, {"person": "", "title": "बुद्धि का चमत्कार", "text": "यदि व्यक्ति में त्वरित बुद्धि हो, तो वह आने वाले संकट को टाल सकता है। प्रसिद्ध क्रांतिकारी चन्द्रशेखर आजाद का अंग्रेजी गुप्तचर पीछा कर रहे थे। वे उनसे बचने के लिए अपने एक मित्र के घर पर छिप गये। पर पुलिस को कहीं से उनके बारे में कुछ जानकारी मिल गयी और वह उनके घर पर आ धमकी। पुलिस ने उससे काफी पूछताछ की; पर वह मानने को तैयार ही नहीं था कि आजाद उनके घर पर छिपे हैं।\nपुलिस तलाशी लेने की बात करने लगी। आजाद घर में ही थे। यह देखकर मित्र की पत्नी ने अपनी बुद्धि का प्रयोगकर आजाद को संकट से बचा लिया।\nउस दिन मकर संक्रांति थी। मित्र की पत्नी ने जोर से आजाद को डाँटते हुए कहा - मूर्ख, बच्चों के साथ ही खेलता रहेगा क्या ? यह मिठाई का टोकरा उठा और मेरे साथ चल। आज त्योहार का दिन है। पूरे मोहल्ले में मिठाई बाँटनी है।\nआजाद ने सिर पर टोकरी उठायी और मित्र की पत्नी के साथ बाहर निकल गये। पुलिस वाले बहस में ही उलझे रहे। बाहर निकलने के बाद कैसा त्योहार और कैसी मिठाई ? आजाद गये, तो फिर वापस ही नहीं आये।\nइस प्रकार उस वीर महिला ने अपनी प्रत्युत्पन्नमति से आजाद एवं अपने परिवार को एक भारी संकट से बचा लिया।"}, {"person": "", "title": "सच्ची देशभक्ति", "text": "किसी भी लोकतान्त्रिक देश में राजनीतिक दलों में परस्पर मतभेद होना स्वाभाविक ही है। पर यह मतभेद अपने देश तक ही सीमित रहें, तो अच्छा है।\nबात उस समय की है जब श्री नेहरू भारत के प्रधानमंत्री थे। एक बार वे विदेश गये, तो वहाँ कुछ भारतीयों ने उन्हें काले झंडे दिखाये और मुर्दाबाद के नारे लगाये। श्री गुरुजी को इस समाचार से बहुत कष्ट हुआ। यद्यपि वे नेहरू जी की नीतियों के घोर विरोधी थे; पर प्रधानमंत्री का देश से बाहर अपमान हो, यह उन्हें स्वीकार नहीं था। उन्होंने इसी संदर्भ में चर्चिल का एक उदाहरण सुनाया।\nब्रिटेन में उन दिनों चर्चिल प्रधानमंत्री नहीं थे। उनके दल की चुनाव में पराजय हो गयी, अत: वे विपक्ष के नेता बनाये गये। इसी नाते वह एक बार अमरीका गये। वहाँ पत्रकारों ने उनसे सरकार के बारे में प्रश्नव किये। उनका विचार था कि चर्चिल सरकार के विरुद्ध बोलेंगे; पर चर्चिल ने स्पष्ट कहा : अपने देश में भले ही मैं विरोधी दल का नेता हूँ; पर देश से बाहर मैं सरकार का समर्थक हूँ। इसलिए मैं अपनी सरकार के विरुद्ध कुछ नहीं बोलूँगा।\nयह उदाहरण बताता है कि देशभक्ति का सही अर्थ क्या है ?"}, {"person": "", "title": "राष्ट्रीय कौन ?", "text": "भारत में राष्ट्रीय कौन है, कौन देशी है और कौन विदेशी; यह प्रश्न. प्राय: अनेक बार उठ खड़ा होता है। इसके लिए श्री गुरुजी सियार और सिंह के बच्चों की यह रोचक कथा सुनाते थे।\nएक बार एक सियार का बच्चा जंगल में घूमते समय अपनी माँ से बिछुड़ गया। शाम हुई तो भूख और डर के मारे वह रोने लगा। उसी समय वहाँ से एक शेरनी जा रही थी। रोते बच्चे को देख वह उसे अपनी गुफा में ले आयी। उसे दूध पिलाया और अपने बच्चों के साथ-साथ उसका लालन-पालन भी करने लगी।\nधीरे-धीरे वह सियार का बच्चा शेर के बच्चों से घुलमिल गया। वह भी उनके साथ दिन भर जंगल में घूमता, खेलता और रात में शेरनी का दूघ पीकर सो जाता।\nवह सियार का बच्चा शेर के बच्चों से आयु में बड़ा था। एक दिन जंगल में घूमते हुए उन्हें एक हाथी दिखायी दिया। शेर के बच्चे बहुत खुश हुए। वे बोले आज बहुत दिनों बाद मोटा-ताजा शिकार मिला है, आओ इसे मार डालें।\nयह देखकर सियार का बच्चा बोला - अरे, क्या करते हो ? देखते नहीं, यह हमसे शरीर में कितना बड़ा और बलवान है। यदि हमने इस पर हमला किया, तो यह हमें ही मार डालेगा।\nशेर के बच्चे नहीं माने, वे हाथी पर हमला करने की तैयारी करने लगे। यह देखकर सियार का बच्चा दौड़ता हुआ घर आया। उसने शेरनी को कहा - माँ, देखो मेरे छोटे भाई मेरी बात नहीं मानते। वे अपने से बहुत बड़े हाथी से लड़ रहे हैं। वह उन्हें मार डालेगा।\nशेरनी ने हँसकर कहा - यह ठीक है कि तुम मेरा दूध पीकर बड़े हुए हो; पर तुम हो तो सियार ही। तुम्हारे वंश में कोई हाथी से नहीं लड़ता; पर हमारे यहाँ तो यह सामान्य सी बात है। इसलिए अच्छा यही है कि अब तुम अपने घर चले जाओ। ऐसा न हो कि मेरे बच्चे हाथी को मारने के बाद तुम पर ही हमला न बोल दें।\nइस कथा का अभिप्राय यह है कि यदि कोई व्यक्ति बाहर से आकर हमारे देश में रहने लगे, तो केवल इतने मात्र से ही वह भारत का राष्ट्रीय नहीं हो जाता। राष्ट्रीयता तो एक परम्परा है, जो पीढ़ी दर पीढ़ी मिलने वाले संस्कारों से दृढ़ होती है।"}, {"person": "", "title": "हिन्दू विचार और वेशभूषा", "text": "मनुष्य जिन विचारों और संस्कारों के बीच पलकर बड़ा होता है, वैसा ही उसका व्यवहार, खानपान और वेशभूषा भी हो जाती है।\nएक संन्यासी विदेश प्रवास पर गये। वहाँ एक व्यक्ति ने उनसे कहा कि आप हिन्दू लोग कैसी ढीली ढाली धोती पहनते हो ? यदि कहीं मारपीट हो गयी, तो न लड़ सकोगे और न भाग सकोगे।\nसंन्यासी ने हँसकर कहा - हम भारतीय सोचते हैं कि दुनिया में सब लोग हमारे जैसे ही सज्जन और सभ्य हैं। इसलिए लड़ाई और मारपीट का विचार हमारे मन में नहीं आता। दूसरी ओर तुम हर समय इसके बारे में ही सोचते रहते हो। इसलिए वैसी ही तुम्हारी वेशभूषा है और हिंसक पशुओं जैसा खानपान।"}, {"person": "", "title": "प्रकृति, विकृति और संस्कृति", "text": "एक प्रसिद्ध कहावत है कि अपनी रोटी खाना प्रकृति, दूसरे की रोटी खा लेना विकृति, तथा अपनी रोटी दूसरे को खिला देना संस्कृति है। इस संबंध में एक पुराना प्रसंग श्री गुरुजी सुनाते थे।\nयुधिष्ठिर ने एक बार राजसूय यज्ञ किया। यज्ञ के बाद दूर-दूर से आये विद्वानों को भरपूर दान देकर सम्मान सहित विदा किया गया। सब लोग यज्ञ की सफलता से बहुत प्रसन्न थे। एक दिन सभी परिवारजन बैठे थे कि एक नेवला वहाँ आया। उसे देखकर सब आश्चनर्यचकित रह गये। उसके शरीर का आधा हिस्सा सुनहरा था, जबकि शेष हिस्सा सामान्य नेवले जैसा था। वह नेवला अचानक मनुष्यों जैसी भाषा में बोलने लगा।\nनेवला बोला - महाराज युधिष्ठिर, यह ठीक है कि आपने यज्ञ में बहुत दान दिया है। यज्ञ भी समुचित विधि-विधान से हुआ है। आपको बहुत पुण्य और यश भी मिला है। फिर भी आपके यज्ञ में वह बात नहीं है, जो उस निर्धन अध्यापक के यज्ञ में थी।\nसब लोग हैरान हो गये। युधिष्ठिर बोले - तुम किस यज्ञ की बात कर रहे हो। कृपया हमें उसके बारे में कुछ बात बताओ। तुम्हारे शरीर का आघा भाग सुनहरा और शेष सामान्य नेवले जैसा क्यों है ? \nनेवला बोला - महाराज, मैं जहाँ से आ रहा हूँ, वहाँ भयानक अकाल पड़ा है। वहाँ एक निर्धन अध्यापक अपनी पत्नी, पुत्र और पुत्रवधू के साथ रहता था। वे घर आये अतिथि का भगवान समझकर सत्कार करते थे। वर्षों से वे इस परम्परा को निभा रहे थे।\nलेकिन अकाल के कारण उन्हें प्राय: कई दिन तक भूखा रहना पड़ता था। एक दिन वह अध्यापक कहीं से थोड़ा आटा लाया। उसकी पुत्रवधू ने उससे पाँच रोटी बनायीं। एक रोटी भगवान को अर्पण कर उन्होंने एक-एक रोटी आपस में बाँट ली। वे खाना प्रारम्भ कर ही रहे थे कि अचानक द्वार पर एक भिक्षुक दिखायी दिया। उसके शरीर को देखकर ही लग रहा था कि कई दिनों से उसके पेट में अन्न का एक दाना भी नहीं गया है।\nअध्यापक ने उसका सत्कार किया और अपनी रोटी उसे दे दी। पर उसकी भूख शांत नहीं हुई। अब अध्यापक की पत्नी ने अपने हिस्से की रोटी भी उसकी थाली में डाल दी। इसी प्रकार क्रमश: पुत्र और फिर पुत्रवघू ने भी अपनी रोटी उन अतिथि महोदय को दे दी। चारों रोटी खाकर वह तृप्त हो गया और आशीर्वाद देकर चला गया।\nनेवला बोला - महाराज, उस भिक्षुक के जाने के बाद मैं वहाँ आया, तो उस धरती पर गिरे कुछ अन्नकण मेरे शरीर से छू गये। बस उसी समय मेरा आधा शरीर सुनहरा हो गया। तब से मैं देश-विदेश में भटक रहा हूँ। जहाँ भी कोई बड़ा धार्मिक कार्यक्रम होता है, वहाँ जाता हूँ। आपके यज्ञ की भी मैंने बहुत प्रशंसा सुनी थी; पर यहाँ भी मेरा शेष शरीर सुनहरा नहीं हुआ। इसका अर्थ साफ है कि आपके इस यज्ञ का महत्त्व उस निर्धन अध्यापक के यज्ञ से कम है।\nयह कहानी हमें प्रकृति, विकृति और संस्कृति का अंतर स्पष्ट करते हुए बताती है कि भारतीय संस्कृति ही अपनी रोटी दूसरे को खिला देने की प्रेरणा देती है।"}, {"person": "", "title": "यह कैसी मुक्ति ?", "text": "कई बार लोग आपस के छोटे-छोटे मतभेदों में फँसकर इतने मूर्ख बन जाते हैं कि अपने भाई पर आने वाले संकट की भी अनदेखी कर जाते हैं। इसका दुष्परिणाम आगे चलकर उन्हें स्वयं भी भोगना पड़ता है। इसे समझाने के लिए श्री गुरुजी गुजरात के सोमनाथ मंदिर के विध्वंस का उदाहरण देते थे।\nसोमनाथ मंदिर की अतुल धन-सम्पत्ति के बारे में सुनकर महमूद गजनवी ने उस पर चढ़ाई करने की योजना बनायी। उसे पता था कि सोमनाथ पहुँचना आसान नहीं है। रास्ते में अनेक हिन्दू राज्य हैं, जिनकी सोमनाथ मंदिर के प्रति आस्था है। राजस्थान के निर्जन रेगिस्तान भी हैं, जिन्हें पार करना बहुत कठिन है। इस पर भी उसने अपना निश्चनय नहीं त्यागा और सेना लेकर चल दिया।\nउसे यह पता था कि गुजरात राज्य के प्रति आसपास के राज्यों में कुछ नाराजगी है। उसने सभी राजाओं से कहा कि वह सोमनाथ को जीतकर उन्हें भी गुजरात शासन के साम्राज्यवादी पंजे से मुक्त करायेगा। राजाओं ने उसकी धूर्तता को न समझते हुए उसे सोमनाथ तक पहुँचने का सरल मार्ग बता दिया।\nपर सोमनाथ को जीतकर महमूद गजनवी ने क्या किया ? उसने आसपास के राजाओं को भी लूटा। वहाँ के मंदिर और तीर्थों को अपमानित किया और इस प्रकार गुजरात, सौराष्ट्र एवं राजस्थान को लम्बे समय तक एक विदेशी एवं विधर्मी साम्राज्य के पंजे की नीचे दबकर रहना पड़ा।"}, {"person": "", "title": "व्यक्तिगत और राष्ट्रीय चरित्र", "text": "हर व्यक्ति का व्यक्तिगत चरित्र तो उज्जवल होना ही चाहिए; पर उसके राष्ट्रीय चरित्र के उज्जवल होने का महत्त्व उससे भी अधिक है। इस संबंध में श्री गुरुजी गुजरात का एक उदाहरण सुनाते थे।\nगुजरात के एक राज्य में राजा कर्ण के प्रधानमंत्री बहुत विद्वान एवं कलामर्मज्ञ थे। एक बार राजा ने अपने राज्य के एक वरिष्ठ सरदार की पत्नी का अपहरण कर लिया। प्रधानमंत्री ने राजा को उसकी गलती समझाने का प्रयास किया; पर न मानने पर वह क्रोधित हो गया। उसने राजा को दंड देने की प्रतिज्ञा की।\nप्रधानमंत्री ने क्रोध में अपना विवेक खो दिया। उसने दिल्ली के मुगल सुल्तान से सम्पर्क कर उन्हें अपने ही राज्य पर आक्रमण करने को उकसाया। मुगल सुल्तान को और क्या चाहिए था। उसने धावा बोला और राजा कर्ण की पराजय हुई। प्रधानमंत्री की प्रतिज्ञा पूरी हुई।\nपर इसके बाद क्या हुआ ? मुगलों ने राज्य में कत्लेआम मचा दिया। मंदिरों को तोड़ा, महिलाओं को अपमानित किया, गायों को काटा, हजारों स्त्री, पुरुष और बच्चों को आग में झोंक दिया, जिनमें उस प्रधानमंत्री के परिवारजन भी शामिल थे।\nइसके बाद भी वह सुल्तान वापस नहीं गया। उसने सैकड़ों साल तक उस राज्य को अपने अधीन रखा। इतना ही नहीं, वहाँ पैर जमाने के बाद उसने दक्षिण के अन्य राज्यों पर भी हमला बोला और वहाँ भी इसी प्रकार हिन्दुओं को अपमानित होना पड़ा।\nयह घटना बताती है कि राजा का राष्ट्रीय चरित्र तो ठीक था; पर निजी चरित्र नहीं। दूसरी ओर प्रधानमंत्री का निजी चरित्र ठीक था; पर राष्ट्रीय चरित्र के अभाव में उसके राज्य को मुगलों की अधीनता स्वीकार करनी पड़ी।"}, {"person": "", "title": "परोपकार भावना", "text": "अनेक लोग कहते हैं कि आज के भौतिकवादी युग में व्यक्ति केवल पैसे के लिए ही काम करता है; पर श्री गुरुजी कोलकाता की एक घटना सुनाकर बताते थे कि मन के संस्कार और परोपकार की भावना पैसे से अधिक प्रभावी होती है।\nबड़े शहरों में आजकल भूमिगत नालियाँ, सीवर लाइन आदि बन गयी हैं। इन्हें साफ करने के लिए गड्ढे बनाकर उसे ढक्कन से ढक देते हैं। पर कई बार इनके ढक्कन खुले रह जाते हैं। कोलकाता में एक मोहल्ले में ऐसी ही एक नाली का ढक्कन खुला रह गया। दो बच्चे वहीं पास खेल रहे थे। खेलते-खेलते वे उसमें गिर पड़े और जोर-जोर से चिल्लाने लगे। पास से ही एक व्यक्ति अपने काम पर जा रहा था। आवाज सुनकर उसने नीचे झाँका।\nबच्चों को चिल्लाता देखकर वह साइकिल से उतरा और गड्ढे में उतर गया। उसने प्रयासपूर्वक दोनों बच्चों को अपने कंधे पर उठा लिया और किसी तरह गड्ढे से बाहर निकाल दिया। पर इस बीच वह स्वयं बेहोश हो गया। क्योंकि इन नालियों में मलमूत्र प्रवाहित होते रहने के कारण जहरीली गैस भर जाती हैं। वह व्यक्ति उस गैस के दुष्प्रभाव से बेहोश होकर वहीं गिर गया। जब तक लोगों ने उसे बाहर निकाला, तब तक उसने दम तोड़ दिया। \nयह कथा सुनाकर श्री गुरुजी कहते थे कि उस व्यक्ति का दोनों बच्चों से कोई परिचय नहीं था। उनको बचाने से उसे रुपये-पैसे का लाभ भी नहीं मिलने वाला था। फिर भी वह अपनी जान की चिंता किये बिना गड्ढे में उतरा और उनकी जान बचायी।\nस्पष्ट है कि हर जगह पैसा ही महत्त्वपूर्ण नहीं होता। कई बार परोपकार की भावना और संस्कार भी व्यक्ति की गतिविधियों को संचालित करने में महत्त्वपूर्ण भूमिका निभाते हैं।"}, {"person": "", "title": "शिक्षित कौन ?", "text": "अनेक लोग स्वयं को शिक्षित और प्रगतिशील दिखाने के चक्कर में अपने हिन्दू प्रतीकों और नामों की उपेक्षा करते दिखते हैं। इसे स्पष्ट करने के लिए श्री गुरुजी ने एक बार यह कथा सुनायी।\nगाँव में रहने वाले एक निर्धन सज्जन ने अनेक कष्ट उठाकर भी अपने बच्चों को पढ़ाया। सौभाग्य से उनका एकमात्र पुत्र पढ़-लिखकर उच्च अधिकारी बन गया और एक बड़े शहर में उसकी नियुक्ति भी हो गयी। उचित समय पर उन्होंने पुत्र का विवाह किया। विवाह के बाद वह युवक पत्नी सहित शहर में ही रहने लगा।\nदो साल इसी प्रकार बीत गये, एक दिन उन्हें समाचार मिला कि उनके बेटे के घर में पुत्र का जन्म हुआ है। वे बहुत प्रसन्न हुए तथा अपने पौत्र को देखने की इच्छा से शहर की ओर चल दिये।\nजिस समय वे अपने बेटे की कोठी पर पहुँचे, वह अपने मित्रों के साथ बैठा चाय पी रहा था। जब उसने अपने पिता को आते हुए देखा, तो वह घबरा गया। उसने सोचा कि मेरे ये मित्र क्या सोचेंगे कि ऐसा गँवार और निर्धन व्यक्ति उसका पिता है। उसने एक नौकर को भेजा, जिससे वह पिताजी को पिछले दरवाजे से अंदर ले आये।\nजब एक मित्र ने आंगतुक के बारे में पूछा, तो उसने बताया कि ये हमारा पुराना घरेलू नौकर है और गाँव से आ रहा है। उसके पिता ने यह सुन लिया। वे सबके सामने गुस्से में बोले : मैं कौन हूँ, यह इसकी माँ से पूछ लो। इतना कहकर वे अपना सामान उठाकर बिना पौत्र को देखे वापस चले गये।\nइस घटना का संदेश है कि अच्छी शिक्षा वही है, जो संस्कारों को जीवित और जाग्रत रखे। ऐसी उच्च शिक्षा का क्या लाभ, जिससे व्यक्ति अपने घर्म, संस्कृति और परिवार से ही कट जाये।"}, {"person": "", "title": "क्षमा से दिल जीतो", "text": "संघ कार्य के लिए कई बार ऐसे स्थानों पर जाना होता है, जहाँ लोग संघ को नहीं जानते। कई बार वहाँ के लोग विरोधियों द्वारा किये गये दुष्प्रचार से ही अधिक प्रभावित होते हैं। अत: वे कार्यकर्ताओं को भला-बुरा भी कहते हैं।\nश्री गुरुजी का विचार था कि इन विरोधियों के प्रति भी प्रेमभाव रखते हुए ऐसे अपमान को चुपचाप सह लेना चाहिए। वे ईसामसीह का उदाहरण देते थे। जब उनके विरोधियों ने उन्हें वधस्तम्भ (क्रास) पर चढ़ाया, तब भी उन्होंने प्रार्थना की - हे प्रभु, इन्हें क्षमा करना, क्योंकि ये नहीं जानते कि ये क्या कर रहे हैं ?"}, {"person": "", "title": "एक व्यक्ति पर निर्भरता ठीक नहीं", "text": "प्राय: अनेक संस्थाएं, संगठन तथा कभी-कभी तो देश भी एक व्यक्ति के नेतृत्व पर इतने निर्भर हो जाते हैं कि उसके अभाव में लोग अपनी हिम्मत ही छोड़ बैठते हैं।\nसन 1761 में पानीपत के मैदान में विशाल युद्ध हुआ। अहमदशाह अब्दाली विदेशी हमलावर था, दूसरी ओर हिन्दू सेना का नेतृत्व सदाशिवराव पेशवा हाथी पर बैठकर कर रहे थे। जब युद्ध पूरे यौवन पर था, तो अचानक पेशवा हाथी से उतरकर घोड़े पर सवार हो गये और प्रत्यक्ष युद्ध करने लगे।\nजैसे ही सैनिकों ने देखा कि पेशवा का हाथी तो है; लेकिन उस पर सेनापति दिखायी नहीं दे रहे, उनका मनोबल टूट गया। उनमें भगदड़ मच गयी और जीतता हुआ युद्ध हिन्दू सेना हार गयी। इस युद्ध ने भारत के इतिहास की धारा ही बदल दी।\nइसके विपरीत शिवाजी महाराज ने जब स्वराज्य की स्थापना की, तो देश के सर्वसामान्य व्यक्तियों में देशप्रेम की भावना और नेतृत्वक्षमता उत्पन्न की। इसका परिणाम बहुत अच्छा रहा। \nशिवाजी के देहांत के बाद औरंगजेब स्वयं एक विशाल सेना लेकर हिन्दू राज्य को कुचलने के लिए दक्षिण में आया। उसने शिवाजी के बड़े पुत्र संभाजी को मरवा दिया और दूसरे पुत्र राजाराम को जिंजी के किले में घेर लिया। सम्पूर्ण राज्य और सेना नेतृत्वविहीन हो गयी।\nलेकिन इसके बाद भी जनता ने हिम्मत नहीं हारी। औरंगजेब की विशाल मुसलमान सेना बीस साल तक संघर्ष करती रही; पर वह स्वराज्य को कुचल नहीं सकी। एक बार तो हिन्दू सैनिक औरंगजेब की शाही छावनी में घुस गये और उसके निजी तम्बू का सोने से बना कलश काटकर ले गये। औरंगजेब इससे इतना निराश और हताश हुआ कि वह दक्षिण में ही मर गया।\nयह शिवाजी की बुद्धिमत्ता ही थी कि उन्होंने व्यक्तिगत नेतृत्व के बदले सामूहिक नेतृत्व विकसित किया। उसी का यह सुपरिणाम था।"}, {"person": "", "title": "व्यापार का आधार सच", "text": "आजकल चारों ओर भ्रष्टाचार का बोलबाला है। लोगों की यह धारणा बन गयी है कि ईमानदारी से व्यापार नहीं हो सकता। श्री गुरुजी के विचार में ईमानदारी से काम करने पर प्रारम्भ में कुछ समय कठिनाई होती है; पर फिर सदा सफलता ही मिलती है।\nश्री गुरुजी नागपुर के एक व्यापारी का उदाहरण देते थे। उसकी दुकान पर दिन भर भीड़ लगी रहती थी। पूछने पर उसने बताया कि वह अपनी दुकान पर सदा साफ माल बेचता है और उनका मूल्य भी समुचित रखता है। ग्राहक चाहे छोटा बच्चा हो या बड़ा आदमी, दाम और माल में कोई फर्क नहीं होता।\nइस कारण शुरू में उसे अनेक परेशानियां झेलनी पड़ीं। घर वालों तथा अन्य व्यापारियों ने भी हतोत्साहित किया; पर उसने अपना ईमानदारी का व्यवहार नहीं छोड़ा। परिणाम यह हुआ कि अब उसकी दुकान पर पूरे बाजार से अधिक भीड़ रहती है। लोग उससे उधार सामान भी ले जाते हैं; पर किसी ने उसका पैसा नहीं मारा।\nनि:संदेह सच की शक्ति बहुत है; पर उसे अपना प्रभाव जमाने में समय लगता है। लेकिन एक बार उसकी सुगंध फैली, तो वह सदा के लिए लाभ देती है।"}, {"person": "", "title": "दूसरे का अन्न", "text": "सामाजिक कार्य करते समय भी प्राय: बहुतों के मन में अपने-पराये का विचार रहता है। इस संबंध में सही दृष्टिकोण समझाने के लिए श्री गुरुजी ने एक बार यह घटना सुनायी।\nएक बार श्री गुरुजी किसी स्थान पर एक प्रतिष्ठित सज्जन से मिलने गये, उनके साथ कुछ स्थानीय कार्यकर्ता भी थे। चलते समय एक कार्यकर्ता ने उन सज्जन से कहा - कल श्री गुरुजी मेरे घर भोजन करने आयेंगे, मेरी प्रार्थना है कि आप भी पधारें।\nवे सज्जन बोले - आपका निमन्त्रण मेरे लिए प्रसन्नता की बात है; पर मेरा नियम है कि मैं दूसरे का अन्न नहीं खाता। इसलिए मैं नहीं आ सकूँगा। यह सुनकर श्री गुरुजी ने कहा - दूसरे का अन्न न खाने का नियम मेरा भी है।\nयह सुनकर सब चौंक गये। इस पर श्री गुरुजी ने समझाया - मैं कल जिनके घर भोजन के लिए जाने वाला हूँ, वे हिन्दू हैं और संघ के स्वयंसेवक भी। फिर वे पराये कैसे हो गये ? और जब वे पराये नहीं हैं, तो उनके घर का अन्न मेरे लिए पराया कैसे हो गया ?\nबात सबकी समझ में आ गयी। हिन्दू समाज का एक-एक व्यक्ति अपने सगे भाई जैसा है। यह भाव मन में रहने पर ही हम समाज का कार्य करने में सफल हो पायेंगे।"}, {"person": "", "title": "मनोबल का महत्त्व", "text": "कई लोग शरीर से तो बहुत बलशाली होते हैं; पर मनोबल न होने के कारण वे प्राय: कुछ कर नहीं पाते। श्री गुरुजी काशी में पढ़ते समय एक महीने के विशेष अध्ययन के लिए प्रयाग गये थे। इस बारे में उस समय का एक अनुभव वे सुनाते थे।\nप्रयाग विश्वेविद्यालय में उस समय एक पहलवान छात्र भी पढ़ रहा था। उसने कुश्ती में अनेक पदक पाये थे। वहीं एक दुबला-पतला, पर बहुत चुस्त व फुर्तीला बंगाली युवक भी था। वह प्राय: शांत भाव से अपने अध्ययन में लगा रहता था।\nएक बार उन दोनों में किसी बात पर झगड़ा हो गया। अपने स्वभाव के अनुरूप पहले तो वह बंगाली युवक शांत ही रहा; पर जब बात बहुत आगे बढ़ गयी, तो उससे नहीं रहा गया। उसने पहलवान के मुँह पर एक जोरदार थप्पड़ जड़ दिया। केवल इतने पर ही वह नहीं रुका। उसने पहलवान पर घूँसों की बरसात भी कर दी।\nपहलवान युवक भौचक रह गया। उसके पास शरीर-बल तो था; पर मनोबल नहीं। बंगाली युवक ने उसे धक्का देकर नीचे गिरा दिया और उसके सीने पर चढ़ बैठा। पहलवान के पाँव उखड़ गये, उसने जैसे-तैसे स्वयं को छुड़ाया और मैदान छोड़कर भाग गया। \nस्पष्ट है कि शरीर-बल के साथ मनोबल होना भी बहुत आवश्यक है। बिना मनोबल के शरीर-बल का कोई महत्त्व नहीं है।"}, {"person": "", "title": "नकल से सफलता नहीं", "text": "महापुरुषों का जीवन पढ़कर उनके गुण अपने जीवन में उतारना तो ठीक है; पर यदि उनके रंग-रूप की नकल करने का प्रयास किया, तो प्राय: हँसी ही बनती है।\nएक बार किसी कार्यकर्ता ने शिवाजी के विश्व्स्त साथी तानाजी मालसुरे की जीवनी पढ़ी। वह उससे बहुत प्रभावित हुआ। उसने विचार किया जिस गाँव में मुझे नयी शाखा स्थापित करनी है, यदि वहाँ मैं तानाजी जैसे कपड़े पहनकर जाऊँ, तो लोग शीघ्र आकर्षित होंगे और मेरा कार्य सरल हो जाएगा।\nउसने वहाँ खबर भिजवा दी कि कल शाम को मैं तानाजी बनकर गाँव में आऊँगा। अगले दिन उसने किराये पर एक घोड़ा, सैनिक के कपड़े, पगड़ी, तलवार आदि ली और सजधज कर घोड़े पर बैठकर गाँव की ओर चल दिया। गाँव दूर था, अत: वहाँ पहुँचने में तीन-चार घंटे लग गये।\nगाँव में खबर थी ही, लोग चौपाल पर एकत्र थे। सबने ताली बजाकर उसका स्वागत किया। गाँव के मुखिया ने उनके गले में माला डालकर कहा - आइये महाराज उतरिये, मेरे घर चलिये।\nपर वह नकली ‘तानाजी’ घोड़े से उतरे कैसे ? उसे घोड़े पर बैठने का अभ्यास तो था नहीं। अत: चार घंटे की सवारी से उसकी टाँगे जाम हो गयीं। उन्होंने सीधी होने से मना कर दिया।\nमुखिया जी समझ गये। उन्होंने कुछ लोगों की सहायता से उन्हें घोड़े से उतारा। वे जिस स्थिति में घोड़े पर बैठे थे, उसी स्थिति में उतर कर खड़े हो गये। चार कदम चलना भी उनके लिए संभव नहीं था। मुखिया जी ने कई दिन तक उनकी टाँगों की सिकाई और मालिश करवायी, तब वे सामान्य स्थिति में आये।\nस्पष्ट है कि समाज के काम में महत्त्व मन की भावना का है, नकल का नहीं।"}, {"person": "", "title": "लगातार काम करने से लाभ", "text": "कुछ लोग स्थिर होकर किसी काम को नहीं करते, इसलिए उन्हें कभी सफलता भी नहीं मिलती। जबकि सफलता के लिए लगातार काम करना जरूरी है।\nश्री गुरुजी अपने प्रवास के दौरान एक कार्यकर्ता के घर में ठहरे थे। उस घर में एक छात्र भी रहता था। परीक्षा का समय निकट था; पर उसने साल भर कुछ खास पढ़ाई नहीं की थी। उसने गुरुजी को देखकर सोचा कि ये दाढ़ी वाले सज्जन अवश्य कोई सिद्ध संन्यासी होंगे। ये शायद कोई उपाय बता दें। वह समय निकालकर गुरुजी के पास आया और बोला - मुझे किसी काम में सफलता नहीं मिलती, क्या आप कोई उपाय बता सकते हैं ?\nगुरुजी ने मन की एकाग्रता के लिए आसन-प्राणायाम जैसी कुछ विधियाँ बतायीं। उसने पूछा - इन्हें कितने दिन तक करना होगा ? गुरुजी ने कहा - यदि लाभ हो तो फिर सदा ही करते रहो। इस पर उसका मुँह लटक गया। बोला - यह तो बहुत कठिन है। मैं किसी काम को लगातार नहीं कर सकता।\nश्री गुरुजी ने हँसकर कहा - तो फिर सफलता की आशा मत करो। सफलता के लिए लगातार काम करना जरूरी है।"}, {"person": "", "title": "श्रीकृष्ण का आत्मविश्वा.स", "text": "यदि मन में आत्मविश्वा.स हो, तो अधिकांश बाधाएँ काम प्रारम्भ करने से पूर्व ही दम तोड़ देती हैं।\nजब पांडवों ने अपना बारह वर्ष का वनवास और एक वर्ष का अज्ञातवास सफलतापूर्वक पूरा कर लिया, तो उन्होंने कौरवों से अपना राज्य वापस माँगा; पर कौरवों ने उन्हें राज्य नहीं दिया। पांडवों ने अनेक तरह से उन्हें समझाने का प्रयास किया; पर वे नहीं माने। अंतत: युद्ध करने का ही निश्चवय हुआ।\nयुद्ध से पूर्व अंतिम प्रयास के रूप में पांडवों की ओर से श्रीकृष्ण ने एक बार फिर कौरवों के पास जाने की इच्छा व्यक्त की। युधिष्ठिर के मन में भय जाग गया। वे बोले - हे कृष्ण ! आप तो हमारे सबसे बड़े हितैषी और मित्र हैं। आपके बल पर ही हम यह युद्ध मोल ले रहे हैं। यदि दुर्योधन ने आपको ही बन्दी बना लिया या मार डाला, तो हमारा क्या होगा ?\nश्रीकृष्ण हँसकर बोले - यदि ऐसा हुआ, तो फिर तुम्हें युद्ध करने की आवश्यकता ही नहीं रहेगी। मैं अकेला ही उसके सारे भाइयों और सेना को पराजित कर दूँगा।\nश्री गुरुजी इस प्रसंग को सुनाकर बताते थे कि हमारे मन में भी ऐसा ही प्रबल आत्मविश्वाीस होना चाहिए।"}, {"person": "", "title": "श्रेय किसको ?", "text": "प्राय: लोग काम के समय तो पीछे रहते हैं; पर श्रेय लेने के लिए सबसे आगे खड़े दिखायी देते हैं। श्री गुरुजी संघ के सरसंघचालक थे। सब लोग उन्हें संघ का सर्वेसर्वा मानते और कहते थे। पर उनके मन में ऐसा कोई अहंकार नहीं था। एक बार इस संबंध में उन्होंने यह कथा सुनायी।\nएक व्यक्ति अपने ऊँट को लेकर कहीं जा रहा था। कुछ दूर चलने के बाद उसने ऊँट के गले में बंधी रस्सी छोड़ दी, फिर भी ऊँट अपने मार्ग पर ठीक से चलता रहा। रस्सी को जमीन पर घिसटता देखकर एक चूहा आया और वह उस रस्सी को पकड़कर ऊँट के साथ-साथ चलने लगा।\nथोड़ी देर बाद चूहे ने अहंकार से ऊँट की ओर देखा और कहा - तुम अपने को बहुत शक्तिशाली समझते हो; पर देखो, इस समय मैं तुम्हें खींचकर ले जा रहा हूँ। यह सुनकर ऊँट हँसा और उसने अपनी गर्दन को जरा सा हिलाया। ऐसा करते ही चूहा दूर जा पड़ा।\nयह कथा सुनाकर श्री गुरुजी ने कहा - ऐसे ही राष्ट्रीय स्वयंसेवक संघ नामक अपना यह विशाल संगठन है। इसकी रस्सी का एक छोर पकड़कर यदि मैं यह कहूँ कि मैं इसे चला रहा हूँ, तो यह मेरी नहीं, चूहे जैसी क्षुद्र बुद्धि वाले किसी व्यक्ति का कथन होगा।\nवस्तुत: संघ सब स्वयंसेवकों की सामूहिक शक्ति से चल रहा है। आवश्यकता इस बात की है कि हम इसमें और अधिक बुद्धि और शक्ति लगायें। यही हम सबका कर्तव्य है।"}, {"person": "", "title": "पुष्पमाला", "text": "श्री गुरुजी कार्यकर्ताओं के साथ वार्तालाप में छोटी-छोटी बातों पर बहुत ध्यान दिया करते थे। उनका प्रार्थना के शुद्ध उच्चारण पर बहुत जोर रहता था। गलत उच्चारण से क्या दुष्परिणाम हो सकता है, इसके लिए वे यह प्राचीन कथा सुनाते थे।\nएक बार देवता अपने वृद्ध पुरोहित से किसी बात पर नाराज हो गये। नाराजगी इतनी अधिक हो गयी कि उन्होंने पुरोहित की हत्या ही कर दी। देवताओं के राजा इन्द्र ने इस कार्य का नेतृत्व किया था। इस कारण पुरोहित के पुत्र ने इन्द्र से बदला लेने की ठान ली।\nपुरोहित के पुत्र ने एक विशाल यज्ञ का आयोजन किया। यज्ञ की समाप्ति पर ब्रह्मा जी प्रकट हुए। उन्होंने पुरोहित के पुत्र से मनचाहा वर माँगने को कहा। पुरोहित के पुत्र ने इन्द्र से अपनी शत्रुता की बात बताते हुए कहा - मैं ऐसा पुत्र चाहता हूँ, जो ‘इन्द्रशत्रु’ अर्थात इन्द्र को मारने वाला हो।\nपर उसने बोलते समय इन्द्र’ के नाम पर अधिक जोर दिया और शत्रु’ शब्द को धीरे से बोला। इस पर ब्रह्मा जी हँसे और ‘तथास्तु’ कहकर विदा हो गये। समय आने पर उसे एक अति बलशाली पुत्र की प्राप्ति हुई। पुरोहित के पुत्र ने सोचा कि अब शीघ्र ही मेरी इच्छा पूरी होगी। मेरा बेटा इन्द्र को मारकर अपने दादा जी की हत्या का बदला अवश्य लेगा। पर जब उस पुत्र ने बड़े होकर इन्द्र को चुनौती दी, तो युद्ध में मामला उलट गया। इन्द्र ने उसे ही मार डाला।\nवास्तव में वरदान माँगते समय ‘इन्द्र’ शब्द को अधिक जोर से बोलने के कारण इन्द्र प्रभावी हो गये; पर ‘शत्रु’ शब्द धीरे से बोलने के कारण इन्द्र का शत्रु अर्थात पुरोहित का वह पौत्र कमजोर ही रह गया। इसलिए युद्ध में इन्द्र विजयी रहे।\nइस कथा का अर्थ यह है कि प्रार्थना बोलते समय उसका उच्चारण ठीक होना चाहिए तथा उसके भावार्थ को भी समझना जरूरी है।"}, {"person": "", "title": "देशभक्ति और पैसा", "text": "प्राय: लोग समझते हैं कि पैसे से लोगों में देशभक्ति जाग्रत की जा सकती है; पर श्री गुरुजी इस विचार के समर्थक नहीं थे। उनका मानना था कि देशभक्ति श्रद्धा का विषय है। उसे पैसे से प्राप्त नहीं किया जा सकता।\n1965 में पाकिस्तान ने भारत पर आक्रमण कर दिया। युद्ध के दौरान पाकिस्तान ने अपने कुछ छतरीधारी सैनिकों को पंजाब में उतार दिया। यह सूचना मिलते ही सरकार ने घोषणा की कि जो कोई उन सैनिकों को पकड़वायेगा, उसे नकद पुरस्कार दिया जायेगा।\nश्री गुरुजी ने नेताओं से कहा कि यह युद्ध का समय है। इस समय प्रत्येक नागरिक में देशभक्ति की भावना हिलोरें ले रही है। अत: हमें जनता से यह आह्नान करना चाहिए कि इन दुश्मनों को पकड़ना हमारा कर्तव्य है। पैसे का लालच देकर लोगों की भावना को हल्का नहीं करना चाहिए।\nयदि पैसे के लालच में लोग दुश्मन सैनिकों को पकड़ेंगे, तो हो सकता है कि पैसे के लालच में वे उन्हें छोड़ भी दें। देशभक्ति को पैसे से तोलना ठीक नहीं है।"}, {"person": "", "title": "निरर्थक ज्ञान", "text": "ऐसे ज्ञान का कोई लाभ नहीं, जिसके साथ बुद्धि और विवेक न हो। इसे समझाने के लिए श्री गुरुजी ने एक बार यह कथा सुनायी।\nरामकृष्ण परमहंस ने अपने शिष्यों से वार्तालाप में एक बार बताया कि ईश्व र द्वारा बनायी गयी इस सृष्टि के कण-कण में परमेश्विर का वास है। अत: प्रत्येक जीव के लिए हमें अपने मन में आदर एवं प्रेम का भाव रखना चाहिए।\nएक शिष्य ने इस बात को मन में बैठा लिया। कुछ दिन बाद वह कहीं जा रहा था। उसने देखा कि सामने से एक हाथी आ रहा है। हाथी पर बैठा महावत चिल्ला रहा था - सामने से हट जाओ, हाथी पागल है। वह मेरे काबू में भी नहीं है।\nशिष्य ने यह बात सुनी; पर उसने सोचा कि गुरुजी ने कहा था कि सृष्टि के कण-कण में परमेश्व र का वास है। अत: इस हाथी में भी परमेश्वकर होगा। फिर वह मुझे हानि कैसे पहुँचा सकता है ? यह सोचकर उसने महावत की चेतावनी पर कोई ध्यान नहीं दिया।\nजब वह हाथी के निकट आया, तो परमेश्विर का रूप मानकर उसने हाथी को साष्टांग प्रणाम किया। इससे हाथी भड़क गया। उसने शिष्य को सूंड में लपेटा और दूर फेंक दिया। शिष्य को बहुत चोट आयी। वह कराहता हुआ रामकृष्ण परमहंस के पास आया और बोला - आपने जो बताया था, वह सच नहीं है। यदि मुझमें भी वही ईश्व र है, जो हाथी में है, तो उसने मुझे फेंक क्यों दिया ?\nपरमहंस जी ने हँस कर पूछा - क्या हाथी अकेला था ? शिष्य ने कहा - नहीं, उस पर महावत बैठा चिल्ला रहा था कि हाथी पागल है। उसके पास मत आओ।\nइस पर परमहंस जी ने कहा - पगले, हाथी परमेश्वशर का रूप था, तो उस पर बैठा महावत भी तो उसी का रूप था। तुमने महावत रूपी परमेश्वीर की बात नहीं मानी, इसलिए तुम्हें हानि उठानी पड़ी।\nकथा का अभिप्राय यह है कि बड़ों की बात में निहित विचार को ग्रहण करना चहिए। केवल शब्दों को पकड़ने से काम नहीं चलता।"}, {"person": "", "title": "पराजित का तत्त्वज्ञान", "text": "कोई बात कितनी भी ठीक हो; पर यदि उसे कहने वाला दुर्बल है, तो उसकी बात नहीं सुनी जाती। इस संबंध में श्री गुरुजी ने एक बार जापान का यह प्रसंग सुनाया।\nभारत के प्रसिद्ध कवि एवं साहित्यकार रविन्द्रनाथ टैगोर एक बार जापान के प्रवास पर गये। वहाँ उन्हें एक विश्वाविद्यालय के छात्रों के सम्मुख भारतीय विचार एवं तत्त्वज्ञान की श्रेष्ठता पर भाषण देना था।\nविश्व्विद्यालय के प्रबन्धकों ने सभी छात्रों को कार्यक्रम में आने की सूचना दी थी। छात्रावास भी वहीं आसपास ही थे; पर आश्चरर्य कि एक भी छात्र भाषण सुनने के लिए वहाँ नहीं आया। कार्यक्रम स्थल पर केवल रविन्द्रनाथ टैगोर और आयोजक ही उपस्थित थे।\nबाद में जब छात्रों से न आने का कारण पूछा गया, तो उन्होंने स्पष्ट उत्तर दिया - गुलाम देश के नागरिक से हम उनके विचार की श्रेष्ठता की बात कैसे सुन सकते हैं। यदि उनका तत्त्वज्ञान श्रेष्ठ है, तो वे अपने देश को स्वतन्त्र क्यों नहीं करा लेते ?"}, {"person": "", "title": "सजगता का महत्त्व", "text": "यदि कोई व्यक्ति दुर्बल हो, तो आसपास के लोग उसे बिना बात ही परेशान करने लगते हैं। यही बात किसी कमजोर समाज या देश के लिए भी सत्य है। इसलिए हमें सदा सावधान और संगठित रहना चाहिए। संघ अपनी शाखाओं के माध्यम से यही कार्य कर रहा है। इसे समझाने के लिए श्री गुरुजी एक प्रसंग सुनाते थे।\nजब वे छात्रावास में रहते थे, तो अपने कमरे से बाहर जाते समय वे कमरे में ताला डाल देते थे। एक बार उनके साथियों ने इस बारे में पूछा, तो उन्होंने कहा - मेरे कमरे में कोई ऐसी कीमती वस्तु नहीं है, जिसके चुराये जाने का खतरा हो। फिर आप सब मित्रों पर भी मुझे पूरा विश्वा।स है। लेकिन यदि कमरा खुला रहे, तो अच्छे व्यक्ति के मन में भी कभी-कभी बुरे विचार आ जाते हैं। इसलिए मैं ऐसा करता हूँ। ताला चोरों के लिए नहीं है। वह तो इसलिए है कि कहीं सज्जन ही चोर न बन जायें।\nइस उदाहरण को सुनाकर श्री गुरुजी बताते थे कि जिन देशों की सीमाओं पर सुरक्षा का उचित प्रबन्ध नहीं होता, उसकी धरती पर पड़ोसी देश कैंजा कर लेते हैं।\nश्री गुरुजी की चेतावनी शत-प्रतिशत सत्य सिद्ध हुई है। हमारी दुर्बलता के कारण चीन, पाकिस्तान और बांग्लादेश ने हमारी लाखों वर्ग किलोमीटर भूमि दबा रखी है; पर हम उदासीन होकर सब चुपचाप सह रहे हैं।"}, {"person": "", "title": "अपने देश को न भूलें", "text": "कुछ लोग वैश्विभक समस्याओं के समाधान में हर समय स्वयं को व्यस्त रखते हैं। ऐसे लोगों से श्री गुरुजी कहते थे कि विश्वा के साथ-साथ अपने देश के बारे में भी सोचना चाहिए। इसे समझाने के लिए वे एक कथा सुनाते थे।\nखगोल-शास्त्र के एक प्रसिद्ध विद्वान थे। प्राय: रात में वे चन्द्रमा, तारों आदि का अध्ययन करते रहते थे। एक बार वे आकाश की ओर देखते हुए चल रहे थे और साथ में नक्षत्रों का अध्ययन भी कर रहे थे। अचानक चलते-चलते वे एक सूखे कुएँ में गिर गये। चोट और दर्द से कराहते हुए वे सहायता की पुकार करने लगे।\nकुछ देर बाद वहाँ से गुजर रहे लोगों ने उनकी आवाज सुनी, तो उन्हें निकाला। दुर्घटना का कारण पूछने पर वे बोले - मैं आकाश की ओर देखने में इतना तल्लीन था कि धरती का ध्यान ही नहीं रहा।\nऐसे ही जो लोग दुनिया भर की चिन्ता में व्यस्त रहते हैं, यदि वे अपने देश की समस्याओं की ओर ध्यान नहीं देंगे, तो उनका हाल भी उन्हीं विद्वान की तरह होगा।"}, {"person": "", "title": "बालपन के संस्कारों का महत्त्व", "text": "आजकल इतिहास को ठीक से लिखने का प्रयास कुछ देशभक्त विद्वानों द्वारा हो रहा है। इसका विरोध वे लोग कर रहे हैं, जो भारत को अनपढ़ और अंधविश्वा.सी लोगों का देश मानते हैं। जबकि सच यह है कि भारत देश लाखों वर्ष पुराना है। हमारा इतिहास गौरवशाली रहा है। लगभग एक हजार साल के जिस कालखंड को पराजय का बताया जाता है, वह भी गुलामी का नहीं अपितु सतत् संघर्ष का कालखंड है।\nश्री गुरुजी की मान्यता थी कि इतिहास को इसी दृष्टिकोण से पढ़ाना चाहिए। इससे नयी पीढ़ी के मन में देश के प्रति गौरव का भाव जाग्रत होगा। पर यदि उन्हें पराजय और गुलामी जैसी गलत बातें ही पढ़ाई जाएँगी, तो उनके मन में हीनभाव पैदा होगा। अर्थात् वे छोटी अवस्था से ही बच्चों के मन में सही संस्कार डालने के समर्थक थे। इस संबंध में वे एक कथा सुनाते थे।\nएक राजा के दरबार में पक्षी बेचने वाला व्यापारी आया। उसके पास देश-विदेश के बहुमूल्य पक्षी थे। उनमें से दो तोते तो बहुत ही बुद्धिमान थे। व्यापारी ने बताया कि ये दोनों जो भी सुनते हैं, उसे शीघ्र ही याद कर लेते हैं। राजा ने दोनों तोते खरीद लिये। एक उसने अपने द्वारपाल को तथा दूसरा अपने पुरोहित को दे दिया।\nकुछ समय बाद राजा को उन दोनों तोतों की याद आयी। उसने उन्हें मँगवाया, तो उसे बहुत आश्चार्य हुआ। एक तोता सुन्दर श्लो क और हरिनाम बोल रहा था, जबकि दूसरा गन्दी गालियाँ बक रहा था।\nराजा ने पहले तोते से इसका कारण पूछा। उसने बताया कि मैं पुरोहित जी के घर पर रहा। वे अपने पास आने वालों को अच्छे श्लो क और भगवान की कथा सुनाते थे, इस कारण मैं भी वही सब सीख गया। मेरे साथी को आपने द्वारपाल को दिया था। वह आने वालों से सदा गाली-गलौच से बात करता था, इसलिए उसे वही चीजें याद हो गयीं। यह दोष मेरे साथी तोते का नहीं अपितु उस द्वारपाल का है, जिसके पास उसे रखा गया था।\nस्पष्ट है कि संस्कारों का बहुत महत्त्व है। जो बात बचपन में मन मस्तिष्क में बैठा दी जाये, वह लम्बे समय तक याद रहती है। इसीलिए बच्चों को सही इतिहास ही पढ़ाया जाना चाहिए।"}, {"person": "", "title": "संकटों का भी स्वागत", "text": "संघ-कार्य करने वालों को अनेक बाधाओं और संकटों का सामना करना पड़ता है। लोग तरह-तरह से उन्हें परेशान करते हैं; पर जिसके मन में अपने लक्ष्य के प्रति अविचल श्रद्धा रहती है, वह इन सब पर विजय पाकर सफल होता है।\nसंत तुकाराम जी हर समय भगवान के ध्यान में डूबे रहते थे। लोग इस कारण उनकी बहुत निन्दा करते थे और उनके रास्ते पर काँटे बिखेर देते थे। उनकी झगड़ालू पत्नी भी उन्हें गालियाँ देती रहती थी। उनकी दुकान चौपट हो गयी; पर तुकाराम जी विचलित नहीं हुए। वे इन संकटों के लिए भी ईश्व र को धन्यवाद ही देते थे।\nऐसा कहते हैं कि उनकी भक्ति से प्रसन्न होकर ईश्वखर ने उनके लिए विमान भेजा और वे इसी शरीर के साथ स्वर्ग चले गये।"}, {"person": "", "title": "झूठ और सच", "text": "श्री गुरुजी की मान्यता थी कि यदि नयी पीढ़ी को अपने देश का गलत इतिहास पढ़ाया जाएगा, तो वे सदा भ्रमित ही रहेंगे। गलत बात को भी बार-बार सुनने से कैसे भ्रम उत्पन्न होते हैं, इस बारे में वे यह कथा सुनाते थे।\nएक सरल स्वभाव के ग्रामीण ने बाजार से एक बकरी खरीदी। उसने सोचा था कि इस पर खर्च तो कुछ होगा नहीं; पर मेरे छोटे बच्चों को पीने के लिए दूध मिलने लगेगा। इसी सोच में खुशी-खुशी वह बकरी को कंघे पर लिये घर जा रहा था।\nरास्ते में उसे तीन ठग मिल गये। उन्होंने उसे मूर्ख बनाकर बकरी हड़पने की योजना बनायी और उसके गाँव के रास्ते में थोड़ी-थोड़ी दूरी पर खड़े हो गये। जब पहले ठग को वह ग्रामीण मिला, तो ठग बोला - भैया, इस कुतिया को क्यों पीठ पर उठाये ले जा रहे हो ?\nग्रामीण ने उसकी ओर उपेक्षा से देखकर कहा - अपनी आँखों का इलाज करा लो। यह कुतिया नहीं, बकरी है। इसे मैंने आज ही बाजार से खरीदा है। ठग हँसा और बोला - मेरी आँखें तो ठीक हैं, पर गड़बड़ तुम्हारी आँखों में लगती है। खैर, मुझे क्या फर्क पड़ता है। तुम जानो और तुम्हारी कुतिया।\nग्रामीण थोड़ी दूर और चला कि दूसरा ठग मिल गया। उसने भी यही बात कही - क्यों भाई, कुतिया को कंधे पर लादकर क्यों अपनी हँसी करा रहे हो। इसे फेंक क्यों नहीं देते ?\nअब ग्रामीण के मन में संदेह पैदा हो गया। उसने बकरी को कंधे से उतारा और उलट-पलटकर देखा। पर वह थी तो बकरी ही। इसलिए वह फिर अपने रास्ते पर चल पड़ा।\nथोड़ी दूरी पर तीसरा ठग भी मिल गया। उसने बड़ी नम्रता से कहा - भाई, आप शक्ल-सूरत और कपड़ों से तो भले आदमी लगते हैं; फिर कंधे पर कुतिया क्यों लिये जा रहे हैं ?\nग्रामीण को गुस्सा आ गया। वह बोला - तुम्हारा दिमाग तो ठीक है, जो इस बकरी को कुतिया बता रहे हो ? ठग बोला - तुम मुझे चाहे जो कहो; पर गाँव में जाने पर लोग जब हँसेंगे और तुम्हारा दिमाग खराब बतायेंगे, तो मुझे दोष मत देना।\nजब एक के बाद एक तीन लोगों ने लगातार एक जैसी ही बात कही, तो ग्रामीण को भरोसा हो गया कि उसे किसी ने मूर्ख बनाकर यह कुतिया दे दी है। उसने बकरी को वहीं फेंक दिया। ठग तो इसी प्रतीक्षा में थे। उन्होंने बकरी को उठाया और चलते बने।\nयह कथा बताती है कि गलत बात को बार-बार बताने से बड़ा आदमी भी भ्रम में पड़ जाता है, तो फिर छोटे बच्चों की तो बात ही क्या है ? इसलिए बच्चों को शुरू से ठीक इतिहास पढ़ाया जाना आवश्यक है।"}, {"person": "", "title": "प्रश्न. अनेक : उत्तर एक", "text": "आज भारत में जाति, भाषा, प्रान्तभेद जैसी अनेक समस्याएँ हैं, जिनके कारण जनजीवन अस्त-व्यस्त रहता है। हिन्दुओं को इनके कारण से भारत में तथा विश्व. में भी अपमान सहना पड़ता है। श्री गुरुजी हिन्दुओं के प्रबल संगठन को ऐसी सब बीमारियों की एकमात्र और अचूक दवा बताते थे।\nइस संबंध में वे एक रोचक पहेली की चर्चा करते थे। एक राजा ने अपने दरबार में एक पहेली पूछते हुए कहा कि प्रश्ना तीन हैं; पर इनका उत्तर एक ही है। प्रश्नभ हैं - घोड़ा अड़ा क्यों, पान सड़ा क्यों और रोटी जली क्यों ?\nजब कोई इसका उत्तर न दे सका, तो राजा ने सबसे बुद्धिमान दरबारी की ओर देखा। उसने कहा - महाराज, इसका उत्तर है : फेरा न था। अर्थात घोड़े के पैरों की मालिश जरूरी है। ऐसे ही पान और रोटी को यदि उलट-पलट नहीं करेंगे, तो पान सड़ जायेगा और रोटी जल जायेगी।\nइसी प्रकार भारत की सभी समस्याओं का एकमात्र निदान हिन्दुओं का प्रबल संगठन है।"}, {"person": "", "title": "स्वयं को पहचानें", "text": "हिन्दू समाज विश्व. का सबसे शक्तिशाली और बुद्धिमान समाज है; पर वह आत्मविस्मृति की बीमारी से ग्रस्त है। इसी कारण विदेशी एवं विधर्मी उस पर रौब दिखाते हैं।\nऐसा इतिहास में पहले भी कई बार हो चुका है। लंका जाने के लिए जब कोई भी समुद्र लाँघने का साहस नहीं कर पा रहा था। तब जाम्बवन्त ने हनुमान को उनकी शक्ति की याद दिलायी। ऐसा होते ही उन्होंने अपने शरीर को बढ़ा लिया और समुद्र लाँघकर सीता माता का पता लगाया।\nइसी प्रकार महाभारत युद्ध के समय अर्जुन भी अपने कर्तव्य को भूल गया था। पर भगवान श्रीकृष्ण ने उसे आत्मज्ञान कराया, तो वह रण में उतरा और विजय प्राप्त की।\nएक जंगल में एक शेर का बच्चा अपने परिवार से बिछुड़ गया। उसे एक गडरिये ने देखा, तो अपने घर उठा लाया। उसकी भेड़ों के बीच वह भी पलने लगा। उसकी आदतें भी उन जैसी ही हो गयीं। वह कुत्ते, भेड़िये आदि को देखकर डरने लगा।\nएक दिन एक शेर ने भेड़ों के झुंड पर हमला बोला और दो भेड़ों को उठाकर ले जाने लगा। तभी उसकी नजर उस शेर के बच्चे पर पड़ी। वह भी अन्य भेड़ों के साथ डरकर भाग रहा था। शेर ने उसे पकड़ लिया और उससे पूछा कि तू कौन है ?\nवह बच्चा तो डर रहा था। उसके मुँह से आवाज ही नहीं निकली। तब शेर उसे नदी के पास लाया और कहा - देख, तेरी और मेरी सूरत एक जैसी है। तू भेड़ का नहीं, शेर का बच्चा है। गरदन उठा, सीना फुला और मुँह खोलकर दहाड़ मार।\nजैसे ही शेर के बच्चे ने ऐसा किया, तो उसकी आवाज से जंगल गूँज उठा। अब उसे अपनी वास्तविकता समझ में आयी। उसने भेड़ों का साथ छोड़ा और शेरों के साथ रहने लगा।\nयही स्थिति हिन्दू समाज की है। उसे अपनी शक्ति और गौरव का पता ही नहीं है। इस आत्मविस्मृति को मिटाकर उसे अपनी असली स्थिति की याद दिलाने का प्रयास ही संघ कर रहा है।"}, {"person": "", "title": "छोटी-छोटी बातें", "text": "शाखा पर नियम से, समय पर और उचित वेश में आना चाहिए। वहाँ
