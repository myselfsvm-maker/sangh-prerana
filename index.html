ई। सभा का विषय महत्व का था। वक्तागण भी अच्छे थे। सभा में हजारों लोग एकत्रित हुए थे। प्रथम वक्ता का भाषण हो गया दूसरा बोल रहा था।\n   कुछ दुष्ट लोग उस सभा को भंग करने के लिए वहां आये थे। वे बीच में बैठे थे। उनमें से किसी एक ने भीड पर मेंढक फैंका। किसी ने कहा- “सांप-सांप!’’ तब पांच-दस लोगों ने सांप-सांप कहकर भागना शुरु किया। वास्तविकता का बिना पता लगाये, सब लोग भागने लगे। एक को देखकर दूसरा भागने लगा। कितने ही लोग गिर पडे। कुछ लोगों की टोपियां गिर गयीं, तो कुछ लोगों ने साफे वहीं पडे रहे। ऐसी भगदड मची मानों हर किसी के प्राणों पर बीती हो। हजारों लोगों की वह सभा पंद्रह मिनटों में उद्धवस्त हो गयी।\n   तीन दिन बाद डाक्टरजी जब नागपुर लौटे, तब उन्हें सभा का वृत्त मिला। वह सुनकर उनहें बहुत दुख हुआ। सभा में जो सज्जन उपस्थित थे, उनमें से अनेकों के घर वे गये। तब इस प्रकार प्रश्नो त्तर हुए।\n   डाक्टरजी - “उस दिन की महत्वपूर्ण सभा में आप तो उपस्थित थे ही।’’\n   सज्जन - “जी हां, मैं तो संयोजकों में से एक था।’’\n   डाक्टरजी - “फिर वह सभा भंग कैसे हुई?’’\n   सज्जन - “अजी क्या कहें, कुछ गुंडों ने योजना बनाकर यह कुकर्म किया। मेरी तो बहुत इच्छा थी, उन्हें वहीं दबा दूं, परन्तु मैं अकेला क्या कर सकता था?’’ डाक्टरजी अनेक परिचित उपस्थित सज्जनों के घर गये। सैकडों लोगों से उन्होंने वही प्रश्नन पूछे। उत्तरों का सारांश यही था, “मेरी बहुत इच्छा थी। परन्तु मैं अकेला क्या कर सकता था?’’"}, {"person": "", "title": "मैं अकेला ! 2", "text": "डाक्टरजी ने इस सभा का हाल अपने स्वयंसेवकों को बताया और अन्त में कहा- “मैं अकेला हूं, यही हिन्दू समाज का सबसे बडा रोग है। उसे हमें नष्ट करना है। किसी भी अच्छे कार्य के लिए बिना बुलाये लोगों को जुटाना चाहिए। दुष्ट लोगों की संख्या बहुत कम हुआ करती है। परंतु वे “चोर-चोर मौसेरे भाई’’, कहावत के अनुसार झटसे जुट जाते हैं और सज्जन लोग दूर-दूर रहते हैं। अच्छा काम करने के लिए भी डरते हैं। फिर कहते हैं- “मैं अकेला क्या कर सकता हूं?’’ इस परिस्थिति को हमें बदलना है। हर हिन्दू को ऐसा प्रतीत होना चाहिए कि मैं अकेला नहीं हूं, पूरा समाज मेरे साथ है। मैं विशाल हिन्दू राष्ट्र का एक घटक हूं। अतः पूरे हिन्दू राष्ट्र का बल मुझे प्राप्त है। मेरा यह शुभ कार्य है, अतः प्रत्यक्ष परमेश्वहर मेरा रखवाला है। हर हिन्दू में यदि हम यह भाव जगा सकें तो हमारा देश दुनिया भर में अग्रगण्य होगा। संघ को यही कार्य करना है।’’\nइस प्रकार का मार्गदर्शन डाक्टरजी स्वयंसेवकों को नित्य देते रहते थे। प्रत्येक स्वयंसेवक का शारीरिक, मानसिक तथा बौद्धिक विकास होता रहे और वह एक आदर्श नागरिक बने, इसकी वे रात-दिन चिंता करते थे। इसका परिणाम यह हुआ कि नागपुर में संघ की कई उपशाखाएं चलने लगीं।"}, {"person": "", "title": "एक आपत्ति", "text": "संघ का कार्य धीरे-धीरे बढ रहा था। परन्तु उसी समय संकटों के काले बादल भी मंडराने लगे। डाक्टरजी कह भर देते हैं और सैकडों युवक तद्नुसार कार्य करते हैं, यह देखकर अनेक नेताओं ने मन में डाक्टरजी के प्रति मत्सर उत्पन्न हुआ। जो लोग व्यायामशाला चलाते थे, उन्हें लगा, ये संघ के लोग हमारे तरुणों को आये दिन आकर्षित करते चले जा रहे हैं, अतः ये हमारे शत्रु हैं। कुछ लोग अपने का उग्र हिन्दुत्ववादी कहते थे। उनका दावा था कि हम बडे मनीषी हैं, नेता हैं। अतः संघ को हमारे आधीन रहना चाहिए। हमारी सभाओं की व्यवस्था संघ के स्वयंसेवक को संभालनी चाहिए। हमारे आदेश मानने चाहिए। संघ के कार्यकर्ताओंने जब उन्हें बताया कि, संघ किसी व्यक्ति या पक्ष के आधीन नहीं रहेगा, उसे सब पक्ष समान है, तब वे लोग संघ की कडी आलोचना करने लगे, और संघ कार्य का विरोध करने लगे।"}, {"person": "", "title": "एक आपत्ति  2", "text": "कुछ मुसलमान समझने लगे कि, हमें पीटने के लिए ही ये लोग लाठी चलाने का अभ्यास कर रहे हैं, अतः ये हामरे शत्रु हैं। कुछ कांग्रेस के कार्यकर्ताओं को मुसलमानों का विशेष आकर्षण था। वे समझते थे कि बिना मुसलमानों की सहायता लिये कोई सत्कार्य और राष्ट्रकार्य हो ही नहीं सकता। संघ तो केवल हिन्दू संगठन की बात करता है अर्थात् वह मुसलमानों का विरोधी होना ही चाहिए और इस कल्पना एवम् तर्क को आधार मानकर कुछ कांग्रेसी लोक भी संघ कार्य का विरोध करने लगे। अंग्रेज लोग जानते थे कि संघ ने सच्ची राष्ट्रीयता की नस पकड ली है। सच्ची राष्ट्रीय भावना इस देश में कभी पनपनी ही नहीं चाहिए, ऐसा अंग्रेज अधिकारियों का सदा से प्रयत्न था। अतः संघ की ओर वे भी शत्रुभावना से देखने लगे। \nअंग्रेज के गुप्तचर विभाग के डाक्टरजी का पूर्व चरित्र भलीभांति ज्ञात था, परन्तु डाक्टरजी के विरुद्ध किसी प्रकार का कोई प्रमाण उनके पास उपलब्ध नहीं था। वे चाहते थे कि कुछ ऐसा कारण मिल जाय, जिससे हम डाक्टरजी को पकड लें। उन्हें कारागृह में ठूंस दें। तब “न रहेगा बांस, न बजेगी बांसुरी।’’ संघ आप ही आप समाप्त हो जायेगा।"}, {"person": "", "title": "एक आपत्ति 3", "text": "इस प्रकार से चारों दिशाओं में संकट छाने लगे, परंतु डाक्टरजी तनिक भी विचलित नहीं हुए। कभी चतुराई से, कभी शान्त रहकर तो कभी आक्रमण कर उन्होंने सब संकटों का सामना किया और अपने प्रिय संघ-कार्य को शत्रुओं से बचाया। उन्होंने किसी बात की आंच, संघ को नहीं लगने दी।\nभारत की चिरकालिन उन्नति की दृष्टि से शस्त्रमय क्रान्ति की त्रुटियों को जानकर, डाक्टरजी ने अपने पुराने क्रान्तिकारक जीवन के सब सूत्र सामाप्त कर दिये थे। परन्तु एक बार एक आपत्ति आ धमकी। डाक्टरजी बडी कुशलता से उसमें से बच निकले। एकाध बार रसोईघर की सब आग बुझाने पर भी कहीं छोटीसी अंगार वैसी ही रह जावे, थोडी देर बाद वह धधक उठे, आसपास आग लगा दे, परन्तु संयोग से कोई व्यवस्थापक वहां आ जाय, और सब को संकट से मुक्त करे; वैसी ही बात यहां हो गयी।"}, {"person": "", "title": "एक आपत्ति  4", "text": "गंगाप्रसाद पाण्डे नाम का डाक्टरजी का क्रांतिकारी जीवन का एक पुराना सहकारी था। वह साधु बनकर एक सुनसान मंदिर में रहता था। परन्तु जब वह बीमार हुआ तो वर्धा के निकट दो मील पर एक गांव में उसका भाई रहता था, उसके पास पहुंचा। आदेशों का उल्लंघन कर गंगाप्रसाद ने अपनी पिस्तौल आदि हथियार अपने पास ही रखे थे। उसने उन्हें नष्ट नहीं किया था। गंगाप्रसाद की बीमारी की स्थिति में उसके एक चेले ने चार-छः लोग जुटाये और उन्हीं शास्त्रों का उपयोग का उन लोगों ने एक स्टेशन को लूटने का प्रयास किया।\n   डाक्टरजी को इस घटना का पता चला। उन्होंने तुरंत ही उस घटना का संदर्भ और अर्थ समझ लिया। वे नागपुर से निकले और वर्धा में उनके मित्र आप्पाजी जोशी के पास पहुंचे। उन्होंने आप्पाजी से काह, “हमें, इसी समय गंगाप्रसाद की कुटिया में जाना है। वहां पर पुराने शस्त्र हैं। उनका दुरुपयोग हो रहा है। यदि वह सब पुलिस के हाथ में लग जाय, तो वे लोग बहुत बडा बवंडर खडा कर सकते हैं।’’\n   आप्पाजी ने कहा, “आप जातने हैं, हम दोनों पर गुप्तचरों की निगरानी रहती है और गंगाप्रसाद की कुटिया के आसपास भी पुलिस अधिकारी ताक में बैठे होगे। अतः हम लोगों का वहां जाना उचित न होगा।’’\n   डाक्टरजी ने कहा, “आपका कहना ठीक है, परन्तु इस समय यदि हम यह कदम नहीं उठाते हैं तो हो सकता है, हम पर बहुत बडी आपत्ति आ जाय। चलिये जल्दी।’’\n   आप्पाजी जोशी तुरंत डाक्टरजी के साथ हो लिये। मध्यरात्रि का समय था, चारों ओर घना अंधकार था। परन्तु किसी बात की चिन्ता न करते हुए दोनों सीधे गंगाप्रसाद के निवासस्थान पर पहुंचे। डाक्टरजी नीम के पेड की आड में खडे रहे। आप्पाजी कुटिया में पहुंचे और उन्होंने डाक्टरजी का संदेश बिस्तरे पर लेटे हुए गंगाप्रसाद को धीरे से कहा। गंगाप्रसाद उठा, बाहर आया और उसने अपने पास के शस्त्र डाक्टरजी को सौंप दिये।\n   डाक्टरजी चलने को ही थे कि दो बलदण्ड व्यक्ति डाक्टरजी पर झपट पडे। डाक्टरजी झटसे पीछे हटे। उन्होंने वे शस्त्र आप्पाजी को दिये। आप्पाजी उन्हें लेकर तेजी से भागे और अन्धेरे में गुप्त हो गये। तब डाक्टरजी की उन दोनों के साथ मुठभेड हुई। डाक्टरजी ने दोनो को धर दबोचा और मुक्कों से इतना मारा कि उन्हें उठना मुश्किल हो गया। जब वे दोनों बहुत कराहने लगे तब उन्हें वहीं छोडकर डाक्टरजी भी अंधेरे में गायब हो गये।\n   दूसरे दिन डाक्टरजी नागपुर आये और शांत चित्त से अपने नित्य कार्य में लगे रहे। डाक्टरजी की सावधानी के कारण और हिम्मत के कारण एक संकट टल गया। अन्यथा पता नहीं क्या हो जाता। डाक्टरजी सदैव सतर्क रहा करते थे। अंग्रेज अधिकारी और छोटी-बडी संस्थाएं, संघ पर आघात करने की घात में थीं। परन्तु डाक्टरजी ने कभी शक्ति का उपयोग कर, तो कभी युक्ति का प्रयोग कर, संघ को बचाया और बढाया। अपना सब कार्य वे खुलेआम करते थे। कहीं कोई भी गुप्तबात वे नहीं रखते थे। उनके घर का दरवाजा हर समय खुलाही रहता था।"}, {"person": "", "title": "जंगल सत्याग्रह  1", "text": "बारह मार्च 1930 को महात्मा गांधी, नमक सत्याग्रह के लिए, अहमदाबाद से चल पडे। दिनांक 5 अप्रैल को वे दांडी पहुंचे। सरकारी कानून का भंग कर उन्होंने वहां से नमक उठाया। यह कानून तोडने के आन्दोलन का प्रारंभ था। फिर देशभर में वह लहर फैलने लगी। जहां नमक-कानून तोडने के लिए समुद्र नहीं था, वहां पर अन्य कानून तोडे जाने लगे। मध्यप्रदेश में बापूजी आणे ने जंगल सत्याग्रह प्रारंभ किया। डाक्टरजी उसमें सहभागी हुए।\n   सत्याग्रह में जाने के पूर्व उन्होंने संघ के स्वयंसेवकों को एकत्रित किया। यह सत्याग्रह क्यों हो रहा है? मैं उसमें क्यों भाग ले रहा हूं? देश की परिस्थिति कैसी है? कैसी बदल सकती है? आदि विषयों पर उन्होंने स्वयंसेवकों के सामने अपने विचार रखे। जैसी योजना बनी थी, तदनुसार 14 जुलाई 1930 को डाक्टरजी ने अपने दल के साथ नागपुर से प्रस्थान किया। उन्हें बिदाई देने के लिए सैंकडों नागरिक नागपुर स्टेशन पर उपस्थित थे। जब गाडी चलने लगी, तब, “भारत माता की जय’’ के नारों से आकाश गूंज उठा।\n   हर स्टेशन पर डाक्टरजी को मिलने के लिए लोग आते थे। उनका सत्कार किया जाता था। संघ के अनेक स्वयंसेवक भी डाक्टरजी से मिलने आते थे। मुर्तिजापुर स्टेशन पर जब कुछ स्वयंसेवक डाक्टरजी से मिलने आये, तब डाक्टरजी ने उन्हें कहा, “चलो हमारे साथ, घर बैठे क्या करोगे?’’ उसी क्षण उन्होंने टिकिट निकाला और वे गाडी में बैठ गये। “घर का क्या होगा, बाद में आता हूं, पीछे की व्यवस्था कर आता हूं’’, इस प्रकार का कोई वाक्य किसी के भी मुख से नहीं निकला। डाक्टरजी ने चलो कहा, बस चल दिये।"}, {"person": "", "title": "जंगल सत्याग्रह  2", "text": "22 जुलाई 1930 को डाक्टरजी ने यवतमाल के निकट के वन में, अपना जत्था लेकर सत्याग्रह किया। उन्हें नौ मास की सश्रम कारावास की सजा दी गयी। दूसरे ही दिन उन्हें अकोला के कारागार में भेजा गया।\n   कहा जाता है, कि पारस के स्पर्श से लोहा सोना बन जाता है। सन्तों के सम्पर्क में आकर सामान्यजन सत्पुरुष बन गये हैं। डाक्टरजी के पास वैसी ही कुछ अद्भुत शक्ति थी। डाक्टरजी ने अकोला कारागार के वायुमण्डल में आमूलाग्र परिवर्तन कर दिये। उनके व्यवहारचातुर्य और मधुरवाणी से प्रभावित होकर जेल के छोटे-बडे सब अधिकारी उनके मित्र बन गये। विदर्भ के अनेक स्थानों से संघ के स्वयंसेवक वहां आये थे। जब उन्हें डाक्टरजी वहां है यह पता चला, तब उन्हें असीम आनंद हुआ। अकोला-निवासी डाक्टर ठोसर, मेहरकर के दादासाहब सोमण, वर्धा के आप्पाजी जोशी, यवतमाल के स.ह. बल्लाळ, आकोट के दाजीसाहब बेदरकर, ऐसे सब रथी-महारथी अकोला कारागार में एकत्रित हुए। फिर वह कारागार नहीं रहा। वहा संघ का एक शिक्षासत्र बन गया।"}, {"person": "", "title": "जंगल सत्याग्रह 3", "text": "डाक्टरजी वहां पर नित्य नये-नये लोगों से परिचय करते थे। उनसे सम्पर्क बढाकर विचारविनिमय करते थे और संघ की विचारधारा उन्हें समझाते थे। वहां पर उन्होंने कई गणमान्य लोगों का प्रतिज्ञा देकर संघ का स्वयंसेवक बनाया। अनेक कार्यकर्ताओं को डाक्टरजी की श्रेष्ठता की अनुभूति उस काराजीवन में प्राप्त हुई। सामान्यः बडे-बडे नेताओं के बारे में यह पाया जाता है कि दूर के ढोल सुहावने। परन्तु डाक्टरजी वैसे नहीं थे। उनका निकट सहावास बहुत सुखदायी था, नयी प्रेरणा देनेवाला था, डाक्टरजी की सूझबूझ की नयी झलक दिखानेवाला था। डाक्टरजी अन्तर्बाह्य निर्मल थे, निष्कपट थे, प्रेममय थे।\n   14 फरवरी 1931 को डाक्टरजी मुक्त हुए। तत्पश्चाकत् वे नागपुर आये और अपना सम्पूर्ण बल समेटकर वे संघ का काम करने लगे। धीरे-धीरे अन्य कार्यों से उन्होंने अपना मन हटा लिया।"}, {"person": "", "title": "एक स्वप्न   1", "text": "डाक्टर हेडगेवार रात-दिन संघ का काम करने लगे। सुबह-शाम, दिन में और रात में घर और बाहर, वे एकमात्र संघ का ही विचार करते थे। वे कभी स्वप्न देखते थे तो वह भी संघ के सम्बन्ध में ही होता था।\n   एक बार नागपुर की एक शाखा में स्वयंसेवकों के कुछ विवाद हुआ। परिणाम यह हुआ कि उनके छोटे-छोटे दो दल बन गये। एक दलने शाखा में आना बन्द कर दिया। दूसरा दल समझने लगा कि अपनी विजय हुई। यह सब वृत्त सुनकर डाक्टरजी को बहुत दुख हुआ। वे दोनों दलों के प्रत्येक व्यक्ति से मिले। प्रत्येक को उन्होंने समझाया। प्रत्येक का मनोमालिन्य उन्होंने दूर किया। वे सब पूर्ववत् शाखा में आने लगे। वह शाखा सुचारू रूप से चलने लगे।\n   इस घटना के पश्चा त नागपुर के सब स्वयंसेवकों को एकत्रित कर डाक्टरजी ने उन्हें कहा, “प्रिय स्वयंसेवक बंधुओं! इतिहास से सबक सीखना ही बुद्धिमानी का लक्षण है। छोटे से अहंकार को पालना, पोसना, बढाना, व्यक्तिगत आकांक्षा रखना, अपने छोटे-छोटे गट बनाकर दलबन्दी करना, जरासी बात पर आपस में लडना, इसी से हमारे देश की दुर्गति हुई है। इन सब दुर्गुणों को हमारे देश से उखाडकर फैंकने के लिए ही संघ का निर्माण हुआ है। इसलिए यह निश्चतय करें कि चाहे जो हो जाये, हम आपस में कभी नहीं झगडेंगे। मानों कुछ मतभेद हो गया; किसी ने किसी का कहा नहीं माना, अथवा कोई छोटा-बडा कार्य दूसरे ढंग से किया गया, तो उसके लिए नाराज होकर संघ में आना बन्द करना कहां तक उचित है? संघ किसी छोटे-बडे व्यक्ति की निजी सम्पत्ति नहीं है। संघ मेरा नहीं है, संघ हम सब लोगों का है। संघ समूचे समाज का है। संघ इस भारतवर्ष का है। हम इसे कैसे छोड सकते हैं?’’"}, {"person": "", "title": "एक स्वप्न  2", "text": "“पिछले सप्ताह आपसी झगडे की बात सुनकर मुझे बहुत दुख हुआ। रातभर मैं उसी बात का विचार करता रहा। उसी में झपकी लग गयी और मैने एक स्वप्न देखा। मैं प्राचीनकाल में पहुंच गया। हम लोग दुर्ग में थे। युद्ध की सिद्धता हो गयी थी। तब एकाएक शत्रु ने आक्रमण किया, उन्होने तोप चलायी। तोप के गोले से दीवार में छेद हुआ। दीवार के पत्थर भीतर गिर पडे। हम लोग तुरंत जुट गये। रातभर परिश्रम कर हमने वह छेद बंद किया, तब हमारे सेनापति ने कहा, बाहर के आक्रमण का हमें डर नहीं है। दुर्ग की दीवार भीतर की और ढह जाती है तो हमें चिन्ता नहीं है। दीवार बाहर की ओर न ढहने पावे, ईटें और पत्थर बाहर न गिर पडें।’’\n   “ये शब्द मैने सुने और मेरी नींद खुल गयी। मेरे इस स्वप्न ने हम सब स्वयंसेवकों के लिए एक महत्वपूर्ण संदेश दिया है। बाहर से कितने भी आक्रमण क्यों न होते रहे, उनसे संघ की कोई भी हानि नहीं होगी बल्कि लाभ ही होगा। परन्तु हमारे स्वयंसेवक कभी संघ न छोडें, दीवार की ईटें कभी बाहर की ओर न गिरें।’’"}, {"person": "", "title": "प्रसन्नता की मूर्ति", "text": "अनेक नेताओं के बारे में या बडे लोगों के बारे में यह पाया जाता है, कि उनके स्वभाव में कुछ रुक्षता रहती है। कुछ लोगों की मुद्रा पर उग्रता रहती है। कुछ लोग अहंकारवश नित्य उच्च धरातल पर विचरते हैं और दूसरों को तुच्छ मानते हैं। कुछ लोग नित्य उपदेश देते रहते हैं। डाक्टरजी के पास यह कुछ भी नहीं था। \n   उनका हर व्यवहार सौजन्यशील और सौम्य रहा करता था। उनकी मुद्रा पर सदैव सहज स्मित झलकता था। देशभर में वे घूमे थे। छोटे-बडे कार्यकर्ताओं का उन्हें निकट सहवास मिला था। अतः उनके पास संस्मरणों का भांडार भरा हुआ था। अपने अनुभव वे रोचक ढंग से सुनाते थे। उनकी स्मरणशक्ति तीव्र थी। एक बार किसी आदमी से परिचय हो जाय, तो वे उसे कभी नहीं भूलते थे। उनके बोलने में कभी औपचारिकता नहीं रहती थी। उनकी बुद्धि तीक्ष्ण थी। अतः वे हर बात का दूसरा पहलू देखते थे और हास्य उत्पन्न करते थे।\n   एक बार डाक्टरजी एक स्वयंसेवक के घर विवाह-समारोह के लिए गये। उनके कमरे में युवक मंडली जुटी थी। हां पर लगातार बातचीत चल रही थी, और हर पंद्रह-बीस मिनट के बाद सब लोग ठहाका मारकर हंसते थे। वह सुनकर एक प्रौढ सज्जन ने सोचा, “इन लडकों ने यह क्या लगा रखा है?  इन्हें कुछ डांटना पडेगा। डाक्टर हेडगेवारजी वहां लेटे होंगे। उन्हें कितनी तकलीफ होती होगी।’’ ऐसा सोचकर वे जब उस कमरे में गये तब वहां का दृश्य देखकर चकित हो गये। डाक्टरजी ही उस हास्य-विनोद का केन्द्र थे। सब युवक उनके आसपास बैठे थे और उनकी बात ध्यान से सुनते थे। डाक्टरजी कुछ विनोदभरे प्रसंग सुना रहे थे। सबके साथ वे भी हास्य में सहभागी होते थे।"}, {"person": "", "title": "कैसी विनम्रता  1", "text": "संघ कार्य केलिए डाक्टरजी मान-अपमान सब कुछ पी जाते थे। देशभर में वे जाते थे। छोटे-बडे नगरों में जाकर वहां के कार्यकर्ताओं से वे मिलते थे। संघ कल्पना हर किसी को वे समझाते थे। छोटे नेता भी अपने को बडा समझते थे और अपने मतों का आग्रहपूर्वक प्रतिपादन करते थे। स्वयं महास्वार्थी और कर्तृत्वशून्य होने पर भी, वे डाक्टरजी से उल्टे-सीधे प्रश्नन पूछते थे तथा उन्हें उपदेश देते थे।\n   कोई कहता, “हिन्दुस्थान हिन्दुओं का कैसे हो सकता है? हिन्दू शब्द वेदों में और पुराणों में तो नहीं है, फिर हम उसपर इतना जोर क्यों दें? और हिन्दुओं का संगठन?  यह तो असंभव बात है। अजी आप सुन लीजिए, एक बार खरगोश को सिंग निकलेगे, एक बार कुत्ते की दुम सीधी हो सकेगी, परन्तु कभी भी हिन्दू संगठित नहीं हो सकेंगे। इस कार्य में अपनी शक्ति लगाना बेकार है।’’"}, {"person": "", "title": "कैसी विनम्रता  2", "text": "कोई कहता, “आप वार्षिक समारोह क्यों नहीं करते?’’ कोई कहता “आप चन्दा क्यों नही उगाहते?’’ कोई कहता, “आपके सिद्धान्त तो ठीक हैं पर ये रोज की उपस्थिति कठिन है।’’ कोई कहता कि, “लाठी, तलवार बंद करों।’’ कोई समता शिक्षा की सराहना करता तो कोई उसे हानिकारक बतात। कोई आरोप लगाता कि,“आप हिंसाचार को प्रोत्साहन देते हैं’’ तो कोई कहता, “आप तो अकर्मण्य अहिंसक है।’’ कुछ लोग लाठी-तलवार से असंतुष्ट थे, वे कहते, “बम-पिस्तौल इत्यादि ले आईये, तब हम आपका साथ देंगे।’’ कुछ लोग कहते थे, “तुम्हारे संघ में जो भाषण होते हैं वे हमने सुने हैं। न तुम लोग कभी अंग्रेजों को गालियां देते हो, न मुसलमानों को।’’\n   कोई नारेबाजी चाहते थे तो कोई जुलूस एवम् आन्दोलनों का पुरस्कार करते थे। कुछ लोग कहते थे, संघ के स्वयंसेवकों को हाथों में झाडू लेकर सब दूर सफाई का काम करना चाहिए। कुछ लोग दवाखाने खोलने का, दवाइयां बांटने का या मृतकों को जलाने का कार्य संघ को करना चाहिए, ऐसा कहते थे। कुछ लोग अपनी बुद्धि के अनुसार संघ को आर्थिक, सामाजिक, राजनैतिक, शैक्षणिक, धार्मिक आदि क्षेत्रों में छोटे-बडे कार्य करने का सुझाव देते थे।"}, {"person": "", "title": "कैसी विनम्रता  3", "text": "कुछ लोग कह देते थे, “तुम्हारा यह संघ किसी काम का नहीं है। यह निष्क्रिय है। यह कभी बढेगा नहीं।’’ कुछ लोग बडी शान से कहते, “संघ का काम ठीक चल रहा है, इसी प्रकार चलने दीजिए।’’ फिर वे धीरे से अपने मित्रों से कहते, “संघ की कल्पना मूलतः मेरी ही है। मैं समय-समय पर डाक्टरजी को मार्गदर्शन करता रहा हूं। जैसा में बतलाया गया वैसा वे काम करते रहे, इसीलिए तो उन्हें यश मिल रहा है।’’\n   डाक्टरजी जब स्थान-स्थान पर लोगों से मिलते थे, तब उन्हें ऐसी सब बातें सुनाई देती थीं। डाक्टरजी शान्त चित्त से सुनते रहते थे। डाक्टरजी के साथ जो स्वयंसेवक जाते थे, वे बहुत नाराज होते थे। वे सोचते थे, “यह तीन कौडी का आदमी हमारे डाक्टरजी को उपदेश देने की हिम्मत करता है?’’ परन्तु डाक्टरजी सब को बडप्पन देते थे। वे सब की सुन लेते थे। नम्र भाव से उत्तर देते थे। कभी हंसकर प्रश्न  टाल देते थे। परन्तु वे कभी वाद-विवाद नहीं करते थे। बाद में वे अपने स्वयंसेवकों से कहते थे, “देखो, संघ केवल मेरा या तुम्हारा नहीं है। यह सम्पूर्ण समाज का है। अतः समाज के घटकों को अपना मत देने का पूर्ण अधिकार है। हमें उसे आदरपूर्वक सुनना चाहिए। वे अपने शक्तिपर विचार तो करते हैं, कल कार्य भी करने लगेंगे। हमारे साथ भी आवेंगे।’’"}, {"person": "", "title": "कैसी विनम्रता  4", "text": "“वैसे देखा जाय तो संघ का विचार बहुत सरल है और प्राचीन है। मैने कोई भी नयी बात नहीं बतायी है। हमारे महान तत्वज्ञान को प्रत्यक्ष व्यवहार में लाने का यह प्रयास है। सम्पूर्ण हिन्दू समाज को एक परिवार का रूप देने का यह प्रयास है। संघकार्य के आधारभूत विचारों में न कोई बात कठिन है और न जटिल है। परन्तु बडे लोग प्रत्यक्ष व्यवहार की ओर कम देखते हैं और कल्पना की उडाने अधिक भरते हैं। इसलिए उन्हें संघ का आकलन नहीं होता। फिर कुछ लोग दूसरे के मुंह की ओर ताकते रहते हैं। रशिया, जर्मनी, इंग्लैंड, अमरीका किसी न किसी देश का उनके मन पर गहरा प्रभाव रहता है। वे भारत को वैसा ही बनाना चाहते हैं और उसी चष्में से देखते हैं।’’\n   “जो अपने देश का इतिहास, उसका मूलभूत तत्वज्ञान और वर्तमान परिस्थिति, इनका सम्यक् विचार करेगा उसे संघकार्य तुरन्तु जयेगा, भाएगा।’’\n   डाक्टरजी जहां भी जाते वहां पर वे जितनी तत्परता से बडे नेताओं से और कार्यकर्ताओं से मिलते थे उससे अधिक तत्परता से वे नवयुवकों से और बालकों से मिलते थे। उनका बालक जैसा शुद्ध मन बालकों में अधिक रमता था। विनोद के तौर पर वे कहा करते थे -\n   जहां बूढों का संघ, वहां खर्चो से तंग।\n   जहां बालों का संग, वहां बाजे मृदंग।"}, {"person": "", "title": "एक आकर्षक व्यक्तिमत्व  1", "text": "नागपुर नगर में शाखाएं बढने लगीं। प्रथम एक शाखा थी, फिर दो, फिर चार, फिर बढते-बढते बीस शाखाएं चलने लगीं। डाक्टरजी के घरपर बाल और तरुण स्वयंसेवक नित्य आते रहते थे। पुराने स्वयंसेवक अपने साथ नये-नये तरुणों को ले आते थे। डाक्टरजी हर एक का परिचय पूछते थे और ध्यान में रखते थें बडी आत्मीयता के साथ वे सबसे बातें करते थे। हर किसी को ऐसा लगता था कि, मेरी ओर डाक्टरजी का विशेष ध्यान है।\n   चुंबक की ओर जिस प्रकार लोहे की चीजें आकर्षित होती हैं, उसी प्रकार नागपुर के सैंकड़ों नवयुवक डाक्टरजी की ओर खींचे चले आते थे। दिन में एक बार डाक्टरजी के घर जाने का और वहां दस-बीस मिनट बैठने का, अनेकों का नियम था। समाचारपत्रों में डाक्टरजी का न नाम आता था न छायाचित्र आता था। फिर भी हजारों तरुण उनको जानते पहिचानते थे और उन्हें अपना आदरणीय मार्गदर्शक मानते थे।"}, {"person": "", "title": "एक आकर्षक व्यक्तिमत्व  2", "text": "एक बार नागपुर में, एक धनी, मानी सज्जन के घर विवाह समारोह था। वे सज्जन डाक्टर साहेब के घनिष्ठ मित्र थे। विवाह के उपलक्ष्य में उनके यहां बडा भारी शानदार मंडप सजा हुआ था। मंडप में गद्दे बिछे हुए थे। मसनदें लगी हुई थीं। नागपुर के हजारों नागरिक इत्रपान के लिए बुलाये गये थे। लोग आने लगे और योग्य स्थानों पर बैठने लगे। कोई पुराने रईस आये तब उनके परिचित लोग उनके पास बैठे। कोई बडे लेखक या कवि आये तब उनके प्रशंसक उन्हें घेर कर बैठे। कोई धनी थे, कोई सरकारी अधिकारी थे, कोई नेता थे, कोई पत्रकार थें उन सबके पास उनके मित्र या अनुयायी बैठे थे। महाराष्ट्र की पद्धति के अनुसार यहां-वहां कत्था-चूना, पान-सुपारी आदि साहित्य रखा हुआ था। इत्र लगाया जा रहा था। गुलाबजल छिडका जा रहा था। लोग पान खा रहे थे और चर्चा कर रहे थे। उसी समय डाक्टरजी वहां आ पहुंचे।\n   परिचित व्यक्तियों को नमस्कार करते हुए वे मंडप में आये और एक स्थान पर बैठ गये। जैसे ही वे बैठे, इधर-उधर बैठे हुए अनेक तरुण अपना स्थान छोडकर डाक्टरजी के पास आ गये। अब तक वे अन्य नेताओं के पास बैठे हुए थे। उनकी बातचीत सुन रहे थें परन्तु डाक्टरजी का आकर्षण ही इतना था कि सारे तरुण उनके इर्दगिर्द एकत्रित हो गये। सूर्योदय के बाद बडे-बडे तारे जैसे तेजोहीन हो जाते हैं वैसी अन्य नेताओं की स्थिति हो गयी। वे सब फीके पड गये।"}, {"person": "", "title": "प्रेरक शक्ति  1", "text": "जो लडके कभी किसी की सुनते नहीं थे, वे डाक्टरजी की हर बात को शिरोधार्य समझते थे। जो आलसी थे, वे डाक्टरजी के कहने से उद्योगी बन गये। जो कामचोर थे, वे डटकर काम करने लगे। जो नाजुक तबियत के थे वे हट्टेकट्टे और तगडे बन गये। सैंकडों युवक ऐसा मानने लगे कि हमें प्रत्येक को देश के हित कुछ न कुछ कार्य करना ही होगा। हिन्दुओं को संगठित करना एक महत्वपूर्ण देशकार्य है, ओर उसके लिए व्यक्तिगत सुख का हमें परित्याग करना ही होगा।"}, {"person": "", "title": "प्रेरक शक्ति  2", "text": "एक धनीमानी परिवार के युवक ने वकालत की परीक्षा उच्च श्रेणी में उत्तीर्ण की थी। उसके पिता बहुत आनंदित हुए। उन्होंने अपने इस बुद्धिमान पुत्र के लिए पहले से ही एक अच्छी नौकरी ढूंढ रखी थी और विपुल दहेज देनेवाली वधू भी। अतः एक दिन उन्होंने अपने पुत्र से कहा, “आज मेरे साथ चलो। हम लोग एक बडे अधिकारी से मिलेंगे।’’\n   पुत्र - किसी हेतु हमें उनसे मिलना है?\n   पिताजी - मैने उनसे बातचीत कर रखी है। उन्होंने तुम्हें उनके विभाग में अच्छी नौकरी देने का वादा किया है।\n   पुत्र - मुझे कोई भी नौकरी नहीं करनी है।\n   पिताजी - तब फिर वकालत करने की दृष्टि से भी उनके साथ संपर्क रखना उचित होगा।\n   पुत्र - नहीं मैं वकालत भी नहीं करूंगा।\n   पिताजी - तो फिर तुम क्या करना चाहते हो? लडकीवाले तुम्हारे व्यवसाय के बारे में पूछते हैं, उन्हें मैं क्या बताऊं?\n   पुत्र - “मुझें किसी से भी मिलने-जुलने में कोई आपत्ति नहीं है। परन्तु आप एक बात ध्यान में रखें, मुझें आजीवन संघकार्य करना है। न नौकरी करनी है, न वकालत, न अन्य कोई व्यवसाय। मैं विवाह नहीं करूंगा। ऐसा समझिये आपके चार पुत्रों में सक एक आपने देश के लिए दे दिया है। हमारे डाक्टरजी मुझे जहां भेजेंगे, मैं जाऊंगा और केवल संघ का कार्य करुंगा।’’\n   पिता बहुत क्रुद्ध हुए। माता बहुत रोयी। परन्तु पुत्र अपने निश्चाय पर दृढ रहा।\n   अनेक घरों में लगभग इसी प्रकार के संभाषण होने लगे। उच्च विद्याप्राप्त, पदवियों से विभूषित, अच्छे घर के सुशील युवक अपना घर-द्वार छोडकर संघकार्य के लिए, जहां भी डाक्टरजी भेज दें, जाने लगे। सैंकडों, हजारों मील दूर जाकर किसी अपरिचित नगर या ग्राम में वे ठहरते और धीरे-धीरे वहां संघ की शाखा प्रारंभ होती।\n   अनेक बार क्रोध से तमतमाते हुए माता-पिता डाक्टरजी के पास आते और उन्हें उलटी-सीधी बातें कहते थे, परंतु डाक्टरजी शान्त चित्त से उनकी सब बातें सुन लेते थे; और फिर नम्र भाव से मधुर शब्दों में उन्हें संघकार्य का महत्व समझाते थे। डाक्टरजी कभी किसी का अपमान नहीं करते थे।"}, {"person": "", "title": "हमारे डाक्टरजी  1", "text": "संघकार्य के लिए डाक्टरजी नित्य भ्रमण करते रहते थे। पैदल, साइकिल से, मोटर से, रेलगाडी से, सब प्रकार के वाहनों से, उन्होंने हजारों मीलों का भ्रमण किया। नये-नये गांवों में जाना, वहां के युवकों को जुटाना, उन्हें संघ का विचार समझाना, जो प्रौढ और समझदार हों, उन्हें “प्रतिज्ञा’’ देकर संघ का स्वयंसेवक बनाना, प्रत्यक्ष शाखा का कार्य चालू करना, इन कार्यों का चक्र रात-दिन चलता रहा।"}, {"person": "", "title": "हमारे डाक्टरजी  2", "text": "वे जब पंजाब में पहुंचे तब वहां के स्वयंसेवकों ने उनका बहुत उत्साह से स्वगात किया। स्वयंसेवक एक-दूसरे से कहते “चलो, शाखा पर। आज विशेष कार्यक्रम है, अपने डाक्टरजी आये हैं।’’ लाहौर में, अमृतसर-लुधियाना में सैंकडों स्वयंसेवक डाक्टरजी से मिलने आये। डाक्टरजी ने उन्हें कहा, “सैंकडो मील दूर से मैं आप से मिलने के लिए यहां आया हूं। आप सब लोगों से मिलने की मुझे बडी उत्सुकता थी। आप सब लोग भी मुझसे मिलने के लिए लालायित थे। क्योंकि दूर-दूर रहते हुए भी हम सबभाई हैं। हम लोग एक ही माता की संतान हैं। इस बात का स्मरण दिलाने मात्र का कार्य संघ करता है, परन्तु प्रत्यक्ष व्यवहार कठिन है। किन्तु महत्व का है। हमें उसे पूर्ण मनोयोग से करना चाहिये।’’\n   पंजाब के स्वयंसेवकों ने लम्बे-चौडे भाषण देनेवाले, बडी गर्जनावाले, स्वयं की डींग हांकनेवाले, बहुत रौब के साथ पेश आनेवाले, अनेक छोटे-बडे नेता देखे थे, परन्तु शान्त ढंग से, नपे-तुले और सीधेसाधे शब्दों में बोलनेवाला और फिर भी श्रोताओं के हृदयपर अमिट परिणाम करनेवाला वक्ता, वे प्रथम ही देख रहे थे। वे केवल शब्द नहीं थे। डाक्टरजी का व्यवहार भी वैसा ही था। अतः पंजाब में संघ का कार्य उत्तम रीति से चलने लगा।"}, {"person": "", "title": "हमारे डाक्टरजी  3", "text": "डाक्टरजी बंगाल पहुंचे। उस क्षेत्र में संघ का कार्य नया था। फिर वही आत्मीयता विद्यमान थी। वहां के स्वयंसेवक कहने लगे, “आज अपने डाक्टरजी संघस्थान पर आनेवाले हैं।’’ जब डाक्टरजी ने उनसे बंगाली में बातें कीं तब वे सब चकित हो गये। कलकत्ता के अनेक प्रसिद्ध और गणमान्य लोगों से वे मिले। कुछ लोग संघ का सीधासादा काम देखकर चकित हुए, वे कहने लगे, “यह कैसा देश का कार्य?  न बम बनाना है, न पिस्तौल चलाना है, भाषण झाडना नहीं, समाचारपत्र चलाना नहीं, और अंग्रेजों को गालियां भी देना नहीं। ऐसा भी कोई देशभक्ति का कार्य हो सकता है?’’\n   डाक्टरजी ने उन्हें समझाया, “देखिये, भाई! स्वराज्य प्राप्ति कुछ आसान है। परन्तु स्वराज्य को टिकाना और उसे सुराज्य बनाना बहुत कठिन और महत्वपूर्ण कार्य है। इस दुनिया में योगयता महत्व की है। योग्यता प्राप्त करो तो उच्च स्थान मिलेगा। फिर उसके लिये हाथ नहीं पसारने पडोंगे। यह निसर्ग का नियम है। हमारे भीतर दुर्गुण घुस आये, हम अयोगय बने, इसलिए दूसरों के दास बने। यदि हम दुर्गुणों को त्यागकर सद्गुण प्राप्त करेंगे, तो हमारा गत वैभव हमें फिर से प्राप्त हो सकता है। हमें सब दुष्टि से सुयोग्य बनना है। इसी बात की सीख संघ देता है। इसी हेतु संघ की शाखाएं चलती हैं, और शाखाओं के कार्यक्रम चलते हैं। संघ का अन्य कोई भी ध्येय नहीं हैं संघ का विश्वा स है कि यदि हम सद्गुणी और सुसंगठित बने तो सब समस्याएं हल हो जाएंगी और हमें स्वराज्य भी प्राप्त होगा। और कठिन कार्य भी सुकर होंगे। अतः अन्य सब कामों को गौन मानकर हम संघकार्य को जीवन में प्रथम स्थान दें।’’"}, {"person": "", "title": "हमारे डाक्टरजी  4", "text": "एक बार डाक्टरजी पुणे गये थे। वहां के संघचालक के साथ वे पैदल जा रहे थे। सामने से दो बालक आ रहे थे। डाक्टरजी को देखकर बच्चों ने स्मित किया। डाक्टरजी ने भी आनंद दर्शाया। तब संघचालक महोदय ने पूछा- “ये कौन बच्चे हैं?  आप इन्हें कैसे पहचानते हैं?’’ डाक्टरजी ने कहा, “से हमारे संघ के स्वयंसेवक हैं।’’\n   सघचालकजी ने पूछा, “आपने कैसे जाना कि वे स्वयंसेवक हैं? न वे गणवेश पहने थे, न अन्य कोई चिन्ह है।’’\n   मन को सुसंस्कारित करना और मन को जोडना यही तो संघ का कार्य है। कार्य कठिन अवश्य है परन्तु महत्व का है। आखिर मन से ही तो सच्चा मनुष्य बनता है।\n   सब शाखाओं के छोटे-बडे सब स्वयंसेवक डाक्टरजी को अपना मानते थे और डाक्टरजी भी उन्हें अपना मानते थे।"}, {"person": "", "title": "बंधु-भावना का निर्माण", "text": "संघ में आने के बाद लोग अपने भेद भूल जाते हैं और उनमें बन्धुभावना उत्पन्न होती है। अनेक लोगों को इसका बडा आश्च र्य लगता है। कई कार्यकर्ता इस संबंध में डाक्टजी से प्रश्नह भी पूछते थे। डाक्टरजी कहते थे, “इसमें न कोई जादू है न बडा रहस्य है। यह तो सीधी सी बात है। जिस ध्येय को हमें प्राप्त करना है, उसी पर ध्यान केन्द्रित करो। जो बुराइयां और खराबियां हैं उनका बारबार स्मरण और उच्चारण मत करो। सामान्यतः लोग उलटा व्यवहार करते हैं और फिर ध्येय केवल पुस्तकों में या भाषणों में रह जाता है।’’\n   सन् 1934 के दिसंबर मास में वर्धा में जमनालालजी बजाज के बगीचे में संघ का शिविर लगा था। निकट के बंगले में महात्माजी का निवास था। शिविर की व्यवस्था, वहां का अनुशासन, स्वयंसेवकों की परिश्रमशीलता, उनका गणवेश, स्वयं अपने खर्चे से शिविर में आना और रहना, इत्यादि बातों के संबंध में जब महात्माजी ने समाचार सुना तो वे स्वयं बडी उत्सुकता से, प्रभात में 6 बजे शिविर में पधारे। सर्वत्र घूमकर उन्होंने शिविर के सब विभाग देखे।\n   उसके उपरान्त स्वयंसेवकों के व्यायाम योग के कार्यक्रम हुए। सैंकडों स्वयंसेवकों की एकसाथ होनेवाली उत्साहपूर्ण परन्तु अनुशासनयुक्त कवायतें देखकर वे बहुत प्रभावित हुए। स्वयंसेवकों के साथ उनके कुछ प्रश्नो्त्तर हुए।\n   महात्माजी - यह गणवेश तुम्हें किसने दिया?\n   स्वयंसेवक - यह हमारा निजी हैं हमने अपने लिए सिलवाया है।\n   महात्माजी - उसे बनवाने हेतु पैसे किसने दिये?\n   स्वयंसेवक - हमारे माता-पिता ने। वेश ही की क्या बात है, हम जो इस शिविर में आये हैं, यहां का भोजन-खर्च हममें से प्रत्येक ने अपना-अपना दिया है। दूर-दूर के गांवों से हम अपने खर्चे से आये हैं। संघ का ऐसा ही नियम है।\n   महात्माजी - यात्रा, गणवेश, भोजन आदि के लिये स्वयं खर्च कर यहां रहने में क्या लाभ है? यहां ऐसी कौनसा आकर्षण है?\n   स्वयंसेवक- यह तो हम निश्चिहत रूप से नहीं कह पावेंगे। परन्तु एक साथ उठना, बैठना, खेलकूद करना, सोना, भोजन करना और यह सब हमें अपने देश के लिए करना है, ऐसी भावना अपने अन्तःकरण में संजोये रखना, इसमें बहुत बडा आनंद है।\n   गांधीजी के पूछने पर अप्पाजी ने बताया कि, “ये सब हिन्दू हैं। हम यहां किसी की जात नहीं पूछते।’’ जब गांधीजी ने स्वयंसेवकों से पूछा, तब स्वयंसेवकों ने वही उत्तर दिया। परन्तु सत्य का पता लगाने के लिये जोर देकर फिरसे पूछने लगे।\n   महात्माजी - तुम कौन हो?\n   स्वयंसेवक - मैं हिन्दू हूं।\n   महात्माजी - तुम किस जाति के हो? क्या व्यवसाय करते हो?\n   स्वयंसेवक - मैं ब्राह्मण हूं। विद्यार्थी हूं।\n   महात्माजी - और तुम जी?\n   स्वयंसेवक - मैं राजस्थानी वैश्य हूं। मेरी दुकान है।\n   महात्माजी - और तुम?\n   स्वयंसेवक - मैं खेत में मजदूरी करता हूं, जाति का महार हूं।\n   फिर महात्माजी एक-एक को उसका परिचय पूछते गये। कोई चमार था तो कोई तेली था, कोई मराठा क्षत्रिय और कोई सुनार था। विभिन्न जाति के लोग वहां थे।\n   महात्माजी - क्या तुम लोग यहां अस्पृश्यों के साथ उठते-बैठते और भोजन तक करते हो?\n   स्वयंसेवक - संघ में हम किसी प्रकार का भेदभाव नहीं मानते हैं। अनेक बार हमें एक-दूसरे की जाति का पता तक नहीं रहता है। न उसके संबंध में हमें कोई उत्सुकता रहती है। हम सब हिन्दू हैं। एक भारतमाता की सन्तान हैं। हम आपस में भाई हैं। यही शिक्षा हमें संघ ने दी है। अतः उच्च-नीच का विचार हमारे हृदय को कभी स्पर्श ही नहीं करता।\n   महात्माजी संघ का वह शिविर देखकर, और डाक्टरजी से मिलकर, बहुत ही प्रसन्न और प्रभावित हुए।\n   इस प्रकार स्थान-स्थान पर छोटे-बडे कार्यक्रमों द्वारा, संघ सब को आकर्षित कर रहा था। वह देशभर में बंधुभावना का निर्माण कर रहा था।"}, {"person": "", "title": "अविरत परिश्रम", "text": "लगातार बरसों तक कठिन परिश्रम करते रहने के कारण, डाक्टरजी बीमार हो गये। विश्रांति के लिए तथा इलाज के लिए उन्हें नासिक ले जाया गया। परन्तु डाक्टरजी तो हनुमान के भक्त थे। वे कहते थे, “राम-काजु किन्हें बिनू मोहि कहाँ विश्राम?’’\n    नासिक गये तो थे विश्राम लेने, परन्तु वहां वे नयी शाखाएं खोलने का प्रयास करने लगे। स्वयंसेवक उनसे मिलने आते थे, और घण्टों तक बातें चलती रहती थीं। उन्हें दवाई देनेवाले जो डाक्टर थे, उन्होंने कहा, “इन्हें खूब विश्रांति मिलनी चाहिय। इन्हें रात के दस बजे अवश्य सो जाना चाहिये।’’ परन्तु डाक्टरजी की बैठकें रात एक-दो बजे तक चलती रहतीं। उन बैठकों में ऐसा कुछ आकर्षण था कि सब स्वयंसेवक मुग्ध होकर सुनते रहते थे। सुधबुध खोते थे। जब डाक्टर महोदय को यह सब सुनाया गया तब उन्होंने कहा, “मैं स्वय आज बैठक में उपस्थित रहूंगा। पौने दस बजे मैं उन्हें सूचित करूंगा, आठर ठीक दस बजे उन्हें सोने के लिए बाध्य करूंगा।’’\n   तद्नुनुसार रात्रि के नौ बजे वे डाक्टरजी के पास आकर बैठ गये, और धीरे-धीरे उनकी बातों में रस लेने लगे। एक के बाद एक विषय आता रहा और डाक्टरजी सुबोध, सहज परन्तु मार्मिक ढंग से उसपर भाष्य करते रहे। प्रचुर मात्रा में हास्यविनोद भी चल रहा था। इलाज करनेवाले डाक्टर महोदय ने भी कुछ प्रश्नस पूछे। उत्तर सुनने में वे इतने तल्लीन हो गये कि अपना वहां पहुंचने का उद्देश तक भूल गये। चौंककर जब उन्होंने घडी देखी, तब डेढ बजा था। उन्होंने कहा, “उफ्!  यह क्या हो गया! मैं यहां शीघ्र समाप्ति की सूचना देने के लिए आया था, परनतु मैं ही वह सब भूल गया।’’\n   डाक्टरजी का बोलना बडा ही मधुर और आकर्षक था। उसका प्रमुख कारण यह था कि उसमें थोडी भी कृत्रिमता नहीं रहा करती थी। दूसरी बात यह थी, कि वे जो कुछ भी बोलते थे, उनके हर शब्द में उनकी तपस्या ही झलकती थी।"}, {"person": "", "title": "कुश पथक", "text": "प्रारंभ में संघ की शाखा पर केवल युवक ही आते थे। धीरे-धीरे उनके साथ उनके छोटे भाई भी आने लगे। तब एक किशोर स्वयंसेवकों का गण तैयार हो गया। डाक्टरजी ने उसका नाम “कुश पथक’’ रखा।\n   प्रभु रामचन्द्रजी के दो पुत्र थे, लव और कुश। वे दोनों अपनी माता सीताजी के साथ गहन अरण्य में रहते थे। राजपुत्र रहते हुए भी वे पर्णकुटी में निवास करते थे, और रुखी-सूखी रोटी खाते थे। वाल्मिकी मुनि के पास लव-कुश परिश्रमपूर्वक विविध विद्या तथा कलाओं के पाठ पढते थे। राजराजेश्वीर प्रभु रामचन्द्रजी की पत्नी होने पर भी सीता माता वन में रहती थी और दुख झेलती थी। लव और कुश अपनी मां का दुख दूर करने के लिए सदा प्रयत्नशील रहते थे। यही तथ्य उन बाल-स्वयंसेवकों के हृदय पर अंकित करने के लिए डाक्टरजी ने उस गण का नाम “कुश पथक’’ रखा था। हमारा गत इतिहास वैभव का है, परन्तु हमारी भारतमाता परतंत्र है, दुखी है। हम उसके पुत्र हैं।"}, {"person": "", "title": "कुश पथक", "text": "पुत्र के नाते अपने सर्वस्व की बाजी लगाकर, उसका दुख दूर करना और उसे सुखी करना हमारा कर्तव्य है। इसी धारणा को कुश पथक के स्वयंसेवकों ने अपनाया, और आजीवन निभाया। वे छोटे-छोटे किशोर जब बडे हुए, तब विद्यालय, महाविद्यालयों में धैर्य और दृढता के साथ कार्य करने लगे। उनमें से अनेक संघकार्य के प्रचार के लिए अन्य प्रान्तों में गये। उनको देखकर अनेक उच्च-विद्या-विभूषित नवयुवकों ने अपना घर-बार छोडा और जहां भी भेज दिया, वहां जाकर संघ की शाखा निर्माण करने लगे, चलाने लगे। जो जहां गये, वहीं के बन गये। वहां की भाषा उन्होंने आत्मसात कर ली। वहां के रीतिरिवाज उन्होंने सीख लिये। उन्होंने वहां के लोगों का विश्वांस संपादन किया। कार्यविकास के हेतु संघ के स्वयंसेवकों ने तमिल, तेलुगू, मल्यालम्, गुजराती, बंगाली, पंजाबी आदि अनेक भाषाएं सीखीं। यह सम्पूर्ण देश मेरा है और मैं इस देश का हूं, यहां की सब भाषाएं मेरी हैं, सब गांव मेरे हैं, ऐसी धारणा सर्वत्र फैलने लगी।"}, {"person": "", "title": "कुश पथक", "text": "ब्राह्मण हो या चमार, अमीर हो या गरीब, अनपढ हो या विद्वान, हम किसी भी पक्ष, उपपक्ष, पथ या सम्प्रदाय क्यों न हो, हम सब भाई हैं। एक ही माता की संतान हैं-यह संघ का विचार प्रान्त-प्रान्त के नगर-नगर में फैलने लगा। तद्नुसार प्रत्यक्ष जीवन में व्यवहार भी होने लगा।\n   पूरातन काल में जिस प्रकार राजा भगीरथ पापनाशिनी गंगा को पृथ्वी पर ले आये थे, उसी प्रकार आधुनिक काल में डाक्टरजी ने हीनभाव का नाश करनेवाला संघकार्य देशभर में प्रचलित किया।\n   तृतीय सरसंघचालक बाळासाहब देवरस इसी कुश पथक के स्वयंसेवक थे और शिक्षक भी थे। इसी पथक ने संघ को अनेक गणमान्य कार्यकर्ता दिये।"}, {"person": "", "title": "एक ही धुन सवार थी  1", "text": "डाक्टरजी का शरीर हृष्ट-पुष्ट और बलवान था। बचपन में उन्होंने बहुत व्यायाम किया था। शारीरिक कष्टों का उन्हें अभ्यास था। संघ का काम प्रारंभ हो जाने के बाद, उनके कष्टों की सीमा ही नहीं रही। वे अखण्ड भ्रमण करने लगे। पैदल, साइकिल पर, मोटर पर, रेलगाडी से या जो भी वाहन उपलब्ध हो उसका उपयोग कर, वे गांव-गांव में जाने लगे। उनके पास न भोजन के लिए समय था, न सोने के लिए। चरैवेति-चरैवेति, चलते रहो, संघ का काम करते रहो। ऐसा यह परिश्रमचक्र महीनों तक और बरसों तक चलता रहा।\n   परिणाम यह हुआ कि उनकी देह क्षीण होने लगी। वे बीमार पडने लगे। उनकी पीठ में सतत दर्द होने लगा। उन्हें जाडे के दिनों में भी, इतना पसीना आता था। कि दिन में तीन बार बनियान बदलनी पडती थी।"}, {"person": "", "title": "एक ही धुन सवार थी  2", "text": "किसी ने उन्हें सुझाया कि बिहार प्रदेश में राजगीर नाम के स्थान पर उष्ण जल के नैसर्गिक झरने हैं। वहां कुछ दिन नियमित स्नान करने से पीठ का दर्द मिट सकता है। नागपुर के प्रमुख स्वयंसेवकों ने बहुत आग्रह किया। कुछ डाक्टरों ने भी उसी बात को दोहराया। तब डाक्टरजी राजगीर जाने के लिए राजी हो गये। डाक्टरजी के साथ आप्पाजी जोशी और अन्य कुछ कार्यकर्ता भी राजगीर पहुंचे।\n   राजगीर पहुंच कर उष्णोदक-स्नान का उपाया तो यथारीति शुरू हो गया, परन्तु उसी के साथ डाक्टरजी का प्रिय उद्योग भी प्रारंभ हुआ। राजगीर में दूरदूर से आनेवाले लोगों से डाक्टरजी परिचय प्राप्त कर लेते थे और घनिष्ठता बढाकर उन्हें संघकार्य का महत्व समझाते थे। राजगीर नगर में जाकर प्रतिदिन कुछ गणमान्य लोगों से मिलकर उन्हें संघ के सिद्धान्त तथा कार्य समझाने का उपक्रम उन्होंने प्रारंभ किया। थोडे ही दिनों में राजगीर में संघ की शाखा चलने लगी। फिर आसपास के गांवों में संघ की शाखाएं निर्माण करने की योजना बनाने लगी। सम्पूर्ण बिहार प्रान्त में कार्यवृद्धि की दृष्टि से क्या किया जा सकता हैं, इसका विचार होने लगा। घन्टों तक कार्यकर्ताओं की बैठकें चलने लगीं।\n   डाक्टरजी के साथ उनकी परिचर्चा करने के लिए जो स्वयंसेवक आये थे, वे बहुत दुविधा में पड गये। क्या कहें और क्या न हैं? कहें तो किसे कहें? डाक्टरजी यहां बीमारी का इलाज कराने आये हैं, या संघकार्य का प्रचार करने के लिए आये हैं? संघकार्य के अतिरिक्त किसी दूसरी बात की ओर वे जरा भी ध्यान नहीं बंटाते थे।"}, {"person": "", "title": "इन्हीं आंखों से देखना चाहता हूं  1", "text": "“अपना कार्य शीघ्रतिशीघ्र बढना चाहिए। क्या यह 1940 का वर्ष वैसे ही बीतेगा?’’\n   आप्पाजी जोशी ने चौंककर डाक्टरजी की तरफ देखा। वे सोये हुए थे। नींद में बडबडा रहे थे। नींद में भी उस महापुरुष को संघकार्य के विस्तार की चिन्ता लगी थी। इसी देह से मुझे अपने ध्येय तक पहुंचना है। इन्हीं आंखों से सम्पूर्ण भारत को सुसंगठित अवस्था में देखना है, ऐसी उनकी तीव्र इच्छा थी। परन्तु अब वे बारबार बीमारे पडते थे उनका शरीर दुर्बल होने लगा था।\n   उनकी विशेषता यह थी कि उन्होंने अपने जैसे ही अनेक कार्यकर्ता निर्माण किये थे। भाऊराव देवरस एक विद्यार्थी के रूप में लखनऊ में, कानपुर में, और उत्तर प्रदेश के कई नगरों में संघ की शाखाएं स्थापन की थीं। उसी प्रकार राजाभाऊ पातुरकर पंजाब में पहुंचे थे। मालवा और महाकोशल में एकनाथजी रानडे संचार कर रहे थे। दिल्ली नगर में और उसके आसपास के प्रदेश में वसन्तराव ओक कार्य कर रहे थे।\n   छोटे से कोंकण प्रदेश में माधवराजी मुळ्ये ने कई स्थानों पर शाखाएं निर्माण की थीं। दक्षिण में दादाराव परमार्थ प्रयत्नों की पराकाष्टा कर रहे थे। बाळासाहब देवरसजी को कलकत्ता भेजा गया था। नरहरी पारखी और बापूराव दिवाकर बिहार प्रान्त में कार्य कर रहे थे। शान्त, सौम्य परन्तु निश्चरयी बाबासाहब आपटे सम्पूर्ण देशभर में भ्रमण करते थे। स्थान-स्थान पर जाकर कार्यकर्ताओं का मार्गदर्शन करते थे। और नये-नये प्रचारक निर्माण करते थे।"}, {"person": "", "title": "इन्हीं आंखों से देखना चाहता हूं  2", "text": "ये सब सुशिक्षित युवक थे, उच्च विद्याविभूषित थे। कार्यतत्पर और ध्येयनिष्ठ थे। डाक्टरजी के आदेशानुसार अपने व्यक्तिगत स्वार्थ को तिलांजलि देकर ये लोग रात-दिन संघ का कार्य बढाने के लिए खून-पसीना एक कर रहे थे। इन सब के मुकुटमणि प्रतीत होंगे ऐसे एक श्रेष्ठ कार्यकर्ता को भी डाक्टरजी ने संघ की दीक्षा दी।\n   उनका नाम था, माधव सदाशिव गोळवलकर। वे एम.एससी. होने के बाद बनारस हिन्दू युनिवर्सिटी में प्राध्यापक हो गये थे। उसके उपरान्त उन्होंने दो वर्ष नागपुर में वकालत की थी। उसके पश्चादत् श्रीरामकृष्ण परमहंस के चरित्र से और स्वामी विवेकानन्द के साहित्य से प्रभावित होकर, सारगाछी आश्रम में स्वामी  अखंडानंदजी से उन्होंने गुरुमंत्र भी लिया था। अखंडानंदजी के स्वर्गवास के बाद वे जब नागपुर आये तब डाक्टरजी ने उन्हें बताया कि देशसेवा भी ईश्व रसेवा का ही एक रूप है। संघकार्य भी ईश्व रीय कार्य है।\n   डाक्टरजी के व्यक्तिमत्व से प्रभावित होकर गोळवलकरजी उपाख्य श्रीगुरुजी चौबीसों घंटे संघ कार्य करने लगे। डाक्टरजी ने उन्हें अखिल भारत का सरकार्यवाह बनाया। कृष्णराव मोहरील, रामभाऊ जामगडे, यादवराव जोशी, बापूराव भिशीकर आदि अनेक नवयुवकों ने अपने आपको डाक्टरजी के हाथों में सौंप दिया था।"}, {"person": "", "title": "इन्हीं आंखों से देखना चाहता हूं  3", "text": "जिस प्रकार व्यक्गित इच्छा का परित्याग कर विवाह इत्यादि न करते हुए, देशहितार्थ आजीवन संघकार्य करनेवाले डाक्टरजी ने निर्माण किये थे, उसी पकार अपना घरद्वार, खेतीबाडी, उद्योग व्यवसाय संभालकर बडी निष्ठा और लगन से साथ तन-मन-धन लगाकर संघकार्य की वृद्धी के लिए परिश्रम करनेवाले गृहस्थ कार्यकर्ता भी डाक्टरजी ने हजारों की संख्या में जुटाये थे। नागपुर के बच्छराज व्यास, उमरेड के भैय्याजी दाणी, टिमार्णी के सरदार भाऊसाहब भुस्कुटे व पूना के ब.ना. उपाख्या बाबाराव भिडे, एडवोकेट इनमें प्रमुख थे।\n   सेवा की, त्याग की, सचाई की और परिश्रम की एक नयी लहर संघ ने भातरवर्ष उत्पन्न की। संघ की प्रगति को देखकर हर कोई आश्चमर्य प्रकट करने लगा। अनेक नगरों में विजयादशमी के उत्सव पर हजारों स्वयंसेवकों के पथसंचलन होने लगे। बहुत से लोग कहने लगे, “आजतक कभी किसी ने हिन्दुओं का इतना बडा संगठन नहीं किया था। हम तो यही समझते कि हिन्दू इस दुनिया में आपसी झगडों के लिए ही पैदा हुआ हैं। हिनदू कभी संगठित नहीं हो सकते, परन्तु डाक्टरजी ने असंभव को संभव किया। धन्य है।’’"}, {"person": "", "title": "इन्हीं आंखों से देखना चाहता हूं  4", "text": "लोग तारीफ के पुल बांधतु थे। परंन्तु डाक्टरजी को जरा भी समाधान नहीं था। वे नित्य कहते थे, “यह तो केवल प्रारंभ है। जहां चार नहीं जुटते थे वहा चालीस जुटने लगे। इससे हमें कृतार्थ नहीं होना है। हमें तो यह देखना चाहिये की अभी कितना ही समाज वैसा ही असंगठित है। अभी हजारों गांव वैसे ही पडे हैं। नगर के सैंकडों स्थानों में हम अभी नहीं पहुंचे हैं। फिर अनेकानेक समस्याएं अभी वैसी ही पडी हैं। अभी अपना देश परतंत्र है, समाज दुर्बल है, ध्येयहीन है।’’\n   “मैं हूं कौन? और मेरा कर्तव्य क्या है?  इसका अभी अपने हिन्दू समाज को ज्ञान नहीं है। उन सके पास हमें पहुंचना है। सबके हृदयों में देशभक्ति और सामाजिक भाव प्रस्थापित कर हमें इस हिन्दू-राष्ट्र को बलशाली बनाना है, वैभवशाली बनाना है।’’\n   रात-दिन उन्हें बस यही चिन्ता लगी रहती थी। परन्तु हर हर! उनका शरीर अधिकाधिक दुर्बल होता जा रहा था। राजगीर में बहुत दिन रहने के बाद भी जब सुधार नहीं हुआ, तब उन्होंने अपने देहदुख को दुर्लक्षित किया। वे पूर्ववत् संघकार्य के लिए प्रवास करने लगे। नये-नये स्थानों पर जाना, स्वयंसेवकों से मिलना, उन्हें कार्य का महत्व समझाना, गणमान्य लोगों से मिलना, उन्हें संघ का प्रतिज्ञा देकर स्वयंसेवक बनाना, आदि कार्य वे करते रहे।"}, {"person": "", "title": "संघ-शिक्षा वर्ग  1", "text": "आज हर प्रान्त में गर्मी के दिनों में संघ-शिक्षा-वर्ग लगते हैं। उन दिनों में केवल पुणे और नागपुर में ऐसे वर्ग लगते थे। सन् 1940 की गर्मी में पुणे का संघ-शिक्षा-वर्ग समाप्त कर डाक्टरजी नागपुर पधारे। पहले से ही उनका स्वास्थ्य बिगडा हुआ था। अब नागपुर आने पर उनकी तबियत और खराब हो गयी। रोज तेज बुखार रहने लगा।\n   संघ-शिक्षा-वर्ग का तीन वर्ष का अभ्यासक्रम रहत है। तीसरे वर्ष की शिक्षा का प्रबंध केवल नागपुर में ही है। अतः उस वर्ग के लिए देशभर के स्वयंसेवक आते हैं।\n   डाक्टरजी, वर्ग में आये हुए हर स्वयंसेवक से मिलते थे, उससे व्यक्तिगत परिचय कर लेते थे; और उसके गुणों के विकास की दृष्टि से उसे मार्गदर्शन करते थे। यद्यपि उनका स्वास्थ्य पुणे में विशेष ठीक नहीं था, फिर भी वहां पर वे सब स्वयंसेवकों से मिले थे। बुखार के कारण वे नागपुर के वर्ग में जा नहीं सकते थे। कार्यकर्ता उन्हें मना करते थे। इलाज करनेवाले डाक्टर भी मना करते थे, “मुझे वर्ग में ले चलो। बुखार की चिन्ता मत करो।’’ परन्तु बुखार तेज था, कमजोरी भी बहुत थी। अतः डाक्टरों ने उन्हें कमरे के बाहर जाने से भी मना किया था।"}, {"person": "", "title": "संघ-शिक्षा वर्ग  2", "text": "स्वयंसेवकों से मिलने में डाक्टरजी को अपार आनंद आता था। स्वयंसेवक उनके लिए ईश्वनर समान थे। स्वयंसेवक उनके लिए नवभारत के आधारस्त्ंभ थे। उज्जवल भविष्य के निर्माता थे। अतः बहुत प्रेम और आदर भावना के साथ वे स्वयंसेवकों से बोलते रहते थे। उनके साथ वे हास्य-विनोद करते रहते थे। वही उनकी देशसेवा थीं। वही उनका भजन-पूजन था। वही उनका सुखनिधान था।\n   जब से संघकार्य प्रारंभ हुआ था, पिछले पंद्रह वषों में वे इसी आनन्द में मग्न थे। वह आनन्द हर कोई प्राप्त कर सके इस हेतु वे सतत् प्रयत्नशील थे। उनका मन बेचैन हो रहा था। वे स्वयंसेवकों से बोलना चाहते थे। अपनी आंखों से उन्हें देखना चाहते थे।\n   संघ के प्रमुख कार्यकर्ता बारीबारी से उनके पास बैठते थे और उनकी सेवा परिचर्या करते थे। शिक्षावर्ग का प्रतिदिन का पूरा ब्यौरा उन्हें बताया जाता था। परन्तु दूध का समाधान, छाछ पीने से थोडे ही प्राप्त हो सकता है?\n   डाक्टरजी स्वयंसेवकों के साथ उठना-बैठना चाहते थे, उनसे प्रत्यक्ष में बोलना चाहते थे। स्वयंसेवकों को निहारना चाहते थे। उसके अभाव में उनकी छटपटाहट बढने लगी। कार्यकर्ताओं ने डाक्टरजी की मानसिक अवस्था का वर्णन डाक्टरेां को बताया। उन्होंने भी सोचा, कदाचित् उससे स्वास्थ्य सुधारने में मानसिक सहायता मिल जाय। उन्होने अनुमति दे दी।"}, {"person": "", "title": "अन्तिम भाषण  1", "text": "बडी व्यवस्था के साथ, बहुत सावधानी से, 9 जून 1940 को डाक्टरजी को संघ-शिक्षा-वर्ग में लाया गया। उस वर्ष पिछले वर्षों की तुलना से वर्ग की संख्या बहुत अधिक थी। और भी एक विशेषता यह थी इस वर्ष, वहां पर सब प्रान्तों का प्रतिनिधित्व बंगाल, बिहार, तमिलनाडु, आन्ध्र, कर्नाटक, गुजरात, महाराष्ट्र आदि सब प्रान्तों के स्वयंसेवक वहां उपस्थित थे। विभिन्न जाति और व्यवसाय के स्वयंसेवक वहां थे। चौदह से लेकर चौरासी तक की विविध आयु के स्वयंसेवक वर्ग में थे। मानो सम्पूर्ण भारतवर्ष छोटा-सा रूप लेकर वहां उपस्थित हुआ था। \n   सर्वाधिकारीजी के साथ डाक्टर हेडगेवारजी ने बौद्धिक मण्डप में प्रवेश किया। “उत्तिष्ठ’’ की आज्ञा पाते ही सब एक साथ खउे हो गये। मंच पर रखी हुई बडी-सी गद्देदार कुर्सी पर डाक्टरजी बैठे थे। सब स्वयंसेवक बिना पलक हिलाये उनकी ओर देख रहे थे। व्यक्तिगत गीत गाया गया, बोधपट पढा गया, तब डाक्टरजी अपनी गंभीर वाणी में, शान्त ढंग से बोलने लगे-"}, {"person": "", "title": "अन्तिम भाषण  2", "text": "“माननीय सर्वाधिकारीजी, प्रांत संघचालकजी, अन्य अधिकारीगण तथा मेरे प्रिय स्वयंसेवक बधुओं!’’\n   “मुझे इस बात की शंका है कि मेरा स्वास्थ्य ठीक न होने के कारण मैं आप लोगों के सम्मुख दो-चार शब्द भी ठीक से बोल पाऊंगा या नहीं?  गत चौबीस दिनों से मैंने बिलकुल बिस्तर पकड लिया है। सच कहो तो संघकार्य की दृष्टि से यह वर्ष बडे भाग्य का है। क्योंकि इस वर्ष के अपने इस वर्ग में मैं अपने सामने मानों सम्पूर्ण हिन्दू-राष्ट्र की छोटीसी प्रतिमा ही देख रहा हूं।’’\n   “आप सब स्वयंसेवक कितनी दूर-दूर से यहां आये हो, परन्तु मेरी बीमारी के कारण मैं आप लोगों से मिल न सका। मेरे मन में बहुत इच्छा थी। परन्तु मैं आप लोगों का प्रत्यक्ष परिचय न प्राप्त कर सका। पूना के संघ -शिक्षा-वर्ग में मैं पंद्रह दिनों तक उपस्थित था। वहां आये हुए सब स्वयंसेवकों से मेने समुचित ढंग से परिचय प्राप्त किया। परन्तु यहां पर मैं आप लोगों को कुछ भी सेवा न कर सका। ठीक है। वह नहीं हो पाया। नहीं सही। अब आप सब लोगों को एकत्रित बैठे हुए कम से कम देख लूं, हो सके तो चार बातें भी कहूं, इस दृष्टि से मैं आज यहां आया हूं।’’"}, {"person": "", "title": "अन्तिम भाषण  3", "text": "“आप सब लोगों का मुझसे कुछ पुराना परिचय तो है नहीं। यहां कितने ही ऐसे हैं, जिन्होंने न कभी मुझे देखा है, न मैंने उन्हें देखा है। ऐसा होते हुए भी क्यों मेरा मन आपकी ओर दौड रहा है? क्यों आपका मन मेरी ओर खींच रहा है?  इसका कारण है यह अपना राष्ट्रीय स्वयंसेवक संघ। संघ की विचारधारा का ऐसा ही अद्भुत प्रभाव है। जहां संघ के तत्वों को अपनाया, वहां अपरिचित भी एक-दूसरे की ओर आकर्षित हो जाते हैं और आपस में प्रेम करने लगते हैं। अल्पकाल में उनमें प्रगाढ मित्रता भी उत्पन्न हो जाती है।’’\n    “कुछ दिनों पूर्व की बात है। मैं पूना में था। मेरे साथ सांगली के काशीनाथराव लिमये थे। हम दोनों पूना के ‘लकडी पुल’ पर से जा रहे थे। उसी समय सामने से नौ-दस बरस के दो बालक आ रहे थें हमारी और देखकर उन बालकों ने थोडासा स्मित किया और वे आगे बढे। मैने काशीनाथराव से कहा ये दोनों बच्चे संघ के स्वयंसेवक हैं।’’ काशीनाथराव ने कहा “आपने यह कैसे पहचान लिया? उनकी देह पर कोई बाह्य चिन्ह तो नहीं दिखायी दे रहा है।’’"}, {"person": "", "title": "अन्तिम भाषण  4", "text": "“मैने कहा, आप परखना चाहते हैं, तो अभी देखिये।’’ उन बच्चों को पुकारते ही वे हम लोगों के पास आ गये। मैंने उन्हें पूछा, “क्या तुम लोग हमें पहचानते हो?’’ बच्चों ने हा जी हां, दो वर्ष पूर्व आप हमारी शाखा में आये थे। आप हमारे सरसंघचालक डाक्टर हेडगेवार हैं और आप हैं सांगली के काशीनाथराव लिमये।’’ यह परस्पर पहिचानना और आंतरिक प्रेम निर्माण होना, संघ की तपस्या का फल है। यह किसी एक व्यक्ति का कार्य नहीं है।\n   “अभी आपके सम्मुख मद्रास के संजीवन कामथजी का भाषण हुआ। एक अपरिचित मेहमान के नाते वे यहां आये थे। चार दिन उन्होंने यहां क्या बिताये, वे हमारे स्वयंसेवक बन्धु बन गये। भाई बनकर वे अब यहां से जा रहे हैं। इस गठबन्धन का श्रेय किसी एक व्यक्ति को नहीं है। इसका श्रेय संघ को है।’’"}, {"person": "", "title": "अन्तिम भाषण  5", "text": "हम लोगों की भाषाएं भिन्न हैं। रहन-सहन की पद्धतियां भिन्न हैं। पंजाब, मद्रास, बंगाल, सिंध, दिल्ली, बम्बई ऐसे दूर-दूर के प्रदेशों से हम लोग यहां आये हैं। फिर भी सब स्वयंसेवक क्यों इतने हिलमिलकर रहते हैं? क्यों परस्पर प्रेम करते हैं? इसका केवल एक ही कारण है। और वह यह, कि वे सब राष्ट्रीय स्वयंसेवक संघ के घटक हैं। संघ का प्रत्येक स्वयंसेवक दूसरे स्वयंसेवक के साथ भाई से भी अधिक प्रेमपूर्ण व्यवहार करता है। सगे भाई तो कई बार जमीन-जुमले के लिए पैसे-टके के लिए आपस में झगडते हैं; परन्तु स्वयंसेवक कभी आपस में नहीं झगडेंगे।\n   “पिछले 24 दिनों में मैं अपने घर पर था। बिस्तरे पर पडा हुआ था। परन्तु मेरा मन आप लोगों के पास मण्डरा रहा था। मेरी ऐसी स्थिति थी कि में शरीर से तो घर पर था पर मन से इस वर्ग में था। कल शाम को तीव्र इच्छा हुई थी कि पांच मिनटों के लिए संघस्थान पर आकर आप लोगों के साथ प्रार्थना में भाग लूं, परन्तु डाक्टरों ने अनुमति नहीं दी।’’"}, {"person": "", "title": "अन्तिम भाषण  6", "text": "“आज आप लोग अपने-अपने स्थानों पर वापिस जा रहे हैं। अतः आपको बिदा करने के लिए मैं यहां आया हूं। यद्यपि हम यहां से दूर चले जावेंगे और बिछुडें, फिर भी यह कोई दुख का अवसर नहीं है। यहां पर एक स्थान पर जुट कर हमने एक महान कार्य का निश्चि य कर लिया है। उसकी पूर्ति के लिए अब हम लोग जा रहे हैं। प्रतिज्ञा कीजिये कि, जब तक शरीर में प्राण हैं तब तक मैं संघ को नहीं भूलूंगा। किसी भी मोह का शिकार बनकर अपना मार्ग मत छोडिये। ऐसा कहने की बारी कभी न आने दिजिये कि पांच वर्ष के पूर्व में संघ का स्वयंसेवक था। हम लोग आजन्म स्वयंसेवक हैं। तन-मन-धन से संघकार्य करने का हमारा निश्चमय अपने हृदय में हमें सतत् जागृत रखना चाहिए। ‘आज मैने संघ का क्या कार्य किया?’ ऐसा प्रश्नर, प्रतिदिन सोते समय, हमें अपने मन से पूछना चाहिए। हम यह नित्य ध्यान में रखें कि केवल शाखा के कार्यक्रम नियमित करने से अथवा प्रतिदिन संघस्थान पर उपस्थित रहने से ही संघ का कार्य पूर्ण रूप से नहीं हो जाता है। हिमाचल से लेकर कन्याकुमारी तक फैले हुए अपने सब हिन्दू भाइयों को हमें संगठित करना है। अपना महत्वपूर्ण कार्य तो संघ के बाहर ही है। संघ केवल स्वयंसेवकों के लिए नहीं है। संघ के बाहर के लोगों को देश की उन्नति का सच्चा मार्ग दिखाना यह हमारा ही कर्तव्य है। हिन्दू जाति की वास्तविक भलाई हमारे इस संगठन के द्वारा ही होगी।’’"}, {"person": "", "title": "अन्तिम भाषण  7", "text": "“राष्ट्रीय स्वयंसेवक संघ का अन्य कोई भी कार्य नहीं है। अनेक लोग पूछते हैं, आगे चलकर संघ क्या करेगा?  यह प्रश्नय निरर्थक है। हिन्दू समाज को सुसंगठित बनाने का अपना कार्य ही अधिक तेज गति से संघ आगे भी करता रहेगा। हमारे इस कार्य को करते रहते ही स्वर्णिम दिवस का उदय होगा। यह आप निश्चिनत समझें। जिस दिन सम्पूर्ण भारत संघमय बना होगा तब फिर हिन्दू समाज की ओर टेढी नजर से देखने की किसी की भी हिम्मत नहीं होगी। हमें किसी पर भी आक्रमण नहीं करना है। परन्तु साथ ही हम पर कोई आक्रमण न करें, इसकी तो चिन्ता हमें करनी ही होगी।’’\n   “मैं आज आप लोगों के सम्मुख कोई नयी बात नहीं बता रहा हूं। बस इतना ही कहता हूं कि हम सब स्वयंसेवकों को यह मानना चाहिए कि संघकार्य को मेरे जीवन में प्रधान स्थान रहेगा;  संघकार्य ही मेरा जीवनकार्य होगा। मुझे दृढ विश्वानस है कि यहां से अपने-अपने स्थानों पर जाते समय आप लोग इस मंत्र को अवश्य ही अपने हृदयपर अंकित कर लेंगे। इसी धारणा से मैं आप सब बन्धुओं को अवश्य ही अपने हृदयपर अंकित कर लेंगे। इसी धारणा से मैं आप सब बन्धुओं को बिदाई दे रहा हूं।’’"}, {"person": "", "title": "अन्तिम भाषण  8", "text": "डाक्टरजी का वह छोटा-सा भाषण बहुत प्रभावशाली रहा। सब स्वयंसेवक अपनी सब शक्तियां कानों में एकत्रित कर, उस भाषण को सुन रहे थे। बोलते-बोलते भाषण के मध्य में दो मिनटों के लिए डाक्टरजी एकदम मौन हो गये थे। कदाचित् वे थक गये थे। कदाचित् वे भावगद्गद् हो गये थे। कदाचित् भविष्य का स्वर्णिम काल उनकी आंखों के सम्मुख चित्रित हो रहा था।\n   दो मिनट तक वे आंखें मूंद कर चुपचाप बैठ रहे। सामने बैठे हुए स्वयंसेवक भी चुपचाप थे। एकटक डाक्टरजी की ओर देख रहे थे। कोई भी थोडी-सी हलचल तक नहीं कर रहा था जो जैसा बैठा था, वैसा ही बैठा रहा। ऐसा लग रहा था, जैसे सबकी सांस भी अवरुद्ध हो गयी हो। अनेकों के शरीर रोमांचित हो गये थे। अनेकों की आंखों से आंसू झर रहे थे। अनेकों के हृदयों में नये तेज का संचार हो रहा था। डाक्टरजी का वह मौन एक बडा व्याख्यान ही था।"}, {"person": "", "title": "अन्तिम भाषण  9", "text": "भाषण समाप्त हुआ। मानों उस भाषण के द्वारा डाक्टरजी ने अपनी सब शक्तियां स्वयंसेवकों को बांट दीं। उसके बाद डाक्टरजी बहुत अधिक थक गये। कुछ समय तक वे वर्ग के कार्यालय में ही लेटे रहे। जब वे थोडे बहुत संभले, तब उन्हें उनके घर पर लाया गया।\n   वर्ग समाप्त हुआ। स्वयंसेवक डाक्टरजी से मिलने के लिए उनके घर पर जाते थे। वह मिलना क्या था, केवल एक दूसरे को देखना ही था। फिर भी डाक्टरजी चार शब्द बोल लेते थे। कभी किसी से पूछते थे, “आगे क्या करोगे?’’ कभी पूछते थे, “फिर कब मिलोगे?’’ कभी स्थान-स्थान के कार्यकर्ताओं को प्रणाम कह देने को कहते थे। कभी किसी को चातुर्य के साथ कार्य करते रहने के लिए कहते थे।\n   इस प्रकार सब को वे बहुत प्रेम से विदा कर रहे थे।"}, {"person": "", "title": "नैन लगे परतीर  1", "text": "संघ-शिक्षा-वर्ग समाप्त हो गया। अब संघ के कार्यकर्तागण अपना सम्पूर्ण समय डाक्टरजी की सेवा में बिताने लगे। डाक्टरों के आदेशानुसार उनकी उत्तम परिचर्या करने लगे। बाहर गांव के कई स्वयंसेवक डाक्टरजी से मिलने आते थे और कहते थे, “आप हमारे यहां चलिये। हमारे गांव की हवा, पानी उत्तम है। कुशल डाक्टर भी वहां हैं। हम आपकी सर्व व्यवस्था उत्कृष्ठ रखेंगे। आपको अवश्य स्वास्थ्य-लाभ होगा।’’ निमंत्रण बहुत आये, परन्तु डाक्टरजी कहीं भी नहीं जा सके। क्योंकि विधियोजना कुछ निराली थी।\n   डाक्टरजी का स्वास्थ्य दिन प्रतिदिन अधिकाधिक बिगडने लगा। नागपुर के बडे विख्यात तथा कुशल डाक्टरों को बुलाया गया और उनका इलाज कराया गया। परन्तु बीमारी अल्पप्रमाण में भी घटी नहीं। 15 जून 1940 को उन्हें मेयो अस्पताल में भरती किया गया। परन्तु उनकी व्याधि का स्वरूप किसी की भी समझ में नहीं आया। उनकी पीठ में असहनीय वेदनाएं होती थी। उन्हें नित्य तेज बुखार चढा रहता था। वे बहुत अधिक थकावट अनुभव करते थे। ये सब व्यथाएं बढती ही जा रहीं थीं। अस्पताल का वायुमण्डल उन्हें एकदम नापसंद था। अतः उन्हें नागपुर नगर संघचालक श्री. बाबासाहब घटाटेजी के निवासस्थान पर ले जाया गया।"}, {"person": "", "title": "नैन लगे परतीर  2", "text": "सर्वश्रेष्ठ डाक्टर, वैद्यों द्वारा औषध-योजना की जा रही थी। अपनी सब विद्या दांव पर लगाकर वे लोग प्रयत्न कर रहे थे। कार्यकर्तागण बहुत तत्परता के साथ-सेवा-परिचर्या कर रहे थे। “हे परमेश्ववर! हमारे प्रियत्म नेता की व्याधि दूर कीजिए!’’ इस प्रकार की प्रार्थना अपने-अपने घरों में हजारों स्वयंसेवक कर रहे थे। परन्तु डाक्टरजी की स्वास्थ्य प्रतिदिन अधिकाधिक गिर रहा था।\n   डाक्टरजी को भी कदाचित् इस बात का ज्ञात हो गया था कि अब इहलोक में उन्हें थोडे ही दिन रहना है। यादवराव जोशी नित्य उनके पास रहते थे। वे बहुत भावनाशील युवक थे। और डाक्टरजी के सम्बन्ध में भारी श्रद्धा रखते थे। एक दिन डाक्टरजी ने उनसे पूछा, “क्यों यादव, यदि संघ के किसी बडे अधिकारी की मृत्यु हो, तो उसकी अंत्ययात्रा तुम किस ढंग से सम्पन्न करोगे?’’ उस प्रश्न  को सुनकर क्षणभर के लिए यादवराव सन्न से रह गये। उन्होंने जैसे  तैसे अपने आंसू छिपाये। फिर उस प्रश्नव को टालने के लिए विषयान्तर करते हुए उन्होंने कहा, “मेरा ध्यान ही नहीं रहा। औषधि लेने का समय जो हो गया है।’’\n   यादवराव उठे। उन्होंने डाक्टरजी की औषधि पिलायी। डाक्टरजीने चुपचाप पी ली। यादवराव मन ही मन कुछ प्रसन्न हुए। उन्होंने सोचा, चलो, शायद उस कटु विषय को वे भूल गये हैं।\n   परन्तु थोडी ही देर बाद, डाक्टरजी धीमी परन्तु शान्त एवम् सन्तुलित आवाज में बोलने लगे, “अपने संघ में पारिवारिक वातावरण का महत्व है। दिखावा और आडंबर का नहीं। कोई संघ का अधिकारी यदि इहलोक-लीला समाप्त करता है, तो उसकी शवयात्रा में सादी व्यवस्था रहनी चाहिये। सैनिक-संचलन, राजसी ठाठबाट आदि बातें नहीं रहनी चाहिये।’’"}, {"person": "", "title": "नैन लगे परतीर  3", "text": "एक दिन दोपहर के समय, जब यादवराव उन्हें चाय देने लगे, तब डाक्टरजी ने कहा, “सबको बुलाकर ले आओ! मैं सबके साथ चाय पीऊंगा।’’\n   यादवरावने उन्हें बहुतेरे समझाया परन्तु डाक्टरजी छोटे बच्चे जैसे रूठ गये। उन्होंने चाय पीने से इन्कार किया और मुंह फेर लिया। वे चुपचाप पडे रहे। यादवराव रुआंसे हो गये। उनकी समझ में नहीं आया कि क्या करें?\n   तब तक श्रीगुरुजी वहां पहुंचे। उन्हें जब सम्पूर्ण घटना ज्ञात हुई तब उन्होंने तुरन्त चारों ओर स्वयंसेवकों को दौडाकर कार्यकर्ताओं को जुटाया। फिर पन्द्रह-बीस प्याली चाय बुलायी गयी। डाक्टरजी को सहारा देकर बैठाया गया। फिर डाक्टरजी ने सबके साथ बडे प्रेम से चाय-पान किया।\nअपनी जीवनयात्रा समाप्त करने के पूर्व ईसा मसीह ने भी अपने शिष्यों को बडे प्रेम से भोजन कराया था। अपने परलोक सिधारने के पूर्व स्वामी विवेकानन्द ने भी अपने गुरुबन्धुओं के साथ तथा शिष्यों के साथ भोजन किया था।"}, {"person": "", "title": "मैं बंगला में आनेवाला हूं", "text": "वह दिन था 19 जून 1940। शाम के समय एक बंगाली सज्जन डाक्टरजी से मिलने आये। वे पुराने क्रांतिकारी थे। एक समय के डाक्टरजी के घनिष्ठ मित्र तथा सहकारी थे। एक-दूसरे को देखते ही दोनों बहुत प्रसन्न हुए। वे प्रेम से गले मिले। और दोनों ने एक-दूसरे को स्नेहालिंगन में कस लिया। फिर डाक्टरजीने उन्हें अपने पास बिठाया। फिर परस्पर पूछताछ हुई। अनेक पुरानी स्मृतियां ताजी हो गयीं। फिर डाक्टरजी ने उन्हें कहा, “बस, अब इस बीमारी से मुक्त होते ही मैं बंगाल आऊंगा और अपने सब पुराने साथियों से मिलूंगा। अपने देश की विद्यमान अवस्था में संघकार्य को सर्वप्रथम महत्व देना कितना आवश्यक है, यह मैं उन्हें समझाऊंगा। यदि वे सबलोग इस कार्य को करने का बीडा उठाते हैं, तब तो अपने देश की परिस्थिति में शीघ्र ही सुधार होगा और अपने देश का पूरा चित्र बदल जायगा।’’\n   इस प्रकार से बहुत सी बातें होती रहीं। अन्त में उक्त सज्जन ने डाक्टरजी से कहा, “कल नागपुर में देशगौरव सुभाषचन्द्र बोस आ रहे हैं। आपसे मिलने की उनकी इच्छा है। उनका यह सन्देश आप के पास पहुंचाना यही मेरा प्रमुख कार्य था।’’\n   दूसरे दिन सुभाषचन्द्र श्री बाबासाहेब घटाटेजी के बंगले पर पहुंचे। परन्तु वे डाक्टरजी से नहीं मिल पाये। उस समय डाक्टरजी को बहुत अधिक बुखार चढा था। उनकी आंखे बंद थी। कुछ निद्रा में और कुछ तंद्रा में वे लीन थे। सुभाषबाबूने डाक्टरजी की स्थिति को समझ लिया। जब स्वयंसेवक डाक्टरजी को जगाने का प्रयास करने लगे, तब उन्होंने मना किया और कहा, “नहीं, उन्हें इस समय जगाना ठीक नहीं होगा। मैं फिर से आऊंगा।’’ कुछ क्षण, वे वहीं ठिठके रहे; देखते रहे; फिर उन्होंने डाक्टरजी को प्रणाम किया, और वे वहां से चल दिये।"}, {"person": "", "title": "उत्तराधिकारी 1", "text": "डाक्टरजीका रक्तचाप का विकार उग्र रूप धारण करने लगा। अन्त में डाक्टर लोगों ने लंबर पंक्चर कर पानी निकालने का नश्चिरय किया। जब डाक्टरजी को यह ज्ञात हुआ, तब उन्होंने श्रीगुरुजी, माननीय बाबाजी पाध्ये, बाळासाहब देवरस, कृष्णराव मोहरील तथा अन्य प्रमुख कार्यकर्ताओं को अपने कमरे में बुलवाया।\n   उस कमरे का वातावरण बहुत चिन्तापूर्ण था। सब लोग डाक्टरजी की ओर एकटक देख रहे थे। बीच-बीच में मन में जो भीषण कल्पनाएं उठती थीं, उन्हें दबाने का प्रयत्न वे कर रहे थे। डाक्टरजी ने श्रीगुरुजी से कहा, “अब लंबर पंक्चर होगा। यह प्रायः अन्तिम उपाय है। यदि मेरा स्वास्थ्य ठीक हुआ तब तो कोई बात नहीं, अन्यथा संघकार्य का पूरा उत्तरदायित्व इसके बाद आप पर ही है, ऐसा आप समझें।’’\n   गुरुजी ने उन्हें कहा, “डाक्टरजी, आप ऐसे क्यों कहते हैं?  विश्वारस रखिए कि आप शीघ्र ही ठीक हो जावेंगे।’’\n   इस पर डाक्टरजी ने किंचित् स्मित किया और कहा, “मनुष्य को अच्छी बात की ही आशा रखनी चाहिए, यह तो मुझे भी मान्य है। परन्तु साथ-साथ कठिन से कठिन परिस्थिति के लिए सिद्धता भी कर लेनी चाहिए। मैने जो बात कही उसके अनुसार करो।’’\n   अब डाक्टरजी निश्चिरन्त हो गये। उन्होंने डाक्टरों से कहा, “अब आप जब चाहे लंबर पंक्चर करें।’’"}, {"person": "", "title": "उत्तराधिकारी 2", "text": "डाक्टरों ने आपस में विचार-विनिमय किया और शाम को लंबर पंक्चर करने का निश्चिरत किया। उस दिन डाक्टरजी को असहनीय वेदनाएं हो रही थीं। वह केवल शारीरिक पीडा नहीं थी। उनका मन भी संत्रस्त था। अपने ही जीवन में वे अपने सम्पूर्ण देश को सुसंगठित स्वतंत्र तथा समृद्ध देखना चाहते थे। परन्तु अब शरीर साथ छोड रहा था। मेरे प्रिय स्वयंसेवक बन्धु, मेरे प्रेमस्थान, मेरे आराध्य! उन्हें संघकार्य बढाने के लिए कैसी-कैसी आपत्तियों को झेलना पडेगा।\n   इन सब चिन्ताओं ने डाक्टरजी के मन को घेर लिया था। उनके मन में अवस्था पानी से बाहर निकली हुई मछली जैसी हो गयी थी। उन्हें नींद नहीं आ रही थी। वे बार-बार करवटें बदलते थे। एकाएक उठते थे, बैठते थे अथवा विचारमग्न अवस्था में कमरे में ही चलने लगते थे। जब श्रीगुरूजी को कार्य की धुरा-वहन करने का आदेश दिया तब वे कुछ शान्त हुए।\n   शाम को लंबर पंक्चर किया गया। साधारणतः लंबर पंक्चर करने पर मेरुदण्ड से बूंद-बूंद पानी टपकने लगता है, परन्तु यहां तो पानी की धार बहने लगी। बहुत सारा पानी बहने के बाद भी रक्तचाप कम नहीं हुआ। उन्हें थोडासा भी आराम नहीं मिला।\n   मध्यरात्रि के बाद वे बेहोश हो गये। सुबह उनका ज्वरमान 106 अंश तक चढ गया। नागपुर के प्रायः सब प्रमुख डाक्टर बडी तत्परता से उनके पास पहुंचे। सब पहलुओं पर विचार हुआ। तरह-तरह के उपाय किये गये। अन्त में सब निराश हो गये।"}, {"person": "", "title": "उत्तराधिकारी 1", "text": "डाक्टरजी का स्वास्थ्य बहुत बिगड जाने की बात नागपुर नगर भर में फैल गयी। हजारों स्वयंसेवक घटाटेजी के बंगले पर जुटने लगे। बारबार पूछने लगे। अपनी-अपनी सूझबूझ के अनुसार वे तरह-तरह की दौडधूप करने लगे। मन में परमपिता परमेश्व।र से याचना करने लगे। परन्तु मृत्यु के सामने सब बातें धरी रह जाती हैं।\n   शुक्रवार दि. 21 जून 1940 के दिन प्रभात में 9 बजकर 27 मिनट पर डाक्टरजी परलोक चले गये। हजारों स्वयंसेवकों के जीवन के आदर्श चले गये। हजारों का प्रेममय छायाछत्र चला गया। हजारों कार्यकर्ताओं का प्रेरणास्थान चला गया। राष्ट्रीय स्वयंसेवक संघ के निर्माता, धुरंधर कार्यकर्ता, परमपूजनीय आद्यसरसंघचालक डाक्टर हेडगेवारजी चले गये।"}, {"person": "", "title": "महाप्रयाण  1", "text": "श्रीमान माधवराव घटाटेजी के बंगले पर हजारों स्वयंसेवक अधोवदन होकर बैठे थे। अनेक स्वयंसेवक अपने प्रियतम नेता की मूर्ति का अंत्यदर्शन करने के लिए लम्बी कतार में खडे थे। अनेकों के नेत्रों से आंसू झर रहे थे। अनेक मूकरुदन कर रहे थे। अनेक बार-बार कमरे में जाते थे और डाक्टरजी के मुख की ओर एकटक देखते ही रहते थे। अनेक कार्यकर्ता बिना आवाज किए चुपचाप कामों में लगे थे। धीरे-धीरे डाक्टरजी की मृत्यु की वार्ता नागपुर भर में सर्वत्र फैल गयी। हजारों की संख्या में जनता वहा आने लगी। अतः बाहर गांव से भी साइकिलों से, मोटरों से, रेल से, जो भी वाहन मिल जाय उसका उपयोग कर, स्वयंसेवक आने लगे। सब लोगों ने भावपूर्ण हृदय से डाक्टरजी का अंतिम दर्शन किया।\n   21 जून 1940 की शाम को पांच बजे विराट शवयात्रा का प्रारंभ हुआ। हजारों स्वयंसेवकोंने तथा असंख्य नागरिकोंने उसमें भाग लिया। इतनी लम्बी शवयात्रा लोगों ने कभी नहीं देखी थी। सब लोग शान्त थे। न नारेबाजी थी, न किसी प्रकार का हो हल्ला। सब कुछ एकदम स्वाभाविक परन्तु अनुशासनयुक्त था।\n   चौराहे, चौराहे पर विभिन्न जाति, पक्ष और स्तर के लोकसमूह सम्मान करने के लिए खडे थे। डाक्टरजी की देह पर कोई माला चढाता था तो कोई फूल बरसाता था। रात्रि के नौ बजे यह शवयात्रा “रेशिमबाग’’ मैदन पर पहुंची। डाक्टरजी की दाहक्रिया स्मशान में न करते हुए रेशिमबाग में की गयी।"}, {"person": "", "title": "महाप्रयाण  2", "text": "रेशिमबाग उनकी कर्मभूमि थी। रेशिमबाग का मैदान उन्होंने परिश्रमपूर्वक पैसा जुटाकर संघ के लिए खरीदा था। उस मैदान पर कितने ही संघ-शिक्षा-वर्ग लगे थे और अनेक छोटे-बडे उत्सव वहीं पर सम्पन्न हुए थे। उस भूमि का कणकण डाक्टरजी के विचरण से और पसीने से पवित्र हुआ था। वहां के वायुमंडल में डाक्टरजी के शब्द नित्य विद्यमान थे। उसी रेशिमबाग संघस्थान पर डाक्टरजी की देह भस्मीभूत हुई। जिस देह में ध्येय की अग्नि नित्य प्रज्वलित रहती थी, वही देह आज धधकती हुई अग्निज्वालाओं को समर्पित की गयी। सब लोग दुःख सागर में डूब गये।"}, {"person": "", "title": "डॉ हेडगेवार अमर हैं  1", "text": "डाक्टरजी का सम्पूर्ण जीवन कष्टमय तथा त्यागमय था। वे अपनी हर बात में आत्मा उंडेलते थे। बचपन से ही उन्होंने देशभक्ति का व्रत लिया था। उसे उन्होंने दृढता तथा लगन से निभाया। उनका चारित्र्य अति विमल था। \n   उनकी देह भव्य तथा श्यामवर्ण की थी। उनकी मुद्रापर चेचक के दाग थे। उनकी आंखों में अलौकिक तेज था, वे बडी-बडी मूछें रखते थे। इतना होने पर भी उनकी मुद्रा शांत, सौम्य तथा प्रेममय दिखा करती थी।"}, {"person": "", "title": "डॉ हेडगेवार अमर हैं  2", "text": "वे सदा प्रसन्न रहते थे। रात-दिन वे दौडधूप करते थे। संघकार्य की उन्हें सदैव चिन्ता लगी रहती थी। पैसों की कमी तो नित्य बनी रहती थी। साधनों का अभाव था। छोटी-बडी बाधाएं नित्य उपस्थित होती थीं। इतना सब होने पर भी वे सदासर्वदा प्रसन्न रहा करते थे। उस प्रसन्नता को वे अपनी चारों ओर सहज भाव से वितरित करते थे। भाषण और संभाषण का उनका ढंग बडा ही सादा रहता था। अहंकार उनके पास फटकता नहीं था। क्रोध को उन्होंने जीत लिया था। लोभ तथा मोह को वे बचपन से ही त्यागे हुए थे। उनके कपडों में और रहनसहन में सादगी रहती थी।"}, {"person": "", "title": "डॉ हेडगेवार अमर हैं  3", "text": "हम लोग कहते हैं, कि डाक्टर हेडगेवारजी की मृत्यु हो गयी। परन्तु वास्तव में हम देखें और विचार करें, तो हमें पता चलेगा कि डाक्टरजी आज भी जीवित हैं। क्योंकि डाक्टर हेडगेवार और राष्ट्रीय स्वयंसेवक संघ एकरूप है। जब संघ विद्यमान है तो डाक्टरजी कैसे मृत्यु पा सकते हैं? वे हर संघस्थानपर विद्यमान हैं। वे हर स्वयंसेवक में विद्यमान हैं। \n   यदि हम शाखा में नियमित रूप से जाते हैं, वहां के कार्यक्रमों में समरसता के साथ भांग लेते हैं, यदि हम संघ का कार्य तन-मन-धनपूर्वक सच्ची लगन से और आत्मीयता से करते हैं, तो हमारे भीतर ही हमें डाक्टरजी का साक्षात्कार अवश्य ही होगा।"}]}, {"key": "pathey", "label": "पाथेय", "icon": "📖", "stories": [{"person": "", "title": "", "text": "हिन्दू जाति का सुख ही मेरा और मेरे कुटुम्ब का सुख है। हिन्दू जाति पर आनेवाली विपत्ति हम सभी के लिये महासंकट है और हिन्दू जाति का अपमान है। ऐसी आत्मीयता की हिन्दूमात्र के रोम रोम में व्याप्त होनी चाहिये। यही राष्ट्रधर्म का मूलमंत्र है।"}, {"person": "", "title": "", "text": "केवल भूमि के किसी टुकडे को तो राष्ट्र नहीं कहते। एक विचार, एक आचार, एक सभ्यता, एवम् एक परम्परा से, लोग पुरातन काल से रहते चले आये हैं, उन्हीं लोगों से राष्ट्र बनता है। इस देश को हमारे ही कारण हिन्दुस्थान नाम दिया गया है।"}, {"person": "", "title": "", "text": "हमलोगों में चाहे जितने ऊपर मतभेद दिखाई दें परन्तु, हम सारे हिन्दू तत्वतः एक राष्ट्र है। हमारी धमनियों में एक-सा रक्त बह रहा है। समाजरचना और तत्वज्ञान भी एक है। इस प्रकार हमारे संगठन की नींव शास्त्रशुद्ध है।"}, {"person": "", "title": "", "text": "इंग्लैण्ड अंग्रेजोंका, फ्रान्स फ्रान्सीसियों का, जर्मनी जर्मनों का देश है। इस बात को उपर्युक्त देशों के निवास सहर्ष घोषित करते है। किन्तु इस अभागे हिन्दुस्थान के स्वामी हिन्दू , स्वयम् अपने को इस देश के अधिकारी कहने का साहस नहीं करते।"}, {"person": "", "title": "", "text": "दूसरों मे सहायता की आशा करना या भीख मांगना निरी दुर्बलता का चिन्ह है। इसलिए, स्वयंसेवक बन्धुओं, निर्भयता के साथ यह घोषणा करो कि हिन्दुस्थान हिन्दुओंकाही है। अपने मन की दुर्बलता को बिलकुल दूर भगा दो हम यह नही कहते कि विदेशी लोग यहां न रहे। परंन्तु विदेशी लोग इस बात को कभी न भूलें कि वे हिन्दूओं के हिन्दुस्थान में रहते हैं और उन्हें हिन्दुओं के अधिकारों पर आक्रमण करने का कोई अधिकार नहीं है। हमें ऐसी परिस्थिती उत्पन्न कर देनी चाहिये कि हमारे सिरपर दूसरे लोग सवार न हों।"}, {"person": "", "title": "", "text": "हमारा यह प्यारा हिन्दूस्थान, यह पवित्र हिन्दूराष्ट्र हमारे कर्तव्यभूमि है। अतः हम लोगों ने अपने राष्ट्रीय हित की रक्षा के लिये, इस संघ को अपने देश में स्थापित किया है। इसके द्वारा हम राष्ट्र की हर तरह से उन्नति करना चाहते हैं।"}, {"person": "", "title": "", "text": "किसी घने जंगल को, जलहीन मरुस्थल को या निर्जन भूभाग को राष्ट्र नहीं कहते। जिस भूभाग पर एक विशेष जाति के, विशेष धर्म के, विशेष परम्परावाले, विशेष विचारधारावाले, और विशिष्ट इतिहासवाले लोग एकत्रित रहते हैं वह भूभाग राष्ट्र कहा जाता है। तथा वह राष्ट्र उन्हीं लोगों के नाम से पहिचाना जाता है।"}, {"person": "", "title": "", "text": "राष्ट्रीय स्वयंसेवक संघ का निर्माण हिन्दूधर्म, हिन्दू संस्कृति और हिन्दू राष्ट्र की रक्षा के लिये हुआ है। इसलिये जो जो बातें इस संस्कृति की प्रतीक है, उनकी संघ रक्षा करेगा। भगवा ध्वज हिन्दू धर्म और हिन्दू राष्ट्र का प्रतीक होने के कारण राष्ट्रीय ध्वज मानना संघ का कर्तव्य है।"}, {"person": "", "title": "", "text": "संघ को नया झंडा खडा नहीं करना है। भगवा ध्वज का निर्माण संघ ने नहीं किया। संघ ने तो उसे परमपवित्र भगवाध्वज को राष्ट्रीय ध्वज के रुप में स्वीकार किया है, जो कि हजारों वर्षोसे राष्ट्र और धर्म का ध्वज था। भगवा ध्वज के पीछे इतिहास है, परम्परा है, वह हिन्दू संस्कृति का द्योतक है।"}, {"person": "", "title": "", "text": "शिवाजी महाराज को आदर्श के रुप में सन्मुख रखने से, उनके द्वारा हिन्दूत्व की रक्षा करने हेतु किये गये सभी पराक्रमों का हमें स्मरण हो आता है। जो स्फूर्ति हमें भगवा ध्वज के दर्शनों से प्राप्त होती है, वही स्फूर्ति श्री छत्रपति शिवाजी महाराज के चरित्र से मिलती है। जो भगवा ध्वज धूल मे गिरा था, उसी को उन्होंने पुनः ऊँचा उठाया, फहराया और हिन्दूपद पादशाही की प्राणप्रतिष्ठा की। नष्टप्राय हिन्दुत्व को उन्होंने पुनाजीवित किया। अतः यदि आप किसी व्यक्ति को ही आदर्श मानना चाहें तो श्री शिवाजी को ही अपना आदर्श रखें।"}, {"person": "", "title": "", "text": "संघ ने किसी व्यक्तिविशेष को अपने गुरुस्थान पर न रख कर परम पवित्र भगवा ध्वज को ही गुरु माना है। इसका कारण यह है कि, व्यक्ति चाहे जितना महान हों तो भी निरन्तर अचल और पूर्ण नहीं रह सकता। इसलिए व्यक्तिविशेष को गुरु मानकर, अपनी स्थिति विचित्रसी कर लेने की अपेक्षा, हमने उस जयिष्णु और प्रभविष्णु भगवा ध्वज को ही गुरु माना है। उसमें हमारा इतिहास, परम्परा, राष्ट्र के लिये किया हुआ स्वार्थत्याग समाया हुआ है। इतनाही नहीं, राष्ट्रीयत्व के सभी मूल तत्वों का उसमें समन्वय हुआ है।"}, {"person": "", "title": "", "text": "जिस ध्वज को देखते ही हमारे राष्ट्र का सम्पूर्ण इतिहास, संस्कृति एवम् परम्परा हमारी आँखों के सामने खडे हो जाते है, जिसे देखते ही हमारे ह्दय की भावनायें उमड पडती हैं तथा ह्दय में एक विशिष्ट स्ङ्गुर्ति का संचार हो जाता है, ऐसे भगवाध्वज को अपना गुरु मानते हैं।"}, {"person": "", "title": "", "text": "ऐसी कोई भी राष्ट्रीय आकांक्षा नहीं है, जो संगठनद्वारा प्राप्त न होती हो। हम लोग हमेशा राष्ट्रीयताकी दृष्टि से ही विचार करते हैं। चौबिसों घंटे वही राष्ट्रीयता के विचार हमारे मनों मे गुंजते रहे, इसी लिये संघ का नाम राष्ट्रीय स्वंयसेवक संघ रखा गया है। जिन महानुभावोंको जरा भी संदेह हो, कि संगठन से आखिर कुछ काम बनता भी है या नही, उन्हें मै दावे के साथ जता दूं कि उसके बलपर सारी राष्ट्रीय समस्याएं हल हो सकती हैं।"}, {"person": "", "title": "", "text": "शक्ति न हो तो तुम्हारी पुकार पर न कोई ध्यान देगा और न पर्वा ही करेगा। कारण वे जानते हैं, कि यह दुबला जीव हमारा कुछ भी बिगड नहीं सकता।"}, {"person": "", "title": "", "text": "संगठन में असीम सामर्थ्य है। परन्तु उसकी अनुभूति प्रत्येक स्वयंसेवक के मन में होनी चाहिये। हम संगठन करते हैं, क्योंकि हम जानते हैं कि अन्य सब कामों की अपेक्षा, संगठन ही श्रेष्ठ है।"}, {"person": "", "title": "", "text": "संसार में शान्ति और सुव्यवस्था के लिये समस्थिति, सन्तुलन अर्थात बैलन्स की आवश्यकता होती है। जहां बलहीन और बलवान एकत्र रहते हैं। वहां अशान्ति अवश्यम्भावी है। दो शेर एक दूसरे को नहीं छोडते। किन्तु शेर और बकरी यदि एक स्थानपर आ जाते हैं तो वहां क्या होता है, यह बताने की जरुरत नहीं है। समान बलवालों में ही शान्ति तथा प्रेम रह सकते हैं।"}, {"person": "", "title": "", "text": "केवल इच्छा मात्र से ही कार्य नहीं हुआ करता। साक्षात् भगवान को भी दशावतार लेकर, मनुष्यशक्ति के द्वारा ही कार्य करना पडा। इस शक्ति को कुछ लोग पशुशक्ति कहते हैं। परन्तु मेरी समझ में नहीं आता कि धर्मरक्षा तथा जन-कल्याण के लिये जो शक्ति काम में लाई जाती है, उस पवित्र शक्ति को लोग पशुशक्ति कैसे कह सकते हैं?"}, {"person": "", "title": "", "text": "वास्तव में यह शक्ति तो उतनी ही पवित्र एव्म मंगलमय है, जितनी कि आध्यात्मिक शक्ति। हमें हिंसा करने के लिये बलवान नहीं बनना है। किन्तु संसार की सारी हिंसा और अत्याचार सदा के लिये मिटा देने हेतु ही हमे सामर्थ्य सम्पादन करना है।"}, {"person": "", "title": "", "text": "हम में जो सामाजिक भावना का अभाव है, वही हमारी क्षति का कारण बन गया है। हमें तो केवल अपनी ही व्यक्तिगत चिन्ता बनी रहती है। हम अपने समाज तथा संस्कृति का विचार तन मन में नहीं लाते हैं। यदि हम इस दुखदायी परिस्थिती को बदल देना चाहते है, तो हमें अपने समाज का संगठन करना ही होगा।"}, {"person": "", "title": "", "text": "कठिनाइयाँ सभी को हैं। गृहस्थी सभी के पीछे लगी है। यदि सभी अपनी अपनी कठिनाइयों का रोना रोने लगेंगे, तो हम दूसरों के भक्ष्य बनने से बच न सकेंगे। संघकार्य को जब बातों से अधिक महत्त्व का समझ कर यदि हम अपने आपको प्राणपण से इस कार्य में लगा दें, तो कल कम से कम हमारी सन्तान हिंदू के रुप में जीवित रह सकेगी।"}, {"person": "", "title": "", "text": "संगठन में एक मनुष्य दूसरे मनुष्य से कुछ भी कहता नहीं। केवल स्वयं कार्य करता जाता है। जहां बारबार कहने सुनने के मौके आते हों, वहां यह निश्चित रुप से समझ लेना चाहिये कि काम नहीं हो रहा है। संघ के स्वयंसेवक आपस में कुछ नहीं कहते बोलते हैं उनके अन्तःकरण उनकी भाषा ह्दय की भाषा होती है। और वे एक दुसरे की ओर केवल देखते हुए, मूक रहते हुए कार्य कर सकते हैं। केवल परस्पर दृष्टिपात से ही वे अपने विचार आपस में एक दूसरे को समझा सकते हैं।"}, {"person": "", "title": "", "text": "आज दुनिया में चारों ओर अन्याय, अत्याचार और अधार्मिकता का स्वच्छंद साम्राज्य फैला हुआ है। वह जब तक नष्ट नहीं होगा, तब तक हम चाहें जितना जप तप करें मोक्ष का अधिकार प्राप्त नहीं हो सकता।"}, {"person": "", "title": "", "text": "संगठन ही राष्ट्र की प्रमुख शक्ति होती है। संसार में कोई भी समस्या हल करनी हो तो वह शक्ति के आधार पर ही हो सकती है। शक्तिहीन राष्ट्र की कोई भी आकांक्षा कभी भी सफल नहीं होती। परन्तु सामर्थ्यशाली राष्ट्र, कोई भी काम, जब चाहे तब, अपनी इच्छानुसार कर सकता है।"}, {"person": "", "title": "", "text": "किसी धनी व्यक्ति का उदाहरण लीजिये। वह जब भी चाहे, अपनी इच्छा की तृप्ति कर सकता है। यदि वह आलीशान कोठी बनवाना चाहे तो तुरन्त बनवा सकता है। पहले पैसा कमा लूं, धनवान बनूं फिर कोठी बनवावूं, ऐसा उसे सोचना नहीं पडता है। कोठी तयार हो जानेपर यदि उसकी इच्छा हुई कि इस कोठी के आसपास सुंदर सी पुष्पवाटिका हो, तो वह भी तुरन्त ही तैयार हो जाती है। किसी भी काम के लिये उसे पग पग पर रुकना नहीं पडता। ठीक यही बात शक्तिशाली राष्ट्र के लिये भी लागू हाती है, सारे प्रश्नों  तथा समस्याओंका अन्तिम उत्तर शक्ति ही है।"}, {"person": "", "title": "", "text": "यदि केवल कहने मात्र के लिये संगठन हो, अर्थात दिखावटी हो, तो उससे कोई भी लाभ नहीं हो सकता। कोरे आडम्बर से कभी सफलता नहीं मिलती। वह तो केवल  मढोल के अन्दर पोलफ वाली बात होगी। कार्य ठोस हो, तभी वह टिक सकता है। इसलिये हमें अपने कार्य में तेजस्विता, दृढता तथा तीव्रता निर्माण करने का प्रयत्न करना चाहिये।"}, {"person": "", "title": "", "text": "हमारा धर्म तथा संस्कृति कितनी भी श्रेष्ठ क्यों न हो, जब तक उनकी रक्षा के लिये हमारे पास, आवश्यक शक्ति नहीं है, तब तक वे जग के आदर के योग्य नहीं होंगे। हम शक्तिहीन है, इसी कारण हमारा धर्म और हमारी जाति आज इस हीन दीन दशा को पहुंची हुई नजर आती है।"}, {"person": "", "title": "", "text": "हम पर आज जितने भी आक्रमण अथवा अन्याय हुए हैं, आज भी जो हो रहे हैं, उनका उत्तर एक ही हो सकता है- हम प्रचण्ड शक्तिशाली बनें। यह केवल संगठन के द्वारा ही उत्पन्न कर सकते हैं। अन्य किसी भी मार्ग से इस शक्ति का निर्माण नहीं हो सकेगा।"}, {"person": "", "title": "", "text": "हमारा हिन्दूजनसंख्या का पलडा बहूत भारी है। संसार की कुल जनसंख्या का हम पाँचवां हिस्सा है। इतनी विशाल जनता यदि सुसंगठित हो जायेगी, तब उसकी ओर टेडीं नजर से देखने का साहस संसार की किसी भी शक्ति को नहीं होगा। विश्वास किजीये, हिन्दू शक्ति सम्पूर्ण संसार में अजेय सिद्ध होगी।"}, {"person": "", "title": "", "text": "यह ठीक तरह से समझ लो कि संघ न तो व्यायामशाला है और न मिलिटरी स्कुल ही है। संघ यह हिन्दुओं का राष्ट्रव्यापी अभेद्य संगठन है। उसे फौलाद से भी अधिक मजबुत होना चाहिये।"}, {"person": "", "title": "", "text": "संघ तो केवल, हिन्दुस्थान हिन्दुओं का इस ध्येय वाक्य को प्रत्यक्ष में लाना चाहता है। हिन्दुस्थान देश केवल हिन्दुओंकाही है। जैसे अन्य लोगों के अपने देश हैं, वैसा ही यह हिन्दुओं का देश है, अतः संघ यह मानता है कि इस देश में जिसे हिन्दू कहेंगे, वही पूर्व दिशा होगी, यही बात संघ जानता है। राष्ट्रीय स्वयंसेवक संघ के लिये और किसी भी पचडे में पडने की कोई आवश्यकता नहीं है।"}, {"person": "", "title": "", "text": "अपने समाज को बलशाली और संगठित करने के लिये राष्ट्रीय स्वयंसेवक संघ ने जन्म लिया है। इसकी शाखाएँ समस्त भारत वर्ष में हिन्दू समाज को बलिष्ठ बनाने का कार्य कर रही हैं। समूचे हिन्दूस्थान में एक भी कसबा, एक भी गांव, ऐसा न बचे, जहां राष्ट्रीय स्वयंसेवक संघ की शाखा न हो।"}, {"person": "", "title": "", "text": "हम किसी पर आक्रमण करने नहीं चले हैं। पर इस बात के लिये हमें सदा सतर्क तथा सचेत होना होगा, कि हम पर भी कोई आक्रमण न कर सके।"}, {"person": "", "title": "", "text": "बढते-बढते एक ऐसा स्वर्ण दिन अवश्य आयेगा, जिस दिन सारा भारतवर्ष एक दिखाई देगा। फिर हिन्दू जाति की ओर वक्र दृष्टि से देखने का सामर्थ्य संसार की किसी भी शक्ति में नहीं रहेगा।"}, {"person": "", "title": "", "text": "हिन्दू जाति का अंतिम कल्याण इस संगठन के द्वारा ही हो सकता है। दूसरा कोई भी काम राष्ट्रीय स्वयंसेवक संघ नहीं कराना चाहता।"}, {"person": "", "title": "", "text": "सम्पूर्ण हिन्दू समाज संगठित होकर अपने पैरोंपर खडा रहे। इसी एक बात के लिये, हम लोगों ने अपना सारा जीवन लगा देने का संकल्प किया है।"}, {"person": "", "title": "", "text": "हम इस महान कार्य के प्रति अविचल निष्ठा रखें। यह हमारे जीवन का एकमेव कार्य है। अपने ध्येय को हम अपने ह्दयपटलपर अंकित कर लें। हमें समूचे हिन्दू समाज में नवचैतन्य भरना है तथा निर्भय वृत्ति उत्पन्न करनी है। सामाजिक भावशक्ति निर्माण कर समाज के प्रत्येक व्यक्ति के ह्दय में हमें स्वाभिमान तथा आत्मविश्वास जागृत करना है।"}, {"person": "", "title": "", "text": "राष्ट्रीय स्वयंसेवक संघ ने खूब सोच समझकर अपना कार्यक्षेत्र निर्धारित किया है। और इसलिये वह अन्य किसी कार्य के झमेले में नहीं पडना चाहता। ध्येयपर दृष्टि रखते हुए हमें अपने निश्चित मार्गपर अग्रेसर होना है।"}, {"person": "", "title": "", "text": "हममें रात दिन केवल इसी बात का विचार बना रहे कि हमारे जीवन का प्रत्येक क्षण इस पवित्र कार्य के लिए किस प्रकार खर्च हो सकेगा। साथ ही साथ,हमें अपने विचारों के अनुरुप आचरण करना भी सीखना चाहिये। हमें सतत इसी बात की लगन लगी रहनी चाहिये, कि हमारा संगठन प्रतिक्षण किस प्रकार बढे।"}, {"person": "", "title": "", "text": "किस ध्येयसिद्धि के लिये हमने कमर कसी है? हम बस यही चाहते हैं कि हमारा पवित्र हिन्दू धर्म तथा हमारी प्रिय हिन्दू संस्कृति संसार में गौरव के साथ चिरजीवन प्राप्त करें।"}, {"person": "", "title": "", "text": "अपने समाज में संगठन निर्माण कर, उसे बलवान तथा अजेय बनाने के अतिरिक्त हमें और कुछ नहीं करना है। इतना भर कर देने पर सारा काम आपही आप बन जाएगा। हमें आज सतानेवाली सारी राजनैतिक, सामाजिक तथा आर्थिक समस्याऍँ आसानी से हल हो जाएगी।"}, {"person": "", "title": "", "text": "संघ तो हिन्दूओं को शक्तिशाली बनाना चाहता है। हिन्दू इतने शक्तिशाली हो जांय कि उनपर आक्रमण करने का साहस किसी को न हो। जब हमारा सामर्थ्य अजेय होगा, तभी ऐसी परिस्थिति निर्माण हो सकेगी।"}, {"person": "", "title": "", "text": "संघ का संस्कारों पर अत्याधिक विश्वास है। जैसे संस्कार हों, वैसीही मनुष्य की वृत्ति बनती है और एकही वृत्ति के अनेक लोगों के एकत्रित होने से, संगठन के लिये पोषक वातावरण उत्पन्न होता है। सारे देशभर में इस तरह का पवित्र, श्रद्धायुक्त, ध्येयनिष्ठा के रंग में रंगा हुआ, निराशा को नष्ट करनेवाला, हिम्मत को बढानेवाला स्ङ्गूर्तिदायक वातावरण तयार करें। स्वयंसेवक जहां भी जायं, वहीं यह वातावरण अपने साथ ले जायं।"}, {"person": "", "title": "", "text": "जिन उद्देश्यों को लेकर हम चलना चाहते हैं, उनमें किसी प्रकार का न दोष है, न पाप। अपने धर्म और राष्ट्र की रक्षा करने का बीडा हमने उठाया है। इसमें कौन सा पाप है?"}, {"person": "", "title": "", "text": "हमारा विश्वास है कि भगवान हमारे साथ है। हमारा काम किसी पर आक्रमण करना नहीं है, अपितु शक्ति और संगठन का है। हिन्दू धर्म और हिन्दू संस्कृति के लिये हमें यह पवित्र कार्य करना चाहिये और अपनी उज्वल संस्कृति की रक्षा कर उसकी वद्धि करनी चाहिये। तब ही आज की दुनिया में हमारा समाज टिक सकेगा।"}, {"person": "", "title": "", "text": "मेरी अटल श्रद्धा हो गई हैकि, हम पर भगवान की कृपा सदा बनी रही है, और आगे भी बनी रहेगी। क्योंकि भगवान हमारे हृदय के भावों को ठिक-ठिक जानते हैं। हमारा हृदय पवित्र और शुद्ध है। हमारे मन में पाप का लवलेश भी नहीं।"}, {"person": "", "title": "", "text": "हिन्दू जाति की सेवा करने की एकमात्र भावना से हमारा अन्तःकरण तथा रोम रोम व्याप्त है। अन्य को हमारे हृदय में अवकाश ही नहीं। फिर भगवान की कृपा हमपर क्यों न हो?"}, {"person": "", "title": "", "text": "आज इतनी अधिक अनुकूल परिस्थिति है की, हमारे कार्यकर्ता जहां भी पहुंच जाते हैं, सफलताही पाते हैं। हमारा उद्देश्य और कार्य नितांत पवित्र तथा जनकल्याणकारी होने के कारण ईश्ववरीय है, और यही कारण है कि, हर समय तथा हर परिस्थिति में हम अवश्य सफल होंगे।"}, {"person": "", "title": "", "text": "संघ के सिद्धान्तों पर अटल श्रद्धा रखे। अपनी संस्कृति की रक्षा के लिये कटिबद्ध हो। हमें सत्य का अधिष्ठान है। अतः किसी संकट से भयभीत होने का या घबडाने का कोई भी कारण नहीं। अपत्तियाँ योंही उपस्थित नहीं होतीं। वे तो परमात्मा की कृपा सूचित करती है। संकटोंद्वार हमें कसौटीपर कसने, और उसमें सफल होनेपर आगे का उन्नत मार्ग हमें दिखाने की ईश्वीरी इच्छा ही उससे जाहीर होती है।"}, {"person": "", "title": "", "text": "हम यह भी न भूलें कि यह विशाल कार्य किसी भी एक मनुष्य या चंद मनुष्यों के हाथों संपन्न होनेवाला नहीं है। उसके लिये तो एकही ध्येय से प्रेरित, लाखों करोडों लोगों के संगठित प्रयत्नों की, आवश्यकता है। मेरी आपसे यही प्रार्थना है कि इस विशाल भारत के कोने कोने में, ध्येयनिष्ठ तथा बलवान तरुणों में कोई भी कठिनाई नहीं प्रतीत होगी। तब सुंदर चित्र सहज रुप में दिखाई देगा।"}, {"person": "", "title": "", "text": "समस्त भारत वर्ष में संघ शाखाओं का जाल फैलाना चाहिये। ऐसे संगठन से ही हमारी दुर्बलता दूर होगी तथा, हमारा समाज सामर्थ्यशाली और प्रभावशाली बनेगा। यह कार्य मात्र एक दो व्यक्तिओं का नहीं है। अपितु यह समस्त हिन्दू समाज का है। तभी यह कार्य जोर शोर से बढेगा। आज तक के अनुभव से हम यह दावे के साथ कह सकते है कि हम इस कार्य में अवश्य सफल होंगे।"}, {"person": "", "title": "", "text": "यह संघ तो आप सब लोगों का है। संघ में जातिविशेष का महत्व नहीं है। यहां व्यक्तिविशेष के बडप्पन को भी स्थान नहीं है स्थान विशेष के अभिनिवेश यहां लेशमात्र भी नहीं है।"}, {"person": "", "title": "", "text": "यदि आप कहेंगे कि हम तो अलग रहेंगे और दूर खडे खडे देखते रहेंगे, तो उससे कुछ लाभ नहीं। यह संघ तो सब हिन्दूओं का है न? तब फिर सब हिंन्दूओं को इसमें सम्मिलित हो जाना चाहिये।"}, {"person": "", "title": "", "text": "वयोवृद्ध लोगों को तो, संघकार्य में काफी महत्त्व का स्थान है। वे संघ में महत्वपूर्ण कार्य का दायित्व उठा सकते हैं। यदि प्रौढ लोग अपनी प्रतिष्ठा तथा व्यवहार कुशलता का उपयोग संघकार्य के हेतु करें, तो युवकजन अधिकाधिक उत्साह से कार्य कर सकेंगे। बडों के मार्गदर्शन से युवकों की शक्ति कई गुना बढती है और तब संघकार्य अपने निश्चि त ध्येय की ओर द्रुत गति से बढता चला जाता है। इसलिये किसी ने भी संघ के प्रति उदासीनता नहीं रखनी चाहिये। प्रत्येक को उत्साह तथा हिम्मत से आगे आना चाहिये कार्य में जुट जाना चाहिये।"}, {"person": "", "title": "", "text": "हमारा कार्य अखिल हिन्दू समाज के लिऐ होने के कारण, उसके किसी भी अंग की उपेक्षा करने से काम नहीं चलेगा। सभी हिन्दू भाइयों के साथ फिर वे किसी भी उच्च या निच श्रेणी के समझे जाते हों, हमारा बर्ताव हर एक से प्रेम का होना चाहिये। किसी भी हिन्दू भाई को नीच समझकर उसे दुतकारना पाप है।"}, {"person": "", "title": "", "text": "हिन्दुस्थानपर प्रेम करनेवाले हरेक हिन्दू से हमारा व्यवहार भाई जैसाही होना चाहिये। लोग कैसा व्यवहार करते हैं, और क्या बोलते हैं, इसका कोई महत्त्व नहीं है। हमारा बर्ताव अगद आदर्श हो, तो हमारे सारे हिन्दू भाई हमारी ओर ठीक रुप से आकर्षित होंगे।"}, {"person": "", "title": "", "text": "सारा हिन्दू समाज हमारा कार्यक्षेत्र है हम सभी हिन्दुओं को अपनावें।अपनी निजी मान-अपमान की क्षुद्र भावनाओं को त्याग कर हमें प्रेम तथा नम्रता के साथ अपने समाज के सब भाइयों के पास पहुंचना होगा। कौनसा पत्थर-हृदय हिन्दू है, जो तुम्हारे मृदुता तथा नम्रतापूर्ण शब्दों को सुनना इन्कार कर देगा?"}, {"person": "", "title": "", "text": "संघ केवल स्वयंसेवकों के लिये नहीं। संघ के बाहर जो लोग हैं उनके लिये भी है। हमारा यह कर्तव्य हो जाता है कि उन लोगों को हम राष्ट्र के उद्धार का सच्चा मार्ग बतायें और यह मार्ग है, केवल संगठन का।"}, {"person": "", "title": "", "text": "केवल संघ का कार्यक्रम ठीक रूप से करने या नियमित रुप से संघस्थान पर उपस्थित रहने से ही संघकार्य पूरा नही हो सकता। हमें तो आसेतुहिमाचल फैले हुए इस विराट हिंदू समाज को संगठित करना है। सच्चा महत्वपूर्ण कार्यक्षेत्र तो, संघ के बाहर का हिंदू जगत ही है।"}, {"person": "", "title": "", "text": "निर्दोष कार्य करने हेतु, शुद्ध चरित्र के साथ साथ आकर्षकता और बुद्धिमत्ता का मणिकांचन योग भी साधना चाहिये। सच्चरित्र, आकर्षकता, और चातुर्य इन तीनों के त्रिवणी संगम से ही संघ का उत्कर्ष होता है. च
