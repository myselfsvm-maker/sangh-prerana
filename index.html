<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>संघ प्रेरणा — श्री गुरुजी · हमारे डॉक्टरजी</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Yatra+One&family=Noto+Serif+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --g-dark: #2C1A0E;
    --g-mid: #7B3F00;
    --g-warm: #C4862B;
    --g-gold: #E8C56A;
    --g-cream: #FDF6E3;
    --d-dark: #0D1F35;
    --d-mid: #1A3A5C;
    --d-blue: #2E5F8A;
    --d-accent: #C0873F;
    --d-light: #EAF2FB;
    --neutral-bg: #F5F0E8;
    --text-main: #1C1008;
    --text-soft: #5A4030;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.12);
    --transition: 0.28s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Tiro Devanagari Hindi', 'Noto Serif Devanagari', serif;
    background: var(--neutral-bg);
    color: var(--text-main);
    min-height: 100vh;
    direction: ltr;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1A0A02 0%, #3D1F06 50%, #0D1F35 100%);
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .splash-logo {
    display: flex; gap: 28px; align-items: stretch;
    margin-bottom: 40px;
  }
  .splash-card {
    width: 140px;
    border-radius: 20px;
    padding: 24px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
    animation: fadeUp 0.8s ease both;
  }
  .splash-card:hover { transform: translateY(-6px) scale(1.04); }
  .splash-card:nth-child(2) { animation-delay: 0.15s; }

  .splash-card.guruji {
    background: linear-gradient(160deg, #7B3F00, #C4862B);
    box-shadow: 0 8px 32px rgba(196,134,43,0.4);
  }
  .splash-card.doctorji {
    background: linear-gradient(160deg, #1A3A5C, #2E5F8A);
    box-shadow: 0 8px 32px rgba(46,95,138,0.4);
  }
  .splash-card .icon { font-size: 2.6rem; }
  .splash-card .card-name {
    font-family: 'Yatra One', serif;
    font-size: 1rem; color: #fff;
    text-align: center; line-height: 1.3;
  }
  .splash-card .card-sub {
    font-size: 0.7rem; color: rgba(255,255,255,0.7);
    text-align: center;
  }

  .splash-title {
    font-family: 'Yatra One', serif;
    font-size: 2rem; color: #E8C56A;
    letter-spacing: 0.04em; text-align: center;
    animation: fadeUp 0.5s ease both;
    margin-bottom: 8px;
  }
  .splash-sub {
    color: rgba(255,255,255,0.5); font-size: 0.85rem;
    text-align: center; animation: fadeUp 0.5s 0.1s ease both;
  }
  .splash-hint {
    margin-top: 40px; font-size: 0.78rem;
    color: rgba(255,255,255,0.35); text-align: center;
    animation: pulse 2.5s ease infinite;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { opacity: 0.35; } 50% { opacity: 0.7; }
  }

  /* ── APP SHELL ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    transition: background var(--transition);
  }
  .topbar.guruji-theme {
    background: rgba(44,26,14,0.92);
    border-color: rgba(196,134,43,0.3);
  }
  .topbar.doctorji-theme {
    background: rgba(13,31,53,0.92);
    border-color: rgba(46,95,138,0.3);
  }

  .topbar-back {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; transition: background var(--transition);
    flex-shrink: 0;
  }
  .guruji-theme .topbar-back { background: rgba(196,134,43,0.2); color: var(--g-gold); }
  .guruji-theme .topbar-back:hover { background: rgba(196,134,43,0.35); }
  .doctorji-theme .topbar-back { background: rgba(46,95,138,0.3); color: #8BC4E8; }
  .doctorji-theme .topbar-back:hover { background: rgba(46,95,138,0.5); }

  .topbar-info { flex: 1; min-width: 0; }
  .topbar-title {
    font-family: 'Yatra One', serif;
    font-size: 1.05rem; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-subtitle { font-size: 0.7rem; color: rgba(255,255,255,0.5); margin-top: 1px; }

  .topbar-count {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0;
  }
  .guruji-theme .topbar-count { background: rgba(196,134,43,0.2); color: var(--g-gold); }
  .doctorji-theme .topbar-count { background: rgba(46,95,138,0.3); color: #8BC4E8; }

  .topbar-search-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .guruji-theme .topbar-search-btn { background: rgba(196,134,43,0.2); color: var(--g-gold); }
  .guruji-theme .topbar-search-btn:hover { background: rgba(196,134,43,0.35); }
  .doctorji-theme .topbar-search-btn { background: rgba(46,95,138,0.3); color: #8BC4E8; }
  .doctorji-theme .topbar-search-btn:hover { background: rgba(46,95,138,0.5); }

  /* SEARCH BAR */
  .search-bar {
    padding: 10px 20px;
    display: none;
    transition: background var(--transition);
  }
  .search-bar.visible { display: block; }
  .guruji-theme + .search-bar, .search-bar.guruji-theme {
    background: rgba(44,26,14,0.85);
  }
  .doctorji-theme + .search-bar, .search-bar.doctorji-theme {
    background: rgba(13,31,53,0.85);
  }
  .search-input {
    width: 100%; padding: 10px 16px;
    border-radius: 24px; border: none; outline: none;
    font-family: inherit; font-size: 0.9rem;
    background: rgba(255,255,255,0.12); color: #fff;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.4); }
  .search-input:focus { background: rgba(255,255,255,0.18); }

  /* MAIN CONTENT */
  main { flex: 1; display: flex; flex-direction: column; }

  /* HOME VIEW */
  #home-view {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px; gap: 24px;
    background: linear-gradient(180deg, #F5F0E8 0%, #E8DCC8 100%);
    min-height: calc(100vh - 0px);
  }
  .home-header { text-align: center; }
  .home-title {
    font-family: 'Yatra One', serif;
    font-size: 2rem; color: var(--g-dark);
    line-height: 1.2;
  }
  .home-sub { font-size: 0.85rem; color: var(--text-soft); margin-top: 6px; }

  .app-cards { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 420px; }

  .app-card {
    border-radius: 24px; overflow: hidden;
    cursor: pointer; position: relative;
    box-shadow: var(--shadow);
    transition: transform var(--transition), box-shadow var(--transition);
    border: none; text-align: left;
    display: block; width: 100%;
  }
  .app-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }

  .app-card.guruji { background: linear-gradient(135deg, #3D1F06 0%, #7B3F00 60%, #C4862B 100%); }
  .app-card.doctorji { background: linear-gradient(135deg, #071525 0%, #1A3A5C 60%, #2E5F8A 100%); }

  .app-card-inner { padding: 28px 24px; }
  .app-card-icon { font-size: 2.8rem; margin-bottom: 12px; }
  .app-card-name {
    font-family: 'Yatra One', serif;
    font-size: 1.5rem; color: #fff; line-height: 1.2;
  }
  .app-card-sub { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .app-card-meta {
    display: flex; gap: 12px; margin-top: 16px;
  }
  .app-card-badge {
    font-size: 0.7rem; padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8);
  }
  .app-card-arrow {
    position: absolute; right: 20px; bottom: 24px;
    font-size: 1.4rem; color: rgba(255,255,255,0.4);
  }
  .card-stripe {
    height: 4px;
  }
  .guruji .card-stripe { background: linear-gradient(90deg, #E8C56A, #C4862B); }
  .doctorji .card-stripe { background: linear-gradient(90deg, #8BC4E8, #2E5F8A); }

  /* SECTION LIST VIEW */
  #section-view { flex: 1; display: none; flex-direction: column; }
  #section-view.visible { display: flex; }

  .section-hero {
    padding: 28px 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .guruji-theme .section-hero { background: linear-gradient(160deg, #3D1F06, #7B3F00); }
  .doctorji-theme .section-hero { background: linear-gradient(160deg, #071525, #1A3A5C); }

  .section-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .section-tab {
    padding: 8px 16px; border-radius: 20px; border: none;
    cursor: pointer; font-family: inherit; font-size: 0.82rem;
    transition: all var(--transition); white-space: nowrap;
  }
  .guruji-theme .section-tab {
    background: rgba(196,134,43,0.15); color: rgba(255,255,255,0.7);
  }
  .guruji-theme .section-tab.active {
    background: var(--g-warm); color: #fff; box-shadow: 0 2px 12px rgba(196,134,43,0.4);
  }
  .doctorji-theme .section-tab {
    background: rgba(46,95,138,0.2); color: rgba(255,255,255,0.7);
  }
  .doctorji-theme .section-tab.active {
    background: var(--d-blue); color: #fff; box-shadow: 0 2px 12px rgba(46,95,138,0.4);
  }

  .story-list { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }
  .story-item {
    background: #fff; border-radius: 14px; padding: 16px 18px;
    margin-bottom: 10px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform var(--transition), box-shadow var(--transition);
    display: flex; gap: 12px; align-items: flex-start;
    border: 1px solid rgba(0,0,0,0.04);
  }
  .story-item:hover { transform: translateX(4px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  .story-num {
    font-size: 0.68rem; font-weight: 700; min-width: 28px;
    height: 28px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    margin-top: 2px;
  }
  .guruji-theme .story-num { background: #FEF3D8; color: var(--g-mid); }
  .doctorji-theme .story-num { background: #E0EFF8; color: var(--d-mid); }

  .story-item-content { flex: 1; min-width: 0; }
  .story-item-title {
    font-size: 0.95rem; font-weight: 600; color: var(--text-main);
    line-height: 1.35;
  }
  .story-item-person {
    font-size: 0.72rem; color: var(--text-soft); margin-top: 3px;
  }
  .story-item-preview {
    font-size: 0.75rem; color: #888; margin-top: 5px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    line-height: 1.4;
  }
  .story-chevron { color: #ccc; font-size: 0.9rem; margin-top: 4px; flex-shrink: 0; }

  /* STORY DETAIL VIEW */
  #detail-view { flex: 1; display: none; flex-direction: column; }
  #detail-view.visible { display: flex; }

  .detail-header {
    padding: 24px 20px 20px;
    position: relative; overflow: hidden;
  }
  .guruji-theme .detail-header { background: linear-gradient(160deg, #3D1F06, #7B3F00); }
  .doctorji-theme .detail-header { background: linear-gradient(160deg, #071525, #1A3A5C); }

  .detail-header::after {
    content: ''; position: absolute; right: -20px; top: -20px;
    width: 150px; height: 150px; border-radius: 50%;
    opacity: 0.07;
  }
  .guruji-theme .detail-header::after { background: var(--g-gold); }
  .doctorji-theme .detail-header::after { background: #8BC4E8; }

  .detail-section-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .guruji-theme .detail-section-label { color: var(--g-gold); }
  .doctorji-theme .detail-section-label { color: #8BC4E8; }

  .detail-title {
    font-family: 'Yatra One', serif;
    font-size: 1.4rem; color: #fff; line-height: 1.3;
    position: relative; z-index: 1;
  }
  .detail-person {
    font-size: 0.78rem; color: rgba(255,255,255,0.6);
    margin-top: 6px; position: relative; z-index: 1;
  }

  .detail-nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: #fff;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 20px; border: none;
    cursor: pointer; font-family: inherit; font-size: 0.8rem;
    transition: background var(--transition);
    background: transparent; color: #888;
  }
  .nav-btn:hover:not(:disabled) { background: #f0f0f0; color: var(--text-main); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .guruji-theme ~ * .nav-btn:hover:not(:disabled) { color: var(--g-mid); }
  .doctorji-theme ~ * .nav-btn:hover:not(:disabled) { color: var(--d-mid); }

  .nav-counter { font-size: 0.75rem; color: #aaa; }

  .detail-body {
    flex: 1; overflow-y: auto; padding: 24px 20px 80px;
    background: var(--neutral-bg);
  }
  .story-text {
    font-size: 1.05rem; line-height: 1.85;
    color: #2A1A0A;
    max-width: 680px; margin: 0 auto;
  }

  /* SEARCH RESULTS */
  #search-view { flex: 1; display: none; flex-direction: column; }
  #search-view.visible { display: flex; }
  .search-results { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }
  .search-result-header {
    font-size: 0.78rem; color: var(--text-soft);
    padding: 8px 4px 12px;
  }
  .search-highlight { background: #FFE082; border-radius: 2px; padding: 0 2px; }
  .no-results { text-align: center; padding: 60px 20px; color: #aaa; font-size: 0.9rem; }

  /* FONT SIZE CONTROLS */
  .font-controls {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .font-label { font-size: 0.72rem; color: #aaa; flex: 1; }
  .font-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid #e0e0e0;
    background: #f8f8f8; cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .font-btn:hover { background: #e8e8e8; }

  /* BOTTOM NAV (within app section) */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; background: #fff;
    border-top: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 50;
  }
  .bottom-nav-btn {
    flex: 1; padding: 10px 4px; border: none; background: transparent;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    font-family: inherit; font-size: 0.65rem; color: #999;
    transition: color var(--transition);
  }
  .bottom-nav-btn .bnb-icon { font-size: 1.3rem; }
  .bottom-nav-btn.active.guruji-active { color: var(--g-mid); }
  .bottom-nav-btn.active.doctorji-active { color: var(--d-mid); }

  /* UTILITY */
  .hidden { display: none !important; }

  @media (min-width: 600px) {
    .app-cards { flex-direction: row; max-width: 700px; }
    .app-card { flex: 1; }
    .story-list, .detail-body, .search-results { padding-bottom: 60px; }
    #home-view { justify-content: flex-start; padding-top: 80px; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-title">संघ प्रेरणा</div>
  <div class="splash-sub">v2.0 — एकीकृत संस्करण</div>
  <div class="splash-logo">
    <div class="splash-card guruji" onclick="openApp('guruji')">
      <div class="icon">🌟</div>
      <div class="card-name">श्री गुरुजी</div>
      <div class="card-sub">प्रेरक संस्मरण</div>
    </div>
    <div class="splash-card doctorji" onclick="openApp('doctorji')">
      <div class="icon">🩺</div>
      <div class="card-name">हमारे डॉक्टरजी</div>
      <div class="card-sub">जीवन और विचार</div>
    </div>
  </div>
  <div class="splash-hint">किसी एक को चुनें या नीचे स्क्रॉल करें</div>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOP BAR -->
  <header class="topbar" id="topbar">
    <button class="topbar-back" id="backBtn" onclick="goBack()">←</button>
    <div class="topbar-info">
      <div class="topbar-title" id="topbarTitle">संघ प्रेरणा</div>
      <div class="topbar-subtitle" id="topbarSubtitle">v2.0</div>
    </div>
    <span class="topbar-count" id="topbarCount"></span>
    <button class="topbar-search-btn" id="searchBtn" onclick="toggleSearch()">🔍</button>
  </header>

  <!-- SEARCH BAR -->
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="खोजें..." oninput="doSearch(this.value)">
  </div>

  <!-- VIEWS -->
  <main>
    <!-- HOME -->
    <div id="home-view">
      <div class="home-header">
        <div class="home-title">संघ प्रेरणा</div>
        <div class="home-sub">550 प्रेरक संस्मरण · दो महापुरुषों के जीवन से</div>
      </div>
      <div class="app-cards">
        <button class="app-card guruji" onclick="openApp('guruji')">
          <div class="card-stripe"></div>
          <div class="app-card-inner">
            <div class="app-card-icon">🌟</div>
            <div class="app-card-name">श्री गुरुजी</div>
            <div class="app-card-sub">म.स. गोलवलकर — प्रेरक संस्मरण</div>
            <div class="app-card-meta">
              <span class="app-card-badge">220 संस्मरण</span>
              <span class="app-card-badge">3 विभाग</span>
            </div>
          </div>
          <div class="app-card-arrow">›</div>
        </button>
        <button class="app-card doctorji" onclick="openApp('doctorji')">
          <div class="card-stripe"></div>
          <div class="app-card-inner">
            <div class="app-card-icon">🩺</div>
            <div class="app-card-name">हमारे डॉक्टरजी</div>
            <div class="app-card-sub">डॉ. हेडगेवार — जीवन और विचार</div>
            <div class="app-card-meta">
              <span class="app-card-badge">330 संस्मरण</span>
              <span class="app-card-badge">3 विभाग</span>
            </div>
          </div>
          <div class="app-card-arrow">›</div>
        </button>
      </div>
    </div>

    <!-- SECTION + STORY LIST -->
    <div id="section-view">
      <div class="section-hero" id="sectionHero">
        <div class="section-tabs" id="sectionTabs"></div>
      </div>
      <div class="story-list" id="storyList"></div>
    </div>

    <!-- STORY DETAIL -->
    <div id="detail-view">
      <div class="detail-header" id="detailHeader">
        <div class="detail-section-label" id="detailSectionLabel"></div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-person" id="detailPerson"></div>
      </div>
      <div class="detail-nav">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← पिछला</button>
        <span class="nav-counter" id="navCounter"></span>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">अगला →</button>
      </div>
      <div class="font-controls">
        <span class="font-label">अक्षर आकार</span>
        <button class="font-btn" onclick="changeFontSize(-1)">A−</button>
        <button class="font-btn" onclick="changeFontSize(1)">A+</button>

const DATA = {"guruji": {"name": "श्री गुरुजी", "subtitle": "प्रेरक संस्मरण", "sections": [{"key": "mahan", "label": "महान विभूति", "icon": "🌟", "stories": [{"person": "", "title": "दो शब्द", "text": "श्री गुरुजी जन्मशताब्दी वर्ष (2006-2007) के अवसर पर जनसाधारण को, श्री गुरुजी का व्यक्तिमत्व, उनके विचार तथा उनका कार्य आदि विषयों में अवगत कराने हेतु राष्ट्रीय स्वयंसेवक संघ से संबंधित डॉ. हेडगेवार स्मारक समिति ने छोटी छोटी पुस्तिकाएँ तैयार करने की एक योजना बनायी है। उसी योजना के अंतर्गत, ‘श्री गुरुजी के प्रेरक संस्मरण’ सह प्रस्तुत पुस्तिका है। \nश्री गुरुजी का आदर्श जीवन, उनके मूलभूत विचार तथा उनका 33 वर्षों का निरन्तर कार्य यह एक महासागर की भाँति गहरार्इ और विराटता का उदाहरण है। ऐसे इस विराट, गहरे महासागर में सर्वत्र बिखरे हुए संस्मरण के रत्नों में से कुछ ही रत्नों को इस पुस्तिका में पिरोया गया है।\n‘श्री गुरुजी समग्र दर्शन’, तथा श्री राधेश्याम बंका द्वारा संकलित ‘श्री गुरुजी जीवन प्रसंग’, इन ग्रंथों में वर्णित अनेकों प्रेरक संस्मरणों में से कुल 46 (छयालीस) संस्मरणों को इस पुस्तिका में साभार उद्धृत किया गया है।\nआशा है इन संस्मरणों से श्रीगुरुजी के व्यक्तित्व, विचार और कार्य के कुछ अंशों का पाठकों को अवश्य परिचय होगा। (संकलनकर्ता-दि. भा. घुमरे )"}, {"person": "", "title": "जीवन और कार्य की एकरूपता", "text": "सन 1949 के दिन थे। संघ से प्रतिबंध हटने के पश्चा्त् श्री गुरुजी देशभर में आयोजित स्वागत कार्यक्रमों को संपन्न करके कुछ दिनों के लिए काशी रहे थे। काशी में सदा की तरह उनके ठहरने की व्यवस्था श्री दत्तराज कालिया (काले) के निवास पर हुर्इ थी। काशी में उनका पूर्ण विश्राम हो, यह ध्यान में रखते हुये कोर्इ कार्यक्रम नहीं रखे गये। उन दिनों मैं काशी में संघ प्रचारक के नाते काम देखता था।\nआते ही श्री गुरुजी ने कार्यक्रमों के बारे में पूछा तब उन्हें बताया गया कि आपको यहाँ पूर्ण विश्राम करना है। प्रतिबंध हटने के बाद देशभर में उनके स्वागत कार्यक्रमों के कारण श्री गुरुजी अत्यधिक श्रमित-थकित थे, इसलिये यह निर्णय लिया गया था।\nउत्तर सुनते ही श्री गुरुजी गंभीर हो गये और समझाने लगे कि विश्राम की यह कल्पना ठीक नहीं है।  कार्यक्रम अवश्य होने चाहिये। नगर कार्यवाह डा. बनर्जी बोले-इस समय आप हमारे चार्ज में हैं और हमने कोर्इ कार्यक्रम न रखकर आपके विश्राम की योजना बनायी है। फिर वे कुछ नहीं बोले। पर रात होते ही उन्हें खाँसी का जोर पकड़ने लगा। दूसरे दिन प्रात: को देखा तो खाँसी से उनका बुरा हाल हुआ है, यह ध्यान में आया और सब चिंतित हुये। वे रातभर खाँसते रहे। चेहरा, आँख लाल थीं। स्वास्थ्य तेजी से गिर रहा था। डा. बनर्जी ने पूछा - गुरुजी ! यह क्या बात है? सोचा था विश्राम से आपको लाभ होगा किन्तु आपकी स्थिति देखकर चिंता हो रही है। गुरुजी बोले मैं क्या कहूँ? जो आप सबने सोचा उसीका यह परिणाम हो रहा है।\nइस पर हम सबकी आँखों में आँसू आ गये। डाँ बनर्जी का गला रुँध गया और वे गुरुजी से बोले - ‘हमने तो आपके स्वास्थ्य के हित में ही सारा विचार करके विश्राम का आयोजन किया था। उसका ऐसा उलटा परिणाम कैसे? आपके स्वास्थ्य में यह गिरावट देखकर हम सभी बंधु बहुत व्याकुल हैं। बताइये हम क्या करें?’ श्री गुरुजी बोले - देखो डॉक्टर ! तुम सोच रहे हो कि पूर्ण विश्राम से यह शरीर अच्छा हो जायेगा। किन्तु ऐसी बात नहीं है। सच पूछो तो इस शरीर में ऐसा कुछ ज्यादा बचा नहीं है जिसके द्वारा यह चल सके। डॉक्टरों के हिसाब से यह शरीर कभी का समाप्त हो चुका है। जब ये कार्य से अलग करवा दिया गया तो यह शरीर अपनी स्वाभाविक अवस्था की ओर जा रहा है। सच्चार्इ तो यह है कि मैं दिनरात संघकार्य में लगा-रहता हूँ इसी के कारण यह शरीर सधा हुआ है और चल रहा है। यदि तुम चाहते हो कि यह शरीर स्वस्थ रहे तो पूर्ण विश्राम के बजाय यथाविधि कार्यक्रम चलने दो। तुरंत ही हम लोगों ने वैसा ही किया। देखते देखते ही फिर वार्तालाप और कार्यक्रमों के बीच श्री गुरुजी की वही हँसी, वही ठहाका आरंभ हो गया और दो तीन दिन मे ही स्वास्थ्य पहले जैसा हो गया।\nजीवन और जीवनकार्य इतने एकरूप हो सकते हैं, इसकी कभी कल्पना भी नहीं थी। हमारे आँखों के सामने यह एक जीता जागता उदाहरण था। तब हम लोगों के समझ में आया कि इस महापुरुष ने तन से एवं मन से अपने आपको कार्य से एकाकार कर लिया है। अब शरीर से जीवनकार्य नहीं चल रहा है, अपितु जीवनकार्य ही शरीर को चला रहा है। - राजेन्द्र शर्मा"}, {"person": "", "title": "यह कैसे संभव हुआ ?", "text": "रा.स्व.संघ के प्रथम अ.भा. प्रचारक प्रमुख होली के रंगोत्सव के दिन एक बार रुष्ट हो गये थे। उनके द्वारा मना करने पर भी एक कार्यकर्ता ने बाबासाहेब आपटे पर रंग के कुछ छीटें डाल ही दिये। उनको बहुत बुरा लगा और उन्होंने रुष्ट होकर अपने कमरे का दरवाजा बन्द कर दिया।\nलोगों ने उनकी नाराजगी पर भी ध्यान नहीं दिया। उनका यही विश्वाऔस था कि थोड़ी देर में सब शांत हो जायेगा। दोपहर भोजन के समय भोजनकक्ष में बाबासाहेब नहीं आये। उनके बंद दरवाजे को थपथपाकर उनसे कहा गया कि भोजन का समय हो गया है। परन्तु न उन्होंने उत्तर दिया न दरवाजा खोला।\nश्री गुरुजी भी भोजन के लिये आये। बाबासाहेब के रुष्ट होने की बात उन्होंने सुनी। श्री गुरुजी ने किसी से कुछ नहीं कहा। जिसने रंग के छीटें डाले थे, उसको भी कुछ नहीं कहा। बाबासाहेब के कमरे के दरवाजे के पास चुपचाप जा बैठे। न कुछ बोले न दरवाजा थपथपाया। कुछ देर बाद बाबासाहेब ने दरवाजा खोला। श्री गुरुजी ने उनसे कहा, ‘चलिये, भोजन करने चला जाये’। दोनों साथ साथ भोजन कक्ष में आये। भोजन करते समय या बाद में भी सुबह के रंग के छीटें डालने के संबंध में किसी ने कुछ नहीं कहा। पर यह सब कैसे हुआ? बाबासाहेब के कमरे के बंद दरवाजे के सामने चुपचाप बैठ जाने के प्रसंग की याद कर्इ बार उभर कर आती है और ऐसा विश्वाास करने को बाध्य कर देती है कि श्री गुरुजी की भावात्मक सूक्ष्म क्षमतायें बहुत अधिक समृद्ध तथा समर्थ थीं। - बाला प्रसाद तुलस्यान"}, {"person": "", "title": "शरीर पर नियंत्रण", "text": "सन 1943 या 1944 के आसपास की बात है। श्री गुरुजी के दाहिने हाथ में अत्यंत कष्टदायी पीड़ा होने लगी। एलोपैथ डॉक्टरों ने सलाह दी कि दर्द का कारण दाँत हैं, अत: उन्हें निकलवा देना चाहिये। होमयोपैथ्स ने कहा कि दाँत निकालने की आवश्यकता नहीं है। इसी झंझट में दो वर्ष व्यतीत हो गये और श्री गुरुजी को उसी प्रकार कष्ट सहते रहना पड़ा। \nइधर कुछ दिन पश्चाषत् उनके दाँत में भी पीड़ा होने लगी। अंत में दाँत निकलवा देना ही उचित समझा गया। इसके लिये वे काशी गये। पीड़ा एक दाँत में थी, किन्तु डॉक्टरों ने समस्त दाँत निकालने का निश्चाय किया। डॉक्टरों ने इन्जेक्शन लगाकर मसूड़ों को सुन्न करने का प्रस्ताव रखा। परन्तु गुरुजी ने उनसे कहा कि मसूड़ों को सुन्न करने के लिए इन्जेक्शन लगाने की जरुरत नहीं है। उन्होंने बिना इन्जेक्शन लगवाये ही समस्त दाँत उखड़वाये। कल्पना कीजिए कितनी वेदना हुर्इ होगी। परन्तु उनके मुख पर किंचित भी दुखदर्द की रेखा दिखार्इ नहीं पड़ी। इतना ही नहीं जबलपुर के समीप गाडरवाडा शिबिर में  वे पधारे और उन्होंने सबके अंदाजों के विपरीत दो घंटे तक लगातार धाराप्रवाह भाषण दिया। श्री गुरुजी का यह मनोबल तथा शरीर पर नियंत्रण लोगों को आश्चार्य में डाल दिया करता था। - बाबासाहेब आपटे"}, {"person": "", "title": "सहनशीलता", "text": "श्री गुरुजी के दाहिने हाथ में नित्य वेदना हुआ करती थी। बहुत सारे उपायों के बाद भी परिणाम शून्य ही था। तब आयुर्वेदिक चिकित्सकों की सलाह से चाँदी की तप्त शलाका से उपचार करना तय हुआ। 1952 में पुणे में इस प्रयोग के लिये श्री गुरुजी आये। उपचार के लिये वे बैठे तब प्रसन्न थे। हास्य विनोद करने लगे। तप्त शलाका उनके कंधे पर रखी गर्इ। चर्रचर्र आवाज के साथ चमड़ी जलने लगी। उसकी दुर्गन्ध भी आने लगी। परंतु श्री गुरुजी शांत थे, प्रसन्न थे और हास्यविनोद कर रहे थे। एक दो बार नहीं अपितु बत्तीस बार तप्त शलाका कंधेपर जगह जगह रखी गर्इ। श्री गुरुजी के शरीर से तनिक भी प्रतिक्रिया हुर्इ नहीं, न उनके मुखपर वेदना के लक्षण दिखार्इ पड़े। मानो, उन्होंने अपने को शरीर से अलग कर दिया हो। - ह.वि. दात्ये"}, {"person": "", "title": "शरीर पर अधिकार", "text": "श्री गुरुजी का अपने शरीर पर विलक्षण अधिकार था। वे उससे कितना भी कार्य ले सकते थे। संघशिक्षा वर्ग में एक बार दोपहर के बौद्धिक वर्ग के लिये आते समय उन्होंने कहा - चलो तुम्हारा चिकित्सा विभाग देखा जाये। मैंने प्रसन्नता से कहा - चलिये। अस्वस्थ स्वयंसेवकों को भी आप का दर्शन मिल जायेगा।\nवहाँ सभी को देखकर उन्होंने डॉक्टर से थर्मामीटर देखने के लिये माँगा और स्वयं को लगाया। मैं उसे कौतुक समझकर देखने लगा, पर अरे यह क्या? गुरुजी को 102 डिग्री का ज्वर निकला। मैं सोचने लगा कि अब क्या होगा? मेरे चेहरे पर चिन्ता की छाया देखकर वे बोले - अरे! चिन्ता कैसी? बौद्धिक वर्ग होगा। बौद्धिक वर्ग से ज्वर का क्या मतलब? इतना कहकर श्री गुरुजी सीधे मंडप में चले गये। एक बार भी माथे पर हाथ नहीं गया और न किसी इंगित से कोई जान सका कि यह बौद्धिक वर्ग 102 डिग्री ज्वर में हो रहा है। मैं तो इसी को व्यावहारिक अध्यात्म समझता हूँ। -- रज्जू भैया"}, {"person": "", "title": "बिच्छू का दंश", "text": "बनारस हिंदू विश्वाविद्यालय में पढ़ते समय एक दिन श्री गुरुजी अपना एक पाँव बकेट में डाले हुये पुस्तक पढ़ने में मगन थे। सहसा एक मित्र आया। उसके पूछने पर गुरुजी ने उसे बताया कि पाँव में बिच्छू ने डंक मारा। इसलिये पोटॅशियम परमैगनेट के द्रावण में मैंने पाँव रखा है। उसका विष धीरे धीरे निकल जायेगा। मित्र को बड़ा आश्चेर्य लगा। कष्ट, वेदना आदि के बारे में पूछने पर सहजता से गुरुजी बोले -अरे भार्इ बिच्छू ने पाँव को डंक मारा है, मेरे मस्तिष्क को तो नहीं मारा। तो भला पुस्तक पढ़ने में दिक्कत कैसी?’ मित्र देखते ही रह गया। बाद में पूरे विद्यार्थी मित्रों तथा अध्यापकों में इस घटना की कर्इ दिनों तक चर्चा होती रही।"}, {"person": "", "title": "धैर्य", "text": "30 जनवरी 1948 को दिल्ली में म. गाँधी की हत्या हुर्इ। उस घटना की तीव्र और क्रोधित प्रतिक्रियाएं सारे देश में उठने लगीं। शीर्षस्थ नेताओं से लेकर स्थानीय कार्यकर्ताओं तक सभी रा.स्व.संघ के विरोध में उत्तेजनापूर्ण शब्दों में आग उगलने लगे। महाराष्ट्र में और विशेषकर नागपुर में इन प्रतिक्रियाओं ने उपद्रव और हिंसा का रूप धारण किया। गांधीजी की हत्या हुर्इ, उस दुर्भाग्यपूर्ण दिन श्री गुरुजी चेन्नर्इ में थे। वहाँ से ही श्री गुरुजी ने इस घटना का निषेध कर सांत्वना प्रकट करनेवाले तार पं. नेहरु, सरदार पटेल तथा देवदास गांधी को भेजे और वे नागपुर के लिये चेन्नर्इ से निकल पड़े। नागपुर आते ही उन्होंने पं. नेहरू तथा पटेल इन दोनों को विस्तृत पत्र भेजे।\nदि. 1 फरवरी को नागपुर की परिस्थिति स्फोटक बनी। प्रक्षोभ बढ़ता गया। आद्य सरसंघचालक डा. हेडगेवारजी की समाधि के शिखरों को तथा तुलसी वृंदावन को उन्मत्त भीड़ ने तोड़ डाला। दोपहर में श्री गुरुजी के घर के अगल बगल भीड़ ने पथराव किया। उसी दिन शाम को चिटनीस पार्क में आमसभा हुर्इ, जिसमें वक्ताओं ने उत्तेजनापूर्ण भाषणों से लोगों को उकसाया, भड़काया। कार्यकर्ता तथा अधिकारी श्री गुरुजी की सुरक्षा के लिये कटिबद्ध थे। भीड़ को आते देख संघ के अधिकारियों ने श्री गुरुजी की अन्यत्र व्यवस्था करने की योजना करके उनको वहाँ चलने की प्रार्थना की। कार्यकर्तागण भीड़ का प्रतिकार करने सिद्ध हो गये। परिस्थिति में तनाव हर क्षण बढ़ता जा रहा था। किसी क्षण कुछ भी हो सकता था। पर श्री गुरुजी शांत थे। उनका धैर्य बना हुआ था।\nश्री गुरुजी ने कहा - लगता है आप लोग बाहर की परिस्थितियों और आपत्तियों के कारण उत्तेजित हो उठे हो। आप लोग अब यहाँ से जायें और मुझे शांतिपूर्वक रहने दें। मेरी चिन्ता आप बिल्कुल न करें। आप कहते हैं कि मैं अन्यंत्र चलूँ, लेकिन क्यों? आज तक मैं जिस समाज के लिये कार्य करता आया हूँ, वह समाज यदि मुझे नहीं चाहता तो मैं कहाँ जाऊँ और क्यों जाऊँ? और न मेरी रक्षा में आप उपद्रवियों पर प्रत्याघात करें। जिस हिन्दू समाज के लिये मेरा सम्पूर्ण जीवन समर्पित है, उस समाज के बन्धु ही मेरे द्वारपर परस्पर संघर्ष करें, और अपने ही बन्धुओं का रक्त मेरे घर के सामने गिरे, यह कदापि ठीक नहीं। जो भी होना है, हो जाने दीजिये। अब मेरे सन्ध्यावन्दन का समय हो गया है। आप सभी लोग यहाँ से जाइये।\nइतना कहकर श्री गुरुजी सन्ध्यावन्दन के लिये चले गये। संयोग से सभा समाप्त होने के कुछ ही मिनट पूर्व श्री गुरुजी के घर की ओर जानेवाले रास्ते बन्द कर दिये गये थे तथा उनके घरपर पुलिस का पहरा लगा दिया गया। इस संकटपूर्ण, तनावपूर्ण और प्रक्षुब्ध परिस्थिति में श्री गुरुजी के अतीव धैर्य का ही नहीं अपितु उनकी अनोखी दृष्टि का जो परिचय हुआ, वह इतिहास का एक बोधपृष्ठ सिद्ध हुआ।(श्री गुरुजी समग्र दर्शन खण्ड, 2 प्रतिबंध पर्व, पृ.7,8,)"}, {"person": "", "title": "रक्षणकर्ता", "text": "1964 के अप्रैल मास में पूज्य श्री गुरुजी कुमाऊँ के प्रवास पर आये थे? उनके साथ प्रात: पिथौरागढ़ से चलकर हम लोग कोर्इ दस बजे मायावती पहुँचे। आश्रमवासियों का सत्कारभाव, आश्रम की सुव्यवस्था तथा वहाँ का दैवी भावापन्न वायुमंडल था ही ऐसा कि साधारण व्यक्ति के मन में अद्धैत का उद्वेलन उत्पन्न कर दे। तब फिर महर्षि विवेकानन्द और (उनके गुरुभार्इ) स्वामी अखण्डानन्दजी, एक की शिक्षा और दूसरे की प्रत्यक्ष दीक्षा को जीवन में चरितार्थ करने वाले साधक की अवस्था, उनकी तल्लीनता, उनकी भाव-विभोरता, बस देखते ही बनती थी। गुरुजी की वह तन्मयावस्था, वस्तुत: वाणी का विषय नहीं है।\nरात्रि को चम्पावत में पड़ाव किया। उन दिनों सामरिक महत्त्व के कारण पिथौरागढ़ - टनकपुर मार्ग का डायरेक्टर जनरल ऑफ बोर्डर रोड (डी जी आर बी) ने अधिग्रहण कर उसे चौड़ा करना चालू किया था। यातायात एकमार्गीय ही चलता था, परन्तु निजी गाड़ियों और कारों पर यह प्रतिबंध लागू नहीं था। सड़क पर दोनों ओर मलवा पड़ा होने के कारण गाड़ियाँ चलाने मे असुविधा थी। प्रात: चलने के पूर्व चाय पीते पीते श्री गुरुजी ने मुझे मिलाकर तीनों चालकों को पर्वतीय मार्गों में गाड़ी चलाते समय ध्यान रखने के लिये अनेक बातें ऐसी बतायीं, जो वैसी हमारे ध्यान में नहीं थीं। किसे पता था कि आगे आनेवाले खतरे से, वे भविष्यद्रष्टा हमें सचेत कर रहे हैं।\nचलथी के प्रसिद्ध पुलपर पहुँचने के पहले ही, सैनिक वाहनों की एक श्रृंखला आयी। सड़क चौड़ी थी, फिर भी एक ट्रक पर ‘ऑन टेस्ट’ (परीक्षणार्थी वाहन) लिखा हुआ था। एक तीव्र मोड़ पर वह ट्रक इतना दायें मुड़ गया कि उसने पहले हमारी कार को टक्कर मारकर कोर्इ एक गज हमारे बायें खड्ढ की ओर ढकेल दिया। इस ओर की मुंडेर टूटी हुर्इ थी। कुछ मलबे का ढेर सा पड़ा हुआ था। और उसके नीचे था हजारों फीट गहरा खड्ड। एक क्षण के लिये ही वह दृश्य दिखा-बायीं ओर की खिड़की खुली थी, मलबे पे खड़े वे देवता पुरुष कार को सहारा दे रहे थे।\nमलवा टिका रहा, खिसका क्यों नहीं? ये रहस्य आज तक समझ में नहीं आया। यदि कार सूत बराबर भी बायें बढ़ जाती अथवा गुरुजी एक इंच भी पीछे हटते तो ........! कुमाऊँ की पहाड़ी गोवर्धन बन गयी और उसको सहारा दिया, इस युग के योगी ने। ‘कहो, रामनारायण ठीक हो न?’ घबराये हुए चालक को उन्होंने सांत्वना दी। दायीं ओर की खिड़की और मडगार्ड क्षतिग्रत हुए, पर चालक को खरोंच भी न लगी। उनके ठीक पीछे मेरा बम्फर जा टकराया, कुछ क्षतिग्रस्त हुआ और अगली गाड़ी को पुन: एक धक्का लगा।\n‘अरे, टक्कर भी इतनी हल्की, जरा जोर से लगाते’-हँसते हुए मानो कुछ हुआ ही नहीं हो, ये शब्द उन्होंने कहे। संघकार्य र्इश्वीरीय कार्य है यह प्राय: सुना करता था। आज र्इश्व।र को प्रत्यक्ष रक्षा करते देखा। - घनश्यामदास"}, {"person": "", "title": "गलतधारणा दूर", "text": "मुम्बई के एक प्रख्यात साहित्यकार राष्ट्रीय स्वयंसेवक संघ के उत्सव में अध्यक्ष होकर नागपुर पधारे। संघ एवं श्रीगुरुजी के साथ यही उनका प्रथम परिचय था। उन्होंने अपने अध्यक्षीय भाषण में कहा - जब मुझे यह सूचना मि ली कि संघ के उत्सव में अध्यक्षीय कार्यवाही के लिए श्रीगुरुजी का निमंत्रण मिला है, तो मुझे विश्वायस ही नहीं हो रहा था। यह इसलिये कि मैं तो संघ के लिये अत्यन्त अपरिचित था। श्रीगुरुजी राष्ट्रीय स्वयंसेवक संघ जैसे प्रबल हिन्दू संगठन के सेनापति हैं, यह बात मेरे मित्रों ने मजाक में कही और कहा – क्या उनके द्वारा एक पागल साहित्यकार को निमंत्रण? तुम इस पर विश्वा–स करते हो? तुम कैसे मूर्ख हो? नागपुर जाने की भूल कदापि न करना। श्री गोलवलकर से भेंट तो दूर रही, तुम उनका दर्शन भी न कर सकोगे। वे सात घेरोंवाले किले में रहते हैं।\nमित्रों ने मुझे बहुत सावधान किया किन्तु मैंने नागपुर जाने का निर्णय कर लिया। नागपुर स्टेशन पर उतरते ही दाढ़ी और लम्बे बालवाले व्यक्ति ने मेरा हार्दिक स्वागत करते हुए मुझे पुष्पमाला पहनायी। मैंने धीरे से एक व्यक्ति से पूछा, यह कौन है? उसने बताया कि ये ही श्रीगुरुजी हैं। इतना सुनना था कि मेरा सारा अस्तित्त्व पानी-पानी हो गया। मुझे मित्रों की बात याद आयी। परन्तु प्रत्यक्षत: श्रीगुरुजी की मुक्त हँसी, उनकी आत्मीयता और सादगी देखकर मैं आश्चकर्यचकित हो गया। हमारे जैसे लोग भी संघ के बारे में अज्ञानतावश गलत धारणा रखते हैं। और भी न जाने कितने रखते होंगे! - हो. वे. शेषादि"}, {"person": "", "title": "अद्भुत स्मरण शक्ति", "text": "श्रीगुरुजी तिन्नेवेली नगर में गये थे। वहाँ एक दिन प्रात: काल वे रमणन् नामक स्वयंसेवक से भेंट करने गये। घर में वे उनके वृद्ध पिता से भी मिले। उन्होंने श्रीगुरुजी का यथोचित सत्कार किया। चायपान और बातचीत के बाद चलने के लिये तैयार गुरुजी ने जब उन्हें नमस्कार किया, तब वे बोले - आप के दर्शन से मैं धन्य हो गया।\nआपसे मेरी यह पहली भेंट है, परन्तु मैं स्वयं को कृतार्थ अनुभव करता हूँ। गुरुजी ने कहा - दर्शन इत्यादि तो क्या, हम लोग अपने पवित्र कार्य के लिये मिलते हैं, यह हमारी पहली भेंट तो नहीं है।\nरमणन के पिता - आप क्या कह रहे हैं? क्या इससे पूर्व भी हम मिले हैं? संघ से मेरा परिचय तो पिछले वर्ष ही हुआ है और इसी वर्ष आप पहली बार आये हैं। गुरुजी ने उनसे पूछा - क्या आप नौकरी करते समय कभी नागपुर में रहे हैं? उन्होंने कहा - हाँ। श्रीगुरुजी - क्या आप कुछ दिन सरायपाली में थें ? उनके हाँ करते ही श्रीगुरुजी ने कहा - जब आप सर्वप्रथम वहाँ आये तो घर न मिलने के कारण एक अध्यापक के यहाँ ठहरे थे न? पिता बोले - हाँ, हाँ ! बिचारे वृद्ध सज्जन को लगा कि गुरुजी ज्योतिषी हैं या कोर्इ जादूगर? उन्होंने पूछा - पर यह सब आपको कैसे मालूम ? गुरुजी ने कहा - उस घर में माधव नाम का 12, 13 वर्ष का एक छोटा लड़का था। याद आया आपको ? पिताजी - हाँ, हाँ याद आया। उनके ऐसा कहते ही गुरुजी ने कहा - मैं ही वह माधव हूँ। वे सज्जन गुरुजी की स्मरणशक्ति देखकर दाँतो तले अंगुलि दबाते रह गये। - पद्माकर भाटे"}, {"person": "", "title": "तीस साल बाद", "text": "सन 1940 में जब प.पू.डाक्टरजी के मासिक श्राद्धदिन के निमित्त मैं नागपुर गया था, तब श्रीगुरुजी के साथ मेरा परिचय हुआ। सन 1942 में श्रीगुरुजी प्रथम बार कर्नाटक प्रान्त के प्रवास पर आये थे तथा आथनी में मेरे यहाँ ठहरे थे। उस समय मेरा बड़ा लड़का अण्णा बहुत ही छोटा था। श्रीगुरुजी ने उसके साथ परिचय कर लिया।\nइस घटना के लगभग तीस वर्ष बाद विगत सन 1973 के फरवरी मास में श्रीगुरुजी पूना स्टेशन पर रेलगाड़ी में सवार हुये। स्टेशन पर उन्होंने मेरे बड़े लड़के को देखा तो उसे उसके नाम से संबोधित कर अपने निकट बुलाया। उन्होंने उससे पूछा - तुम अथनी के अण्णा गाडगील हो ना? तुम्हारे पिताजी विट्ठलराव कुशल तो हैं ? मेरे पुत्र ने पूना से पत्र भेजकर मुझे उक्त घटना की सूचना दी। वह पत्र पढ़कर मैं गद्गद् हो गया।\nश्रीगुरुजी कैन्सर रोग से पीड़ित थे। फिर भी उनकी स्मरणशक्ति ज्योंकि त्यों बनी हुर्इ थी। 30 वर्ष पूर्व एक छोटे बालक के साथ हुये परिचय को ध्यान में रखकर, उन्होंने उसे पहचाना। वह उनकी अद्भुत स्मरणशक्ति तथा आत्मीयता का ही परिचय था। - विट्ठलराव गाडगील"}, {"person": "", "title": "लंगोटिया दोस्त", "text": "जिन्हें आज सारा भारत श्रीगुरुजी कहता है, उन्हें मैं बचपन में ‘मधु’ कहता था। हम दोनों एक कक्षा में साथ साथ पढ़ा करते थे। खंडवा के राजकीय हार्इस्कूल के छात्र थे। एक बार नगर में आये कार्लेकर ग्रैण्ड सर्कस देखने हम दोनों गये थे। उस सर्कस में पिंजरे के अन्दर दो बन्दर थे। एक काले मुँह का और दूसरा लाल मुँह का। उन दोनों की उछल-कूद देखने लगे। बन्दरों की उछल-कूद देख करके मधु भी उसी तरह उछल-कूद कर रहा था। देखनेवालों की भीड़ में दो अंगरेज सैनिक थे।\nमधु की उछल-कूद देखकर एक सैनिक ने चिल्लाकर कहा - ‘अरे ओ, कलमुहे बन्दर’। मधु ने उस अंगरेज को तपाक से जबाव दिया - ‘अरे ओ, लालमुहे बन्दर’। सैनिक ने लपककर मधु को पकड़ना चाहा, पर मधु उसके हाथ नहीं आया। फिर उसने मधु का पीछा किया, पर मधु तो भीड़ में गुम हो गया था। बचपन के दिनों की उन बातों का एक जमाना गुजर गया। 35 साल बाद मधु को मैंने इन्दौर में देखा, संघ के सरसंघचालक के रूप में। बचपन में मुझे इस बात की कभी एक क्षण के लिये भी कल्पना नहीं आयी कि भविष्य में मधु का व्यक्तित्व इस प्रकार निखर उठेगा और वह लाखों स्वयंसेवकों का श्रीगुरुजी बन जायेगा।\nमेरे मन में बड़ा संकोच था कि अब इससे मिलूँ या न मिलूँ। पता नहीं मधु मुझे पहचानेगा या नहीं ! परन्तु मेरी इच्छा के विपरीत मेरा एक मित्र मुझे घसीटकर वहाँ ले गया, जहाँ वे ठहरे थे। उस कमरे में वे संघ के कार्यकर्ताओं से बातचीत कर रहे थे। कमरे में जाकर मैं एक किनारे बैठ गया। पर यह क्या हुआ? मुझे वहाँ बैठे-बैठे एक दो मिनट ही बीते होंगे कि वह ‘मधु’ अपने उच्च आसन से उठकर, उतरकर धीरे से सीधे मेरे पास आया और मुझे अपनी बाँहों में कस लिया। बाँहों मे भींचे भींचे ही उन्होंने उपस्थितों से कहा - ‘‘यह मेरा प्रिय मित्र बाबू, मेरा लंगोटिया दोस्त!’’ मेरा हृदय भर आया था, मैं कुछ बोल नहीं सका। बस, हृदय की उमड़न आँखों की राह से बहने लगी, बरसने लगी। - वामनजी पंडित"}, {"person": "", "title": "आत्मियता", "text": "नागपुर में एक दिन श्रीगुरुजी रुर्इकर पथ के दायीं ओर के पदपथ से जा रहे थे। हम लोग भी साथ थे। श्री परशुरामपंत बढ़िये का मकान उसी पदपथ से सटा हुआ था। श्री बढिये जी अपने घर  के बाहर ही खड़े हुए थे। श्रीगुरुजी ने तीन चार मिनट तक उनसे बातचीत की और आगे बढ़े। कुछ दूरी पर सिलार्इ की एक दुकान थी। उसके मालिक दुकान के सामने खड़े थे। मेरी उनसे पहचान थी।\nवे उत्कृष्ट मल्लखभ्भपटु थे। हम दोनों ने एक दूसरे को अभिवादन किया। मैं आगे बढ़ा ही था कि अपने पीछे हँसी का ठहाका सुनकर मैं ठिठक गया। मैंने पीछे मुड़कर देखा कि श्रीगुरुजी सिलार्इ-दुकान के मालिक से गले लगकर मिल रहे थे। चकित मन से मैं सोच रहा था कि श्रीगुरुजी की इस व्यक्ति के साथ मित्रता कैसी? मैं निकट गया। मैंने देखा कि दुकान के मालिक श्री नामपल्लीवार संकोच में पड़े हुए कह रहे थे - गुरुजी, आप क्या कर रहे हैं? कहाँ आप और कहाँ मैं, क्या कोर्इ बराबरी है? प्रसन्नवदन श्रीगुरुजी ने कहा - कितने वर्षों के बाद हम दोनों मिले रहे हैं। क्या तुम्हें याद है, जब हम दोनों नागपुर व्यायामशाला में मल्लखम्भ का अभ्यास किया करते थे? मुझे तुम्हारी मल्लखम्भ की छलाँगे अब भी स्मरण आती हैं। तुमसे मिलते ही वे सब पुरानी बातें याद हो आयीं। श्री नामपल्लीवार ने गद्गद् स्वर में कहा, ‘गुरुजी, आप जैसे बड़े व्यक्ति मुझ जैसे साधारण व्यक्ति को नहीं भूले, यह मेरा सौभाग्य है!’ - डॉ. व. ग. पाँडे"}, {"person": "", "title": "समय की पाबन्दी", "text": "यह 1952 की घटना है। भारत को स्वतंत्र कराने के उद्देश्य से ‘अभिनव भारत’ नामक जो एक क्रांतिकारी संघटना स्थापित हुयी थी, उसको अब स्वतंत्रता मिलने पर विसर्जित करने का निश्चकय करके पुणे में चार दिन का समापन समारोह आयोजित किया गया था। उस समारोह में स्वातंत्र्यवीर वि.दा. उपाख्य तात्याराव सावरकर स्वयं चारों दिन उपस्थित थे। सेनापति पां. म. उपाख्य तात्या बापट, जो सेनापति बापट के नाम से परिचित थे, ने समारोह का संचालन किया था। इस वर्ष पुणे के संघशिक्षा वर्ग में आये हुए स्वयंसेवक सौभाग्यशाली रहे, क्योंकि उन्हें समारोह के सायंकालीन कार्यक्रम में उपस्थित रहकर गणमान्य नेताओं के विचारों को सुनने का अवसर प्राप्त हुआ।\nश्रीगुरुजी को इस समारोह में सम्मिलित होने का निमंत्रण भेजा गया था। श्रीगुरुजी की पुणे संघशिक्षा वर्ग में उपस्थित रहने की तिथि तथा इस समारोह की तिथियाँ एक ही थीं। समारोह के अंतिम चौथे दिन श्रीगुरुजी का भाषण था। श्रेष्ठ वक्ता व्यासपीठ पर विराजमान थे। केवल पाँच मिनट पूर्व श्रीगुरुजी सभास्थल पर पहुँचे। सावरकरजी ने श्रीगुरुजी का स्वागत करते हुए कहा, ‘आइये माधवरावजी’। अभिवादन करने के लिये ज्यों ही श्रीगुरुजी कुछ नीचे झुके, तो ही सावरकर जी ने अपना हाथ आगे बढ़ाया और श्रीगुरुजी को अपने समीप ही बिठा लिया। समारोह में वक्ताओं की संख्या अधिक और समय कम, ऐसी स्थिति होने के कारण तथा विगत तीन दिनों का अनुभव ध्यान में रखकर सभा संचालक सेनापति बापटजी ने वक्ताओं पर समय का प्रतिबंध लगाया था।\nश्रीगुरुजी को भाषण के लिये दस मिनट का समय देकर बापटजी ने उन्हें भाषण के लिये आमंत्रित किया। निर्धारित समय के भीतर भाषण पूर्ण करने की सूचना बापटजी सभी वक्ताओं को दे रहे थे, परंतु श्रीगुरुजी को यह सूचना देते समय वे अपनी हँसी को रोक नहीं सके। श्रीगुरुजी, सावरकरजी तथा सारी सभा भी हँस पड़ी। भाषण के लिये खड़े होते ही श्रीगुरुजी ने अपनी घड़ी सेनापति बापटजी के सामने रख दी और उन्होंने अपना भाषण प्रारंभ किया।\nजब सारी सभा उनका भाषण सुनने में विभोर थी, उसी समय श्रीगुरुजी ने अपना भाषण समाप्त किया। दस मिनट पूर्ण होने में अभी कुछ क्षण की देरी थी। सेनापति बापट तथा सारी सभा मानो और दस पंद्रह मिनट उनका भाषण सुनने को उत्सुक दिखार्इ देती थी। स्वयं सावरकरजी तो बोल ही गये, ‘अरे भार्इ, मेरे भाषण के दस मिनट माधवराव को दे देते तो अच्छा होता।’- ह.वि. दात्ये"}, {"person": "", "title": "जा बाबा, जा", "text": "उस दिन अपरान्ह (दोपहर) में श्रीगुरुजी को नागपुर से प्रवास के लिये प्रस्थान करना था। सुबह आठ बजे एक स्वयंसेवक दौड़ता हुआ कार्यालय आया और उसने श्रीगुरुजी को सूचना दी कि पूजनीया तार्इ को (श्रीगुरुजी की माताजी) पक्षाघात का झटका लगा है।\nहम सब लोग नागोबा गली में स्थित तार्इजी के मकान की ओर दौड़ पड़े। पूजनीया तार्इ स्नान करके नित्यक्रम के अनुसार पार्थिव पूजा करने जा रही थीं, इसी बीच उन्हें यह झटका आया। प्राथमिक उपचार के बाद डापांडे ने कहा, ‘अब थोड़ी गर्म कॉफी लेकर तार्इ को लेटे रहना चाहिये। कुछ न कुछ गर्म पेय पेट में जाना आवश्यक है।’\nकिन्तु तार्इ ने संकेत मात्र से इन्कार किया और सूचित किया कि उस अवस्था में भी पार्थिव पूजा किये बिना वे कुछ भी ग्रहण नहीं कर सकतीं। पहले ही दुर्बलता, उसमें यह झटका, ऐसी अवस्था में हाथ में पार्थिव लिये अधिक देर तक पूजा करना संभव नहीं था। किन्तु तार्इ के आग्रह पर मधु टिकेकर शुचिर्भूत होकर सामने आये। उन्होंने सारा कार्य सम्पन्न करने पर तार्इ ने थोड़ी कॉफी ली। किन्तु उनकी स्थिति गंभीर ही थी। कार्यालय में चर्चा चल पड़ी कि इस गंभीर स्थिति में श्रीगुरुजी के लिये नागपुर छोड़ना उचित नहीं रहेगा। पता नहीं अकस्मात् कब क्या हो जाये? ट्रेन के समय से थोड़े समय पूर्व श्रीगुरुजी तार्इ के सामने जाकर खड़े हुये और उन्होंने पूछा-तार्इ, मैं जाऊँ?’ उस अवस्था में भी तार्इ ने अति स्पष्ट शब्दों में उत्तर दिया - ‘जा बाबा, जा!’ ‘तार्इ, मैं जाऊँ?’ यह सदैव पूछते रहने के लिये ही तो इस महापुरुष ने तार्इ की गोद में जन्म लिया था और, ‘जा बाबा, जा’ ऐसा प्रसाद जीवन भर देते रहने के लिये ही उस महासाध्वी ने नौ मास तक गर्भधारण के कष्ट सहन किये थे।- दत्तोपंत ठेंगडी"}, {"person": "", "title": "अन्तर्वेदना", "text": "रा. स्व. संघ पर प्रतिबंध लग जाने के कारण संगठन की आर्थिक स्थिति अत्यंत कठिन हो गयी थी। ॠण का जो बहुत बड़ा भार था, वह अलग से चिन्ता का विषय था। श्रीगुरुजी के प्रति जनसाधारण की जो श्रद्धा भावना थी, उसको ध्यान में रखते हुए संघ के केन्द्रीय कार्यकारी मंडल ने सन 1956 में एक निर्णय लिया। इस निर्णय के अनुसार श्रीगुरुजी के सार्वजनिक अभिनन्दन की एक योजना बनायी और श्रद्धानिधि के रूप में उन्हें थैली भेंट करना निश्चिात हुआ। श्रीगुरुजी की पूर्व सम्मति के बिना ही केन्द्रीय कार्यकारी मंडल ने यह निर्णय ले लिया था। श्रीगुरुजी की स्वीकृति लेने के लिये मंडल ने अपनी योजना का विवरण उनके सामने रखा। श्रीगुरुजी के लिये यह एक धर्मसंकट की स्थिति थी। प्रशंसा, सराहना, अभिनंदन आदि से जिनका जीवन सदा सर्वदा अतिदूर रहा, वे भला क्यों कर ऐसे कार्य के लिये अपनी स्वीकृति प्रदान करें। परन्तु संघ के केन्द्रीय कार्यकारी मंडल के निर्णय की अवहेलना भी कैसे की जाये? व्यक्तिगत सम्मान के प्रति अत्यधिक वितृष्णा रहने पर भी संगठन के आज्ञाकारी स्वयंसेवक के रूप में श्रीगुरुजी ने अपनी स्वीकृति दे दी।\nस्थान स्थान पर श्रीगुरुजी की जयजयकार हुर्इ, सार्वजनिक अभिनन्दन हुए, पुष्पवृष्टि हुर्इ तथा लगभग 21 लाख रुपयों की श्रद्धानिधि के अर्पण के रूप में यह योजना सम्पन्न हुर्इ। अभिनन्दन कार्यक्रम सम्पन्न हो जाने पर अंत में प्रमुख कार्यकर्ताओं का एक कार्यक्रम हुआ, जिसमें श्री गुरुजी के हृदय की अन्तर्वेदना फूट पड़ी। व्यक्तिगत सत्कार के कारण उनके आहत हृदय की व्यथा जिन किंचित् शब्दों में व्यक्त हुर्इ, उन मर्मभेदी शब्दों ने सारे कार्यकताओं को रुला दिया। उनके कथन का भाव यह था - संघ संस्थापक डॉ. हेडगेवारजी के जीवनकाल में उनके गले में पुष्पमाला डालने का साहस कभी किसी संघबन्धु ने नहीं किया। केवल उनके शवयात्रा के समय ही उनके शव पर पुष्प चढ़ाये गये और मैं ऐसा अभागा कि उन्हीं के आसन पर आसीन मुझको मेरे ही स्वयंसेवक फूलमालाओं से लादकर मेरा अभिनन्दन करके मेरी जयजयकार कर रहे हैं। इससे बड़ा दुर्भाग्य मेरा और क्या होगा ! पूज्य डा. हेडगेवारजी के 51 वर्ष की अल्पायु में जीवनलीला समेट लेने पर उनपर पुष्प चढ़ाये गये थे और मेरे आयु के भी 51 वर्ष पूरे होने पर मेरे जीवनकाल में यह आयोजन किया जा रहा है।’\nवातावरण अत्यधिक व्यथापूर्ण हो गया था। अत: श्रीगुरुजी ने विषय बदला और वातावरण की गंभीरता को कम करते हुए व्यक्तिपूजा, सस्ती नारेबाजी, छिछली प्रचार प्रणाली आदि का त्याग करने की प्रेरणा दी।- भीमसेन चोपड़ा"}, {"person": "", "title": "क्या फर्क पड़ता है?", "text": "श्रीगुरुजी यह कभी अनुभव नहीं होने देते थे कि वे एक साधारण व्यक्ति से कुछ अलग हैं अथवा अधिक हैं। वास्तविकता तो यह है कि साधारण व्यक्ति के स्तर से उनका स्तर बहुत ऊँचा था, पर यह उनके व्यवहार की विशेषता कहें या यह उनके स्वभाव का अंग बन चुका कहें कि असाधारण होकर भी वे साधारण व्यक्ति के समान ही व्यवहार करते थे। जब हम दोनों जेल में थे तब मैं उनसे पूर्व स्नान कर लिया करता था। पहले दिन स्नान के बाद मैंने अपने गीले कपड़े पड़े रहने दिये। मैंने यही सोंचा कि पूजापाठ से निवृत्त होकर इन गीले कपड़ों को धो लूँगा। \nपूजा के समाप्त होने पर मैं स्नानगृह में गया तो मैं चकित रह गया। श्रीगुरुजी ने मेरे कपड़े धो डाले थे। जब मैंने इसका प्रतिवाद किया तो श्रीगुरुजी बोले - ‘इससे क्या फर्क पड़ता है? हम दोनों को यहाँ काम ही क्या करना है?’ यह घटना पहले दिन की है, इसके बाद तो दूसरे दिन से मैं पूजा के पूर्व ही कपड़े धोने लगा। - बाबासाहब घटाटे"}, {"person": "", "title": "श्रीगुरुजी का घर", "text": "नागपुर में मैं उनके घर गया हूँ। एक टूटा, फूटा-सा निर्धनों का-सा छोटा-सा किराये का घर था। केवल माता-पिता थे, न भार्इ, न बहिन, न कोर्इ सगा, न सम्बन्धी। माता-पिता के संतोषार्थ प्रवास से लौटते तो एक- दो बार घर पर जाते। माता-पिता परम सात्विक, भोले-भाले। उस घर को देखकर कोर्इ नहीं कह सकता था कि वह इतने ख्यातनामा महापुरुष का घर है। माता-पिता जब तक जीवित रहे, उस घर से सम्बन्ध बना रहा। उनके देहान्त के पश्चातत् संघ कार्यालय का एक कोना-यही उनका निवास, कार्यालय तथा सब कुछ था। त्याग की वे सजीव मूर्ति थे।\nतृष्णा उनके समीप फटकने नहीं पाती थी। न घर की कामना, न परिवार की कामना, न धन की कामना, न लोकेषणा की कामना। पद, प्रतिष्ठा, प्रमदा तथा कीर्ति जो लोकधर्म तथा जैव धर्म है, उनसे वे बड़ी सावधानी से बचे रहते थे।- संत प्रभुदत्त ब्रह्मचारी"}, {"person": "", "title": "राष्ट्र ही उनका घर", "text": "पं. मौलिचंद्रजी शर्मा से श्रीगुरुजी के बारे में चर्चा चल रही थी। वे कुछ ऐतिहासिक घड़ियों का पुनरावलोकन कर रहे थे और अपनी श्रद्धांजलि मुझसे लिखवा रहे थे। वे शब्द बोलते जाते, उस महापुरुष का स्मरण करके बीच बीच में उनकी आँखें डबडबा जातीं। कभी कभी वे फफक पड़ते थे।\nतीन बार रुमाल निकालकर उन अश्रुबिंदुओं को समेटने का प्रयास किया, किन्तु जब जेल से रिहा होने के बाद श्रीगुरुजी के नागपुर पहुँचने पर उनकी माताजी के दर्शनों की स्मृति उन्हें आयी और उन्होंने उनके टूटे फूटे मकान की चर्चा प्रारम्भ की तब नेत्रों का बाँध टूट पड़ा। वे बोले-श्रीगुरुजी आदमी नहीं, देवता थे, ॠषि थे, भारतीयता की प्रतिमूर्ति थे। लोकमान्य तिलक ने मकान बनवाया, मालवीयजी भी अच्छे मकान में रहते थे, किन्तु उस महापुरुष के पूज्य माता-पिता उस टूटे फूटे मकान में ही रहते थे। उन्होंने राष्ट्र को ही अपना घर समझा।- शिवकुमार गोयल"}, {"person": "", "title": "स्वयंसेवक के प्रति वात्सल्य", "text": "श्रीगुरुजी के कारागार से मुक्त होने के बाद की घटना है। उत्तर प्रदेश के जौनपुर जिले के कार्यकर्ताओं का एक त्रिदिवसीय शिविर कार्यक्रम धर्मापुर में हुआ। जाड़े के दिन थे। धर्मापुर शहर से बहुत दूर था। वहाँ पर एक छोटा सा पक्का कमरा था, जहाँ श्रीगुरुजी के ठहरने की व्यवस्था की गयी थी। बिजली न होने के कारण मिट्टी के तेल का एक लैम्प रखा था। उस कमरे के दरवाजे पर तथा आसपास रक्षक के रूप में कुछ स्वयंसेवक नियुक्त किये गए थे।\nउस कमरे से तनिक सी दूरी पर हमारा भोजन विभाग था। भोजन के लिये कोर्इ रह तो नहीं गया यह देखने के लिये भोजन विभाग प्रमुख के नाते मैं उस कमरे की ओर गया। रात्रि के बारह बजे होंगे। श्रीगुरुजी कमरे में विश्राम कर रहे थे और द्वार पर एक स्वयंसेवक हाथ में दण्ड लिये रक्षक के रूप में खड़ा था। खड़े खड़े शायद थक गया होगा, फिर बैठ गया और फिर वह बैठे बैठे सो गया।\nलगभग एक बजे गुरुजी उठे और कमरे के बाहर आये। उन्होंने देखा कि वह द्वार रक्षक स्वयंसेवक बैठे बैठे सो गया है तो उन्होंने धीरे से अपना कम्बल लाकर उस स्वयंसेवक के ऊपर से ओढ़ा दिया। उस स्वयंसेवक को थोड़ी गर्मी और मिल गयी और वह जाड़े की उस रात में आराम से सो गया। एक संघ अधिकारी प्रात: तीन चार बजे के आसपास सभी ओर देखरेख करते हुए उस ओर आये। वहाँ उन्होंने देखा कि वह द्वार रक्षक स्वयंसेवक सो रहा है और अधिक समीप जाकर देखा तो दिखा कि वह स्वयंसेवक गुरुजी की कम्बल ओढ़े हुए सोया है और गुरुजी कमरे के अन्दर लैम्प के पास बैठकर पुस्तक पढ़ रहे हैं। उन्होंने उस स्वयंसेवक को जगाया तो श्रीगुरुजी को कुछ आहट लगी। श्रीगुरुजी कमरे से निकलकर बाहर आये और कहा - अरे भार्इ। सोने दो बिचारे को।\nवह स्वयंसेवक शर्म के मारे सिर नीचा करके बहुत पश्चा-ताप करने लगा। उससे श्रीगुरुजी ने कहा – कोर्इ बात नहीं। आगे से ध्यान रखना। स्वयं रातभर ठण्ड खाकर श्रीगुरुजी ने उस स्वयंसेवक को अपना कम्बल ओढ़ा दिया अपनी चिन्ता नहीं की।  भोजन विभाग का दायित्व मुझे दिया गया तब श्रीगुरुजी के बौद्धिक सुन नही पाऊँगा, इसका मन में थोड़ा रंज था। पर इस घटना ने उनके बौद्धिकों का निचोड़ जीवन में उतार दिया। श्रीगुरुजी ने उस स्वयंसेवक को न डाँटा फटकारा, न कोर्इ उपदेश किया। परन्तु अपने व्यवहार से जो संस्कार उस स्वयंसेवक के तथा हम सबके जीवनों में उतारा वह क्या कम बौद्धिक था।- सीताराम गुप्त"}, {"person": "", "title": "चिड़िया में प्रचारक", "text": "केशव दुर्ग, मथुरा के निकट स्थित धर्मशाला की छत पर शामियाना लगा है। प्रचारकों की बैठक चल रही है। आसन पर विराजमान हैं पूज्यश्रीगुरुजी । मुक्त हँसी, दैदीप्यमान मुखमंडल; दिव्यता सर्वत्र व्याप्त है। उनकी अमृतवाणी सुनने के लिये लालायित कार्यकर्ता दत्तचित्त होकर बैठे हैं। अकस्मात् पंडाल के बाँसों पर बैठी एक चिड़िया चहचहा उठी। कार्यकर्ताओं का ध्यान टूट गया। चहचहाट उन्हें अखरने लगी। ऐसा क्यों न होता? अमृतवाणी सुनना कठिन हो रहा था। क्षण पर क्षण बीतते गये। चहचहाट जारी रही। आखिर कार्यकर्ताओं का धैर्य टूट गया। उनमें से एक ने उठकर चिड़िया को उड़ा दिया। परन्तु यह क्या? वह एक बाँस से उठकर दूसरे पर चली गयी। वहाँ से उड़ा दिया गया तो उसने पुन: बाँस बदल दिया। कार्यकर्ता बेचैन थे। विघ्न पड़ते देखकर श्रीगुरुजी बोले उठे ‘‘रहने दो, रहने दो।’’\nइस वाक्य को कहते-कहते उनका गला भर आया। आँखों में पितृस्नेह झलक उठा। एकटक दृष्टि से चिड़िया की ओर देखते हुए बोल उठे- ‘‘ऐसा लगता है कोर्इ दिवंगत प्रचारक चिड़िया के रूप में हमारे मध्य में उपस्थित है। उसे बैठा रहने दो। तंग न करो ....।’’  सुनते ही बैठक का वातावरण विलक्षण दिव्यता से भर गया। एक एक कार्यकर्ता की असीम आत्मीयता प्रचारकों के मध्य साकार हो उठी थी। हम सभी हैरान रह गये। श्रीगुरुजी की वाणी सत्य सिद्ध हो गर्इ। उनके एक वाक्य ने संगठन मंत्र की दीक्षा दे दी थी।- राणाप्रताप"}, {"person": "", "title": "घृत सेवन कैसे करूँ", "text": "विदर्भ के प्रान्त अधिकारी तथा ख्यातनाम विधिज्ञ श्री नारायणराव उपाख्य बाबासाहेब धनागरे, बाशीम इनको लिखते हैं। (पत्र -20-7-1955) मेरे लिये भेजा गया घी प्राप्त हुआ। आहार में अधिक घृतसेवन की आपकी सूचना पूर्णत: उचित है। प्रयत्न करूँगा। बाधा केवल मेरे मन की ही है। मेरे चारों ओर के आत्मीय जनों को खाद्य-पेय का सुख है, ऐसा नहीं कहा जा सकता। सारी परिस्थिति ही वैसी है। ऐसी स्थिति में मेरी मन:स्थिति अत्यंत विचित्र होती हुर्इ, मैं अनुभव करता हूँ तथा शरीर को सुदृढ़ रखने को आवश्यक परंतु सबको दुर्लभ अन्नपदार्थ गले के नीचे उतारना असम्भव होता है।\nइसका क्या उपाय है? ऐसा स्वभाव क्यों और कैसा बना, कह नहीं सकता, परन्तु प्रत्यक्ष अनुभव ऐसा है। फिर भी प्रयास करूँगा। इस प्रयत्न में सफलता मिलने की आशा बहुत कम है।- पत्ररूप गुरुजी"}, {"person": "", "title": "स्वस्थ्य हेतु प्रार्थना", "text": "श्रीगुरुजी उन दिनों कोट्टाइकल (केरल) में भर्ती थे - उपचार के लिये। तेल-धारास्नान (आँयल बाथ) की प्रक्रिया चलती थी। डॉक्टर थे श्री माधव परलकर। एक दिन जब वैद्यजी आये तो उन्होंने धूप-दीप जलाया, प्रार्थना की। फिर श्रीगुरुजी से उन्होंने कहा - आप भी शीघ्र स्वास्थ्य लाभ के लिये भगवान से प्रार्थना कर लें।\nश्रीगुरुजी तैयार नहीं हुए। स्पष्ट मना करते हुए उन्होंने कहा - आप लोग जो भी करें मैं बीच में नही पडूंगा पगा। परन्तु अपने इस नश्व-र शरीर के लिये भगवान से क्या प्रार्थना करना। इस शरीर से वह जितना काम कराना चाहता है, करायेगा। और जब देखेगा कि मेरा काम पूरा हो गया है, तो वापस ले लेगा। स्वास्थ्य लाभ के लिये मैं प्रार्थना नहीं करूँगा। मैं सोचता रहा कि श्रीगुरुजी के ये शब्द जहाँ लोगों को चौकायेंगे वहीं एक नयी दिशा का बोध भी कराते हैं कि प्रार्थना निम्नदेह के स्वार्थ के लिये नहीं होनी चाहिए।- वासुदेव पु. तेलंग"}, {"person": "", "title": "अनन्य ध्येयनिष्ठा", "text": "श्रीगुरुजी ने डिब्बे के नीचे पाँव नहीं रखा था कि मेरा शरीर नमस्कार करने के लिये झुक गया। उन्होंने अपनी दोनों बाँहों से मेरी बाजुओं को पकड़ लिया और कहा - यह क्या वीरजी? मेरी बाजुओं को पकड़े पकड़े वे नीचे प्लेटफार्म पर आ गये। यों तो इनके मुखपर मुस्कान थी, परन्तु मुझे कुछ ऐसा आभास हुआ कि उनकी आँखों में तेज नहीं, जो सुस्वास्थ्य के कारण उनके चेहरे पर प्राय: खेला करता है। शायद गाड़ी में नींद नहीं आयी हो। मैने पूछ ही लिया - रात में नींद तो ठीक से आयी थी न? श्रीगुरुजी - क्यों नींद को क्या हुआ है? जैसे पहले आती रही है, वैसे ही आज आयी। ‘तो पूरी नहीं हुर्इ’ - ऐसा मेरे कहने पर - कभी भी नहीं होती’- यह था उनका उत्तर। मेरे प्रश्नप पूछनेपर वे उत्तर देते रहे- अरे, डॉक्टर कहते हैं, इसी लिए विस्तर पर पड़ा रहता हूँ। मुझे कुछ चिंता लगी। एक सुझाव मन में आया। मैंने उसे व्यक्त किया-परन्तु आप को शारीरिक श्रम भी तो नहीं मिलता। नींद कैसे आये? श्रीगुरुजी ने कहा - वीर जी! आप क्या कह रहे हैं? मैं दिनभर इधर से उधर भागता रहता हूँ। यह क्या कम शारीरिक श्रम है? उसपर मैंने कहा - भागते तो आप हैं, लेकिन मोटर पर। शरीर आपका थकता नहीं, अत: नींद नहीं आती। \nश्रीगुरुजी - तो ? मैंने कहा - आप एक घण्टे सैर क्यों न किया करें? सुबह नहीं तो शाम को।\nश्रीगुरुजी - तब शाम को सायं-शाखाओं में कैसे जा सकता हूँ?\nउनका कहना ठीक था। शारीरिक श्रम के न होने से नींद नहीं आती, न आये। नींद नहीं आने से स्वास्थ्य ठीक नहीं रहता, न रहे। परन्तु संघकार्य तो होना ही चाहिये। ध्येय देव के प्रति कितनी अनन्य भक्ति थी ! मैं चुप हो गया। मेरी आँखें खुली की खुली रह गयीं। इतनी ध्येयनिष्ठा? अजमेर की बात याद आ गयी। वहाँ पर श्रीगुरुजी से प्रान्त कार्यवाह ने पूछा था कि ‘आपका स्वास्थ्य कैसा है?’  यह सुनकर श्रीगुरुजी बोले थे - अपने लोगों को स्वास्थ्य का विचार नहीं करना चाहिए। ‘स्वास्थ्य का ध्यान रखनेवाला संघकार्य नहीं कर सकता।’ हम चलते चले जा रहे थे। श्रीगुरुजी मौन थे, उसे भंग करने के लिये मैंने विषय बदला और पूछा - ‘आप को बद्री-केदार यात्रा का ध्यान कैसे आ गया?’\nउन्होंने उत्तर दिया - मैं कहाँ जाना चाहता था? मैं तो इस यात्रा के लिये बाध्य कर दिया गया हूँ। मैंने पूछा - आप जाना क्यों नहीं चाहते? श्रीगुरुजी - इसीलिये कि इस जीवन का उद्देश्य एक ही है और वह है संघकार्य। तीर्थयात्रा में जितने दिन लगेंगे, उतने दिन संघकार्य से छिन जायेंगे। इसका मुझे खेद है। मुझे एक प्रकार से धक्का लगा। श्रीगुरुजी के हृदय में कर्तव्य की भावना कितनी प्रबल है। वह तीव्र भावना उनको तीर्थ पर जाकर प्रभु के दर्शन करने की भी इजाजत नहीं देती। मुझे याद है, कुछ वर्ष पूर्व जब श्रीगुरुजी की पूज्य माताजी के देहान्त का समाचार मिला था, तब मैंने सहानुभूति का पत्र लिखा था। उसका जो उत्तर आया उस पत्र में इसी कर्तव्य भावना की व्याख्या है। उस चिट्ठी में श्रीगुरुजी ने लिखा-\nआपका 19-8-1962 का स्नेहभरा पत्र मिला। भगवत्स्मरण करते करते शरीर त्याग करने के कारण सद्गति निश्चिुत मिलती है। अत: पूज्य माताजी के परलोक के संबंध में चिंता नहीं है। मेरा वही एक अतीव प्रबल स्नेह का बन्धन मुझे सांसारिक जीवन से बाँध रखनेवाला था। सो अब नहीं रहा है। जीवन में कुछ रिक्तता, कुछ सूनापन आया है। उसे कार्य से भरने का प्रयत्न कर रहा हूँ। अब यही एक आकार्षण है। इसके लिये ही मातृसुलभ इच्छा-आशा-आकाँक्षाओं को हृदय से सर्वथा हटाकर पूज्य तार्इ ने मेरा मार्ग प्रशस्त किया था। उसने आशीर्वादपूर्वक प्रोत्साहन दिया था। इसी कार्य में रमकर मन शान्त हो सकता है, प्रसन्न रह सकता है।’- प्रो. धर्मवीर"}, {"person": "", "title": "संघकार्य", "text": "कैंसर के ऑपरेशन के पश्चाmत् जुलार्इ 1970 में श्रीगुरुजी नागपुर में हमारे घर ठहरे थे। दोपहर तक वे खाली रहते। तभी हम लोग उनके पास जाकर बैठते थे। हमारा श्रीगुरुजी से घरेलू सम्बन्ध रहा है। उनसे बातचीत करने में अथवा कुछ पूछने में कभी किसी प्रकार का संकोच नहीं होता था। वे हमारी जिज्ञासाओं को तुरन्त सुन्दर समाधान से शान्त कर दिया करते थे। एक बार मैंने उनसे पूछा -गुरुजी ! सन 1925 में संघ की स्थापना हुर्इ।\nआज 45 साल बीत गये, लेकिन तब (1925) की तुलना में व्यावहारिक-नैतिक-आध्यात्मिक सभी दृष्टि से समाज का अध:पतन आज और अधिक हो चुका है। ऐसी स्थिति में क्या संघकार्य को र्इश्वकरीय कार्य कहना उचित होगा? श्रीगुरुजी बोले - सन 1925 की अपेक्षा आज नैतिक दृष्टि से अध:पतन अधिक है। उसे संघ रोक नहीं पाया, यह भी ठीक है, परन्तु दूसरी ओर एक अत्यन्त महत्त्वपूर्ण बात यह है कि अधोगति की यह स्थिति जब समाज में विप्लव का रूप लेगी, तब संघ की वास्तविक उपयोगिता ज्ञात होगी। आज की परिस्थिति में नैतिक-धार्मिक-आध्यात्मिक मूल्य भले क्रमश: लुप्त होते चले जायें, तो भी सुप्त अंगार प्रज्वलित रखने का कार्य तो संघ को ही करना है। फिनिक्स पक्षी बार बार राख से ही उत्पन्न होता है। उसी प्रकार समाज की अधोगति में से अन्त में अपने हिन्दू समाज का पुनर्जन्म निश्चिमत ही होगा। अपने ग्रन्थों में ऐसे अनेक उदाहरण हैं। प्राचीन काल में हिरण्यकशिपु, भस्मासुर, त्रिपुरासुर, रावण, कंस, जरासंध आदि कर्इ एक राक्षसी प्रवृत्तियों ने आतंक मचा रखा था। परन्तु सद्प्रवृत्ति कहीं-न-कहीं बची रही थी। इस कारण अपने समाज का बार बार उत्थान हुआ। आज की स्थिति देखकर भय का कोर्इ कारण नहीं। हमें अपना कर्तव्य आत्मविश्वा स से एवं सातत्य से करते रहना चाहिये। समाज के पुनरुत्थान के लिये सद्प्रवृत्तियों के बीज सुरक्षित करना ही संघकार्य है। ये बीज बचे रहे तो अपने हिन्दू समाज पर कितने ही भीषण आधात क्यों न हो, अपना भविष्य उज्ज्वल रहेगा। पौराणिक काल में धर्मग्लानि के अनेक प्रसंगों पर यह सद्प्रवृत्ति कहीं-न-कहीं बची थी। उसका संरक्षण ॠषि-मुनियों ने किया। जैसा ही वह र्इश्वहरीय कार्य था, वैसे ही संघकार्य भी र्इश्वॠरीय कार्य है।\nऔर भी एक बात है कि यदि हम अधिक परिश्रम एवं धैर्य से अपना काम बढ़ा सकें तो अध:पतन की अवस्था देखने का मौका ही नहीं आयेगा। तात्कालिक सफलता प्राप्त करना संघ का लक्ष्य नहीं है। समाज की अंतर्बाह्य शुद्धि करने की यह अति कठिन तपस्या है। ‘असुं अम्ही सुखाने पत्थर पायातील’ (बने हम पत्थर सुख से नींव के) यह हमारे गीत की एक पंक्ति है। मंदिर का कलश देखने का भाग्य प्राप्त हो तो ठीक ही है, परन्तु मंदिर की ‘‘नींव का पत्थर बनने में हमारा अहोभाग्य होगा।’’- कृष्ण माधव घटाटे"}, {"person": "", "title": "आग्रह", "text": "श्रीगुरुजी का सदा आग्रह रहता था कि किसी भी परिस्थिति में पूर्वनिश्चिaत कार्यक्रम रद्द न हो। शरीर में एक सौ पाँच डिग्री ज्वर होनेपर भी उन्होनें भाषण तथा बैठकों के कार्यक्रम निभाये हैं। सन 1947 के सितम्बर मास की बात है। भारत का विभाजन हुआ ही था। सिंध और पंजाब के हिन्दुओं पर भीषण विपत्तियाँ आयीं थीं। विस्थापित चले आ रहे थे। उनकी दुर्दशा सुनकर श्रीगुरुजी पंजाब दौरे पर आये थे।\nजोरदार वर्षा हो रही थी। नदी-नाले उफन रहे थे। श्रीगुरुजी को जालन्धर का कार्यक्रम संपन्न कर लुधियाना जाना था। किन्तु तेज वर्षा के कारण रास्ते रुके हुए थे। लुधियाना जानेवाले मार्ग पर पानी भरा हुआ था। अत:, कार से जाना संभव नहीं था। रेलवालों से पूछताछ की तो ट्रॉली का प्रबंध हो सकता है, ऐसा पता लगा। श्रीगुरुजी के साथ मैं और धर्मवीरजी हम तीनों ट्रॉलीपर सवार हुए। जैसे तैसे हम चहेडू तक पहुँचे। वहाँ एक नाला लबालब भरा हुआ था। पानी की गति तेज थी। चहेडू के रेल पुल का खम्बा तेज पानी ने बहा दिया था। पुल का ऊपरी भाग खड़ा था, किन्तु रेल पटरी के नीचे की जमीन बह जानेसे झूलते पुल की तरह लटक रही थी। ट्रॉलीवाले आगे जाने को तैयार नहीं थे। कर्इ यात्री इस पुल पर रुके हुए थे।\nअब क्या किया जाय यह हम सोचते ही रहे इतने में हमारे देखते ही श्रीगुरुजी उस झूलते पुल की पटरियों पर तेज गति से आगे बढ़े। साहस करके हम भी उनके पीछे चलते रहे। झूलते पुल और पटरी के दो-तीन फुट नीचे से पानी तेज गति से बह रहा था। वह दृश्य बड़ा ही भयावह था, पर श्रीगुरुजी ने पुल पार कर लिया था। हम भी उनके पीछे पार हो गये। चहेडू स्टेशन पर एक रेलइंजन खड़ा था। उसमें बैठकर हम गुराया पहुँचे। गुराया स्टेशन पर एक मालगाड़ी खड़ी थी, जो लुधियाना की ओर जा रही थी। गार्ड ने हम तीनों को उसके डिब्बे में एक स्थान दिया और तीन घंटे में हम लुधियाना पहुँचे। इसी प्रकार की घटना होशियारपुर से जालन्धर जाने की है। 1956 की बात है। पंजाब के प्रवास में होशियारपुर पहुँचे तो वहाँ वर्षा ने बड़ा भीषण रूप धारण किया हुआ था। शाम का कार्यक्रम वर्षा में ही सम्पन्न हुआ। गुरुजी को आगे जालन्धर और लुधियाना के कार्यक्रम हेतु जाना था। रास्ते पानी से भरे थे। रेल की पटरियाँ कुछ स्थानों पर बह गयी थीं। तीसरे दिन वर्षा का जोर कम हुआ तब गुरुजी बोले - अब कल हम पैदल ही यहाँ से जालंधर के लिये निकल पड़ेंगे। श्री कुठियाला जी ने, जिनके घर गुरुजी ठहरे थे, स्टेशन बैगन तैयार की। उस पर दो साइकिलें रखी गयीं। साथ में भोजन भी दिया। इस प्रकार गुरुजी के साथ हम पाँच-छ: कार्यकर्ता आगे बढ़े। रास्ते में वृक्ष टूटे हुए पड़े थे। उनको हटाकर आगे बढ़ते गये। होशियारपुर से जालन्धर की दूरी 27 मील है, लेकिन हम एक घंटे में केवल सात मील ही आगे पहुँचे। अब बीच में नसराला नदी आ गयी। रास्ते के पुल पर से नदी की बाढ़ का पानी तेज गति से बह रहा था। परन्तु रेल पुल पर पानी नहीं था। श्रीगुरुजी ने कहा -स्टेशन वैगन यहीं छोड़ दो, सामान उठालो, और अब पैदल ही आगे बढ़ेंगे। - ऐसा कहकर, उन्होंने चट स्वयं एक बोझा उठा लिया। हम लोगों ने भी सामान उठा लिया। साइकिलें ले ली और रेल पुल पैदल पार कर गये।\nवर्षा थमी हुर्इ थी। हम लोग पैदल ही आगे चल पड़े। तीन मील जाने पर एक गाँव में पहुँचे। यहाँ एक ताँगा मिला। श्रीगुरुजी, मैं, और एक कार्यकर्ता ताँगे में सवार हुए। शेष कार्यकर्ता साइकिलों पर सामान लटकाये साथ हो लिये। परन्तु छ: मील चलने पर ताँगे के घोड़े के बन्द टूट गये। ताँगा छोड़ देना पड़ा। श्रीगुरुजी फिर पैदल ही आगे चल पड़े। पाँच मील चलने के बाद जालन्धर के बैद्य श्री अमरनाथजी डोगरा और अन्य तीन कार्यकर्ता जीप के सहित हमें मिले। वे लोग श्रीगुरुजी के जालन्धर ठीक समय पर न पहुँचने के कारण चिन्तित थे, इसलिये जीप लेकर होशियारपुर जाने निकले थे। इस प्रकार प्रात:काल को निकले हम दोपहर दो बजे जालन्धर पहुँचे पाये।\nराष्ट्रव्यापी संघ कार्य के इन छोटे-बड़े कार्यक्रमो को इतनी तत्परता से सम्पन्न करने का श्रीगुरुजी का आग्रह रहा करता था। मार्ग में आनेवाली प्रत्येक बाधा को लाँघकर बढ़ने का उनका अपूर्व साहस था।- माधवराव मुले"}, {"person": "", "title": "सहज कर्तव्य", "text": "समाज के प्रति श्रीगुरुजी की भक्ति इतनी निश्चरल थी कि किसी प्रकार का द्वैत उन्हें कभी स्वीकार्य ही नहीं हो सकता था। समाज सेवा को वे सहज कर्तव्य मानते थे। इसका प्रत्यक्ष अनुभव मुझे तब हुआ जब वे वाराणसी में इलाज के लिये आये थे।\nबिहार उस समय जबर्दस्त बाढ़ की चपेट में था। वहाँ के कुछ प्रमुख कार्यकर्ता देशभर से सहायता जुटाने का प्रस्ताव लेकर श्रीगुरुजी से मिलने आये थे। उन कार्यकर्ताओं से उन्होंने विस्तृत जानकारी प्राप्त की और फिर उनसे पूछा- सभी स्वयंसेवक सेवा और सहायता के कार्य में जुट गये हैं या नहीं? एक प्रमुख कार्यकर्ता ने कहा - स्वयंसेवक तो पूरी तरह जुटे हैं, पर साधनों का अभाव सेवा-कार्य में बाधक बन रहा है। अकेले बिहार में इतने बड़े प्रमाण पर तत्काल साधन जुटा पाना कठिन लगता है। श्रीगुरुजी ने कहा - अकेले बिहार से ही क्यों साधनों को जुटाया जाये और फिर डॉ. आबाजी थत्ते से कहा। इसके लिये पत्रक भेजकर सभी प्रदेशों में सहयोग जुटाने को कहो।\nएक अति उत्साही कार्यकता बीच में ही बोल पड़ा - पर गुरुजी इसमें तो बहुत देर हो जायेगी। अनेक दलों ने बड़े प्रमाण पर सहायता कार्य प्रारंभ कर दिया है। यदि हमारी सहायता में विलम्ब हुआ तो हम लोग उनसे पिछड़ जायेंगे। उस कार्यकर्ता ने यह बात बहुत सहज ढंग से की पर श्रीगुरुजी उसे सुनकर कुछ व्यथित से हो गये। फिर श्रीगुरुजी ने कहा - तो क्या तुम उन दु:खी बन्धुओं को सहायता इसलिये देना चाहते हो कि तुम लोग अन्य पार्टियों से पिछड़ न जाओ। यदि तुम्हारी भावना इसी संकुचित दलीय प्रेरणा पर आधारित है तो संघ का ऐसे काम से कोर्इ वास्ता नहीं हो सकता। एकाएक वातावरण गम्भीर हो गया। अनजाने में ही क्यों न हो, पर वह कार्यकर्ता ऐसी बात कह गया था, जो संघ की विशुद्ध और सहज देशप्रेम की कल्पना से मेल नहीं खाती थी। उस कार्यकर्ता ने प्रायश्चियत भरे स्वर में कहा - मुझसे गलती हो गयी। मेरा आशय यह नहीं था।\nफिर श्री गुरुजी ने स्नेहपूर्ण शब्दों में कहा - देखो भार्इ। हम लोगों को सहज भाव से अपने पीड़ित बन्धुओं की सेवा करनी है। यह अपना कर्तव्य है हमें इसके एवज में न वाहवाही लूटनी है, न वोट माँगने हैं। अत: इस प्रकार के सेवा-धर्म में कर्तव्य भावना ही प्रमुख होनी चाहिये।- आलोक अवस्थी"}, {"person": "", "title": "परिवार में निवास", "text": "संघ पर से प्रतिबंध हटने के बाद एक बार श्री गुरुजी मैनपुरी आये थे। सभी स्वयंसेवकों में बड़ा उत्साह था। इस छोटे से नगर में हम किस प्रकार उनका योग्य स्वागत कर सकें, यह हमारी प्रबल इच्छा थी। एक सुन्दर कोठी माँगकर हमने उनके ठहरने की व्यवस्था की थी। जिसकी कोठी में श्री गुरुजी के ठहरने की व्यवस्था की थी, वह व्यक्ति स्वयंसेवक नहीं था।\nनगर के बाहर ही हमने श्री गुरुजी का स्वागत किया। बातचीत में ही यह जानकर कि आवास की व्यवस्था किसी स्वयंसेवक के परिवार में नहीं है, तो उन्होंने कहा - क्या तुम्हारे पास मकान नहीं है ? मैं वहीं ठहरुँगा। मेरा मकान पुराना तथा जैसा तैसा ही था। मैं बड़े संकोच में पड़ गया। उन्होंने फिर कहा - क्या अपने परिवार में ठहराना नहीं चाहते? विनयपूर्वक मैंने कहा - वह स्थान आपके लिये उपयुक्त नहीं है। इसलिये हमने आपकी आवास व्यवस्था अलग की है।\nश्री गुरुजी मुक्त कंठ से हँसे और कहने लगे-चलो, अब तो वहीं रुकुँगा। घर में प्रवेश करते ही उन्होंने कहा - कितना साफ सुथरा है। अरे, मैं धर्मशाला में नहीं परिवार में ही रुकने का अभ्यासी हूँ। हम सभी गद्गद् हो गये।- डा. रामेश्वररदयाल पुरंग"}, {"person": "", "title": "ध्येय के साथ एकरूपता", "text": "हम लोग समाचार पत्र पढ़ रहे थे। आदि से अंत तक पूरा अखबार पढ़ डाला। इतने में श्री गुरुजी आये और समाचार पत्र उठाकर इधर-उधर निगाह डाली। बातचीत के दौरान संघ संबंधी समाचार का जिक्र आ गया, जो इसी समाचार पत्र में छपा था। मैंने पूछा - समाचार है कहाँ ? उन्होंने कहा - इसी अखबार में तो है। मैंने पूरा अखबार पढ़ा, पन्ने उलटे पर वह समाचार नहीं दिखा। मेरी हैरानी देखकर श्री गुरुजी ने वह समाचार दिखाया, जो बाजारभाव के पन्ने पर छपा था। मैं मन ही मन सोचने लगा, कहाँ छाप दिया है। हम लोग क्या व्यापारी हैं, जो इस पन्ने पर निगाह जाती? फिर दूसरे ही क्षण विचार आया- श्री गुरुजी भी तो व्यापारी नहीं है। फिर उनकी निगाह कैसे गयी? मैंने अपनी शंका रखी भी नहीं, पर शायद वे समझ गये।\nश्री गुरुजी ने इस पर इतना ही कहा- भीड़ में भी माँ को अपना बच्चा दिख जाता है। और कोलाहल में भी अपने आत्मीय जनों के शब्द साफ समझ में आते हैं। मेरी समझ में आ गया। ध्येय के साथ उनका यह तादात्म्य है जिसके कारण वे उस समाचार को देख सके। ...... श्री गुरुजी अक्सर कहा करते थे कि मैं तो समाचार पत्र नहीं पढ़ता, परन्तु मैं कहूँगा कि श्री गुरुजी ही समाचार पत्र पढ़ते हैं, और हम लोग तो उन्हें मात्र देखते हैं और बहुत देर तक देखते रहते हैं।- पं. दीनदयालजी उपाध्याय"}, {"person": "", "title": "जेल में भी संघकार्य", "text": "संघ पर प्रतिबंध लगने पर श्री गुरुजी को जेल में बंद कर दिया गया। वे काफी समय तक जेल में रहे, किन्तु जेल जीवन उनको संघकार्य से वंचित नहीं कर पाया। जेल से छूटने के बाद कुछ लोगों ने उनसे पूछा – जेल में आपका समय कैसे कटता था? बड़ा कष्ट होता रहा होगा? श्री गुरुजी मुस्करा कर बोले - कोर्इ कष्ट नहीं । मैंने अपना काम बंद नहीं किया। मेरे प्रवास का कार्य और शाखाओं की देखरेख का काम बराबर चलता रहा। एक एक प्रान्त, उसके एक एक जिले, वहाँ की एक एक शाखा का स्मरण करता था। फिर शाखाओं के एक एक स्वयंसेवक का विचार करता और उनके चेहरे अपनी मानसिक आँखों के सामने लाता। इस प्रकार पूरे भारत वर्ष का प्रवास और शाखाओं की देखरेख मैंने कर डाली।- सुन्दर सिंह"}, {"person": "", "title": "पूर्ण स्वयंसेवक", "text": "सन 1938 की घटना है। नागपुर के संघ शिक्षा वर्ग में आद्य सरसंघचालक पू.डाक्टर हेडगेवारजी के श्रद्धानिधि समर्पित करने का कार्यक्रम था। प्रत्येक स्वयंसेवक ने उस श्रद्धानिधि में अपनी अपनी राशि समर्पित की। किसने कितनी राशि समर्पित की यह अन्य दूसरे को जानने का कोर्इ कारण नहीं था। एक स्वयंसेवक ने अपने हाथ की घड़ी की सोने की चेन निकालकर अपनी श्रद्धा का प्रतीक इस नाते उसे श्रद्धानिधि में समर्पित किया। स्वाभाविक ही सभी स्वयंसेवकों ने उसकी प्रशंसा की।\nउस संघ शिक्षा वर्ग के सर्वाधिकारी के नाते जब श्री गुरुजी का भाषण हुआ तब उन्होंने उस स्वयंसेवक द्वारा श्रद्धानिधि में जो सोने की चेन समर्पित की उसका उल्लेख करते हुए कहा - ‘सोने की चेन श्रद्धानिधि में समर्पित करनेवाले स्वयंसेवक के मन में डाक्टर साहब के प्रति प्रेम, श्रद्धा और आदर है, यह तो मानना ही पड़ेगा। किन्तु उसका स्वयंसेवकत्व अभी अपूर्ण है। श्रद्धानिधि में अन्य सारे स्वयंसेवकों ने अपनी अपनी राशि समर्पित की, उसमें किसी का पृथक समर्पण दिखार्इ नहीं देता। किन्तु इस स्वयंसेवक ने अन्य सारे स्वयंसेवकों के अनुसार अपना समर्पण न करते हुए, विशेष रूप से, सबको दिखार्इ पड़े इस प्रकार का समर्पण किया। इसके पीछे उसकी पृथक अस्मिता तथा अहंकार की भावना सुप्तावस्था में विद्यमान है।’ श्री गुरुजी के इन शब्दों को सुनकर हम सभी स्वयंसेवकों को धक्का लगा। परन्तु दूसरे ही क्षण, स्वयंसेवक बनने के लिये स्वयं की पृथक अस्मिता और अहंकार सम्पूर्णतया विलीन करना कितना आवश्यक है, इसका अविस्मरणीय पाठ हम सबको मिल गया।- दीनदयाल उपाध्याय"}, {"person": "", "title": "परिचय-एक सरस कार्यक्रम", "text": "प्राय: सभी कार्यकर्ता - बैठकों में आरम्भ में परिचय का कार्यक्रम रहता ही है। सन 1944-45 में उत्तर प्रदेश के बरेली शहर के एक कार्यक्रम में श्री गुरुजी को मैने सबसे पहले बहुत पास से देखा। बैठक थी बरेली जिले के पीताम्बरपुर स्थान की। मैं था शाखा का बस एक बाल-स्वयंसेवक, साथ ही सहशिक्षक। मैं उस समय कक्षा 9 का विद्यार्थी था। मुझसे भी उनका वही प्रश्न था। - क्या नाम है?\nमैंने उत्तर दिया - श्याम बहादुर वर्मा।\nश्री गुरुजी ने प्रश्नी किया - ‘बहादुर’ नाम क्यों रखा है?’\nमैंने उत्तर दिया - हमारे घर में सभी बहादुर हैं।\nयह ठीक बात सहज ढंग से कही गयी थी।\nश्री गुरुजी ने विनोदपूर्वक कहा - घरपर सभी बहादुर होते हैं। प्रश्नन तो बाहर का है। सब हँस पड़े। मैं जैसे तैसे अपना परिचय पूरा करके अपने स्थान पर बैठ गया। अगले वर्ष कार्यकर्ता बैठक में श्री गुरुजी ने फिर वही प्रश्नथ किया- नाम में ‘बहादुर’ क्यों रखा? इस बार मैं सावधान था। मैंनें बदलकर उत्तर दिया- बड़े होने पर बहादुरी के काम करने हैं, इसलिये।\nश्री गुरुजी ने फिर विनोद भरे स्वर में पूछा - अच्छा, बड़े होने पर। और अभी? फिर उनके उन्मुक्त हास्य से वातावरण गूँज उठा। अपने कार्यकर्ता को उत्तर देने में कुशल होना चाहिये, उनकी यही दृष्टि सदा रहा करती थी।\nएक बार लखनऊ के एक कार्यकर्ता ने अपना नाम बतलाया - ‘माताबदल’।\nश्री गुरुजी ने प्रश्न् किया - माताबदल का क्या अर्थ है?\nअपना बचाव करने के लिये उस स्वयंसेवक ने कहा - मेरे मातापिता अशिक्षित हैं, अत: यह दकियानूसी नाम रख दिया है। यह नाम अर्थहीन और हास्यास्पद है।\nयह सुनते ही श्री गुरुजी ने कुछ कड़ेपन से कहा - वे मातापिता अशिक्षित भले ही हों, पर उन्होंने तो नाम ठीक ही रखा था। हाँ तुम अवश्य शिक्षित होकर भी नासमझ हो, जो ऐसा बोलते हो। अपने अज्ञान को ढकने के लिये अपने बड़ों में - अपने पूर्वजों में दोष देखना, दोष थोपना कहाँ तक उचित है? अरे भार्इ। माताबदल का अर्थ है श्री कृष्ण। माताबदल अर्थात् श्रीकृष्ण की माता दो बार बदली गयी थी। पहले देवकी से यशोदा और फिर यशोदा से देवकी।\nसम्पूर्ण वातावरण इस व्याख्यापर मुग्ध ही नहीं, विमुग्ध था। बात- ही-बात में कितनी बड़ी बात हो गयी। एक छोटी सी बात के सहारे से उन्होंने कितनी महान शिक्षा दे दी कि अपने पूर्वजों पर और अपनी पुरातन बातों पर टिप्पणी मत करो, उसकी गहरार्इ में उतरने की कोशिश करो।- डा. श्याम बहादुर वर्मा"}, {"person": "", "title": "ईश्वरीय वाणी", "text": "14 अगस्त 1972 को सौभाग्यवश श्री गुरुजी से एकान्त में वार्तालाप करने का सुअवसर मिला। मैंने उनसे कुछ जिज्ञासाएँ की थीं, जिनका स्पष्ट समाधान उन्होंने किया था। मैंने कहा - श्री लेलेजी ने श्री अरविन्द घोष को जब योग की दीक्षा दी थी, तब उन्हें बताया गया था कि वे जब भाषण देने के लिये खड़े हों, तब अपने मस्तिष्क को सब प्रकार के विचारो से मुक्त कर दें। उसके बाद अंत:करण में विचार उठें, उन्हें ही बोलना प्रारंभ कर दें। वही र्इश्वीरीय वाणी होगी। श्री गुरुजी - मस्तिष्क को विचारों से शून्य कर लेने के पश्चा त् जो कुछ शेष रहता है, वह परमात्मा ही है और इसीलिये उस अवस्था में जो विचार आयेंगे, वे उसकी ही प्रेरणा से होंगे।\nमैं - कभी कभी स्वयं मुझे ही ऐसा अनुभव में आया है कि जब बोलने के लिये खड़ा हुआ, तब मन में कुछ विषय ही नहीं सूझ रहा था। क्या बोला जाये यही समस्या थी। किन्तु अचानक तभी कोर्इ ऐसा विचार मन में कौंध गया, जिसके बारे में पहले कभी सोचा भी नहीं था और वह विचार अपने मस्तिष्क की उपज है, ऐसा बिल्कुल भी नहीं लगता था। जब उस विचार की भाषण में अभिव्यक्ति हुर्इ, तब सुनने वालों को भी बहुत अच्छा लगा, किन्तु स्वयं को यही लगता रहा कि यह विचार मेरा नहीं है। बाद में जब दूसरी बार उसी विचार को बोलने का प्रयत्न किया तो मामला जमा नहीं।\nश्री गुरुजी - इसीलिये कि दूसरी बार तुम सोचकर बोलने को खड़े हुए थे।\nमैं-क्या श्री माँ योगिराज अरविन्द के पाण्डिचेरी पहुँचने के पूर्व वहाँ थीं?\nश्री गुरुजी - नहीं, वे बाद में वहाँ गयी। जब प्रथम महायुद्ध प्रारंभ हुआ, तब वे कुछ समय के लिये वापस फ्रान्स चली गयीं थीं। फिर कुछ दिनों बाद वे भारत वापस आयीं। तबसे अबतक वे वहीं पर हैं।\nमैं - क्या श्री माँ को सिद्धि प्राप्त हो गयी है ?\nश्री गुरुजी - हाँ, यदि महर्षि अरविंद पर विश्वा स है तो उन्हें सिद्धि अवश्य प्राप्त है। महर्षि ने तो उनके बारे में बड़ी भावना प्रकट की है। अब श्री माँ की आयु 96 वर्ष की है। शरीर अत्यंत कृश हो गया है, किन्तु मुखमंडल पर अपूर्व तेज है। देख कर मन को बड़ी प्रसन्नता होती है। आश्रम की प्रत्येक गतिविधि पर उनका नियंत्रण है।\nमैं - आपकी तो उनसे भेंट हुर्इ थी?\nश्री गुरुजी - हाँ, मैं उनसे मिलने गया था।\nमैं - क्या बातचीत हुर्इ?\nश्री गुरुजी - प्रकट बातचीत कुछ नहीं हुर्इ। मुझे ऐसा लगा कि बातचीत न करना ही अधिक श्रेयस्कर होगा। हम दोनों एक दूसरे की ओर देखते रहे। काफी देर तक देखते रहे।\nमैं - आपको ऐसा क्यों लगा कि न बोलना ही कल्याणकारी है?\nश्री गुरुजी - अंदर से ऐसा विचार अपने आप आया कि न बोलना ही अधिक ठीक रहेगा।\nमैं - अधिक ठीक रहेगा इसका क्या अर्थ है?\nश्री गुरुजी - अरे भार्इ, जब प्रत्यक्ष बातचीत होती है, तब अनेक व्यावहारिक बातें बीच में आ जाती हैं और ज्यादा बात नहीं हो पाती। वैसे हम दोनों ने काफी बातचीत कर ली।\nमैं - ऐसा कहते हैं कि चलते समय उन्होंने आपको गुलाब का एक फूल दिया था?\nश्री गुरुजी - हाँ, दिया था। एक लाल गुलाब का फूल था। वहाँ रखे फूलों में वह अकेला ही वैसा फूल था।\nमैं - क्या इसमें भी कोर्इ संकेत है ?\nश्री गुरुजी - होता है, ऐसा कहते हैं, पर मुझे नहीं मालूम।- श्री सुदर्शनजी"}, {"person": "", "title": "दीपक भिन्न प्रकाश एक", "text": "नागपुर जेल से अन्य संघ अधिकारियों के छूट जाने के बाद हम दो रह गये। श्री गुरुजी और मैं। अब संध्यावंदन में श्री गुरुजी अधिक समय बिताया करते थे। वे श्री गीता का पाठ रोज करते थे। अधिकतर एकान्त में ही रहना चाहते थे। थोड़ी बहुत मेरी चिन्ता भी उनको रहती थी।\nकुछ ग्रन्थ बाहर से मँगवा लिये गये। एक दिन श्री गुरुजी बोले - ‘चलो, हम लोग ज्ञानेश्वथरी पढ़ें।’ वे पढ़ते थे और मैं सुनता था। श्री गीता जैसे गूढ़ ग्रन्थ की बातें मेरी समझ में भला क्या आ सकती थीं? परन्तु इतनी सावधानी से न कभी मैंने पढ़ा था और न कभी सुना ही था। मुझे याद नहीं बात कैसे चल पड़ी, परन्तु कुछ दिन के बाद ऐसा प्रसंग आया कि मुझे कहना पड़ा। मैंने श्री गुरुजी से कहा - मैंने ऐसा सुना है कि भगवान श्रीकृष्ण ने पार्थ अर्जुन को अपना आलिंगन प्रदान किया और अपने जैसे बना लिया, वह क्या बात है? श्री गुरुजी ने ज्ञानेश्वअरी का इस प्रसंग से सम्बद्ध पाठ, जो उन्हें कण्ठस्थ था, तुरन्त सुना दिया -\nहृदया हृदय एक झाले। ये हृद्यीचे ते हृदयी घातले॥\nद्वैत न मोड़ता केले। आपणा ऐसे पार्था ॥\n(द्वैत न समाप्त करते हुए भी पार्थ को अपने जैसा बना लिया। पार्थ को यह प्राप्त हुआ आलिंगन से)\nइस पाठ को अधिक स्पष्ट करते हुए श्री गुरुजी ने कहा - एक दीपक से दूसरा दीपक प्रज्वलित करने के बाद फिर दो दीपक जलते हैं। दोनों का अस्तित्त्व अलग अलग है, परन्तु उनके प्रकाश में भेद नहीं किया जा सकता। कार्य वही होता है, भले ही व्यक्तित्व भिन्न भिन्न हो। श्री गुरुजी के मुख से इस पाठ की व्याख्या मैं सुन रहा था और मन-ही-मन सोच रहा था, पूज्य श्री डॉक्टर साहब और पूज्य श्री गुरुजी के आपसी संबंध के बारे में आज भी सोचता हूँ कि ऐसा ही बड़ों के बारे में होता होगा।- राजाभाऊ पातुरकर"}, {"person": "", "title": "आत्मीय का अन्न", "text": "श्री गुरुजी एक स्थान पर किसी प्रतिष्ठित सज्जन से मिलने गये। उनके साथ स्थानीय कार्यकर्ता भी थे। बातचीत जब समाप्त होनवाली थी, तब प्रमुख कार्यकर्ता ने उन सज्जन से कहा - कल श्री गुरुजी मेरे यहाँ भोजन करने के लिये पधारेंगे, आप भी मेरे यहाँ आवें और उनके साथ भोजन ग्रहण करें, यह आपसे मेरी प्रार्थना है।\nतब वे सज्जन बोले - आपके इस निमंत्रण को मैं एक शुभ अवसर मानता हूँ, परन्तु यह मेरे भाग्य में नहीं है। मैं भोजन नहीं कर पाऊँगा। परान्न ग्रहण न करने का मेरा नियम है। तब श्री गुरुजी ने तत्काल कहा - परान्न ग्रहण न करने का मेरा भी नियम है। मैं इस नियम का तत्परता से पालन करता हूँ।\nसब लोग अचम्भित होकर देखने लगे। उस सज्जन ने भी आश्चूर्य स्वर में पूछा - यह कैसे हो सकता है? आप तो कल इनके यहाँ भोजन करने जा रहे हैं। श्री गुरुजीने कहा - उनके यहाँ का अन्न परान्न कैसे हो सकता है। क्या ये पराये हैं ? नहीं, ये अपने हैं। स्वकीय हैं। ये पूर्णतया आत्मीय हैं।- प्र. ग. सहस्त्रबुद्धे"}, {"person": "", "title": "मन्दिर प्रवेश के अधिकारी", "text": "जनवरी 1964 में श्री गुरुजी कालिकट आए थे। वहाँ स्वामी श्री कृष्णानंदजी से उनकी भेंट हुर्इ और अनेक विषयों पर बातचीत होती रही। उसी में मन्दिरों में अहिन्दुओं के प्रवेश का भी प्रश्नग आया। श्री स्वामीजी सोच रहे थे कि र्इसार्इ और मुसलमानों को भी मन्दिर में प्रवेश क्यों न करने दिया जाये, जब कि मस्जिदों और गिरिजाघरों मे हिन्दुओं को खुला प्रवेश है। स्वामी जी का मत यह था कि मन्दिर प्रवेश के संदर्भ में मन्दिरों की शुचिता और स्वच्छता बनाये रखने की दृष्टि से प्रवेशार्थियों के लिये स्वच्छता, शुद्धता, धुले-कपड़े आदि कुछ नियम लागू किये जा सकते हैं। उन्होंने इस विषय में श्री गुरुजी की राय जाननी चाही।\nश्री गुरुजी ने कहा - सभी लोगों को मन्दिर में प्रवेश की अनुमति देना कोर्इ कठिन बात नहीं है। परन्तु यह बात ध्यान में रखना चाहिये कि मन्दिर भगवान का स्थान है और प्रवेशार्थियों की भी यह मान्यता होनी चाहिये। जहाँ तक हिन्दू का प्रश्नस है, वह मस्जिदों और गिरिजाघरों के प्रति भी आदरभाव रखता है। वह यह मानता है कि ये स्थान भी र्इश्व र के स्थान हैं। जब वह मस्जिद या गिरिजाघर में जाता है, तो वह अपनी आँखे बन्द करके अपने इष्टदेवता की प्रार्थना यथोचित श्रद्धा के साथ कर सकता है और सम्भवत: इसीलिये मुसलमानों और र्इसाइयों के मस्जिदों और गिरिजाघरों मे हिन्दुओं के प्रवेश पर कोर्इ आपत्ति नहीं हैं। किन्तु हम दूसरी प्रकार से इसका विचार करें। क्या मुसलमान और र्इसार्इ यह भावना रखते हैं कि मन्दिर भी भगवान का स्थान है और वहाँ श्रद्धा के साथ जाना चाहिये? मन्दिरों के प्रति उनका यह दृष्टिकोण नहीं है। सम्पूर्ण देश में जो मन्दिर गिराये गये और मूर्तियाँ अपवित्र की गर्इं, वे मुसलमानो और र्इसाइयों के दृष्टिकोण के पर्याप्त प्रमाण हैं । उनकी यह भावना है कि मन्दिर ऐसे स्थान हैं जो भ्रष्ट करने योग्य ही हैं। अत: क्या हमें इस बात का विचार नहीं करना चाहिये कि बिघ्वंसकारियों को भगवान के मन्दिर में मुक्त प्रवेश दिया जाये अथवा नही? - डा. काकासाहेब कुलकर्णीं"}, {"person": "", "title": "दो विभिन्न अभिव्यक्तियाँ", "text": "संघ पर से प्रतिबंध हटने के बाद श्री गुरुजी का प्रवास पूर्ववत शुरू हुआ। जिस शहर में वे जाते और सभाओं में भाषण करते तो लोगों की स्वाभाविक अपेक्षा रहती थी कि वे सरकार द्वारा उन पर और संघ पर जो अन्याय हुआ उस संबंध में सरकार की तीव्र आलोचना करेंगे। किन्तु ऐसा कुछ सुनने को नहीं मिलता था। अन्य दल का कोर्इ नेता होता तो इतनी बड़ी संख्या में उपस्थित लोगों का समुदाय देखकर वह फूला नहीं समाता और अपने अन्दर दबायी हुर्इ बदले की आग उगलने का ऐसा सुनहरा अवसर हाथ से गवाँना कभी भी पसंद नहीं करता। परन्तु श्री गुरुजी की बात ही कुछ अलग थी। वे शान्त, प्रसन्न और गंभीर थे। रा.स्व.संघ का ध्येय, उसका कार्य तथा उसका लक्ष्य इन्हीं विषयों पर नित्य के अनुसार वे बोलते थे। प्रतिबंध काल में सरकार द्वारा किये गये अन्यायों के विषय में वे इतना ही बोले - जब अपने ही दाँतों तले अपनी जीभ आ जाती है और वेदना होती है तो हम मुक्का मारके अपने दाँत तो गिराते नहीं। बस, अन्याय करनेवाली अपनी सरकार के विषय में हम ऐसा ही सोचें।\nयह वाक्य सुनते ही लोग अचंभित हो जाते थे। कैसे महापुरुष हैं? कैसी दृष्टि है, लोगों के हृदय रोमांचित हो उठते । राष्ट्रीय दृष्टि का एक आदर्श वस्तुपाठ लोगों को मिल जाता था। एक अलग प्रसंग। उपरिनिर्दिष्ट प्रसंग से सर्वथा भिन्न। 1 फरवरी 1948 की रात्रि में श्री गुरुजी को बंदी बनाकर कारागार ले जाया गया। कारागार अधिकारी इस बंदी की राह देखते हुये कारागार के अपने कक्ष में टेबल पर पाँव पसारकर बैठा था। श्री गुरुजी को उसके सामने लाकर जब खड़ा किया गया तब वह उन्मत्त अधिकारी बोला - ‘ओ हो, तो आप हैं गोलवलकर ? मुझे तो लगा कि संघ जैसा फासिस्ट संगठन का नेता कोर्इ तगड़ा, अंडसंड, विकराल चेहरेवाला आदमी होगा?’\nश्री गुरुजी तपाक से बोले - जिन्होने संघ का दायित्व मुझ पर सौंपा उनकी यदि वैसी कल्पना होती तो उन्होंने एकाध भैंसा पर या आप जैसों पर भी संघ का काम सौंप दिया होता।\nउत्तर सुनते ही अधिकारी महाशय हड़बड़ाकर कुर्सीपर ठीक ढंग से बैठे और उन्होंने श्री गुरुजी को बैठने के लिये कुर्सी दी।\nपहला प्रसंग उनके राष्ट्र-दृष्टि का परिचायक है तो दूसरा प्रसंग उन्मत्त अधिकारी को सबक सिखाने वाला है।- एक स्वयंसेवक(श्री गुरुजी समग्रदर्शन खंड 2 : प्रतिबंध पर्व)"}, {"person": "", "title": "राष्ट्रीय दृष्टी", "text": "सन 1953 में मैं विजयवाड़ा के संघ शिक्षा शिविर का सर्वाधिकारी था। उस समय मुझे संघ का परिचय सामान्य ही था। श्री गुरुजी के व्यक्तित्व की महानता का तो मुझे थोड़ा भी परिचय नहीं था। संघ शिक्षा शिविर में श्री गुरुजी आये उसी समय का यह प्रसंग है। स्वतंत्र नागालैंड की माँग करनेवाले फिजो समर्थक नागाओं को एक सभा में पं. नेहरू जी ने फटकारा। परिणाम यह हुआ कि सारे श्रोता सभा छोड़कर चले गये। इस घटना पर न समाचार पत्रों ने कोर्इ प्रतिक्रिया व्यक्त की और न जनसाधारण की विचारधारा में कोर्इ बेचैनी दिखलायी दी। परन्तु श्री गुरुजी बरामदे में इस छोर से उस छोर तक चक्कर लगा रहे थे।\nमैं उनके पास
