रित्र के रहते हुए भी चतुराई के अभाव में संघकार्य हो नहीं सकता। संघकार्य सुचारु रुपसे चलाने के लिये हमें लोकसंग्रह के तत्वों को भलीभाँति समझ लेना होगा।"}, {"person": "", "title": "", "text": "बोलते-चलते, आचार-व्यवहार करते, तथा प्रत्येक कार्य करते समय हम सावधान रहें कि, हमारी किसी भी कृति के कारण संघ के ध्येय तथा कार्य को, कोई क्षति न पहुंचे।"}, {"person": "", "title": "", "text": "हम आत्मनिरिक्षण करते हुए अपने सभी दुर्गुणों का समूल उच्चाटन कर दें। हम ऐसे सद्गुणों को अपनायें, जो हमारी कार्यवृद्धि का पोषक हों, और जिनके कारण लोगों को हम अपनी ओर आकर्षित कर सकें।"}, {"person": "", "title": "", "text": "यदि आप अपने अतीत जीवन तथा गत घटनाओं का पुनः पुनः एकान्त में अवलोकन करते रहें। तो आपको अपने दोष दिखाई देंगे। जिन्हें अपने दोष न दिखाई पडे और जो अपने आप को सर्वथा दोषरहित समझें, उनका सुधार होना कदापि संभव नहीं। जो अपने चरित्र की त्रुटियों को देख सकते हैं, वही अपने चरित्र को सुधार भी सकते है।"}, {"person": "", "title": "", "text": "चरित्र निष्कलंक होने के कारण, अनजाने में भी, हम में यह दुर्भावना छू तक न आनी चाहिये कि हम कुछ विशेष हैं, तथा औरों से श्रेष्ठ हैं। किसी भी दशा में, स्वप्न में भी ऐसा न मालूम पडे, कि हम अन्य लोगों से कहीं अच्छे है। मुझे विश्वास है कि हम में ऐसा अहंभाव रचनेवाला कोई नहीं है। किन्तु यदि कोई ऐसा हो, जो सोचता हो कि मैं बहूत कार्य कर रहा हूं, इसलिये औरों से कुछ श्रेष्ठ हूं और इसी नाते दूसरों को नीची तथा तुच्छ दृष्टि से देखने का अधिकारी हूं, तो मैं उसे यह परामर्श दूंगा कि वह ऐसे वृथाभिमान को सत्वर निकाल बाहर फेकें।"}, {"person": "", "title": "", "text": "आप इस भ्रम में न रहे कि लोग हमारी ओर नहीं देखते। वे हमारे कार्य तथा हमारी व्यक्तिगत आचरणों की ओर आलोचनात्मक दृष्टि से देखा करते हैं। इसी लिये केवल व्यक्तिगत चालचलन की दृष्टि से सावधानी बरतने से काम नहीं चलेगा, अपितु सामूहिक एवम् सार्वजनिक जीवन में भी हमारा व्यवहार हमें उदात्त रखना होगा।"}, {"person": "", "title": "", "text": "हमारा चरित्र इस सीमा तक उज्वल हो कि, उससे अन्य लोग प्रभावित होकर हमारे निष्कलंक चरित्र पर मुग्ध हो जांय। वे हमसे मित्रता करने तथा सभी दृष्टि से  हमारी हितरक्षा करने के लिये उत्सुक हो जांय।"}, {"person": "", "title": "", "text": "किसी भी आन्दोलन में साधारण जनता कार्यकर्ता के कार्य का उतना ख्याल नहीं करती जितना कि उसके व्यक्तिगत चरित्र में ढूंढने से भी दोष या कलंक छींट तक न मिले।"}, {"person": "", "title": "", "text": "हमें अपने नित्य के व्यवहार भी ध्येय पर दृष्टि रखकर ही करने चाहीये। प्रत्येक को अपना चरित्र कैसा रहे, इसका विचार करना चाहिये। अपने चरित्र में किसी भी प्रकार की त्रुटि न रहे।"}, {"person": "", "title": "", "text": "प्रत्येक अधिकारी तथा शिक्षक को सोचना चाहिये कि उसका बर्ताव कैसा रहे और स्वयंसेवकों को कैसे तैयार किया जाय। स्वयंसेवकों को पूर्णतः संगठन के साथ एकरुप बनाकर उनमें से प्रत्येक के मन में यह विचार भर देना चाहिये कि मैं स्वयंही संघ हूं। प्रत्येक व्यक्ति की आखों के सामने ध्येय का एक ही तारा सदा जगमगाता रहे। उस पर उसकी दृष्टि तथा मन पूर्णतः केन्द्रित हो जांय।"}, {"person": "", "title": "", "text": "हम लोगों को हमेशा सोचना चाहिये कि जिस कार्य को करने का हमने प्रण किया है, और जो उद्देश्य हमारे सामने है, उसे प्राप्त करने के लिये, हम कितना काम कर रहे हैं। जिस गति से, तथा जिस प्रमाण में, हम अपने कार्य को आगे बढा रहे हैं, क्या वह गति या प्रमाण, हमारी कार्यसिद्धि के लिये पर्याप्त है?"}, {"person": "", "title": "", "text": "हम में इतना आत्मविश्वास और इतनी आकर्षण शक्ति होनी चाहिये कि जहां। कोई एक बार हमारे बीच आया कि बस वह हमारा ही हो गया। हम से दूर होने का फिर वह कभी नाम भी न ले।"}, {"person": "", "title": "", "text": "आप यह अच्छी तरह याद रखें कि हमारा निश्चय और स्पष्ट ध्येय ही हमारी प्रगति का मूल कारण है। संघ के आरम्भ से हम हमारी भावनाएँ ध्येय से समरस हो गई हैं। हम कार्य से एकरुप हो गये है।"}, {"person": "", "title": "", "text": "यदि आप स्वयम् को संघ का कार्यकर्ता समझते हैं, तो पहले आप को सोचना होगा कि आप हर दिन और हर माह कौनसे कार्य कर रहे है? अपने किये हुए कार्य की, आप को सदैव जांच पडताल करते रहना चाहिये।  केवल हम संघ के स्वयंसेवक है, और  इतने वर्षों में संघ ने ऐसा कार्य किया है,  इसी बात में आनन्द तथा अभिमान मानते हुए आलस्य में दिन काटना, गिरा पागलपन ही नहीं अपितु कार्यनाशक भी है।"}, {"person": "", "title": "", "text": "यह खूब समझ लो कि बिना कष्ट उठाये और बिना स्वार्थत्याग किये, हमें कुछ भी फल मिलना असंभव है। मैने स्वार्थ-त्याग शब्द का उपयोग किया है। परन्तु हमें जो कार्य करना है वह हमारी हिन्दू जाति के स्वार्थ-पूर्ति के लिये है। अतःउसी में हमारा व्यक्तिगत स्वार्थ भी अनार्भुत है। फिर हमारे लिये भला दूसरा कौनसा स्वार्थ बचता है? यदि इस प्रकार यह कार्य हमारे स्वार्थ का ही है, तो फिर उसके लिये हमें जो भी कष्ट उठाने पडेंगे, उसे हम स्वार्थत्याग  कैसे कह सकेंगे? वास्तव में यह स्वार्थत्याग हो ही नहीं सकता। हमें केवल अपने स्व का अर्थ विशाल करना है। अपने स्वार्थ को हिन्दू राष्ट्र के स्वार्थ से हम एकरुप कर दें।"}, {"person": "", "title": "", "text": "अब मैं तो आपसे केवल यही कहना चाहता हूं कि - (1) भविष्य के विषय में किसी तरह का संदेह न रखते हुए आप नियमित रुप से शाखा में आया करें। (2) संघकार्य के प्रत्येक विभाग का पूर्ण ज्ञान प्राप्त कर उनमें निपुण बनने का प्रयास करें। (3) बिना किसी व्यक्तिओं की सहायता लिये, स्वतंत्र रीति से एक दो संघ शाखाँए चला सकने की क्षमता प्राप्त करें।"}, {"person": "", "title": "", "text": "कच्ची नींव पर खडी की गई इमारत प्रारंभ में भलेही सुंदर या सुघड प्रतीत होती होगी, परन्तु बवन्डर के पहले ही झोंके के साथ वह भूमिसात हूए बिना खडी करना हो, उतनी ही उसकी नींव विस्तृत और ठोस होनी चाहिये।"}, {"person": "", "title": "", "text": "आसेतु-हिमाचल, अखिल भारतवर्ष, हमारी कार्यभूमि है। हमारा दृष्टिकोण विशाल होना चाहिये। हमें ऐसा लगना चाहिये कि समूचा भारतवर्ष हमारा घर है। हम किस सीमातक और कौनसा कार्य कर सकते है, यह पहले निश्चित कर उसके अनुसार हम अपने जीवन का आयोजन करें, और प्रतिज्ञापूर्वक उस कार्य को पूरा करके ही रहें।"}, {"person": "", "title": "", "text": "यदि हम शक्तिशाली होते, तो क्या किसी की हिम्मत होती कि वे हम पर आक्रमण करने का दुःसाहस करते? या हमें अन्य किसी तरह से अपमानित करते? फिर हम क्यों दुसरों को दोष दें? यदि दोष हमारा ही है, तो हमें स्वीकारना चाहिये और अपनी कमजोरियों को तथा त्रुटियों को दुर कराने में जुट जाना चाहिये।"}, {"person": "", "title": "", "text": "जब तक हम दुर्बल रहेंगे तब तक हम पर आक्रमण करने के लिये बलवानों का मन अवश्य ही ललवाता रहेगा। यह तो निसर्गनियम ही है। केवल बलवानों को गालियाँ देने से अथवा उनकी निन्दा करने से क्या लाभ होगा? ऐसा करने मात्र से परिस्थिति बदल नहीं सकती।"}, {"person": "", "title": "", "text": "शतक बीत गये। हम पर विदेशी आक्रमणों का तांता लगातार क्यों लगा हुआ है? हम दीनदुर्बल तथा मृतप्राय हो गये हैं इसीलिये न? हमारी सब विपत्तियों की जड मे हमारी शक्तिहीनता ही है। उसे हमें सर्वप्रथम उखाड फेंकना होगा।"}, {"person": "", "title": "", "text": "जीवो जीवस्य जीवनम् यह प्रकृति का नियम है। अर्थात दुर्बल लोग सदैव बलवानों का भक्ष्य बनते हैं। संसार दुर्बलों के लिये गौरव से जीना असम्भव है। उन्हें तो बलवानों का दास बनकर ही रहना पडता है। सदैव अपमानित तथा असहनीय कष्टों से परिपूर्ण जीवन ही उनके भाग्य में लिखा रहता है।"}, {"person": "", "title": "", "text": "हमारी सारी अवनति की जड है, हमारी मानसिक दुर्बलता। इस दुर्बलता को हम सर्वप्रथम नष्ट कर दें।"}, {"person": "", "title": "", "text": "भारतवर्ष, भरतखण्ड, आर्यावर्त हिन्दुस्थान, आदि नामों के द्वारा एकही अर्थ प्रकट होता है। परंन्तु उस अर्थ की कल्पना मात्र से हम अकारण हडबड जाते है। बन्धन में जकडे हुए तोते जैसे हमारी अवस्था हो रही है। हम भ्रम के भंवर में फँस कर गोते खा रहे है। हमारी संस्कृति को नष्टभ्रष्ट करने पर जो लोग तुले हुए है उन्हे गले लगाने के लिए हम मरे जा रहे है। यह सारा हमारी मानसिक दुर्बलता का परिणाम है।"}, {"person": "", "title": "", "text": "जैसे हमारे विचार, वैसाही हमारा आचरण बनता है। अतीत काल में बहुत बलवान थे। परन्तु इस सत्य को आज हम भूल गये हैं। इसलिये आज के हमारे सारे आन्दोलन दुर्बलतापूर्ण दिखाई देते हैं। हमारे आज के आन्दोलनों में न चैतन्य है, और न पूरुषार्थ ही है।"}, {"person": "", "title": "", "text": "मन की दुर्बलता ही सबसे अधिक घातक दुर्बलता होती है और वही हमारा सब से बडा दोष है। यदि हम अपने आप को बलवान समझकर संगठन के कार्य में लगन के साथ जुट जांय, तो हमारी शक्ति विराट रुप धारण कर लेगी। फिर कोई भी कार्य हमें असम्भव नहीं प्रतीत होगा।असली बात तो यह है कि अपने भीतरी शक्ति को भुल रहे हैं।"}, {"person": "", "title": "", "text": "आप से मेरी यह प्रार्थना है कि आप अपनी स्वार्थी भावना तथा अकर्मण्यता की वृत्ति को समूलन त्याग दें। समाज सेवा कार्य के प्रति अति उदासीन हो जाने के कारण हमारा मन बहुत दुर्बल हो गया है। समाज चूल्हे में क्यों न जाय, मुझे उससे कुछ भी वास्ता नहीं । बस, मेरा स्वार्थ बना रहे। इस प्रकार के समाजविषयक उदासीनता के भाव हम में कूट कूट कर भरे हैं। इसलिये हमारा समाज आज निर्बल हो गया है।"}, {"person": "", "title": "", "text": "आज की अवस्था में हम भगवान से सहायता की आशा नहीं कर सकते । उलटे, यह जान कर कि इस जाति में स्वार्थी एवम् दुर्लभ अर्थात पापीयों की ही भीड है, भगवान हम लोगों से अपना मुँह मोड लेंगे। यदि भगवान का यदाकदाचित अवतार हुआ भी तो हमारी रक्षा के लिए नहीं, बल्की हमें नष्ट करने के लिये ही होगा, क्योकि दुष्टों का विनाश करना ही उनका प्रण है।"}, {"person": "", "title": "", "text": "जब तक हम इसी प्रकार के अर्थात् व्यक्तिगत स्वार्थोमे लिप्त, दुर्बल एवम् समाज हितों के प्रति उदासीन रहेंगे, और जब तक हम सज्जन नहीं बनेंगे, तब तक हमें दुष्ट समझकर भगवान हमारे नाश के लिये ही सहायक होंगे। हां, जब हम वास्तव में साधु बनेंगे अर्थात, राष्ट्र, धर्म तथा समाज के कल्याण के लिये अपना सब कुछ होम देने पर उतारू होंगे, तभी संभवत: भगवान हमारी सहायता करेंगे।"}, {"person": "", "title": "", "text": "साधु तो वे है, जो धर्म, राष्ट्र, समाज तथा जनकल्याण का भाव मन में रखते हुए सदा अपना कर्तव्य करने के लिये उद्दत रहें। क्या इस प्रकार के त्यागी और कर्तव्यपरायण लोग हिन्दू समाज में पर्याप्त संख्या में है? यदि हिन्दुओं की कम से कम आधी जनसंख्या भी साधुता के उपर्युक्त भावों से भरी होती, ते इस महान जाति पर निष्ठुर आघात करने का दु:साहस कोई नही करता। फिर भगवान स्वयं धर्मसंरक्षण करने हेतु हमारे बीच उपस्थित हो जाते।"}, {"person": "", "title": "", "text": "गीता में भगवान कहते है परित्राणाय साधूनां अर्थात साधुओं के संरक्षण के लिये वे अवतार लेंगे। किन्तु साधु कौन है? साधु किसे कहा जा साकता है? जिन्हें न समाज  या राष्ट्र की चिंता है, और न धर्म या संस्कृति की फिकर है, क्या उन्हें हम साधु कहेंगे? जिन्हें अपने व्यक्ति गत स्वार्थ के अतिरीक्त अन्य कुछ भी सुझता नहीं है, एसे दुष्टों के संहार के लिये ही तो परमेश्वकर का अवतार हुआ करता है। हिन्दू समाज में ये सब दुर्गुण पराकाष्ठा तर पहुंच चुके हैं। क्या ऐसे लोगों को दुष्ट न कहा जाय?"}, {"person": "", "title": "", "text": "अन्य लोग इस कार्य को चाहे जितना कठिन बतलावें, परन्तु तुम स्वत: इन कठिनाइयों का रोना कभी न रोवो। हमें तो वह कार्य कर दिखाना है, जिसका परिणाम देखकर संसार को दाँतो तले उंगली दबाकर ही रहना पडेगा। क्या तुम्हें पता नहीं, कि संघ का प्रारंभ कितने थोडा लोगों से हुआ?"}, {"person": "", "title": "", "text": "व्यक्ति के जिवन में जिस प्रकार नानाविध बाधाएँ आती है, उसी प्रकार संघ के जीवन में भी बाधाओं की कमी नहीं। परन्तु बाधाएँ चाहे जितनी आवें, संघ का कदम तो आगे बढना ही चाहिये।"}, {"person": "", "title": "", "text": "यदि सब लोग काम करने में जुट जाएं, तो हमारा कार्य बडी शीघ्रतासे बढेगा। क्योकिं यह समय हमारे कार्य के लिए बडा अनुकूल है। आज जैसी अनुकूल परिस्थिती पहले कभी न थी। हमें इस सुअवसर का पूरा पूरा लाभ उठाना चाहिये।"}, {"person": "", "title": "", "text": "दुनिया का व्यवहार आप जानते ही हैं। कोई भी दुकानदार सौ रूपयों की चीज निन्यानबे रूपयों मे नही देगा। दुनिया में हरेक चीज की पूरी कीमंत चुकानी पडती है। अत: जब तक हम अपने समाज में, पर्याप्त शक्ति निर्माण नही करते तब तक हमें निरन्तर कार्य करते रहना होगा। केवल शरीरबल से काम नहीं चलेगा। साथ मे विचारशक्ति भी आवश्यक है। प्रथम तो विचारशक्ती ही उत्तम रहनी चाहीये अत: संघ के स्वयंसेवक प्रथम स्वयं की मानसिक दुर्बलता प्रयत्नपूर्वक हटा दे और बाद में अन्य साथियों में भी अपनें ही समान मानसिक सामर्थ्य उत्पन्न करे।"}, {"person": "", "title": "", "text": "यदि हमे संसार के सम्मुख यह सिद्ध कर दिखाना है कि हिन्दुस्थान हिन्दुओं का राष्ट्र है, तो हमारा कर्तव्य हो जाता है कि हम इस कार्य को अपना निजी कार्य समझकर, उसकी सफलता के लिये, आवश्यक आचार विचारों से अपना जीवन परिपुर्ण करें। फिर यही हमारा प्रमुख कर्तव्य हो जाता है।"}, {"person": "", "title": "", "text": "दुसरी भी एक श्रेणी के लोग होते है, जो कहा करते है कि राष्ट्र सेवा का समय आ जाने पर हमें पुकारो, जहां बी कहो, कूद पडने के लिये हम तैयार है। किन्तु उन्हें यहा पूछे बिना मुझसे नहीं रहा जाता कि, भाइयों, तुम्हे पुकारेगा कौन? पुकारने का वह अन्तिम क्षण लगातार कार्य करने से ही तो निकट आ सकता है। अपने अपने घर में उस समय की बाट जोहने से कहीं वह स्वयंम् चलकर किसी के पार आवेगा? आप निर्णायक क्षण की राह देखते हुए स्वयंम् तो अपने घर में बैठे रहेंगे, और आशा यह करेंगे कि दुसरे लोग अन्तिम समय नजदीक लाने के लिये कार्य करते रहें। क्या यह सारा व्यवहार सुसंगत है?"}, {"person": "", "title": "", "text": "कुछ महाशय कहते है, उस में क्या धरा है? समय आने दो, सब कुछ ठीक हो जायेगा। परंन्तु क्या अपने निजी मामलों में भी, ये सज्जन इसी प्रकार सोचते है? जब अपने आप पर बितती है, तब क्या ये भगवान का नाम लेते हुए चुपचाप बैठे रहते है? कभी नही। तब तो ये हर प्रकारकी उठापटक और दौडधूप करते दिखाई देते है। अपना काम पूरा करके ही वे दम लेते है। व्यक्तिगत स्वार्थ के अतिरिक्त जब देश धर्म या समाज का सवाल आता है, तभी उन्हे भगवद्शक्ति का बहाना सूझता है। तब हम यह क्यों न कहें, कि उपर्युक्त विचारों की जड में, सिवा स्वार्थ के कुछ नहीं है?"}, {"person": "", "title": "", "text": "कुछ सज्जन कहते हैं कि हम तो ईश्वकर का भजन पूजन करते है, वह हमें अवश्य सफलता देगा। उन सज्जनों को मै आवाहनपूर्वक कहना चाहता हूँ कि, वे मुझे एक भी उदाहरण बतावें, जहां किसी मनुष्य ने केवल पूजापाठ किया और सौ रूपये उसके चरणोंपर आ टपके। ऐसा तो कभी नहीं होता। बिना कष्ट उठाये कार्य होना एकदम असंभव है। हमें बहुत परिश्रम करना होगा। हां, कार्य करते समय हम भगवान का अवश्य स्मरण रखें और हम जो कुछ भी कार्य करते हैं उसे परमेश्वहर के चरणोंपर समर्पित करने की भावना रखें।"}, {"person": "", "title": "", "text": ". मनुष्य अपना छोटासा संसार भी बिना प्रयत्नों के संभाल नही सकता। फिर राष्ट्र का विशाल जीवनचक्र अपने प्रयत्नों के बिना आपही आप निरंतर चलता रहेगा, ऐसी अपेक्षा करने में कितनी बुद्धिमानी होगी? राष्ट्र का जीवनचक्र ठीक प्रकार से चलाने के लिये तो, असीम प्रयत्नो की आवश्यकता होती है। बिना प्रयत्नो के सिद्धी कहां?"}, {"person": "", "title": "", "text": "अंग्रेजी में एक कहावत है कि गाड हेल्पस् दोज हू हेल्प देमसेल्व्हज । उसका अर्थ है, जो स्वयम् अपनी सहायता करते है, उन की ही ईश्वंर साहायता करता है। मेरी समझ में नही आता कि भगवान हमारी सहायता क्यों करेंगे? उन्हें क्यों हमपर दया आवेगी? हम लोग स्वयम् अपनी कौनसी सहायता कर रहे है कि भगवान हमें बचाने हेतु दौड पडे?"}, {"person": "", "title": "", "text": "वास्तव मे प्रत्येक स्वयंसेवक सदैव यह सोचता रहे कि वह संघ का दैनिक कार्य कितना करता है और योग्य स्वयंसेवको की संख्या कितनी बढती है। सब लोगों के समान हम दैनंदिन नित्यकार्य में तो भाग लेते है परन्तु क्या हम संख्या बढाने की दृष्टिसे विशेष रूप से प्रयत्नशिल है?"}, {"person": "", "title": "", "text": "कैसी ग्लानि की बात है कि एक वर्ष के भीतर पांच मित्रों को संघ में लाना, तुम्हारे लिए कठिन सा मालुम होता है। क्या सही है तुम्हारी योग्यता? थोडी इमानदारी के साथ सोचो तो सही। स्वयम् अपनी आत्मा के साथ वंचना न करो।"}, {"person": "", "title": "", "text": "क्या हम अपनी प्रतिज्ञा का पालन निस्वार्थ बुद्धिसे तनमनधनपूर्वक और ईमानदारी के साथ कर रहे है? अपनी प्रियतम हिन्दू जाति को संसार में अजेय तथा गौरवशाली बनाने हेतू हम स्वयम् कितने कष्ट उठाते है? हम कौनसा कार्य करते है? थोडा अपना दिल टटोलकर देखो तो। क्या इस महान उद्दिष्ट की पूर्ति हेतु हम अपने मन में कुछ बेचैनी सी अनुभव करते है? क्या उस कारण हमारा जी तडपता रहता है?"}, {"person": "", "title": "", "text": "हम तो याची देही, याचि डोळां अर्थात इसी देह से और इन्हीं आखों से अपनी कार्यसिद्धी देखना चाहते है। विनापरिश्रम के यह कैसे संभव होगा? संघ यह नही चाहता की किसी क्लब या पाठशाला के समान वह सदियों तक जैसा तैसा चलता रहे। संघ की तो यह धधकती हुई आकांक्षा है कि हिन्दुत्व की सर्वग्रामी ज्वालाँए धू-धू करती हुई, शीघ्रातिशीघ्र देश के कोने मे फैल जांय।"}, {"person": "", "title": "", "text": "कई लोग कहते हैं कि कार्य बडा कठिण है। इस मार्ग में बिकट संकट है। में कहता हूं, कठिनाइयों क्यों न होगी? हमें तो पहलेसे ही यह पता होना चाहिये कि हमारा  मार्ग कण्टकाकीर्ण है। इस पथपर गुलाब की पंखुडियाँ बिछी होंगी, ऐसी भला किसने आशा की थी? राष्ट्र को अपना पूर्वगौरव प्राप्त करा देना, थोथी गप्पे नही है। न वह टकेसेर बिकनेवाली कोई सस्ती चीज है, नतो अत्यंत अनमोल रत्न है। उसे खरीदने हेतु उसकी पूरी कीमत चुकानी होगी। एक पाई भी कम देने से काम नहीं बनेगा।"}, {"person": "", "title": "", "text": "अपने देश के विगत वैभव को प्राप्त करने हेतु सर्वस्व त्याग कर अनवरत पुरूषार्थ दिखानेवाला, आपके सिवा और कौन हो सकता है? भारत की भाग्यलक्ष्मी को प्राप्त करने का कार्य तुम्हारे व्यतिरीक्त और कौन कर सकता है? यह तो तुम्हे और तुम्हे ही करना होगा। कुछ हजार स्वयंसेवक खडे हो गये, कुछ शाखाएँ जैसी तैसी चल गइ, बस इतने मात्रा से हमारा ध्येय हमें प्राप्त होगा, ऐसी तुम्हारी धारणा है? दूसरे लोग आवेंगे और वे आपके देश का गौरव बढाऐंगे ऐसी आप आशा रखते है? तो फिर हम आप किस लिये है।"}, {"person": "", "title": "", "text": "वास्तव में बात यह है कि हम सब कुछ कर सकते है। दस पांच स्वयंसेवक लाने की तो बात ही क्या, हम पहाड को भी चुर्ण कर सकते है। स्वयंसेवक भरती का काम बच्चा भी कर लेगा। प्रश्नक केवल एकही है। हमें आलस्य छोडना होगा। वही हमारा वास्तविक शत्रु है।"}, {"person": "", "title": "", "text": "केवल आलस्य के कारण, हम संघस्थानपर जाने के अतिरिक्त कोई भी विशेष कार्य नहीं कर पाते। यदि हम आलस्य में समय व्यर्थ गवाँना छोड दे, और अपनी सम्पूर्ण शक्तियाँ इस कार्य में लगा दें तो हम आश्चईर्यजनक प्रगति कर सकेंगे। आलस्य को त्याग देने के बाद ही सच्चा कार्य प्रारम्भ हो जाता है।"}, {"person": "", "title": "", "text": "समाज में जाकर लोगों के साथ किस प्रकार बर्ताव करना चाहिये यह आप भलीभाँति जानते है। शालाओं, विद्यालयों तथा अन्य स्थानोंपर कैसा व्यवहार किया जाता है, यह आप जानते है। घरवालों तथा पडोसियों का हृदय किस प्रकास आकर्षित करना, और मित्रों तथा सम्बन्धियों को किस प्रकार अपने गुणों से प्रभावित करना, आदि बातें आप खूब जानते है। फिर भी अपना कार्य तेजी से क्यों नहीं बढता? बस, एकही कारण है. आपके रोम रोम में बसा हुआ आलस्य। उसे नष्ट करो और फिर देखो, तुम में कैसा अभूतपूर्व परिवर्तन हो जाता है।"}, {"person": "", "title": "", "text": "\"कर्मण्येवाधिकारस्ते मा फलेषु कदाचन\"  यह वाक्य सदा याद रखिये। हम तो केवल कार्य करने के अधिकारी है। कार्योका परिणाम या फल हमारे हाथ की बात नहीं इसीलीये मनंष्यकी परख उसकी हेतु अर्थात हृदय की भावनाओं को देखकर की जाती है।"}, {"person": "", "title": "", "text": "हमारे आज के कार्यक्रम साधनरूप है। कईं सज्जन इन्हीं कार्यक्रमोको संघ का उद्देश्य समझते है। किन्तु यह उनका भ्रम है। हमे अपने आचरण से इस अवधारणा को दूर करना होगा। देश में हमे एकसूत्रता और अनुशासन निर्माण करना है। इसका अर्थ यह नही कि लाठी काठी या सैनिक शिक्षा बिलकुल निरूपयोगी है। केवल इतनी ही बात है कि हमारे उद्देश की तुलना में. उपयुक्त शिक्षा गौण है।"}, {"person": "", "title": "", "text": "अपने ध्येय के अनुकूल लोगों को संगठित करना हमारा सबसे पहला कार्य है। जो मनुष्य अपने आप को सच्चा हिन्दु कहलाता है। उसके पास पहुंचकर हम उसकी अपनी आज की अवनति का ज्ञान करा दें। तथा उसे देशकार्य के लिये तैयार करें। ऐसे दस पांच हिन्दू  इकठ्ठे हो जानेपर उनका एक मुखिया नियुक्त करें। वह  कुशल कर्णधार हो। इस प्रकार शहर मे, देहात में, कही भी संघ का कार्य प्रारंभ किया जा सकता है। जब तक इस प्रकारकी संघ शाखाओं का जाल सारे भारतवर्ष में नही फैलता है, तब तक हम यह नही कह सकेंगे, कि हमारा संगठन पूर्ण हो गया है।"}, {"person": "", "title": "", "text": "जो स्थान सबसे अधिक महत्वपूर्ण हो और जहां प्रमुख लोग सुविधापुर्वक इकठ्ठा हो सकते हों, ऐसे स्थानपर शाखा होनी चाहीये। सारा उत्साह तथा शक्ति इसी एक शाखा में जुटा देनी चाहिये। सारे उत्साही तरूणों को इसी शाखा में अवश्यमेव आना चाहिये। यदि तुम भिन्न भिन्न स्थानोंपर शाखाएँ खोलोगे तो तुम्हारा उत्साह बंट जाएगा। लोगों की शक्ति एक ही स्थानपर केंन्द्रीभुत न होने के कारण, योग्य मात्रा मे न संगठन होगा और न संगठन का दृश्य स्वरूप ही बन पायेगा। परंन्तु यदि एक शाखा सुचारू ढंग से और आदर्श रूप में चलाई जा सकी, तो आगे चलकर उसी शाखा से अनेक शाखाओंका निर्माण हो सकेगा।"}, {"person": "", "title": "", "text": "महत्व इसी बात का है कि, चाहे जैसी आपत्तियों का सामना करते हुए अपनी कार्यपद्धति में हम तनिक भी हेरफेर न करें और संघकार्य बढांते रहें। संघ जानता है, केवल संगठन करना। इसके अतिरीक्त और किसी भी क्षेत्र में उतरने की, संघ की इच्छा नहीं है। यह हमारी नीती संगठन की श्रेष्ठता की द्योतक है, यह बात यदि लोगों की समझ में आ गई तब तो हमारे कार्य मे किसी भी प्रकार की बाधा नहीं आयेगी।"}, {"person": "", "title": "", "text": "किसी कारण से किसी कार्यकर्ता को यदि स्थानांतरण करना पडा तो उस शाखा के अन्य स्वयंसेवक मै उसका उत्तरदायित्व संभालने के लिए सिद्ध हूं करते हुए, सामाने आने चाहिये। मौका पडने पर, हर प्रकार की जिम्मेवारी स्वीकारने की तत्परता शाखा मे दिखाई देनी चाहिये। कार्यकर्ता को चाहिये कि वह अपनी शाखा में ऐसा ही वातावरण निर्माण करें।"}, {"person": "", "title": "", "text": "एक बात की ओर हमारा विशेष ध्यान रहे। स्वयंसेवकों के मन मे केवल किसी खास व्यक्ति के विषय में ही श्रद्धा अथवा भक्तिे उत्पन्न न हो। स्वयंसेवकों में परस्पर श्रद्धा तथा प्रेम तो अवश्य रहे। किन्तु वह प्रेम कार्य के लिए हो, किसी व्यक्ति के लिये न हो। केवल व्यक्ति के लिए भक्ती तथा प्रेम होना, संगठन के लिए हानीकरक है। स्वयंसेवक केवल संघनिष्ठ हो। व्यक्तिनिष्ठ, शाखानिष्ठ अथवा स्थान निष्ठ न हो। ऐसी कोई संघविघातक बात न चल पडे इसके लिए हमे सतर्क रहना चाहिए।"}, {"person": "", "title": "", "text": "केवल संख्या बढाने से ही कार्य नही चलेगा। स्वयंसेवको में कार्यशक्ति के साथ-साथ कार्य कुशलता भी होनी चाहिए। उसे सब कार्योमे एक एक कदम क्रमबद्ध रितीसे उठाते हुए आगे बढना चाहिये। हमे संघ की दृष्टि सेही प्रत्येक स्वयंसेवक का चरित्रगठन करना चाहिये। वह प्रतिदीन क्या करता है। उसके भाव दृढ होते जा रहे है अथवा नही? वह अपने मित्रो को संघ मे लाता है या नही? यदी सब छोटी-मोटी बातों मे आप सचेत रहे, तो क्या कार्यवृद्धि असम्भव है?"}, {"person": "", "title": "", "text": "हमे इस ओर भी ध्यान देना होगा कि किसी भी कारण से, हमारा स्वयंसेवक अकर्मण्य न बने। यदी किसी दिन कोई स्वयंसेवक शाखा मे अनुपस्थित हो तो तुरन्त उसके घर पहुंचकर वह क्यों नहीं आया। इसकी पुछताछ करनी चाहिए। अन्यथा दूसरे दिन भी वह शाखा में नही आयेगा। तीसरे दिन उसे संघस्थान पर आने मे संकोच प्रतीत होगा। चौथे दिन वह थोडे भय का अनुभव करेगा। पाचवे दिन से वह टालमटोल करने लगेगा। अत: कोई भी स्वयंसेवक शाखा में उनपस्थित न रहे, इस की हमें चिंता करनी चाहिये।"}, {"person": "", "title": "", "text": "स्वयंसेवक बन्धुओं, तुमने एक अत्यन्त पवित्र व्रत लिया है। उसका स्मरण करो। तुमने हिन्दू राष्ट्र को स्वावलंम्बी तथा निर्भय बनाने का निश्च्य किया है। और तुम अपने को सच्चे राष्ट्रवादी मानते हो। किन्तु क्या तुमने इसका भी विचार किया है की अपने ध्येय और व्रत की तुलना में तुम्हारी तैयारी किस दर्जेकी है।"}, {"person": "", "title": "", "text": "सिद्धांत और व्यवहार का समन्वय हम कुशलतापूर्वक अपने जीवन में प्रकट करें। इसी में मनुष्यत्व है, ऐसा मेरा दृढ विश्वास है। यदि हम व्यक्तिगन स्वार्थभावना को तिलांजलि दें, तो सिद्धांत और व्यवहार का समन्वय आपही आप हो जाएगा। हमारा स्वार्थही हर काम हमारे कर्तव्य पथपर आपत्तियों के पहाड खडे करता है। अत: हमारे संघ बन्धुओं को चाहिये कि प्रथम वे स्वार्थ की क्षुद्रमर्यादा को पार करें। धरोहर चोरों के हाथ न लगाने पावे। हम सावधानी के साथ इतनी रक्षा करते रहें।"}, {"person": "", "title": "", "text": "हम में से प्रत्येक स्वयंसेवक को चाहिये, कि वह संघ के कार्य को ही अपने जीवन का प्रधान कार्य समझे।"}, {"person": "", "title": "", "text": "प्रतिज्ञा कर लो कि जब तक तन में प्राण है, संघ को नहीं भूलेंगे।"}, {"person": "", "title": "", "text": "किसी भी मोह से आपको विचलित नहीं होना चाहिये। अपने जीवन में ऐसा कहने का कुअवसर न आने दिजिये कि पांच साल के पहले मैं संघ का सदस्य था। हम लोग जब तक जीवित हैं तब तक स्वयंसेवक रहेंगे।"}, {"person": "", "title": "", "text": "जिसे अपने देश और देशबान्धवों के सिवा और किसी का मोह नहीं, अपने धर्म और धर्मकार्य के सिवा, और कोई व्यवसाय नहीं, अपने हिन्दूधर्म की अभिवृद्धि होकर हिन्दूराष्ट्र के प्रतापसुर्य को तेजस्वी रखने के अतिरिक्त अन्य कोई स्वार्थलालसा नहीं, उसके ह्दय में भय, चिंता, या निरुत्साह पैदा करने का सामर्थ्य, संसारभर में किसी में हो ही नहीं सकता।"}, {"person": "", "title": "", "text": "संघ के स्वयंसेवकों को चाहिये कि अपने बहुमूल्य जीवन का एक क्षण भी व्यर्थ न गँवाते हुए, संघ ने जो महान ध्येय हमारे सामने रखा है, उसे करने के लिये वे सदा प्रयत्नशील रहें। यदि हमारी संख्या पर्याप्त मात्रा में न बढी तो जो काम हमें करना है, वह हम कर नहीं पाएंगे। हमें तो समूचे राष्ट्र का कार्य करना है, किसी एक व्यक्ति का नहीं करना है। अतएव हमें कार्य की वृद्धि इतने परिमाण में करनी होगी, जो संघ के राष्ट्र्रीय अभियान को चरितार्थ करे।"}, {"person": "", "title": "", "text": "एक बार संघ में प्रवेश कर चुकने पर कोई भी व्यक्ति संघ से दूर न जाने पावे। अपनी विद्यार्थी दशा में आपने हौज और नल सम्बन्धी सवाल किये होंगे। उस समय आपको सोचना पडा होगा कि हौज में पानी भरनेवाला तथा उसे खाली करनेवाला दोनों नल लगे रहने पर हौज कितने समय में भरेगा? परन्तु संघ के कार्यकर्ता को इस प्रकार का सवाल हल करने की नौबत न आने पावे। संघ का हौज सदा भरते ही रहना चाहिये। जहां एक बार पानी हौज में आया कि बस, वह बाहर न जाने पावे।"}, {"person": "", "title": "", "text": "संघ की विचार प्रणाली का आकलन कर लेने पर स्वयंसेवक आप ही आप, संघ के अतिरिक्त अन्य सभी बातों सें दूर हटता जाता है। यही संघ की सफलता का रहस्य है। आप संघ से समरस होने का जितना अधिक प्रयत्न करेंगे, उतनेही वेग से हमारे कार्य की प्रगति होगी। अतएव आप ऐसी ही बनने का निश्चय करें।"}, {"person": "", "title": "", "text": "स्वयम् आप संघ से एकात्म हो जाइये और अपने अन्य बन्धुओं को भी वैसाही बनाने का प्रयास कीजिये। यह कार्य शीघ्रातिशीघ्र कैसे बढेगा इसी बात की आप लोगों को सदा चिन्ता होनी चाहिये। उसी के अनुरुप आप उत्साह और तीव्रता से कार्य में जुट जायं, तथा तल्लीन होकर कार्य करें।"}, {"person": "", "title": "", "text": "संघ कोई प्रासंगिक सामाजिक आन्दोलन मात्र नहीं है। जो अपने को, बुद्धिमान, आदर्शवादी तथा जिम्मेदार मानते हैं। अतः यहां के प्रत्येक स्वयंसेवक को कार्यकर्ता तथा नेता बनने की योग्यता रखनी चाहिये। क्या वस्तुस्थिति ठीक ऐसी है? हम सब अपनी दृष्टि अन्तर्मुख करें। हम कुछ अपना दिल टटोंलें। आत्मनिरिक्षण करें। इससे हमें पता चलेगा कि हम कहां खडे है?"}, {"person": "", "title": "", "text": "आप को कभी न भूलना चाहिये कि संघ एक जीता जागता संगठन है। अतः उसे स्वाभाविक रुप से बढते ही जाना चाहिये। तब ही हमारे उद्देश्य की पूर्ति भी हो पायेगी। हमारे संगठन की वृद्धि तीव्र गति से निरन्तर होती रहे। तभी हमें ध्येयसिद्धी प्राप्त होगी अन्यथा नहीं होगी।"}, {"person": "", "title": "", "text": "आओ, हम सब मिलकर, दुर्दम्य उत्साह के साथ अपने काम में एकदम प्रवृत्त हो जांय। अगर हरेक स्वयंसेवक, समाई के साथ निरंन्तर प्रयत्न करे, तो दस बीस क्या चाहे जितने नये मित्र बनाकर उन्हें संघ में ला सकेगा। प्रत्येक को अपने मन में पूरा निश्चय कर लेना चाहिये कि मैं इस वर्ष कम से कम दस स्वयंसेवकों को संघ में लाकर ही रहूंगा। तुम अपना निश्चय अवश्यमेव पूर्ण करोगे इसमें मुझे तनिक भी संदेह नहीं है। किन्तु तुम्हें इसी क्षण प्रारंभ करना होगा।"}, {"person": "", "title": "", "text": "आज ही कार्यारम्भ कर दो और फिर लगातार उसे करते रहो। आगे चलकर करेंगे इस विचार में रहोगे तो धोखा खाओगे। भविष्य पर निर्भर रहना किसी भी प्रकार से उचित नहीं रहता है। आगे चलकर परिस्थिति कैसे पलटा खायेगी, इस के बारे में कौन कह सकता है? आगामी काल में पता नहीं कब, हमारे सिर पर संकट के पहाड टूट पडेंगे। काम करने का समय हमेशा आज ही का होता है। कल के भरोसे रहनेवाला धूल में मिल जाता है। इसीलिये मैं कहता हूं कि आजही कार्यारंभ कर दो।"}, {"person": "", "title": "", "text": "हमारा कार्य किसीसे भी छिपा हुआ नहीं है। अब तो हम जनता के सामने प्रकाश में आ चुके है। और जनता हमारे कार्य की प्रगति को विशेष ध्यानपूर्वक देख रही है। हमारे चारों ओर मित्र तथा शत्रु फैला हुए हैं। मित्रों को तो हम अपनाएंगे ही। किन्तु जो अपने आपको हमारे शत्रु समझते हैं, उनसे भी द्वेष करने की हमें कोई आवश्यकता नहीं। उनपर तो हमें दया आनी चाहिये। जब हम लोग लगन के साथ काम करते हुए आगे बढेंगे तब उन्हें हमारे रास्ते से स्वयंम् ही एक ओर हट जाना पडेगा। हमारी शक्ति का प्रचण्ड आवेग वे सह न सकेंगे।"}, {"person": "", "title": "", "text": "दस बीस या पचीस, जितने भी स्वयंसेवक लाने हों, उनकी खोज अभी से प्रारम्भ कर दो। यह ध्यान रखो, कि दस ही क्यों न हो, किन्तु वे दस स्वयंसेवक, दृढ, निष्ठावान और गुणवान होने चाहिये। संघ के लिये वे बहुत मूल्यवान उपलब्धि सिद्ध हों।"}, {"person": "", "title": "", "text": "संघ के स्वयंसेवकों के ह्दयों में जो भाव हैं, वे प्रत्यक्ष उनके आचरण में आने चाहिये। हर एक स्वयंसेवक के आचरण में तत्व और व्यवहार का मनोरम सामंजस्य होना चाहिये। जो भी एक बार इन बातों को जान लेगा, उस के व्यवहार में फिर कभी किसी प्रकार की त्रुटि न रह पायेगी।"}, {"person": "", "title": "", "text": "अनुशासन अपने संगठन की नींव है। इसी नींव पर हमें विशाल इमारत को खडी करनी है। किसी की भी भूल से क्यों न हो, यदि कहीं नींव जरा भी कच्ची रही, तो इमारत का उस ओर का भाग ढल जायेगा, इमारत में दरार पड जायेगी और आखिर में संम्पूर्ण इमारतही ढह जायेगी।"}, {"person": "", "title": "", "text": "हरेक स्वयंसेवक को अपने अधिकार की और अधिकारी को अपने से बडे अधिकारी की आज्ञा का पालन करना चाहिये। उसी प्रकार यह भी अत्यंत आवश्यक है कि छोटे से लेकर बडे तक सभी लोग परस्पर को प्रेम तथा आदर की दृष्टि से देखें।"}, {"person": "", "title": "", "text": "हम लोग संघ के भिन्न अवयव तथा घटक हैं। अर्थात संघ का पूर्ण रुप हम से ही बना है। जो संबंध शरीर और उसके अंगों में है, ठीक वही सम्बन्ध संघ में और हम में है। शरीर के सारे अवयवों का विकास एक सा और एक ही समय होता जाय, तभी वह शरीर समर्थ बनता है और सुघड प्रतीत होता है।"}]}, {"key": "vyakti", "label": "व्यक्ति और चिंतन", "icon": "💡", "stories": [{"person": "", "title": "प्रस्तावना", "text": "राष्ट्रीय स्वयंसेवक संघ के निर्माता प.पू. डाक्टर हेडगेवारजी का जीवन अत्यंत सीधासादा पर उतना ही भव्य था। राष्ट्रीय स्वयंसेवक संघ के निर्माण के द्वारा वे राष्ट्रजीवन में एक ठोस धारा को प्रवाहित कर गए। विचारों की सुस्पष्टता से समाज की आज की आवश्यकताओं को समझकर उन्होंने सामाजिक जीवनपर संस्कार करने हेतु अपने स्वयं के जीवन को वैसे ही ढ़ाला।\n   प.पू. डाक्टरजी के तपःपूत जीवन के साथ जिनको प्रत्यक्ष संबंध का सौभाग्य प्राप्त हुआ था ऐसे कुछ महानुभावों के द्वारा लिखित संस्मरण संकलित हैं जो उनके जीवन के विविध पहलुओं का दर्शन कराते हैं। प.पू. श्री गुरुजी के एक भाषण को भी प्रारंभ में संग्रहित किया गया है। डाक्टर जी का स्वभाव, उनकी कार्य-पद्धति और समाजपर उनके प्रभाव का सूक्ष्म विश्लेषण इसमें किया गया है।"}, {"person": "", "title": "आत्मविश्वासपूर्ण परन्तु अहंकाररहित महान् प्रयास", "text": "जिस महापुरुष की प्रेरणा और ज्ञान से हम कार्य करते हैं, उसने अपने हृदय पर सत्संकार करके अपने अन्दर के सारे अवगुणों का उन्मूलन कर सद्गुणों को प्रकट किया था। संघ के जन्मदाता का यदि हम स्मरण करें तो हम भी अपने स्वभाव पर नियन्त्रण ला उसमें परिवर्तन अवश्य कर सकते हैं। बाल्यावस्था में बड़ा उग्र स्वभाव, अपनी टेक पर अड़े रहना थी उनकी कुल-परम्परा। सारा कुल ही बड़ा क्रोधी और वे स्वयं महा क्रोधी। इस प्रकार से यह उग्र स्वभाव और प्रचण्ड क्रोध उनको पैतृक-सम्पत्ति के रूप में ही मिला था । और यह तो प्रसिद्ध ही है कि परम्परागत स्वभाव को बदलना असम्भव तो नहीं परन्तु अत्यन्त दुस्साध्य अवश्य है। अंग्रेजी में भी इस आशय की एक अद्भुत लोकोक्ति है कि- Man should be very careful in the choice of his parents. किन्तु उनके तेजस्वी अन्तःकरण ने जिस दिन से इस विशाल संगठन को निर्माण करने का निश्चय  किया उसी दिन से उन्हें क्रुद्ध होते हुए शायद ही किसी ने देखा हो। सामान्यतः क्रोध दिल में घर कर लेता है, किन्तु सज्जनों का क्रोध वस्त्र पर पड़ी पानी की एक बून्द के समान है, स्याही के धब्बे की तरह नहीं। इस क्षण नाराज हुए तो दूसरे क्षण में उसका कुछ आभास नहीं मिलता। उपरोक्त लोकोक्ति डाक्टर जी के जीवन में सर्वथा सत्य प्रमाणित होती है। उन्होंने अपने स्वभाव को संगठन के अनुकूल अमृतमय बनाकर दिखाया। वही हमारे लिए सर्वथा योग्य है। परन्तु फिर भी यदि हमारी यही धारणा हो कि स्वभाव बदला ही नहीं करता, अहंकार उत्पन्न हो ही जाता है, इन्द्रिय सुख की लालसा को नष्ट करना कठिन है, कारण ये सब नैसर्गिक बातें हैं और निसर्ग में परिवर्तन असम्भव है, तो कुछ ही वर्ष पूर्व हुए उस महापुरुष के उदाहरण को देखें जिन्होंने निसर्ग पर विजय प्राप्त कर अपने चरित्र से यह प्रकट कर दिया कि मनुष्य, प्रयत्न से नैसर्गिक वृत्तियों को दबा अपने में यथेष्ट परिवर्तन कर सकता है। उनका उदाहरण हमारे लिए मार्गदर्शक है। उनके उस दृढ़ निश्चनय के आलोक को कइयों ने अनुभव भी किया। उनके जीवन के दैनिक क्रम में मैंने केवल अपने स्वभाव को बदलने की चेष्टा ही नहीं देखी परन्तु परम श्रेष्ठ गुणों को धारण करने का आत्मविश्वानसपूर्ण प्रयास भी पाया। किन्तु उस प्रयत्न में इस प्रकार के अहंकार का लेशमात्र भी उदय नहीं हुआ था, कि मैं कोई बड़ा आदमी बन रहा हूँ। आत्मविश्वाकस और अहंभाव दोनों ही भिन्न बातें हैं। मनुष्य के अन्दर अहंभाव अनेक रूपों में प्रकट होता है। मैं बड़ा अहंकारशून्य और बड़ा नम्र हूँ यह भी अहंकार का एक बड़ा भयानक  प्रकार है। अहंकार से मनुष्य को कुछ आनन्द सा प्राप्त होता है, परन्तु इसको छोड़ने से हृदय को जो प्रसन्नता होती है उसका वर्णन करना भी शब्दातीत है। अभिमानरहित कर्तृत्व से मनको स्थायी आनन्द प्राप्त होता है। अतः इस अहंकार को दूर करना ही श्रेयस्कर है और इसके लिए एकमात्र उपाय है निरन्तर चिन्तन। स्वभाव-परिवर्तन की कठिनता से  घबराने की आवश्यकता नहीं। परम पूजनीय डाक्टर जी ने इसे सुसाध्य कर परम श्रेष्ठता को  प्रकट किया है। हम भी उसी महापुरुष के उदाहरण को सामने रख अपने हृदय की ऐसी रचना करें कि अन्तःकरण आत्मविश्वाकसपूर्ण हो परन्तु अहंकार का लेश भी न हो।"}, {"person": "", "title": "प्रत्येक घटना में संघ-दृष्टि’", "text": "डाक्टर साहब ने छोटी अवस्था से लेकर अन्त तक कोई भी कार्य अपने लिए नहीं किया। अपना पेट भरने की उन्होंने कभी चिन्ता नहीं की। समाज के लिए जीने की भावना और निरन्तर कार्य करने की लगन, बस यही था उनका सम्पूर्ण जीवन। जो कुछ पढ़ा लिखा वह भी इसी दृष्टि से, कि जिससे लोगों के दिलों में सद्भाव ही उत्पन्न हो। इसी कारण डाक्टर की उपाधि उन्होंने प्राप्त की थी किन्तु डाक्टरी एक दिन भी नहीं की। इसी प्रकार जब चाचा ने विवाह के लिए उनको उद्यत करने की अनेक चेष्टाएँ कीं तो उन्होंने एक पत्र में स्पष्ट लिख दिया कि, ‘मेरे जीवन का एक ही ध्येय है और मैंने अपने जीवन को उस ध्येय के साथ एकरूप भी कर दिया है, अतएव वैयक्तिक सुखोपभोग और पारिवारिक जीवन के लिए अवकाश कहाँ ?’ हृदय के सारे गुण कार्य को दे दिए फिर बचा ही क्या था, कि जिससे पारिवारिक जीवन चला सकें? यद्यपि उन्होंने अति दरिद्री कुटुम्ब में, कि जिसमें प्रातःकाल का भोजन होने के पश्चाकत् सायं के भोजन की चिन्ता सताया करती है, जन्म लिया था, तो भी व्यक्तिगत कार्य के लिए  एक पैसा भी कमाने कि चेष्टा नहीं की और न ही परिवारिक जीवन का सुख भोगने की लालसा को हृदय में प्रवेश दिया। जिस को भरपेट रोटी मिलती हो वह यदि ऐसा निश्च य करे, यद्यपि ऐसे उदाहरण बहुत कम मिलते हैं, तो कोई बड़ी बात नहीं। परन्तु जहाँ सदा महाशिवरात्रि का उपवास विराजता हो वहाँ जीवनसर्वस्व संघ को दे देना यह महान त्याग ही है। हमारे तत्त्व के साक्षात् प्रतीक हमारे नेता का सारा जीवन आर्थिक कठिनाइयों में ही बीता। \n   एक बार उनसे मिलने के लिए घर पर आए हुए एक सज्जन जब चलने की जल्दी करने लगे तो उन्होने चाय के लिए आग्रह कर उन्हें ठहरा लिया। डाक्टर साहब को चाय पीने की आदत नहीं थी, आदत थी तो अन्तःकरण की पूरी लगन के साथ अहोरात्र कार्य करने की। चाय पीने के बहाने संघ के लिए बातचीत करने का अवसर और अधिक मिल जाता था। \n   एक बार डाक्टर जी अपने एक मित्र को साथ ले एक सज्जन को उत्सव के अध्यक्ष पद के लिए निमन्त्रित करने के लिए  गए। उन्होंने उसे सहर्ष स्वीकार किया। अब संघ की विचारधारा देना भी तो आवश्यक था। परन्तु साथ गए मित्र महोदय थोड़ी जल्दी करने लगे। उस सज्जन के अत्यन्त अनुरोधपूर्वक चायपान के लिए निमन्त्रण देने पर भी यह महाशय, कोई आवश्यकता नहीं, यह कहकर उठ खड़े हुए। विवश हो डाक्टर जी को भी उसका अनुसरण करना पड़ा। हम बाहर आए और मित्र महोदय चले गए तब डाक्टर जी ने यही कहा कि ‘यह व्यक्ति इतने समय से मेरे सम्पर्क में है परन्तु अभी तक उसे यह   समझ में नहीं आया कि ऐसे समय कभी उठकर नहीं आना चाहिए। समय यदि जाता तो हमारा जाता, खर्च होता तो उसका होता, इसका क्या जाता था कि इसने इतनी जल्दी की? चाय के निमित्त संघ की बातचीत करने का सुअवसर तो मिलता है। उससे आत्मीयता से संघकार्य करने की लगन पैदा हो सकती थी परन्तु वह अवसर अब चला गया।’ पहले सम्पर्क में मनुष्य का हृदय बातों को समझने की उत्सुकता रखता है और उस उत्सुकता में संस्कार की स्थायी छाप लगाई जा सकती है। परन्तु पहली ही भेंट में उसे बिना संस्कार किए छोड़ दें तो बाद में  फिर सद्भाव जागृत होते ही नहीं। उस सज्जन के बारे में भी ऐसा ही हुआ। अब भी जब कभी मैं उन से मिलता हूँ तो कोई विशेष प्रभाव उनपर नहीं होता। रोने पीटने की बातें करनेवाले, केवल अध्यक्ष बनाने के उपयोग के ही वे रह गए हैं; किसी प्रकार से भी कार्य के लिए उपयोग नहीं। उस समय तो लोहा गरम था, दिल उत्सुक  था और हृदय पर दृढ़ छाप लगाई जा सकती थी। परन्तु एक छोटी सी बात से वह अवसर निकल गया। इसी प्रकार वार्तालाप के निमित्त उस सज्जन को भी उन्होंने चाय के लिए अनुरोध कर बैठा लिया और अन्दर सन्देशा भेज दिया। पन्दह मिनट तक भी जब चाय के दर्शन न हुए तो वह सज्जन चलने के लिए पुनः उद्यत हो गए। लोक-लज्जा के कारण एक बार चाय का वचन दे, बिना चायपान करवाए आगत सज्जन को वे कैसे जाने दे सकते थे? स्वयं अन्दर गए तो पता लगा कि वहाँ ठण्डे पानी के सिवाय और कुछ भी  नहीं। घर में केवल भाई की स्त्री थी। बाजार से चीज लानेवाला कोई छोटा बच्चा भी नहीं था। तुरन्त बाजार स्वयं गए और चाय-चीनी ले आए और फिर थोड़ी देर में चाय आई। परन्तु यह व्यक्ति भी बड़ा चतुर था, तुरन्त वास्तविकता को ताड़ गया। उसको पता नहीं था कि डाक्टर जी के घर में इतना दारिद्य्र है; और पता कैसे लगता, कारण डाक्टर जी हमेशा बालक के समान हँसते हुए प्रसन्न चित्त ही मिलते थे। उस नग्न दारिद्य्र को देख उस सज्जन ने सोचा कि उनका कुछ प्रबन्ध करना चाहिए। उनके यहाँ से आते ही तुरन्त मुझे बुला भेजा। मेरे पहुँचते ही उन्होंने मुझसे पूछा कि डाक्टर जी की हालत कैसी है? ‘बहुत दारिद्य्र है, कभी-कभी भूखे भी रह जाते हैं।’  ‘तो क्या आपने उनके भोजन का कुछ प्रबन्ध नहीं किया ?’ ‘एकादशी का पेट शिवरात्रि कैसे भरे ?’ मैने सरलता से उन्हें उत्तर दे दिया। अन्त में उन्होंने बड़े क्षुब्ध होकर यही कहा कि, मुझसे यह  ‘सब कुछ देखा नहीं जाता, सार्वजनिक कार्य के लिए जाते हो तो मुझसे उनके लिए कुछ ले जाया करो।’ थोडी देर के बाद वे फिर कहने लगे कि, ‘कम से कम आतिथ्य सत्कार के लिए मुझ से 25 रु. प्रतिमास ले जाया करो, परन्तु डाक्टर जी को बताना नहीं।’ मैंने उन्हें कहा आप स्वयं जाकर डाक्टर जी को दे आइए। च्छा ज्ञान रखते थे। निर्वाचन के दिनों में इन दोनों बातों का उपयोग सार्वजनिक सभामंच से अपने प्रत्येक विरोधी को आवाहन दे देकर उनके नामों का उच्चार करने में ही किया करते थे। एक बार दूसरे नेता जो कि डाक्टर जी के मित्र थे, उनके विरोध में खड़े हो गए। उसी मैत्री के कारण बैरिस्टर महोदय के मन में इस धारणा ने घर कर लिया कि हो न हो प्रतिपक्षी को डाक्टर जी और उनके संघ का ही आश्रय प्राप्त है। अन्यथा वह यह दुस्साहस  कैसे कर सकता था ? इसलिए इस संघ को ही मारना चाहिए यह निश्चरय उन्होंने किया। सार्वजनिक सभा में खड़े हो वे  इतना ही कह सके कि जिस व्यक्ति के सहारे मेरा प्रतिपक्षी खड़ा हुआ है उस डाक्टर हेडगेवार की निन्दा के लिए मेरे पास एक भी शब्द नहीं। यही नहीं, एक बार डाक्टर जी के किसी मित्र को 500 रु. की आवश्यकता हुई और अपनी आवश्यकता को तुरन्त पूर्ण कराने की दृष्टि से वह डाक्टर जी के घर पर आया। रात्रि को 11 बजे और कोई प्रबन्ध डाक्टर जी को न सूझा तो वे तुरन्त ही उस बैरिस्टर महाशय के घर आए और अपनी आवश्यकता प्रकट की। सुनते ही उसने 500 रु. लाकर उनके हाथ में रख दिए। डाक्टर जी ने कहा कि  कागज कलम ले आइए ताकि मैं प्रामिसरी नोट तो लिख दूँ। इतना सुनते ही वे बोल उठे  ‘डाक्टर जी, मेरे होशहवास कायम हैं, मेरा दिमाग अभी तक ठिकाने है। डाक्टर हेडगेवार से प्रामिसरी नोट लिखाना सौजन्यता का अपमान करना है’। यही परमश्रेष्ठ चरित्र हमारा आदर्श है कि जिसने विरोधी के हृदय में इतनी श्रद्धा और विश्वास अपने सम्बन्ध में निर्माण किया था। \n   युधिष्ठिर के समान विश्वषसनीय और दुर्योधन को भी सुयोधन कहनेवाली वाणी की मधुरता डाक्टर जी में थी। अश्वात्त्थामा मारा गया, यह समाचार जब महाभारत युद्ध में फैला तब उसकी सत्यता के विषय में आचार्य द्रोण ने अपने शत्रु  युधिष्ठिर से ही जाकर प्रश्ना किया, कारण उनके हृदय में यह विश्वादस था कि यह व्यक्ति स्वार्थ के लिए झूठ नहीं बोलेगा। ‘अश्व त्त्थामा हतः’ इतना सुनते ही अश्वकत्त्थामा की मृत्यु के विषय में पूर्ण विश्वािस हो गया और वे इतने शोकाकुल हो गए कि अगले शब्द भी न सुन पाए। अपने बारे मैं इतना विश्वाहस प्रत्येक व्यक्ति के हृदय में निर्माण करना है फिर चाहे वह मित्र हो या शत्रु। इसी आदर्श के मानो साक्षात् प्रतीक थे हमारे डाक्टर जी। बीसवीं शताब्दी का वह युधिष्ठिर वास्तव में अजातशत्रु था।"}, {"person": "", "title": "अजात शत्रु- डाक्टर जी 2", "text": "संघ की बढ़ती हुई तेजस्विता को देख कर पुराने मध्यप्रान्त की सरकार को एक  बार भय हुआ कि यह संघ साम्प्रदायिक है, जिसका उद्देश्य आपस में झगड़े करवाना ही है। यह विचार कर सरकारी नौकरों को संघ में जाने से वर्जित करने के लिए उन्होंने एक आज्ञापत्र निकाल दिया। स्थानीय म्युनिसिपल कमिटियों और डिस्ट्रिक्ट बोर्डों ने भी उनका अनुकरण किया। उस आज्ञापत्र का विरोध करने के लिए निन्दा का प्रस्ताव रखा गया। निन्दा प्रस्ताव का अनुमोदन करनेवाले स्वजातीय ही नहीं परन्तु मुसलमान, पारसी, अंग्रेज आदि सभी थे। एक बार यह पता हो गया कि इस प्रस्ताव को सफल करने की डाक्टर जी की इच्छा है, बस सभी सहमत हो गए। यह प्रस्ताव मान्य होना ही चाहिए कारण डाक्टर हेडगेवार उसके पीछे खड़े हैं। डाक्टर हेडगेवार की चलाई हुई संस्था साम्प्रदायिक विद्वेष लिए हुए कैसे हो सकती है ? \n   नागपुर में एक सज्जन रहते थे जो अपने को वहाँ का मुखिया समझा करते थे। उनके रहते हुए किसी और को सभापति बना कर नागपुर में कोई सभा शान्तिपूर्वक नहीं चल सकती थी। इस कार्य के लिए उनके पास एक सेना भी थी। जहाँ कहीं उनकी अनुमति के बिना कोई सभा होती कि अपने दल-बल के साथ उमड़ पड़ते थे, फिर 15 मिनट से अधिक वह सभा न चल सकती थी। उन्हीं दिनों डाक्टर जी के एक मित्र नागपुर में आए और एक सभा करने की इच्छा उन्होंने प्रकट की। लोगों ने बताया कि इस परिस्थिति में सभा नहीं हो सकती। परन्तु डाक्टर जी के पूर्ण विश्वास दिलाने पर सभा का पूर्ण प्रबन्ध कर लिया गया। सभा आरम्भ हुई और सेनापति महोदय अपने दल-बल सहित वहाँ पहुँचे। उनको देखते ही डाक्टर साहब उनके पास गए और पूर्ण आदर से उनका स्वागत कर, अपने साथ कुर्सी पर बिठा लिया। वक्ता महोदय की वाणी भी बहुत उग्र थी और इन मुखिया महोदय पर भी प्रचुर प्रहार हुए। आवेश में आ  वे इधर-उधर देखते, परन्तु डाक्टर साहब की ओर दृष्टि जाते ही कसकसा कर रह जाते। सेनापति ने बड़ों-बड़ों को चूना लगाया था, परन्तु आज मन मारे ही बैठे रह गए कारण एक तेजस्वी व्यक्ति सामने था कि जिससे आँखें मिलते ही उनका सारा साहस ढ़ेर हो जाता था। सभा दो घण्टे तक शान्तिपूर्वक होकर समाप्त हो गई।"}, {"person": "", "title": "सर्वगुणसमुच्चय, पूर्ण निरहंकार वृत्ति", "text": "एक ओर निरन्तर कष्टों के घेरे में पड़े हुए डाक्टर जी और उसपर संघकार्य की चिन्ता। एक व्यक्ति के बारे में कितनी चिन्ता करनी पड़ती है, कितना कष्ट उसको संगठन में बनाए रखने के लिए उठाना पड़ता है इसकी कल्पना हमें कहाँ ? कारण कार्य का सम्यक् दर्शन हमें नहीं हुआ। संघकार्य रचनात्मक कार्य है। उस में एक-एक व्यक्ति के स्वभाव-गुण का विचार कर प्रेम की छाया में दिन-रात उसे आगे बढ़ाना होता है। इसी एक-मात्र चिन्ता में उनका जीवन व्याप्त था, परन्तु फिर भी ऐसा मालून पड़ता था मानो आनन्द उनके हृदय में से फूट-फूटकर निकलता हो। उनके पास जो रोता हुआ गया, हँसता हुआ ही लौटा। वे क्या उसे कोई उपदेश देते थे ? नहीं, परन्तु अपने अन्तःकरण के द्वारा ही उसे मार्गदर्शन करा देते थे। यह कौशल्य उनमें अपूर्व था। इस गुण का कारण था उनका पूर्ण निरहंकारी स्वभाव। यदि अहंकार था तो केवल कार्य का, कि यही मेरा कार्य है। वे  तो वास्तव में सर्वगुणसमुच्चय थे और उसके साथ ही थी  वाणी की मधुरता और स्वभाव की नम्रता। न उनमें किसी पद या अधिकार प्राप्ति की इच्छा थी और न मानसम्मान की लालसा। वे तो बहुधा कहा करते थे कि यदि मुझे कोई योग्य व्यक्ति संघकार्य का भार उठाने के लिए मिल जाए तो उसके हाथों यह कार्य सौंप मैं एक सामान्य स्वयंसेवक बन कर उसकी सेवा करूँ। यही थी उनकी एकमात्र इच्छा और इसी इच्छा से वे एक-एक स्वयंसेवक को देखते थे। एक बड़े महापुरुष को लेकर उन्होंने बहुत दौड़धूप की। कितनी बार उन्हें संघ का स्वरूप दिखाया और अपना नेता बनाने का प्रयत्न वर्षों तक करते रहे। परन्तु अपने ही गुणों के कारण वे संघ को समझ नहीं सके। वर्षों के प्रयत्न के बाद भी उन्हें संघ की सम्यक् कल्पना न हो सकी। इसका उन्हें कितना दुःख हुआ होगा, फिर भी अपने प्रयत्न में वे जुटे रहे। नैसर्गिक रूप से तो वे इस महान् कार्य के सर्वोच्च स्थान पर आरूढ़ हो ही चुके थे। स्वयमेव मृगेन्द्रता के सिद्धान्त के अनुसार इच्छा न रहते हुए भी हमारे सरसंघचालक के पद पर वे आसीन हो गए। इसकी प्राप्ति के लिए न उनमें तिलमात्र लालसा थी और न ही इसकी स्थिरता के लिए कोई विधान बना डालने का रंच भी विचार। वे  तो इसी भावना से कार्य करते थे कि जब तक इस महान उत्तरदायित्व को सम्हालनेवाला और कोई तैयार नहीं होता तब तक ही कार्य को स्वयं उठाने का उनका संकल्प था। और अन्य कोई उसके योग्य बन भी न सका। अपने इन महागुणों के कारण ही वे आज के युग-प्रवर्तक बन गए। मैं नेता हूँ और बाकी मेरे अनुयायी हैं ऐसा कोई  भाव उन्हें छू भी नहीं गया था। उनके जीवन की अन्तिम बीमारी के पहले उनके शरीर में तीव्र पीड़ा रहती थी। बहुत से उपचार किए किन्तु कोई लाभ नहीं हुआ। उन्हें बताया गया कि उपचार और आराम के लिए राजगीर चले जाएँ। सभी के आग्रह के कारण वे राजगीर चले तो गए परन्तु वहाँ पहुँच कर आराम तो दूर रहा, अपनी बीमारी और आराम के समय शाखाओं का कार्य आरम्भ कर दिया। और पूना वर्ग में आते समय एक प्रतिष्ठित व्यक्ति को भी साथ लेते आए। पूना से जब नागपुर लौट कर आए तो मैं सब स्वयंसेवकों की ओर से उनका स्वागत करने के लिए स्टेशन पर गया। थोड़ी देर में गाड़ी आई। डाक्टर जी डिब्बे के दरवाजे पर ही खड़े थे। गाड़ी रुकते ही साथ लाई हुई श्रद्धासिक्त पुष्पमाला उनको अर्पण करने के लिए ज्योंही हाथ ब़ढ़ाया त्योंही ऐसी उग्र दृष्टि से उन्होंने मेरी ओर देखा कि मेरा हाथ जहाँ का तहाँ ही रह गया। माला पहनाने का साहस मुझे नहीं हुआ। ‘मैं तो अपने घर आया हूँ, मेरा स्वागत करने की कोई आवश्यकता नहीं है’, यह कह कर उन्होंने पास खड़े हुए अतिथि को माला पहिनाने का संकेत करते हुए कहा कि ये हैं हमारे अतिथि, स्वागत तो इनका करना चाहिए। मैंने माला उनके गले में डाल दी। इस प्रकार उन्होंने सारे जीवन भर गले में माला नहीं डाली। फ़ोटो  खिंचवाने के लिए भी स्वयंसेवकों को उनसे हठ से लड़ाई करनी पड़ती थी। इस निरहंकार वृत्ति के कारण ही उन्होंने वह शक्ति प्राप्त की कि जिससे इतना विशाल कार्य वे सम्पादित कर सके।"}, {"person": "", "title": "मेरा कार्य ही मेरा अस्तित्व", "text": "उनके जीवन में रहस्य था तो यही कि उनका व्यक्तिगत जीवन और सामाजिक जीवन दोनों एक थे-अंगूर के समान अन्तर्बाह्य  एक सा। परिपूर्ण अमृतमय चारित्र्य, ध्येय में प्रखर निष्ठा, अहोरात्रि अविश्रांत कार्य यही थी उनकी परम निधि। अस्वस्थ होकर भी विश्रांति वे नहीं लेते थे। लोग कहते थे कि आपका जीवन शीघ्र ही समाप्त हो जाएगा, किन्तु जीने की उन्हें तनिक भी चिन्ता न थी। वे कहा करते थे कि मेरा अस्तित्व तो मेरा कार्य ही है। इससे भिन्न किसी अस्तित्व की मैं कल्पना नहीं कर सकता। \n   यदि उन्हें कभी शरीर के विश्राम की आवश्यकता अनुभव भी होती तो वे छलाँग लगाकर आगे बढ़ने की वृत्ति धारण कर लेते। उनके मनमें सदा एक ही विचार रहता  था, कि जवानी के कुछ भी दिन यदि आराम के लिए ले लिए तो बुढ़ापे के निकम्मे दिन ही काम करने के लिए मिलेंगे। बस इसी विचार से वे अहोरात्रि कार्य करते और उसी में आनन्द और शान्ति का अनुभव करते थे। कभी कहीं विश्रांति के लिए गए भी तो, आसपास घूमकर दस-पाँच शाखाएँ खोलकर वापिस आना यह उनका स्वभाव था। एक बार जब उनकी बीमारी बहुत बढ़ी और डाक्टरों ने बहुत बाध्य किया तो पूर्ण विश्रांति की योजना स्वीकार की गई। अपने साथ मुझे भी उस स्थान पर लेते गए। उपचार चलता था पर आराम नहीं होता था। पथ्य-सेवन और औषधि लेना भी नियमपूर्वक चल रहा था, परन्तु कोई लाभ नहीं। \n   एक दिन उपचार करनेवाले डाक्टर महोदय ने सारा वृत्त पूछते समय मुझे प्रश्न किया कि ये सोते कब हैं ? मैंने उत्तर दिया कि यथासमय 1 या डेढ़ बजे।  डाक्टर महोदय बड़े अचम्भित हुए और कहने लगे इसीलिए ये ठीक नहीं होते। आप लोग उनको सोने नहीं देते होंगे। उन्हें तो 10 बजे सो ही जाना चाहिए। मैंने कहा कि मेरे लिए उन्हें 10 बजे सुला देना असंभव है। ‘उन्होंने कहा आप नहीं सुला सकते तो मैं स्वयं आकर सुलाऊँगा।’ मैंने भी इस प्रस्ताव का स्वागत किया। रात्रि को 9 बजे डाक्टर महोदय आए। डाक्टर साहब भोजन कर ही चुके थे और कमरे में उस समय अकेले थे। भोजन करते ही नहीं सोना चाहिए इस विचार से उनसे थोड़ी इधर-उधर की बातें करने लगे। मैं बाहर बैठा हुआ था और अन्दर वे दोनौं। सुलानेवाले महाशय की आँखों में जब नींद भर गई तो उन्हें समय का ध्यान आया। घड़ी में 1 बज गया था। तुरन्त उठ खड़े हुए और उन्हें सो जाने का आदेश करते हुए बाहर चले आए। मैंने केवल उनसे समय पूछ लिया। ‘मैं बातों में जरा बह गया था’ यह कहते हुए वे तुरन्त चले गए। अस्वस्थता में जब कि शरीर साथ नहीं देता था तब भी रात-रात भर जाग कर एक-एक को बुलाकर वे बातचीत करते रहते थे। विश्राम लेने का अवकाश उन्हें कहाँ था ? \n   इसी तपस्या में उनका वह भीमकाय प्रचण्ड शरीर, कि जिसको देखकर सामान्य मनुष्य ड़र जाए, घोर परिश्रम से टूट गया। अन्तःकरण की अग्निज्वाला को भौतिक शरीर सह नहीं सका। आंतरिक उष्णता से स्थूल शरीर का यंत्र नष्ट हो गया। वे कहा करते थे कि, ‘मुझे जो मर्ज है उसकी दवा मैं जानता हूँ। परन्तु मेरे पास इतना समय कहाँ कि उसकी औषधि और पथ्य कर सकूँ ? उसका परिणाम भी मैं जानता हूँ। जो होना होगा सो हो जाएगा। उस मैं कुछ भी नहीं कर सकता’। जो होना था वही हुआ भी। जीवन की परवाह न की। सारी जवानी कार्य करने में गई। और यौवन में ही कर्तृत्व की प्रखर अग्नि में शरीर भी स्वाहा हो गया।"}, {"person": "", "title": "विकसित देहरूपी पुष्प का समर्पण", "text": "बुढ़ापा भी कोई काम करने का समय है ? गाड़ी में बुढ्ढे बाबा को लिए  फिरें  इस प्रकार का उपहासास्पद दृश्य उपस्थित कर कार्य करना डाक्टर साहब को पसन्द न था। बड़े-बड़े महान् पुरुष अल्पकाल में ही शरीर छोड़कर चले गए। शंकराचार्य 32 वर्ष  की अवस्था में, विवेकानन्द 39 वर्ष में, और शिवाजी 50 वर्ष की आयु में ही इस लोक से प्रस्थान कर गए थे। उन्हें अधिक काल जीने की इच्छा न थी। जिस प्रकार योगाभ्यासी पुरुष अपने शरीर में से प्रकट की हुई अपनी योगाग्नि में जल कर समाप्त होने में ही अपना कल्याण समझता है उसी प्रकार प्रचण्ड  परिश्रम की तपस्या में शरीर को होम कर देना यही हमारी परम्परा है। हमें जीवन-शक्ति की मितव्ययता का पाठ दिया जाता है। यदि आज आराम किया तो कल अधिक कार्य कर सकेंगे अर्थात् आज कोट न पहिन कर उसको सम्हाल कर रखना कि आगे काम आएगा, तब तक कोट की रक्षा करना जब तक कि वह पहिनने के योग्य ही न रह जाए।  इसी प्रकार से लोग मुर्दा शरीर को, जब कि वह उपयोगी न रहेगा कार्य के लिए, बचाए रखने की शिक्षा देते हैं। \n   डाक्टर साहब की बैठक में एक बार इस विषय की चर्चा चल पड़ी। एक सज्जन ने कहा कि मनुष्य में तीन वासनाएँ अत्यंत स्वाभाविक हैं-वित्तेषणा, पुत्रेषणा और लोकेषणा।  जब तक इन वासनाओं की पूर्ति न हो जाए तब तक मनुष्य एकाग्र चित्त से सामाजिक कार्य में सम्पूर्ण शक्ति नहीं लगा सकता । ये तीनों वासनाएँ  कार्य में बड़ी बाधक होती हैं। मैंने उन्हें यही उत्तर दिया कि वास्तव में तो कार्य के लिए मनुष्य योग्य तभी होता है कि जब उसका शरीर चिता पर पहुँच जाता है। इस प्रकार की अनेकों भ्रमपूर्ण धारणाएँ समाज में फैली हुई हैं। देहरूपी पुष्प पूर्ण यौवन की गंध से जब विकसित हो उसी समय उसे राष्ट्रदेव को अर्पित करना चाहिए। गंधहीन और शुष्क पुष्प आराध्य देव के चरणों पर नहीं चढ़ाया जाता। यही था उनका आदर्श और इसी प्रकार वह जीवन-दीप बुझ गया।"}, {"person": "", "title": "नव दधीचि", "text": "हृदय में सात्विक अग्नि लिए, वाणी में माधुर्य भरे तथा सारा जीवन घिस- घिसकर मरने की तैयारी रखनेवाला था उनका अन्तःकरण। क्षणभर में मर मिटने की तैयारी भी शौर्य है परन्तु प्रतिदिन कष्ट उठाकर तन सुखाकर कार्य करना यह तो असामान्य तपस्या है। शिबि के समान समाजरूपी कपोत की रक्षा के लिए अपने ही हाथों से अपने अंगों को काट-काटकर दे दिया। अपने ही हाथों से अपने मांस को काट-काटकर देना यही सर्वश्रेष्ठ दान है। समाज-पोषण के लिए दान किया डाक्टर जी ने। वृत्रासुर से संत्रस्त स्वर्गाधिपति इन्द्र को साथ ले जब ब्रह्माजी के पास अपनी रक्षा का उपाय पूछने आए तो ब्रह्माजी ने कहा किसी महातपस्वी ऋषि की स्वेच्छा से दी हुई अस्थियों से बने हुए शस्त्र द्वारा ही असुर का संहार हो सकता है। इन्द्र ने ब्रह्मदेव  की वाणी दधीचि ऋषि को सुनाई और  देवताओं  के कार्य के लिए स्वशरीर-त्याग की प्रार्थना की। महर्षि बोले कि मेरे शरीर की अस्थियों से गौ, ब्राह्मण और देवताओं को त्रस्त करनेवाला असुर यदि मारा जा सकता हो तो आप उन्हें ले जाइए। इतना कहकर उन्होंने सहर्ष योग के द्वारा देह त्याग दी। उनकी हड्डियों से वज्र बना और उससे इन्द्र वृत्रासुर का  संहार कर स्वर्ग को संताप-मुक्त करने में समर्थ हुआ। \n   इस प्रकार से अपने हाथों अपना रक्त, अपनी अस्थियाँ देना यही हमारी संस्कृति का आदर्श है। जीवन-सर्वस्व का संघ के लिए समर्पण, खाना-पीना सब कुछ इसी के लिए, जीना भी इसी क लिए और इसी के लिए मरने को भी तैयार। कार्य में घिस-घिसकर यदि  प्राण जाए, शरीर को सुखा-सुखाकर यदि कार्य बढ़े तो उसके लिए कटिबद्ध रहना यही हमारा आदर्श है। इसी प्रकार के आदर्श का यदि हमारे हृदय पर संस्कार हुआ और यह सब कुछ करते हुए भी हमारी निरहंकार वृत्ति बनी रही तोे फिर कोई भी समस्या हमारे सामने नहीं रह सकेगी।"}, {"person": "", "title": "संस्मरण 1", "text": "डाक्टर केशवराव हेडगेवार बचपन से ही बहुत साहसी थे। उनके घर के सामने आम लोगों के पानी भरने के लिए एक कुआँ था। वहीं से घर के लिए सब भाई मिलकर पानी लाया करते थे। उनके आँगनमें भी कुआँ  था  पर उसमें कीचड़ बहुत था। एक समय आम लोगों के लिए बने कुएँ से पानी लाते  समय कुछ अन्य लोगों के साथ झगड़ा हो गया। अतएव सब भाइयों ने निश्चय  किया कि अब कल से किसी के दरवाजे पानी लाने नहीं जाएँगे। रातोंरात तीनों भाइयों ने मिलकर पिताजी से छिपकर अपना कुआँ स्वच्छ कर दिया। उस समय केशवराव की उम्र छोटी थी। कीचड़ बालटी से निकाला जा रहा था। इनमें इतनी शक्ति न थी कि बालटी को कुएँ से खींचते, अतएव स्वयं रातभर कुएँ में रहकर वे कीचड़  निकालकर  बालटी में भरते रहे। ।"}, {"person": "", "title": "संस्मरण 2", "text": "साहस के साथ स्वाभिमान की भी कमी नहीं थी। बड़ों के साथ वे नम्रता का व्यवहार करते और मित्रों के साथ आत्मीयता का, परन्तु परकीयों के साथ उनका व्यवहार बड़ा ही स्वाभिमानपूर्ण होता था। यवतमाल में पढ़ते समय अपने मित्र डा. अणे एवं श्री दौंडेजी के साथ प्रतिदिन सायंकाल घूमने जाने का उनका नित्य क्रम था। एक दिन रास्ते में डेप्युटी कमिशनर (जिलाधीश), म्युनिसिपल सेक्रेटरी तथा सिविल सर्जन से भेंट हुईं। केशवराव के दोनों मित्रों ने इन साहब लोगों को प्रणाम किया। पर इन्होंने उनकी ओर देखा तक नहीं। इस बात से  चिढ़कर सिविल सर्जन ने केशवराव को बुलाकर जिलाधीश की ओर अंगुलिनिर्देश कर कहा, ‘तुम जानते नहीं हो ये  कौन हैं ? तुम्हारे मित्रों ने इन्हें सलाम किया, तुम्हें भी इन्हें सलाम करना चाहिए था।’ इसपर केशवराव ने तुरन्त उत्तर दिया, ‘मुझे मालूम नहीं था ये  कौन हैं । न इनसे मेरा परिचय है। अतएव मेरे मित्रों के समान मैंने इन्हें नमस्कार नहीं किया।’ तब सिविल सर्जन ने कहा ‘ये जिलाधीश हैं, इन्हें सलाम करना चाहिए।’ इस पर केशवराव ने तुरन्त उत्तर दिया ‘बिना परिचय के किसी को  नमस्कार करना अनुचित (out of etiquette) है।’ ऐसा कहते हुए वे चल पड़े।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 1", "text": "1905 की कलकत्ता की राष्ट्रीय काँग्रेस में जो चतुःसूत्री योजना बनाई गई थी उसका प्रचार करने में केशवराव सदैव ही अग्रेसर रहते थे। इसीसे वे सरकार की आँखों में काँटे के समान चुभने लगे थे। उस समय पुराने मध्यप्रान्त में स्थापित राष्ट्रमंडल के सदस्यों में डा. मुंजे, श्री लोकनायक अणे, श्री दादासाहब खापर्डे, श्री धुन्डीराजपंत ठेंगडी, श्री शम्भुराव गाडगिल आदि व्यक्ति थे। केशवराव ने अपने कर्तृत्व से इनका असीम स्नेह संपादन किया था। राष्ट्रकार्य को उनके जीवन में बचपन से ही प्रथम स्थान था और उसे यशस्वी रीति से संपादन करने के लिए डिग्री प्राप्त करनी ही चाहिए, यह उनकी एक महत्त्वाकांक्षा थी। अतएव आर्थिक कठिनाइयों के रहते हुए भी मैट्रिक की परीक्षा में उत्तीर्ण होने पर उन्होंने उपरोक्त राष्ट्रमंडल के सदस्यों की सहायता से कलकत्ता के नेशनल मेडिकल कालेज में प्रवेश प्राप्त किया। कलकत्ता निवासी श्यामसुन्दर चक्रवर्ती आदि के नाम पत्र प्राप्त कर उन्होंने कलकत्ता में प्रवेश किया और शीघ्र ही अनेकों के स्नेह-भाजन बनकर अपनी तीक्ष्ण बुद्धि से मेडिकल कालेज में शिष्यवृत्ति भी प्राप्त की।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 2", "text": "कलकत्ता में केशवराव जी का निवास प्रो.बलवंतराव खापर्डे द्वारा 1909 में स्थापित किए गए शांति निकेतन लॉज में था। इस लॉज में श्री गोपालराव देव, डा.नाईक, प्रो.बलवंतराव खापर्डे आदि भी थे। इन लोगों के  सहवास में केशवरावने शीघ्र ही बंगाली भाषा पर भी अधिकार कर लिया। केशवराव के कर्तृत्व से दादासाहब खापर्डे पहलेसे ही परिचित थे,अतएव केशवराव को बलवंतराव खापर्डे के कमरे में रहने का स्थान प्राप्त हुआ। \n   केशवराव वहाँ पहुँचे ही थे कि अंग्रेज सरकार के दूत भी वहाँ उनके पीछे पहुँचे। ये दूत थे डाक्टर गोपाल वासुदेव केतकर। केतकर ने केशवरावजी से बड़ी घनिष्ठता प्राप्त करने का प्रयत्न किया। वे सदैव केशवराव के साथ रहकर उनसे कहते कि हमें राष्ट्र कार्य के लिए गुप्त संस्था स्थापित करनी चाहिए। अतएव उसके लिए बरार मध्यप्रांत के अपनें मित्रों से विचार-विनिमय कर आप मुझे सूचित करें कि ‘इस कार्य के लिए कौन-कौन तत्पर हैं ?’ केशवराव भी कोई कच्चे गुरु के चेले न थे। उन्होंने पहचान लिया कि यह  सी.आई.डी. का व्यक्ति  होना चाहिए। अतएव वे बड़े सतर्क रहकर उनसे व्यवहार करते थे और उन्हींपर नजर  रखकर उन्हींसे  कई गुप्त बातें निकाल लिया करते थे।  केतकर दुर्गापूजा की छुट्टियों में पूना जाते समय नागपुर में श्री गोपालराव ओगले के यहाँ ठहरते थे। 1910 की दुर्गापूजा की छुट्टियों में जब केशवराव नागपुर आए तो उन्होंने श्री गोपालराव जी ओगले को सचेत करते हुए कहा कि केतकर सी.आई.डी. का व्यक्ति मालूम होता है।\n   डा.केतकर जब छुट्टियों से कलकत्ता वापिस लौटते समय  उनके यहाँ  नागपुर में ठहरे तो यह बात श्री गोपालराव ओगले ने उन्हें बताई। कलकत्ता में केतकर की जब केशवरावसे भेंट हुई तो केतकरने कहा,‘केशवराव,क्या आपको मेरे संबंध में ऐसा शक होता है?’ तब केशवराव ने बड़ी चतुराई से उनका समाधान किया।  इसके बाद वे और भी  सतर्क हुए, परन्तु केतकर के सी.आई.डी. होने के बारे में अपना संशय उन्होंने हम लोगों में  से किसी के पास भी प्रकट नहीं किया। मैं केतकर के कमरे में ही था, अतएव  मुझसे इन संबंध  में बताने पर मैं केतकर से शायद पूछ बैठूँ, इसलिए उन्होंने यह बात मुझसे कभी नहीं कही। एक दिन अमरावती के डा.सोमण ने मुझसे यह बात ड़रते-ड़रते कही कि, ‘देखिए सावधान रहिए। केतकर से कभी न कहें।’ मैंने उन्हें इस बात का आश्वासन दिया कि इस बात का उच्चारण भी मैं केतकर के पास न करूँगा। फिर मैं भी केतकर के कार्यों पर दृष्टि  रखने लगा। उसके आधी रात को उठकर कर पत्र आदि लिखने की पद्धति से मुझे भी उसके संबंध में संशय उत्पन्न हुआ। \n   एक दिन मुझे उसका पत्र मिला जो पूना से आया प्रतीत होता था। उस पत्र में लिखा था कि, अभी 25 भेजे हैं, और आवश्यकता हो तो फिर भेजूँगा। नारायणराव सा. वहाँ आनेवाले हैं, उनकी भी चिंता करना। अभी मैं  शिमला जा रहा हूँ। ‘आठ दिन में मैं लौटूँगा तब पत्रोत्तर देना।’ नीचे हस्ताक्षर थे ‘तात्या’। इस पत्र का वृत्तांत मैंने केशवराव से कहा और पत्र भी उन्हें दिखाया। केशवराव की बुद्धि बड़ी तीव्र थी। पत्र देखकर उन्होंने कहा, ‘अरे यह तात्या सी.आई.डी.मालूम होता है। और जिनकी चिंता करने को लिखा है वे नारायणराव सा. याने नारायणराव सावरकर होंगे, क्यों कि वे शीघ्र ही यहाँ आनेवाले हैं।’ हम लोगों ने वह पत्र तो उसके हाथ में जाने दिया और उसके पढ़ लेने पर उसे  फिर  प्राप्त कर लिया। 8  दिन के  बाद जब वह उत्तर लिखने को बैठा तो उसे पता लगा कि उसका पत्र  गायब  है।  तब उसने पत्र की खोज शुरू  की। जब पत्र न मिला तो  वह केशवराव के पास जाकर हाथ-पैर जोड़ने लगा और कहने लगा कि  वह  मेरे भाई का पत्र है। उसे शक हो गया था कि केशवराव ने ही उस पत्र को हम लोगों से उड़वाया है। पर केशवराव ने उससे कहा कि मैं इस  पत्र के संबंध में कुछ  भी  नहीं जानता। बाद में हम लोगों से पत्र के संबंध में पूछताछ करने लगा।  हम लोगों ने उसे उसी समय कमरा छोड़ देने को विवश किया। वह भी समझ गया कि  अब मुझे सभी ने जान लिया है, अतएव कमरा छोड़कर चला गया।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 3", "text": "केशवराव का प्रायः सभी प्रमुख नेताओं से अच्छा परिचय था। बाहर से  आए हुए नेतागण  भी स्थानीय नेताओं के  साथ शांति निकेतन लॉज में आकर केशवराव से परिचय प्राप्त कर लेते थे।  श्याम बाबू से तो केशवराव की बहुत घनिष्ठता थी। \n   श्री श्यामसुन्दर चक्रवर्ती के साथ उनका सम्बन्ध किसी निकट सम्बन्धी सा था । श्यामबाबू के कुटुम्ब में अधिक व्यक्ति थे। आने-जानेवालों की संख्या भी कम नहीं थी। इसलिए आर्थिक कठिनाई सदैव ही रहती थी। जब पैसे की कहीं व्यवस्था नहीं  होती थी तो श्यामबाबू को यह विश्वा स था कि  ‘केशव पैसे की व्यवस्था अवश्य करेगा। इस आशा से जब वे केशव’ कहकर  पुकारते तो केशवराव उनकी आवाज से ही पहचान लेते थे कि  आज श्यामबाबू को पैसे की आवश्यकता है और उनके कुछ कहने के पूर्व ही कुछ न कुछ उन्हें देते ही थे।  श्यामबाबू की लड़की की शादी में भी केशवराव ने उन्हें हिम्मत देकर अनेकों मित्रों द्वारा सहायता कराई तथा उन्हें आर्थिक कठिनाइयों से मुक्त किया। केशवराव का यह स्वभाव आजन्म रहा। स्वयं दरिद्री होते हुए भी  किसी के याचना करने पर उन्होंने उसे  कभी निराश नहीं किया।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 4", "text": "केशवराव  कभी किसी से असंतुष्ट होना तो जानते ही न थे। अपने मित्रों  पर कभी उन्होंने क्रोध नहीं किया। किसी  के सम्बन्ध में उनके अंतःकरण में यदि क्रोध  भी हो तो वे उसे कभी प्रकट नहीं  करते थे। डा. केतकर के सम्बन्ध में यह मालूम होने पर भी कि  वह सी.आई.डी. का व्यक्ति है, उन्होंने उसके  साथ सदा प्रेम का ही व्यवहार रखा। एक समय 1911  में हम लोग ग्रीष्म की छुट्टियों  में कलकत्ते से नागपुर  आ रहे  थे। हम लोगों ने कन्सेशन टिकिट खरीदे थे। मैं तांगा कुली आदि के खर्च  का हिसाब जमा रहा था। गाड़ी चल रही थी। केशवराव मेरे पास आए और उन्होंने मेरी पीठपर जोर से  थपकी लगाई। मैं  जरा सनकी स्वभाव का हूँ । एक  तो हिसाब करने में व्यस्त था फिर पीठपर थप्पड़ भी जोर से पड़ी;  इसलिए क्रोधित होकर मैंने केशवराव को दोनों हाथों से पकड़कर कहा कि, देख, अभी मैं ‘तुझे गाड़ी के बाहर फेकता हूँ।’ मैं इतना क्रोधित हुआ था कि  किसी  की बीच में  पड़ने की एकाएक हिम्मत न हो सकी। थोड़े समय के बाद कुछ मित्र बीच में पड़े और उन्होंने  केशवराव  को मेरे हाथों छुड़ाकर दूसरे  डिब्बे  में बैठाया। एक डिब्बे से दूसरे डिब्बे  में जाने का रास्ता था। आधे घण्टे के बाद केशवराव फिर मेरे पास आए और हँसते हुए उन्होंने मुझे कहा, ‘क्यों रे, अभी ठण्डा हुआ या नहीं ?’ फिर उन्होंने हिसाब करने में पुरी मदद की।  ऐसा मालूम हुआ मानो पहले कोई विशेष घटना हुई ही नहीं थी।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 5", "text": "लड़ाई  का अनुभव प्राप्त करने की इच्छा से 1922 में ग्रीक-टर्किश लड़ाई के समय हम लोगों ने केशवराव के नेतृत्व में डा. सुहरावर्दी खान के पास जाकर अपने नाम dispensing  व  dressing medical aid पथक में लिखा  लिए  थे।  \n   कलकत्ता में दामोदर नदी का बाँध टूट जाने से दामोदर-फ्लड रिलीफ   मिशन द्वारा वर्धमान आदि जिलों में  लोगों की सहायता करने के जो केन्द्र खोले गए थे उन में भी जनता की सेवा करने के उद्देश्य से केशवराव के नेतृत्व में हम लोग शामिल हुए थे।  वर्धमान केन्द्र के समीप के देहातों में रातोंरात पैदल तथा नावों पर प्रवास कर लोगों को ब्लैंकेट, पोहा, चावल, नमक, गुड आदि वितरण करने का कार्य हम लोग करते थे। मिशन का स्टॉक समाप्त होने पर धनी मारवाडियों की सहायता समिति में भी स्वयंसेवक बनकर हम लोगों ने कार्य किया। गंगासागर में उस दिनों कॉलरा शुरू हो गया था, अतएव  वहाँ जाकर भी दवा आदि का प्रबन्ध हम लोग करते थे। \n   केशवराव के साथ श्री. रामकृष्ण  परमहंस के दक्षिणेश्व र मठ में हम लोग कुछ दिन रहे। \n1912 में श्री. सुभाषचन्द्र  बोस द्वारा कलकत्ते में स्वदेशी प्रदर्शनी का आयोजन हुआ था। उसमें भी केशवराव के नेतृत्व में हम लोगों ने स्वयंसेवक बनकर कार्य किया।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 6", "text": "संभवतः 1913 में कलकत्ता में एक  ‘convention’ (अभिसामयिक सभा) था उसमें भी  स्वयंसेवक की हैसियत से हम लोगों ने काम किया था।  मद्रास के प्रतिनिधियों का प्रबंध हम लोगों को सौंपा गया था। वहाँ पर भोजन के लिए केवल चावल मिलता था।  अतएव  हम लोगों को तो भूखे ही रहना पड़ता था। तब केशवराव के परिचय के कारण जनरल सेक्रेटरी से अनुमति प्राप्त कर हमारे भोजन की व्यवस्था पुराने मध्यप्रान्त के प्रतिनिधियों के शिविर में हुई।\n   इस तरह कलकत्ता में प्रायः भिन्न-भिन्न संस्थाओं में कार्य कर केशवराव ने अनेकों व्यक्तियों से परिचय प्राप्त कर राष्ट्र कार्य के भिन्न-भिन्न अंगों का अनुभव प्राप्त किया। केशवराव के मित्रवर्ग  में सभी जाति के  लोग सम्मिलित  थे। उनमें अनेकों अहिंदु भी थे।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 7", "text": "कलकत्ते में  एक मौलवी लियाकत हुसेन खाँ थे। उनका स्वभाव बड़ा उदार था। वे पक्के देशभक्त थे, परन्तु जरा सनकी स्वभाव के थे। केशवराव का जिनसे घनिष्ठ सम्बन्ध  था उनमें इनकी भी गणना थी। वे भी केशवराव पर बड़ा स्नेह रखते थे। इनके द्वारा निकाले गए जुलूसों में केशवराव अवश्य ही सम्मिलित  रहते  थे। एक  बार इनके जुलूस में  केशवराव हाथ में  ध्वज लेकर चल रहे  थे कि एक  युरोपियन पुलिस अफसर आया और केशवराव से मराठी में बोलने लगा। उसे इस तरह मराठी में बोलते देख केशवराव को बड़ा आश्चहर्य हुआ।  बाद में उन्हें पता लगा कि महाराष्ट्रीय पद्धति के अनुसार बाल काटकर सिर पर घेरा रखने के कारण उन्हें उस अफसर ने महाराष्ट्रीय जाना था, तो उन्होंने उस तरह बाल रखना बन्द कर दिया।"}, {"person": "", "title": "कोलकाता जीवन के संस्मरण 8", "text": "1914  में परीक्षा हो जाने पर भी केशवराव कलकत्ते में ही रहे। उन दिनों गवर्नर  जनरल का आगमन कलकत्ते में होनेवाला था। उसके  आने के तीन चार दिन  पूर्व हम  लोग रात  को 10 बजे लॉज  पर यों ही  बातचीत कर रहे थे  कि  सहसा केशवराव को किसीने नीचे से  पुकारा। वे नीचे  पहुँचे और दरवाजा खोलकर देखा तो पुलिस सामने खड़ी थी। पुलिस ने उन्हों उसी स्थिति  में पकड़कर मोटर में बिठाला और लालबाजार  पुलिस थाने पर ले गई। उस समय जुलूस में उनसे मराठी बोलनेवाले उसी युरोपियन पुलिस अफसर ने उनका पूरा नाम कोर्ट को बताया था। गवर्नर जनरल के जाने के बाद फिर उन्हें छोड़ा गया।"}, {"person": "", "title": "संस्मरण 3", "text": "केशवराव जब से कलकत्ता आए तभी से पुलिस सदैव उनके पीछे लगी रहती थी।  वे जब कभी नागपुर जाते, सी.आय.डी. पुलिस सदैव उनका पीछा करती थी। जहाँ कहीं वे ठहरते, वहाँ उनके रिश्तेदारों को भी पुलिस तंग करती। अतएव पुलिस को भी सदैव छकाते रहना उनका काम ही हो गया था। कई बार  पुलिस भी उनसे तंग आ जाती थी। एक समय उन्हें नागपुर से जबलपुर और वहाँ से कलकत्ते जाना था। उन्होंने अपने कलकत्ते जानेवाले एक मित्र से जबलपुर का टिकिट खरीदवाया और उसके लिए  कलकत्ते का टिकिट  स्वयं  खरीद कर रेल में बैठे।  उनके डिब्बे  में  बैठने पर एक टिकिट चेकर आया और उसने सब के टिकिट  देखते हुए उनका भी टिकिट देखा। बादमें उसने पुलिस को  उनके कलकत्ता जाने की खबर दी। गाड़ी छूटते समय एक पुलिस सिपाही उनके डिब्बे में बैठकर साथ चला। गोंदिया स्टेशन पर मित्र के द्वारा अपना सामान जबलपुर की ट्रेन में च़ढ़ाकर और पुलिस की दृष्टि से बचकर वे  पानी पीने प्लेटफार्म पर उतर पड़े और सीधे जबलपुर की गाड़ी में जा बैठे।  इधर पुलिस  ने  बहुत खोज-बीन की पर  कहीं पता न लगा।  बेचारा कलकत्ते आकर 8 दिन तक उनके दरवाजे पर चक्कर काटता रहा। और डाक्टर जब जबलपुर होकर कलकत्ते पहुँचे तब अपना चार्ज  देकर फिर नागपुर वापिस  गया।"}, {"person": "", "title": "संस्मरण 4", "text": "इस तरह अनेकों कठिनाइयों का सामना करते हुए और अनेकों अनुभव प्राप्त करते हुए उन्होंने  डाक्टरी  की  पदवी प्राप्त  की और नागपुर लौटे। यहाँ आकर वे डाक्टरी  शुरू  करेंगे  ऐसी अनेकों की  कल्पना थी, परन्तु  उनके मनमें यह विचार कभी आया ही नहीं। उन्होंने  अपने जीवन की दिशा पहले से निश्चिरत कर ली  थी।  1924 में अनेकों राजनैतिक, सामाजिक एवं क्रांतिकारी आंदोलनों का सूक्ष्म  निरीक्षण कर वे नागपुर  आए। नागपुर आने पर उन्होंने अनेकों राजकीय कार्यों में सक्रिय भाग लिया। नागपुर के अनेकों नेताओं से मिलकर और विचार विमर्श कर उन्होंने वहीं एक दैनिक पत्र प्रारम्भ करने का निश्चरय किया। ‘स्वातंत्र्य प्रकाशन मण्डल’ नामक एक संस्था गठित कर उसमें अच्छे-अच्छे प्रभावी व्यक्तियों को पदाधिकारी बनायाएवं उनके पत्र लेकर उन्होंने सारे प्रान्त का स्वयं प्रवास कर धनसंग्रह किया तथा कुछ दिनों तक यह पत्र चलाया।अन्त में धन के अभाव में यह कार्य यशस्वी न हो सका। इन दिनों सारे प्रान्त में उनका जो परिचय हुआ उसको कायम  रखकर उसका लाभ उन्होंने संघकार्य की वृद्धि करने में उठाया।"}, {"person": "", "title": "संस्मरण 5", "text": "1920 में असहयोग आंदोलन के समय वर्धा जिले में ‘खरांगणा’ नामक ग्राम में एक परिषद् के  लिए केशवराव, समीउल्लाखान आदि व्यक्ति एक ही मोटर में नागपुर से वर्धा जा रहे थे। समीउल्लाखान के सिर पर तुर्की टोपी थी। उसे देखकर केशवराव ने हँसते हुए उनसे कहा, ‘क्यों जी आप असहकारवादी होते हुए भी गांधी टोपी न पहनकर तुर्की टोपी क्यों पहनते हैं ?’ तब समीउल्लाखान ने उत्तर दिया, ‘केशवराव, यह हमारी राष्ट्रीयता का प्रतीक है। इसे हम कैसे छोड़ सकते हैं?’ इस घटना का केशवराव पर बड़ा प्रभाव पड़ा। उन्हें यह विश्वाउस हुआ कि जो लोग अपनी राष्ट्रीयता को इस तरह भारत की राष्ट्रीयता से भिन्न अनुभव करते हैं उनका भारतीय स्वातंत्र्य-संग्राम में विशेष उपयोग नहीं हो सकता।"}, {"person": "", "title": "संस्मरण 6", "text": "इस प्रकार सन् 1915 से  लेकर 1925 तक पुराने बरार मध्यप्रान्त  में रहकर वे उत्साह से अनेक राष्ट्रकार्यों में सम्मिलित होते रहे।  लोकमान्य एवं गांधीजी के आंदोलनों में भी उन्होंने सक्रिय सहयोग दिया और उनका भी अध्ययन किया। पर कहीं भी उन्हें समाधान प्राप्त नहीं हुआ। इतने दिनों के अनुभव के बाद उन्होंने स्वयं की एक कार्यपद्धति निर्मित की। इस पद्धति से आसेतु हिमाचल एक राष्ट्रव्यापी हिंदुओं का संगठन निर्माण करने से ही इस राष्ट्र का कल्याण हो सकेगा, यह उनका निश्चिित विचार हुआ। इसलिए अनेक नेताओं से संघस्थापना के पूर्व उन्होंने विचार-विमर्श किया। पर आत्मविश्वांस, साहस एवं आजीवन त्याग करने की सिद्धता के अभाव में कोई भी इतना बड़ा कार्य करने को तैयार न हुआ। उनमें स्वयं  नेता होने की आकांक्षा नहीं थीऔर दूसरा व्यक्ति खोजने पर भी नहीं मिलता था। इस तरह समय बीतता चला जा रहा था। उनकी दृष्टि इस  समय अमरावती-व्यायाम-शाला पर पड़ी। इसे केन्द्र बनाकर भारतवर्ष में  उसकी शाखाएँ स्थापित कर उनका ठीक से नियन्त्रण  एवं संचालन क्यों न किया जाए,इस विचार से वे डा. शिवाजीराव पटवर्धन से मिले। पर इतना बड़ा कार्य हम लोग सम्हाल न सकेंगे,ऐसा पटवर्धन जी ने कहा। केशवराव ने सारा उत्तरदायित्व स्वयं स्वीकार करने को तैयार  होकर, उन्हें केवल नेतृत्व करने को कहा, पर वह कल्पना शिवाजीराव को पसंद नहीं आई। अंत में जीवन बीतता चला जा रहा है और कोई भी योग्य व्यक्ति आत्मविश्वापस से इस कार्य को करने सामने नहीं आता, यह देख उन्होंने स्वयं ही 1925 में विजयादशमी के सुमुहूर्त पर राष्ट्रीय स्वयंसेवक संघ की नींव डाली।"}, {"person": "", "title": "प्रथम  परिचय", "text": "मनुष्य के  जीवन में ऐसे कई  अवसर आते हैं जब उनके जीवन में क्रांति  हो जाती है और  उसकी जीवन-धारा एकाएक दूसरी ही दिशा में प्रवाहित होने लगती है। किन्तु जिस समय ऐसी घटनाएँ घटित होती हैं उस समय उनका महत्त्व ध्यान में नहीं आता और जब कभी मनुष्य अपने पूर्वायुष्य का स्मरण करता है तब ऐसे प्रसंगों की ओर उसका ध्यान आकर्षित हो जाता है। डाक्टर जी का और मेरा प्रथम परिचय होने की घटना ऐसी ही महत्त्वपूर्ण है।  \n   सन्  1911 की बात  है। दिल्ली दरबार  होने जा रहा था। उसके संबंध में छोटे से लेकर बड़ों तक सभी के अन्तःकरण में एक चिढ़ सी निर्माण हो गई थी। इस कार्यक्रम का बहिष्कार करने का आन्दोलन सारे देश में चल रहा था। मैं उस समय केवल 13 वर्ष का स्कूल में पढ़नेवाला बालक मात्र था। हम विद्यार्थियों ने मुझे अपना प्रतिनिधि बनाकर आंदोलन कैसे चलाया जाए इस सम्बन्ध में विचार-विनिमय करने के निमित्त डाक्टर जी से मिलने नागपुर भेजा। लिए वे सदैव ही प्रेरित किया करते थे। उन दिनों लोकमान्यजी के नेतृत्व में ‘होम रूल लीग’ का आंदोलन भारतवर्ष में बड़े जोरों से चल रहा था। इस आंदोलन को तीव्र गति देने के लिए भरसक कार्य करने का डाक्टरजी ने हमें आदेश दिया। \n   प्रांत के प्रत्येक समाज-जागृति के कार्य में डाक्टरजी सक्रिय भाग लिया करते थे। पुराने मध्यप्रांत में गांधी-जयंती का उत्सव सर्वप्रथम प्रारंभ करने की कल्पना के जनक श्री.जमनालालजी थे। उस समय ‘जमनालालजी बजाज रायबहादुर’ थे। राजकीय पक्ष की दृष्टि से उनकी गिनती नरम दल में थी। किन्तु वृत्ति से वे उत्कृष्ट देशभक्त थे। महात्माजी की जयंती वर्धा में मनाई जाए ऐसी इच्छा उन्होंने 1918 में प्रकट की। और इस प्रकार महात्माजी की जयंती का प्रथम समारोह उनकी इच्छानुसार वर्धा में मनाया गया। उसमें डाक्टरजी  का तथा मेरा सक्रिय सहयोग था ।\n   डाक्टरजी अपने व्याख्यानों में संपूर्ण स्वातंत्र्य की कल्पना बड़े ही ओजस्वी भाषा  में लोगों  के  सामने रखा करते थे। गणेशोत्सवों में छोटे-छोटे गाँवों में जाकर व्याख्यान देना उन दिनों डाक्टरजी का महत्त्व का कार्यक्रम था। वर्धा में राष्ट्रीय गणेशोत्सव मंडल की ओर से प्रतिवर्ष डाक्टरजी का एक व्याख्यान तो निश्चिरत ही रहता था। वर्धा के गणेशोत्सव मंडल के प्रभाव से इस प्रांत में असहयोग आंदोलन के लिए आवश्यक वातावरण निर्माण होने में बड़ी सहायता हुई। श्री. जमनालालजी बजाज द्वारा वर्धा  में स्थापित हुए असहयोग लीग  के प्रचार कार्य को भी बड़ी जोरों से गति मिली। डाक्टरजी ने व मैंने भी इस आंदोलन में प्रमुख पदों पर रहकर कार्य किया था। \n   गणेशोत्सव के अतिरिक्त  वर्धा जिले में जो अन्यान्य राजकीय समारोह होते थे उसमें प्रायः अधिकांश स्थानों पर अध्यक्षपद के लिए जनता डाक्टरजी को चुनती थी। इसी से उनके नेतृत्व एवं कर्तृत्व की कल्पना की जा सकती है। \n   प्रांत के किसी भी सार्वजनिक कार्य का उत्तरदायित्व डाक्टरजी पर ही आ पड़ता था। 1918 में लोकमान्यजी का पुराने मध्यप्रांत बरार का दौरा था। लोकमान्य के कार्यक्रमों  की समुचित व्यवस्था करने के निमित्त डॉक्टरजी ने सारे  प्रांत में स्वयं प्रवास किया। 1920 में नागपुर में हुए काँग्रेस के अधिवेशन  में वे स्वयंसेवक दल के कार्यवाह थे। काँग्रेस के क्षेत्र में डाक्टरजी का स्थान महत्त्व का था। वे प्रांतीय कांग्रेस कार्यकारिणी के सदस्य थे। मैं भी कई वर्ष नगर, तहसील तथा प्रांतीय काँग्रेस कमेटी का मंत्री था।"}, {"person": "", "title": "कारागृहवास", "text": "किसी भी राष्ट्रीय आंदोलन की प्रतिष्ठा  अपने हाथ से कम न हो इसलिए डाक्टरजी अत्यंत सावधान रहते थे। 1921 के असहयोग आंदोलन में जब उन पर मामला चल रहा  था, उस  समय जमानत देकर छूट आने की अनेक मित्रों की सलाह को केवल महात्माजी द्वारा  चलाए गए आंदोलन की  प्रतिष्ठा रखने के लिए उन्होंने ठुकरा दिया और एक  वर्ष का सश्रम कारावास सहर्ष स्वीकार किया। ।"}, {"person": "", "title": "काँग्रेस के अंतर्गत स्वयंसेवक संगठन", "text": "1922 में कारागृह से छूट आने पर कांग्रेस में स्वयंसेवक संगठन को प्रस्थापित करने की आवश्यकता का अनुभव करते हुए उन्होंने अपनी कल्पना के अनुसार काँग्रेस के अन्तर्गत स्वयंसेवक संगठन की नींव डाली। संगठन का ज्ञान प्राप्त करने हेतु तहसील से चार लोग बुलवाने की उनकी योजना थी। उसके अनुसार वर्धा तहसील से श्री. सर्जेराव  निंबालकर, श्री. आबासाहब घाडगे आदि चार  लोगों को मैंने भेजा था।  इन स्वयंसेवकों को शिक्षण देकर उनके द्वारा अपनी-अपनी तहसील में और अधिक स्वयंसेवक निर्माण करने की  डॉक्टरजी की योजना  थी। किन्तु  नेताओं द्वारा  इन स्वयंसेवकों  का  उपयोग सभाओं की कुर्सियाँ उठाने और बिछायत बिछाने आदि कामों में किया जाता देख और स्वयंसेवकों के संबंध की उनकी इस कल्पना  को  देखकर डाक्टरजी का हृदय दुःखित हुआ। स्वयंसेवक याने टेबल-कुर्सी उठानेवाला, बोझा ढ़ोनेवाला नहीं; वह तो एकनिष्ठ देशभक्त होना चाहिए, ऐसी डाक्टरजी की कल्पना थी। उनकी इस कल्पना को इससे बड़ा धक्का पहुँचा और अपनी  योजना के  अनुसार  स्वयंसेवक  निर्माण  का कार्य स्वतंत्र संगठन प्रस्थापित करके ही किया जा सकता है यह भावना उनके अंतःकरण  में दृढमूल  हो गई। ।"}, {"person": "", "title": "स्वराज्य के अर्थ", "text": "कांग्रेस के आंदोलन स्वराज्य प्राप्ति के लिए चल रहे थे। किन्तु कांग्रेस  के अंतर्गत भी दो दल थे। एक साम्राज्यांतर्गत स्वराज्यवाले तथा दूसरे पूर्ण स्वराज्यका समर्थन  करनेवाले। पुलगाँव में हुई राजकीय परिषद् में डाक्टरजी ने अपने भाषण में साम्राज्यांतर्गत  स्वराज्य का पुरस्कार करनेवाले डा. मुंजे, जमनालाल बजाज आदि का तीव्र शब्दों में निषेध किया। जहाँ एक ओर डा. मुंजे, अभ्यंकर, जमनालाल  बजाज आदि कार्यकर्ता साम्राज्य का पुरस्कार करनेवाले थे वहाँ दूसरी ओर डाक्टरजी, श्री. घटवाई, वीर हरकरे, श्री. वामनराव घोरपड़े, श्री. अप्पाजी तिजारे आदि युवकवर्ग संपूर्ण स्वातंत्र्य का पुरस्कार करते थे। महात्माजी द्वारा ‘उच्चारित स्वराज्य’ शब्द के पीछे अपनी वृत्ति के अनुसार साम्राज्यांतर्गत तथा संपूर्ण आदि विशेषण जोड़ कर कार्यकर्ताओं ने एक वाद निर्माण किया जिसके फल-स्वरूप  उपरोक्त दो दल निर्माण हुए।"}, {"person": "", "title": "एक प्रसंग", "text": "1920-21 में नागपुर में  शराबबन्दी का आंदोलन  चल रहा था। इस आंदोलन के संबंध  में आयोजित एक सभा पर सरकार द्वारा गोलीकांड की एक  घटना हुई। इस गोलीकांड का विरोध करने एक आम सभा बुलाई गई थी। इस सभा को भंग  करने का पुलिस एवं शराब के व्यापारियों ने निश्चहय किया। आम सभा चल रही थी। डाक्टरजी का भाषण समाप्त  हुआ। उसके पश्चाुत् दूसरे  वक्ता का भाषण प्रारम्भ हुआ ही था कि सभा को भंग करने का विचार करनेवलों में से ‘किसी ने आया रे आया’ ऐसा जोर का हल्ला मचाया। इतनी बड़ी प्रचण्ड सभा, परन्तु आवाज आने मात्र की देर थी कि सब लोग सिर पर पैर रख कर इधर-उधर भागने लगे और केवल कुछ ही क्षणों में लोगों के तितरबितर हो जाने के बाद सभा भंग हो गई। सरकार का निषेध करने  के लिए एकत्रित हुए जन-संमर्द को पुलिस के आने के केवल काल्पनिक भय से इस प्रकार केवल एक क्षण में भागते देख डाक्टरजी आश्चनर्य से द्ङ्मिूढ़ हुए और इस घटना से  राष्ट्र कार्य के संबंध में उनके विचारों को एक दूसरी ही दिशा मिली।\n   अपने देश में निश्चिलत विचार से कार्यप्रवृत्त होनेवाले कार्यकर्ताओं की कमी का इस  प्रसंग से उन्होंने अनुभव किया। केवल तमाशबीन बनकर लोग इकठ्ठे होते हैं इसी से ऐसे प्रसंग निर्माण होते हैं, इस बात का अनुभव कर अपनी नवीन कल्पनानुसार निश्चिेत विचार से कार्य-प्रवृत्त होने की वृत्ति समाज के अंदर निर्माण करने की कल्पना उन्होंने उस  समय के  अपने सहयोगी श्री. ग.त्र्यं. माडखोलकर, कर्मवीर पाठक आदि के सामने रखी। 1922 से  25 तक अनेकों बार तिलक विद्यालय में उन्होंने कार्यकर्ताओं की बैठकें लेकर इस संबंध में विचार-विमर्श किया, किन्तु कई कारणों से इन बैठकों से कोई विशेष परिणाम नहीं हुआ। \n   राष्ट्रकार्य में इस प्रकार तन्मयता से एवं साहस के साथ कार्य करनेवाले डाक्टर जी को धन की तो अत्यंत कमी थी। 1922 में गया-काँग्रेस के अधिवेशन में हमारे दलों के अंतर्गत झगड़ों का निर्णय करने श्री. चित्तरंजन दास आनेवाले थे। अतएव  हमारे  दल  की ओर से  डाक्टरजी भी  गया पधारें ऐसी मैंने उन्हें प्रार्थना  की। उन्होंने उसे स्वीकार भी किया। पर ठीक समय पर न आए। मैं केवल अकेला ही था। अतएव  गया से  वापिस आने पर इसके लिए मैंने उन्हें दोष दिया। उस समय उनके मुखपर जो भाव मैंने देखे उससे मैं स्वयं ही लज्जित हुआ। बाद में घर जाने पर डाक्टर जी ने कहा अप्पाजी ! मैं आने के लिए तैयार बैठा था; किन्तु ‘ठीक समय पर जिस सज्जन से मैंने पैसे उधार  माँगे थे, वे न दे सके अतएव मुझे चुपचाप बैठना पड़ा।’ इस प्रकार आर्थिक कठिनाइयों से डाक्टरजी को कितने कष्ट होते थे इसका यह एक उदाहरण मात्र है। ‘ऐसे कई प्रसंग आज भी मेरे सामने हैं।’"}, {"person": "", "title": "दैनिक स्वातंत्र्य के संपादक", "text": "1922-23 में नागपुर में कार्यकर्ताओं के दो दल थे। एक डा. मुंजे का, जिसे ‘लोग 16 सर्कल’ कहा करते थे। (इसके अन्तर्निहित विचित्र विनोद से  नागपुर-वासी परिचित हैं।) और दूसरा स्वातंत्र्यवादी दल। दूसरे दल में श्री. भैयासाहब बोबडे,\n   कै. बाबासाहब पाध्ये, कै. वासुदेवराव फडणीस, श्री. मंडलेकर, श्री. गोपालराव देव, डा.खरे एवं खुद डाक्टरजी थे। इस दल की ओर से एक ‘स्वातंत्र्य’ नाम का दैनिक प्रारम्भ किया गया था। पहले सुप्रसिद्ध साहित्यकार श्री. अच्युतराव कोल्हटकर इस का सम्पादन करते थे। डाक्टरजी इस पत्र के ग्राहक बनाने गाँव-गाँव में घूमते रहे। बाद में उसके संपादन का उत्तरदायित्व भी उन्हीं पर ड़ाला गया। आर्थिक दुरावस्था से यह पत्र कुछ  काल में ही बन्द हो  गया।"}, {"person": "", "title": "व्यायामशाला तथा अभ्यास", "text": "संघ-स्थापना के पूर्व नागपुर व्यायामशाला से उनका सम्बन्ध था। श्री  अण्णा सोहनी, श्री. दत्तोपंत मारुलकर के साथ उन्होंने महाराष्ट्र व्यायामशाला  की स्थापना की। व्यायाम संस्थाओं  की ओर उनका विशेष ध्यान था। कई  स्थानों पर उन्होंने अभ्यास-मंडल की स्थापना की। नागपुर के अभ्यास- मंडल का कार्य वे स्वयं देखा करते थे। इन मंडलों को शिक्षा-प्रसारक-मंडल नाम उन्होंने दिया था।"}, {"person": "", "title": "दूरदर्शिता", "text": "हिन्दुस्थान के उज्ज्वल भविष्यकाल के सम्बन्ध में उन्हें असीम विश्वाकस था।  1922 में ही वे कहा करते थे कि 1940 के आसपास  का काल  भारतवर्ष की स्वतंत्रता-प्राप्ति के लिए अनुकूल होगा। अतएव उस समय तक अंग्रेजों की सत्ता को समाप्त कर अपना स्वातंत्र्य प्राप्त करने के लिए आवश्यक सामर्थ्य हमें समाज में निर्माण करना चाहिए, यह कल्पना उन्होंने कई बार मुझसे कही। डाक्टरजी की दूरदृष्टि का अनुमान इसीसे लगता है। 1922 से 25 तक के काल में संघ-कार्य की रूपरेखा उन्होंने हम लोगों के समक्ष रखी। उनके हाथों ही यह विराट कार्य होनेवाला है यह अनुभूति अपने अंतःकरण में उनको होती थी।"}, {"person": "", "title": "संघ स्थापना", "text": "1925 के मई माह में काँग्रेस अधिवेशन के बाद लौट कर मेरी और डाक्टरजी की भेंट हुई। उस समय संघकार्य की स्पष्ट कल्पना उन्होंने मुझे दी। मई व जून में भी इस सम्बन्ध में हमारी दो तीन बार भेंट हुई और इस विषय पर काफी चर्चा हुई। और अंत में इस प्रकार की स्वतंत्र संघटना की नींव डालने का निश्चंय कर वे इस कार्य में प्रवृत्त हुए। \n   उनकी एकचालकानुवर्तित्व की कल्पना से मेरा प्रथम मतभेद था। मैंने उनके साथ इस संबंध में काङ्गी बहस भी की। उन्होंने मेरी विचार-धारा के व्यावहारिक दोष स्पष्ट रीति से दिग्दर्शित कर अपने विचार मेरे सामने रखे और मेरा समाधान किया। विरोधी विचारों के लोगों को अपने विचार पूर्णतया जँचा देने में वे बड़े कुशल थे। अपनी कुशाग्र एवं तीक्ष्ण बुद्धि से दूसरों की विचार-धारा के गुणदोष वे स्पष्ट रूप से दिग्दर्शित करते थे। \n   अपनी स्वयंस्फूर्त योजना के अनुसार विजयादशमी के मंगल मुहूर्त पर उन्होंने राष्ट्रीय स्वयंसेवक संघ रूप ईश्वषरीय कार्य का प्रारम्भ किया। मेरे घर देवी के नवरात्र का कुलाचार होने से मैं उस दिन नागपुर न आ सका। श्री. अण्णा सोहनी, श्री. देवघरे, श्री. नारायणराव वैद्य आदि इने-गिने लोग ही उस दिन डॉक्टरजी के यहाँ एकत्र हुए थे। शीघ्र ही शाखा का प्रारंभ हुआ। 20-25 दिन बाद मैं भी नागपुर आकर शाखा में उपस्थित हुआ। 6 माह के उपरांत ‘राष्ट्रीय स्वयंसेवक संघ’ ऐसा नामकरण भी हुआ। 1926 में मैं संघ का प्रतिज्ञित स्वयंसेवक बना। \n   इस प्रकार संघस्थापना के पूर्व क्रांतिकारी आंदोलन, काँग्रेस, हिन्दू महासभा, राष्ट्रीय शाला,व्यायाम-शालाएँ, वृत्तपत्र, अभ्यास मंडल, गणेशोत्सव, राजकीय समारोह एवं सम्मेलन आदि अनेक सामाजिक तथा राजनैतिक कार्यों का प्रत्यक्ष अनुभव प्राप्त कर उनकी मूलग्राही बुद्धि द्वारा किए गए अंतिम निर्णय का प्ररिपक्व फल व्यक्त स्वरूप में आज आसेतु-हिमाचल फैले हुए राष्ट्रीय स्वयंसेवक संघ के रूप में हमें मिला। सामाजिक उन्नति एवं राजकीय स्वातंत्र्यप्राप्ति के जो अनेक उद्योग भिन्न-भिन्न कार्यकर्ताओं द्वारा अत्यंत सद्हेतुपूर्वक तथा निःस्वार्थ-बुद्धि से किए गए उनमें से युवकों के अंतःकरण में राष्ट्रीयता के स्थायी भाव प्रज्ज्वलित होना कठिन है ऐसा अनुभव कर, अन्त में अखिल हिन्दू समाज के हृदय में सच्ची राष्ट्रीयता पर पड़ी हुई आत्म-विस्मृति की राख को फूँककर, अपनेपन का परिचय करा देने हेतु तथा इस मोहग्रस्त समाज को आत्मसामर्थ्य की प्रतीति करा देने के लिए जिस ध्येयवाद को समाज के समक्ष रखने की आवश्यकता थी, और जो संस्कार नवोदित युवकों पर करने की आवश्यकता थी, उसका उत्कृष्ट आयोजन तथा संयोजन उन्होंने राष्ट्रीय स्वयंसेवक संघ के ध्येय तथा कार्यप्रणाली में किया। दीर्घकालीन पारतंत्र्य से पीड़ित एवं निःसत्व हुए हिन्दू समाज में जीवन-ज्योति की ज्वाला प्रज्ज्वलित की जा सकती है, उसके लिए केवल योजना की आवश्यकता है। अमंत्रमक्षरं नास्ति, नास्ति मूलमनौषधम्॥ अयोग्यः पुरुषो नास्ति, योजकस्तत्र दुर्लभः॥ इस सुभाषित के अनुसार हिन्दू समाज का आत्मोद्धार करने हेतु ‘एष पन्थाः एतत् कर्म’ इन सुनिश्चिपत शब्दों में मार्गदर्शन करनेवाले योजक की आवश्यकता थी। हिन्दू समाज के संकटकाल में ऐसे योजक सतत निर्माण होते आए हैं और आगे भी होंगे। स्वयं के जीवन में सब प्रकार के कार्यों का अनुभव कर राष्ट्रोद्धार का जो मार्ग उन्होंने उचित समझा और हम लोगों को बतलाया, यदि उसी मार्ग से हमारा समाज चलने लगे तो थोडे समय में सब प्रकार के संकटों को पार कर हम फिर सुखी जीवन का निर्माण कर सकेंगे इसमें कोई संदेह नहीं है।।"}, {"person": "", "title": "संघ निर्माता का अंतरंग", "text": "स्वर्गीय परम पूजनीय डा. केशव बलीराम हेडगवार ने सन 1925 में विजयादशमी के शुभ मुहूर्त पर भारत की सर्वांगीण उन्नति का ध्येय अपनी आँखों के समक्ष रखकर राष्ट्रीय स्वयंसेवक संघ नामक संघटना की स्थापना की। भारतवर्ष में कोई बिरला ही मनुष्य होगा जो संघ की कार्यप्रणाली या विचारधारा से अनभिज्ञ हो। संघ संस्थापक की अपेक्षा संघ-कार्य का ही ज्ञान लोगों को अधिक होने के कारण उनके विषय की कुछ स्मृतियाँ पाठकों को अवगत हो जाएँ इसीलिए यह लेख लिख रहा हूँ।\n   कुछ स्मृतियाँ इसलिए कि उनका जीवन इतना विशाल था, उनका हृदय इतना विशुद्ध था, उनकी मातृभूमिपर निष्ठा इतनी अक्षुण्ण थी, उनका संघटना-कौशल्य इतना अनोखा था तथा उनका चरित्र, शक्ति व अंतःकरण इतना शुद्ध था कि उन सबको शब्दों द्वारा वर्णन करना मेरे समान अल्पबुद्धिवाले मनुष्य के लिए अशक्य सा है। अत्यंत गरीब तथा साधारण कुल में जन्म लेने पर भी वे अपने असामान्य कर्तृत्व के कारण असाधारण बन गए। उन्होंने भारतमाता की स्वयंस्फूर्ति से सेवा करनेवाले स्वयंसेवक निर्माण करने के लिए संघ की स्थापना की। संघटना का प्रत्येक स्वयंसेवक आदर्श हो, मातृभूमि का वह सच्चा उपासक हो, उसका जीवन स्वार्थ-रहित हो, वह राष्ट्र की सेवा प्रामाणिकता व अंतःकरण से करे इसलिए उन्होंने खूप-पसीना एक कर दिया; जिसे करते हुए उनके भव्य तथा दृढ़ शरीर पर उस प्रचंड कार्य का इतना असर पड़ा कि तरुण आयु में ही उनके पार्थिव देह ने इस लोक की यात्रा समाप्त कर दी।\n   डाक्टरजी ने संघ के स्वयंसेवकों में संघटना के लिए आवश्यक सद्गुण निर्माण करने हेतु कभी उपदेश नहीं दिया और न उनके अवगुणों के कारण कभी कान ही उमेठे। अपितु सारे सद्गुण स्वतः अंगीकार कर उनके अनुसार आचरण करके दिखलाया। अपने उदाहरण से लाखों युवकों को मातृभूमि की सेवा के लिए उद्युक्त किया। उन्होंने कुशलता तथा सरलता से स्वयंसेवकों को योग्य मार्गदर्शन किस प्रकार किया यह निम्न उदाहरण से ही ध्यान में आएगा।\n   संघ के  आरंभ में डाक्टरजी के अतिरिक्त अन्य किसी को संघकार्य की स्पष्ट कल्पना का न होना स्वाभाविक ही था। अथवा डाक्टरजी ने उस प्रकार कल्पना देने का प्रयत्न किया होता तो उस समय की परिस्थिति में वह कहाँ तक हृदयंगम होता यह कहना कठिन है, इसीलिए उन्होंने संघटनाशास्त्र के रसायन का एक-एक घूँट स्वयंसेवकों की नब्ज देखते हुए पिलाया। संघटना होना अर्थात् उसके घटकों में परस्पर प्रेम, पारस्परिक सुख-दुःख में समरस होने की भावना, भ्रातृभाव, सहकार्य की भावना इत्यादि बातें आना चाहिए। पर ये बातें एक भाषण से पूरी हो सकती हैं ऐसा समझना भारी भूल होगी। आरंभ में सायंकाल को स्वयंसेवक भिन्न-भिन्न कार्यक्रम एक घण्टे तक कर उसी समय संघस्थान को छोड़कर चला जाता था, यह बात डाक्टरजी को पसन्द न थी,फिर भी उन्होंने किसी के पास शब्द द्वारा भी अपनी अनिच्छा प्रकट नहीं की। पर उन्हें स्वयंसेवकों के मन पर यह व्यायामशाला नहीं, संगठन है यह बात अंकित करना आवश्यक माल
