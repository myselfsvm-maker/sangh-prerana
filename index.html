होने वाले कार्यक्रमों में पूर्ण मनोयोग से भाग लेना चाहिए....आदि बातों पर श्री गुरुजी का बहुत आग्रह रहता था। कुछ लोग कहते थे कि इन छोटी-छोटी बातों का पालन किया या नहीं, इससे क्या फर्क पड़ता है? ऐसे लोगों को श्री गुरुजी यह कथा सुनाते थे।\nपुराने समय में घोड़ों पर सवार होकर आमने-सामने की लड़ाई होती थी। एक बार दो राज्यों में युद्ध हो रहा था। दोनों की सेनाएँ शक्तिशाली थीं, अत: कई दिन बीतने पर भी निर्णय नहीं हो पाया। एक दिन एक राज्य ने शत्रु सेना पर दो ओर से एक साथ आक्रमण करने का निर्णय लिया। दूसरी ओर से जिस दल को आक्रमण करना था, उसके प्रमुख को सूचना देने के लिए एक घुड़सवार सैनिक को नियुक्त किया गया।\nचलते समय उसने देखा कि उसके घोड़े के एक पैर की नाल की एक कील निकल गयी है। उसने इस ओर ध्यान नहीं दिया और चल दिया। उसने अभी आधा रास्ता ही पार किया था कि दो कीलें और ढीली होने से वह नाल ही निकल गयी और घोड़ा गिर पड़ा। घोड़े के गिरते ही वह सैनिक भी लुढ़ककर बेहोश हो गया।\nजब उसे होश आया, तो उसने देखा कि घोड़ा मर चुका है। अब सैनिक ने पैदल ही भागना शुरू किया; पर वह निर्धारित समय तक सूचना नहीं पहुँचा सका। इस कारण दोनों ओर से एक साथ आक्रमण करने की योजना विफल हो गयी और वह राज्य हार गया।\nजाँच होने पर पता लगा कि पराजय का कारण एक कील थी। यदि वह घुड़सवार लापरवाही न करते हुए नाल में नयी कील ठुकवा लेता, तो पराजय न होती। \nस्पष्ट है कि छोटी मानी जाने वाली बातों का भी बहुत अधिक महत्त्व होता है। अत: कभी इनकी उपेक्षा नहीं करनी चाहिए।"}, {"person": "", "title": "जोड़तोड़ से राष्ट्र नहीं बनता", "text": "राष्ट्र का अर्थ केवल भूमि का टुकड़ा और उस पर यहाँ-वहाँ से आकर रहने वाले कुछ लोगों का समूह मात्र नहीं है। इस संबंध में श्री गुरुजी द्वारा सुनाया गया यह रोचक प्रसंग उल्लेखनीय है।\nएक बार प्राणिविज्ञान के छात्रों को मजाक सूझा। उन्होंने किसी कीड़े का मुँह, किसी का पेट, किसी का पैर और किसी के पंख आदि को जोड़कर एक कीड़े जैसा आकार दे दिया। फिर उसे प्रयोगशाला की मेज पर रख दिया। कुछ देर बाद जब उनके अध्यापक आये, तो छात्रों ने कहा कि यह अजीब सा कीड़ा उन्होंने पकड़ा है। कृपया इसका नाम बताकर इस वर्ग की विशेषताएँ बतायें।\nअध्यापक छात्रों का मजाक समझ गये। वे बोले - यह कीड़ा या कीड़ी नहीं, धोखाधड़ी है। \nऐसे ही ‘कहीं का ईंट, कहीं का रोड़ा; भानुमती ने कुनबा जोड़ा’ जैसी जोड़तोड़ से राष्ट्र नहीं बनते। राष्ट्र के लिए वहाँ के निवासियों का एक इतिहास, एक परम्परा और उस भूमि के प्रति माता जैसा प्रेमभाव होना भी आवश्यक है।"}, {"person": "", "title": "सबल शरीर आवश्यक है", "text": "हमें इस शरीर से ही सब कार्य करने हैं, इसलिए यह खूब बलवान होना चाहिए। इस संदर्भ में श्री गुरुजी यह घटना सुनाते थे।\nएक बार स्वामी विवेकानंद रेल से कहीं जा रहे थे। उनके एक भक्त ने उन्हें प्रथम श्रेणी का टिकट खरीदकर दिया था। उन दिनों प्राय: प्रथम श्रेणी में अंग्रेज या अंग्रेजों के चाटुकार सेठ आदि ही सफर करते थे। उस डिब्बे में दो अंग्रेज भी थे।\nउन अंग्रेजों ने जब भगवा कपड़े पहने एक संन्यासी को देखा, तो अंग्रेजी में उनके बारे में आपस में गन्दी-गन्दी बातें करने लगे। स्वामी जी को अच्छी अंग्रेजी आती थी। वे सब समझ रहे थे; पर उन्होंने चुप रहना ही उचित समझा।\nकुछ देर बाद जब एक स्टेशन पर गाड़ी रुकी, तो स्वामी जी पास से गुजर रहे स्टेशन मास्टर से अंग्रेजी में बात करते हुए अपने लिए पानी मँगवाया। यह देखकर वे अंग्रेज हैरान रह गये। जब गाड़ी चली, तो वे स्वामी जी से बात करने लगे।\n- आपको अंग्रेजी आती है ?\n- हाँ, कुछ-कुछ आती है।\n- तब तो हम जो बोल रहे थे, वह आप समझ रहे होंगे ?\n- हाँ, अच्छी तरह समझ रहा था।\n- फिर आपने उसका विरोध क्यों नहीं किया ?\nस्वामी जी ने हँसकर जवाब दिया - मेरा मूर्खों से मिलने का यह पहला अवसर नहीं है। यह सुनकर वे आगबबूला होकर झगड़ने लगे। स्वामी जी ने अपने कुर्ते की बाँहें चढ़ायीं और उनकी गरदन पकड़कर बोले - चुपचाप बैठ जाओ, अन्यथा गाड़ी से बाहर फेंक दूँगा। तुम दोनों के लिए मैं अकेला ही काफी हूँ।\nस्वामी जी की मजबूत भुजाएँ देखकर दोनों का गुस्सा ठंडा हो गया। अगला स्टेशन आने पर वे उतरकर दूसरे डिब्बे में जा बैठे।"}, {"person": "", "title": "पर उपदेश कुशल बहुतेरे", "text": "हिन्दुओं की दुर्दशा का एक बड़ा कारण यह है कि अधिकांश लोग दूसरों को उपदेश तो देते हैं; पर स्वयं कुछ करना नहीं चाहते। ऐसे लोगों के पास देश की हर समस्या का समाधान मिलेगा; पर वे चाहते हैं कि अन्य लोग यह कार्य करें। इस बारे में पूज्य डा0 हेडगेवार के जीवन का एक मजेदार प्रसंग श्री गुरुजी सुनाते थे।\nनागपुर के एक सेठ के घर पर कोई कार्यक्रम था। नगर के अनेक प्रतिष्ठित लोग वहाँ आये थे। सेठ जी ने वहाँ की प्रथा के अनुसार पानदान आगे बढ़ाया। उसमें पान, सुपारी, इलायची, लौंग आदि तो थे; पर चूना नहीं था। चूने के बिना लोग पान नहीं ले सकते थे।\nसेठ जी ने मुनीम जी को देखकर आवाज लगायी – ‘जरा चूना लाइये। मुनीम जी ने एक नौकर को कहा - जरा चूना लाओ। उस नौकर ने दूसरे नौकर को कह दिया। इस प्रकार काफी देर तक चूना लाओ, चूना लाओ’ की पुकार होती रही; पर चूना नहीं आया।\nयही स्थिति भारत देश की है; पर संघ ने इस व्यवस्था को बदला है। स्वयंसेवक पहले स्वयं काम करता है, फिर वह अन्यों को उसे करने को कहता है।"}, {"person": "", "title": "कर्तव्यनिष्ठा", "text": "काम के प्रति हमारी निष्ठा कैसी हो, इस संबंध में श्री गुरुजी तानाजी मालसुरे के बलिदान की कथा सुनाते थे।\nमहाराष्ट्र में कोंडाना नामक एक प्रसिद्ध किला है। वह मुगलों के अघिकार में था। एक बार माँ जीजाबाई ने उसे जीतकर देने की इच्छा शिवाजी के सम्मुख प्रकट की। बस, शिवाजी ने ठान लिया कि यह किला जीतना ही है।\nपर कोंडाना बड़े दुर्गम स्थान पर बना था। उसे जीतना आसान न था। शिवाजी ने अपने साथियों के नामों पर विचार किया, तो उन्हें तानाजी मालसुरे का नाम ध्यान में आया। वे हर प्रकार का खतरा उठाकर भी काम पूरा करने में निपुण थे। शिवाजी उन्हें बुलाने के लिए किसी दूत को भेज ही रहे थे कि तानाजी अपने बेटे राघोबा के विवाह का निमन्त्रण देने के लिए स्वयं ही वहाँ आ गये। शिवाजी ने सोचा कि तानाजी की व्यस्तता के कारण अब वे स्वयं कोंडाना जीतने जाएँगे। पर तानाजी ने शिवाजी को निश्चिेन्त करते हुए कहा - महाराज, राघोबा का विवाह बाद में होगा, पहले कोंडाना किला जीता जाएगा।\nतानाजी ने पुत्र के विवाह का कार्यक्रम स्थगित कर दिया और सेना लेकर आधी रात में कोंडाना दुर्ग पर धावा बोल दिया। भयंकर युद्ध में तानाजी स्वयं मारे गये; पर किला उन्होंने जीत लिया।\nयुद्ध के बाद शिवाजी ने कहा - गढ़ आया, पर सिंह गया। तानाजी की स्मृति में उस किले का नाम उन्होंने ‘सिंहगढ़’ कर दिया। कुछ समय बाद तानाजी के पुत्र का विवाह शिवाजी ने स्वयं बड़ी धूमधाम से किया।"}, {"person": "", "title": "मीठी वाणी का महत्त्व", "text": "संघ का कार्य करते समय समाज में अनेक लोगों से मिलना पड़ता है। ऐसे समय वाणी का संयम और विवेक बहुत आवश्यक है। हमें सत्य तो बोलना चाहिए; पर उसे किस प्रकार से बोलें, यह ध्यान रखना भी आवश्यक है। इस संबंध में एक बार श्री गुरुजी ने यह कहानी सुनायी थी।\nएक राजा ने स्वप्न देखा कि उसके सारे दाँत झड़कर गिर रहे हैं। उसने इसका अर्थ समझने के लिए एक प्रसिद्ध ज्योतिषी को बुलाया। ज्योतिषी ने कहा - राजन, इसका अर्थ है कि आप अपनी आँखों से अपने पुत्र-पौत्रों आदि की मृत्यु देखेंगे।\nराजा ने नाराज होकर उसे जेल में डाल दिया। फिर एक अन्य ज्योतिषी को बुलाया गया। उसने स्वप्न का अर्थ बताते हुए कहा - राजन, आपकी आयु बहुत लम्बी है। आप अपने पुत्र-पौत्रों से भी अधिक समय तक जीवित रहेंगे।\nराजा ने उसे अनेक पुरस्कार देकर विदा किया। वस्तुत: दोनों ने बात एक ही कही थी; पर दोनों के कहने का ढंग अलग-अलग था। इसलिए अपनी बात कहते समय सही विधि, समय तथा वातावरण का भी ध्यान रखना चाहिए।"}, {"person": "", "title": "पुण्यभूमि भारत", "text": "कुछ लोग भारत को धरती का एक टुकड़ा मानते हैं; पर संघ की धारणा यह है कि यह पुण्यभूमि है। यहाँ अनेक बार स्वयं भगवान ने जन्म लिया है, इसलिए इसका कण-कण पावन है। यह समझाने के लिए श्री गुरुजी ने एक बार यह प्रसंग सुनाया।\nस्वामी विवेकानंद लगभग चार वर्ष तक विदेश में रहे। वहाँ उन्होंने लोगों के मन में भारत के बारे में व्याप्त भ्रमों को दूर किया तथा हिन्दू धर्म की विजय पताका सर्वत्र फहरायी। जब वे भारत लौटे, तो उनके स्वागत के लिए रामेश्वररम के पास रामनाड के समुद्र तट पर बहुत बड़ी संख्या में लोग एकत्र हुए। उनका जहाज जैसे ही दिखायी दिया, लोग उनकी जय-जयकार करने लगे।\nपर स्वामी जी ने जहाज से उतरते ही सबसे पहले भारतभूमि को दंडवत प्रणाम किया। फिर वे हाथों से धूल उठाकर अपने शरीर पर डालने लगे। जो लोग उनके स्वागत के लिए मालाएँ आदि लेकर आये थे, वे हैरान रह गये। उन्होंने स्वामी जी से इसका कारण पूँछा।\nस्वामी जी ने कहा - मैं जिन देशों में रह कर आया हूँ, वे सब भोगभूमियाँ हैं। वहाँ के अन्न-जल से मेरा शरीर दूषित हो गया है। अत: मैं अपनी मातृभूमि की मिट्टी शरीर पर डालकर उसे फिर से शुद्ध कर रहा हूँ।"}, {"person": "", "title": "पुष्पमाला", "text": "अपने देश में छोटी-छोटी बात पर धरना, प्रदर्शन, हड़ताल करना एक फैशन बन गया है। इससे देश को कितना नुकसान होता है, इसे कोई नहीं सोचता। श्री गुरुजी इनके समर्थक नहीं थे, वे इस संबंध में जापान का एक उदाहरण देते थे।\nद्वितीय विश्वछयुद्ध के बाद जापान पूरी तरह बरबाद हो गया। उसकी अर्थव्यवस्था चौपट हो गयी; पर थोड़े ही समय में उसने फिर से पहले जैसी उन्नति कर ली। इसका कारण वहाँ के सामान्य नागरिक में व्याप्त देशभक्ति की भावना है।\nभारत से जापान की यात्रा पर गये एक नेता जी एक कारखाने में गये। वहाँ श्रमिकों से बात करने पर पता लगा कि वे लोग अपने वेतन आदि से असंतुष्ट थे। नेता जी ने कहा कि ऐसे में आप लोग हड़ताल कर काम ठप्प क्यों नहीं कर देते ? श्रमिकों ने उत्तर दिया - कारखाने का मालिक भी अपना है और देश भी। हड़ताल से दोनों का ही नुकसान होगा, इसलिए हम यह नहीं करते।\nनेता जी ने पूछा - फिर आप लोग विरोध प्रदर्शन कैसे करते हैं ? श्रमिकों ने उत्तर दिया - इसके लिए हम अपनी बाँहों पर काली पट्टी बाँघकर काम करते हैं। इससे मालिक हमारी भावना समझ जाता है और समस्या के समाधान का प्रयास करता है।\nश्री गुरुजी इस उदाहरण से समझाते थे कि हर नागरिक के मन में देशप्रेम की भावना जाग्रत करने से ही देश की उन्नति संभव है।"}, {"person": "", "title": "सच बोलने की हिम्मत चाहिए", "text": "प्राय: लोग किसी भयवश या एक दूसरे की देखादेखी सत्य बोलने से हिचकिचाते हैं। पर नि:स्वार्थ एवं निष्कलंक चरित्र वाले बिना किसी भय के अपनी बात कह देते हैं।\nएक राजा के दरबार में किसी दूसरे राज्य से एक बुनकर आया। उसने बहुत महीन और कोमल कपड़ा राजा को दिखाया। राजा ने उसे मुँहमाँगा दाम देकर खरीद लिया। यह देखकर उस राज्य के बुनकर को बहुत बुरा लगा। उसने कहा कि यदि उसे छह मास का समय और एक लाख रुपया दिया जाये, तो वह ऐसा महीन कपड़ा बुन सकता है, जैसा आज तक किसी ने न बुना हो।\nराजा ने स्वीकृति दे दी। बुनकर ने एक कमरे को चारों ओर से बन्दकर काम शुरू कर दिया। जब लोग वहाँ से गुजरते, तो करघे की आवाज आती। छह मास बाद वह कपड़ा लेकर दरबार में आया। उसने घोषणा कर दी कि यह कपड़ा राजा के अलावा केवल उन्हीं दरबारियों को दिखायी देगा, जो राजा के प्रति निष्ठावान होंगे।\nराजा को कपड़ा कहीं दिखायी ही नहीं दे रहा था। फिर भी उसने वाह-वाह की। दरबारियों को भी कपड़ा नहीं दिखा; फिर भी उन्होंने उसकी प्रशंसा की, क्योंकि कोई भी सच बोलकर राजा को नाराज नहीं करना चाहता था। राजा ने घोषणा कर दी कि एक सप्ताह बाद होने वाले उत्सव में वह इन्हीं को पहनकर शामिल होगा।\nअब दर्जी को बुलाया गया। बुनकर ने उसे भी अपने साथ मिला लिया था। उसने कपड़े सिलने का नाटक किया। बहुत महीन घागे से राजा के कपड़े तैयार हुए। उन्हें पहनकर वह शान से हाथी पर बैठकर उत्सव के लिए चल दिया।\nनगर की प्रजा राजा को निर्वस्त्र देखकर आश्चेर्यचकित थी; पर मुँह कौन खोले ? शोभायात्रा बढ़ती जा रही थी; लेकिन एक बच्चे से नहीं रहा गया, वह जोर से चिल्लाया - देखो-देखो, राजा तो नंगा है। उसकी माँ ने उसे चुप कराने का प्रयास किया; पर वह चुप नहीं हुआ।\nयह देखकर नागरिकों का साहस जाग गया। वे भी कहने लगे - हाँ, राजा तो नंगा है। अब दरबारियों में भी हिम्मत आ गयी। वे भी बोल उठे - हाँ, राजा तो नंगा है। राजा ने जब सब ओर से एक ही बात सुनी, तो वह शर्म से पानी-पानी होकर राजमहल लौट गया।\nयही हालत अपने देश के नेताओं की है। भारत हिन्दू राष्ट्र है। इसे जानते तो सब हैं; पर किसी भय या स्वार्थ के कारण वे यह सच बोलने में संकोच करते हैं। संघ के संस्थापक पूज्य डा. हेडगेवार के मन में न कोई भय था न कोई स्वार्थ। इसलिए उन्होंने पहली बार स्पष्ट शब्दों में उद्घोष किया कि भारत हिन्दू राष्ट्र है। \nउनके इस साहस भरे उद्घोष से प्रभावित होकर करोड़ों लोग आज कह रहे हैं - हाँ, भारत हिन्दू राष्ट्र है।"}, {"person": "", "title": "सत्य सदा सम्मानित होता है", "text": "आजकल सर्वत्र राजनीति का बोलबाला है। राजनेता हर काम को वोटों के हानि-लाभ से तोलकर करते हैं। वे इस डर से सच नहीं बोलते कि इससे कोई वर्ग नाराज न हो जाये। श्री गुरुजी का विचार था कि ऐसी ढुलमुल भाषा बोलने वाले कुछ समय तक तो लाभ उठा सकते हैं; पर सच बोलने वालों का सदा सम्मान होता है। वे अपने साथ का एक प्रसंग सुनाते थे।\nएक बार उन्हें रेल से थोड़ी दूर जाना था। जब रेल आयी, तो वे एक डिब्बे में चले गये। वहाँ मुस्लिम लीग के एक प्रसिद्ध नेता सीट पर अपना बिस्तर लगाये बैठे थे। उन्होंने बड़े आदर से अपना बिस्तर साफ किया और गुरुजी को बैठा लिया।\nउनके साथियों ने आश्चार्य से उनकी ओर देखा। एक ने पूछ ही लिया - संघ वाले तो हमारे कट्टर विरोधी हैं। फिर भी आप उनके मुखिया को इतना आदर दे रहे हैं।\nमुस्लिम नेता ने कहा - हाँ, ये हमारे विरोधी हैं; पर ये अपनी बात हमेशा साफ-साफ कहते हैं। राजनेताओं की तरह बात को घुमा-फिरा कर नहीं बोलते। इसलिए इनसे हमें कभी धोखा नहीं होगा। जबकि वे राजनेता जो आज वोट के लालच में हमारा समर्थन कर रहे हैं, कल वोट के लिए हमारे विरोधी भी बन सकते हैं।"}, {"person": "", "title": "ईश्व.र सर्वत्र है", "text": "हरिद्वार से गंगाजल लेकर उससे रामेश्व.र में भगवान शंकर का अभिषेक करने का प्राचीन समय से ही बड़ा महत्त्व रहा है। महाराष्ट्र के प्रसिद्ध संत एकनाथ जी अपने कुछ शिष्यों व संतों के साथ गंगाजल लेकर पैदल-पैदल रामेश्वरर जा रहे थे।\nनगर, ग्राम, जंगल, पर्वत, रेगिस्तान आदि पार करते हुए वे चले जा रहे थे। रेगिस्तान में एक संकट उपस्थित हो गया। सब यात्रियों ने देखा कि मार्ग में एक गधा बुरी तरह धरती पर लोटपोट हो रहा था। उसे देखते ही सब समझ गये कि यह प्यास से तड़प रहा है। यदि उसे पानी न मिला, तो वह कुछ देर में मर जाएगा।\nपर यात्रियों के पास तो पानी के नाम पर केवल गंगाजल था। इसलिए सब उसे सहानुभूति से देखते रहे; पर एकनाथ जी ने अपनी काँवड़ उतारी और कलश में रखा सारा गंगाजल गधे को पिला दिया। गधे ने तृप्ति से उनकी ओर देखा और अपनी राह चला गया।\nसबने एकनाथ जी को टोका - यह आपने क्या किया; इतने कष्ट एवं परिश्रम से आप जो गंगाजल लाये थे, वह आपने गधे को पिला दिया। अब भगवान को क्या चढ़ायेंगे ?\nएकनाथ जी ने कहा - भगवान सर्वत्र है। रामेश्व र के शिवलिंग में जो भगवान हैं, वही इस गधे के अंतकरण में भी है। यदि हम जल होते हुए भी इस मूक प्राणी को प्यासा मरने देते, तो भगवान भोलेशंकर हमें कभी क्षमा नहीं करेंगे।\nउनके साथ चल रहे अन्य संत तथा शिष्य एकनाथ जी के स्रदय की विशालता देखकर दंग रह गये।"}, {"person": "", "title": "धैर्य बनाये रखें", "text": "अनेक लोग काम करते समय बहुत उतावले हो जाते हैं; वे चाहते हैं कि जो भी होना हो, तुरन्त हो जाए। लेकिन कार्यकर्ता के ध्यान में सदा अपना लक्ष्य और सफलता ही रहनी चाहिए। इस सम्बन्ध में श्री गुरुजी छत्रपति शिवाजी का यह प्रसंग सुनाते थे।\nबीजापुर के शासक आदिलशाह ने जब देखा कि शिवाजी अपना साम्राज्य बढ़ाते जा रहे हैं, तो उसने कई सूरमाओं को उन्हें परास्त करने भेजा। पर जो भी गया, वह मार खाकर ही लौटा। परेशान होकर आदिलशाह ने अपने सबसे मजबूत योद्धा अफजल खाँ को शिवाजी को जिन्दा या मुर्दा लेकर आने को कहा।\nअफजल खाँ विशाल सेना लेकर चल दिया। मार्ग में उसने सैकड़ों मंदिरों को ध्वस्त किया। हजारों गायों की हत्या की। खेतों में खड़ी फसलों को आग लगा दी। महिलाओं को अपमानित किया। लोग शिवाजी को जाकर शिकायत करते थे; पर वे शान्त बैठे रहे।\nइससे अफजल खाँ का साहस बढ़ गया। उसने पंढरपुर का प्रसिद्ध विठोबा का मंदिर और शिवाजी की कुलदेवी तुलजा भवानी का मंदिर भी तोड़ डाला। लोग त्राहि-त्राहि करने लगे। कई लोग तो शिवाजी को भला-बुरा भी कहने लगे - कहाँ है वह हिन्दू रक्षक; कहाँ छिपा बैठा है; लगता है वह भी अफजल खाँ से डर गया है ?\nपर शिवाजी ने धैर्य नहीं खोया। वे अपनी योजना से चल रहे थे। उन्होंने ऐसा वातावरण बनाया कि अफजल खाँ उनसे मिलने पहाड़ी पर स्थित प्रतापगढ़ के किले तक आ पहुँचा। वहाँ शिवाजी ने उसके पेट में बघनखा भोंककर उसे यमलोक पहुँचा दिया। केवल इतना ही नहीं, किले के आसपास छिपे सैनिकों ने उसकी सेना के एक आदमी को भी जीवित नहीं छोड़ा।\nयदि शिवाजी धैर्य खो देते, तो वे सफल नहीं होते। इसलिए ध्यान सदा अंतिम लक्ष्य और सफलता की ओर ही रखना चाहिए।"}, {"person": "", "title": "दुर्बलता", "text": "दुर्बलता का संबंध शरीर से नहीं, मन से होता है। इस संबंध में श्री गुरुजी ने अपने जीवन का यह प्रसंग एक बार सुनाया था।\nछात्र-जीवन में माधवराव अपने एक मित्र के साथ घूमने गये। एक सिनेमाघर के बाहर बहुत भीड़ देखकर वे रुक गये। पूछने पर पता लगा कि फिल्म तो समाप्त हो गयी है; पर महिलाओं वाले दरवाजे पर दो अंग्रेज खड़े हैं। उन्होंने शराब भी पी रखी है। वहाँ पुलिस भी थी और सिनेमा का प्रबन्धक भी; पर सब उनसे भयभीत थे।\nयह देखकर माधवराव ने अपने मित्र से कहा - चलो, हम चलकर उन्हें हटाते हैं। पर वह मित्र भी डर गया। अब माधवराव ने अकेले वहाँ जाकर पहले तो उन्हें अंग्रेजी में डाँटा; पर जब वे नहीं हटे, तो उन्होंने एक का गला पकड़कर जोर से चाँटा जड़ दिया। चाँटा लगते ही उनका नशा उतर गया और वे वहाँ से भाग गये।\nश्री गुरुजी कहते थे कि जब मेरे जैसा दुबला-पतला आदमी उनसे भिड़ सकता है, तो क्या इतना बड़ा भारत अंग्रेजों से नहीं लड़ सकता ? वस्तुत: हमारा शरीर नहीं, मन दुर्बल है। अत: पहले उसकी दुर्बलता दूर करना आवश्यक है।"}, {"person": "", "title": "हमारा लक्ष्य", "text": "श्री गुरुजी प्रवास के समय अनेक लोगों से मिलते थे। ऐसे लोग उन्हें संघ के बारे में तरह-तरह के परामर्श देते थे। गुरुजी सबकी बात सुनते थे। जब कार्यकर्ता इस बारे में उनकी प्रतिक्रिया पूछते थे, तो वे यह कथा सुनाते थे।\nएक युवक बहुत बुद्धिमान, ओजस्वी वक्ता एवं अति सुंदर था। इतना ही नहीं, वह परिश्रमी एवं अध्ययनशील भी था। उसके परिचित उसे भविष्य के बारे में तरह-तरह के सुझाव देते रहते थे। \nएक ने कहा - तुम्हारी भाषणशैली एवं तर्कशक्ति इतनी प्रभावी है कि यदि तुम वकील बनो, तो सर्वोच्च न्यायालय तक पहुँच जाओगे और बहुत सफलता पाओगे। दूसरे ने कहा - तुम्हारा अध्ययन इतना गहरा है कि तुम्हें प्राध्यापक बनना चाहिए। तुम कई ग्रन्थ लिखकर बड़ा नाम कमा सकते हो।\nतीसरे ने सलाह दी - तुम अपनी योजना बनाने की क्षमता का उपयोग यदि व्यापार में करो, तो बहुत पैसा कमा सकते हो। एक प्रौढ़ सज्जन बोले - मेरा परिचय अनेक परिवारों से है, तुम कहो तो किसी धनवान परिवार की सुंदर लड़की से तुम्हारा विवाह करा दूँ।\nपर ये चारों बड़े निराश हुए, जब उस युवक ने कहा कि वह संन्यास लेकर समाजसेवा में अपना जीवन लगायेगा। सब लोग उसे समझाने लगे। युवक ने बताया मानव जीवन का उद्देश्य केवल खाना, पीना, कमाना, संतान उत्पन्न करना और मर जाना ही नहीं है। ईश्वतर ने हमें केवल इस कार्य के लिए ही धरती पर नहीं भेजा। जीवन का उद्देश्य बहुत व्यापक है।\nयही स्थिति संघ की है। संघ की शक्ति एवं विशालता को देखकर लोग अपनी क्षुद्र बुद्धि के अनुसार तरह-तरह के सुझाव देते हैं। वे चेतावनी भी देते हैं कि यदि संघ ने इस कार्य में शक्ति नहीं लगायी, तो वह निष्क्रिय होकर नष्ट हो जाएगा; पर संघ कभी विचलित नहीं हुआ। क्योंकि हमारा लक्ष्य बहुत बड़ा है। जिन्होंने स्वयं को दीवारों में बंद कर रखा है, वे संघ का महत्त्व नहीं समझ सकते।"}, {"person": "", "title": "हमारे प्रभाव का आधार", "text": "वामन भगवान की कहानी हमारे धर्मग्रन्थों में आती है। उनके पास न सेना थी न सत्ता, न धन और न बल। उनका आकार तो बहुत ही छोटा था। फिर भी उन्होंने धरती, आकाश और पाताल अर्थात तीनों लोकों पर अपना प्रभाव स्थापित कर लिया था।\nऐसा कैसे हो गया ? इसका कारण यह था कि उनके पास त्याग, तपस्या, सेवा और विश्वै-कल्याण की कामना, यह चार महाव्रत थे। इनके बल पर ही उन्होंने राजा बलि को पराभूत किया।\nसंघ के बारे में भी लोग ऐसा ही बोलते हैं कि राजनीतिक क्षेत्र में काम करने वाले जनसंघ पर संघ का बहुत प्रभाव है। ऐसे लोगों को श्री गुरुजी कहते थे कि केवल जनसंघ की क्यों, कांग्रेस, कम्युनिस्ट, मुस्लिम लीग आदि राजनीतिक दलों के साथ-साथ सम्पूर्ण विश्वद पर भविष्य में संघ का प्रभाव पड़ने वाला है। क्योंकि हमारे पास भी शील, चरित्र, सेवाभाव और ध्येयनिष्ठा जैसे महाव्रत हैं।"}, {"person": "", "title": "कथनी और करनी में समानता", "text": "किसी भी सामाजिक काम में कार्यकर्ता की भूमिका बड़ी महत्त्वपूर्ण होती है। यदि उसकी कथनी और करनी एक नहीं होगी, तो कोई उस पर विश्वाीस नहीं करेगा और उसे कभी सफलता भी नहीं मिलेगी। इस बारे में श्री गुरुजी एक कहानी सुनाते थे।\nएक बच्चे को गुड़ खाने की बहुत आदत थी। इस कारण बार-बार वह बीमार हो जाता था। ऐसी ही बीमारी के समय उसके पिता ने एक चिकित्सक को बुलाया। चिकित्सक ने उसे देखकर एक सप्ताह की दवा तो दी; पर गुड़ खाने को मना नहीं किया। अगली बार उन्होंने फिर एक सप्ताह की दवा दी; पर गुड़ खाने को अब भी मना नहीं किया। तीसरी बार उन्होंने दवा देते समय गुड़ की हानियाँ बतायीं। यह सुनकर बालक ने गुड़ खाना बहुत कम कर दिया।\nबालक के पिता ने कहा - यदि यह बात आप पहली बार में ही कह देते, तो आपका क्या बिगड़ जाता ? चिकित्सक ने कहा - असल में मैं स्वयं भी बहुत अधिक गुड़ खाता था। इसलिए मेरा कुछ कहने का साहस नहीं हुआ। पर अब मैंने गुड़ खाना छोड़ दिया है। इसलिए आज यह बात कही है।\nस्पष्ट है कि जो काम हम स्वयं नहीं करते, उसे करने के लिए दूसरों को किस मुँह से कह सकते हैं ? अच्छा कार्यकर्ता वही है, जिसकी कथनी और करनी एक समान हो।"}, {"person": "", "title": "प्रेम सदा विजयी होता है", "text": "संघ की वृद्धि में स्वयंसेवकों के आपसी प्रेम-व्यवहार का बहुत योगदान है। जो भी व्यक्ति एक बार हमारे सम्पर्क में आ जाता है, वह सदा के लिए अपना हो जाता है।\n1957 की बात है, नागपुर में हो रहे तृतीय वर्ष के वर्ग में एक स्वयंसेवक बहुत बीमार हो गया। उसे चिकित्सालय में भर्ती कराया तथा अच्छी से अच्छी दवा दी गयी; पर उसकी हालत बिगड़ती गयी। यह देखकर उसके घर वालों को बुलवाया गया। वहाँ व्यवस्था में लगे कार्यकर्ताओं ने उसकी रात-दिन चिन्ता की। इतने पर भी वह बच नहीं सका।\nजहाँ से वह आया था, वहाँ संघ-विरोधी लोग भी बड़ी संख्या में थे। उन्होंने यह अफवाह फैला दी कि संघ वालों ने इस युवक को जहर देकर मारा है। इससे गाँव वालों के मन में संघ के प्रति दुर्भावना उत्पन्न हो गयी। पर जब उसके परिवारजन गाँव में पहुँचे, तो उन्होंने बताया कि संघ वालों ने उनकी तथा उनके पुत्र की कितनी चिन्ता की थी। कार्यकर्ता रात-रात भर उसके पास बैठे रहते थे; पर यह प्रभु की इच्छा थी कि हमारा बेटा बच नहीं सका।\nयह सुनकर गाँव वालों की आँखें खुल गयीं और संघ-विरोधी लोग वहाँ से भागते नजर आये। वस्तुत: ऐसा प्रेमपूर्ण व्यवहार ही संघ की वृद्धि का आधार है।"}, {"person": "", "title": "क्रांतिवीर तात्याटोपे और वेश्या", "text": "सामाजिक कार्यकर्ताओं का आत्मबल और चरित्र उज्ज्वल होना अति आवश्यक है। इससे वे सभी तरह के लोगों की क्षमता का अपने कार्य में उपयोग कर लेते हैं।\n1857 का स्वतन्त्रता संग्राम चल रहा था। प्रख्यात क्रांतिकारी तात्याटोपे के पीछे अंग्रेज पुलिस पड़ी थी। वे छिपने के लिए जिस घर में घुसे, वह एक वेश्या का था। वेश्या ने जब उन्हें देखा, तो उनके व्यक्तित्व एवं साहस से वह बहुत प्रभावित हुई। उसने अपने स्वभाव के अनुरूप अपना शरीर उन्हें अर्पित करना चाहा।\nपर तात्याटोपे वेश्या के मोहजाल में नहीं फँसे। उन्होंने उसे स्पष्ट बता दिया कि उनके जीवन का लक्ष्य शरीर सुख प्राप्त करना नहीं अपितु देश को स्वतन्त्र कराना है। यदि वह उनसे प्यार करती है, तो अपनी सम्पूर्ण धन-सम्पदा को देश हेतु समर्पित कर दे।\nवेश्या ने ऐसा ही किया। इतना ही नहीं तो जब तक वह जीवित रही, क्रांतिकारियों को हर प्रकार का सहयोग करती रही। तात्याटोपे ने अपने उज्जवल चरित्र एवं लक्ष्य के प्रति अटूट निष्ठा से वेश्या के मन को भी बदल दिया।"}, {"person": "", "title": "वयं पंचाधिक शतम्", "text": "हमारे बीच भले ही कितने मतभेद हों; पर यदि कोई बाहरी संकट आये, तो सबको एकजुट होकर उसका मुकाबला करना चाहिए। इस संबंघ में महाभारत का एक प्रसंग श्री गुरुजी सुनाते थे।\nजुए में हारने के बाद पांडव अपने बारह वर्ष के वनवास-काल में एक बार द्वैतवन में ठहरे हुए थे। जब दुर्योधन को यह पता लगा, तो उसने उन्हें अपमानित करने के लिए अपने भाइयों के साथ वहाँ जाने का निश्च य किया। उसके आदेश पर सब अच्छे वस्त्र व आभूषण पहनकर अपने वैभव का प्रदर्शन करते हुए चल दिये।\nचलते-चलते वे द्वैतवन के सरोवर के पास पहुँचे। वहाँ गंधर्वराज चित्रसेन अपने परिवार सहित ठहरा हुआ था। दुर्योधन के कर्मचारी जब वहाँ डेरे-तम्बू लगाने लगे, तो चित्रसेन ने उन्हें मना किया; पर वे नहीं माने। इस पर उसने दुर्योधन के कर्मचारियों को भगा दिया। यह पता लगने पर दुर्योधन ने युद्ध छेड़ दिया; पर चित्रसेन ने उन्हें पराजित कर बंदी बना लिया।\nकुछ सैनिक रोते-चिल्लाते पांडवों के पास जा पहुँचे। दुर्योधन की पराजय सुनकर भीम को बहुत खुशी हुई। वह बोला - बहुत अच्छा हुआ। हमें परेशान करने का उसे अच्छा दंड मिला। अब उसे चित्रसेन की कैद में ही पड़ा रहने दो।\nलेकिन युधिष्ठिर ने कहा - दुर्योधन चाहे जैसा भी हो; पर है तो हमारा भाई ही। आपसी संघर्ष में हम सौ और पाँच हैं; पर यदि किसी तीसरे से युद्ध होता है, तो हम एक सौ पाँच हैं (वयं पंचाधिक शतम्)। यह कहकर उन्होंने अर्जुन को भेजकर सबको छुड़वाया।\nसंघ की मान्यता है कि देश के बारे में हमें सदा धर्मराज युधिष्ठिर के वाक्य को ही आधार बनाकर कार्य करना चाहिए।"}, {"person": "", "title": "हाथी और अंधे", "text": "संघ का असली स्वरूप क्या है? यह प्राय: लोग नहीं समझ पाते। शाखा में स्वयंसेवकों को खेलते या गीत गाते देख कुछ लोग इसे खेलकूद या गायन-क्लब समझ लेते हैं। स्वयंसेवकों द्वारा चलाये जाने वाले विद्यालय, चिकित्सालय आदि को देखकर कुछ लोग संघ को सेवा-संस्था मान लेते हैं। पर यह सब संघ का एक पक्ष है। इस संबंध में श्री गुरुजी हाथी और अंधों वाली कथा सुनाते थे।\nएक गाँव में कुछ अंधे रहते थे। एक बार वहाँ एक हाथी आ गया। उसके गले में लटके घंटे की टन-टन सुनकर वे अंधे भी उसके पास आ गये और उसे छूकर देखने लगे। हाथी के जाने के बाद वे उसके बारे में चर्चा करने लगे।\nजिस अंधे ने हाथी के पैरों को छुआ था, वह बोला कि हाथी खंभे जैसा है। दूसरे ने उसके कान छुए थे, उसने हाथी को पंखे जैसा बताया। सूंड छूने वाले ने उसे तने जैसा और दुम छूने वाले ने रस्सी जैसा बताया।\nयही स्थिति संघ को दूर से देखने वालों की है। संघ को ठीक से जानने के लिए शाखा में आना ही एकमात्र उपाय है।"}, {"person": "", "title": "नित्य संस्कार से ही कार्य संभव है", "text": "शाखा हो या अन्य कोई सामाजिक कार्य; यदि उसे नित्य करने का संस्कार न हो, तो संकट के समय भी वह नहीं हो पाता। इस बारे में संत तुकाराम के जीवन का एक प्रसंग श्री गुरुजी सुनाते थे।\nसंत तुकाराम हर समय भगवान के ध्यान में डूबे रहते थे। दूसरी ओर उनकी पत्नी बड़ी झगड़ालू थी। तुकाराम जी के समझाने पर वह कहती थी कि घर-गृहस्थी के इस जंजाल से मुक्ति मिले, तब तो भगवान का भजन करूँ। जब भगवान तुम पर प्रसन्न हों, तो मुझे बुला लेना। मैं भी उनके दर्शन कर लूँगी।\nऐसा कहते हैं कि तुकाराम जी की भक्ति से प्रसन्न होकर भगवान ने उन्हें लेने के लिए विमान भेजा। तुकाराम ने अपनी पत्नी को आवाज दी; पर वह तो घरेलू कामों में व्यस्त थी। वह बोली - मैं इस समय कैसे चल सकती हूँ। अपनी भैंस को बच्चा होने वाला है, जब तक वह ब्याती नहीं, मैं नहीं जाऊँगी।\nबाद में जब उसे पता लगा कि तुकाराम जी इसी शरीर से स्वर्ग चले गये, तो वह बहुत पछतायी; पर अब क्या हो सकता था ?\nऐसे ही अनेक लोग कहते हैं कि हम तो आपके ही हैं। जब आप आवाज देंगे, हम आ जाएंगे; पर सच में ऐसा हो नहीं पाता। परिवार, काम-धंधे और धन-सम्पत्ति का मोह उन्हें ऐसा नहीं करने देता। इसीलिए हर दिन काम करने का संस्कार अति आवश्यक है।"}, {"person": "", "title": "धैर्य एवं वीरव्रत", "text": "संघ कार्य करते समय अत्यधिक धैर्य की आवश्यकता होती है। यदि ऐसा न हो, तो प्राय: काम बिगड़ जाता है। इस बारे में शृंगेरी पीठ के शंकराचार्य जी से संबंधित एक कथा श्री गुरुजी सुनाते थे।\nशृंगेरी पीठ के निकट स्थित एक टीले पर प्रसिद्ध शिवमंदिर है। एक बार पूज्य शंकराचार्य जी वहाँ पूजा कर रहे थे। अचानक एक भयंकर नाग फुंकारता हुआ वहाँ आ पहुँचा। उनके साथ पूजा कर रहे शिष्य भयभीत हो गये। उन्होंने इशारे से शंकराचार्य जी को नाग के बारे में बताया।\nशंकराचार्य जी विचलित नहीं हुए। पूजा सामग्री में दूध से भरी एक कटोरी भी थी। उन्होंने वह नाग के सामने रख दी। नाग दूध पीकर वहाँ से चला गया। सब शिष्य आश्चोर्यचकित रह गये।\nश्री गुरुजी की मान्यता थी कि संकट के समय धैर्य रखकर रास्ता निकालना तथा अपनी साधना करते रहना ही वीरव्रत है। ऐसे वीरव्रत और धैर्य से ही लक्ष्य की प्राप्ति होती है।"}, {"person": "", "title": "आपत्तियों का भी स्वागत", "text": "सामाजिक कार्यकर्ताओं को आराम या प्रतिष्ठा के बदले प्राय: कष्ट तथा अपमान ही सहना पड़ता है; पर सच्चा कार्यकर्ता इन सबका हँसकर स्वागत करता है।\nसंत तुकाराम जी का जीवन भी ऐसा ही था। उनके मित्रों, रिश्तेदारों और समाज के लोगों ने उनकी निन्दा की। उन्हें पीटा, उनके रास्ते में काँटे बिखेरे। उन्हें धोखा दिया, जिससे उनकी दुकान बन्द हो गयी; पर वे सदा ईश्वकर भजन में लगे रहे।\nउनकी पहली पत्नी बहुत अच्छे स्वभाव की थी; पर वह कम समय ही जीवित रही। दूसरी पत्नी बहुत कर्कश स्वभाव की थी। इस पर भी तुकाराम जी सदा ईश्वतर को धन्यवाद ही देते हुए कहते थे - हे ईश्ववर, तेरी बड़ी कृपा है कि ऐसी पत्नी मिली है। इस कारण मुझे सदा तेरा स्मरण बना रहता है।\nश्री गुरुजी कहते थे कि सच्चा कार्यकर्ता प्रत्येक कठिनाई को ईश्वशर का प्रसाद समझकर स्वीकार करता है। असली सोना अग्निपरीक्षा से कभी घबराता नहीं, क्योंकि उसमें से वह और अधिक खरा होकर निकलता है।"}, {"person": "", "title": "सब समस्याओं का निदान : संघ शाखा", "text": "किसी समय चैतन्य महाप्रभु की ख्याति एक श्रेष्ठ विद्वान की थी; पर भक्तिमार्ग अपनाने के बाद उनका विद्वत्ता का सारा अहंकार धुल गया। उनके स्रदय में वैराग्य का संचार हुआ तथा उन्हें साक्षात भगवान कृष्ण के दर्शन भी हुए।\nअब वे हर समय नाम-संकीर्तन में व्यस्त रहने लगे। उन्होंने भाषण और वाद-विवाद बन्द कर दिये। अब जो भी उनके पास आता, वे उसे ‘हरिबोल’ कीर्तन करने को कहते। ‘हरिबोल : हरिबोल’ कहते-कहते वे झूमने लगते और उन्हें समाधि लग जाती थी। उनको इस अवस्था में देखकर अनेक नास्तिक लोग भी आस्तिक बन गये।\nयही स्थिति संघ के संस्थापक पूज्य डा. हेडगेवार की थी। उन्होंने भी बहुत सी संस्थाओं और संगठनों के साथ कार्य किया। आंदोलन किये, भाषण दिये, लेख लिखे और समाचार पत्र भी चलाये; पर संघ-स्थापना के बाद उन्होंने सब तरफ से हाथ खींच लिया।\nअब यदि कोई व्यक्ति उनके पास अपने क्षेत्र, धर्म या देश की किसी समस्या को लेकर आता, तो वे एक ही सूत्र बताते - सारी शक्ति लगाकर अपनी शाखा को मजबूत करो। इसी से सब समस्याओं का निदान होगा।\nश्री गुरुजी कहते थे कि जैसे चैतन्य महाप्रभु के ‘हरिबोल’ नामक मंत्र ने पूर्वोत्तर भारत में व्यापक चेतना जगायी, ऐसे ही डा. हेडगेवार का ‘संघ शाखा’ नामक सूत्र पूरे भारत को जाग्रत करने में सक्षम है। आवश्यकता इस बात की है कि हम इस सूत्र के प्रति सच्ची निष्ठा एवं श्रद्धा रखें।"}]}, {"key": "aitihasik", "label": "ऐतिहासिक", "icon": "📜", "stories": [{"person": "", "title": "अमृत वचन", "text": "हम हिंदू हैं। प्राचीन काल से हिन्दुस्थान में रहते आए हैं। हमारा महाविशाल समाज है। इसमें विभिन्नताएँ होंगी, किन्तु हम सब एक हैं। पूर्व से पश्चिशम तक और उत्तर से दक्षिण तक यह हमारा देश है। इस देश और समाज से हमारी श्रद्धा संबद्ध है। लोग हिंदू की व्याख्या पूछते हैं। मैं तो कहूँगा कि हम हिंदू हैं और हम जिसे कहेंगे वह हिंदू है। जगद्गुरु श्रीशंकराचार्य के समान हमें भी शंख फूँककर कहना होगा कि जिसके कान में शंखध्वनि पड़ी, वह हिंदू हो गया। आज तो हम इतना ही जानते हैं कि हम हिंदू हैं। हमारी समान श्रद्धाएँ हैं, परंपराएँ हैं, श्रेष्ठ महापुरुषों के समान जीवनआदर्श हैं।"}, {"person": "", "title": "अमृत वचन", "text": "एक हजार वर्ष पूर्व यहाँ हिंदू के अतिरिक्त किसी दूसरे का नाम तक नहीं था। अनेक पंथ, संप्रदाय, भाषाएँ, जातियाँ, राज्य रहे हों, किंतु सब हिंदू ही थे। शक, हूण, ग्रीक आदि आए, किन्तु उन्हें हिंदू बनना पड़ा। वे हमें भ्रष्ट करने में असफल रहे। बल्कि हमने ही उन्हें पूर्णरूपेण आत्मसात् कर लिया। पहले जहाँ सब ओर हिंदू ही थे, वहाँ आज हमारे ही अंग-प्रत्यंग को खाकर हमारे समाज से अलग होकर अपना प्रसार करनेवाले कई कोटि अहिंदू हैं। इस दृष्टि से हिंदू समाज का ह्रास क्या हमारी आँखों के सामने है?"}, {"person": "", "title": "अमृत वचन", "text": "‘हिंदू’ के सम्बन्ध में कुछ लोग घिसे-पिटे पुराने आरोप दोहराते रहते हैं। आरोपों को सुनकर अपने समाज के लोग घबराते भी हैं। इस राष्ट्रजीवन को किसी अन्य पर्यायी शब्द से बोलने के लिये लोग सलाह भी देते हैं। परंतु क्या पर्याय लेने से मूल अर्थ बदलेगा? जैसे हमारे आर्यसमाजी बंघु कहते हैं कि आर्य कहो। ‘आर्य’ का भी मतलब वही निकलेगा। कुछ लोग ‘भारतीय’ शब्द का प्रयोग करने की बात कहते हैं। ‘भारत’ को कितना ही तोड़-मरोड़कर कहा जाए तो भी उसमें अन्य कोई अर्थ नहीं निकल सकता। अर्थ केवल एक ही निकलेगा ‘हिंदू’। तब क्यों न हिंदू’ शब्द का ही असंदिग्ध प्रयोग करें। सीधा-सादा प्रचलित शब्द ‘हिंदू’ है।"}, {"person": "", "title": "अमृत वचन", "text": "हिंदू शब्द हमारे साथ विशेष रूप से हमारे इतिहास के गत एक सहस्र वर्षों के संकटपूर्णकाल से जुड़ा रहा है। पृथ्वीराज के दिनों से लेकर हमारे समस्त राष्ट्र-निर्माताओं, राज्य-वेत्ताओं, कवियों और इतिहासकारों ने ‘हिंदू’ शब्द का प्रयोग हमारे जन-समाज और धर्म को अभिहित करने के लिये किया है। गुरु गोविन्दसिंह, स्वामी विद्यारण्य और शिवाजी जैसे समस्त पराक्रमी स्वतंत्रता-सेनानियों का स्वप्न ‘हिंदू-स्वराज्य’ की स्थापना करना ही था। ‘हिंदू’ शब्द अपने साथ इन समस्त महान जीवनों, उनके कार्यों और आकाँक्षाओं की मधुर गंघ समेटे हुए है। इस कारण यह एक ऐसा शब्द है जो संघ-रूप से हमारी एकात्मता, उदात्तता और विशेष रूप से हमारे जन-समाज को व्यंजित करता है।"}, {"person": "", "title": "अमृत वचन", "text": "यह हिंदूराष्ट्र है, इस राष्ट्र का दायित्व हिंदू समाज पर ही है, भारत का दुनिया में सम्मान या अपमान हिंदुओं पर ही निर्भर है। हिंदूसमाज का जीवन वैभवशाली होने से ही इस राष्ट्र का गौरव बढ़ने वाला है। किसी के मन में इस विषय में कुछ भ्रांति रहने का कारण नहीं है।"}, {"person": "", "title": "अमृत वचन", "text": "हम हिंदुओं ने अनन्यसाधारण आत्मिक संपत्ति प्राप्त करना अपने जीवन का लक्ष्य निर्धारित किया है। वह मानवी जीवन का अनुपमेय संपत्तिकोष है। इसकी हम स्वतंत्र रीति से अपने अंदर वृद्धि कर सकते हैं। चिरस्थायी सद्गुण, परिपूर्ण ज्ञान और आत्मा की सर्वश्रेष्ठता ही वह संपत्ति है। यह सत्य और शाश्वथत संपत्ति अपना जीवनाधार है। इसीलिये अन्य देशों की तुलना में श्रेष्ठता का अधिक अस्तित्व अपने देश में दिखाई देता है। अन्यत्र सर्वसामान्य जनता किसी वीर सेनापति अथवा पराक्रमी अधिपति की पूजा करती है। परन्तु अपने देश में सामान्य जनता ही क्या, बड़े-बड़े वीर और राजा भी अरण्यवासी, अकिंचन (जो अपने पास फटे कपड़े का एक लत्ता तक नहीं रखता), अर्धनग्न संन्यासी की चरणधूलि शिरोधार्य करते हैं।"}, {"person": "", "title": "अमृत वचन", "text": "हिंदू सिद्धांत के अनुसार कोई भी व्यक्ति श्रेष्ठता के अंतिम आविष्कार के रूप में उत्पन्न नहीं होता। ऐसा कहना ठीक भी नहीं है। क्योंकि उसका अर्थ यही होगा कि अपने समाज की नए-नए श्रेष्ठ नररत्नों के प्रसव की शक्ति समाप्त हो गई है। अपने यहाँ के सभी जानकार लोगों ने कहा है कि अखंड रूप से महापुरुष हुए हैं, हो रहे हैं और आगे भी होंगे।"}, {"person": "", "title": "अमृत वचन", "text": "हिंदू समाज में सबके लिये व्यवहार के एक नियम नहीं बनाये गये। नियमों के ये भेद प्रकृतिभिन्नता के ही कारण हैं। तात्पर्य यह कि हमने सबको एक ही लकड़ी से हाँकने का विधान नहीं किया। यदि जीवन में हम समान नियम लागू करें और उसके अनुसार सबको बराबर मात्रा में भोजन दें तो कुछ बदहजमी के कारण मर जाएंगे, जबकि कुछ भूख से। अत: अपने यहाँ क्रमानुसार विकास का विचार है। हमने मनुष्य समूहों के गुण वैशिष्ट्य के अनुसार व्यवहार का निर्देश किया है। यह उचित भी है। सारी अवस्थाओं को देखते हुए यदि मानव के पोषण के लिये उसके वैशिष्ट्य को बनाये रखकर उसका राष्ट्र के रूप में विकसित होना आवश्यक है, तो मानवता के विकास तथा कल्याण के लिये अपने राष्ट्र को उसकी संपूर्ण विशेषताओं तथा विविधताओं के साथ विकसित करना भी परमावश्यक है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे लचीले धर्म के स्वरूप की जो प्रथम नैसर्गिक विशेषता बाहरी व्यक्ति की दृष्टि में आती है, वह है पंथ एवं उपपंथों की आश्चार्यजनक विविधता। यथा- शैव, वैष्णव, शाक्त, वैदिक, बौद्ध, जैन सिख, लिंगायत, आर्यसमाज आदि। इन सभी उपासनाओं के महान आचार्यों एवं प्रवर्तकों ने उपासना के विविध रूपों की स्थापना हमारे लोक-मस्तिष्क की विविध योग्यताओं की अनुकूलता का ध्यान रखकर ही की है। किंतु अंतिम निष्कर्ष के रूप में सभी ने उस एक चरम सत्य को लक्ष्य के रूप में प्राप्त करने के लिये कहा है, जिसे ब्रह्म, आत्मा, शिव, विष्णु, ईश्वभर अथवा शून्य या महाशून्य के विविघ नामों से पुकारा जाता है।"}, {"person": "", "title": "अमृत वचन", "text": "अनेकता में ‘एकता’ का हमारा वैशिष्ट्य हमारे सामाजिक जीवन के भौतिक, आध्यात्मिक तथा सभी क्षेत्रों में व्यक्त हुआ है। यह उस एक दिव्य दीपक के समान है, जो चारों ओर विविध रंगों के शीशों से ढका हुआ हो। उसके भीतर का प्रकाश, दर्शक के दृष्टिकोण के अनुसार भाँति-भाँति के वर्णों एवं छायाओं में प्रकट होता है।"}, {"person": "", "title": "अमृत वचन", "text": "समाज एक जीवमान इकाई है। मानव, जीवसृष्टि का सबसे अधिक विकसित रूप है। इसलिये यदि किसी जीवमान समाज स्वरूप की रचना करनी हो, तो वह उसके अनुरूप होनी चाहिए। समाज जीवन की रचना भी यदि जीवमान मानव के अनुरूप ही की, तो वह भी निसर्ग के अनुकूल होने के कारण अधिक उपयुक्त होगी। मनुष्य के अवयव समान तो नहीं होते, किंतु परस्परानुकूल रहते हैं। अत: समाज की ऐसी रचना ही अधिक टिकाऊ होगी, जहाँ समान गुण एवं समान अंत:करणवाले एकत्र आकर विकास करते हुए जीवन-यापन करने के जिस मार्ग से अधिक समाजोपयोगी सिद्ध हो सकें, उसके अनुसार चल सकें। साथ ही एकाद समूह ऐसा भी चाहिये, जो संपूर्ण समाज की आवश्यकताओं को पूर्ण करने की पात्रता उत्पन्न कर, उनके पारस्परिक संबंधों को ठीक बनाये रखता हो। शरीर के अवयवों की भाँति समाजरूपी जीवमान इकाई के अंगों की आवश्यकता समझता हो, परन्तु स्वयं अपनी कोई आवश्यकता न रखता हो। ऐसा समूह ही सबको एकसूत्र में चलाने की पात्रता रख सकता है।"}, {"person": "", "title": "अमृत वचन", "text": "धर्म अथवा आध्यात्मिकता, हमारी दृष्टि में जीवन की एक व्यापक दृष्टि है, जिससे सामाजिक जीवन के सभी क्षेत्रों को अनुप्राणित और उन्नत कर उनके बीच समन्वय की स्थापना करनी चाहिये, जिससे कि मानव जीवन अपने सभी पहलुओं में पूर्णत्व को प्राप्त करे। यह हमारे राष्ट्र तरु का जीवन-रस है, हमारी राष्ट्रीय अस्मिता, सत्ता का प्राण है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारी संस्कृति कहती है कि ‘ध्येय’ (सामाजिक हित) को प्राप्त करने के ‘साधन’ (व्यक्ति) भी शुद्ध एवं पवित्र होने चाहिये।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे शास्त्रों का सार यही रहा है कि ‘शक्ति ही जीवन है, दुर्बलता मृत्यु है।’"}, {"person": "", "title": "अमृत वचन", "text": "इस देश में अनादि काल से जो समाज-जीवन रहा है, उसमें अनेक महान व्यक्तियों के विचार, गुण, तत्त्व, समाज-रचना के सिद्धांत तथा जीवन के छोटे-छोटे सामान्य अनुभवों से जीवन-विषयक एक स्वयंस्फूर्त स्वाभाविक दृष्टिकोण निर्माण होता है। वह सर्वसाधारण दृष्टिकोण ही संस्कृति है। यह संस्कृति अपने राष्ट्र की जीवन-धारणा है, विश्वा की ओर देखने की पात्रता  देनेवाली प्रेरणा-शक्ति है, एक सूत्र में गूँथनेवाला सूत्र है। भारत में आसेतु हिमाचल यह संस्कृति एक है। उससे भारतीय राष्ट्रजीवन प्रेरित हुआ है।"}, {"person": "", "title": "अमृत वचन", "text": "इन दिनों संस्कृति के नवतारुण्य को प्राय: ‘पुनरुज्जीवनवाद’ और ‘प्रतिक्रियात्मक’ होने की उपाधि दी जाती है। प्राचीन पूर्वाग्रहों, मूढ़ विश्वा्सों अथवा समाज विरोधी रीतियों का पुनरुज्जीवन प्रतिक्रियात्मक कहा जा सकता है, कारण कि इसका परिणाम समाज का पाषाणीकरण (फॉसिलाइजेशन) हो सकता है। किन्तु शाश्वपत एवं उत्कर्षहारी जीवन-मूल्यों के नवतारुण्य को प्रतिक्रियात्मक नाम दे देना बौद्धिक दिवालियापन प्रकट करने के अतिरिक्त और कुछ नहीं है।"}, {"person": "", "title": "अमृत वचन", "text": "हमें यह नहीं भूलना चाहिये कि ग्रामों में रहनेवाला वह सामान्यजन ही है, जो हमारे राष्ट्र का वास्तविक आधार है। भूतकाल में भी जब कभी हमारे समाज पर विदेशी आक्रमणों की विभीषिका आई, तब यह ‘असभ्य ग्रामीण’, ‘निरक्षर’ कहलानेवाला जनसमुदाय ही था, जो अनेक कष्टों और बलिदानों को सहन करते हुए स्वदेश एवं स्वधर्म के उद्धार हेतु उठ खड़ा हुआ।"}, {"person": "", "title": "अमृत वचन", "text": "हमारा कर्त्तव्य है कि अपने इन परित्यक्त भाइयों को, जो शताब्दियों से धार्मिक दास्य के क्लेश को भोग रहे हैं, पुन: अपने पूर्वजों के घर बुला लायें। ईमानदार, स्वतंत्रताप्रिय मनुष्यों की भाँति वे भी दास्य तथा आधिपत्य के सभी चिह्नों को उतार फेंके और वंशपरम्परानुगत भक्ति एवं राष्ट्रीय जीवन की रीतियों का अनुसरण करें। सभी प्रकार की दासता हमारी प्रकृति के प्रतिकूल है, अत: उसे त्याग देना चाहिये। यह उन सभी भाइयों के लिये आह्नान है कि वे हमारे राष्ट्र-जीवन में अपना मूल स्थान ग्रहण करें और हमारे समाज के इन लौटे हुए, भटके हुए पुत्रों के पुन: आगमन पर हम महान दीपावली का पर्व मनायें।"}, {"person": "", "title": "अमृत वचन", "text": "इस व्यावहारिक जगत् में हमें एक समाज के रूप में खड़ा होना चाहिये। पवित्रता, आत्मज्ञान, वेदांत के तत्त्व का संपूर्ण विश्वच में प्रसार करना तथा विश्वा को अंतिम सत्य की अनुभूति के उद्देश्य से प्रशिक्षित करना अपना जीवनोद्देश्य है। इस ज्ञान के अधिष्ठान पर हमें अपना जीवन बनाना होगा। अपने जीवनोद्देश्य के अनुरूप हमें अपनी प्रतिष्ठा बनाये रखनी होगी। यदि हम ऐसा नहीं करते हैं, तो हमारे अस्तित्व का कोई उपयोग नहीं है। जब तक हम समाज के रूप में शक्तिशाली, अनुशासित और संगठित नहीं होते, इस विश्वे में हम सम्मान प्राप्त नहीं कर सकेंगे।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे समाज के जो लोग हमसे अलग हुए, उसके दो कारण हैं। एक आक्रमणकारियों ने उन्हें घसीटा, और अपने घसीटे जाने पर रंज न मानते हुए उन्होंने उनके साथ मिलने में धन्यता मानी। उन्होंने आक्रमणकारियों के नाम कुल आदि स्वीकार कर उनके साथ नाता जोड़ लिया। दूसरा कारण लोगों को अपना बनाये रखने की हमारी पात्रता नहीं रही। अनेकों हमारे यहाँ से चले गये और हमने कुछ नहीं किया। आक्रमण के इस स्वरूप का चित्र देखकर दु:ख होता है या नहीं? स्रदय में चोट लगती है या नहीं? यदि संवेदना है तो इसकी व्यथा अवश्य होनी चाहिए। उसके निराकरण के लिये खड़ा होना होगा। भूमि तथा समाज का यह भयंकर ह्रास समाज कार्य के लिये चेतना उत्पन्न करने की पर्याप्त प्रेरणा नहीं दे सकता है, तो कोई अन्य बात प्रेरणा नहीं देगी।"}, {"person": "", "title": "अमृत वचन", "text": "परकीय आक्रमणों के सहायक कारणों में से प्रथम कारण है राष्ट्रजीवन की धारणा की शिथिलता। स्वार्थ के कारण हमने परस्पर संघर्ष ही नहीं किये, बल्कि सहायता के लिये परकीयों को बुलाने में भी संकोच नहीं किया। यह नहीं सोचा कि इस प्रकार हम अपनी मातृभूमि पर संकट ला रहे हैं। राष्ट्रभक्तिहीन, परस्पर संघर्षमय, असंगठित, छिन्न-विच्छिन्न समाजजीवन इसका कारण है। यदि इस कारण को हमने दूर नहीं किया, तो प्राप्त स्वतंत्रता कैसे टिकेगी?"}, {"person": "", "title": "अमृत वचन", "text": "ऐसा नहीं है कि हमारे समाज ने केवल आध्यात्मिक क्षेत्र में ही ख्याति प्राप्त की थी और दैनिक व्यावहारिक जीवन के अन्य क्षेत्रों की ओर दुर्लक्ष किया था। प्रामाणिक प्राचीन आलेखों ने नि:संदिग्ध रूप से यह प्रकट कर दिया है कि विज्ञान और कला की प्रत्येक शाखा में हम बाकी दुनिया से कई शताब्दियाँ आगे थे।"}, {"person": "", "title": "अमृत वचन", "text": "हम एक ही समाज की संतान हैं और हमें अपने सुख-दु:ख परस्पर बाँटने हैं। एकात्मता के भाव का अभाव ही हमारी दुर्गति का मूल कारण है। समाज के प्रति हमारा प्रेम और समर्पण ठोस रूप में प्रकट होना चाहिये। हमारे समाज में अनेक लोगों को दैनिक भोजन के बिना रहना पड़ता है, क्या हम उनके प्रति संवेदनशील हैं? क्या हमारे मन में उनके लिये कुछ करने की इच्छा जागृत होती है? प्राचीन काल में हमारे यहाँ ‘बलिवैश्विदेव यज्ञ’ होता था, जहाँ सर्वप्रथम निर्धन व भूखों को भोजन कराया जाता था, शेष सब बाद में खाते थे। आज भी हम समाज के भूखे लोगों के लिये मुट्ठीभर अन्न निकालकर अपना भोजन कर सकते हैं और करना भी चाहिये। यही वास्तविक ‘बलि वैश्व देव यज्ञ’ होगा।"}, {"person": "", "title": "अमृत वचन", "text": "कोई भी राष्ट्र उन्नत नहीं हो सकता, जिसका औसत व्यक्ति बौना हो और जिनके बीच कुछ ही विशालकाय असामान्य व्यक्तित्व खड़े हों। विदेश इतिहासकार तथा उस समय के यात्रियों के भी तुलनात्मक अध्ययन हमें बताते हैं कि इस देश का जनसाधारण अन्य देशों के सामान्यजन  से, एक समय में, अतुल्य श्रेष्ठ था। इसका स्पष्ट कारण था कि हमारे समाज के नेताओं ने समाज के प्रत्येक स्तर में हमारे सांस्कृतिक संस्कारों को निर्विष्ट करने के लिये लगातार अथक प्रयत्न किये थे। इसीलिये हमारे समाज के प्रत्येक वर्ग से सन्त-महात्मा तथा शूरवीर मिलते हैं, जिनके ‘विचारों एवं कृतियों’, गीतों एवं कथनों ने सम्पूर्ण ऊपरी व्यवधानों को पार करते हुए हमारे लोगों को प्रेरणा दी है।"}, {"person": "", "title": "अमृत वचन", "text": "संपूर्ण राष्ट्र की सुस्पष्ट कल्पना आँखो के सामने न होने से समाज इतना छिन्नविच्छिन्न हुआ तथा स्वार्थ-भावना इतनी प्रबल हुई कि व्यक्ति और उसके परिवार के परे व्यापक दृष्टि से और आत्मीयता से विचार करने की प्रवृत्ति और योग्यता नष्ट हुई। इसलिए अपने पवित्र स्थलों और अपने बंधुओ पर प्रहार करने के लिये अपने में से ही लोग प्रवृत्त हो सके।"}, {"person": "", "title": "अमृत वचन", "text": "राष्ट्र क्या है? यह ज्ञान हुए बिना राष्ट्रभक्ति पैदा नहीं होती। राष्ट्र-भक्ति की भावना के बिना स्वार्थ को तिलांजलि देकर राष्ट्र के लिये परिश्रम करना संभव नहीं है। इसलिये विशुद्ध राष्ट्र-भावना से परिपूर्ण, श्रद्धायुक्त तथा परिश्रमी लोगों को एक-सूत्र में गूँथना, एक प्रवृत्ति के लोंगों की परंपरा निर्माण करनेवाला संगठन खड़ा करना तथा इस संगठन के बल पर राष्ट्र-जीवन के सारे दोष समाप्त करने का प्रयत्न करना मूलभूत और महत्त्वपूर्ण कार्य है।"}, {"person": "", "title": "अमृत वचन", "text": "यह एक सर्वविदित सत्य है कि जब राष्ट्र-जीवन में दासता आती है, तब जनसाधारण के परम्परागत सद्गुणों का ह्रास होने लगता है। यह दासता मनुष्य को अनेक प्रकार के दुर्गुणों में प्रवृत्त करती है। हम एक-दूसरे के साथ विश्वाासघात करते हैं, असत्य भाषण करते हैं, असत्य आचरण करते हैं, किसी भी प्रकार का पाप-कर्म करने में हमें हिचक नहीं होती।"}, {"person": "", "title": "अमृत वचन", "text": "जब राष्ट्र में परकीय आदर्श और परकीय संस्कृति को प्रतिष्ठा प्राप्त होती है और अपनी मूल सांस्कृतिक भावना नष्ट हो जाती है, तब यह समझना चाहिये कि यह राष्ट्रीय जीवन का अंत है।"}, {"person": "", "title": "अमृत वचन", "text": "राष्ट्र के संघर्ष में सामर्थ्य का प्रकटीकरण दो प्रकार से होता है। एक तो राष्ट्र की सेना की जो शक्ति है उससे, यानि क्षात्रबल से और दूसरा समाज के अंदर की प्रखर तेजस्वी और सर्वस्वार्पण की सिद्धता से युक्त शक्ति से। इन दो शक्तियों से ही कोई राष्ट्र अजेय और संपन्न बनता है। क्षात्रवृत्ति से भरी हुई अतीव तेजस्वी सैनिक शक्ति और प्रखर राष्ट्रभक्तियुक्त सुव्यवस्थित समाज से अजेय राष्ट्र का निर्माण होता है।"}, {"person": "", "title": "अमृत वचन", "text": "जिस समाज में जन्म से प्राप्त संस्कारों के कारण अभिजात देशभक्ति की भावना व्यक्ति के अंत:करण में अंकुरित होती है, संवर्धित होती है, घर का काम छोड़कर राष्ट्र के लिये अपना सब कुछ अर्पण करने की वृत्ति रहती है और इस कारण एक सूत्रबद्ध जीवन का निर्माण होता है, उस समाज में चुनाव, राजनीति आदि बातें समाज का सुख-सौंदर्य वृद्धिंगत करने में कारणीभूत होते हैं। जिस प्रकार बलिष्ठ शरीर पर ही वस्त्रालंकार आदि शोभायमान होते हैं। जिसके हाथ-पैर लकड़ी के समान सूखे हों, उसके शरीर पर वह शोभा नहीं पाते अथवा जिस प्रकार कोई रोगग्रस्त शरीर पकवान नहीं पचा सकता, अन्न पचाने के लिये बलिष्ठ व निरोग शरीर आवश्यक होता है। उसी प्रकार शक्तिशाली, निरोग, पुष्ट राष्ट्रजीवन हो, तभी चुनाव या राजनीति सदृश आवरण शोभा पाते हैं। उनके कारण उस राष्ट्र का सुख-सौंदर्य बढ़ता है, वे सब उसके लिये उपकारक सिद्ध होते हैं।"}, {"person": "", "title": "अमृत वचन", "text": "यह हिंदूराष्ट्र है, इस राष्ट्र का दायित्व हिंदू समाज पर ही है, भारत का दुनिया में सम्मान या अपमान हिंदुओं पर ही निर्भर है, हिंदू-समाज का जीवन वैभवशाली होने से ही इस राष्ट्र का गौरव बढ़ने वाला है, यह निश्च-यपूवर्क समझ कर उस सत्य को संघ ने प्रतिपादित किया। इतने वर्षों से हम यह करते आये हैं तथा किसी के मन में इस विषय में कुछ भ्रान्ति रहने का कारण नहीं है।"}, {"person": "", "title": "अमृत वचन", "text": "यह बात अति स्पष्ट है कि हमारे राष्ट्रीय अस्तित्व का आघार राजकीय सत्ता कभी नहीं रही। अन्यथा हमारा भी भाग्य उन राष्ट्रों से अच्छा नहीं होता, जो आज केवल अजायबघर की दर्शनीय वस्तु मात्र रह गये हैं। राजकीय सत्ताधारी हमारे समाज के आदर्श कभी नहीं थे। वे हमारे राष्ट्रजीवन के आधार के रूप में कभी स्वीकृत नहीं हुए। संपत्ति एवं सत्ता के ऐहिक प्रलोभनों से ऊपर उठे हुए और सुखी, श्रेष्ठ गुणों से संपन्न एवं एकात्मता से युक्त समाज की स्थापना के लिये अपने को समग्र भावेन समर्पित करनेवाले संत-महात्मा ही इसके पथ-प्रदर्शक रहे हैं। वे धर्मसत्ता का प्रतिनिधित्व करते थे। राजा तो उस उच्चतर नैतिक सत्ता का एक उत्कृष्ट अनुगामी मात्र था। अनेक बार विपरीत परिस्थितियों में एवं आक्रामक शक्तियों के कारण अनेक राज्य सत्ताओं ने धूल चाटी। किन्तु धर्मसत्ता समाज को छिन्न-विच्छिन्न होने से सदैव बचाती रही।"}, {"person": "", "title": "अमृत वचन", "text": "प्रत्येक राष्ट्र का अपना विशिष्ट जीवन-संगीत रहता है और उसी की लयतरंग में राष्ट्र प्रगति पथ पर अग्रसर होता है। अपने हिंदूराष्ट्र ने भी अनादि काल से एक अनुपम विशिष्टता को सुरक्षित रखा है। हमारे लिये भौतिक सुख के स्वरूप अर्थात् अर्थ (सम्पत्ति का संचय) और ‘काम’ (भौतिक तृष्णाओं का समाधान) मनुष्य के एक अंश मात्र हैं। हमारे महान पूर्वजों ने घोषणा की है कि मानव पुरुषार्थ के दो और भी पहलू हैं और वे हैं ‘धर्म’ एवं ‘मोक्ष’। उन्होंने हमारे समाज की रचना इस चतुर्विध प्राप्ति के आधार पर की है। यह चतुर्विघ पुरुषार्थ हैं - अर्थ, धर्म, काम और मोक्ष। अति प्राचीनकाल से हमारा समाज केवल संपत्ति एवं वैभव के लिये ही प्रसिद्ध नहीं रहा है, वरन् इससे भी अधिक जीवन के उन अन्य दो पहलुओं के लिये रहा है। इसीलिये हम उच्च नैतिक, आध्यात्मिक एवं दार्शनिक लोग कहे जाते हैं, जिन्होंने अपना अंतिम लक्ष्य ईश्वसर से सीघे संपर्क करने अर्थात् मोक्ष से कम नहीं रखा।"}, {"person": "", "title": "अमृत वचन", "text": "राष्ट्र-कल्पना परिस्थिति के अनुसार बदलनेवाली वस्तु नहीं है। मनुष्य का मनुष्यत्व नौकरी पर निर्भर नहीं करता। किसी ने अपना व्यवसाय बदला तो उसका शरीर और गुणधर्म नहीं बदलता। विदेशी सत्ता रहने से उस सत्ता के सहारे ही अन्य समाज उद्दण्ड होते रहे हैं। इसलिये हिंदू-राष्ट्रवाद का मंडन प्रतिक्रियात्मक बात समझी गई। हिंदू-राष्ट्र की कल्पना यह एक सत्य है, इस दृष्टि से संघ ने उस भावना का जागरण किया। विदेशी शासन से संघर्ष रहते हुए भी हिंदू-राष्ट्रीयत्व की घोषणा संघ ने की, उस भावना की जागृति से समाज संगठित कर बलशाली और चैतन्ययुक्त करने का प्रयास किया। आज जब विदेशी सत्ता नहीं रही है तब ये प्रयास अधिक जोर से होने चाहिये, यही विचार परिस्थिति में हुए स्थूल परिवर्तन के कारण अपने अंत:करण में आना चाहिए।"}, {"person": "", "title": "अमृत वचन", "text": "सबसे पहला कर्त्तव्य है जिस देश को अनंतकाल से हमने अपनी पवित्र मातृभूमि माना है, उसके लिये ज्वलन्त भक्ति-भावना का आविर्भाव। द्वितीय है साहचर्य एवं भ्रातृत्व भावना, जिसका जन्म इस अनुभूति के साथ होता है कि हम एक ही महान माता के पुत्र हैं। तृतीय है, राष्ट्र-जीवन की समान धारा की उत्कट चेतना जो समान संस्कृति एवं समान पैतृक दाय, समान इतिहास, समान परम्पराओं, समान आदर्शों एवं आकांक्षाओं से उत्पन्न होती है। जीवन के मूल्यों की यह त्रिगुणात्मक मूर्ति एक शब्द में हिंदू राष्ट्रीयता है जो राष्ट्र-मन्दिर के निर्माण के लिये आधार बनती है।"}, {"person": "", "title": "अमृत वचन", "text": "जिस बात में हमारी अत्यन्त श्रद्धा है और जिसमें श्रद्धा रखना राष्ट्रीयता का परिचायक भी है, वह यह है कि यह विशाल भूमि हमारी मातृभूमि है। हम सब इसके पुत्र हैं। इसकी सेवा करना हमारा कर्त्तव्य है तथा इस भूमि के कारण राष्ट्र के नाते जो हमारा जीवन सम्भव हुआ है, उस जीवन की कीर्ति अपनी सेवा से फैलाने का स्वाभाविक कर्त्तव्य हमने अपने सामने रखा है।"}, {"person": "", "title": "अमृत वचन", "text": "कोई आश्चतर्य नहीं कि ऐसा देश, जिसकी धूलि का एक-एक कण दिव्यता से ओतप्रोत है, हमारे लिये पावनतम है, हमारी पूर्ण श्रद्धा का केन्द्र है। यह श्रद्धा की अनुभूति सम्पूर्ण देश के लिये  है, उसके किसी एक भाग मात्र के लिये नहीं। शिव का भक्त काशी से रामेश्व रम जाता है, और विष्णु के विभिन्न आकारों एवं अवतारों का भक्त, इस सम्पूर्ण देश की चतुर्दिक यात्रा करता है। यदि वह अद्वैतवादी है तो जगद्गुरु शंकराचार्य के चारों आश्रम, जो प्रहरी के समान देश की चारों सीमाओं पर खड़े हैं, उसे चारों दिशाओं में ले जाते हैं। यदि वह शाक्त है- उस शक्ति के पुजारी की जो दिव्य माँ है, विश्वा की तीर्थयात्रा के लिये बावन स्थान हैं, जो बलूचिस्तान में हिंगलाज से असम में कामाक्षी पर्यन्त और कश्मीर में ज्वालामुखी से लेकर दक्षिण में कन्याकुमारी तक फैले हुए हैं। इसका यही अर्थ है कि यह देश विश्वे की जननी का दिव्य एवं व्यक्त स्वरूप है।"}, {"person": "", "title": "अमृत वचन", "text": "राष्ट्रीय चारित्र्य का मूलाधार तादात्म्य तथा प्रेम है। यह मेरा राष्ट्र है, मैं इसका अंश मात्र हूँ, इसकी भलाई मेरी भलाई है, मैं मरूँ, चाहे परिवार डूबे, किन्तु राष्ट्र जिए, राष्ट्र अच्छा रहे- यह भाव जब उत्पन्न होता है, तब राष्ट्रीय चरित्र का निर्माण होता है। मेरे कार्य से भले ही लाभ न हो, कम से कम हानि तो न हो- यह भाव उत्पन्न होने पर चारित्र्य प्रकट होता है। जब यह विचार जाग्रत होता है और अहोरात्र राष्ट्र-चिन्तन होता है, राष्ट्र को उठाने का, राष्ट्र को सुखी करने का, राष्ट्र के प्रत्येक व्यक्ति के प्रति कर्त्तव्य पूर्ति का विचार होता है, मैं अपने बारे में न सोचूँगा, राष्ट्र सुखी है या नहीं केवल यही सोचूँगा, मैं रहा या न रहा, उससे क्या, राष्ट्र रहना चाहिये - जब इस प्रकार का भाव जागृत होता है, तब इस राष्ट्र-प्रेम से परिपूर्ण राष्ट्र-कल्पना से विशुध्द चारित्र्य उत्पन्न होता है।"}, {"person": "", "title": "अमृत वचन", "text": "सब विद्वानों ने विचार कर यह बात रखी है कि चरित्र या स्नेह का आधार एकात्मता है। जो इस एकात्मता को पहचानेगा, वही स्नेह कर सकेगा, वही असुखी होते हुए भी प्रेम करेगा। अत: केवल चारित्र्य का आग्रह करने से चारित्र्य निर्माण नहीं होगा, उसके लिये ठोस आधार लेना पड़ेगा। भारत में प्राचीन काल से चला आनेवाला हमारा संस्काररूप जीवन जिसे संस्कृति कहते हैं, वही सामान्य अधिष्ठान है। उसके जागरण से ही एकात्मता संभव है। प्रत्येक व्यक्ति एकात्मता का व्यक्त रूप है, यह समझ कर समाज की सेवा करना ही धर्म है। जैसे कि जीवाणु शरीर की सेवा करते हैं, कोई भी आवश्यकता से अधिक संचय नहीं करता; वैसे ही समाज को एकात्मस्वरूप जानकर (केवल मानकर नहीं) अपने जीवन को समष्टिरूप समाज की सेवा में लगा देना ही जीवन का साफल्य है। एकात्मता का भाव ही सुंसगठित रूप दे सकेगा। इस प्रकार के सांस्कृतिक विचारों को लेकर ही हम समाज की पुनर्रचना करना चाहते हैं।"}, {"person": "", "title": "अमृत वचन", "text": "शारीरिक शक्ति आवश्यक है, किन्तु चरित्र उससे भी अधिक महत्त्व का है। बिना चरित्र के केवल शक्ति मनुष्य को पशु बना देगी। वैयक्तिक तथा राष्ट्रीय दृष्टिकोण से भी चरित्र की शुद्धता राष्ट्र के वैभव एवं महानता की जीवन-प्राण होती है।"}, {"person": "", "title": "अमृत वचन", "text": "यदि महान जागतिक लक्ष्य में हम सफलता प्राप्त करना चाहते हैं तो हमें प्रथम अपना उदाहरण प्रस्तुत करना होगा। हमें विदेशी वादों की मानसिक शृंखलाओं और आधुनिक जीवन के विदेशी व्यवहारों तथा ‘अस्थिर फैशनों’ से अपनी मुक्ति कर लेनी होगी। परानुकरण से बढ़कर राष्ट्र की अन्य कोई अवमानना नहीं हो सकती। हम स्मरण रखें कि अन्धानुकरण का अर्थ प्रगति नहीं होता। वह तो आत्मिक पराधीनता की ओर ले जाता है।"}, {"person": "", "title": "अमृत वचन", "text": "केवल साक्षरता प्रसार यानी शिक्षा ऐसी मेरी धारणा नहीं है, अन्य शिक्षा भी दी जानी चाहिये। साक्षरता प्रसार के पीछे मतदान का प्रश्नव प्रमुख रहता है। अपने को सत्ता की आकांक्षा नहीं है। अपने यहाँ साक्षरता का प्रसार शिक्षा का एक पहलू है। व्यावहारिकता, कार्य के लिये दृढ़ भावना निर्माण करना उसका प्रमुख हेतु था।"}, {"person": "", "title": "अमृत वचन", "text": "वर्तमान की शिक्षा जीवलोक में ‘अर्थकरी विद्या’ है। इस प्रकार की विद्या से केवल अर्थ प्राप्त होता है, जीविका का साधन प्राप्त होता है। परन्तु आज की विद्या तो ‘अर्थकरी’ भी नहीं रह गई है। नौकरी करना दास-प्रवृत्ति ही तो है। नौकरी करना यानी गुलामी करना। अर्थकरी का तात्पर्य है कि जो अध्ययन किया है, जो बुद्धी है, उससे स्वंतत्रतापूर्वक अपना द्रव्यार्जन कर जीविका चलाना। जो इस प्रकार अपनी जीविका चला सकता है, वास्तव में उसी की विद्या अर्थकरी है। आज ऐसी अर्थकरी विद्या अपने यहाँ नहीं है। केवल नौकरी की प्रवृत्ति उत्पन्न करनेवाली विद्या यहाँ चल रही है, ऐसी विद्या से देश की भलाई नहीं हो सकती।"}, {"person": "", "title": "अमृत वचन", "text": "अपने यहाँ शिक्षा का हेतु बहुत ही उच्च बताया गया है। शिक्षा से मनुष्य में जो एक चिरंतन सत्य तत्त्व है, उसे अविष्कृत करने की क्षमता प्राप्त होनी चाहिये। उसके लिये आवश्यक गुण विकसित हों, जिससे जगत् भर के अनेकानेक आवश्यक विषयों का ज्ञान प्राप्त होकर, उसे यह बोध हो सके कि अपनी सत्य अवस्था का ज्ञान मुझे है। इसलिये अपने यहाँ कहा गया है कि प्रत्येक मनुष्य को वे प्राथमिक बातें सीखनी चाहिये, जिनसे मनुष्य को अपनी वास्तविक स्थिति अर्थात अपने चिरंतन तत्त्व का थोड़ा-बहुत बोध हो सके। मनुष्य की आत्मा को मानो प्रकट करना ही शिक्षा का कार्य है। इस अर्थ में तो आजकल कहीं शिक्षा होती नहीं। केवल इधर-उधर के दो-चार विषयों के टूटे-फूटे, अधकचरे टुकड़े ही दिमाग में भरे जाते हैं। इसका अर्थ यह हुआ कि दिमाग को कचरा डालने वाली पेटी बना दिया गया है।"}, {"person": "", "title": "अमृत वचन", "text": "यह सुनिश्चि त है कि किसी भी प्रकार की प्रतिकूल परिस्थिति में साहस के साथ अपना मार्ग निकालते हुए, सब प्रकार के संकटों को कुचलते हुए तथा उनकी परवाह न करते हुए, संघ अपने विशिष्ट मार्ग से निरन्तर प्रगतिपथ पर अग्रसर रहेगा। हम पर जितने आघात होंगे उतनी ही अधिक शक्ति से रबर की गेंद के समान उछल कर ऊपर ही उठेंगे। हमारी शक्ति अबाधित रूप से बढ़ती ही जायेगी और एक दिन वह सारे राष्ट्र में व्याप्त हो जायेगी।"}, {"person": "", "title": "अमृत वचन", "text": "स्वराज्य-प्राप्ति एक घटना है, क्रिया है। स्वतंत्र समाज-जीवन सुरक्षित और संपन्न रखना चिरंतन महत्त्व का प्रश्ने है। उसके लिये राष्ट्र सदैव सिद्ध रहना चाहिए। वह सिद्धता रहने के लिये राष्ट्र-जीवन में से हानिकारक अवगुण मिटाकर सुसूत्र, सामर्थ्यशाली समाज-जीवन निर्माण करने की दृष्टि से अपना कार्य खड़ा किया गया है। हिंदू-राष्ट्र-जीवन की कल्पना निर्भयपूर्वक सामने रखकर उसकी गौरववृद्धि के लिये सारा समाज एकसूत्र में संगठित करने का कार्य अपने सामने है। इसलिये संघ के नाम सहित प्रत्येक बात का सूक्ष्मता से विचार कर कार्य की रचना की गई है।"}, {"person": "", "title": "अमृत वचन", "text": "समष्टि-जीवन की भावना के आधार पर निर्मित संगठन से उत्पन्न सामर्थ्य के भाव या अभाव में ही स्वतन्त्रता का भाव या अभाव होता है। जिस परिश्रम से स्वतन्त्रता प्राप्त की जाती है उसकी रक्षा के लिये उससे अधिक परिश्रम की आवश्यकता है। इतना ही नहीं, तो राष्ट्र का गौरव, मान, सम्मान और वैभव भी उस समाज के संगठन पर ही निर्भर है। इस कार्य में परिस्थिति के कारण परिवर्तन की आवश्यकता नहीं होती। इसीलिये उन्होंने संघकार्य को परिस्थिति-निरपेक्ष कहा। यह कार्य परिस्थिति की प्रतिक्रिया से उत्पन्न नहीं हुआ, अपितु इसका आधार भावात्मक है। अपने समाज को सुसंगठित करने के लिये, राष्ट्र के प्रवाह को अखंड बनाये रखने के लिये ही इस कार्य का निर्माण हुआ है।"}, {"person": "", "title": "अमृत वचन", "text": "इस विशाल देश में भिन्न-भिन्न भाषाओं और रीति-रिवाजों से युक्त होते हुए भी हम एक समाज के अंग हैं और वह हिंदू समाज है। वह भारत का समाज है, इस भूमि का समाज है। उसका जीवन इस भूमि के साथ मिला हुआ है। भारत का इतिहास याने हिंदू समाज का इतिहास है। अर्थात् भारत का जीवन हिंदू का जीवन है। भारतीय राष्ट्र हिंदू-राष्ट्र के नाते जीवन व्यतीत करने की बात हमने स्पष्ट रूप से, निर्भयतापूर्वक, बिना किसी हिचकिचाहट के, दूसरों की टीका का भय पाले बिना पूर्ण विश्वाास के साथ रखी तथा इस सत्य को संसार से भी मान्यता प्राप्त करा लेने के लिये हमने आग्रहपूर्वक इसका प्रतिपादन किया। उसे सिध्द करने तथा प्रकट करने के लिये ही राष्ट्रीय स्वयंसेवक संघ का निर्माण हुआ।"}, {"person": "", "title": "अमृत वचन", "text": "सप्त रंगों के सम्मिश्रण से जैसे शुभ्र प्रकाश निर्माण होता है, वैसे ही खान-पान, भाषा, वेश-भूषा आदि की विविघता से हमारा जीवन एकात्म रूप से प्रकाशित हुआ है। इसी का नाम भावनात्मक एकता है। यह एकता, सौदेबाजी से निर्माण नहीं होती। भावनात्मक एकता की आधारशिला है, अंत:करण में समान भावनाओं की विद्यमानता। गहन चिंतन और निकट संपर्क से ही इस भावना की अनुभूति संभव है। सबको यह अनुभूति हो सके, इसी दृष्टि से संघकार्य की रचना की गई है। विविधता में एकता का दर्शन करानेवाली संघ की कार्यप्रणाली बेजोड़ है। दैनिक शाखा के कार्यक्रम में व्यक्ति रम जाता है और उसके अंत:करण में एकता के भाव जाग उठते हैं।"}, {"person": "", "title": "अमृत वचन", "text": "यह राष्ट्र जो अपने सामने खड़ा है वही परमात्मा का व्यक्त रूप है। भगवान के स्वरूप का विवरण करते हुए अपने यहाँ स्पष्ट कहा गया है ‘सहस्रशीर्षा पुरूष: सहस्राक्ष: सहस्रपाद्’ (ॠग्वेद 10-90-1)। व्याख्या के अनुसार समाजरूपी भगवान की पुन:स्थापना जगत् में करने का जो हमारा संकल्प है, वही धर्म है, अन्य सब अधर्म है। इसी नियम के अनुसार अपने कार्य में आनेवाली बाधाओं को हटाने की दृष्टि से जो काम किया जाए वही धर्म है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारा काम गुणात्मक है। उसकी तुलना क्षेत्रात्मक कार्यों से नहीं की जा सकती। हमें तो वह शक्ति निर्माण करनी है जो नियंत्रित और अनुशासित हो। जिसके एक शब्द पर बड़े से बड़ा कार्य आरम्भ हो, इच्छा करने पर उसका संवरण भी किया जा सके। हमारा लक्ष्य केवल लोकजागरण करना ही नहीं हैं। कभी-कभी लोग सोचते हैं, उससे भी बड़ा काम खड़ा हो जाता है। किन्तु वह जितनी जल्दी खड़ा होता है, उतनी ही जल्दी नष्ट भी हो जाता है। सन् 1921 का असहयोग आन्दोलन और 1942 का ‘भारत छोड़ो’ आन्दोलन इसके अच्छे उदाहरण है। एक बार आन्दोलन शुरू हुआ कि वह कौनसी दिशा लेगा, यह कहा नहीं जा सकता। उस पर नियंत्रण रहता नहीं। इन आंदोलनों से ध्वंस तो हो सकता है, निर्माण नहीं। सामूहिक निर्माण शक्ति की दृष्टि से अपना कार्य लोकक्षोभात्मक कार्य से उत्पन्न शक्तिओं से अधिक है। अपना कार्य नियंत्रित कार्यशक्ति निर्माण करने का है, लोकक्षोभ उकसाने का नहीं। यदि लोकक्षोभ पैदा करने की आवश्यकता हुई तो उसे काबू रखने की पात्रता भी हमें निर्माण करना है।"}, {"person": "", "title": "अमृत वचन", "text": "कार्यपद्धति से शरीर, मन और बुद्धि एक ही दिशा में कार्य करने लगती हैं। इसमें से राष्ट्रभक्ति और मातृभक्ति का आविर्भाव होता है और वह संपूर्ण समाज में व्याप्त होती है। यह कार्य अत्यंत कठिन है। किंतु डॉक्टर साहब द्वारा निर्मित कार्यपद्धति उतनी ही सुगम है। इसी में उनकी अलौकिकता प्रकट हुई है।"}, {"person": "", "title": "अमृत वचन", "text": "पद्धति कोई भी हो, उसकी सफलता के लिये अच्छे लोग चाहिए। ऐसे लोग समाज में खड़े करने होंगे, जिनके स्रदय में समाज के लिये आत्मीयता है, कल्याण है। जो समाज के दु:ख से व्यथित होते हैं, जिनके अंदर अपने स्वार्थ को नियंत्रित करने की शक्ति है और उसके लिये शारीरिक व मानसिक कष्ट उठाकर भी समाजहित के कार्य में संलग्न हैं। ऐसे सब लोगों की शक्ति समाज की आवश्यकतानुसार सूत्रबद्ध ढंग से सम्पूर्ण राष्ट्र में प्रयुक्त हो सके, ऐसा अनुशासन व शिक्षा देने की व्यवस्था करना अनिवार्य है। समाज में ऐसे कार्यकर्ताओं के निर्माण का मूलगामी कार्य हम अपनी शाखाओं द्वारा कर रहे हैं। व्यक्तियों में जितना सामंजस्य उत्पन्न होगा, उतना ही प्रगति की ओर अग्रसर होना संभव होगा। माना कि इस कार्य में समय लगेगा, परन्तु कोई तत्काल कठोर कार्यवाही से लाभ नहीं होगा। व्यक्ति की अन्त:प्रेरणा जगाकर ऐसे कोई के लिये प्रेरित करने का अपना यह कार्य है।"}, {"person": "", "title": "अमृत वचन", "text": "कार्य के दो स्वरूप हैं। एक, दैनंदिन शाखा का है। चौबीस घण्टों में हम जो कुछ संघकार्य करते हैं, उसका हिसाब-किताब करने का स्थान, संघ-स्थान है। कुछ अनुशासन आदि सीखने और एक-दूसरे के साथ कंघे से कंधा भिड़ा कर खेलने-कूदने; व्यायाम करने से समग्र समाज के सम्बन्घ में अन्त:करण में जो अभेदवृत्ति निर्माण होती है, उसे प्राप्त करने का वह स्थान है। शाखा कार्य का दूसरा हिस्सा है अतिरिक्त बचे हुए समय का उपयोग अपने चारों ओर के समाज-बंधुओं के बीच जाने के लिये करना और समाज में से व्यक्ति चुन-चुनकर अपने साथ लाने का प्रयास करना। प्रत्येक को अपने समय का उपयोग इन दोनों कार्यों के लिये करना चाहिए। लोगों के साथ निकटतम संपर्क के द्वारा आत्मीयता का वायुमण्डल बढ़ानेवाला कार्य चौबीसों घण्टे चलते रहना चाहिए। इस प्रकार से हम लोग प्रयत्न करें, तो मैं समझता हूँ कि थोड़े ही दिनों में और पर्याप्त मात्रा में ऐसी पवित्र शक्ति के रूप में हम खड़े हो जाएंगे, जिसकी आवाज समाज में सब लोग सुनते हैं। देश, राष्ट्र और समाज के हित के लिये यह आवश्यक है।"}, {"person": "", "title": "अमृत वचन", "text": "अपनी कार्यप्रणाली व्यक्ति के अंतकरण को विचार की मार्यादा में अवरुद्ध नहीं रखती। यह व्यक्ति को श्रेष्ठता, मान-सम्मान की लालसा पैदा करनेवाली आकर्षक वस्तुओं से मुँह मोड़ना सिखाती है। समाज से एकरस, एकरूप अवस्था का, साक्षात् अनुभव दिलाकर कार्यप्रवण करती है।"}, {"person": "", "title": "अमृत वचन", "text": "मनुष्य कार्यपद्धति का मूल्यांकन इस कसौटी पर करता है कि वह तुरंत फलदायी है या नहीं। वह सोचता है कि वर्तमान समस्याएँ हल करने में ही कृतार्थता है। अत: कार्य की रचना ऐसी हो जिससे व्यावहारिक समस्याएँ हल करने में सफलता मिल सके। परंतु प्रश्न् यह है कि क्या इन तात्कालिक समस्याओं पर ही राष्ट्र का सारा जीवन निर्भर है? भीषण गरीबी, आर्थिक विषमता आदि जो अनेक समस्याएँ सामने खड़ी हैं, उन्हें हल करने के लिये राजनैतिक शक्ति के प्रयोग और उपभोग की प्रवृत्ति पैदा होती है। ये वर्तमान समस्याएँ हल हुईं भी तो क्या राष्ट्र के सामने और समस्याएँ नहीं रहेंगी? समस्याएँ बदलेंगी, रोज नई उपाय योजना करनी पडे़गी। परंतु प्रयत्न करने की परंपरा न हो तो वह किस प्रकार संभव होगा? प्रयत्न करने की अविच्छिन्न परंपरा निर्माण करने के प्रयासों में ही अंतिम कल्याण है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे लोग सोचने लगे थे कि विदेशियों की वेषभूषा, रहन-सहन, भाषा, सामाजिक, राजनैतिक और आर्थिक व्यवस्थाओं की नकल करने से प्रतिष्ठा प्राप्त होगी। आज भी वही अनुकरण की प्रवृत्ति दिखाई दे रही है। यद्यपि अंग्रेज यहाँ से चले गये हैं, तथापि वेषभूषा, भाषा, राजनैतिक, सामाजिक व्यवस्थाओं तथा आर्थिक पुनर्रचना में हम किसी न किसी विदेशी प्रणाली की नकल करने में लगे हैं। कहा जाता है कि अपने देश में पुनरुज्जीवन की लहर आई है, उसके प्रभाव से हमारे समाज-जीवन में हम पहली बार आधुनिक और प्रगतिशील समाज के रूप में सामने आ रहे हैं। सामाजिक न्याय, राजनैतिक, औद्योगिक और आर्थिक क्रांति आदि बातें पहली बार अपने यहाँ आई हैं। लोगों का मानना है कि इन सबसे हम अपनी संस्कृति की पुन:स्थापना कर सकेंगे। यद्यपि हम जानते हैं कि हम यह जो सामाजिक पुनर्रचना कर रहे हैं, वह पाश्चाेत्य देशों में प्रचलित उस आकारहीन समाज-व्यवस्था का अंधानुकरण है, जिसने समाजजीवन के विभिन्न कार्यों के संचालन की दृष्टि से कोई निश्चिणत रूप धारण नहीं किया है। पाश्चाित्य समाजरचना, समाज की प्रगतिशीलता की चरम अवस्था है और वह सर्वोत्तम है, यह भी अभी अनुभव से सिद्ध नहीं हुआ है।"}, {"person": "", "title": "अमृत वचन", "text": "खुली आँखों से दुनिया की ओर देखते हुए, भिन्न-भिन्न प्रगत देशों से उत्तम, उपयुक्त व अपने जीवन से साम्य पा सकनेवाली बातें लेकर, उन्हें पचाकर अपने जीवन में मिला लेना एवं उससे अपने वैशिष्ट्यपूर्ण जीवन को समृद्ध करना योग्य है। परंतु दूसरे देशों की ऐहिक प्रगति देखकर केवल अंधों के समान उनका अनुकरण करना घातक है। कोई भी राष्ट्र परानुकरण करके दुनिया में उत्कर्ष, मान, प्रतिष्ठा प्राप्त नहीं कर सकता। उलटे वह हास्यास्पद होगा। सिंह की खाल ओढे़ गधे-सी उसकी स्थिति होगी।"}, {"person": "", "title": "अमृत वचन", "text": "कई लोग पृथ्वी के भिन्न-भिन्न समाजों की जीवन प्रणालियों को अपने यहाँ लादने की चेष्टा करते हैं। एक दूसरे पर मढ़ने से काम नहीं चलेगा। यदि मनोरचना का विचार न करते हुए बलात् लादने का प्रयत्न हुआ, तो भ्रम ही उत्पन्न होता है। स्वभाव का सहज विकास न करके कोई वस्तु जबरदस्ती थोपने से भ्रष्टता उत्पन्न होती है। इसके अनेक उदाहरण आज के जीवन में तो मिलते ही हैं, प्राचीन ग्रंथों में भी तपोभ्रष्ट ॠषियों का उल्लेख है। राष्ट्र के बारे में भी यही बात सत्य है। राष्ट्र भी एक जीवमान व्यक्तिसदृश इकाई है। जैसे व्यक्ति की प्रकृति के विरुद्ध दूसरी भावना का आरोप करना हानिकारक होता है, वैसे ही राष्ट्रजीवन में उसकी विशेषता को भुलाकर बलपूर्वक दूसरे भाव भरना व्यभिचार है। अत: जो अपने राष्ट्रजीवन को दूसरे ढाँचे में ढालना चाहते हैं, वे समाजजीवन के साथ प्रामाणिकता का व्यवहार नहीं करते।"}, {"person": "", "title": "अमृत वचन", "text": "चंदन, भस्मलेपन, देवतावंदन, आदि बाह्य उपकरण धर्म नहीं है। समूची सृष्टि जिन सूक्ष्म नियमों के आधार पर शून्य में विलीन न होकर चलती रहती है, उसको धर्म कहते हैं। उन नियमों का मनुष्य के जीवन में उतरना धर्म होता है।"}, {"person": "", "title": "अमृत वचन", "text": "धर्म बहुत व्यापक शब्द है। अनेक अर्थ उसमें समाविष्ट हैं। इस शब्द के संबंध में जाने अनजाने अनेक भ्रम आजकल प्रचलित हैं। इन भ्रमों के कारण धर्म शब्द का ठीक बोध होना सामान्य व्यक्ति के लिये कठिन हो गया है। अपने प्राचीन महापुरुषों ने धर्म की व्याख्या अनेक प्रकार से की है। वे सब व्याख्याएँ परस्पर मेल रखती हैं। उन व्याख्याओं में जो सबसे अधिक मान्य और प्रचलित व्याख्या है- ‘यत: अभ्युदय नि:श्रेयससिद्धि: स धर्म:।’ (वै.द"}, {"person": "", "title": "अमृत वचन", "text": "2)"}, {"person": "", "title": "अमृत वचन", "text": "मनुष्य-मनुष्य में भेद उत्पन्न हो गया है और हमारा दुर्भाग्य ऐसा है कि इन भेदों में लोग धर्म को भी घसीट लाये हैं। धर्म सबको एकत्र करनेवाला, सबको श्रेष्ठ बनानेवाला सूत्र है। जिसका कार्य ही यह है कि सभी प्रवृत्तियों का समन्वय कर मनुष्य को एक अत्यंत उत्कृष्ट विकसित अवस्था प्राप्त करा देना। पर लोग धर्म का नाम लेकर उसकी आड़ में मनुष्य के बीच भेदों को उग्र, उग्रतर और उग्रतम बनाते जा रहे हैं। यह विभीषिका आज जगत् के सामने खड़ी है।"}, {"person": "", "title": "अमृत वचन", "text": "हमारी सभी प्रवृत्तियाँ और विषय-भोग एक और धर्म तथा दूसरी ओर मोक्ष के बीच सधे हुए हैं। जैसे दोनों तटों के बीच बहती नदी जीवनदायिनी होती है, परंतु उनका उल्लंघन करते ही वह विनाशकारी हो जाती है। ठीक यही स्थिति मानव जीवन के प्रवाह की है। धर्म और मोक्ष के बीच बहता जीवन प्रवाह व्यक्ति व समाज दोनों के लिये सुखदायी होता है।"}, {"person": "", "title": "अमृत वचन", "text": "संघर्षमुक्त और दु:खमुक्त एकात्म मानव की कल्पना ही अपने अतिप्राचीन राष्ट्र की प्रेरक शक्ति है। वही अपना अनादि-अनंत स्फूर्ति केन्द्र है। सर्वेपिऽसुखिन: सन्तु, सर्वे सन्तु निरामया: सदैव से हमारी प्रार्थना रही है। हम परमेश्व र से यही निवेदन करते रहे हैं कि सब लोग सुखी और व्याधिमुक्त रहें। ‘पश्चिनमी जगत् के आज के विद्वान अभी भी अधिकतम लोगों के अधिकतम सुख’ की संकल्पना से परे नहीं जा पाये हैं, पर हम भारतीयों को तो एक भी प्राणी का दु:ख असहनीय है। प्राणिमात्र के चिरकल्याण के भव्य व उदात्त आदर्श को हमने अंगीकार किया है।"}, {"person": "", "title": "अमृत वचन", "text": "प्रत्येक राष्ट्र के जीवनसंगीत का एक विशिष्ट स्वर होता है। उसके साथ सुसंवाद साधने पर ही राष्ट्र की प्रगति होती है। अपने हिंदू राष्ट्र ने भी अनादिकाल से एक विशिष्टता का रक्षण किया है। भारतीय दृष्टि से अर्थ पुरुषार्थ और काम पुरुषार्थ भौतिक सुख के पहलू हैं। यह मानवी जीवन के केवल उपांग हैं। इनसे सब परिचित भी हैं। परन्तु अपने पूर्वजों ने धर्म व मोक्ष पुरुषार्थ को मानवी जीवन के लिये अधिक महत्त्वपूर्ण बताया है। धर्म, अर्थ, काम और मोक्ष इन चार पुरुषार्थों के आधार पर ही उन्होंने अपने समाज की रचना की। अतिप्राचीनकाल से अपना समाज संपत्ति और समृद्धि के लिये तो विख्यात रहा ही, लेकिन उससे भी अधिक ऊपर बताये गये बाकी जीवन के दो पहलुओं के लिये विशेष रूप से जाना गया। इसी लिये अत्यन्त नीतिमान्, आध्यात्मिक व तत्त्वज्ञानी समाज के नाते अपने को जाना जाता रहा है। अपने यहाँ मोक्ष प्राप्ति अर्थात् प्रत्यक्ष परमेश्वतर से संबंध स्थापित करने को ही मनुष्य जीवन का अंतिम  लक्ष्य माना गया।"}, {"person": "", "title": "अमृत वचन", "text": "आजकल एक शब्दप्रयोग किया जाता है कि ‘मनुष्य के जीवनस्तर को ऊँचा उठाना है।’ यह कहने का उनका अर्थ इतना ही होता है कि अधिकाधिक भौतिक सुखों को प्राप्त करना। इंद्रियों को सुख देनेवाले इन विषयों की प्राप्ति के लिये अर्थ का संचय करना क्रम-प्राप्त है। संपत्ति का संचय करने के लिये सत्ता की आवश्यकता होती है। इसलिये संसार के बलवान् राष्ट्र अपनी शक्ति के बलबूते पर अन्य राष्ट्रों का शोषण कर, उन्हें कष्ट दे अपनी झोली भरते हैं। इसी में से सत्ता संघर्ष प्रारंभ होता है। फिर युद्ध होते हैं, सारे नीति-नियम उद्ध्वस्त होते हैं। अध:पतन की इस प्रक्रिया को स्पर्धा का सुंदर नाम दिया जाता है।"}, {"person": "", "title": "अमृत वचन", "text": "एक मत या संप्रदाय के अनुयाइयों ने दूसरे मत या संप्रदाय के अनुयाइयों पर आक्रमण नहीं करना चाहिये, इतने पर हिंदू जीवन दर्शन ठहरा नहीं। हिंदू जीवनदर्शन जीवनव्यापी और सर्वसमावेशक है। हिंदू सत्ताधीशों में यह दर्शन अत्यधिक गइराई तक समाया हुआ है। इसी कारण हिंदू राजा अल्पसंख्यकों के मत व संप्रदायों का समादर करते रहे हैं। इतना ही नहीं, वे उन अल्पसंख्यकों के स्वाभाविक विकास में प्रत्यक्ष सहयोग भी करते रहे हैं। हमारे राजा कभी धर्म या संप्रदाय विरोधी नहीं रहे। वे तो सारे धर्मों का आधार होते थे, संरक्षक होते थे। धर्मनिरपेक्ष शब्द का वास्तविक आशय भी यही है। यह विधायक विचार ही भारत ने स्वीकार किया है। इस अर्थ में भारतीय राज्यशासन सच्चे अर्थ में सदैव से धर्मनिरपेक्ष रहा है। इसी कारण अपने देश में राज्य पद्धति का वर्णन करते समय धर्मनिरपेक्षता के विशेषण का उपयोग करना अनावश्यक है।"}, {"person": "", "title": "अमृत वचन", "text": "साम्यवाद में वर्गसंघर्ष का चाहे जितना विचार हो, परंतु अंत में ऐसी अवस्था का ही चित्र देखा है, जिसमें सभी संघर्ष शांत होकर वर्गविहीन तथा राज्यविहीन अवस्था का निर्माण हो। किंतु आज के स्वार्थलिप्त तथा विषयासक्त मानव के लिये यह बात कविकल्पना तथा आकाशपुष्प की भाँति मिथ्या है। मानव जब अतिमानव बनेगा, सृष्टि के साथ अपने संबंधों का साक्षात्कार करेगा, चारित्र्य को ऊपर उठाएगा और परस्पर एकात्मता की पूर्ण अनुभूति करेगा, तभी राज्यविहीन समाज की रचना संभव होगी। हमारे प्राचीन विचारकों ने भी कहा है-  \nन वै राज्यं न राजासीत् न दण्डो न च दाण्डिक:।\nधर्मेणैव प्रजा: सर्वा रक्षन्ति स्म परस्परम्॥\nन राज्य की आवश्यकता है, न राजा की, न दंड-विधान की और न दांडिक की। यदि आवश्यकता है तो केवल धर्म की। धर्म से ही प्रजा सौहार्द से रहेगी।"}, {"person": "", "title": "अमृत वचन", "text": "धर्मनिरपेक्षता और राष्ट्रीयता को समानार्थी मानने के कारण एक बड़ा वैचारिक संभ्रम उत्पन्न होता है। ये दोनों शब्द किसी भी अर्थ में समानार्थी नहीं हैं। राष्ट्र एक परिपूर्ण प्राणवान् घटक है। राष्ट्रजीवन के अनेक अंग-उपांग होते हैं। उनमें से शासन करनेवाली संस्था उसका एक अंग है। परन्तु धर्मनिरपेक्षता शासनसंस्था के अनेक गुणविशेषों में से एक गुणविशेष है। इसलिये धर्मनिरपेक्षता व राष्ट्रीयता को समानार्थी कहने का अर्थ शरीर के किसी अवयव के कार्य को संपूर्ण शरीर का कार्य कहने के समान है। राष्ट्र और राज्य के मूलभूत स्वरूप के विषय में अज्ञान होने के कारण ही ऐसा होता है। यह बहुत ही खेदजनक है।"}, {"person": "", "title": "अमृत वचन", "text": "लोग समझते हैं कि दुनिया के इतिहास में राजनीतिक कार्य ही चिरंजीव हुए हैं। जब कि यह सत्य नहीं है। मान्घाता जैसे महीपति नष्ट हो गए। यहाँ तक की ज्ञानेश्वकरी में कहा है, कि पुराण भी केवल मरे हुओं की कहानियाँ मात्र ही हैं। राजनीतिक विचार-प्रणाली, पंथ, सम्प्रदाय, राज्य कुछ भी चिरंजीव नहीं रहे। जल्दी हो या देर से पर नष्ट हो गए। धर्म पर जो अटल हैं, वे ही जीवित हैं।"}, {"person": "", "title": "अमृत वचन", "text": "आजकल इस प्रकार एक ही साँचे में व्यक्ति को जकड़ने का प्रयोग विदेशों में चल रहा है। जिस देश में भाषा, कृति व विचारों को एक निश्चिुत साँचे में जकड़ कर, किसी एक व्यक्ति के मार्गदर्शन में सबको चलाने का प्रयास किया गया, वहाँ एक प्रकार का दहशत का वातावरण है। अब अपने देश में भी उसका अनुकरण करने की चेष्टा हो रही है। किसी एक ही ढाँचे में सबके जीवन को जकड़ डालना, हमारी संस्कृति को अभिप्रेत नहीं। इस प्रकार का साँचेबंद जीवन हमारी परंपरा में निकृष्ट और त्याज्य माना गया है। यदि सभी लोगों के वर्ण, नाक, कान एक जैसे ही हो जाएँ, उसमें कोई भी भिन्नता न रहे, तो एक दूसरे को देखकर अंत:करण ऊबने लगेगा। प्रत्येक की प्रतिमा अलग-अलग ही चाहिये। विविधता देखकर मन प्रसन्न होता है; विविधता से जीवन में सरसता उत्पन्न होती है।"}, {"person": "", "title": "अमृत वचन", "text": "हमें उत्तरदायित्वपूर्ण व्यवहार करनेवाले, ध्येयवादी, कठोर निश्चअयी, अपना सब कुछ संघ को समर्पित करनेवाले युवकों को एकसूत्र में पिरोना है। अपने स्वयं से प्रारंभ कर यह उत्तरदायित्व ग्रहण किया जाए। अपने अन्त:करण में अन्य वृत्तियों को स्थान न रहे। सुवर्ण के कण-कण को तोड़ा गया तो भी शुद्ध सुवर्ण ही मिलता है, उसी प्रकार अपने मन का कण-कण संघमय रहना चाहिये। अखण्ड तैल-धारा के समान अपनी वृत्ति एकाग्र रहनी चाहिये। इतनी तन्मयता हो कि अपने सारे व्यवहार-भोजन, शयन आदि संघ के लिये ही हों।"}, {"person": "", "title": "अमृत वचन", "text": "यद्यपि अत्यन्त प्रक्षोभजनक, उद्वेग पैदा करनेवाली घटनाएँ होती हों, तब भी अपना धीरज और गम्भीर वृत्ति नहीं छोड़नी चाहिये। लोग भले ही अपनी उस वृत्ति का उपहास करते हों, फिर भी हमें उसके बारे में मौन रहना चाहिये। हमें संगठन करना है, इसलिये अहंकार का त्याग करना होगा। अहंकार-त्याग ही सर्वस्व त्याग है। अहंकार का त्याग करने के पश्चाीत् त्याग करने को कुछ भी शेष नहीं बचता।"}, {"person": "", "title": "अमृत वचन", "text": "हम लोग काम में शीघ्रता से जुटें, इसलिये अपने डॉक्टर जी हमें कार्यवृद्धि की मर्यादा बतला गये हैं कि ‘नगरों में तीन प्रतिशत और ग्रामों में एक प्रतिशत ऐसे स्वयंसेवक तैयार किये जाएँ, जिनका जीवन संघमय हो।’ इसका यह अर्थ नहीं है कि तीन और एक प्रतिशत की सीमा पूर्ण करने मात्र से संघकार्य पूरा हो जाएगा। हम लोग पूरी शक्ति के साथ काम में जुटें, इसके लिये डॉक्टर जी ने सामान्य स्वयंसेवक की दृष्टि जिस सीमा तक पहुँच सकती है, उसका उल्लेख किया था।"}, {"person": "", "title": "अमृत वचन", "text": "अपने काम में केवल श्रद्धा का गुण होना ही पर्याप्त नहीं है, उसके साथ बुद्धिमत्ता और नेतृत्व-कुशलता भी होनी चाहिये। कुछ स्वयंसेवक केवल श्रद्धा से आते हैं, वे उत्तम अनुयायी होते हैं। श्रद्धालुता में कभी-कभी स्वभाव का भोलापन होता है, क्वचित् पागलपन भी रहता है। वह नहीं चाहिये। अंधी-लूली श्रद्धा किस काम की?"}, {"person": "", "title": "अमृत वचन", "text": "शुष्क तत्त्वचिंतन से मन इतस्तत: भटकने लगता है, बुद्धि कई बार अकर्मण्य बन जाती है। किंतु स्फूर्तिदायक आलंबन के प्राप्त होते ही तत्त्वचिंतन सुलभ हो जाता है। किसी आधार के अभाव में व्यापक और महान् शक्ति की अनुभूति यदि असंभव नहीं, तो भी कठिन अवश्य है। हमने डाक्टर साहब का कार्य स्वीकार किया है। उस तत्त्व को स्रदयंगम कर, तदनुरूप अपने जीवन को ढालने के लिये उन्हीं के समान भावनाओं से ओतप्रोत अपने स्रदय की स्थिति बनाना आवश्यक है। शुष्क शब्द उसके लिये सहायक नहीं हो सकते।"}, {"person": "", "title": "अमृत वचन", "text": "स्वार्थ, मोह, चारों ओर के वातावरण में व्याप्त भिन्न-भिन्न विचारों का संघर्ष तथा अन्य आकर्षणों से अपने स्रदय को विचलित न होने देते हुए, अपनी मातृभूमि, अपना समाज, स्वधर्म और अपने चिरंजीव राष्ट्रजीवन का, अंत:करण की सम्पूर्ण शक्ति लगाकर चिंतन करने में अपना जीवन समरस होना चाहिये। एकाग्रचित्त से किये गये चिंतन का स्वाभाविक रूप से यह फल मिलता है कि किसी भी बुरी बात की ओर मन आकृष्ट नहीं होता। परमेश्वहर के व्यक्त स्वरूप से अपने पवित्र राष्ट्र के चिंतन में, समरस हुए जीवन में, कुविचार, अनीति, पाप आदि का प्रवेश हो ही नहीं सकता। समग्र समाज के अभ्युदय के लिये कार्य करना हो तो अपना जीवन पवित्र होना ही चाहिये।"}, {"person": "", "title": "अमृत वचन", "text": "अपने चारों और चलनेवाले कार्यों का आकर्षण होना अस्वाभाविक नहीं है। जुलूस, सम्मेलन, सभा आदि की हलचल जहाँ रहती है, वहाँ मन में कुछ गुदगुदी उठ सकती है। उस कार्यपद्धति में मान-सम्मान प्राप्त होने के कारण अपने में से कुछ लोगों के मन में उसके प्रति आकर्षण उत्पन्न होकर, स्वयं भी उस अखाड़े में उतरकर दंगल में भाग लेने की इच्छा हो सकती है। मन में इस प्रकार की इच्छा उत्पन्न होते ही, इस प्रकार के कार्य से राष्ट्र का हित होगा, इस बात के समर्थन में बुद्धि अनेक तर्क प्रस्तुत करती है। क्योंकि उलटे-सीधे दोनों ही पक्षों के समर्थन में तर्क करने में बुद्धि सदैव सक्षम रहती है।"}, {"person": "", "title": "अमृत वचन", "text": "व्यक्ति-व्यक्ति के जीवन में मातृभूमि की भक्ति जगाकर और उस सूत्र में संपूर्ण समाज को आबद्ध कर, समाज का संगठित सामर्थ्य निर्माण करने का मूलभूत कार्य डॉक्टर साहब ने हमारे सामने रखा है। इसी कार्यार्थ हमें अपनी संपूर्ण शक्ति लगानी चाहिये। शाखाओं के द्वारा समाज में एकात्म जीवन निर्माण करने की पद्धति का पूर्णत: अवलंबन कर, इस कार्य की सिद्धि के लिये हम अपना संपूर्ण सामर्थ्य दाँव पर लगा देंगें, ऐसा दृढ़ निश्च य स्रदय में धारण करना चाहिये।"}, {"person": "", "title": "अमृत वचन", "text": "यदि अधिकाधिक अंतर्मुख होने का प्रयत्न करेंगे, तो हमें अपने जीवनकार्य और कर्त्तव्य का साक्षात्कार होगा और तब कर्त्तव्य की पुकार सुनाई देगी। हम श्रेष्ठ कार्यकर्ताओं और समाजसेवकों के प्रति केवल अभिमान धारण न करें, उनके अनुसार कर्म करने का प्रयास भी करें। लेकिन अंतर्मुख होना सरल बात नहीं है। उसके लिये शरीर, मन व बुद्धि की पूर्ण अंतर्बाह्य शुचिता आवश्यक है। विचार, वाणी और कर्म मंा ही नहीं तो स्वप्न में भी पूर्ण पवित्रता हो। इसके अतिरिक्त कुछ भी न हो। इसका अभ्यास करना पड़े़गा।"}, {"person": "", "title": "अमृत वचन", "text": "सर्वप्रथम हमें अपना जीवन पवित्र बनाना होगा। खोखले शब्दों से हम दुनिया के लोगों को शिक्षा नहीं दे सकते। उक्ति के अनुरूप आचरण न हो तो शब्द निरर्थक हैं। यदि हम पवित्रता की बात कहना चाहते हों, तो हम उन वर्तमान सार्वजनिक नेताओं की नकल न करें, जो बार-बार पवित्रता पर भाषण तो देते हैं, परंतु यह जानने को कि वे स्वयं क्या हैं , निरीक्षण करने की इच्छा नहीं रखते। हम जो कहना चाहते हैं, उसके अनुसार हमारा आचरण होना चाहिये। भगवान् की कृपा से हमें एक श्रेष्ठ संस्कृति, एक जीवनोद्देश्य परंपरा से प्राप्त हुआ है। अत: उसके अनुसार हमारी कृति होनी चाहिये। \n1"}, {"person": "", "title": "अमृत वचन", "text": "अपना धर्म, जिसमें अभ्युदय और नि:श्रेयस् दोनों निहित हैं, हमारी आँखों के सामने दिशा-दिग्दर्शन करनेवाले ध्रुव तारे के समान सदैव रहे तथा उसके अधिष्ठान पर राष्ट्र का पुनरुज्जीवन किया जाए। इसलिये व्यावहारिक दैनिक जीवन में उनके उपदेशों का अनुसरण करें, अपने को व्यक्तिश: और सामाजिक दृष्टि से बलशाली बनायें, अपने सामूहिक जीवन में पावित्र्य लाएं, अपने स्रदय में यह भाव जागृत करें कि हमें इस विश्वू में एक जीवनोद्देश्य पूर्ण करना है। पूर्ण विश्वा स रखें कि हम अमर जाति हैं। यदि हम एकात्मता की भावना से धर्म, जीवन की विशुद्धता और अंतिम सत्य की अनुभूति के आधार पर समाज को शक्तिशाली, निर्भय और संगठित करते हैं, तो पुनश्चम विश्वलगुरु का पद प्राप्त कर सकते हैं। \n1"}, {"person": "", "title": "अमृत वचन", "text": "जब अपने स्वयंसेवक को इधर-उधर का आकर्षण हो जाता है, तब वह अपने संघ के नित्य कार्य से कभी-कभी कुछ विरक्त हो जाता है। सामान्यत: मनुष्य जगत् के आकर्षणों से विचलित होता ही है। यदि किसी को राजनीति के क्षेत्र में जाने का अवसर मिल गया, तो वह सोचने लगता है कि वह भगवान् के समकक्ष हो गया है। अब उसके लिये कोई कर्तव्य शेष नहीं रहा। भगवान् ने गीता में कहा है - ‘मेरे लिये कोई कर्तव्य नहीं। कर्म के लिये मेरे मन में कोई स्पृहा भी नहीं।’ इसी प्रकार राजनीति के क्षेत्र में गया हुआ व्यक्ति भी अपने को भगवान् मान कर कहता है कि मेरे लिये अब कोई कर्म नहीं। संघ में अपने लिये कुछ करणीय नहीं है, राजनीतिक क्षेत्र में भाषणबाजी करना ही मेरे लिये सर्वश्रेष्ठ राष्ट्रकार्य है, बाकी सब नगण्य व क्षुद्र हैं। राजनीतिज्ञों में ऐसा अभिमान उत्पन्न हो जाता है। \n1"}, {"person": "", "title": "अमृत वचन", "text": "यदि अपने मन में यह दृढ़ धारणा हो कि यह राष्ट्र अपना है और यहाँ अपना राष्ट्र-जीवन है, यह राष्ट्र-जीवन श्रेष्ठ और उन्नत बने, इसका दायित्व अपने ऊपर ही है, तो यह समझना कठिन नहीं होगा कि वह दायित्व पूर्ण करने के लिये केवल वर्तमान बातों की ओर ध्यान न देते हुए चिरंतन रूप से प्रत्येक व्यक्ति के हृदय में राष्ट्र-भक्ति की भावना जागृत करने हेतु एक सुव्यवस्थित तथा, राष्ट्रीय भावना से प्रभावित ऐसा कार्य खड़ा करना पडे़गा। \n1"}, {"person": "", "title": "अमृत वचन", "text": "यदि हमारे मन में विकार नहीं है, हमारी श्रध्दा का केन्द्र नहीं हिला है, तो हमारे मन में झंझावातों में उड़ने की प्रवृत्ति पैदा नहीं हो सकती। राष्ट्र का चैतन्य किसी न किसी रूप में प्रकट होगा ही। बीज बो दिया है, वट वृक्ष अवश्य ही खड़ा होगा। सम्पूर्ण भारत इसके नीचे आएगा। स्थान-स्थान पर नई जड़ जमेगी। इस निश्च य पर अडिग होकर चलेंगे तो संकट नहीं आ सकता। संकट तो अधूरी शक्ति पर आता है, पूर्ण पर नहीं। एकात्मता के आधार पर पूर्ण नीतिमत्ता से समाज को प्रबल एकसूत्रता में संगठित किया तो उस पर कोई संकट नहीं आएगा, बल्कि सम्पूर्ण राष्ट्र-जीवन उसकी प्रेरणा से चलेगा। सत्ताधीश कौन है, इसका सवाल नहीं। हम बढ़े हैं या नहीं, यह देखें। \n1"}, {"person": "", "title": "अमृत वचन", "text": "जनसाधारण को शिक्षित करना तथा उनके द्वारा चुने गये योग्य व्यक्तियों को राष्ट्रहितकारी कार्यो में संलग्न बनाये रखने का अपना कार्य तभी संभव है और हम तब ही उसके पात्र बन सकते हैं, जब हमारा समाज के साथ आत्मीयतापूर्ण निकट का सम्बन्ध हो। विभिन्न छोटे बड़े क्षेत्रों में चलनेवाली अपनी संघ शाखाएँ ऐसी होनीं चाहिये जिनसे उन क्षेत्रों के सब लोगों का सम्बन्ध स्थापित होता हो। उस क्षेत्र में यदि स्फोटक परिस्थिति का खतरा हो तो सब लोगों के सामंजस्य से उसका निराकरण करने लायक हमारे सम्बन्ध समाज के साथ चाहिए। प्रारंभ से ही शाखा सम्बन्धी हमारी कल्पना यही है। शाखाओं में ऐसे कार्यकर्ता तैयार होने चाहिये, जो अपनें चारों ओर के समाज में व्याप्त अवस्था को समझते हों। \n1"}, {"person": "", "title": "अमृत वचन", "text": "यह कहने से काम नहीं चलेगा कि मेरे पास समय नहीं है। यदि हम इसकी आवश्यकता को समझकर ठीक प्रकार से प्रयत्न करेंगे, तो पर्याप्त समय निकल सकेगा। अपने चारों ओर इतना विशाल समाज फैला पड़ा है, जिसके बीच हमें प्रयत्न करना है। यदि हम कहें कि हमारे पास समय नहीं, तो यह हमारे लिये शोभा देने वाली बात नहीं। हममें से प्रत्येक, अपने दैनिक जीवन के विभिन्न व्यवहार करते समय समाज के साथ सम्पर्क स्थापित करता ही है। हमें इन सब व्यवहारों के बीच अपने कार्य का ध्यान बनाये रखना होगा। प्रत्येक व्यक्ति की जो कुछ गुण-संपदा है, उसका भली प्रकार आकलन कर समाजहित में उसे प्रयुक्त करने की उसे प्रेरणा देनी चाहिए। व्यक्तियों के प्रत्येक व्यवहार में से कुछ न कुछ राष्ट्रहित का विचार निकालते बनना चाहिए। यहाँ तक कि जिन्हें अवगुण कहा जाता है, उनका भी राष्ट्रहित में प्रयोग करने की कला मालूम होनी चाहिए।\n1"}, {"person": "", "title": "अमृत वचन", "text": "जीवन में कभी कुछ माँगना नहीं। देशभक्ति का व्यापार क्या करना? समष्टिरूप परमात्मा को राष्ट्र के रूप में सेवा के लिये सामने व्यक्त देखकर, अपनी सम्पूर्ण शक्ति और बुद्धि उसके चरणों में अर्पण कर उसकी कृपा के ऊपर अपना जीवन चलाना है।"}, {"person": "", "title": "अमृत वचन", "text": "कृत्रिम अनुशासन, रूखी-सूखी पेड़ की टहनी के समान निष्प्राण और टूटनेवाला होता है। जीवमान, चैतन्यमय व्यक्ति की स्वेच्छा से स्वीकृत और समष्टि रूप अहंकार से ही ओतप्रोत जो अनुशासन है, वही संगठित रूप से खड़ा रह सकता है। वही चिरंजीव होता है। जो अमृत-रस से भरा है, उसे मारने की जगत् में किसी की शक्ति नहीं। वह अपने बोझ से भी कभी नहीं टूटता।"}, {"person": "", "title": "अमृत वचन", "text": "व्यक्ति-स्वातन्त्र्य का अर्थ मनमौजी होना कदापि नहीं। जो सबको मान्य हो और हितकारी हो उसी मर्यादा के अन्दर अपनी स्वतंत्रता का उपभोग प्रत्येक को करना होगा। स्वेच्छाचारिता के ढंग से चाहे जैसा उपभोग करते रहने की अनुमति उसे नहीं दी जा सकती।"}, {"person": "", "title": "अमृत वचन", "text": "कोई कहेगा कि विदेशी शासन में रहते समय की कल्पनाएँ और आज की कल्पनाएँ समान कैसे रह सकती हैं? इस का उत्तर यह है कि राष्ट्र-कल्पना परिस्थिति के अनुसार बदलनेवाली वस्तु नहीं है। मनुष्य का मनुष्यत्व नौकरी पर \nनिर्भर नहीं करता। किसी ने अपना व्यवसाय बदला तो उसका शरीर और गुणधर्म नहीं बदलता। विदेशी सत्ता रहने से उस सत्ता के सहारे ही अन्य समाज उद्दण्ड होते रहे इसलिये हिंदू-राष्ट्रवाद का मंडन प्रतिक्रियात्मक बात समझी गई। हिंदू-राष्ट्र की कल्पना यह एक सत्य है, इस दृष्टि से संघ ने उस भावना का जागरण किया। विदेशी शासन से संघर्ष रहते हुए भी हिंदू-राष्ट्रीयत्व की घोषणा संघ ने की, उस भावना की जागृति से समाज संगठित कर बलशाली और चैतन्ययुक्त करने का प्रयास किया। आज जब विदेशी सत्ता नहीं रही है तब ये प्रयास अधिक जोर से होने चाहिये, यही विचार परिस्थिति में हुए स्थूल परिवर्तन के कारण अपने अंत:करण में आना चाहिए। आज विदेशी सत्ता चली जाने से हिंदुस्थान के राष्ट्रीय स्वरूप में कुछ भी अंतर नहीं पड़ा है। शरीर वही है। जीवन के अधिष्ठान में कोई परिवर्तन नहीं हुआ है। राष्ट्र-धारणा स्थायी रख कर, अन्यान्य समाज के व्यवहार परख कर, अपना मार्गक्रमण करने में ही राष्ट्र की भलाई हैं।"}, {"person": "", "title": "अमृत वचन", "text": "हमारे शासन का स्वरूप पंचायती था और उसकी मूल इकाई ग्राम थी। जन-मन की भावना को व्यक्त करनेवाले प्रतिनिधि पंचों को हमने
